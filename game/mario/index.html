<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C罗大冒险 - CR7 Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 480px; height: 720px; }
        canvas { display: block; border: 2px solid #3a1a1a; box-shadow: 0 0 30px rgba(200,0,0,0.15); }
        #selectScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a0a0a, #2a1515);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #selectScreen h1 { color: #e53935; font-size: 36px; text-shadow: 0 0 20px rgba(229,57,53,0.5); letter-spacing: 4px; }
        #selectScreen .subtitle { color: #8a3030; font-size: 14px; letter-spacing: 6px; margin-bottom: 10px; }
        #startBtn {
            margin-top: 25px; padding: 14px 60px; background: linear-gradient(135deg, #c62828, #e53935);
            border: none; border-radius: 8px; color: white; font-size: 20px; cursor: pointer;
            letter-spacing: 6px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(229,57,53,0.4);
        }
        #startBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(229,57,53,0.6); }
        .controls-hint { color: #5a2020; font-size: 11px; margin-top: 15px; text-align: center; line-height: 1.8; }
        #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,5,5,0.92); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #gameOverScreen h2 { color: #e53935; font-size: 36px; margin-bottom: 10px; }
        #gameOverScreen .info { color: #e0e0e0; font-size: 18px; margin-bottom: 8px; }
        #restartBtn, #menuBtn {
            padding: 14px 55px; border: none; border-radius: 10px;
            color: white; font-size: 17px; cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s; margin-bottom: 10px;
        }
        #restartBtn { background: linear-gradient(135deg, #c62828, #e53935); box-shadow: 0 4px 20px rgba(229,57,53,0.4); }
        #restartBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(229,57,53,0.6); }
        #menuBtn { background: linear-gradient(135deg, #3a1a1a, #5a2a2a); box-shadow: 0 4px 20px rgba(90,42,42,0.4); }
        #menuBtn:hover { transform: translateY(-2px); }
        #levelComplete {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,5,5,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #levelComplete h2 { color: #ffc107; font-size: 32px; margin-bottom: 10px; }
        #levelComplete .info { color: #e0e0e0; font-size: 18px; margin-bottom: 20px; }
        #nextBtn {
            padding: 14px 55px; background: linear-gradient(135deg, #2e7d32, #4caf50);
            border: none; border-radius: 10px; color: white; font-size: 18px;
            cursor: pointer; letter-spacing: 4px; transition: all 0.3s;
        }
        #nextBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,0.5); }
        }
        #pauseOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,5,5,0.85); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            backdrop-filter: blur(3px);
        }
        #pauseOverlay .pause-text { color: #e53935; font-size: 36px; letter-spacing: 8px; }
        #pauseOverlay .pause-hint { color: #8a3030; font-size: 13px; margin-top: 15px; }
        .screen-back {
            align-self: flex-start;
            color: #8a3030; font-size: 12px; text-decoration: none;
            padding: 5px 12px; border-radius: 6px;
            border: 1px solid rgba(229,57,53,0.2);
            background: rgba(229,57,53,0.08);
            transition: all 0.2s; margin-bottom: 10px;
        }
        .screen-back:hover { background: rgba(229,57,53,0.2); color: #ef5350; }
        .rules-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(229,57,53,0.12);
            border-radius: 8px; padding: 12px 16px; margin: 10px 0 5px;
            max-width: 380px; width: 100%;
        }
        .rules-box h3 { color: #e53935; font-size: 13px; margin-bottom: 8px; }
        .rules-box ul { list-style: none; padding: 0; }
        .rules-box li { color: #6a3030; font-size: 11px; line-height: 1.8; padding-left: 14px; position: relative; }
        .rules-box li::before { content: '›'; position: absolute; left: 0; color: #e53935; }

        /* 移动端控件 */
        .mobile-controls { display: none; position: absolute; bottom: 5px; left: 0; right: 0; z-index: 5; padding: 0 10px; }
        @media (max-width: 500px) { .mobile-controls { display: flex; justify-content: space-between; } }
        .m-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(229,57,53,0.15); border: 1px solid rgba(229,57,53,0.3); color: #e53935; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="480" height="720"></canvas>

    <div id="selectScreen">
        <a href="index.html" class="screen-back">&larr; 返回大厅</a>
        <canvas id="cr7Preview" width="160" height="200"></canvas>
        <h1>C罗大冒险</h1>
        <div class="subtitle">CR7 ADVENTURE</div>
        <div class="rules-box">
            <h3>游戏玩法</h3>
            <ul>
                <li>方向键/WASD 控制C罗移动和跳跃</li>
                <li>空格键发射足球攻击敌人，足球可弹跳</li>
                <li>踩在敌人头上可以消灭它们，获得分数</li>
                <li>收集金币（+10分）和奖杯MVP（+500分）</li>
                <li>顶问号砖块可获得额外金币</li>
                <li>到达关卡终点的旗杆即可过关</li>
                <li>3条命，被敌人碰到或掉入深渊会失去一条命</li>
                <li>最终关卡有Boss守门员等你挑战！</li>
            </ul>
        </div>
        <button id="startBtn">开 始 冒 险</button>
        <div class="controls-hint">方向键/WASD 移动跳跃 | 空格键 射球 | P 暂停</div>
    </div>

    <div id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="info" id="finalScore">得分: 0</div>
        <div class="info" id="finalLevel">关卡: 1</div>
        <button id="restartBtn" onclick="restartGame()">再来一次</button>
        <button id="menuBtn" onclick="backToMenu()">返回菜单</button>
    </div>

    <div id="levelComplete">
        <h2 id="levelTitle">关卡通过!</h2>
        <div class="info" id="levelScore">得分: 0</div>
        <button id="nextBtn" onclick="nextLevel()">下一关</button>
    </div>

    <div id="pauseOverlay">
        <div class="pause-text">暂 停</div>
        <div class="pause-hint">按 P 继续游戏</div>
    </div>

    <div class="mobile-controls">
        <div style="display:flex;gap:8px;">
            <button class="m-btn" ontouchstart="mobileLeft=true;event.preventDefault();" ontouchend="mobileLeft=false;">&#9664;</button>
            <button class="m-btn" ontouchstart="mobileRight=true;event.preventDefault();" ontouchend="mobileRight=false;">&#9654;</button>
        </div>
        <div style="display:flex;gap:8px;">
            <button class="m-btn" ontouchstart="mobileJump=true;event.preventDefault();" ontouchend="mobileJump=false;">&#9650;</button>
            <button class="m-btn" ontouchstart="mobileShoot=true;event.preventDefault();" ontouchend="mobileShoot=false;">&#9918;</button>
        </div>
    </div>
</div>

<script>
    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');

    var TILE = 32;
    var COLS = 15; // 480/32
    var GRAVITY = 0.5;
    var JUMP_FORCE = -10;
    var MOVE_SPEED = 4;

    var gameState = 'menu';
    var level = 1, score = 0, lives = 3, coins = 0;
    var cameraX = 0;
    var player, platforms, enemies, projectiles, pickups, particles, decorations;
    var levelWidth = 0;
    var keys = {};
    var mobileLeft = false, mobileRight = false, mobileJump = false, mobileShoot = false;
    var shootCooldown = 0;
    var invincibleTimer = 0;
    var shakeDur = 0;
    var shootPressed = false;

    // 关卡数据 - tile based
    // 0=air, 1=ground, 2=brick, 3=question, 4=pipe_tl, 5=pipe_tr, 6=pipe_bl, 7=pipe_br, 8=coin, 9=spike, S=spawn, G=goal
    var LEVELS = [
        // Level 1 - Grass world
        [
            '               ',
            '               ',
            '    ?  ?  ?    ',
            '               ',
            '               ',
            '       ?       ',
            '               ',
            '  8      8     ',
            '  22    222    ',
            '               ',
            '     8    45   ',
            '  22222  45    ',
            ' 1111111167111 ',
            ' 1111111167111 ',
        ],
        // Level 2 - Underground
        [
            '               ',
            '               ',
            '   2?2  2?2    ',
            '               ',
            '               ',
            '  8     8  8   ',
            '  2     2  2   ',
            '               ',
            '      222      ',
            '               ',
            '  8        8   ',
            ' 222  22  222  ',
            ' 1111111111111 ',
            ' 1111111111111 ',
        ],
        // Level 3 - Sky
        [
            '               ',
            '               ',
            '    8   8      ',
            '   222 222     ',
            '               ',
            '  3     3   8  ',
            '               ',
            '       8       ',
            '      222      ',
            '  8        8   ',
            ' 222      222  ',
            '               ',
            ' 1111111111111 ',
            ' 1111111111111 ',
        ],
    ];

    var tileColors = {
        ground: '#4caf50',
        groundDark: '#388e3c',
        brick: '#8d6e63',
        brickDark: '#6d4c41',
        question: '#ffc107',
        questionUsed: '#6d4c41',
        pipe: '#4caf50',
        pipeDark: '#2e7d32',
    };

    function loadLevel(lvlIdx) {
        var data = LEVELS[lvlIdx % LEVELS.length];
        // 水平重复2次
        var tiles = [];
        for (var row = 0; row < data.length; row++) {
            tiles[row] = [];
            for (var rep = 0; rep < 3; rep++) {
                for (var col = 0; col < data[row].length; col++) {
                    tiles[row].push(data[row][col]);
                }
            }
        }

        levelWidth = tiles[0].length * TILE;
        platforms = []; enemies = []; projectiles = []; pickups = []; particles = []; decorations = [];

        var spawnX = 80, spawnY = 300;

        for (var r = 0; r < tiles.length; r++) {
            for (var c = 0; c < tiles[r].length; c++) {
                var ch = tiles[r][c];
                var x = c * TILE, y = r * TILE + 80; // offset for HUD

                if (ch === '1') {
                    platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'ground' });
                } else if (ch === '2') {
                    platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'brick', breakable: true });
                } else if (ch === '3') {
                    platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'question', hasItem: true });
                } else if (ch === '4' || ch === '5' || ch === '6' || ch === '7') {
                    platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'pipe' });
                } else if (ch === '8') {
                    pickups.push({ x: x + 8, y: y + 8, type: 'coin', collected: false, anim: Math.random() * 6.28 });
                } else if (ch === 'S') {
                    spawnX = x; spawnY = y;
                } else if (ch === 'G') {
                    decorations.push({ x: x, y: y - TILE * 3, type: 'flag' });
                }
            }
        }

        // 生成敌人
        var enemyCount = 4 + lvlIdx * 3;
        for (var i = 0; i < enemyCount; i++) {
            var ex = 200 + Math.random() * (levelWidth - 300);
            var type = i < enemyCount - 1 ? 'goomba' : (lvlIdx >= 2 ? 'boss' : 'koopa');
            enemies.push({
                x: ex, y: 300, w: 28, h: 28,
                vx: type === 'boss' ? 0 : (Math.random() < 0.5 ? -1.2 : 1.2),
                type: type,
                hp: type === 'boss' ? 5 + lvlIdx * 3 : 1,
                maxHp: type === 'boss' ? 5 + lvlIdx * 3 : 1,
                dir: -1,
                alive: true,
                stompTimer: 0,
            });
        }

        // 奖杯
        pickups.push({ x: levelWidth - 80, y: 150, type: 'trophy', collected: false, anim: 0 });

        // 金币散布
        for (var i = 0; i < 5 + lvlIdx * 2; i++) {
            var cx = 100 + Math.random() * (levelWidth - 200);
            var cy = 150 + Math.random() * 200;
            pickups.push({ x: cx, y: cy, type: 'coin', collected: false, anim: Math.random() * 6.28 });
        }

        // 装饰 - 云
        for (var i = 0; i < 6 + lvlIdx * 2; i++) {
            decorations.push({
                x: Math.random() * levelWidth,
                y: 20 + Math.random() * 100,
                type: 'cloud',
                size: 15 + Math.random() * 20,
            });
        }

        // 装饰 - 山
        for (var i = 0; i < 3 + lvlIdx; i++) {
            decorations.push({
                x: Math.random() * levelWidth,
                y: 80 + 13 * TILE - 20,
                type: 'mountain',
                size: 30 + Math.random() * 50,
            });
        }

        player = {
            x: spawnX, y: spawnY, w: 24, h: 32,
            vx: 0, vy: 0,
            onGround: false,
            facing: 1,
            frame: 0,
            frameTimer: 0,
        };
        cameraX = 0;
        shootCooldown = 0;
        invincibleTimer = 0;
    }

    // ===== 绘制 CR7 =====
    function drawCR7(c, cx, cy, facing, frame, scale) {
        var s = scale || 1;
        c.save(); c.translate(cx, cy); c.scale(facing * s, s);

        // 身体 - 白色皇马球衣
        c.fillStyle = '#f5f5f5';
        c.fillRect(-8, 6, 16, 16);
        // 金色条纹
        c.fillStyle = '#ffc107';
        c.fillRect(-8, 6, 16, 3);

        // 号码 7
        c.fillStyle = '#e53935'; c.font = 'bold 9px sans-serif'; c.textAlign = 'center';
        c.fillText('7', 0, 20);

        // 头
        c.fillStyle = '#ffcc80';
        c.beginPath(); c.arc(0, 0, 9, 0, Math.PI * 2); c.fill();

        // 头发 - C罗经典短发向后梳
        c.fillStyle = '#1a1a1a';
        c.beginPath(); c.ellipse(0, -4, 10, 5, 0, Math.PI, 0); c.fill();
        c.fillRect(7, -3, 4, 6); // 侧面头发

        // 眉毛（浓眉）
        c.fillStyle = '#1a1a1a';
        c.fillRect(-5, -2, 4, 1.5); c.fillRect(2, -2, 4, 1.5);

        // 眼睛
        c.fillStyle = '#333';
        c.fillRect(-4, 0, 3, 3); c.fillRect(2, 0, 3, 3);
        c.fillStyle = '#fff';
        c.fillRect(-3, 0, 1, 1); c.fillRect(3, 0, 1, 1);

        // 嘴巴 - 自信微笑
        c.strokeStyle = '#333'; c.lineWidth = 1;
        c.beginPath(); c.arc(0, 4, 3, 0.1, Math.PI - 0.1); c.stroke();

        // 腿部动画
        var legOff = frame === 1 ? -3 : frame === 3 ? 3 : 0;

        // 左腿
        c.fillStyle = '#1a237e';
        c.fillRect(-7, 22 + legOff, 6, 10);
        // 右腿
        c.fillRect(1, 22 - legOff, 6, 10);

        // 袜子（白色）
        c.fillStyle = '#fff';
        c.fillRect(-7, 31 + legOff, 6, 4);
        c.fillRect(1, 31 - legOff, 6, 4);

        // 鞋（红色）
        c.fillStyle = '#e53935';
        c.fillRect(-8, 34 + legOff, 7, 4);
        c.fillRect(0, 34 - legOff, 7, 4);

        // 手臂
        c.fillStyle = '#ffcc80';
        if (!player.onGround) {
            // 跳跃时手臂向上
            c.save(); c.translate(-9, 10); c.rotate(-0.8); c.fillRect(0, -2, 10, 4); c.restore();
            c.save(); c.translate(9, 10); c.rotate(0.8); c.fillRect(-10, -2, 10, 4); c.restore();
        } else {
            c.save(); c.translate(-9, 12); c.rotate(-0.3 + Math.sin(frame * 1.5) * 0.3); c.fillRect(0, -2, 10, 4); c.restore();
            c.save(); c.translate(9, 12); c.rotate(0.3 - Math.sin(frame * 1.5) * 0.3); c.fillRect(-10, -2, 10, 4); c.restore();
        }

        c.restore();
    }

    function drawEnemy(c, e) {
        c.save(); c.translate(e.x + e.w / 2, e.y + e.h / 2);

        if (e.type === 'goomba') {
            // 栗子仔 - 棕色
            c.fillStyle = '#8d6e63';
            c.beginPath(); c.arc(0, 0, 12, 0, Math.PI * 2); c.fill();
            // 眼睛
            c.fillStyle = '#333'; c.fillRect(-5, -3, 3, 3); c.fillRect(3, -3, 3, 3);
            // 脚
            c.fillStyle = '#5d4037';
            c.fillRect(-8, 8, 6, 5); c.fillRect(3, 8, 6, 5);
        }
        else if (e.type === 'koopa') {
            // 守卫 - 绿色龟壳
            c.fillStyle = '#4caf50';
            c.beginPath(); c.ellipse(0, 2, 12, 14, 0, 0, Math.PI * 2); c.fill();
            // 壳花纹
            c.strokeStyle = '#2e7d32'; c.lineWidth = 1;
            c.beginPath(); c.ellipse(0, 2, 8, 10, 0, 0, Math.PI * 2); c.stroke();
            // 头
            c.fillStyle = '#ffcc80';
            c.beginPath(); c.arc(e.dir * 8, -8, 6, 0, Math.PI * 2); c.fill();
            c.fillStyle = '#333'; c.fillRect(e.dir * 8 - 2, -10, 2, 2); c.fillRect(e.dir * 8 + 1, -10, 2, 2);
            // 脚
            c.fillStyle = '#ffc107'; c.fillRect(-7, 14, 5, 4); c.fillRect(3, 14, 5, 4);
        }
        else if (e.type === 'boss') {
            // Boss - 大型守门员
            var s = 20;
            c.fillStyle = '#2e7d32'; // 绿色守门员服
            c.fillRect(-s, -s * 0.5, s * 2, s * 2);
            // 头
            c.fillStyle = '#ffcc80';
            c.beginPath(); c.arc(0, -s * 0.8, 14, 0, Math.PI * 2); c.fill();
            // 头发
            c.fillStyle = '#333';
            c.beginPath(); c.ellipse(0, -s * 0.8 - 8, 15, 7, 0, Math.PI, 0); c.fill();
            // 眼睛
            c.fillStyle = '#e53935'; c.fillRect(-6, -s * 0.8 - 2, 4, 4); c.fillRect(3, -s * 0.8 - 2, 4, 4);
            // 手套
            c.fillStyle = '#ffc107';
            c.fillRect(-s - 8, 0, 10, 12); c.fillRect(s - 2, 0, 10, 12);
            // 手臂
            c.save(); c.translate(-s, -5); c.rotate(-0.5 + Math.sin(Date.now() * 0.003) * 0.3);
            c.fillStyle = '#2e7d32'; c.fillRect(0, -3, 20, 8); c.restore();
            c.save(); c.translate(s, -5); c.rotate(0.5 - Math.sin(Date.now() * 0.003) * 0.3);
            c.fillStyle = '#2e7d32'; c.fillRect(-20, -3, 20, 8); c.restore();
            // 血条
            var bw = 50;
            c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillRect(-bw / 2, -s - 20, bw, 5);
            c.fillStyle = '#e53935'; c.fillRect(-bw / 2, -s - 20, bw * (e.hp / e.maxHp), 5);
        }

        c.restore();
    }

    function spawnParticles(x, y, color, count) {
        for (var i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: -Math.random() * 5,
                life: 20 + Math.random() * 20,
                maxLife: 40,
                color: color,
                size: 2 + Math.random() * 3,
            });
        }
    }

    function update() {
        if (gameState !== 'playing') return;

        shootCooldown = Math.max(0, shootCooldown - 1);
        if (invincibleTimer > 0) invincibleTimer--;

        // 输入
        var moveX = 0;
        if (keys['ArrowLeft'] || keys['KeyA'] || mobileLeft) moveX = -1;
        if (keys['ArrowRight'] || keys['KeyD'] || mobileRight) moveX = 1;
        var wantJump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || mobileJump;
        var wantShoot = keys['KeyX'] || shootPressed || mobileShoot;

        // 移动
        player.vx = moveX * MOVE_SPEED;
        if (moveX !== 0) player.facing = moveX;

        // 跳跃 (coyote time简化)
        if (wantJump && player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
        }

        // 重力
        player.vy += GRAVITY;
        if (player.vy > 12) player.vy = 12;

        // 射球
        if (wantShoot && shootCooldown <= 0) {
            shootCooldown = 20;
            projectiles.push({
                x: player.x + player.facing * 15,
                y: player.y + 5,
                vx: player.facing * 8,
                vy: -1,
                type: 'football',
                life: 90,
            });
        }

        // 动画帧
        player.frameTimer++;
        if (player.frameTimer > 6) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }

        // X 移动 & 碰撞
        player.x += player.vx;
        // 平台碰撞 X
        platforms.forEach(function(p) {
            if (rectCollide(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, p.x, p.y, p.w, p.h)) {
                if (player.vx > 0) player.x = p.x - player.w / 2;
                else if (player.vx < 0) player.x = p.x + p.w + player.w / 2;
            }
        });

        // Y 移动 & 碰撞
        player.y += player.vy;
        player.onGround = false;
        platforms.forEach(function(p) {
            if (rectCollide(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, p.x, p.y, p.w, p.h)) {
                if (player.vy > 0) {
                    player.y = p.y - player.h / 2;
                    player.vy = 0;
                    player.onGround = true;
                } else if (player.vy < 0) {
                    player.y = p.y + p.h + player.h / 2;
                    player.vy = 0;
                    // 顶问号块
                    if (p.type === 'question' && p.hasItem) {
                        p.hasItem = false;
                        p.type = 'questionUsed';
                        score += 50;
                        spawnParticles(p.x + 16, p.y, '#ffc107', 8);
                        // 掉金币
                        pickups.push({ x: p.x + 8, y: p.y - 20, type: 'coin', collected: false, anim: 0 });
                    }
                    // 顶砖块
                    if (p.type === 'brick' && p.breakable) {
                        p.x = -1000; // 移除
                        score += 10;
                        spawnParticles(p.x + 16, p.y + 16, '#8d6e63', 10);
                    }
                }
            }
        });

        // 边界
        if (player.x < player.w / 2) player.x = player.w / 2;
        if (player.x > levelWidth - player.w / 2) player.x = levelWidth - player.w / 2;
        if (player.y > 720) { loseLife(); return; }

        // 相机
        cameraX = player.x - 240;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > levelWidth - 480) cameraX = levelWidth - 480;

        // 敌人
        enemies.forEach(function(e) {
            if (!e.alive) return;
            e.x += e.vx;

            // Boss 追踪
            if (e.type === 'boss') {
                if (e.x < player.x) { e.vx = 1.5; e.dir = 1; }
                else { e.vx = -1.5; e.dir = -1; }
            }

            // 敌人碰到墙壁反弹
            platforms.forEach(function(p) {
                if (rectCollide(e.x, e.y, e.w, e.h, p.x, p.y, p.w, p.h)) {
                    e.vx *= -1; e.dir *= -1;
                    if (e.vx > 0) e.x = p.x + p.w;
                    else e.x = p.x - e.w;
                }
            });

            // 玩家踩敌人
            if (invincibleTimer <= 0 && rectCollide(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, e.x, e.y, e.w, e.h)) {
                if (player.vy > 0 && player.y - player.h / 2 < e.y + e.h / 2) {
                    // 踩死
                    e.hp--;
                    player.vy = JUMP_FORCE * 0.6;
                    if (e.hp <= 0) {
                        e.alive = false;
                        score += e.type === 'boss' ? 500 : 100;
                        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, e.type === 'boss' ? '#ffc107' : '#8d6e63', 15);
                        shakeDur = e.type === 'boss' ? 15 : 5;
                        if (e.type === 'boss') {
                            // Boss 死后 SIUUU!
                            score += 1000;
                        }
                    } else {
                        spawnParticles(e.x + e.w / 2, e.y, '#fff', 5);
                    }
                } else {
                    // 受伤
                    loseLife();
                    return;
                }
            }
        });

        // 足球攻击敌人
        for (var pi = projectiles.length - 1; pi >= 0; pi--) {
            var proj = projectiles[pi];
            proj.x += proj.vx; proj.y += proj.vy;
            proj.vy += 0.08;
            proj.life--;

            if (proj.life <= 0 || proj.x < 0 || proj.x > levelWidth) {
                projectiles.splice(pi, 1); continue;
            }

            // 球碰敌人
            enemies.forEach(function(e) {
                if (!e.alive) return;
                if (rectCollide(proj.x - 5, proj.y - 5, 10, 10, e.x, e.y, e.w, e.h)) {
                    e.hp -= 2;
                    projectiles.splice(pi, 1);
                    spawnParticles(proj.x, proj.y, '#fff', 5);
                    if (e.hp <= 0) {
                        e.alive = false;
                        score += e.type === 'boss' ? 500 : 100;
                        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ffc107', 15);
                        shakeDur = 8;
                    }
                }
            });
        }

        // 捡金币/奖杯
        pickups.forEach(function(pk) {
            if (pk.collected) return;
            pk.anim += 0.05;
            var py = pk.type === 'coin' ? pk.y + Math.sin(pk.anim) * 3 : pk.y;
            if (rectCollide(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h, pk.x - 8, py - 8, 16, 16)) {
                pk.collected = true;
                if (pk.type === 'coin') { coins++; score += 10; spawnParticles(pk.x, pk.y, '#ffd600', 8); }
                else if (pk.type === 'trophy') { score += 500; spawnParticles(pk.x, pk.y, '#ffc107', 20); }
            }
        });

        // 粒子
        particles = particles.filter(function(p) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
            return p.life > 0;
        });

        if (shakeDur > 0) shakeDur--;

        // 到达终点
        var hasFlag = false;
        decorations.forEach(function(d) { if (d.type === 'flag' && Math.abs(player.x - d.x) < 30) hasFlag = true; });
        if (hasFlag || player.x > levelWidth - 50) {
            if (level >= 3) {
                // 通关
                gameState = 'over';
                document.getElementById('finalScore').textContent = '总分: ' + score + ' | 金币: ' + coins;
                document.getElementById('finalLevel').textContent = '恭喜通关! SIUUU!';
                document.getElementById('gameOverScreen').style.display = 'flex';
            } else {
                gameState = 'levelComplete';
                document.getElementById('levelTitle').textContent = level === 3 ? '通关!' : '第 ' + level + ' 关通过!';
                document.getElementById('levelScore').textContent = '得分: ' + score + ' | 金币: ' + coins;
                document.getElementById('levelComplete').style.display = 'flex';
            }
        }
    }

    function loseLife() {
        lives--;
        invincibleTimer = 0;
        if (lives <= 0) {
            gameState = 'over';
            document.getElementById('finalScore').textContent = '得分: ' + score;
            document.getElementById('finalLevel').textContent = '到达关卡: ' + level;
            document.getElementById('gameOverScreen').style.display = 'flex';
        } else {
            player.x = 80; player.y = 300;
            player.vx = 0; player.vy = 0;
            invincibleTimer = 120;
        }
    }

    function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function draw() {
        ctx.save();
        var sx = shakeDur > 0 ? (Math.random() - 0.5) * shakeDur : 0;
        var sy = shakeDur > 0 ? (Math.random() - 0.5) * shakeDur : 0;
        ctx.translate(sx, sy);

        // 天空
        var sky = ctx.createLinearGradient(0, 0, 0, 720);
        if (level === 1) { sky.addColorStop(0, '#5c93d0'); sky.addColorStop(1, '#87ceeb'); }
        else if (level === 2) { sky.addColorStop(0, '#1a1a2e'); sky.addColorStop(1, '#2a2a3e'); }
        else { sky.addColorStop(0, '#4a90d9'); sky.addColorStop(1, '#a0d0f0'); }
        ctx.fillStyle = sky; ctx.fillRect(0, 0, 480, 720);

        if (gameState === 'playing' || gameState === 'paused') {
            ctx.save();
            ctx.translate(-cameraX, 0);

            // 装饰
            decorations.forEach(function(d) {
                if (d.type === 'cloud') {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                    ctx.arc(d.x + d.size * 0.8, d.y - d.size * 0.3, d.size * 0.7, 0, Math.PI * 2);
                    ctx.arc(d.x + d.size * 1.4, d.y, d.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                } else if (d.type === 'mountain') {
                    ctx.fillStyle = level === 2 ? '#2a2a3a' : '#6a8a5a';
                    ctx.beginPath();
                    ctx.moveTo(d.x - d.size, d.y);
                    ctx.lineTo(d.x, d.y - d.size * 0.8);
                    ctx.lineTo(d.x + d.size, d.y);
                    ctx.closePath(); ctx.fill();
                } else if (d.type === 'flag') {
                    // 终点旗
                    ctx.fillStyle = '#888'; ctx.fillRect(d.x, d.y, 3, TILE * 3);
                    ctx.fillStyle = '#e53935';
                    ctx.beginPath(); ctx.moveTo(d.x + 3, d.y); ctx.lineTo(d.x + 30, d.y + 10); ctx.lineTo(d.x + 3, d.y + 20); ctx.closePath(); ctx.fill();
                    // SIUUU
                    ctx.fillStyle = '#ffc107'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('SIUUU!', d.x + 20, d.y - 10);
                }
            });

            // 平台
            platforms.forEach(function(p) {
                if (p.x < cameraX - 50 || p.x > cameraX + 530) return;
                if (p.type === 'ground') {
                    ctx.fillStyle = '#4caf50'; ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#388e3c'; ctx.fillRect(p.x, p.y, p.w, 4);
                    ctx.fillStyle = '#8d6e63'; ctx.fillRect(p.x, p.y + 4, p.w, p.h - 4);
                } else if (p.type === 'brick') {
                    ctx.fillStyle = '#8d6e63'; ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeStyle = '#6d4c41'; ctx.lineWidth = 1; ctx.strokeRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
                    ctx.strokeRect(p.x + p.w / 2, p.y + 1, 0, p.h - 2);
                    ctx.strokeRect(p.x + 1, p.y + p.h / 2, p.w - 2, 0);
                } else if (p.type === 'question') {
                    ctx.fillStyle = '#ffc107'; ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('?', p.x + p.w / 2, p.y + p.h / 2 + 6);
                } else if (p.type === 'questionUsed') {
                    ctx.fillStyle = '#6d4c41'; ctx.fillRect(p.x, p.y, p.w, p.h);
                } else if (p.type === 'pipe') {
                    ctx.fillStyle = '#4caf50'; ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#2e7d32'; ctx.fillRect(p.x, p.y, 4, p.h);
                    ctx.fillStyle = '#81c784'; ctx.fillRect(p.x + p.w - 4, p.y, 4, p.h);
                }
            });

            // 捡取物
            pickups.forEach(function(pk) {
                if (pk.collected) return;
                var drawY = pk.type === 'coin' ? pk.y + Math.sin(pk.anim) * 3 : pk.y;
                if (pk.x < cameraX - 20 || pk.x > cameraX + 500) return;

                if (pk.type === 'coin') {
                    ctx.beginPath(); ctx.arc(pk.x, drawY, 7, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffd600'; ctx.shadowColor = '#ffd600'; ctx.shadowBlur = 6; ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ff8f00'; ctx.lineWidth = 1; ctx.stroke();
                } else if (pk.type === 'trophy') {
                    ctx.fillStyle = '#ffc107'; ctx.shadowColor = '#ffc107'; ctx.shadowBlur = 10;
                    ctx.fillRect(pk.x - 8, drawY - 6, 16, 12);
                    ctx.shadowBlur = 0;
                    ctx.fillRect(pk.x - 4, drawY + 6, 8, 4);
                    ctx.fillRect(pk.x - 6, drawY + 10, 12, 3);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('MVP', pk.x, drawY + 3);
                }
            });

            // 敌人
            enemies.forEach(function(e) {
                if (!e.alive || e.x < cameraX - 50 || e.x > cameraX + 530) return;
                drawEnemy(ctx, e);
            });

            // 玩家
            if (gameState === 'playing') {
                if (invincibleTimer <= 0 || Math.floor(invincibleTimer / 4) % 2 === 0) {
                    drawCR7(ctx, player.x, player.y - player.h / 2, player.facing, player.frame, 0.85);
                }
            }

            // 足球
            projectiles.forEach(function(p) {
                if (p.x < cameraX - 20 || p.x > cameraX + 500) return;
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 5; ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();
                // 五边形花纹
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
            });

            // 粒子
            particles.forEach(function(p) {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            ctx.restore(); // 结束相机

            // HUD
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, 480, 44);
            // 返回大厅按钮
            ctx.fillStyle = 'rgba(229,57,53,0.12)'; ctx.fillRect(388, 5, 85, 30);
            ctx.strokeStyle = 'rgba(229,57,53,0.3)'; ctx.lineWidth = 1; ctx.strokeRect(388, 5, 85, 30);
            ctx.fillStyle = '#ef5350'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('◀ 大厅', 430, 24); ctx.textAlign = 'left';

            ctx.fillStyle = '#ffc107'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('SCORE ' + score, 15, 27);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffd600';
            var coinStr = '';
            for (var i = 0; i < coins; i++) coinStr += '●';
            ctx.font = '12px sans-serif';
            ctx.fillText('x' + coins, 240, 27);

            ctx.textAlign = 'right';
            ctx.fillStyle = '#e53935'; ctx.font = '18px sans-serif';
            var hearts = '';
            for (var i = 0; i < lives; i++) hearts += '♥';
            ctx.fillText(hearts, 370, 27);

            ctx.fillStyle = '#8a3030'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText('Lv.' + level, 370, 12);
        }

        ctx.restore();
    }

    function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        level = 1; score = 0; lives = 3; coins = 0;
        loadLevel(0);
        gameState = 'playing';
    }

    function nextLevel() {
        document.getElementById('levelComplete').style.display = 'none';
        level++;
        loadLevel(level - 1);
        gameState = 'playing';
    }

    function backToMenu() {
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('levelComplete').style.display = 'none';
        document.getElementById('selectScreen').style.display = 'flex';
        gameState = 'menu';
    }

    // 输入
    document.addEventListener('keydown', function(e) {
        keys[e.code] = true;
        if (e.code === 'Space') { e.preventDefault(); shootPressed = true; }
        if (e.code === 'KeyP') {
            if (gameState === 'playing') { gameState = 'paused'; document.getElementById('pauseOverlay').style.display = 'flex'; }
            else if (gameState === 'paused') { gameState = 'playing'; document.getElementById('pauseOverlay').style.display = 'none'; }
        }
    });
    document.addEventListener('keyup', function(e) {
        keys[e.code] = false;
        if (e.code === 'Space') shootPressed = false;
    });

    // Canvas 点击返回大厅按钮
    canvas.addEventListener('click', function(e) {
        if (gameState !== 'playing' && gameState !== 'paused') return;
        var rect = canvas.getBoundingClientRect();
        var mx = (e.clientX - rect.left) * (480 / rect.width);
        var my = (e.clientY - rect.top) * (720 / rect.height);
        if (mx >= 388 && mx <= 473 && my >= 5 && my <= 35) {
            window.location.href = 'index.html';
        }
    });
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); shootPressed = true; });

    document.getElementById('startBtn').onclick = function() {
        document.getElementById('selectScreen').style.display = 'none';
        level = 1; score = 0; lives = 3; coins = 0;
        loadLevel(0);
        gameState = 'playing';
    };

    // 预览 CR7 SIUUU
    (function() {
        var pc = document.getElementById('cr7Preview');
        var px = pc.getContext('2d');
        px.clearRect(0, 0, 160, 200);

        // 身体
        px.fillStyle = '#f5f5f5'; px.fillRect(68, 60, 24, 30);
        px.fillStyle = '#ffc107'; px.fillRect(68, 60, 24, 4);
        px.fillStyle = '#e53935'; px.font = 'bold 14px sans-serif'; px.textAlign = 'center';
        px.fillText('7', 80, 82);

        // 头
        px.fillStyle = '#ffcc80'; px.beginPath(); px.arc(80, 50, 14, 0, Math.PI * 2); px.fill();
        px.fillStyle = '#1a1a1a';
        px.beginPath(); px.ellipse(80, 42, 15, 7, 0, Math.PI, 0); px.fill();
        px.fillRect(92, 43, 5, 8);
        px.fillStyle = '#333'; px.fillRect(73, 48, 4, 4); px.fillRect(84, 48, 4, 4);
        px.strokeStyle = '#333'; px.lineWidth = 1;
        px.beginPath(); px.arc(80, 57, 4, 0.1, Math.PI - 0.1); px.stroke();

        // SIUUU 手臂上举
        px.fillStyle = '#ffcc80';
        px.save(); px.translate(68, 70); px.rotate(-1.2); px.fillRect(0, -3, 16, 6); px.restore();
        px.save(); px.translate(92, 70); px.rotate(1.2); px.fillRect(-16, -3, 16, 6); px.restore();

        // 腿
        px.fillStyle = '#1a237e'; px.fillRect(70, 90, 8, 20); px.fillRect(82, 90, 8, 20);
        px.fillStyle = '#fff'; px.fillRect(70, 108, 8, 6); px.fillRect(82, 108, 8, 6);
        px.fillStyle = '#e53935'; px.fillRect(69, 113, 9, 5); px.fillRect(81, 113, 9, 5);

        // SIUUU 文字
        px.fillStyle = '#ffc107'; px.font = 'bold 22px sans-serif';
        px.fillText('SIUUU!', 80, 145);

        // 光环
        px.strokeStyle = 'rgba(255,193,7,0.3)'; px.lineWidth = 2;
        px.beginPath(); px.arc(80, 50, 22, 0, Math.PI * 2); px.stroke();
    })();

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
</script>

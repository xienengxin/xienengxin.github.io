    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      图片加文字
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>
      </div>
      <h1>✏️ 图片加文字</h1>
      <p>在图片上添加文字水印或标注</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
          <div style="font-size: 3rem">🖼️</div>
          <p>点击选择图片或拖放图片到此处</p>
        </div>
      </div>

      <div class="card hidden" id="editSection">
        <div class="editor-layout">
          <div class="controls">
            <div class="control-group">
              <label>文字内容</label>
              <textarea id="textContent" placeholder="输入要添加的文字" oninput="updatePreview()">
示例文字</textarea
              >
            </div>

            <div class="control-group">
              <label>字体</label>
              <select id="fontFamily" onchange="updatePreview()">
                <option value="Arial">Arial</option>
                <option value="微软雅黑">微软雅黑</option>
                <option value="宋体">宋体</option>
                <option value="黑体">黑体</option>
                <option value="楷体">楷体</option>
                <option value="Georgia">Georgia</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
              </select>
            </div>

            <div class="row">
              <div class="control-group">
                <label for="input-----">字体大小</label>
                <input
                  type="number"
                  id="fontSize"
                  value="48"
                  min="12"
                  max="200"
                  onchange="updatePreview()"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
              </div>
              <div class="control-group">
                <label for="input-----">字体颜色</label>
                <input
                  type="color"
                  id="fontColor"
                  value="#ffffff"
                  onchange="updatePreview()"
                  aria-label="颜色选择器"
                />
              </div>
            </div>

            <div class="row">
              <div class="control-group">
                <label for="input-----">描边宽度</label>
                <input
                  type="number"
                  id="strokeWidth"
                  value="2"
                  min="0"
                  max="20"
                  onchange="updatePreview()"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
              </div>
              <div class="control-group">
                <label for="input-----">描边颜色</label>
                <input
                  type="color"
                  id="strokeColor"
                  value="#000000"
                  onchange="updatePreview()"
                  aria-label="颜色选择器"
                />
              </div>
            </div>

            <div class="control-group">
              <label for="input----">透明度</label>
              <input
                type="range"
                id="opacity"
                min="0"
                max="100"
                value="100"
                oninput="updatePreview()"
              />
            </div>

            <div class="control-group">
              <label>位置</label>
              <div class="position-grid">
                <button class="pos-btn" data-pos="top-left" onclick="setPosition('top-left')">
                  左上
                </button>
                <button class="pos-btn" data-pos="top-center" onclick="setPosition('top-center')">
                  上中
                </button>
                <button class="pos-btn" data-pos="top-right" onclick="setPosition('top-right')">
                  右上
                </button>
                <button class="pos-btn" data-pos="middle-left" onclick="setPosition('middle-left')">
                  左中
                </button>
                <button
                  class="pos-btn active"
                  data-pos="middle-center"
                  onclick="setPosition('middle-center')"
                >
                  居中
                </button>
                <button
                  class="pos-btn"
                  data-pos="middle-right"
                  onclick="setPosition('middle-right')"
                >
                  右中
                </button>
                <button class="pos-btn" data-pos="bottom-left" onclick="setPosition('bottom-left')">
                  左下
                </button>
                <button
                  class="pos-btn"
                  data-pos="bottom-center"
                  onclick="setPosition('bottom-center')"
                >
                  下中
                </button>
                <button
                  class="pos-btn"
                  data-pos="bottom-right"
                  onclick="setPosition('bottom-right')"
                >
                  右下
                </button>
              </div>
            </div>

            <div class="row">
              <div class="control-group">
                <label for="input-x--">X偏移</label>
                <input
                  type="number"
                  id="offsetX"
                  value="0"
                  onchange="updatePreview()"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
              </div>
              <div class="control-group">
                <label for="input-y--">Y偏移</label>
                <input
                  type="number"
                  id="offsetY"
                  value="0"
                  onchange="updatePreview()"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
              </div>
            </div>

            <button class="btn btn-success" onclick="download()" aria-label="💾 下载图片">
              💾 下载图片
            </button>
          </div>

          <div class="preview-container">
            <canvas id="canvas"></canvas>
          </div>
        </div>
      </div>
    </div>
    <script>
      let originalImage = null;
      let position = "middle-center";
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const dropZone = document.getElementById("dropZone");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFile(e.dataTransfer.files[0]);
      });

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            updatePreview();
            document.getElementById("editSection").classList.remove("hidden");
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      window.setPosition = function (pos) {
        position = pos;
        document.querySelectorAll(".pos-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.pos === pos);
        });
        updatePreview();
      };

      window.updatePreview = function () {
        if (!originalImage) return;

        const text = document.getElementById("textContent").value;
        const fontFamily = document.getElementById("fontFamily").value;
        const fontSize = parseInt(document.getElementById("fontSize").value);
        const fontColor = document.getElementById("fontColor").value;
        const strokeWidth = parseInt(document.getElementById("strokeWidth").value);
        const strokeColor = document.getElementById("strokeColor").value;
        const opacity = parseInt(document.getElementById("opacity").value) / 100;
        const offsetX = parseInt(document.getElementById("offsetX").value) || 0;
        const offsetY = parseInt(document.getElementById("offsetY").value) || 0;

        canvas.width = originalImage.width;
        canvas.height = originalImage.height;

        // Draw image
        ctx.drawImage(originalImage, 0, 0);

        // Setup text style
        ctx.font = `${fontSize}px "${fontFamily}"`;
        ctx.globalAlpha = opacity;

        // Calculate text position
        const lines = text.split("\n");
        const lineHeight = fontSize * 1.2;
        const textHeight = lines.length * lineHeight;

        let maxWidth = 0;
        lines.forEach((line) => {
          const width = ctx.measureText(line).width;
          if (width > maxWidth) maxWidth = width;
        });

        let x, y;
        const padding = 20;

        // Horizontal position
        if (position.includes("left")) {
          x = padding;
          ctx.textAlign = "left";
        } else if (position.includes("right")) {
          x = canvas.width - padding;
          ctx.textAlign = "right";
        } else {
          x = canvas.width / 2;
          ctx.textAlign = "center";
        }

        // Vertical position
        if (position.includes("top")) {
          y = padding + fontSize;
        } else if (position.includes("bottom")) {
          y = canvas.height - padding - textHeight + fontSize;
        } else {
          y = (canvas.height - textHeight) / 2 + fontSize;
        }

        x += offsetX;
        y += offsetY;

        // Draw text
        lines.forEach((line, i) => {
          const ly = y + i * lineHeight;

          if (strokeWidth > 0) {
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.strokeText(line, x, ly);
          }

          ctx.fillStyle = fontColor;
          ctx.fillText(line, x, ly);
        });

        ctx.globalAlpha = 1;
      };

      window.download = function () {
        const link = document.createElement("a");
        link.download = "image_with_text.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

        --pico-form-element-border-color: var(--border-strong, #3a3a4a);

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */

        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */

        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);

        --bg-elevated: #fff;

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        transition: all var(--transition-normal);
      }

      .back-link:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--color-accent-cyan), var(--accent-blue));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
      }

      @media (max-width: 900px) {
        .main-layout {
          grid-template-columns: 1fr;
        }
      }

      /* 控制面板 */
      .control-panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px;
        height: fit-content;
        position: sticky;
        top: 24px;
      }

      .control-section {
        margin-bottom: 20px;
      }

      .control-section:last-child {
        margin-bottom: 0;
      }

      .control-section h3 {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .control-row {
        margin-bottom: 12px;
      }

      .control-row label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: block;
        margin-bottom: 6px;
      }

      input[type="range"] {
        width: 100%;
        height: 6px;
        background: var(--bg-input);
        border-radius: 3px;
        outline: none;
        -webkit-appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--color-accent-cyan);
        border-radius: 50%;
        cursor: pointer;
      }

      input[type="color"] {
        width: 100%;
        height: 36px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--bg-input);
        cursor: pointer;
      }

      select {
        width: 100%;
        padding: 10px 12px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        outline: none;
      }

      select:focus {
        border-color: var(--color-accent-cyan);
      }

      .gradient-presets {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .gradient-btn {
        width: 100%;
        aspect-ratio: 1;
        border: 2px solid transparent;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .gradient-btn:hover {
        transform: scale(1.1);
      }

      .gradient-btn.active {
        border-color: var(--color-accent-cyan);
      }

      /* 预览区域 */
      .preview-panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        display: flex;
        flex-direction: column;
      }

      .preview-toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      button {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 10px 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-normal);
        white-space: nowrap;
      }

      button:hover {
        background: var(--bg-card-hover);
        color: var(--color-text-primary);
        border-color: var(--color-accent-cyan);
      }

      button.primary {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      button.primary:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }

      .preview-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-md);
        position: relative;
        overflow: hidden;
      }

      .preview-container.has-image {
        border-style: solid;
      }

      .drop-hint {
        text-align: center;
        color: var(--text-muted);
      }

      .drop-hint-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .drop-hint-text {
        font-family: var(--font-mono);
        font-size: 0.9rem;
      }

      .drop-hint-sub {
        font-size: 0.8rem;
        margin-top: 8px;
      }

      #canvas-container {
        display: none;
        padding: 40px;
      }

      #preview-canvas {
        max-width: 100%;
        max-height: 600px;
        border-radius: var(--radius-md);
      }

      .preview-container.dragover {
        border-color: var(--color-accent-cyan);
        background: var(--glow-cyan);
      }

      /* 隐藏的文件输入 */
      #file-input {
        display: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        margin-top: 12px;
        display: none;
      }

      .message.success {
        display: block;
        background: var(--glow-green);
        border: 1px solid var(--accent-green);
        color: var(--accent-green);
      }

      .value-display {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--color-accent-cyan);
        float: right;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
  </head>

              <div class="gradient-presets">
                <button
                  class="gradient-btn active"
                  data-gradient="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
                  style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"
                  style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"
                  style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"
                  style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #fa709a 0%, #fee140 100%)"
                  style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)"
                  style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)"
                  style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)"
                ></button>
                <button
                  class="gradient-btn"
                  data-gradient="linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%)"
                  style="background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%)"
                ></button>
              </div>
            </div>
            <div class="control-row">
              <label for="input------">自定义颜色</label>
              <input type="color" id="bg-color" value="#667eea" aria-label="颜色选择器" />
            </div>
          </div>

          <div class="control-section">
            <h3>内边距</h3>
            <div class="control-row">
              <label>
                边距大小
                <span class="value-display" id="padding-value">64px</span>
              </label>
              <input type="range" id="padding" min="16" max="128" value="64" />
            </div>
          </div>

          <div class="control-section">
            <h3>圆角</h3>
            <div class="control-row">
              <label>
                圆角大小
                <span class="value-display" id="radius-value">12px</span>
              </label>
              <input type="range" id="border-radius" min="0" max="32" value="12" />
            </div>
          </div>

          <div class="control-section">
            <h3>阴影</h3>
            <div class="control-row">
              <label>
                阴影强度
                <span class="value-display" id="shadow-value">30%</span>
              </label>
              <input type="range" id="shadow" min="0" max="100" value="30" />
            </div>
          </div>

          <div class="control-section">
            <h3>缩放</h3>
            <div class="control-row">
              <label>
                图片缩放
                <span class="value-display" id="scale-value">100%</span>
              </label>
              <input type="range" id="scale" min="50" max="150" value="100" />
            </div>
          </div>

          <div class="control-section">
            <h3>输出</h3>
            <div class="control-row">
              <label>输出格式</label>
              <select id="output-format">
                <option value="png">PNG (透明背景支持)</option>
                <option value="jpeg">JPEG (更小文件)</option>
                <option value="webp">WebP (现代格式)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-panel">
          <div class="preview-toolbar">
            <button id="upload-btn">📁 上传图片</button>
            <button id="paste-btn">📋 粘贴图片</button>
            <button id="download-btn" class="primary" disabled>💾 下载图片</button>
            <button id="copy-btn" disabled>📄 复制到剪贴板</button>
          </div>

          <div class="preview-container" id="preview-container">
            <div class="drop-hint" id="drop-hint">
              <div class="drop-hint-icon">📷</div>
              <div class="drop-hint-text">拖拽图片到这里，或点击上传</div>
              <div class="drop-hint-sub">支持 PNG、JPG、WebP 格式 | 也可以直接粘贴截图</div>
            </div>
            <div id="canvas-container">
              <canvas id="preview-canvas"></canvas>
            </div>
          </div>

          <div id="message" class="message"></div>
        </div>
      </div>

      <input type="file" id="file-input" accept="image/*" />
    </div>

    <script>
      // 状态
      const state = {
        image: null,
        gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
        bgColor: "#667eea",
        padding: 64,
        borderRadius: 12,
        shadow: 30,
        scale: 100,
        format: "png"
      };

      // DOM 元素
      const fileInput = document.getElementById("file-input");
      const previewContainer = document.getElementById("preview-container");
      const canvasContainer = document.getElementById("canvas-container");
      const dropHint = document.getElementById("drop-hint");
      const canvas = document.getElementById("preview-canvas");
      const ctx = canvas.getContext("2d");
      const messageEl = document.getElementById("message");

      // 控制元素
      const paddingInput = document.getElementById("padding");
      const radiusInput = document.getElementById("border-radius");
      const shadowInput = document.getElementById("shadow");
      const scaleInput = document.getElementById("scale");
      const bgColorInput = document.getElementById("bg-color");
      const formatSelect = document.getElementById("output-format");
      const gradientBtns = document.querySelectorAll(".gradient-btn");

      // 按钮
      const uploadBtn = document.getElementById("upload-btn");
      const pasteBtn = document.getElementById("paste-btn");
      const downloadBtn = document.getElementById("download-btn");
      const copyBtn = document.getElementById("copy-btn");

      // 值显示
      const paddingValue = document.getElementById("padding-value");
      const radiusValue = document.getElementById("radius-value");
      const shadowValue = document.getElementById("shadow-value");
      const scaleValue = document.getElementById("scale-value");

      // 渲染画布
      function render() {
        if (!state.image) return;

        const img = state.image;
        const scale = state.scale / 100;
        const imgWidth = img.width * scale;
        const imgHeight = img.height * scale;
        const padding = state.padding;
        const radius = state.borderRadius;
        const shadowBlur = state.shadow;

        // 设置画布大小
        canvas.width = imgWidth + padding * 2;
        canvas.height = imgHeight + padding * 2;

        // 绘制背景
        if (state.gradient.startsWith("linear-gradient")) {
          // 解析渐变
          const gradientMatch = state.gradient.match(
            /linear-gradient\((\d+)deg,\s*([#\w]+)\s*\d*%?,\s*([#\w]+)\s*\d*%?\)/
          );
          if (gradientMatch) {
            const angle = (parseInt(gradientMatch[1]) * Math.PI) / 180;
            const color1 = gradientMatch[2].trim();
            const color2 = gradientMatch[3].trim();

            const x1 = canvas.width / 2 - Math.cos(angle) * canvas.width;
            const y1 = canvas.height / 2 - Math.sin(angle) * canvas.height;
            const x2 = canvas.width / 2 + Math.cos(angle) * canvas.width;
            const y2 = canvas.height / 2 + Math.sin(angle) * canvas.height;

            const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);
            ctx.fillStyle = gradient;
          }
        } else {
          ctx.fillStyle = state.bgColor;
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 先绘制带阴影的圆角矩形（阴影必须在 clip 之前绘制）
        if (shadowBlur > 0) {
          ctx.save();
          ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
          ctx.shadowBlur = shadowBlur;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = shadowBlur / 3;
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          roundRect(ctx, padding, padding, imgWidth, imgHeight, radius);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        // 绘制圆角矩形裁剪区域
        ctx.save();
        ctx.beginPath();
        roundRect(ctx, padding, padding, imgWidth, imgHeight, radius);
        ctx.closePath();
        ctx.clip();

        // 绘制图片
        ctx.drawImage(img, padding, padding, imgWidth, imgHeight);
        ctx.restore();
      }

      // 绘制圆角矩形
      function roundRect(ctx, x, y, width, height, radius) {
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
      }

      // 加载图片
      window.loadImage = function (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            state.image = img;
            dropHint.style.display = "none";
            canvasContainer.style.display = "block";
            previewContainer.classList.add("has-image");
            downloadBtn.disabled = false;
            copyBtn.disabled = false;
            render();
            showMessage("图片加载成功", "success");
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      // 从剪贴板加载图片
      async function loadFromClipboard() {
        try {
          const items = await navigator.clipboard.read();
          for (const item of items) {
            for (const type of item.types) {
              if (type.startsWith("image/")) {
                const blob = await item.getType(type);
                loadImage(blob);
                return;
              }
            }
          }
          showMessage("剪贴板中没有图片", "error");
        } catch (err) {
          showMessage("无法读取剪贴板: " + err.message, "error");
        }
      }

      // 下载图片
      window.downloadImage = function () {
        if (!state.image) return;

        const format = state.format;
        const mimeType =
          format === "jpeg" ? "image/jpeg" : format === "webp" ? "image/webp" : "image/png";
        const quality = format === "jpeg" ? 0.92 : 1;

        canvas.toBlob(
          (blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `screenshot-beautified.${format}`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage("图片已下载", "success");
          },
          mimeType,
          quality
        );
      };

      // 复制到剪贴板
      window.copyToClipboard = async function () {
        if (!state.image) return;

        try {
          canvas.toBlob(async (blob) => {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            showMessage("已复制到剪贴板", "success");
          }, "image/png");
        } catch (err) {
          showMessage("复制失败: " + err.message, "error");
        }
      };

      // 显示消息
      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + type;
        setTimeout(() => {
          messageEl.className = "message";
        }, 3000);
      }

      // 事件监听
      uploadBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) loadImage(e.target.files[0]);
      });
      pasteBtn.addEventListener("click", loadFromClipboard);
      downloadBtn.addEventListener("click", downloadImage);
      copyBtn.addEventListener("click", copyToClipboard);

      // 拖拽上传
      previewContainer.addEventListener("dragover", (e) => {
        e.preventDefault();
        previewContainer.classList.add("dragover");
      });
      previewContainer.addEventListener("dragleave", () => {
        previewContainer.classList.remove("dragover");
      });
      previewContainer.addEventListener("drop", (e) => {
        e.preventDefault();
        previewContainer.classList.remove("dragover");
        if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
      });

      // 粘贴事件
      document.addEventListener("paste", (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith("image/")) {
            loadImage(item.getAsFile());
            break;
          }
        }
      });

      // 控制面板事件
      paddingInput.addEventListener("input", (e) => {
        state.padding = parseInt(e.target.value);
        paddingValue.textContent = state.padding + "px";
        render();
      });

      radiusInput.addEventListener("input", (e) => {
        state.borderRadius = parseInt(e.target.value);
        radiusValue.textContent = state.borderRadius + "px";
        render();
      });

      shadowInput.addEventListener("input", (e) => {
        state.shadow = parseInt(e.target.value);
        shadowValue.textContent = state.shadow + "%";
        render();
      });

      scaleInput.addEventListener("input", (e) => {
        state.scale = parseInt(e.target.value);
        scaleValue.textContent = state.scale + "%";
        render();
      });

      bgColorInput.addEventListener("input", (e) => {
        state.bgColor = e.target.value;
        state.gradient = "";
        gradientBtns.forEach((btn) => btn.classList.remove("active"));
        render();
      });

      formatSelect.addEventListener("change", (e) => {
        state.format = e.target.value;
      });

      // 渐变预设
      gradientBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          gradientBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          state.gradient = btn.dataset.gradient;
          render();
        });
      });

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

              <p>点击或拖拽图片到此处</p>
              <p style="font-size: 12px; color: var(--color-text-secondary); margin-top: 8px">
                支持 JPG、PNG、WebP 格式
              </p>
              <input type="file" id="fileInput" accept="image/*" />
            </div>
            <div class="canvas-container" id="canvasContainer">
              <canvas id="previewCanvas"></canvas>
            </div>
          </div>
        </div>

        <div class="sidebar">
          <div class="card">
            <div class="tabs">
              <button class="tab-btn active" data-tab="text">文字水印</button>
              <button class="tab-btn" data-tab="image">图片水印</button>
            </div>

            <div class="tab-content active" id="textTab">
              <div class="control-group">
                <label>水印文字</label>
                <textarea id="watermarkText" rows="2" placeholder="请输入水印文字">
© WebUtils</textarea
                >
              </div>
              <div class="control-group">
                <label>字体</label>
                <select id="fontFamily">
                  <option value="Arial">Arial</option>
                  <option value="Helvetica">Helvetica</option>
                  <option value="Georgia">Georgia</option>
                  <option value="Times New Roman">Times New Roman</option>
                  <option value="Courier New">Courier New</option>
                  <option value="Impact">Impact</option>
                  <option value="Comic Sans MS">Comic Sans MS</option>
                </select>
              </div>
              <div class="control-group">
                <label>字体大小</label>
                <div class="range-row">
                  <input type="range" id="fontSize" min="12" max="200" value="48" />
                  <span class="range-value" id="fontSizeValue">48px</span>
                </div>
              </div>
              <div class="control-group">
                <label for="input-----">文字颜色</label>
                <input type="color" id="textColor" value="#ffffff" aria-label="颜色选择器" />
              </div>
              <div class="control-group">
                <label for="input-----">描边颜色</label>
                <input type="color" id="strokeColor" value="#000000" aria-label="颜色选择器" />
              </div>
              <div class="control-group">
                <label>描边宽度</label>
                <div class="range-row">
                  <input type="range" id="strokeWidth" min="0" max="10" value="2" />
                  <span class="range-value" id="strokeWidthValue">2px</span>
                </div>
              </div>
            </div>

            <div class="tab-content" id="imageTab">
              <div class="control-group">
                <label for="input-----">水印图片</label>
                <input type="file" id="watermarkImageInput" accept="image/*" style="padding: 8px" />
                <div class="watermark-image-preview" id="watermarkPreview">
                  <span>未选择图片</span>
                </div>
              </div>
              <div class="control-group">
                <label>水印大小</label>
                <div class="range-row">
                  <input type="range" id="watermarkScale" min="5" max="100" value="20" />
                  <span class="range-value" id="watermarkScaleValue">20%</span>
                </div>
              </div>
            </div>

            <div class="section-title" style="margin-top: 20px">通用设置</div>

            <div class="control-group">
              <label>透明度</label>
              <div class="range-row">
                <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.7" />
                <span class="range-value" id="opacityValue">70%</span>
              </div>
            </div>

            <div class="control-group">
              <label>旋转角度</label>
              <div class="range-row">
                <input type="range" id="rotation" min="-180" max="180" value="0" />
                <span class="range-value" id="rotationValue">0°</span>
              </div>
            </div>

            <div class="control-group">
              <label>位置</label>
              <div class="position-grid">
                <button class="pos-btn" data-pos="nw">↖</button>
                <button class="pos-btn" data-pos="n">↑</button>
                <button class="pos-btn" data-pos="ne">↗</button>
                <button class="pos-btn" data-pos="w">←</button>
                <button class="pos-btn active" data-pos="c">●</button>
                <button class="pos-btn" data-pos="e">→</button>
                <button class="pos-btn" data-pos="sw">↙</button>
                <button class="pos-btn" data-pos="s">↓</button>
                <button class="pos-btn" data-pos="se">↘</button>
              </div>
            </div>

            <div class="control-group">
              <label>
                <input type="checkbox" id="tileMode" />
                平铺水印
              </label>
            </div>

            <button class="btn btn-secondary" id="resetBtn">重新选择图片</button>
            <button class="btn btn-primary" id="downloadBtn" disabled>下载图片</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const uploadArea = document.getElementById("uploadArea");
      const fileInput = document.getElementById("fileInput");
      const canvasContainer = document.getElementById("canvasContainer");
      const canvas = document.getElementById("previewCanvas");
      const ctx = canvas.getContext("2d");

      let originalImage = null;
      let watermarkImage = null;
      let currentTab = "text";
      let position = "c";

      // Upload handlers
      uploadArea.addEventListener("click", () => fileInput.click());
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });
      uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) loadImage(e.target.files[0]);
      });

      window.loadImage = function (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            uploadArea.classList.add("hidden");
            canvasContainer.classList.add("visible");
            document.getElementById("downloadBtn").disabled = false;
            renderCanvas();
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      // Watermark image
      document.getElementById("watermarkImageInput").addEventListener("change", (e) => {
        if (e.target.files[0]) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            watermarkImage = new Image();
            watermarkImage.onload = () => {
              const preview = document.getElementById("watermarkPreview");
              while (preview.firstChild) preview.removeChild(preview.firstChild);
              const img = document.createElement("img");
              img.src = ev.target.result;
              preview.appendChild(img);
              renderCanvas();
            };
            watermarkImage.src = ev.target.result;
          };
          reader.readAsDataURL(e.target.files[0]);
        }
      });

      // Tabs
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.tab + "Tab").classList.add("active");
          currentTab = btn.dataset.tab;
          renderCanvas();
        });
      });

      // Position
      document.querySelectorAll(".pos-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".pos-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          position = btn.dataset.pos;
          renderCanvas();
        });
      });

      // Range inputs
      const ranges = [
        { id: "fontSize", suffix: "px" },
        { id: "strokeWidth", suffix: "px" },
        { id: "opacity", suffix: "%", multiplier: 100 },
        { id: "rotation", suffix: "°" },
        { id: "watermarkScale", suffix: "%" }
      ];

      ranges.forEach(({ id, suffix, multiplier = 1 }) => {
        const input = document.getElementById(id);
        const display = document.getElementById(id + "Value");
        input.addEventListener("input", () => {
          display.textContent = Math.round(input.value * multiplier) + suffix;
          renderCanvas();
        });
      });

      // Other inputs
      ["watermarkText", "fontFamily", "textColor", "strokeColor", "tileMode"].forEach((id) => {
        document.getElementById(id).addEventListener("input", renderCanvas);
        document.getElementById(id).addEventListener("change", renderCanvas);
      });

      function renderCanvas() {
        if (!originalImage) return;

        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        ctx.drawImage(originalImage, 0, 0);

        const opacity = parseFloat(document.getElementById("opacity").value);
        const rotation = parseInt(document.getElementById("rotation").value);
        const isTile = document.getElementById("tileMode").checked;

        ctx.globalAlpha = opacity;

        if (currentTab === "text") {
          renderTextWatermark(rotation, isTile);
        } else {
          renderImageWatermark(rotation, isTile);
        }

        ctx.globalAlpha = 1;
      }

      function renderTextWatermark(rotation, isTile) {
        const text = document.getElementById("watermarkText").value || "Watermark";
        const font = document.getElementById("fontFamily").value;
        const size = parseInt(document.getElementById("fontSize").value);
        const color = document.getElementById("textColor").value;
        const strokeColor = document.getElementById("strokeColor").value;
        const strokeWidth = parseInt(document.getElementById("strokeWidth").value);

        ctx.font = `${size}px ${font}`;
        ctx.fillStyle = color;
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = strokeWidth;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const metrics = ctx.measureText(text);
        const textWidth = metrics.width;
        const textHeight = size;

        if (isTile) {
          const spacing = Math.max(textWidth, textHeight) * 1.5;
          for (let y = -canvas.height; y < canvas.height * 2; y += spacing) {
            for (let x = -canvas.width; x < canvas.width * 2; x += spacing) {
              ctx.save();
              ctx.translate(x, y);
              ctx.rotate((rotation * Math.PI) / 180);
              if (strokeWidth > 0) ctx.strokeText(text, 0, 0);
              ctx.fillText(text, 0, 0);
              ctx.restore();
            }
          }
        } else {
          const pos = getPosition(textWidth, textHeight);
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate((rotation * Math.PI) / 180);
          if (strokeWidth > 0) ctx.strokeText(text, 0, 0);
          ctx.fillText(text, 0, 0);
          ctx.restore();
        }
      }

      function renderImageWatermark(rotation, isTile) {
        if (!watermarkImage) return;

        const scale = parseInt(document.getElementById("watermarkScale").value) / 100;
        const wmWidth = canvas.width * scale;
        const wmHeight = (watermarkImage.height / watermarkImage.width) * wmWidth;

        if (isTile) {
          const spacing = Math.max(wmWidth, wmHeight) * 1.2;
          for (let y = -canvas.height; y < canvas.height * 2; y += spacing) {
            for (let x = -canvas.width; x < canvas.width * 2; x += spacing) {
              ctx.save();
              ctx.translate(x, y);
              ctx.rotate((rotation * Math.PI) / 180);
              ctx.drawImage(watermarkImage, -wmWidth / 2, -wmHeight / 2, wmWidth, wmHeight);
              ctx.restore();
            }
          }
        } else {
          const pos = getPosition(wmWidth, wmHeight);
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate((rotation * Math.PI) / 180);
          ctx.drawImage(watermarkImage, -wmWidth / 2, -wmHeight / 2, wmWidth, wmHeight);
          ctx.restore();
        }
      }

      function getPosition(width, height) {
        const padding = 20;
        const positions = {
          nw: { x: padding + width / 2, y: padding + height / 2 },
          n: { x: canvas.width / 2, y: padding + height / 2 },
          ne: { x: canvas.width - padding - width / 2, y: padding + height / 2 },
          w: { x: padding + width / 2, y: canvas.height / 2 },
          c: { x: canvas.width / 2, y: canvas.height / 2 },
          e: { x: canvas.width - padding - width / 2, y: canvas.height / 2 },
          sw: { x: padding + width / 2, y: canvas.height - padding - height / 2 },
          s: { x: canvas.width / 2, y: canvas.height - padding - height / 2 },
          se: { x: canvas.width - padding - width / 2, y: canvas.height - padding - height / 2 }
        };
        return positions[position];
      }

      // Reset
      document.getElementById("resetBtn").addEventListener("click", () => {
        originalImage = null;
        uploadArea.classList.remove("hidden");
        canvasContainer.classList.remove("visible");
        document.getElementById("downloadBtn").disabled = true;
        fileInput.value = "";
      });

      // Download
      document.getElementById("downloadBtn").addEventListener("click", () => {
        if (!originalImage) return;

        const link = document.createElement("a");
        link.download = "watermarked_image.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      图片圆角
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>
      </div>
      <h1>⭕ 图片圆角</h1>
      <p>为图片添加圆角效果</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
          <div style="font-size: 3rem">🖼️</div>
          <p>点击选择图片或拖放图片到此处</p>
        </div>
      </div>

      <div class="card hidden" id="editSection">
        <h3 style="margin-bottom: 1rem">预设圆角</h3>
        <div class="presets">
          <button class="preset-btn" onclick="setRadius(0)" aria-label="无圆角">无圆角</button>
          <button class="preset-btn" onclick="setRadius(10)" aria-label="小圆角">小圆角</button>
          <button class="preset-btn active" onclick="setRadius(30)" aria-label="中圆角">
            中圆角
          </button>
          <button class="preset-btn" onclick="setRadius(50)" aria-label="大圆角">大圆角</button>
          <button class="preset-btn" onclick="setRadius(100)" aria-label="超大圆角">
            超大圆角
          </button>
          <button class="preset-btn" onclick="setCircle()" aria-label="圆形">圆形</button>
        </div>

        <div class="controls">
          <div class="control-group">
            <label>圆角大小 (px)</label>
            <div class="slider-row">
              <input
                type="range"
                id="radius"
                min="0"
                max="500"
                value="30"
                oninput="updatePreview()"
              />
              <span class="value" id="radiusValue">30px</span>
            </div>
          </div>
          <div class="control-group">
            <label for="input-----">背景颜色</label>
            <input
              type="color"
              id="bgColor"
              value="#ffffff"
              onchange="updatePreview()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label style="display: flex; align-items: center; gap: 0.5rem">
              <input type="checkbox" id="transparent" checked onchange="updatePreview()" />
              透明背景 (PNG)
            </label>
          </div>
        </div>

        <div class="preview-container checkerboard">
          <canvas id="canvas"></canvas>
        </div>

        <div class="btn-group">
          <button class="btn btn-success" onclick="download()" aria-label="💾 下载图片">
            💾 下载图片
          </button>
        </div>
      </div>
    </div>
    <script>
      let originalImage = null;
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const dropZone = document.getElementById("dropZone");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFile(e.dataTransfer.files[0]);
      });

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            document.getElementById("radius").max =
              Math.min(originalImage.width, originalImage.height) / 2;
            updatePreview();
            document.getElementById("editSection").classList.remove("hidden");
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      window.setRadius = function (r) {
        document.getElementById("radius").value = r;
        document.querySelectorAll(".preset-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");
        updatePreview();
      };

      window.setCircle = function () {
        const r = Math.min(originalImage.width, originalImage.height) / 2;
        document.getElementById("radius").value = r;
        document.querySelectorAll(".preset-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");
        updatePreview();
      };

      window.updatePreview = function () {
        if (!originalImage) return;

        const radius = parseInt(document.getElementById("radius").value);
        const transparent = document.getElementById("transparent").checked;
        const bgColor = document.getElementById("bgColor").value;

        document.getElementById("radiusValue").textContent = radius + "px";

        canvas.width = originalImage.width;
        canvas.height = originalImage.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!transparent) {
          ctx.fillStyle = bgColor;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw rounded rectangle path
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(canvas.width - radius, 0);
        ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
        ctx.lineTo(canvas.width, canvas.height - radius);
        ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
        ctx.lineTo(radius, canvas.height);
        ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();

        ctx.clip();
        ctx.drawImage(originalImage, 0, 0);
      };

      window.download = function () {
        const transparent = document.getElementById("transparent").checked;
        const link = document.createElement("a");
        link.download = "rounded_image.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

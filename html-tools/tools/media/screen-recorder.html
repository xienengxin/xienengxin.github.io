      }

        height: 100%;
        object-fit: contain;
      }
      .preview-placeholder {
        color: #666;
        text-align: center;
      }
      .preview-placeholder .icon {
        font-size: 4rem;

      }
      .recording-indicator {
        position: absolute;
        top: 1rem;
        left: 1rem;
        align-items: center;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.7);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        color: white;
        font-size: 0.9rem;
        display: none;
      }
      .recording-indicator .dot {
        width: 12px;
        height: 12px;
        background: #ef4444;
        border-radius: 50%;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .timer {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: rgba(0, 0, 0, 0.7);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        color: white;
        font-family: "SF Mono", Monaco, monospace;
        font-size: 1.1rem;
        display: none;
      }
      .controls {

        flex-wrap: wrap;
        margin-bottom: 1.5rem;

      .controls button {
        min-width: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;

      .controls button.record {

      }
      .controls button.stop {

      .options-section {

        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

      }
      .option-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;

      }
      .option-group select,

      }
      .checkbox-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .checkbox-option input {
        margin: 0;
      }
      .recordings-section {
        background: var(--card-background-color);
        border-radius: 12px;
        padding: 1.5rem;
      }
      .recordings-section h3 {
        margin: 0 0 1rem;

        justify-content: space-between;

      .recordings-list {

        flex-direction: column;
        gap: 0.75rem;
      }
      .recording-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: var(--code-background-color);
        border-radius: 8px;
      }
      .recording-item .thumbnail {
        width: 120px;
        height: 68px;
        background: #000;
        border-radius: 6px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .recording-item .thumbnail video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .recording-item .info {
        flex: 1;
        min-width: 0;
      }
      .recording-item .name {
        font-weight: 600;
        margin-bottom: 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .recording-item .meta {
        font-size: 0.8rem;
        color: var(--muted-color);
      }
      .recording-item .actions {
        display: flex;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .recording-item .actions button {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      .empty-state {
        text-align: center;
        padding: 2rem;
        color: var(--muted-color);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        background: #10b981;
        color: white;
        border-radius: 8px;
        font-weight: 500;
        z-index: 1000;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      <span>›</span>
      屏幕录制器
    </nav>
    <div class="container">
      <header>
        <h1>🎬 屏幕录制</h1>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
      </header>

      <div class="support-warning" id="supportWarning">
        <strong>⚠️ 浏览器支持：</strong>
        您的浏览器可能不完全支持屏幕录制功能。建议使用最新版本的 Chrome、Edge 或 Firefox。
      </div>

      <div class="preview-container">
        <video id="preview" autoplay muted playsinline></video>
        <div class="preview-placeholder" id="placeholder">
          <div class="icon">🖥️</div>
          <p>点击"开始录制"选择要录制的屏幕或窗口</p>
        </div>
        <div class="recording-indicator" id="recordingIndicator">
          <span class="dot"></span>
          <span>正在录制</span>
        </div>
        <div class="timer" id="timer">00:00:00</div>
      </div>

      <div class="controls">
        <button class="record" id="startBtn" onclick="startRecording()">
          <span>⏺</span>
          开始录制
        </button>
        <button class="stop secondary" id="stopBtn" onclick="stopRecording()" disabled>
          <span>⏹</span>
          停止录制
        </button>
        <button class="secondary" id="pauseBtn" onclick="togglePause()" disabled>
          <span>⏸</span>
          暂停
        </button>
      </div>

      <div class="options-section">
        <h3>录制选项</h3>
        <div class="options-grid">
          <div class="option-group">
            <label>视频质量</label>
            <select id="quality">
              <option value="high">高质量 (1080p)</option>
              <option value="medium" selected>中等质量 (720p)</option>
              <option value="low">低质量 (480p)</option>
            </select>
          </div>
          <div class="option-group">
            <label>帧率</label>
            <select id="framerate">
              <option value="60">60 fps</option>
              <option value="30" selected>30 fps</option>
              <option value="24">24 fps</option>
              <option value="15">15 fps</option>
            </select>
          </div>
          <div class="option-group">
            <label>输出格式</label>
            <select id="format">
              <option value="webm" selected>WebM</option>
              <option value="mp4">MP4 (如支持)</option>
            </select>
          </div>
          <div class="option-group checkbox-option">
            <input type="checkbox" id="includeAudio" checked />
            <label for="includeAudio">录制系统音频</label>
          </div>
          <div class="option-group checkbox-option">
            <input type="checkbox" id="includeMic" />
            <label for="includeMic">录制麦克风</label>
          </div>
          <div class="option-group checkbox-option">
            <input type="checkbox" id="showCursor" checked />
            <label for="showCursor">显示鼠标光标</label>
          </div>
        </div>
      </div>

      <div class="recordings-section">
        <h3>
          录制列表
          <button
            class="secondary outline"
            onclick="clearRecordings()"
            style="font-size: 0.8rem; padding: 0.3rem 0.6rem"
          >
            清空
          </button>
        </h3>
        <div class="recordings-list" id="recordingsList">
          <div class="empty-state">暂无录制</div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let mediaRecorder = null;
      let recordedChunks = [];
      let stream = null;
      let timerInterval = null;
      let startTime = null;
      let pausedTime = 0;
      let isPaused = false;
      let recordings = [];

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      (function () {
        const savedTheme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", savedTheme);

        // Check browser support
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
          document.getElementById("supportWarning").style.display = "block";
        }
      })();

      window.startRecording = async function () {
        try {
          const quality = document.getElementById("quality").value;
          const framerate = parseInt(document.getElementById("framerate").value);
          const includeAudio = document.getElementById("includeAudio").checked;
          const includeMic = document.getElementById("includeMic").checked;
          const showCursor = document.getElementById("showCursor").checked;

          const videoConstraints = {
            high: { width: 1920, height: 1080 },
            medium: { width: 1280, height: 720 },
            low: { width: 854, height: 480 }
          };

          // Get display media
          const displayStream = await navigator.mediaDevices.getDisplayMedia({
            video: {
              ...videoConstraints[quality],
              frameRate: framerate,
              cursor: showCursor ? "always" : "never"
            },
            audio: includeAudio
          });

          stream = displayStream;

          // Add microphone if requested
          if (includeMic) {
            try {
              const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
              micStream.getAudioTracks().forEach((track) => {
                stream.addTrack(track);
              });
            } catch (e) {
              console.warn("Could not get microphone:", e);
            }
          }

          // Show preview
          const preview = document.getElementById("preview");
          preview.srcObject = stream;
          document.getElementById("placeholder").style.display = "none";

          // Setup recorder
          const format = document.getElementById("format").value;
          const mimeType =
            format === "mp4" && MediaRecorder.isTypeSupported("video/mp4")
              ? "video/mp4"
              : "video/webm;codecs=vp9";

          recordedChunks = [];
          mediaRecorder = new MediaRecorder(stream, { mimeType });

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
              recordedChunks.push(e.data);
            }
          };

          mediaRecorder.onstop = () => {
            saveRecording();
          };

          mediaRecorder.start(1000); // Collect data every second

          // Update UI
          document.getElementById("startBtn").disabled = true;
          document.getElementById("stopBtn").disabled = false;
          document.getElementById("pauseBtn").disabled = false;
          document.getElementById("recordingIndicator").style.display = "flex";
          document.getElementById("timer").style.display = "block";

          // Start timer
          startTime = Date.now();
          pausedTime = 0;
          timerInterval = setInterval(updateTimer, 1000);

          // Handle stream end
          stream.getVideoTracks()[0].onended = () => {
            stopRecording();
          };

          showToast("开始录制");
        } catch (err) {
          console.error("Error starting recording:", err);
          showToast("无法开始录制: " + err.message, "error");
        }
      };

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }

        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
        }

        clearInterval(timerInterval);

        // Update UI
        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("pauseBtn").innerHTML = "<span>⏸</span> 暂停";
        document.getElementById("recordingIndicator").style.display = "none";
        document.getElementById("timer").style.display = "none";
        document.getElementById("placeholder").style.display = "block";
        document.getElementById("preview").srcObject = null;

        isPaused = false;
      }

      window.togglePause = function () {
        if (!mediaRecorder) return;

        if (isPaused) {
          mediaRecorder.resume();
          startTime = Date.now() - pausedTime;
          timerInterval = setInterval(updateTimer, 1000);
          document.getElementById("pauseBtn").innerHTML = "<span>⏸</span> 暂停";
          document.getElementById("recordingIndicator").style.display = "flex";
        } else {
          mediaRecorder.pause();
          pausedTime = Date.now() - startTime;
          clearInterval(timerInterval);
          document.getElementById("pauseBtn").innerHTML = "<span>▶</span> 继续";
          document.getElementById("recordingIndicator").style.display = "none";
        }
        isPaused = !isPaused;
      };

      function updateTimer() {
        const elapsed = Date.now() - startTime;
        const seconds = Math.floor(elapsed / 1000) % 60;
        const minutes = Math.floor(elapsed / 60000) % 60;
        const hours = Math.floor(elapsed / 3600000);

        document.getElementById("timer").textContent =
          `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
      }

      function saveRecording() {
        if (recordedChunks.length === 0) return;

        const format = document.getElementById("format").value;
        const mimeType = format === "mp4" ? "video/mp4" : "video/webm";
        const blob = new Blob(recordedChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);

        const recording = {
          id: Date.now(),
          name: `录制_${new Date().toLocaleString("zh-CN").replace(/[/:]/g, "-")}`,
          url: url,
          blob: blob,
          size: blob.size,
          format: format,
          duration: document.getElementById("timer").textContent,
          date: new Date().toLocaleString("zh-CN")
        };

        recordings.unshift(recording);
        renderRecordings();
        showToast("录制已保存");
      }

      function renderRecordings() {
        const list = document.getElementById("recordingsList");

        if (recordings.length === 0) {
          list.innerHTML = '<div class="empty-state">暂无录制</div>';
          return;
        }

        list.innerHTML = recordings
          .map(
            (rec) => `
                <div class="recording-item">
                    <div class="thumbnail">
                        <video src="${rec.url}" muted></video>
                    </div>
                    <div class="info">
                        <div class="name">${rec.name}</div>
                        <div class="meta">${rec.duration} · ${formatSize(rec.size)} · ${rec.format.toUpperCase()}</div>
                    </div>
                    <div class="actions">
                        <button onclick="playRecording('${rec.id}')" class="secondary outline">播放</button>
                        <button onclick="downloadRecording('${rec.id}')">下载</button>
                        <button onclick="deleteRecording('${rec.id}')" class="secondary outline">删除</button>
                    </div>
                </div>
            `
          )
          .join("");
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1024 / 1024).toFixed(1) + " MB";
      }

      window.playRecording = function (id) {
        const rec = recordings.find((r) => r.id == id);
        if (rec) {
          const preview = document.getElementById("preview");
          preview.srcObject = null;
          preview.src = rec.url;
          preview.muted = false;
          preview.controls = true;
          preview.play();
          document.getElementById("placeholder").style.display = "none";
        }
      };

      window.downloadRecording = function (id) {
        const rec = recordings.find((r) => r.id == id);
        if (rec) {
          const a = document.createElement("a");
          a.href = rec.url;
          a.download = `${rec.name}.${rec.format}`;
          a.click();
        }
      };

      window.deleteRecording = function (id) {
        const index = recordings.findIndex((r) => r.id == id);
        if (index !== -1) {
          URL.revokeObjectURL(recordings[index].url);
          recordings.splice(index, 1);
          renderRecordings();
          showToast("已删除");
        }
      };

      window.clearRecordings = function () {
        recordings.forEach((rec) => URL.revokeObjectURL(rec.url));
        recordings = [];
        renderRecordings();
        showToast("已清空");
      };

      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.background = type === "error" ? "#ef4444" : "#10b981";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }
    </script>
  </body>
</html>

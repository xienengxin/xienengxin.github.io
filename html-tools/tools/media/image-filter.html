  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>

      图片滤镜
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>
      </div>
      <h1>🎨 图片滤镜</h1>
      <p>为图片添加各种滤镜效果</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
          <div style="font-size: 3rem">🖼️</div>
          <p>点击选择图片或拖放图片到此处</p>
        </div>
      </div>

      <div class="card hidden" id="editSection">
        <h3 style="margin-bottom: 1rem">预设滤镜</h3>
        <div class="filters">
          <button class="filter-btn active" data-filter="none">原图</button>
          <button class="filter-btn" data-filter="grayscale">黑白</button>
          <button class="filter-btn" data-filter="sepia">复古</button>
          <button class="filter-btn" data-filter="warm">暖色</button>
          <button class="filter-btn" data-filter="cold">冷色</button>
          <button class="filter-btn" data-filter="vintage">怀旧</button>
          <button class="filter-btn" data-filter="dramatic">戏剧</button>
          <button class="filter-btn" data-filter="fade">褪色</button>
          <button class="filter-btn" data-filter="vivid">鲜艳</button>
          <button class="filter-btn" data-filter="invert">反转</button>
        </div>

        <h3 style="margin-bottom: 1rem">自定义调整</h3>
        <div class="controls">
          <div class="control-group">
            <label>亮度</label>
            <div class="slider-row">
              <input
                type="range"
                id="brightness"
                min="0"
                max="200"
                value="100"
                oninput="applyFilter()"
              />
              <span class="value" id="brightnessValue">100%</span>
            </div>
          </div>
          <div class="control-group">
            <label>对比度</label>
            <div class="slider-row">
              <input
                type="range"
                id="contrast"
                min="0"
                max="200"
                value="100"
                oninput="applyFilter()"
              />
              <span class="value" id="contrastValue">100%</span>
            </div>
          </div>
          <div class="control-group">
            <label>饱和度</label>
            <div class="slider-row">
              <input
                type="range"
                id="saturate"
                min="0"
                max="200"
                value="100"
                oninput="applyFilter()"
              />
              <span class="value" id="saturateValue">100%</span>
            </div>
          </div>
          <div class="control-group">
            <label>色相旋转</label>
            <div class="slider-row">
              <input type="range" id="hue" min="0" max="360" value="0" oninput="applyFilter()" />
              <span class="value" id="hueValue">0°</span>
            </div>
          </div>
          <div class="control-group">
            <label>模糊</label>
            <div class="slider-row">
              <input type="range" id="blur" min="0" max="20" value="0" oninput="applyFilter()" />
              <span class="value" id="blurValue">0px</span>
            </div>
          </div>
          <div class="control-group">
            <label>透明度</label>
            <div class="slider-row">
              <input
                type="range"
                id="opacity"
                min="0"
                max="100"
                value="100"
                oninput="applyFilter()"
              />
              <span class="value" id="opacityValue">100%</span>
            </div>
          </div>
        </div>

        <div class="preview-container">
          <canvas id="canvas"></canvas>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="resetFilters()" aria-label="🔄 重置">
            🔄 重置
          </button>
          <button class="btn btn-success" onclick="download()" aria-label="💾 下载图片">
            💾 下载图片
          </button>
        </div>
      </div>
    </div>
    <script>
      let originalImage = null;
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const dropZone = document.getElementById("dropZone");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFile(e.dataTransfer.files[0]);
      });

      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          applyPreset(btn.dataset.filter);
        });
      });

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            applyFilter();
            document.getElementById("editSection").classList.remove("hidden");
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      const presets = {
        none: { brightness: 100, contrast: 100, saturate: 100, hue: 0, blur: 0, opacity: 100 },
        grayscale: { brightness: 100, contrast: 100, saturate: 0, hue: 0, blur: 0, opacity: 100 },
        sepia: { brightness: 100, contrast: 90, saturate: 50, hue: 30, blur: 0, opacity: 100 },
        warm: { brightness: 105, contrast: 105, saturate: 110, hue: 10, blur: 0, opacity: 100 },
        cold: { brightness: 100, contrast: 105, saturate: 90, hue: 200, blur: 0, opacity: 100 },
        vintage: { brightness: 110, contrast: 85, saturate: 70, hue: 20, blur: 0, opacity: 95 },
        dramatic: { brightness: 90, contrast: 150, saturate: 120, hue: 0, blur: 0, opacity: 100 },
        fade: { brightness: 110, contrast: 80, saturate: 80, hue: 0, blur: 0, opacity: 90 },
        vivid: { brightness: 105, contrast: 120, saturate: 150, hue: 0, blur: 0, opacity: 100 },
        invert: { brightness: 100, contrast: 100, saturate: 100, hue: 180, blur: 0, opacity: 100 }
      };

      window.applyPreset = function (name) {
        const p = presets[name];
        document.getElementById("brightness").value = p.brightness;
        document.getElementById("contrast").value = p.contrast;
        document.getElementById("saturate").value = p.saturate;
        document.getElementById("hue").value = p.hue;
        document.getElementById("blur").value = p.blur;
        document.getElementById("opacity").value = p.opacity;
        applyFilter();
      };

      function applyFilter() {
        if (!originalImage) return;

        const brightness = document.getElementById("brightness").value;
        const contrast = document.getElementById("contrast").value;
        const saturate = document.getElementById("saturate").value;
        const hue = document.getElementById("hue").value;
        const blur = document.getElementById("blur").value;
        const opacity = document.getElementById("opacity").value;

        document.getElementById("brightnessValue").textContent = brightness + "%";
        document.getElementById("contrastValue").textContent = contrast + "%";
        document.getElementById("saturateValue").textContent = saturate + "%";
        document.getElementById("hueValue").textContent = hue + "°";
        document.getElementById("blurValue").textContent = blur + "px";
        document.getElementById("opacityValue").textContent = opacity + "%";

        ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%) hue-rotate(${hue}deg) blur(${blur}px) opacity(${opacity}%)`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImage, 0, 0);
      }

      window.resetFilters = function () {
        applyPreset("none");
        document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
        document.querySelector('[data-filter="none"]').classList.add("active");
      };

      window.download = function () {
        const link = document.createElement("a");
        link.download = "filtered_image.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

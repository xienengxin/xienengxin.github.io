    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>
      </div>
      <h1>🔲 图片分割</h1>
      <p>将图片分割成九宫格或自定义网格</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
          <div style="font-size: 3rem">🖼️</div>
          <p>点击选择图片或拖放图片到此处</p>
        </div>
      </div>

      <div class="card hidden" id="editSection">
        <h3 style="margin-bottom: 1rem">选择分割方式</h3>
        <div class="grid-options">
          <button
            class="grid-btn"
            data-cols="2"
            data-rows="2"
            onclick="setGrid(2, 2)"
            aria-label="2×2"
          >
            2×2
          </button>
          <button class="grid-btn active" data-cols="3" data-rows="3" onclick="setGrid(3, 3)">
            3×3 九宫格
          </button>
          <button
            class="grid-btn"
            data-cols="4"
            data-rows="4"
            onclick="setGrid(4, 4)"
            aria-label="4×4"
          >
            4×4
          </button>
          <button
            class="grid-btn"
            data-cols="2"
            data-rows="3"
            onclick="setGrid(2, 3)"
            aria-label="2×3"
          >
            2×3
          </button>
          <button
            class="grid-btn"
            data-cols="3"
            data-rows="2"
            onclick="setGrid(3, 2)"
            aria-label="3×2"
          >
            3×2
          </button>
          <button
            class="grid-btn"
            data-cols="1"
            data-rows="3"
            onclick="setGrid(1, 3)"
            aria-label="1×3"
          >
            1×3
          </button>
          <button
            class="grid-btn"
            data-cols="3"
            data-rows="1"
            onclick="setGrid(3, 1)"
            aria-label="3×1"
          >
            3×1
          </button>
        </div>

        <div class="preview-container">
          <div class="preview-wrapper">
            <img id="preview" alt="Preview" />
            <div class="grid-overlay" id="gridOverlay"></div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="splitImage()" aria-label="✂️ 分割图片">
            ✂️ 分割图片
          </button>
        </div>
      </div>

      <div class="card hidden" id="resultSection">
        <h3 style="margin-bottom: 1rem">分割结果</h3>
        <div class="result-grid" id="resultGrid"></div>
        <div class="btn-group">
          <button class="btn btn-success" onclick="downloadAll()" aria-label="💾 下载全部">
            💾 下载全部
          </button>
        </div>
      </div>
    </div>
    <script>
      let originalImage = null;
      let cols = 3,
        rows = 3;
      let splitImages = [];

      const dropZone = document.getElementById("dropZone");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFile(e.dataTransfer.files[0]);
      });

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            document.getElementById("preview").src = originalImage.src;
            document.getElementById("editSection").classList.remove("hidden");
            document.getElementById("resultSection").classList.add("hidden");
            updateGridOverlay();
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      window.setGrid = function (c, r) {
        cols = c;
        rows = r;
        document.querySelectorAll(".grid-btn").forEach((btn) => {
          btn.classList.toggle(
            "active",
            parseInt(btn.dataset.cols) === c && parseInt(btn.dataset.rows) === r
          );
        });
        updateGridOverlay();
      };

      function updateGridOverlay() {
        const overlay = document.getElementById("gridOverlay");
        overlay.innerHTML = "";

        // Horizontal lines
        for (let i = 1; i < rows; i++) {
          const line = document.createElement("div");
          line.className = "grid-line horizontal";
          line.style.top = (i * 100) / rows + "%";
          overlay.appendChild(line);
        }

        // Vertical lines
        for (let i = 1; i < cols; i++) {
          const line = document.createElement("div");
          line.className = "grid-line vertical";
          line.style.left = (i * 100) / cols + "%";
          overlay.appendChild(line);
        }
      }

      window.splitImage = function () {
        if (!originalImage) return;

        splitImages = [];
        const pieceWidth = originalImage.width / cols;
        const pieceHeight = originalImage.height / rows;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const canvas = document.createElement("canvas");
            canvas.width = pieceWidth;
            canvas.height = pieceHeight;
            const ctx = canvas.getContext("2d");

            ctx.drawImage(
              originalImage,
              c * pieceWidth,
              r * pieceHeight,
              pieceWidth,
              pieceHeight,
              0,
              0,
              pieceWidth,
              pieceHeight
            );

            splitImages.push({
              dataUrl: canvas.toDataURL("image/png"),
              index: r * cols + c + 1
            });
          }
        }

        displayResults();
      };

      function displayResults() {
        const grid = document.getElementById("resultGrid");
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        grid.innerHTML = splitImages
          .map(
            (item) => `
                <div class="result-item">
                    <img src="${item.dataUrl}" alt="Piece ${item.index}">
                    <div class="info">第 ${item.index} 块</div>
                </div>
            `
          )
          .join("");

        document.getElementById("resultSection").classList.remove("hidden");
      }

      window.downloadAll = function () {
        splitImages.forEach((item, i) => {
          setTimeout(() => {
            const link = document.createElement("a");
            link.download = `split_${item.index}.png`;
            link.href = item.dataUrl;
            link.click();
          }, i * 200);
        });
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

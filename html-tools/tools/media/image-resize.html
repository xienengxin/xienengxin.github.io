    <style>
      /* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Upload Zone
         ============================================ */
      .upload-zone {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 2px dashed var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-8);
        text-align: center;
        cursor: pointer;
        transition: all var(--transition-normal);
        margin-bottom: var(--space-6);
        box-shadow: var(--shadow-md);
      }

      .upload-zone:hover {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.05);
      }

      .upload-zone.dragover {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.1);
      }

      .upload-icon {
        font-size: 2.5rem;
        margin-bottom: var(--space-4);
        display: block;
      }

      .upload-text {
        font-size: 1rem;
        margin-bottom: var(--space-1);
        font-weight: 500;
        color: var(--color-text-primary);
      }

      .upload-hint {
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      input[type="file"] {
        display: none;
      }

      /* ============================================
         Form Elements
         ============================================ */
      .control-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }

      .control-group label {
        display: block;
        font-weight: 500;
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      .control-row {
        display: flex;
        gap: var(--space-3);
        flex-wrap: wrap;
        align-items: flex-end;
      }

      input[type="number"],
      input[type="range"],
      select {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }

      input[type="number"],
      select {
        width: auto;
        min-width: 120px;
      }

      input[type="number"]:focus,
      input[type="range"]:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      .quality-value {
        display: inline-block;
        background: rgba(0, 212, 170, 0.2);
        padding: var(--space-1) var(--space-3);
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        color: var(--color-accent-primary);
        min-width: 50px;
        text-align: center;
        font-family: var(--font-mono);
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }

      .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .checkbox-group label {
        margin: 0;
        cursor: pointer;
      }

      .format-options {
        display: flex;
        gap: var(--space-2);
        flex-wrap: wrap;
      }

      .format-btn {
        padding: var(--space-2) var(--space-4);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-size: 0.875rem;
        font-weight: 500;
      }

      .format-btn:hover {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.1);
      }

      .format-btn.active {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.2);
        color: var(--color-accent-primary);
      }

      /* ============================================
         Buttons
         ============================================ */
      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      button.success {
        background: var(--color-success);
        border-color: var(--color-success);
        color: #fff;
        font-weight: 600;
      }

      button.success:hover {
        background: #16a34a;
        border-color: #16a34a;
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
      }

      /* ============================================
         Stats and Comparison
         ============================================ */
      .comparison {
        display: none;
        margin-top: var(--space-6);
      }

      .comparison.show {
        display: block;
      }

      .stats-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-6);
      }

      .stat-card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
        text-align: center;
        box-shadow: var(--shadow-md);
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: var(--space-2);
        font-family: var(--font-mono);
      }

      .stat-value.positive {
        color: var(--color-success);
      }

      .stat-value.negative {
        color: var(--color-error);
      }

      .stat-label {
        font-size: 0.875rem;
        color: var(--text-muted);
        font-weight: 500;
      }

      /* ============================================
         Preview Grid
         ============================================ */
      .preview-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-6);
      }

      @media (max-width: 768px) {
        .preview-grid {
          grid-template-columns: 1fr;
        }
      }

      .preview-card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
      }

      .preview-header {
        padding: var(--space-5);
        background: var(--color-bg-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-3);
        flex-wrap: wrap;
      }

      .preview-title {
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--color-text-primary);
      }

      .preview-badge {
        padding: var(--space-1) var(--space-3);
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .badge-original {
        background: rgba(59, 130, 246, 0.2);
        color: var(--color-accent-tertiary);
      }

      .badge-compressed {
        background: rgba(34, 197, 94, 0.2);
        color: var(--color-success);
      }

      .preview-info {
        font-size: 0.875rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .preview-image {
        padding: var(--space-6);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 300px;
        background: var(--color-bg-input);
        flex: 1;
      }

      .preview-image img {
        max-width: 100%;
        max-height: 400px;
        border-radius: var(--radius-md);
      }

      .preview-actions {
        padding: var(--space-5);
        display: flex;
        gap: var(--space-3);
        justify-content: center;
        background: var(--color-bg-subtle);
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .upload-zone {
          padding: var(--space-5);
        }

        .control-row {
          flex-direction: column;
        }

        input[type="number"],
        select {
          width: 100%;
        }

        .stats-bar {
          grid-template-columns: repeat(2, 1fr);
        }

        .preview-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .preview-actions {
          flex-direction: column;
        }

        .preview-actions button {
          width: 100%;
        }
      }

      /* Desktop */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }

      #outputCanvas {
        display: none;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>

        <h1 class="nav-title">图片压缩对比</h1>

        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <!-- Upload Zone -->
        <div
          class="upload-zone"
          id="uploadZone"
          onclick="document.getElementById('fileInput').click()"
        >
          <span class="upload-icon">📷</span>
          <div class="upload-text">点击或拖放图片到此处</div>
          <div class="upload-hint">支持 PNG、JPG、WebP 格式，最大 50MB</div>
          <input type="file" id="fileInput" accept="image/*" />
        </div>

        <!-- Controls Card -->
        <div class="card">
          <h2 class="card-title">压缩设置</h2>
          <div class="control-group">
            <label>输出格式</label>
            <div class="format-options">
              <button class="format-btn active" data-format="jpeg">JPEG</button>
              <button class="format-btn" data-format="png">PNG</button>
              <button class="format-btn" data-format="webp">WebP</button>
            </div>
          </div>

          <div class="control-group">
            <label>
              压缩质量:
              <span class="quality-value" id="qualityValue">80%</span>
            </label>
            <input type="range" id="quality" min="1" max="100" value="80" />
          </div>

          <div class="control-row">
            <div class="control-group" style="flex: 1; min-width: 150px">
              <label for="input-------px-">最大宽度 (px)</label>
              <input
                type="number"
                id="maxWidth"
                value="1920"
                min="1"
                max="8192"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="control-group" style="flex: 1; min-width: 150px">
              <label for="input-------px-">最大高度 (px)</label>
              <input
                type="number"
                id="maxHeight"
                value="1080"
                min="1"
                max="8192"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>

          <div class="checkbox-group" style="margin-bottom: var(--space-5)">
            <input type="checkbox" id="keepRatio" checked />
            <label for="keepRatio">保持宽高比</label>
          </div>

          <button
            class="primary"
            onclick="processImage()"
            style="width: 100%"
            aria-label="压缩图片"
          >
            压缩图片
          </button>
        </div>

        <!-- Comparison Results -->
        <div class="comparison" id="comparison">
          <!-- Stats Bar -->
          <div class="stats-bar">
            <div class="stat-card">
              <div class="stat-value" id="originalSizeStat">-</div>
              <div class="stat-label">原始大小</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="compressedSizeStat">-</div>
              <div class="stat-label">压缩后大小</div>
            </div>
            <div class="stat-card">
              <div class="stat-value positive" id="savedStat">-</div>
              <div class="stat-label">节省空间</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="ratioStat">-</div>
              <div class="stat-label">压缩比</div>
            </div>
          </div>

          <!-- Preview Grid -->
          <div class="preview-grid">
            <!-- Original Preview -->
            <div class="preview-card">
              <div class="preview-header">
                <span class="preview-title">
                  原始图片
                  <span class="preview-badge badge-original">ORIGINAL</span>
                </span>
                <span class="preview-info" id="originalInfo">-</span>
              </div>
              <div class="preview-image">
                <img id="originalPreview" alt="原始图片" />
              </div>
            </div>

            <!-- Compressed Preview -->
            <div class="preview-card">
              <div class="preview-header">
                <span class="preview-title">
                  压缩后
                  <span class="preview-badge badge-compressed">COMPRESSED</span>
                </span>
                <span class="preview-info" id="compressedInfo">-</span>
              </div>
              <div class="preview-image">
                <img id="compressedPreview" alt="压缩后图片" />
              </div>
              <div class="preview-actions">
                <button class="success" onclick="downloadCompressed()" aria-label="下载压缩图片">
                  下载压缩图片
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <canvas id="outputCanvas"></canvas>

    <script>
      // ============================================
      // Elements
      // ============================================
      var uploadZone = document.getElementById("uploadZone");
      var fileInput = document.getElementById("fileInput");
      var quality = document.getElementById("quality");
      var qualityValue = document.getElementById("qualityValue");
      var maxWidth = document.getElementById("maxWidth");
      var maxHeight = document.getElementById("maxHeight");
      var keepRatio = document.getElementById("keepRatio");
      var comparison = document.getElementById("comparison");
      var originalPreview = document.getElementById("originalPreview");
      var compressedPreview = document.getElementById("compressedPreview");
      var canvas = document.getElementById("outputCanvas");
      var ctx = canvas.getContext("2d");

      var currentFile = null;
      var currentFormat = "jpeg";
      var compressedDataUrl = null;

      // ============================================
      // Format Button Handler
      // ============================================
      document.querySelectorAll(".format-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".format-btn").forEach(function (b) {
            b.classList.remove("active");
          });
          btn.classList.add("active");
          currentFormat = btn.dataset.format;
          if (currentFile) {
            processImage();
          }
        });
      });

      // ============================================
      // Quality Slider Handler
      // ============================================
      quality.addEventListener("input", function () {
        qualityValue.textContent = quality.value + "%";
      });

      quality.addEventListener("change", function () {
        if (currentFile) {
          processImage();
        }
      });

      // ============================================
      // Dimensions Change Handler
      // ============================================
      [maxWidth, maxHeight].forEach(function (el) {
        el.addEventListener("change", function () {
          if (currentFile) {
            processImage();
          }
        });
      });

      // ============================================
      // Drag & Drop Handlers
      // ============================================
      uploadZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        uploadZone.classList.add("dragover");
      });

      uploadZone.addEventListener("dragleave", function () {
        uploadZone.classList.remove("dragover");
      });

      uploadZone.addEventListener("drop", function (e) {
        e.preventDefault();
        uploadZone.classList.remove("dragover");
        var files = e.dataTransfer.files;
        if (files.length > 0 && files[0].type.startsWith("image/")) {
          handleFile(files[0]);
        }
      });

      // ============================================
      // File Input Handler
      // ============================================
      fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) {
          handleFile(fileInput.files[0]);
        }
      });

      // ============================================
      // File Handling
      // ============================================
      function handleFile(file) {
        currentFile = file;

        var reader = new FileReader();
        reader.onload = function (e) {
          originalPreview.src = e.target.result;
          processImage();
        };
        reader.readAsDataURL(file);
      }

      // ============================================
      // Utility Functions
      // ============================================
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      // ============================================
      // Image Processing
      // ============================================
      window.processImage = function () {
        if (!currentFile) {
          alert("请先选择图片");
          return;
        }

        var img = new Image();
        img.onload = function () {
          var originalWidth = img.width;
          var originalHeight = img.height;
          var targetWidth = parseInt(maxWidth.value) || originalWidth;
          var targetHeight = parseInt(maxHeight.value) || originalHeight;

          // 保持比例
          if (keepRatio.checked) {
            var ratioW = targetWidth / originalWidth;
            var ratioH = targetHeight / originalHeight;
            var ratio = Math.min(ratioW, ratioH, 1); // 不放大
            targetWidth = Math.round(originalWidth * ratio);
            targetHeight = Math.round(originalHeight * ratio);
          } else {
            targetWidth = Math.min(targetWidth, originalWidth);
            targetHeight = Math.min(targetHeight, originalHeight);
          }

          // 设置 canvas
          canvas.width = targetWidth;
          canvas.height = targetHeight;

          // 绘制
          ctx.clearRect(0, 0, targetWidth, targetHeight);
          ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

          // 压缩
          var mimeType =
            currentFormat === "jpeg"
              ? "image/jpeg"
              : currentFormat === "webp"
                ? "image/webp"
                : "image/png";
          var qualityVal = currentFormat === "png" ? undefined : parseInt(quality.value) / 100;

          compressedDataUrl = canvas.toDataURL(mimeType, qualityVal);
          compressedPreview.src = compressedDataUrl;

          // 计算大小
          var originalSize = currentFile.size;
          var compressedSize = Math.round((compressedDataUrl.length - 22) * 0.75); // base64 估算

          // 更新统计
          document.getElementById("originalSizeStat").textContent = formatSize(originalSize);
          document.getElementById("compressedSizeStat").textContent = formatSize(compressedSize);

          var saved = originalSize - compressedSize;
          var savedPercent = ((saved / originalSize) * 100).toFixed(1);
          var savedEl = document.getElementById("savedStat");
          savedEl.textContent =
            (saved > 0 ? "-" : "+") +
            formatSize(Math.abs(saved)) +
            " (" +
            Math.abs(savedPercent) +
            "%)";
          savedEl.className = "stat-value " + (saved > 0 ? "positive" : "negative");

          var ratio = (originalSize / compressedSize).toFixed(2);
          document.getElementById("ratioStat").textContent = ratio + "x";

          // 更新信息
          document.getElementById("originalInfo").textContent =
            originalWidth + " x " + originalHeight;
          document.getElementById("compressedInfo").textContent =
            targetWidth + " x " + targetHeight;

          // 显示对比
          comparison.classList.add("show");
        };

        img.src = originalPreview.src;
      };

      // ============================================
      // Download Handler
      // ============================================
      window.downloadCompressed = function () {
        if (!compressedDataUrl) {
          alert("请先压缩图片");
          return;
        }

        var ext = currentFormat === "jpeg" ? "jpg" : currentFormat;
        var originalName = currentFile ? currentFile.name.replace(/\.[^.]+$/, "") : "image";

        var link = document.createElement("a");
        link.download = originalName + "-compressed." + ext;
        link.href = compressedDataUrl;
        link.click();
      };

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      window.toggleTheme = toggleTheme;

      // ============================================
      // Initialize
      // ============================================
      initTheme();
    </script>
  </body>
</html>

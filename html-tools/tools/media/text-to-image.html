        background-clip: text;
      }

      .subtitle {
        color: var(--text-color);
        opacity: 0.7;
      }

      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--container-bg);
        border: 1px solid var(--border-subtle);
        color: var(--text-color);
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .theme-toggle:hover {
        border-color: var(--primary-color);
      }

      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .panel {
        background: var(--container-bg);
        border-radius: 12px;
        padding: 25px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-subtle);
      }

      .panel-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .form-group {
        margin-bottom: 18px;

        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 12px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        color: var(--text-color);
        font-size: 1rem;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary-color);
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
        font-family: inherit;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .color-input {
        display: flex;
        gap: 10px;
      }

      .color-input input[type="color"] {
        width: 50px;
        height: 42px;
        padding: 2px;
        border-radius: 6px;
        cursor: pointer;
      }

      .color-input input[type="text"] {
        flex: 1;
      }

      .range-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .range-group input[type="range"] {
        flex: 1;
        height: 6px;
        -webkit-appearance: none;
        background: var(--border-subtle);
        border-radius: 3px;
      }

      .range-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: var(--primary-color);
        border-radius: 50%;
        cursor: pointer;
      }

      .range-value {
        min-width: 50px;
        text-align: right;
        font-family: Monaco, Menlo, monospace;
      }

      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }

      .preset-btn {
        padding: 8px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        color: var(--text-color);
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.3s ease;
      }

      .preset-btn:hover {
        border-color: var(--primary-color);
      }

      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary-color), var(--hover-color));
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
      }

      .btn-secondary {
        background: var(--bg-input);
        color: var(--text-color);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        border-color: var(--primary-color);
      }

      .preview-area {
        background: var(--bg-input);
        border-radius: 10px;
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .preview-area canvas {
        max-width: 100%;
        max-height: 400px;
      }

      .preview-placeholder {
        text-align: center;
        opacity: 0.5;
      }

      .preview-placeholder .icon {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      .image-info {
        margin-top: 15px;
        padding: 12px;
        background: var(--bg-input);
        border-radius: 8px;
        font-size: 0.9rem;
      }

      .image-info span {
        margin-right: 20px;
      }

      .image-info strong {
        color: var(--primary-color);
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--primary-color);
        color: white;
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: 500;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s ease;

      .toast.show {
        transform: translateY(0);

      @media (max-width: 900px) {

Hello World
你好，世界</textarea

            <div class="form-group">

                <option value="serif">衬线 (Serif)</option>
                <option value="monospace">等宽 (Monospace)</option>
                <option value="cursive">手写 (Cursive)</option>

                <option value="'SimSun', serif">宋体</option>
                <option value="'KaiTi', serif">楷体</option>
                <option value="'Arial', sans-serif">Arial</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Courier New', monospace">Courier New</option>

            </div>
            <div class="form-group">
              <label>字体大小</label>
              <div class="range-group">
                <input
                  type="range"
                  id="fontSize"
                  min="12"
                  max="120"
                  value="48"
                  oninput="updatePreview()"
                />
                <span class="range-value" id="fontSizeValue">48px</span>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>文字颜色</label>
              <div class="color-input">
                <input
                  type="color"
                  id="textColor"
                  value="#ffffff"
                  onchange="
                    syncColor('text');
                    updatePreview();
                  "
                  aria-label="颜色选择器"
                />
                <input
                  type="text"
                  id="textColorText"
                  value="#ffffff"
                  onchange="
                    syncColorPicker('text');
                    updatePreview();
                  "
                  aria-label="文本输入框"
                  placeholder="请输入文本输入框"
                />
              </div>
            </div>
            <div class="form-group">
              <label>背景颜色</label>
              <div class="color-input">
                <input
                  type="color"
                  id="bgColor"
                  value="#1a1a2e"
                  onchange="
                    syncColor('bg');
                    updatePreview();
                  "
                  aria-label="颜色选择器"
                />
                <input
                  type="text"
                  id="bgColorText"
                  value="#1a1a2e"
                  onchange="
                    syncColorPicker('bg');
                    updatePreview();
                  "
                  aria-label="文本输入框"
                  placeholder="请输入文本输入框"
                />
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>行高</label>
              <div class="range-group">
                <input
                  type="range"
                  id="lineHeight"
                  min="1"
                  max="3"
                  step="0.1"
                  value="1.5"
                  oninput="updatePreview()"
                />
                <span class="range-value" id="lineHeightValue">1.5</span>
              </div>
            </div>
            <div class="form-group">
              <label>内边距</label>
              <div class="range-group">
                <input
                  type="range"
                  id="padding"
                  min="0"
                  max="100"
                  value="40"
                  oninput="updatePreview()"
                />
                <span class="range-value" id="paddingValue">40px</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>文字对齐</label>
            <select id="textAlign" onchange="updatePreview()">
              <option value="left">左对齐</option>
              <option value="center" selected>居中</option>
              <option value="right">右对齐</option>
            </select>
          </div>

          <div class="form-group">
            <label>字体样式</label>
            <div class="presets">
              <button class="preset-btn" onclick="setStyle('normal')" aria-label="正常">
                正常
              </button>
              <button class="preset-btn" onclick="setStyle('bold')" aria-label="粗体">粗体</button>
              <button class="preset-btn" onclick="setStyle('italic')" aria-label="斜体">
                斜体
              </button>
              <button class="preset-btn" onclick="setStyle('bold italic')" aria-label="粗斜体">
                粗斜体
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>颜色预设</label>
            <div class="presets">
              <button
                class="preset-btn"
                onclick="setColors('#ffffff', '#1a1a2e')"
                aria-label="暗色"
              >
                暗色
              </button>
              <button
                class="preset-btn"
                onclick="setColors('#333333', '#ffffff')"
                aria-label="亮色"
              >
                亮色
              </button>
              <button
                class="preset-btn"
                onclick="setColors('#00d9ff', '#0f3460')"
                aria-label="科技蓝"
              >
                科技蓝
              </button>
              <button
                class="preset-btn"
                onclick="setColors('#ffd700', '#1a1a1a')"
                aria-label="金色"
              >
                金色
              </button>
              <button
                class="preset-btn"
                onclick="setColors('#ff6b6b', '#2d1f2f')"
                aria-label="红色"
              >
                红色
              </button>
              <button
                class="preset-btn"
                onclick="setColors('#4ade80', '#1a2e1a')"
                aria-label="绿色"
              >
                绿色
              </button>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2 class="panel-title">预览</h2>

          <div class="preview-area" id="previewArea">
            <canvas id="canvas"></canvas>
          </div>

          <div class="image-info" id="imageInfo">
            <span>
              尺寸:
              <strong id="sizeInfo">-</strong>
            </span>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" onclick="downloadImage('png')">
              <span>📥</span>
              下载 PNG
            </button>
            <button class="btn btn-secondary" onclick="downloadImage('jpg')">
              <span>📥</span>
              下载 JPG
            </button>
            <button class="btn btn-secondary" onclick="copyImage()">
              <span>📋</span>
              复制
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let fontStyle = "normal";

      // Theme toggle
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // Initialize theme
      (function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      window.syncColor = function (type) {
        const colorPicker = document.getElementById(type + "Color");
        const colorText = document.getElementById(type + "ColorText");
        colorText.value = colorPicker.value;
      };

      window.syncColorPicker = function (type) {
        const colorPicker = document.getElementById(type + "Color");
        const colorText = document.getElementById(type + "ColorText");
        if (/^#[0-9A-Fa-f]{6}$/.test(colorText.value)) {
          colorPicker.value = colorText.value;
        }
      };

      window.setStyle = function (style) {
        fontStyle = style;
        updatePreview();
      };

      function setColors(textColor, bgColor) {
        document.getElementById("textColor").value = textColor;
        document.getElementById("textColorText").value = textColor;
        document.getElementById("bgColor").value = bgColor;
        document.getElementById("bgColorText").value = bgColor;
        updatePreview();
      }

      window.updatePreview = function () {
        const text = document.getElementById("textInput").value || "Hello World";
        const fontFamily = document.getElementById("fontFamily").value;
        const fontSize = parseInt(document.getElementById("fontSize").value);
        const textColor = document.getElementById("textColorText").value;
        const bgColor = document.getElementById("bgColorText").value;
        const lineHeight = parseFloat(document.getElementById("lineHeight").value);
        const padding = parseInt(document.getElementById("padding").value);
        const textAlign = document.getElementById("textAlign").value;

        // Update value displays
        document.getElementById("fontSizeValue").textContent = fontSize + "px";
        document.getElementById("lineHeightValue").textContent = lineHeight;
        document.getElementById("paddingValue").textContent = padding + "px";

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Set font to measure text
        const fontString = `${fontStyle} ${fontSize}px ${fontFamily}`;
        ctx.font = fontString;

        // Split text into lines
        const lines = text.split("\n");

        // Calculate dimensions
        let maxWidth = 0;
        lines.forEach((line) => {
          const metrics = ctx.measureText(line || " ");
          if (metrics.width > maxWidth) maxWidth = metrics.width;
        });

        const lineHeightPx = fontSize * lineHeight;
        const textHeight = lines.length * lineHeightPx;

        const canvasWidth = Math.ceil(maxWidth + padding * 2);
        const canvasHeight = Math.ceil(textHeight + padding * 2);

        // Set canvas size
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // Draw background
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // Draw text
        ctx.fillStyle = textColor;
        ctx.font = fontString;
        ctx.textBaseline = "top";

        lines.forEach((line, index) => {
          let x = padding;
          if (textAlign === "center") {
            x = (canvasWidth - ctx.measureText(line).width) / 2;
          } else if (textAlign === "right") {
            x = canvasWidth - ctx.measureText(line).width - padding;
          }

          const y = padding + index * lineHeightPx + (lineHeightPx - fontSize) / 2;
          ctx.fillText(line, x, y);
        });

        // Update info
        document.getElementById("sizeInfo").textContent = `${canvasWidth} × ${canvasHeight} px`;
      };

      window.downloadImage = function (format) {
        const canvas = document.getElementById("canvas");
        const link = document.createElement("a");

        if (format === "jpg") {
          link.download = "text-image.jpg";
          link.href = canvas.toDataURL("image/jpeg", 0.95);
        } else {
          link.download = "text-image.png";
          link.href = canvas.toDataURL("image/png");
        }

        link.click();
        showToast("图片已下载");
      };

      window.copyImage = async function () {
        const canvas = document.getElementById("canvas");

        try {
          const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          showToast("已复制到剪贴板");
        } catch (err) {
          showToast("复制失败");
        }
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Initialize
      updatePreview();
    </script>
  </body>
</html>

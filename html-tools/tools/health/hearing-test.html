    <style>
      /* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* Breadcrumb Navigation */
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        padding: var(--space-3) var(--space-4);
        background: var(--glass-bg);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        flex-wrap: wrap;
        margin-bottom: var(--space-5);
      }

      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }

      .breadcrumb a:hover {
        color: var(--color-accent-primary);
      }

      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }

      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      /* Page Title */
      .page-title {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: var(--space-2);
        color: var(--color-text-primary);
      }

      .page-subtitle {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-6);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Warning Box
         ============================================ */
      .warning {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid var(--color-error);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
        margin-bottom: var(--space-5);
      }

      .warning-title {
        color: var(--color-error);
        font-weight: 600;
        margin-bottom: var(--space-2);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }

      .warning-content {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        line-height: 1.6;
      }

      .warning-content p {
        margin-bottom: var(--space-2);
      }

      .warning-content p:last-child {
        margin-bottom: 0;
      }

      /* ============================================
         Test Area Styles
         ============================================ */
      .test-area {
        min-height: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--space-8);
      }

      .frequency-display {
        font-size: 3rem;
        font-weight: 700;
        color: var(--color-accent-primary);
        margin-bottom: var(--space-2);
        font-family: var(--font-mono);
      }

      .volume-display {
        font-size: 1.0625rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-6);
        font-family: var(--font-mono);
      }

      .play-btn {
        width: 120px;
        height: 120px;
        border-radius: var(--radius-full);
        font-size: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: var(--space-6);
        border: 2px solid var(--color-accent-primary);
        background: transparent;
        cursor: pointer;
        transition: all var(--transition-normal);
        color: var(--color-accent-primary);
      }

      .play-btn:hover {
        background: var(--color-accent-primary);
        color: #fff;
        transform: scale(1.05);
      }

      .play-btn.playing {
        animation: pulse 0.6s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .status-text {
        color: var(--color-text-secondary);
        margin-bottom: var(--space-4);
        font-size: 1rem;
      }

      /* ============================================
         Response Buttons
         ============================================ */
      .response-btns {
        display: flex;
        gap: var(--space-4);
        flex-wrap: wrap;
        justify-content: center;
      }

      .response-btns button {
        min-width: 120px;
        padding: var(--space-3) var(--space-6);
      }

      /* ============================================
         Progress Bar
         ============================================ */
      .progress {
        display: flex;
        gap: var(--space-1);
        margin-bottom: var(--space-5);
      }

      .progress-dot {
        flex: 1;
        height: 8px;
        background: var(--color-border-default);
        border-radius: var(--radius-full);
        transition: all var(--transition-fast);
      }

      .progress-dot.done {
        background: var(--color-success);
      }

      .progress-dot.failed {
        background: var(--color-error);
      }

      .progress-dot.current {
        background: var(--color-accent-primary);
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ============================================
         Ear Selection
         ============================================ */
      .ear-select {
        display: flex;
        gap: var(--space-3);
        justify-content: center;
        margin-bottom: var(--space-5);
        flex-wrap: wrap;
      }

      .ear-btn {
        padding: var(--space-3) var(--space-6);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-weight: 500;
        font-family: var(--font-sans);
      }

      .ear-btn:hover {
        border-color: var(--color-accent-primary);
      }

      .ear-btn.active {
        border-color: var(--color-accent-primary);
        background: var(--color-accent-primary);
        color: #fff;
        box-shadow: var(--shadow-glow);
      }

      /* ============================================
         Instructions
         ============================================ */
      .instructions {
        padding: var(--space-5);
        background: var(--color-bg-subtle);
        border-radius: var(--radius-lg);
        margin-bottom: var(--space-5);
      }

      .instructions h3 {
        margin-bottom: var(--space-3);
        color: var(--color-text-primary);
        font-weight: 600;
      }

      .instructions ol {
        padding-left: var(--space-6);
      }

      .instructions li {
        margin-bottom: var(--space-2);
        color: var(--color-text-secondary);
        line-height: 1.6;
      }

      /* ============================================
         Results Styles
         ============================================ */
      .audiogram {
        width: 100%;
        max-width: 600px;
        margin: var(--space-5) auto;
      }

      .audiogram canvas {
        width: 100%;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        background: var(--color-bg-subtle);
      }

      .freq-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-top: var(--space-5);
      }

      .freq-item {
        padding: var(--space-4);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        text-align: center;
      }

      .freq-item .hz {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      .freq-item .db {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin-top: var(--space-1);
        font-family: var(--font-mono);
      }

      .freq-item .status {
        margin-top: var(--space-2);
        padding: var(--space-1) var(--space-2);
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 500;
      }

      .freq-item .status.good {
        background: var(--color-success);
        color: white;
      }

      .freq-item .status.mild {
        background: var(--color-warning);
        color: white;
      }

      .freq-item .status.moderate {
        background: #f97316;
        color: white;
      }

      .freq-item .status.severe {
        background: var(--color-error);
        color: white;
      }

      /* ============================================
         Reference Chart
         ============================================ */
      .reference-chart {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-top: var(--space-4);
      }

      /* ============================================
         Note Box
         ============================================ */
      .note {
        margin-top: var(--space-5);
        padding: var(--space-4);
        background: var(--color-bg-subtle);
        border-left: 3px solid var(--color-accent-primary);
        border-radius: var(--radius-md);
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        line-height: 1.6;
      }

      /* ============================================
         Buttons
         ============================================ */
      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      button.success {
        background: var(--color-success);
        border-color: var(--color-success);
        color: #fff;
      }

      button.success:hover {
        background: #16a34a;
        border-color: #16a34a;
      }

      button.danger {
        background: var(--color-error);
        border-color: var(--color-error);
        color: #fff;
      }

      button.danger:hover {
        background: #dc2626;
        border-color: #dc2626;
      }

      /* ============================================
         Mobile Responsive

      @media (max-width: 480px) {

          --nav-height: 52px;

        .nav-content {
          padding: 0 var(--space-4);

        .nav-back-text {

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);

        .page-title {

        .frequency-display {

        }

        .play-btn {

        }

        .test-area {

        }

        .freq-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .ear-select {
          gap: var(--space-2);
        }

        .ear-btn {
          flex: 1;
          min-width: 0;
        }

        .response-btns {

        }

        .response-btns button {
          min-width: 100px;
          padding: var(--space-2) var(--space-4);
          font-size: 0.875rem;
        }

        .breadcrumb {
          font-size: 0.8125rem;
          padding: var(--space-2) var(--space-3);
        }

        .reference-chart {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Tablet */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      /* Desktop */

        }

      /* ============================================
         Accessibility

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;

      }

      :focus-visible {

        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible) {
        outline: none;
      }
    </style>

            </div>

              <div class="status severe">重度</div>
            </div>

          API生成测试音频，结果受设备、耳机质量和环境噪音影响。如有听力问题，请到医院进行专业的纯音听力测试。

    <script>
      // ============================================
      // Audio Context and State
      // ============================================
      var audioContext = null;
      var currentEar = "left";
      var testState = {
        running: false,
        currentFreqIndex: 0,
        currentVolume: 0,
        results: {}
      };

      var frequencies = [250, 500, 1000, 2000, 4000, 8000];
      var volumeLevels = [0.5, 0.3, 0.2, 0.1, 0.05, 0.02, 0.01, 0.005];
      var dbLevels = [10, 20, 30, 40, 50, 60, 70, 80];

      // ============================================
      // Ear Selection
      // ============================================
      function selectEar(ear) {
        currentEar = ear;
        document.querySelectorAll(".ear-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.ear === ear);
        });
      }

      // ============================================
      // Audio Initialization and Tone Generation
      // ============================================
      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
      }

      function playTone(frequency, volume, duration) {
        duration = duration || 1;
        return new Promise(function (resolve) {
          initAudio();

          var oscillator = audioContext.createOscillator();
          var gainNode = audioContext.createGain();
          var panNode = audioContext.createStereoPanner();

          oscillator.type = "sine";
          oscillator.frequency.value = frequency;

          if (currentEar === "left") {
            panNode.pan.value = -1;
          } else if (currentEar === "right") {
            panNode.pan.value = 1;
          } else {
            panNode.pan.value = 0;
          }

          gainNode.gain.setValueAtTime(0, audioContext.currentTime);
          gainNode.gain.linearRampToValueAtTime(volume, audioContext.currentTime + 0.1);
          gainNode.gain.linearRampToValueAtTime(volume, audioContext.currentTime + duration - 0.1);
          gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration);

          oscillator.connect(gainNode);
          gainNode.connect(panNode);
          panNode.connect(audioContext.destination);

          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + duration);

          setTimeout(resolve, duration * 1000);
        });
      }

      // ============================================
      // Test Flow
      // ============================================
      function startTest() {
        testState = {
          running: true,
          currentFreqIndex: 0,
          currentVolume: 0,
          results: {}
        };

        frequencies.forEach(function (f) {
          testState.results[f] = null;
        });

        renderProgress();
        runTest();
      }

      async function runTest() {
        var testArea = document.getElementById("testArea");

        while (testState.currentFreqIndex < frequencies.length && testState.running) {
          var freq = frequencies[testState.currentFreqIndex];
          testState.currentVolume = 0;

          var lastHeardVolume = -1;

          for (var volIndex = 0; volIndex < volumeLevels.length && testState.running; volIndex++) {
            testState.currentVolume = volIndex;
            renderProgress();

            renderPlayingState(testArea, freq, volIndex);

            await playTone(freq, volumeLevels[volIndex], 1);

            renderResponseState(testArea, freq, volIndex);

            var response = await waitForResponse();

            if (response) {
              lastHeardVolume = volIndex;
            } else {
              break;
            }
          }

          if (lastHeardVolume >= 0) {
            testState.results[freq] = dbLevels[lastHeardVolume];
          } else {
            testState.results[freq] = dbLevels[dbLevels.length - 1];
          }

          testState.currentFreqIndex++;
        }

        if (testState.running) {
          showResults();
        }
      }

      // ============================================
      // UI Rendering
      // ============================================
      function renderPlayingState(container, freq, volIndex) {
        container.textContent = "";

        var freqDiv = document.createElement("div");
        freqDiv.className = "frequency-display";
        freqDiv.textContent = freq + " Hz";

        var volDiv = document.createElement("div");
        volDiv.className = "volume-display";
        volDiv.textContent = "音量等级: " + (volIndex + 1) + "/" + volumeLevels.length;

        var playBtn = document.createElement("button");
        playBtn.className = "play-btn playing";
        playBtn.disabled = true;
        playBtn.textContent = "🔊";

        var statusText = document.createElement("p");
        statusText.className = "status-text";
        statusText.textContent = "正在播放...";

        container.appendChild(freqDiv);
        container.appendChild(volDiv);
        container.appendChild(playBtn);
        container.appendChild(statusText);
      }

      function renderResponseState(container, freq, volIndex) {
        container.textContent = "";

        var freqDiv = document.createElement("div");
        freqDiv.className = "frequency-display";
        freqDiv.textContent = freq + " Hz";

        var volDiv = document.createElement("div");
        volDiv.className = "volume-display";
        volDiv.textContent = "音量等级: " + (volIndex + 1) + "/" + volumeLevels.length;

        var playBtn = document.createElement("button");
        playBtn.className = "play-btn";
        playBtn.textContent = "🔊";
        playBtn.onclick = function () {
          playTone(freq, volumeLevels[volIndex], 1);
        };

        var statusText = document.createElement("p");
        statusText.className = "status-text";
        statusText.textContent = "您能听到声音吗？";

        var btnContainer = document.createElement("div");
        btnContainer.className = "response-btns";

        var yesBtn = document.createElement("button");
        yesBtn.className = "success";
        yesBtn.textContent = "能听到";
        yesBtn.onclick = function () {
          respond(true);
        };

        var noBtn = document.createElement("button");
        noBtn.className = "danger";
        noBtn.textContent = "听不到";
        noBtn.onclick = function () {
          respond(false);
        };

        btnContainer.appendChild(yesBtn);
        btnContainer.appendChild(noBtn);

        container.appendChild(freqDiv);
        container.appendChild(volDiv);
        container.appendChild(playBtn);
        container.appendChild(statusText);
        container.appendChild(btnContainer);
      }

      function renderProgress() {
        var container = document.getElementById("progress");
        container.textContent = "";

        frequencies.forEach(function (freq, index) {
          var dot = document.createElement("div");
          dot.className = "progress-dot";

          if (testState.results[freq] !== null && testState.results[freq] !== undefined) {
            dot.classList.add(testState.results[freq] <= 25 ? "done" : "failed");
          } else if (index === testState.currentFreqIndex) {
            dot.classList.add("current");
          }

          container.appendChild(dot);
        });
      }

      function showResults() {
        testState.running = false;

        var testArea = document.getElementById("testArea");
        testArea.textContent = "";

        var resultDiv = document.createElement("div");
        resultDiv.style.textAlign = "center";

        var title = document.createElement("h2");
        title.style.cssText = "margin-bottom: var(--space-4); color: var(--color-text-primary);";
        title.textContent = "测试完成！";

        var desc = document.createElement("p");
        desc.style.cssText = "color: var(--color-text-secondary); margin-bottom: var(--space-5);";
        desc.textContent = "查看下方的详细结果";

        var restartBtn = document.createElement("button");
        restartBtn.className = "primary";
        restartBtn.style.cssText =
          "margin-top: var(--space-5); padding: var(--space-4) var(--space-8);";
        restartBtn.textContent = "重新测试";
        restartBtn.onclick = startTest;

        resultDiv.appendChild(title);
        resultDiv.appendChild(desc);
        resultDiv.appendChild(restartBtn);
        testArea.appendChild(resultDiv);

        document.getElementById("resultsCard").style.display = "block";

        drawAudiogram();
        renderFreqResults();

        document.getElementById("resultsCard").scrollIntoView({ behavior: "smooth" });
      }

      // ============================================
      // Response Handling
      // ============================================
      var responseResolver = null;

      function waitForResponse() {
        return new Promise(function (resolve) {
          responseResolver = resolve;
          setTimeout(function () {
            if (responseResolver) {
              responseResolver(false);
              responseResolver = null;
            }
          }, 10000);
        });
      }

      function respond(heard) {
        if (responseResolver) {
          responseResolver(heard);
          responseResolver = null;
        }
      }

      // ============================================
      // Results Visualization
      // ============================================
      function drawAudiogram() {
        var canvas = document.getElementById("audiogramCanvas");
        var ctx = canvas.getContext("2d");
        var width = canvas.width;
        var height = canvas.height;

        ctx.clearRect(0, 0, width, height);

        var bgColor =
          getComputedStyle(document.documentElement).getPropertyValue("--color-bg-subtle").trim() ||
          "#f5f5f5";
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, width, height);

        var padding = 60;
        var graphWidth = width - padding * 2;
        var graphHeight = height - padding * 2;

        var borderColor =
          getComputedStyle(document.documentElement)
            .getPropertyValue("--color-border-default")
            .trim() || "#e0e0e0";
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 1;

        for (var db = 0; db <= 80; db += 20) {
          var y = padding + (db / 80) * graphHeight;
          ctx.beginPath();
          ctx.moveTo(padding, y);
          ctx.lineTo(width - padding, y);
          ctx.stroke();

          var textColor =
            getComputedStyle(document.documentElement)
              .getPropertyValue("--color-text-secondary")
              .trim() || "#666";
          ctx.fillStyle = textColor;
          ctx.font =
            "12px " + getComputedStyle(document.documentElement).getPropertyValue("--font-sans");
          ctx.textAlign = "right";
          ctx.fillText(db + " dB", padding - 10, y + 4);
        }

        frequencies.forEach(function (freq, index) {
          var x = padding + (index / (frequencies.length - 1)) * graphWidth;
          ctx.beginPath();
          ctx.moveTo(x, padding);
          ctx.lineTo(x, height - padding);
          ctx.stroke();

          var textColor =
            getComputedStyle(document.documentElement)
              .getPropertyValue("--color-text-secondary")
              .trim() || "#666";
          ctx.fillStyle = textColor;
          ctx.textAlign = "center";
          ctx.fillText(freq >= 1000 ? freq / 1000 + "k" : freq, x, height - padding + 20);
        });

        ctx.fillStyle = "rgba(34, 197, 94, 0.2)";
        ctx.fillRect(padding, padding, graphWidth, (25 / 80) * graphHeight);

        var accentColor =
          getComputedStyle(document.documentElement)
            .getPropertyValue("--color-accent-primary")
            .trim() || "#8b5cf6";
        ctx.strokeStyle = accentColor;
        ctx.lineWidth = 3;
        ctx.beginPath();

        frequencies.forEach(function (freq, index) {
          var x = padding + (index / (frequencies.length - 1)) * graphWidth;
          var dbVal = testState.results[freq] || 0;
          var y = padding + (dbVal / 80) * graphHeight;

          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();

        frequencies.forEach(function (freq, index) {
          var x = padding + (index / (frequencies.length - 1)) * graphWidth;
          var dbVal = testState.results[freq] || 0;
          var y = padding + (dbVal / 80) * graphHeight;

          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fillStyle = dbVal <= 25 ? "#22c55e" : dbVal <= 40 ? "#f59e0b" : "#ef4444";
          ctx.fill();
        });

        var textColor =
          getComputedStyle(document.documentElement)
            .getPropertyValue("--color-text-primary")
            .trim() || "#333";
        ctx.fillStyle = textColor;
        ctx.font =
          "14px " + getComputedStyle(document.documentElement).getPropertyValue("--font-sans");
        ctx.textAlign = "center";
        ctx.fillText("频率 (Hz)", width / 2, height - 10);
      }

      function renderFreqResults() {
        var container = document.getElementById("freqResults");
        container.textContent = "";

        frequencies.forEach(function (freq) {
          var db = testState.results[freq] || 0;
          var status, statusClass;

          if (db <= 25) {
            status = "正常";
            statusClass = "good";
          } else if (db <= 40) {
            status = "轻度损失";
            statusClass = "mild";
          } else if (db <= 55) {
            status = "中度损失";
            statusClass = "moderate";
          } else {
            status = "重度损失";
            statusClass = "severe";
          }

          var item = document.createElement("div");
          item.className = "freq-item";

          var hzDiv = document.createElement("div");
          hzDiv.className = "hz";
          hzDiv.textContent = freq >= 1000 ? freq / 1000 + " kHz" : freq + " Hz";

          var dbDiv = document.createElement("div");
          dbDiv.className = "db";
          dbDiv.textContent = db + " dB";

          var statusDiv = document.createElement("div");
          statusDiv.className = "status " + statusClass;
          statusDiv.textContent = status;

          item.appendChild(hzDiv);
          item.appendChild(dbDiv);
          item.appendChild(statusDiv);
          container.appendChild(item);
        });
      }

      function renderInitialTestArea() {
        var testArea = document.getElementById("testArea");
        testArea.textContent = "";

        var instructions = document.createElement("div");
        instructions.className = "instructions";

        var h3 = document.createElement("h3");
        h3.textContent = "测试说明";
        instructions.appendChild(h3);

        var ol = document.createElement("ol");
        [
          "确保您在安静的环境中",
          "戴上耳机并将音量调至舒适水平",
          '点击"开始测试"按钮',
          '每次播放声音后，如果能听到请点击"能听到"',
          '如果听不到，点击"听不到"或等待自动跳过'
        ].forEach(function (text) {
          var li = document.createElement("li");
          li.textContent = text;
          ol.appendChild(li);
        });
        instructions.appendChild(ol);
        testArea.appendChild(instructions);

        var startBtn = document.createElement("button");
        startBtn.className = "primary";
        startBtn.style.cssText =
          "margin-top: var(--space-5); padding: var(--space-4) var(--space-8); font-size: 1.0625rem;";
        startBtn.textContent = "开始测试";
        startBtn.onclick = startTest;
        testArea.appendChild(startBtn);
      }

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      // ============================================
      // Initialize
      // ============================================
      initTheme();
      renderProgress();
      renderInitialTestArea();
    </script>
  </body>
</html>

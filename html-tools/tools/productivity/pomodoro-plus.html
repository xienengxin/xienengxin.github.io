    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--accent-red), var(--color-text-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .timer-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
      }
      .mode-tabs {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }
      .mode-tab {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .mode-tab:hover {
        border-color: var(--color-accent-cyan);
      }
      .mode-tab.active {
        background: var(--accent-red);
        color: #fff;
        border-color: var(--accent-red);
      }
      .mode-tab.break.active {
        background: var(--accent-green);
        border-color: var(--accent-green);
      }
      .timer-display {
        position: relative;
        width: 280px;
        height: 280px;
        margin: 0 auto 2rem;
      }
      .timer-ring {
        position: absolute;
        inset: 0;
      }
      .timer-ring circle {
        fill: none;
        stroke-width: 8;
        transform: rotate(-90deg);
        transform-origin: center;
      }
      .timer-ring .bg {
        stroke: var(--color-bg-surface);
      }
      .timer-ring .progress {
        stroke: var(--accent-red);
        stroke-linecap: round;
        transition: stroke-dashoffset 0.5s linear;
      }
      .timer-ring .progress.break {
        stroke: var(--accent-green);
      }
      .timer-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .timer-time {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .timer-label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 0.5rem;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .ctrl-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid var(--border-subtle);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ctrl-btn:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .ctrl-btn.primary {
        background: var(--accent-red);
        border-color: var(--accent-red);
        color: #fff;
      }
      .ctrl-btn.primary:hover {
        background: var(--accent-red);
        opacity: 0.9;
      }
      .ctrl-btn.primary.break {
        background: var(--accent-green);
        border-color: var(--accent-green);
      }
      .tomatoes {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .tomato {
        font-size: 1.5rem;
        opacity: 0.3;
        transition: opacity 0.3s;
      }
      .tomato.done {
        opacity: 1;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
      }
      .stat {
        text-align: center;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }
      .settings-toggle {
        margin-top: 1.5rem;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        width: 100%;
        transition: all 0.2s;
      }
      .settings-toggle:hover {
        border-color: var(--color-accent-cyan);
      }
      .settings-panel {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
        display: none;
      }
      .settings-panel.show {
        display: block;
      }
      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-subtle);
      }
      .setting-row:last-child {
        border-bottom: none;
      }
      .setting-label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
      }
      .setting-input {
        width: 80px;
        padding: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        text-align: center;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">番茄工作法Plus</span>
      </nav>

      <h1>番茄工作法Plus</h1>
      <p class="subtitle">专注工作，高效休息</p>

      <div class="timer-card">
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="setMode('work')" aria-label="专注">专注</button>
          <button class="mode-tab break" onclick="setMode('shortBreak')" aria-label="短休息">
            短休息
          </button>
          <button class="mode-tab break" onclick="setMode('longBreak')" aria-label="长休息">
            长休息
          </button>
        </div>

        <div class="timer-display">
          <svg class="timer-ring" viewBox="0 0 280 280">
            <circle class="bg" cx="140" cy="140" r="130" />
            <circle
              class="progress"
              id="progressRing"
              cx="140"
              cy="140"
              r="130"
              stroke-dasharray="816.8"
              stroke-dashoffset="0"
            />
          </svg>
          <div class="timer-content">
            <div class="timer-time" id="timerTime">25:00</div>
            <div class="timer-label" id="timerLabel">专注时间</div>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn" onclick="resetTimer()" title="重置" aria-label="↺">↺</button>
          <button class="ctrl-btn primary" id="playBtn" onclick="toggleTimer()" aria-label="▶">
            ▶
          </button>
          <button class="ctrl-btn" onclick="skipTimer()" title="跳过" aria-label="⏭">⏭</button>
        </div>

        <div class="tomatoes" id="tomatoes">
          <span class="tomato">🍅</span>
          <span class="tomato">🍅</span>
          <span class="tomato">🍅</span>
          <span class="tomato">🍅</span>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="completedPomodoros">0</div>
            <div class="stat-label">已完成番茄</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalFocusTime">0</div>
            <div class="stat-label">专注分钟</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="currentStreak">0</div>
            <div class="stat-label">连续天数</div>
          </div>
        </div>

        <button class="settings-toggle" onclick="toggleSettings()" aria-label="⚙️ 设置">
          ⚙️ 设置
        </button>
        <div class="settings-panel" id="settingsPanel">
          <div class="setting-row">
            <span class="setting-label">专注时长 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="workDuration"
              value="25"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-row">
            <span class="setting-label">短休息 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="shortBreakDuration"
              value="5"
              min="1"
              max="30"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-row">
            <span class="setting-label">长休息 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="longBreakDuration"
              value="15"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-row">
            <span class="setting-label">长休息间隔 (番茄数)</span>
            <input
              type="number"
              class="setting-input"
              id="longBreakInterval"
              value="4"
              min="2"
              max="10"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let settings = {
        work: 25,
        shortBreak: 5,
        longBreak: 15,
        longBreakInterval: 4
      };

      let currentMode = "work";
      let timeLeft = settings.work * 60;
      let totalTime = settings.work * 60;
      let isRunning = false;
      let intervalId = null;
      let completedPomodoros = 0;
      let totalFocusMinutes = 0;
      let pomodorosInSession = 0;

      const circumference = 2 * Math.PI * 130;

      function loadStats() {
        const saved = localStorage.getItem("pomodoro_stats");
        if (saved) {
          const stats = JSON.parse(saved);
          completedPomodoros = stats.completed || 0;
          totalFocusMinutes = stats.focusMinutes || 0;
          updateStatsDisplay();
        }
      }

      function saveStats() {
        localStorage.setItem(
          "pomodoro_stats",
          JSON.stringify({
            completed: completedPomodoros,
            focusMinutes: totalFocusMinutes,
            lastDate: new Date().toDateString()
          })
        );
      }

      function updateStatsDisplay() {
        document.getElementById("completedPomodoros").textContent = completedPomodoros;
        document.getElementById("totalFocusTime").textContent = totalFocusMinutes;

        // Update tomatoes
        const tomatoes = document.querySelectorAll(".tomato");
        tomatoes.forEach((t, i) => {
          t.classList.toggle("done", i < pomodorosInSession);
        });
      }

      function setMode(mode) {
        if (isRunning) {
          stopTimer();
        }

        currentMode = mode;
        const durations = {
          work: settings.work,
          shortBreak: settings.shortBreak,
          longBreak: settings.longBreak
        };
        const labels = {
          work: "专注时间",
          shortBreak: "短休息",
          longBreak: "长休息"
        };

        timeLeft = durations[mode] * 60;
        totalTime = timeLeft;

        document.getElementById("timerLabel").textContent = labels[mode];
        updateTimerDisplay();

        // Update tabs
        document.querySelectorAll(".mode-tab").forEach((tab) => tab.classList.remove("active"));
        event.target.classList.add("active");

        // Update progress ring color
        const ring = document.getElementById("progressRing");
        ring.classList.toggle("break", mode !== "work");

        // Update play button color
        const playBtn = document.getElementById("playBtn");
        playBtn.classList.toggle("break", mode !== "work");
      }

      function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timerTime").textContent =
          `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        // Update progress ring
        const progress = timeLeft / totalTime;
        const offset = circumference * (1 - progress);
        document.getElementById("progressRing").style.strokeDashoffset = offset;

        // Update page title
        document.title = `${minutes}:${seconds.toString().padStart(2, "0")} - 番茄工作法`;
      }

      function startTimer() {
        isRunning = true;
        document.getElementById("playBtn").textContent = "⏸";

        intervalId = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();

          if (timeLeft <= 0) {
            completeTimer();
          }
        }, 1000);
      }

      function stopTimer() {
        isRunning = false;
        document.getElementById("playBtn").textContent = "▶";
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      function toggleTimer() {
        if (isRunning) {
          stopTimer();
        } else {
          startTimer();
        }
      }

      function resetTimer() {
        stopTimer();
        timeLeft = totalTime;
        updateTimerDisplay();
      }

      function skipTimer() {
        completeTimer();
      }

      function completeTimer() {
        stopTimer();
        playNotification();

        if (currentMode === "work") {
          completedPomodoros++;
          pomodorosInSession++;
          totalFocusMinutes += settings.work;
          saveStats();
          updateStatsDisplay();

          // Determine next break
          if (pomodorosInSession >= settings.longBreakInterval) {
            pomodorosInSession = 0;
            alert("🎉 完成一轮番茄！休息一下吧");
            setModeByName("longBreak");
          } else {
            alert("✅ 专注时间结束！休息一下");
            setModeByName("shortBreak");
          }
        } else {
          alert("⏰ 休息结束！准备开始下一个番茄");
          setModeByName("work");
        }
      }

      function setModeByName(mode) {
        const tabs = document.querySelectorAll(".mode-tab");
        const modeIndex = { work: 0, shortBreak: 1, longBreak: 2 };
        tabs[modeIndex[mode]].click();
      }

      function playNotification() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);

          oscillator.type = "sine";
          oscillator.frequency.value = 800;
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
          console.log("Audio not supported");
        }
      }

      function toggleSettings() {
        document.getElementById("settingsPanel").classList.toggle("show");
      }

      function updateSettings() {
        settings.work = parseInt(document.getElementById("workDuration").value) || 25;
        settings.shortBreak = parseInt(document.getElementById("shortBreakDuration").value) || 5;
        settings.longBreak = parseInt(document.getElementById("longBreakDuration").value) || 15;
        settings.longBreakInterval =
          parseInt(document.getElementById("longBreakInterval").value) || 4;

        localStorage.setItem("pomodoro_settings", JSON.stringify(settings));

        // Reset current timer if in work mode
        if (currentMode === "work" && !isRunning) {
          timeLeft = settings.work * 60;
          totalTime = timeLeft;
          updateTimerDisplay();
        }
      }

      function loadSettings() {
        const saved = localStorage.getItem("pomodoro_settings");
        if (saved) {
          settings = JSON.parse(saved);
          document.getElementById("workDuration").value = settings.work;
          document.getElementById("shortBreakDuration").value = settings.shortBreak;
          document.getElementById("longBreakDuration").value = settings.longBreak;
          document.getElementById("longBreakInterval").value = settings.longBreakInterval;

          timeLeft = settings.work * 60;
          totalTime = timeLeft;
          updateTimerDisplay();
        }
      }

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          toggleTimer();
        } else if (e.code === "KeyR") {
          resetTimer();
        }
      });

      // Initialize
      loadSettings();
      loadStats();
      updateTimerDisplay();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

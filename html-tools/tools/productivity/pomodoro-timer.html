  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">番茄钟计时器</span>
      </nav>

      <h1>🍅 番茄钟计时器</h1>
      <p class="subtitle">专注25分钟，休息5分钟，提升工作效率</p>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 100%"></div>
      </div>

      <div class="timer-display" id="timerDisplay">
        <div class="mode-label" id="modeLabel">工作时间</div>
        <div class="timer-value" id="timerValue">25:00</div>
        <div class="session-count" id="sessionCount">第 1 个番茄钟</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startTimer()" aria-label="开始">
          开始
        </button>
        <button class="btn" onclick="pauseTimer()" aria-label="暂停">暂停</button>
        <button class="btn" onclick="resetTimer()" aria-label="重置">重置</button>
        <button class="btn" onclick="skipSession()" aria-label="跳过">跳过</button>
      </div>

      <div class="settings">
        <div class="setting-group">
          <label for="input----------">工作时长 (分钟)</label>
          <input
            type="number"
            id="workDuration"
            value="25"
            min="1"
            max="60"
            onchange="updateSettings()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="setting-group">
          <label for="input---------">短休息 (分钟)</label>
          <input
            type="number"
            id="shortBreak"
            value="5"
            min="1"
            max="30"
            onchange="updateSettings()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="setting-group">
          <label for="input---------">长休息 (分钟)</label>
          <input
            type="number"
            id="longBreak"
            value="15"
            min="5"
            max="60"
            onchange="updateSettings()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let interval = null;
      let timeLeft = 25 * 60; // seconds
      let totalTime = 25 * 60;
      let isWork = true;
      let sessionCount = 1;
      let isRunning = false;

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timerValue").textContent =
          `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

        // Update progress bar
        const progress = (timeLeft / totalTime) * 100;
        document.getElementById("progressFill").style.width = progress + "%";

        // Update title
        document.title = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")} - 番茄钟`;
      }

      function startTimer() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById("startBtn").textContent = "进行中...";

        interval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
          } else {
            // Timer completed
            playNotification();
            switchMode();
          }
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        clearInterval(interval);
        document.getElementById("startBtn").textContent = "继续";
      }

      function resetTimer() {
        pauseTimer();
        isWork = true;
        sessionCount = 1;
        const workDuration = parseInt(document.getElementById("workDuration").value) || 25;
        timeLeft = workDuration * 60;
        totalTime = timeLeft;
        updateDisplay();
        updateModeDisplay();
        document.getElementById("startBtn").textContent = "开始";
        document.title = "番茄钟计时器 - WebUtils";
      }

      function skipSession() {
        pauseTimer();
        switchMode();
      }

      function switchMode() {
        isWork = !isWork;

        if (!isWork) {
          // Switch to break
          const breakDuration =
            sessionCount % 4 === 0
              ? parseInt(document.getElementById("longBreak").value) || 15
              : parseInt(document.getElementById("shortBreak").value) || 5;
          timeLeft = breakDuration * 60;
        } else {
          // Switch to work
          sessionCount++;
          const workDuration = parseInt(document.getElementById("workDuration").value) || 25;
          timeLeft = workDuration * 60;
        }

        totalTime = timeLeft;
        updateDisplay();
        updateModeDisplay();
        document.getElementById("startBtn").textContent = "开始";
        isRunning = false;
      }

      function updateModeDisplay() {
        const display = document.getElementById("timerDisplay");
        const startBtn = document.getElementById("startBtn");

        if (isWork) {
          display.classList.remove("break");
          startBtn.classList.remove("break");
          document.getElementById("modeLabel").textContent = "工作时间";
          document.getElementById("sessionCount").textContent = `第 ${sessionCount} 个番茄钟`;
        } else {
          display.classList.add("break");
          startBtn.classList.add("break");
          document.getElementById("modeLabel").textContent =
            sessionCount % 4 === 0 ? "长休息" : "短休息";
          document.getElementById("sessionCount").textContent = `完成 ${sessionCount - 1} 个番茄钟`;
        }
      }

      function updateSettings() {
        if (isRunning) return;

        const workDuration = parseInt(document.getElementById("workDuration").value) || 25;

        if (isWork) {
          timeLeft = workDuration * 60;
          totalTime = timeLeft;
          updateDisplay();
        }
      }

      function playNotification() {
        // Play sound notification
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 800;
        oscillator.type = "sine";

        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);

        // Browser notification
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification(isWork ? "休息时间！" : "开始工作！", {
            body: isWork ? "放松一下，喝杯水吧" : "新的番茄钟开始了",
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" font-size="75">🍅</text></svg>'
          });
        }
      }

      // Request notification permission on load
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      // Initialize
      updateDisplay();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

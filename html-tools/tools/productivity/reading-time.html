    <div class="bg-grid"></div>

      <h1>📖 阅读时间计算</h1>
      <p class="subtitle">预估文章阅读所需时间</p>

      <div class="input-area">
        <textarea
          id="textInput"
          placeholder="粘贴或输入文章内容..."
          oninput="calculate()"
        ></textarea>
        <div class="settings">
          <label>阅读速度：</label>
          <select id="speedSelect" onchange="calculate()">
            <option value="200">慢速（200字/分）</option>
            <option value="300" selected>中速（300字/分）</option>
            <option value="400">快速（400字/分）</option>
            <option value="500">很快（500字/分）</option>
          </select>
        </div>
      </div>

      <div class="result-grid">
        <div class="result-card">
          <div class="result-value" id="charCount">0</div>
          <div class="result-label">字符数</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="wordCount">0</div>
          <div class="result-label">词数</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="readingTime">0 分钟</div>
          <div class="result-label">阅读时间</div>
        </div>
      </div>

      <div class="speed-comparison">
        <div class="speed-title">📊 不同速度预估</div>
        <div class="speed-grid" id="speedGrid">
          <div class="speed-item">
            <span class="speed-level">慢速阅读（200字/分）</span>
            <span class="speed-time" id="slow">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">中速阅读（300字/分）</span>
            <span class="speed-time" id="medium">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">快速阅读（400字/分）</span>
            <span class="speed-time" id="fast">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">扫读（500字/分）</span>
            <span class="speed-time" id="veryFast">-</span>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      function formatTime(minutes) {
        if (minutes < 1) {
          return "< 1 分钟";
        } else if (minutes < 60) {
          return Math.round(minutes) + " 分钟";
        } else {
          const hours = Math.floor(minutes / 60);
          const mins = Math.round(minutes % 60);
          return `${hours} 小时 ${mins} 分钟`;
        }
      }

      function countChinese(text) {
        // Count Chinese characters
        const chineseChars = text.match(/[\u4e00-\u9fa5]/g);
        return chineseChars ? chineseChars.length : 0;
      }

      function countEnglishWords(text) {
        // Count English words (sequences of Latin letters)
        const englishWords = text.match(/[a-zA-Z]+/g);
        return englishWords ? englishWords.length : 0;
      }

      function calculate() {
        const text = document.getElementById("textInput").value;
        const speed = parseInt(document.getElementById("speedSelect").value);

        // Character count
        const charCount = text.length;
        document.getElementById("charCount").textContent = charCount.toLocaleString();

        // Word count (Chinese chars + English words)
        const chineseCount = countChinese(text);
        const englishCount = countEnglishWords(text);
        const totalWords = chineseCount + englishCount;
        document.getElementById("wordCount").textContent = totalWords.toLocaleString();

        // Reading time calculation
        if (totalWords === 0) {
          document.getElementById("readingTime").textContent = "0 分钟";
          document.getElementById("slow").textContent = "-";
          document.getElementById("medium").textContent = "-";
          document.getElementById("fast").textContent = "-";
          document.getElementById("veryFast").textContent = "-";
          return;
        }

        const minutes = totalWords / speed;
        document.getElementById("readingTime").textContent = formatTime(minutes);

        // Different speeds
        document.getElementById("slow").textContent = formatTime(totalWords / 200);
        document.getElementById("medium").textContent = formatTime(totalWords / 300);
        document.getElementById("fast").textContent = formatTime(totalWords / 400);
        document.getElementById("veryFast").textContent = formatTime(totalWords / 500);
      }

      // Initialize
      calculate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

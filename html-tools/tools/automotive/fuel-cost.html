      <h1>⛽ 油费计算器</h1>
      <p class="subtitle">计算行车油费和油耗，对比用车成本</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('trip')" aria-label="单次行程">
          单次行程
        </button>
        <button class="tab" onclick="switchTab('monthly')" aria-label="月度成本">月度成本</button>
        <button class="tab" onclick="switchTab('compare')" aria-label="车型对比">车型对比</button>
      </div>

      <!-- Tab 1: Trip Calculator -->
      <div class="tab-content active" id="tripTab">
        <div class="card">
          <div class="card-title">🚗 行程信息</div>
          <div class="form-grid">
            <div class="form-group">
              <label for="input-------km-">行驶距离 (km)</label>
              <input
                type="number"
                id="tripDistance"
                value="100"
                min="0"
                step="1"
                oninput="calculateTrip()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input-----l-100km-">油耗 (L/100km)</label>
              <input
                type="number"
                id="tripConsumption"
                value="7"
                min="0"
                step="0.1"
                oninput="calculateTrip()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <div class="presets">
                <button class="preset-btn" onclick="setConsumption('tripConsumption', 5)">
                  经济 5L
                </button>
                <button class="preset-btn" onclick="setConsumption('tripConsumption', 7)">
                  适中 7L
                </button>
                <button class="preset-btn" onclick="setConsumption('tripConsumption', 10)">
                  SUV 10L
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="input-------l-">油价 (元/L)</label>
              <input
                type="number"
                id="tripPrice"
                value="7.5"
                min="0"
                step="0.1"
                oninput="calculateTrip()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <div class="presets">
                <button
                  class="preset-btn"
                  onclick="setPrice('tripPrice', 7.2)"
                  aria-label="92# 7.2"
                >
                  92# 7.2
                </button>
                <button
                  class="preset-btn"
                  onclick="setPrice('tripPrice', 7.8)"
                  aria-label="95# 7.8"
                >
                  95# 7.8
                </button>
                <button
                  class="preset-btn"
                  onclick="setPrice('tripPrice', 8.5)"
                  aria-label="98# 8.5"
                >
                  98# 8.5
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="result-card">
          <div class="result-main">
            <div class="result-label">本次行程油费</div>
            <div class="result-value" id="tripCost">¥0.00</div>
          </div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-item-label">消耗汽油</div>
              <div class="result-item-value" id="tripFuel">0 L</div>
            </div>
            <div class="result-item">
              <div class="result-item-label">每公里成本</div>
              <div class="result-item-value" id="tripPerKm">¥0.00</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab 2: Monthly Cost -->
      <div class="tab-content" id="monthlyTab">
        <div class="card">
          <div class="card-title">📅 月度用车</div>
          <div class="form-grid">
            <div class="form-group">
              <label for="input--------km-">月行驶里程 (km)</label>
              <input
                type="number"
                id="monthlyDistance"
                value="1000"
                min="0"
                step="100"
                oninput="calculateMonthly()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input-----l-100km-">油耗 (L/100km)</label>
              <input
                type="number"
                id="monthlyConsumption"
                value="7"
                min="0"
                step="0.1"
                oninput="calculateMonthly()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input-------l-">油价 (元/L)</label>
              <input
                type="number"
                id="monthlyPrice"
                value="7.5"
                min="0"
                step="0.1"
                oninput="calculateMonthly()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
        </div>

        <div class="result-card">
          <div class="result-main">
            <div class="result-label">月度油费</div>
            <div class="result-value" id="monthlyCost">¥0.00</div>
          </div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-item-label">年度油费</div>
              <div class="result-item-value" id="yearlyCost">¥0</div>
            </div>
            <div class="result-item">
              <div class="result-item-label">月消耗汽油</div>
              <div class="result-item-value" id="monthlyFuel">0 L</div>
            </div>
            <div class="result-item">
              <div class="result-item-label">年消耗汽油</div>
              <div class="result-item-value" id="yearlyFuel">0 L</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab 3: Compare -->
      <div class="tab-content" id="compareTab">
        <div class="card">
          <div class="card-title">🔄 车型对比</div>
          <div class="form-group">
            <label for="input--------km-">月行驶里程 (km)</label>
            <input
              type="number"
              id="compareDistance"
              value="1000"
              min="0"
              step="100"
              oninput="calculateCompare()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------l-">油价 (元/L)</label>
            <input
              type="number"
              id="comparePrice"
              value="7.5"
              min="0"
              step="0.1"
              oninput="calculateCompare()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>

        <div class="comparison">
          <div class="comparison-title">💰 不同油耗车型月度成本对比</div>
          <div class="comparison-row">
            <div class="comparison-label">车型类型</div>
            <div class="comparison-label" style="text-align: right">油耗</div>
            <div class="comparison-label" style="text-align: right">月油费</div>
          </div>
          <div id="comparisonContent"></div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      function switchTab(tab) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((t) => t.classList.remove("active"));

        event.target.classList.add("active");
        document.getElementById(tab + "Tab").classList.add("active");

        if (tab === "trip") calculateTrip();
        if (tab === "monthly") calculateMonthly();
        if (tab === "compare") calculateCompare();
      }

      function setConsumption(inputId, value) {
        document.getElementById(inputId).value = value;
        if (inputId === "tripConsumption") calculateTrip();
        if (inputId === "monthlyConsumption") calculateMonthly();
      }

      function setPrice(inputId, value) {
        document.getElementById(inputId).value = value;
        if (inputId === "tripPrice") calculateTrip();
        if (inputId === "monthlyPrice") calculateMonthly();
        if (inputId === "comparePrice") calculateCompare();
      }

      function calculateTrip() {
        const distance = parseFloat(document.getElementById("tripDistance").value) || 0;
        const consumption = parseFloat(document.getElementById("tripConsumption").value) || 0;
        const price = parseFloat(document.getElementById("tripPrice").value) || 0;

        const fuel = (distance * consumption) / 100;
        const cost = fuel * price;
        const perKm = cost / distance;

        document.getElementById("tripCost").textContent = "¥" + cost.toFixed(2);
        document.getElementById("tripFuel").textContent = fuel.toFixed(2) + " L";
        document.getElementById("tripPerKm").textContent = perKm ? "¥" + perKm.toFixed(2) : "¥0.00";
      }

      function calculateMonthly() {
        const distance = parseFloat(document.getElementById("monthlyDistance").value) || 0;
        const consumption = parseFloat(document.getElementById("monthlyConsumption").value) || 0;
        const price = parseFloat(document.getElementById("monthlyPrice").value) || 0;

        const monthlyFuel = (distance * consumption) / 100;
        const monthlyCost = monthlyFuel * price;
        const yearlyFuel = monthlyFuel * 12;
        const yearlyCost = monthlyCost * 12;

        document.getElementById("monthlyCost").textContent = "¥" + monthlyCost.toFixed(2);
        document.getElementById("yearlyCost").textContent = "¥" + yearlyCost.toFixed(0);
        document.getElementById("monthlyFuel").textContent = monthlyFuel.toFixed(1) + " L";
        document.getElementById("yearlyFuel").textContent = yearlyFuel.toFixed(0) + " L";
      }

      function calculateCompare() {
        const distance = parseFloat(document.getElementById("compareDistance").value) || 0;
        const price = parseFloat(document.getElementById("comparePrice").value) || 0;

        const carTypes = [
          { name: "节能车 (混动)", consumption: 4 },
          { name: "小型车", consumption: 6 },
          { name: "紧凑型车", consumption: 7 },
          { name: "中型车", consumption: 8 },
          { name: "中大型车", consumption: 9 },
          { name: "SUV", consumption: 10 },
          { name: "大型SUV", consumption: 12 },
          { name: "性能车", consumption: 14 }
        ];

        const content = carTypes
          .map((car) => {
            const fuel = (distance * car.consumption) / 100;
            const cost = fuel * price;
            return `
          <div class="comparison-row">
            <div class="comparison-label">${car.name}</div>
            <div class="comparison-value" style="color:var(--color-text-secondary)">${car.consumption}L/100km</div>
            <div class="comparison-value" style="color:var(--accent-orange)">¥${cost.toFixed(0)}</div>
          </div>
        `;
          })
          .join("");

        document.getElementById("comparisonContent").innerHTML = content;
      }

      // Initialize
      calculateTrip();
      calculateMonthly();
      calculateCompare();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

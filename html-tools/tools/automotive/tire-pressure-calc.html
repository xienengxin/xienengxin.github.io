  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>🚗 胎压转换</h1>
      <div class="card">
        <label for="psi-input">输入胎压 (PSI)</label>
        <input
          type="number"
          id="psi-input"
          value="32"
          placeholder="输入PSI值，如：32"
          oninput="convert()"
          aria-label="胎压 PSI 输入框"
        />
        <div class="result" role="region" aria-live="polite" aria-label="转换结果">
          <div>
            <strong>Bar:</strong>
            <span id="bar">-</span>
          </div>
          <div>
            <strong>kPa:</strong>
            <span id="kpa">-</span>
          </div>
        </div>
        <div class="btn-group">
          <button onclick="copyResult()" aria-label="复制转换结果">📋 复制结果</button>
          <button onclick="reset()" aria-label="重置输入">🗑️ 重置</button>
        </div>
      </div>
    </div>
    <script>
      function convert() {
        const psi = parseFloat(document.getElementById("psi-input").value) || 0;
        const bar = psi / 14.504;
        const kpa = psi * 6.895;
        document.getElementById("bar").textContent = bar.toFixed(2);
        document.getElementById("kpa").textContent = kpa.toFixed(1);
      }

      function copyResult() {
        const psi = document.getElementById("psi-input").value;
        const bar = document.getElementById("bar").textContent;
        const kpa = document.getElementById("kpa").textContent;
        const text = `胎压转换结果：\nPSI: ${psi}\nBar: ${bar}\nkPa: ${kpa}`;
        navigator.clipboard.writeText(text).then(() => {
          alert("已复制到剪贴板！");
        });
      }

      function reset() {
        document.getElementById("psi-input").value = "32";
        convert();
      }

      convert();
    </script>

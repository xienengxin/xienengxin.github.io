  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      折扣计算器
    </nav>
    <main class="container">
      <header>
        <h1>🏷️ 折扣计算器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
      </header>

      <article>
        <label>计算模式</label>
        <div class="calc-mode">
          <button class="active" onclick="setMode('calcFinal')">算到手价</button>
          <button onclick="setMode('calcDiscount')">算折扣</button>
          <button onclick="setMode('calcOriginal')">算原价</button>
        </div>

        <!-- 模式1: 已知原价和折扣，算到手价 -->
        <div id="mode-calcFinal" class="input-section active">
          <label for="original1">
            原价
            <input
              type="number"
              id="original1"
              placeholder="请输入原价"
              min="0"
              step="0.01"
              oninput="calculate()"
            />
          </label>

          <label>快速选择折扣</label>
          <div class="discount-presets">
            <button onclick="setDiscount(50)">5折</button>
            <button onclick="setDiscount(60)">6折</button>
            <button onclick="setDiscount(70)">7折</button>
            <button onclick="setDiscount(80)">8折</button>
            <button onclick="setDiscount(85)">8.5折</button>
            <button onclick="setDiscount(90)">9折</button>
            <button onclick="setDiscount(95)">9.5折</button>
          </div>

          <label for="discount1">
            折扣 (如：8折输入80，打7折输入70)
            <input
              type="number"
              id="discount1"
              placeholder="输入折扣，如80表示8折"
              min="0"
              max="100"
              step="1"
              oninput="calculate()"
            />
          </label>
        </div>

        <!-- 模式2: 已知原价和到手价，算折扣 -->
        <div id="mode-calcDiscount" class="input-section">
          <label for="original2">
            原价
            <input
              type="number"
              id="original2"
              placeholder="请输入原价"
              min="0"
              step="0.01"
              oninput="calculate()"
            />
          </label>
          <label for="final2">
            到手价
            <input
              type="number"
              id="final2"
              placeholder="请输入到手价"
              min="0"
              step="0.01"
              oninput="calculate()"
            />
          </label>
        </div>

        <!-- 模式3: 已知到手价和折扣，算原价 -->
        <div id="mode-calcOriginal" class="input-section">
          <label for="final3">
            到手价
            <input
              type="number"
              id="final3"
              placeholder="请输入到手价"
              min="0"
              step="0.01"
              oninput="calculate()"
            />
          </label>
          <label for="discount3">
            折扣 (如：8折输入80)
            <input
              type="number"
              id="discount3"
              placeholder="输入折扣，如80表示8折"
              min="1"
              max="100"
              step="1"
              oninput="calculate()"
            />
          </label>
        </div>
      </article>

      <div class="result-card">
        <h3>计算结果</h3>
        <div class="result-row">
          <span class="result-label">原价</span>
          <span class="result-value" id="resultOriginal">¥0.00</span>
        </div>
        <div class="result-row">
          <span class="result-label">折扣</span>
          <span class="result-value" id="resultDiscount">0折</span>
        </div>
        <div class="result-row">
          <span class="result-label">到手价</span>
          <span class="result-value highlight" id="resultFinal">¥0.00</span>
        </div>
        <div class="result-row">
          <span class="result-label">节省金额</span>
          <span class="result-value savings" id="resultSavings">¥0.00</span>
        </div>
        <div class="result-row">
          <span class="result-label">节省比例</span>
          <span class="result-value savings" id="resultSavingsPercent">0%</span>
        </div>
      </div>

    <script>
      let currentMode = "calcFinal";

      // 主题切换
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // 加载保存的主题
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      // 设置计算模式
      window.setMode = function (mode) {
        currentMode = mode;

        // 更新按钮状态
        document.querySelectorAll(".calc-mode button").forEach((btn, index) => {
          btn.classList.remove("active");
          if (
            (mode === "calcFinal" && index === 0) ||
            (mode === "calcDiscount" && index === 1) ||
            (mode === "calcOriginal" && index === 2)
          ) {
            btn.classList.add("active");
          }
        });

        // 显示对应输入区域
        document.querySelectorAll(".input-section").forEach((section) => {
          section.classList.remove("active");
        });
        document.getElementById("mode-" + mode).classList.add("active");

        calculate();
      };

      // 设置预设折扣
      window.setDiscount = function (discount) {
        document.getElementById("discount1").value = discount;

        document.querySelectorAll(".discount-presets button").forEach((btn) => {
          btn.classList.remove("active");
          const btnDiscount = parseInt(btn.textContent) * 10;
          if (btnDiscount === discount) {
            btn.classList.add("active");
          }
        });

        calculate();
      };

      // 计算
      window.calculate = function () {
        let original = 0,
          discount = 0,
          final = 0,
          savings = 0,
          savingsPercent = 0;

        if (currentMode === "calcFinal") {
          original = parseFloat(document.getElementById("original1").value) || 0;
          discount = parseFloat(document.getElementById("discount1").value) || 0;
          final = original * (discount / 100);

          // 更新预设按钮状态
          document.querySelectorAll(".discount-presets button").forEach((btn) => {
            btn.classList.remove("active");
            const btnDiscount = parseFloat(btn.textContent) * 10;
            if (btnDiscount === discount) {
              btn.classList.add("active");
            }
          });
        } else if (currentMode === "calcDiscount") {
          original = parseFloat(document.getElementById("original2").value) || 0;
          final = parseFloat(document.getElementById("final2").value) || 0;
          discount = original > 0 ? (final / original) * 100 : 0;
        } else if (currentMode === "calcOriginal") {
          final = parseFloat(document.getElementById("final3").value) || 0;
          discount = parseFloat(document.getElementById("discount3").value) || 0;
          original = discount > 0 ? final / (discount / 100) : 0;
        }

        savings = original - final;
        savingsPercent = original > 0 ? (savings / original) * 100 : 0;

        document.getElementById("resultOriginal").textContent = "¥" + original.toFixed(2);
        document.getElementById("resultDiscount").textContent = (discount / 10).toFixed(1) + "折";
        document.getElementById("resultFinal").textContent = "¥" + final.toFixed(2);
        document.getElementById("resultSavings").textContent = "¥" + savings.toFixed(2);
        document.getElementById("resultSavingsPercent").textContent =
          savingsPercent.toFixed(1) + "%";
      };

      // 初始计算
      calculate();
    </script>
  </body>
</html>

              type="number"
              id="principal"

              placeholder="请输入数字输入框"
            />
            <span class="unit">元</span>
          </div>

            type="range"
            id="principalRange"
            min="100000"
            max="10000000"
            step="100000"
            value="1000000"
            oninput="syncInput('principal', this.value)"
          />
          <div class="range-labels">
            <span>10万</span>
            <span>1000万</span>
          </div>
        </div>

        <div class="form-group">
          <label>贷款期限</label>
          <div class="input-with-unit">
            <input
              type="number"
              id="years"
              value="30"
              min="1"
              max="30"
              aria-label="数字输入框"

            />

          </div>
          <input
            type="range"
            id="yearsRange"
            min="1"
            max="30"
            value="30"
            oninput="syncInput('years', this.value)"
          />
          <div class="range-labels">
            <span>1年</span>
            <span>30年</span>
          </div>
        </div>

        <div class="form-group">
          <label>年利率 (LPR)</label>
          <div class="input-with-unit">
            <input
              type="number"
              id="rate"
              value="3.45"
              min="0.1"
              max="10"
              step="0.01"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <span class="unit">%</span>
          </div>
          <input
            type="range"
            id="rateRange"
            min="1"
            max="8"
            step="0.05"
            value="3.45"
            oninput="syncInput('rate', this.value)"
          />
          <div class="range-labels">
            <span>1%</span>
            <span>8%</span>
          </div>
        </div>

        <div class="form-group">
          <label>还款方式</label>
          <div class="method-toggle">
            <button class="method-btn active" onclick="setMethod('equal')" aria-label="等额本息">
              等额本息
            </button>
            <button class="method-btn" onclick="setMethod('principal')" aria-label="等额本金">
              等额本金
            </button>
          </div>
        </div>

        <button class="btn" onclick="calculate()" aria-label="计算还款">计算还款</button>
      </div>

      <div class="result-section">
        <h3>📊 还款概览</h3>

        <div class="result-card">
          <div class="result-card-title">每月还款</div>
          <div class="result-card-value" id="monthlyPayment">¥0</div>
          <div class="result-card-sub" id="monthlyNote"></div>
        </div>

        <div class="summary-row">
          <span class="summary-label">贷款总额</span>
          <span class="summary-value" id="totalPrincipal">¥0</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">支付利息</span>
          <span class="summary-value" id="totalInterest">¥0</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">还款总额</span>
          <span class="summary-value" id="totalPayment">¥0</span>
        </div>

        <div class="chart-container">
          <div class="chart-bar" id="chartBar">
            <div class="chart-bar-principal" style="width: 50%"></div>
            <div class="chart-bar-interest" style="width: 50%"></div>
          </div>
          <div class="chart-legend">
            <div class="chart-legend-item">
              <div class="chart-legend-dot" style="background: var(--accent-cyan)"></div>
              <span>本金</span>
            </div>
            <div class="chart-legend-item">
              <div class="chart-legend-dot" style="background: #6366f1"></div>
              <span>利息</span>
            </div>
          </div>
        </div>
      </div>

      <div class="schedule-section" id="scheduleSection" style="display: none">
        <div class="schedule-header">
          <h3>📅 还款明细</h3>
          <button class="toggle-btn" onclick="toggleSchedule()" aria-label="收起">收起</button>
        </div>
        <div class="schedule-table">
          <table>
            <thead>
              <tr>
                <th>期数</th>
                <th>月供</th>
                <th>本金</th>
                <th>利息</th>
                <th>剩余本金</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      let method = "equal"; // equal: 等额本息, principal: 等额本金

      window.syncInput = function (name, value) {
        document.getElementById(name).value = value;
      };

      // Sync range with input
      ["principal", "years", "rate"].forEach((name) => {
        document.getElementById(name).addEventListener("input", function () {
          document.getElementById(name + "Range").value = this.value;
        });
      });

      window.setMethod = function (m) {
        method = m;
        document.querySelectorAll(".method-btn").forEach((btn) => btn.classList.remove("active"));
        document.querySelector(`.method-btn[onclick="setMethod('${m}')"]`).classList.add("active");
      };

      function formatMoney(num) {
        return (
          "¥" + num.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
        );
      }

      window.calculate = function () {
        const principal = parseFloat(document.getElementById("principal").value);
        const years = parseInt(document.getElementById("years").value);
        const annualRate = parseFloat(document.getElementById("rate").value) / 100;

        const months = years * 12;
        const monthlyRate = annualRate / 12;

        let schedule = [];
        let totalInterest = 0;
        let monthlyPayment;

        if (method === "equal") {
          // 等额本息
          monthlyPayment =
            (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) /
            (Math.pow(1 + monthlyRate, months) - 1);

          let remaining = principal;
          for (let i = 1; i <= months; i++) {
            const interest = remaining * monthlyRate;
            const principalPart = monthlyPayment - interest;
            remaining -= principalPart;
            totalInterest += interest;

            schedule.push({
              month: i,
              payment: monthlyPayment,
              principal: principalPart,
              interest: interest,
              remaining: Math.max(0, remaining)
            });
          }

          document.getElementById("monthlyPayment").textContent = formatMoney(monthlyPayment);
          document.getElementById("monthlyNote").textContent = "每月还款金额固定";
        } else {
          // 等额本金
          const monthlyPrincipal = principal / months;
          let remaining = principal;

          for (let i = 1; i <= months; i++) {
            const interest = remaining * monthlyRate;
            const payment = monthlyPrincipal + interest;
            remaining -= monthlyPrincipal;
            totalInterest += interest;

            schedule.push({
              month: i,
              payment: payment,
              principal: monthlyPrincipal,
              interest: interest,
              remaining: Math.max(0, remaining)
            });
          }

          const firstPayment = schedule[0].payment;
          const lastPayment = schedule[schedule.length - 1].payment;
          document.getElementById("monthlyPayment").textContent = formatMoney(firstPayment);
          document.getElementById("monthlyNote").textContent =
            `首月${formatMoney(firstPayment)}，末月${formatMoney(lastPayment)}`;
        }

        const totalPayment = principal + totalInterest;

        document.getElementById("totalPrincipal").textContent = formatMoney(principal);
        document.getElementById("totalInterest").textContent = formatMoney(totalInterest);
        document.getElementById("totalPayment").textContent = formatMoney(totalPayment);

        // Update chart
        const principalPercent = ((principal / totalPayment) * 100).toFixed(1);
        const interestPercent = ((totalInterest / totalPayment) * 100).toFixed(1);
        document.getElementById("chartBar").innerHTML = `
                <div class="chart-bar-principal" style="width: ${principalPercent}%" title="本金 ${principalPercent}%"></div>
                <div class="chart-bar-interest" style="width: ${interestPercent}%" title="利息 ${interestPercent}%"></div>
            `;

        // Render schedule
        renderSchedule(schedule);
      };

      function renderSchedule(schedule) {
        document.getElementById("scheduleSection").style.display = "block";

        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = schedule
          .map(
            (row) => `
                <tr>
                    <td>第${row.month}期</td>
                    <td>${formatMoney(row.payment)}</td>
                    <td>${formatMoney(row.principal)}</td>
                    <td>${formatMoney(row.interest)}</td>
                    <td>${formatMoney(row.remaining)}</td>
                </tr>
            `
          )
          .join("");
      }

      window.toggleSchedule = function () {
        const section = document.getElementById("scheduleSection");
        const btn = section.querySelector(".toggle-btn");
        const table = section.querySelector(".schedule-table");

        if (table.style.display === "none") {
          table.style.display = "block";
          btn.textContent = "收起";
        } else {
          table.style.display = "none";
          btn.textContent = "展开";
        }
      };

      // Initial calculation
      calculate();
    </script>
  </body>
</html>

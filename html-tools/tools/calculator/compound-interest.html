  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>

    <div class="container">
      <h1>💰 复利计算器</h1>
      <div class="card">
        <div class="input-group">
          <label for="input---------">初始本金 (元)</label>
          <input
            type="number"
            id="principal"
            value="100000"
            min="0"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label for="input--------">年利率 (%)</label>
          <input
            type="number"
            id="rate"
            value="5"
            min="0"
            step="0.1"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label for="input-----">投资年限</label>
          <input
            type="number"
            id="years"
            value="10"
            min="1"
            max="50"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label>复利频率</label>
          <select id="frequency">
            <option value="1">每年</option>
            <option value="2">每半年</option>
            <option value="4">每季度</option>
            <option value="12" selected>每月</option>
            <option value="365">每天</option>
          </select>
        </div>
        <div class="input-group">
          <label for="input-----------">每月追加投资 (元)</label>
          <input
            type="number"
            id="monthly"
            value="1000"
            min="0"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="result">
          <div class="result-main" id="total">--</div>
          <div class="result-detail">
            <div class="detail-item">
              <div class="detail-value" id="totalPrincipal">--</div>
              <div class="detail-label">投入本金</div>
            </div>
            <div class="detail-item">
              <div class="detail-value" id="totalInterest">--</div>
              <div class="detail-label">利息收益</div>
            </div>
          </div>
        </div>
        <div class="chart">
          <div class="chart-title">资产增长曲线</div>
          <div class="bar-container" id="chart"></div>
        </div>
      </div>
    </div>
    <script>
      function calculate() {
        const P = parseFloat(document.getElementById("principal").value) || 0;
        const r = parseFloat(document.getElementById("rate").value) / 100;
        const t = parseInt(document.getElementById("years").value) || 1;
        const n = parseInt(document.getElementById("frequency").value);
        const monthly = parseFloat(document.getElementById("monthly").value) || 0;

        // 复利公式: A = P(1 + r/n)^(nt) + PMT * [((1 + r/n)^(nt) - 1) / (r/n)]
        const rn = r / n;
        const nt = n * t;
        const compoundFactor = Math.pow(1 + rn, nt);

        let total = P * compoundFactor;
        if (monthly > 0 && rn > 0) {
          total += monthly * ((compoundFactor - 1) / rn);
        } else if (monthly > 0) {
          total += monthly * nt;
        }

        const totalPrincipal = P + monthly * 12 * t;
        const totalInterest = total - totalPrincipal;

        document.getElementById("total").textContent =
          "¥" + total.toLocaleString("zh-CN", { maximumFractionDigits: 2 });
        document.getElementById("totalPrincipal").textContent =
          "¥" + totalPrincipal.toLocaleString("zh-CN", { maximumFractionDigits: 0 });
        document.getElementById("totalInterest").textContent =
          "¥" + totalInterest.toLocaleString("zh-CN", { maximumFractionDigits: 0 });

        // 绘制图表
        const years = [];
        for (let i = 0; i <= t; i++) {
          const yn = n * i;
          const cf = Math.pow(1 + rn, yn);
          let value = P * cf;
          if (monthly > 0 && rn > 0) value += monthly * ((cf - 1) / rn);
          else if (monthly > 0) value += monthly * yn;
          years.push({ year: i, value });
        }

        const maxValue = Math.max(...years.map((y) => y.value));
        document.getElementById("chart").innerHTML = years
          .map(
            (y) =>
              `<div class="bar" style="height: ${(y.value / maxValue) * 100}%"><span class="bar-label">${y.year}年</span></div>`
          )
          .join("");
      }

      document
        .querySelectorAll("input, select")
        .forEach((el) => el.addEventListener("input", calculate));
      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>

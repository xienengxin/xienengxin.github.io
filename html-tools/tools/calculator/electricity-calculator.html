    <nav class="breadcrumb">

    <div class="container">
      <h1>💡 电费计算器</h1>
      <div class="card">
        <div class="input-group">
          <label for="input---------kwh-">月用电量 (度/kWh)</label>
          <input
            type="number"
            id="usage"
            value="200"
            min="0"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label>电价标准</label>
          <select id="priceType">
            <option value="residential">居民用电 (阶梯电价)</option>
            <option value="commercial">商业用电</option>
            <option value="industrial">工业用电</option>
          </select>
        </div>
        <div class="result">
          <div class="result-value" id="total">¥0.00</div>
          <div class="result-label">预计电费</div>
        </div>
        <div class="breakdown" id="breakdown"></div>
      </div>
    </div>
    <script>
      function calculate() {
        const usage = parseFloat(document.getElementById("usage").value) || 0;
        const type = document.getElementById("priceType").value;
        let total = 0,
          breakdown = [];

        if (type === "residential") {
          // 阶梯电价示例
          if (usage <= 200) {
            total = usage * 0.52;
            breakdown.push({ label: "第一档 (0-200度)", value: usage * 0.52, kwh: usage });
          } else if (usage <= 400) {
            total = 200 * 0.52 + (usage - 200) * 0.57;
            breakdown.push({ label: "第一档 (0-200度)", value: 200 * 0.52, kwh: 200 });
            breakdown.push({
              label: "第二档 (201-400度)",
              value: (usage - 200) * 0.57,
              kwh: usage - 200
            });
          } else {
            total = 200 * 0.52 + 200 * 0.57 + (usage - 400) * 0.82;
            breakdown.push({ label: "第一档 (0-200度)", value: 200 * 0.52, kwh: 200 });
            breakdown.push({ label: "第二档 (201-400度)", value: 200 * 0.57, kwh: 200 });
            breakdown.push({
              label: "第三档 (>400度)",
              value: (usage - 400) * 0.82,
              kwh: usage - 400
            });
          }
        } else if (type === "commercial") {
          total = usage * 0.85;
          breakdown.push({ label: "商业电价", value: total, kwh: usage });
        } else {
          total = usage * 0.65;
          breakdown.push({ label: "工业电价", value: total, kwh: usage });
        }

        document.getElementById("total").textContent = "¥" + total.toFixed(2);
        document.getElementById("breakdown").innerHTML = breakdown
          .map(
            (b) =>
              '<div class="breakdown-item"><span>' +
              b.label +
              " (" +
              b.kwh +
              "度)</span><span>¥" +
              b.value.toFixed(2) +
              "</span></div>"
          )
          .join("");
      }
      document.getElementById("usage").addEventListener("input", calculate);
      document.getElementById("priceType").addEventListener("change", calculate);
      calculate();
    </script>

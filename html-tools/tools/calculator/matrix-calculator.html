    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>
      </div>
      <h1>🔢 矩阵计算器</h1>
      <p>矩阵加减乘法、转置、行列式、逆矩阵等运算</p>
    </div>

    <div class="container">
      <div class="matrices-row">
        <div class="matrix-panel">
          <div class="matrix-header">
            <h3>矩阵 A</h3>
            <div class="size-controls">
              <input
                type="number"
                id="rowsA"
                value="3"
                min="1"
                max="6"
                onchange="resizeMatrix('A')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <span>×</span>
              <input
                type="number"
                id="colsA"
                value="3"
                min="1"
                max="6"
                onchange="resizeMatrix('A')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
          <div class="matrix-grid" id="matrixA"></div>
          <div class="presets">
            <button class="preset-btn" onclick="setIdentity('A')" aria-label="单位矩阵">
              单位矩阵
            </button>
            <button class="preset-btn" onclick="setZero('A')" aria-label="零矩阵">零矩阵</button>
            <button class="preset-btn" onclick="setRandom('A')" aria-label="随机">随机</button>
          </div>
          <div class="single-ops">
            <button class="single-op-btn" onclick="singleOp('transpose', 'A')" aria-label="转置 Aᵀ">
              转置 Aᵀ
            </button>
            <button
              class="single-op-btn"
              onclick="singleOp('determinant', 'A')"
              aria-label="行列式 |A|"
            >
              行列式 |A|
            </button>
            <button
              class="single-op-btn"
              onclick="singleOp('inverse', 'A')"
              aria-label="逆矩阵 A⁻¹"
            >
              逆矩阵 A⁻¹
            </button>
            <button class="single-op-btn" onclick="singleOp('trace', 'A')" aria-label="迹 tr(A)">
              迹 tr(A)
            </button>
            <button class="single-op-btn" onclick="singleOp('rank', 'A')" aria-label="秩 rank(A)">
              秩 rank(A)
            </button>
          </div>
        </div>

        <div class="operator-panel">
          <button class="op-btn active" onclick="setOperation('+')" aria-label="+">+</button>
          <button class="op-btn" onclick="setOperation('-')" aria-label="−">−</button>
          <button class="op-btn" onclick="setOperation('*')" aria-label="×">×</button>
        </div>

        <div class="matrix-panel">
          <div class="matrix-header">
            <h3>矩阵 B</h3>
            <div class="size-controls">
              <input
                type="number"
                id="rowsB"
                value="3"
                min="1"
                max="6"
                onchange="resizeMatrix('B')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <span>×</span>
              <input
                type="number"
                id="colsB"
                value="3"
                min="1"
                max="6"
                onchange="resizeMatrix('B')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
          <div class="matrix-grid" id="matrixB"></div>
          <div class="presets">
            <button class="preset-btn" onclick="setIdentity('B')" aria-label="单位矩阵">
              单位矩阵
            </button>
            <button class="preset-btn" onclick="setZero('B')" aria-label="零矩阵">零矩阵</button>
            <button class="preset-btn" onclick="setRandom('B')" aria-label="随机">随机</button>
          </div>
          <div class="single-ops">
            <button class="single-op-btn" onclick="singleOp('transpose', 'B')" aria-label="转置 Bᵀ">
              转置 Bᵀ
            </button>
            <button
              class="single-op-btn"
              onclick="singleOp('determinant', 'B')"
              aria-label="行列式 |B|"
            >
              行列式 |B|
            </button>
            <button
              class="single-op-btn"
              onclick="singleOp('inverse', 'B')"
              aria-label="逆矩阵 B⁻¹"
            >
              逆矩阵 B⁻¹
            </button>
            <button class="single-op-btn" onclick="singleOp('trace', 'B')" aria-label="迹 tr(B)">
              迹 tr(B)
            </button>
            <button class="single-op-btn" onclick="singleOp('rank', 'B')" aria-label="秩 rank(B)">
              秩 rank(B)
            </button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" onclick="calculate()" aria-label="= 计算结果">= 计算结果</button>
        <button class="btn btn-secondary" onclick="clearAll()" aria-label="清空">清空</button>
      </div>

      <div class="result-section">
        <h3>📊 计算结果</h3>
        <div id="resultArea">
          <span style="color: var(--color-text-secondary)">点击"计算结果"按钮查看结果</span>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      let operation = "+";

      function resizeMatrix(name) {
        const rows = parseInt(document.getElementById(`rows${name}`).value) || 2;
        const cols = parseInt(document.getElementById(`cols${name}`).value) || 2;
        const container = document.getElementById(`matrix${name}`);

        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        container.innerHTML = "";

        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            const input = document.createElement("input");
            input.type = "number";
            input.className = "matrix-cell";
            input.value = "0";
            input.dataset.row = i;
            input.dataset.col = j;
            container.appendChild(input);
          }
        }
      }

      function getMatrix(name) {
        const rows = parseInt(document.getElementById(`rows${name}`).value);
        const cols = parseInt(document.getElementById(`cols${name}`).value);
        const cells = document.querySelectorAll(`#matrix${name} .matrix-cell`);

        const matrix = [];
        let idx = 0;
        for (let i = 0; i < rows; i++) {
          matrix[i] = [];
          for (let j = 0; j < cols; j++) {
            matrix[i][j] = parseFloat(cells[idx].value) || 0;
            idx++;
          }
        }
        return matrix;
      }

      window.setOperation = function (op) {
        operation = op;
        document.querySelectorAll(".op-btn").forEach((btn) => btn.classList.remove("active"));
        document.querySelector(`.op-btn[onclick="setOperation('${op}')"]`).classList.add("active");
      };

      window.setIdentity = function (name) {
        const rows = parseInt(document.getElementById(`rows${name}`).value);
        const cols = parseInt(document.getElementById(`cols${name}`).value);
        const cells = document.querySelectorAll(`#matrix${name} .matrix-cell`);

        let idx = 0;
        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            cells[idx].value = i === j ? 1 : 0;
            idx++;
          }
        }
      };

      function setZero(name) {
        const cells = document.querySelectorAll(`#matrix${name} .matrix-cell`);
        cells.forEach((cell) => (cell.value = 0));
      }

      window.setRandom = function (name) {
        const cells = document.querySelectorAll(`#matrix${name} .matrix-cell`);
        cells.forEach((cell) => (cell.value = Math.floor(Math.random() * 19) - 9));
      };

      function matrixAdd(A, B) {
        if (A.length !== B.length || A[0].length !== B[0].length) {
          throw new Error("矩阵维度不匹配");
        }
        return A.map((row, i) => row.map((val, j) => val + B[i][j]));
      }

      function matrixSub(A, B) {
        if (A.length !== B.length || A[0].length !== B[0].length) {
          throw new Error("矩阵维度不匹配");
        }
        return A.map((row, i) => row.map((val, j) => val - B[i][j]));
      }

      function matrixMul(A, B) {
        if (A[0].length !== B.length) {
          throw new Error("矩阵A的列数必须等于矩阵B的行数");
        }
        const result = [];
        for (let i = 0; i < A.length; i++) {
          result[i] = [];
          for (let j = 0; j < B[0].length; j++) {
            let sum = 0;
            for (let k = 0; k < A[0].length; k++) {
              sum += A[i][k] * B[k][j];
            }
            result[i][j] = sum;
          }
        }
        return result;
      }

      function transpose(M) {
        return M[0].map((_, j) => M.map((row) => row[j]));
      }

      function determinant(M) {
        const n = M.length;
        if (n !== M[0].length) throw new Error("必须是方阵");

        if (n === 1) return M[0][0];
        if (n === 2) return M[0][0] * M[1][1] - M[0][1] * M[1][0];

        let det = 0;
        for (let j = 0; j < n; j++) {
          det += Math.pow(-1, j) * M[0][j] * determinant(minor(M, 0, j));
        }
        return det;
      }

      function minor(M, row, col) {
        return M.filter((_, i) => i !== row).map((r) => r.filter((_, j) => j !== col));
      }

      function inverse(M) {
        const n = M.length;
        if (n !== M[0].length) throw new Error("必须是方阵");

        const det = determinant(M);
        if (Math.abs(det) < 1e-10) throw new Error("矩阵不可逆（行列式为0）");

        if (n === 1) return [[1 / M[0][0]]];

        // Calculate adjugate matrix
        const adj = [];
        for (let i = 0; i < n; i++) {
          adj[i] = [];
          for (let j = 0; j < n; j++) {
            adj[i][j] = Math.pow(-1, i + j) * determinant(minor(M, j, i));
          }
        }

        return adj.map((row) => row.map((val) => val / det));
      }

      function trace(M) {
        if (M.length !== M[0].length) throw new Error("必须是方阵");
        return M.reduce((sum, row, i) => sum + row[i], 0);
      }

      function rank(M) {
        // Create a copy
        const m = M.map((row) => [...row]);
        const rows = m.length;
        const cols = m[0].length;
        let r = 0;

        for (let c = 0; c < cols && r < rows; c++) {
          // Find pivot
          let pivot = r;
          for (let i = r + 1; i < rows; i++) {
            if (Math.abs(m[i][c]) > Math.abs(m[pivot][c])) pivot = i;
          }

          if (Math.abs(m[pivot][c]) < 1e-10) continue;

          // Swap rows
          [m[r], m[pivot]] = [m[pivot], m[r]];

          // Eliminate
          for (let i = r + 1; i < rows; i++) {
            const factor = m[i][c] / m[r][c];
            for (let j = c; j < cols; j++) {
              m[i][j] -= factor * m[r][j];
            }
          }
          r++;
        }
        return r;
      }

      window.calculate = function () {
        try {
          const A = getMatrix("A");
          const B = getMatrix("B");
          let result;

          switch (operation) {
            case "+":
              result = matrixAdd(A, B);
              break;
            case "-":
              result = matrixSub(A, B);
              break;
            case "*":
              result = matrixMul(A, B);
              break;
          }

          displayMatrix(result);
        } catch (e) {
          document.getElementById("resultArea").innerHTML =
            `<div class="error-message">${e.message}</div>`;
        }
      };

      window.singleOp = function (op, name) {
        try {
          const M = getMatrix(name);
          let result;
          let isScalar = false;

          switch (op) {
            case "transpose":
              result = transpose(M);
              break;
            case "determinant":
              result = determinant(M);
              isScalar = true;
              break;
            case "inverse":
              result = inverse(M);
              break;
            case "trace":
              result = trace(M);
              isScalar = true;
              break;
            case "rank":
              result = rank(M);
              isScalar = true;
              break;
          }

          if (isScalar) {
            displayScalar(result);
          } else {
            displayMatrix(result);
          }
        } catch (e) {
          document.getElementById("resultArea").innerHTML =
            `<div class="error-message">${e.message}</div>`;
        }
      };

      function displayMatrix(M) {
        const rows = M.length;
        const cols = M[0].length;

        let html = `<div class="result-matrix" style="grid-template-columns: repeat(${cols}, 1fr)">`;
        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            const val = M[i][j];
            const formatted = Number.isInteger(val) ? val : val.toFixed(4);
            html += `<div class="result-cell">${formatted}</div>`;
          }
        }
        html += "</div>";

        document.getElementById("resultArea").innerHTML = html;
      }

      function displayScalar(val) {
        const formatted = Number.isInteger(val) ? val : val.toFixed(6);
        document.getElementById("resultArea").innerHTML =
          `<div class="scalar-result">${formatted}</div>`;
      }

      window.clearAll = function () {
        setZero("A");
        setZero("B");
        document.getElementById("resultArea").innerHTML =
          '<span style="color: var(--color-text-secondary);">点击"计算结果"按钮查看结果</span>';
      };

      // Initialize
      resizeMatrix("A");
      resizeMatrix("B");
    </script>
  </body>
</html>

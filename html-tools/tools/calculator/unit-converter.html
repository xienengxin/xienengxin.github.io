    <style>
      /* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        font-size: 16px;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Category Tabs
         ============================================ */
      .category-tabs {
        display: flex;
        gap: var(--space-3);
        flex-wrap: wrap;
        margin-bottom: var(--space-6);
        justify-content: center;
      }

      .category-tab {
        padding: var(--space-3) var(--space-4);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 0.9375rem;
        font-weight: 500;
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
      }

      .category-tab:hover {
        border-color: var(--color-accent-primary);
        color: var(--color-accent-primary);
      }

      .category-tab.active {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        box-shadow: var(--shadow-glow);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Form Elements
         ============================================ */
      .input-group {
        margin-bottom: var(--space-4);
      }

      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      .converter-row {
        display: flex;
        align-items: flex-end;
        gap: var(--space-3);
        flex-wrap: wrap;
      }

      .converter-input {
        flex: 1;
        min-width: 150px;
      }

      .converter-input label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      input[type="number"],
      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }

      input[type="number"]:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      /* Buttons */
      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      .swap-btn {
        padding: var(--space-3);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 1.25rem;
        transition: all var(--transition-fast);
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }

      .swap-btn:hover {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
      }

      /* ============================================
         Formula Display
         ============================================ */
      .formula {
        text-align: center;
        padding: var(--space-4);
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        margin-top: var(--space-4);
      }

      /* ============================================
         Quick Values Grid
         ============================================ */
      .quick-values {
        margin-top: var(--space-6);
        padding-top: var(--space-6);
        border-top: 1px solid var(--color-border-default);
      }

      .quick-values h3 {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-4);
        font-weight: 500;
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: var(--space-3);
      }

      .quick-item {
        padding: var(--space-4);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .quick-item:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-border-default);
        transform: translateY(-2px);
      }

      .quick-item-value {
        font-size: 1rem;
        font-weight: 600;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
        margin-bottom: var(--space-2);
      }

      .quick-item-label {
        font-size: 0.8125rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
        line-height: 1.4;
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .category-tabs {
          margin-bottom: var(--space-4);
        }

        .converter-row {
          flex-direction: column;
        }

        .converter-input {
          width: 100%;
          min-width: unset;
        }

        .swap-btn {
          width: 100%;
        }

        .quick-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        }

        .quick-item-label {
          font-size: 0.75rem;
        }
      }

      /* Tablet */
      @media (min-width: 480px) and (max-width: 768px) {
        .nav-back-text {
          display: inline;
        }

        .category-tabs {
          justify-content: flex-start;
          overflow-x: auto;
          padding-bottom: var(--space-2);
        }
      }

      /* Desktop */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>

        <h1 class="nav-title">单位换算器</h1>

        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <!-- Category Tabs -->
        <div class="category-tabs">
          <button class="category-tab active" onclick="setCategory('length')" aria-label="📏 长度">
            📏 长度
          </button>
          <button class="category-tab" onclick="setCategory('area')" aria-label="📐 面积">
            📐 面积
          </button>
          <button class="category-tab" onclick="setCategory('volume')" aria-label="📦 体积">
            📦 体积
          </button>
          <button class="category-tab" onclick="setCategory('weight')" aria-label="⚖️ 重量">
            ⚖️ 重量
          </button>
          <button class="category-tab" onclick="setCategory('temperature')" aria-label="🌡️ 温度">
            🌡️ 温度
          </button>
          <button class="category-tab" onclick="setCategory('speed')" aria-label="🚀 速度">
            🚀 速度
          </button>
          <button class="category-tab" onclick="setCategory('time')" aria-label="⏱️ 时间">
            ⏱️ 时间
          </button>
          <button class="category-tab" onclick="setCategory('data')" aria-label="💾 数据">
            💾 数据
          </button>
        </div>

        <!-- Converter Card -->
        <div class="card">
          <div class="input-group">
            <div class="converter-row">
              <div class="converter-input">
                <label for="input--">从</label>
                <input
                  type="number"
                  id="fromValue"
                  value="1"
                  oninput="convert('from')"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
                <select id="fromUnit" onchange="convert('from')"></select>
              </div>

              <button class="swap-btn" onclick="swapUnits()" title="交换单位" aria-label="⇄">
                ⇄
              </button>

              <div class="converter-input">
                <label for="input--">到</label>
                <input
                  type="number"
                  id="toValue"
                  oninput="convert('to')"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
                <select id="toUnit" onchange="convert('from')"></select>
              </div>
            </div>
          </div>

          <div class="formula" id="formula">1 米 = 100 厘米</div>

          <div class="quick-values">
            <h3>常用换算</h3>
            <div class="quick-grid" id="quickValues"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      // ============================================
      // Unit Conversion Data
      // ============================================
      const units = {
        length: {
          name: "长度",
          base: "m",
          units: {
            km: { name: "千米", factor: 1000 },
            m: { name: "米", factor: 1 },
            dm: { name: "分米", factor: 0.1 },
            cm: { name: "厘米", factor: 0.01 },
            mm: { name: "毫米", factor: 0.001 },
            μm: { name: "微米", factor: 0.000001 },
            nm: { name: "纳米", factor: 0.000000001 },
            mi: { name: "英里", factor: 1609.344 },
            yd: { name: "码", factor: 0.9144 },
            ft: { name: "英尺", factor: 0.3048 },
            in: { name: "英寸", factor: 0.0254 },
            nmi: { name: "海里", factor: 1852 },
            li: { name: "里", factor: 500 },
            zhang: { name: "丈", factor: 10 / 3 },
            chi: { name: "尺", factor: 1 / 3 },
            cun: { name: "寸", factor: 1 / 30 }
          },
          quick: [
            { from: "km", to: "m", value: 1 },
            { from: "m", to: "cm", value: 1 },
            { from: "mi", to: "km", value: 1 },
            { from: "ft", to: "m", value: 1 },
            { from: "in", to: "cm", value: 1 },
            { from: "li", to: "km", value: 1 }
          ]
        },
        area: {
          name: "面积",
          base: "m2",
          units: {
            km2: { name: "平方千米", factor: 1000000 },
            ha: { name: "公顷", factor: 10000 },
            m2: { name: "平方米", factor: 1 },
            dm2: { name: "平方分米", factor: 0.01 },
            cm2: { name: "平方厘米", factor: 0.0001 },
            mm2: { name: "平方毫米", factor: 0.000001 },
            mi2: { name: "平方英里", factor: 2589988.11 },
            ac: { name: "英亩", factor: 4046.86 },
            ft2: { name: "平方英尺", factor: 0.092903 },
            in2: { name: "平方英寸", factor: 0.00064516 },
            mu: { name: "亩", factor: 666.67 },
            qing: { name: "顷", factor: 66666.67 }
          },
          quick: [
            { from: "km2", to: "m2", value: 1 },
            { from: "ha", to: "m2", value: 1 },
            { from: "mu", to: "m2", value: 1 },
            { from: "ac", to: "ha", value: 1 },
            { from: "ft2", to: "m2", value: 1 }
          ]
        },
        volume: {
          name: "体积",
          base: "l",
          units: {
            m3: { name: "立方米", factor: 1000 },
            l: { name: "升", factor: 1 },
            ml: { name: "毫升", factor: 0.001 },
            dm3: { name: "立方分米", factor: 1 },
            cm3: { name: "立方厘米", factor: 0.001 },
            mm3: { name: "立方毫米", factor: 0.000001 },
            gal: { name: "加仑(美)", factor: 3.78541 },
            qt: { name: "夸脱", factor: 0.946353 },
            pt: { name: "品脱", factor: 0.473176 },
            cup: { name: "杯", factor: 0.236588 },
            floz: { name: "液盎司", factor: 0.0295735 },
            tbsp: { name: "汤匙", factor: 0.0147868 },
            tsp: { name: "茶匙", factor: 0.00492892 }
          },
          quick: [
            { from: "m3", to: "l", value: 1 },
            { from: "l", to: "ml", value: 1 },
            { from: "gal", to: "l", value: 1 },
            { from: "cup", to: "ml", value: 1 }
          ]
        },
        weight: {
          name: "重量",
          base: "kg",
          units: {
            t: { name: "吨", factor: 1000 },
            kg: { name: "千克", factor: 1 },
            g: { name: "克", factor: 0.001 },
            mg: { name: "毫克", factor: 0.000001 },
            μg: { name: "微克", factor: 0.000000001 },
            lb: { name: "磅", factor: 0.453592 },
            oz: { name: "盎司", factor: 0.0283495 },
            st: { name: "英石", factor: 6.35029 },
            jin: { name: "斤", factor: 0.5 },
            liang: { name: "两", factor: 0.05 },
            qian: { name: "钱", factor: 0.005 },
            ct: { name: "克拉", factor: 0.0002 }
          },
          quick: [
            { from: "t", to: "kg", value: 1 },
            { from: "kg", to: "g", value: 1 },
            { from: "lb", to: "kg", value: 1 },
            { from: "kg", to: "jin", value: 1 },
            { from: "oz", to: "g", value: 1 }
          ]
        },
        temperature: {
          name: "温度",
          base: "c",
          units: {
            c: { name: "摄氏度 (°C)", special: true },
            f: { name: "华氏度 (°F)", special: true },
            k: { name: "开尔文 (K)", special: true }
          },
          quick: [
            { from: "c", to: "f", value: 0 },
            { from: "c", to: "f", value: 100 },
            { from: "f", to: "c", value: 32 },
            { from: "c", to: "k", value: 0 }
          ]
        },
        speed: {
          name: "速度",
          base: "mps",
          units: {
            mps: { name: "米/秒", factor: 1 },
            kph: { name: "千米/时", factor: 0.277778 },
            mph: { name: "英里/时", factor: 0.44704 },
            knot: { name: "节", factor: 0.514444 },
            mach: { name: "马赫", factor: 340.29 },
            c: { name: "光速", factor: 299792458 }
          },
          quick: [
            { from: "kph", to: "mps", value: 100 },
            { from: "mph", to: "kph", value: 60 },
            { from: "knot", to: "kph", value: 1 },
            { from: "mach", to: "kph", value: 1 }
          ]
        },
        time: {
          name: "时间",
          base: "s",
          units: {
            y: { name: "年", factor: 31536000 },
            mo: { name: "月", factor: 2592000 },
            w: { name: "周", factor: 604800 },
            d: { name: "天", factor: 86400 },
            h: { name: "小时", factor: 3600 },
            min: { name: "分钟", factor: 60 },
            s: { name: "秒", factor: 1 },
            ms: { name: "毫秒", factor: 0.001 },
            μs: { name: "微秒", factor: 0.000001 },
            ns: { name: "纳秒", factor: 0.000000001 }
          },
          quick: [
            { from: "d", to: "h", value: 1 },
            { from: "h", to: "min", value: 1 },
            { from: "min", to: "s", value: 1 },
            { from: "y", to: "d", value: 1 }
          ]
        },
        data: {
          name: "数据",
          base: "B",
          units: {
            bit: { name: "比特", factor: 0.125 },
            B: { name: "字节", factor: 1 },
            KB: { name: "千字节", factor: 1024 },
            MB: { name: "兆字节", factor: 1048576 },
            GB: { name: "吉字节", factor: 1073741824 },
            TB: { name: "太字节", factor: 1099511627776 },
            PB: { name: "拍字节", factor: 1125899906842624 },
            KiB: { name: "KiB", factor: 1024 },
            MiB: { name: "MiB", factor: 1048576 },
            GiB: { name: "GiB", factor: 1073741824 }
          },
          quick: [
            { from: "GB", to: "MB", value: 1 },
            { from: "MB", to: "KB", value: 1 },
            { from: "KB", to: "B", value: 1 },
            { from: "TB", to: "GB", value: 1 }
          ]
        }
      };

      let currentCategory = "length";

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      // ============================================
      // Category Management
      // ============================================
      window.setCategory = function (category) {
        currentCategory = category;
        document.querySelectorAll(".category-tab").forEach((tab) => tab.classList.remove("active"));
        document
          .querySelector(`.category-tab[onclick="setCategory('${category}')"]`)
          .classList.add("active");

        updateUnits();
        convert("from");
        updateQuickValues();
      };

      // ============================================
      // Unit Update
      // ============================================
      function updateUnits() {
        const category = units[currentCategory];
        const fromSelect = document.getElementById("fromUnit");
        const toSelect = document.getElementById("toUnit");

        const options = Object.entries(category.units)
          .map(([key, unit]) => `<option value="${key}">${unit.name}</option>`)
          .join("");

        fromSelect.innerHTML = options;
        toSelect.innerHTML = options;

        const unitKeys = Object.keys(category.units);
        fromSelect.value = unitKeys[0];
        toSelect.value = unitKeys[1] || unitKeys[0];
      }

      // ============================================
      // Conversion Function
      // ============================================
      function convert(direction) {
        const category = units[currentCategory];
        const fromUnit = document.getElementById("fromUnit").value;
        const toUnit = document.getElementById("toUnit").value;
        const fromValue = parseFloat(document.getElementById("fromValue").value) || 0;
        const toValue = parseFloat(document.getElementById("toValue").value) || 0;

        let result;

        if (currentCategory === "temperature") {
          if (direction === "from") {
            result = convertTemperature(fromValue, fromUnit, toUnit);
            document.getElementById("toValue").value = formatNumber(result);
          } else {
            result = convertTemperature(toValue, toUnit, fromUnit);
            document.getElementById("fromValue").value = formatNumber(result);
          }
        } else {
          const fromFactor = category.units[fromUnit].factor;
          const toFactor = category.units[toUnit].factor;

          if (direction === "from") {
            result = (fromValue * fromFactor) / toFactor;
            document.getElementById("toValue").value = formatNumber(result);
          } else {
            result = (toValue * toFactor) / fromFactor;
            document.getElementById("fromValue").value = formatNumber(result);
          }
        }

        updateFormula();
      }

      // ============================================
      // Temperature Conversion
      // ============================================
      function convertTemperature(value, from, to) {
        let celsius;
        if (from === "c") celsius = value;
        else if (from === "f") celsius = ((value - 32) * 5) / 9;
        else if (from === "k") celsius = value - 273.15;

        if (to === "c") return celsius;
        if (to === "f") return (celsius * 9) / 5 + 32;
        if (to === "k") return celsius + 273.15;
      }

      // ============================================
      // Number Formatting
      // ============================================
      function formatNumber(num) {
        if (Math.abs(num) < 0.000001 || Math.abs(num) >= 1000000000) {
          return num.toExponential(6);
        }
        return parseFloat(num.toPrecision(10));
      }

      // ============================================
      // Formula Display
      // ============================================
      function updateFormula() {
        const category = units[currentCategory];
        const fromUnit = document.getElementById("fromUnit").value;
        const toUnit = document.getElementById("toUnit").value;
        const fromName = category.units[fromUnit].name;
        const toName = category.units[toUnit].name;

        if (currentCategory === "temperature") {
          document.getElementById("formula").textContent = "温度换算使用特殊公式";
        } else {
          const ratio = category.units[fromUnit].factor / category.units[toUnit].factor;
          document.getElementById("formula").textContent =
            `1 ${fromName} = ${formatNumber(ratio)} ${toName}`;
        }
      }

      // ============================================
      // Quick Values
      // ============================================
      function updateQuickValues() {
        const category = units[currentCategory];
        const quickGrid = document.getElementById("quickValues");

        quickGrid.innerHTML = category.quick
          .map((q) => {
            let result;
            if (currentCategory === "temperature") {
              result = convertTemperature(q.value, q.from, q.to);
            } else {
              result = (q.value * category.units[q.from].factor) / category.units[q.to].factor;
            }
            return `
              <div class="quick-item" onclick="setQuickValue('${q.from}', '${q.to}', ${q.value})">
                <div class="quick-item-value">${q.value}</div>
                <div class="quick-item-label">${category.units[q.from].name}<br>= ${formatNumber(result)} ${category.units[q.to].name}</div>
              </div>
            `;
          })
          .join("");
      }

      window.setQuickValue = function (from, to, value) {
        document.getElementById("fromUnit").value = from;
        document.getElementById("toUnit").value = to;
        document.getElementById("fromValue").value = value;
        convert("from");
      };

      // ============================================
      // Swap Units
      // ============================================
      window.swapUnits = function () {
        const fromUnit = document.getElementById("fromUnit");
        const toUnit = document.getElementById("toUnit");
        const fromValue = document.getElementById("fromValue");
        const toValue = document.getElementById("toValue");

        [fromUnit.value, toUnit.value] = [toUnit.value, fromUnit.value];
        [fromValue.value, toValue.value] = [toValue.value, fromValue.value];

        updateFormula();
      };

      // ============================================
      // Initialize
      // ============================================
      initTheme();
      updateUnits();
      convert("from");
      updateQuickValues();
    </script>
  </body>
</html>

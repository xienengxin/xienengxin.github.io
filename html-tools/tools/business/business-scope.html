      var selectedItems = new Set();

      function updateOptions() {
        var industry = document.getElementById("industry").value;
        var optionsCard = document.getElementById("optionsCard");
        var businessOptions = document.getElementById("businessOptions");

        if (!industry) {
          optionsCard.style.display = "none";
          return;
        }

        optionsCard.style.display = "block";
        selectedItems.clear();

        while (businessOptions.firstChild) {
          businessOptions.removeChild(businessOptions.firstChild);
        }

        var data = businessData[industry];
        data.options.forEach(function (opt) {
          var item = document.createElement("div");
          item.className = "checkbox-item";
          item.dataset.id = opt.id;
          item.onclick = function () {
            toggleItem(opt.id, item);
          };

          var checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.id = opt.id;

          var label = document.createElement("span");
          label.textContent = opt.label;

          item.appendChild(checkbox);
          item.appendChild(label);
          businessOptions.appendChild(item);
        });

        document.getElementById("resultCard").style.display = "none";
      }

      function toggleItem(id, element) {
        if (selectedItems.has(id)) {
          selectedItems.delete(id);
          element.classList.remove("selected");
        } else {
          selectedItems.add(id);
          element.classList.add("selected");
        }
      }

      function generate() {
        var industry = document.getElementById("industry").value;
        if (!industry || selectedItems.size === 0) {
          alert("请选择至少一项业务");
          return;
        }

        var data = businessData[industry];
        var texts = [];

        data.options.forEach(function (opt) {
          if (selectedItems.has(opt.id)) {
            texts.push(opt.text);
          }
        });

        var result = texts.join("") + "（依法须经批准的项目，经相关部门批准后方可开展经营活动）";

        document.getElementById("resultCard").style.display = "block";
        document.getElementById("resultText").textContent = result;
      }

      function copyText() {
        var text = document.getElementById("resultText").textContent;
        navigator.clipboard.writeText(text).then(function () {
          alert("已复制到剪贴板");
        });
      }
    </script>
  </body>
</html>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .btn-secondary {
        background: var(--bg-deep);
        border: 1px solid var(--border-subtle);
        color: var(--text-primary);
        margin-top: 8px;
      }
      .highlight {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        border-radius: 12px;
        padding: 24px;
        color: white;
        text-align: center;
        margin-bottom: 16px;
      }
      .highlight-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .highlight-value {
        font-size: 2.5rem;
        font-weight: 700;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .cost-item {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        align-items: center;
      }
      .cost-item input {
        flex: 1;
      }
      .cost-item .delete-btn {
        width: 40px;
        height: 40px;
        border: none;
        background: var(--accent-red);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.2rem;
      }
      .cost-breakdown {
        margin-top: 16px;
      }
      .cost-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border-subtle);
      }
      .cost-row:last-child {
        border-bottom: none;
      }
      .cost-bar {
        height: 8px;
        background: var(--border-subtle);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .cost-bar-fill {
        height: 100%;
        border-radius: 4px;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>🧮 成本核算计算器</h1>
      <p class="subtitle">计算产品或服务的完整成本结构</p>

      <div class="card">
        <div class="card-title">📦 直接材料成本</div>
        <div id="materialList">
          <div class="cost-item">
            <input type="text" placeholder="材料名称" value="主要原料" aria-label="文本输入框" />
            <input type="number" placeholder="单价" value="50" min="0" aria-label="数字输入框" />
            <input
              type="number"
              placeholder="用量"
              value="2"
              min="0"
              step="0.1"
              aria-label="数字输入框"
            />
            <button class="delete-btn" onclick="deleteItem(this)" aria-label="×">×</button>
          </div>
        </div>
        <button class="btn btn-secondary" onclick="addMaterial()" aria-label="+ 添加材料">
          + 添加材料
        </button>
      </div>

      <div class="card">
        <div class="card-title">👷 直接人工成本</div>
        <div class="grid">
          <div class="form-group">
            <label for="input----------">工时 (小时/件)</label>
            <input
              type="number"
              id="laborHours"
              value="2"
              min="0"
              step="0.1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">时薪 (元/小时)</label>
            <input
              type="number"
              id="laborRate"
              value="30"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🏭 制造费用</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----------">设备折旧 (元/件)</label>
            <input
              type="number"
              id="depreciation"
              value="5"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">水电费 (元/件)</label>
            <input
              type="number"
              id="utilities"
              value="3"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">租金分摊 (元/件)</label>
            <input
              type="number"
              id="rent"
              value="8"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">其他费用 (元/件)</label>
            <input
              type="number"
              id="otherCost"
              value="2"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 其他参数</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----------">管理费用分摊 (%)</label>
            <input
              type="number"
              id="adminRate"
              value="10"
              min="0"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">销售费用分摊 (%)</label>
            <input
              type="number"
              id="salesRate"
              value="5"
              min="0"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">预期利润率 (%)</label>
            <input
              type="number"
              id="profitRate"
              value="20"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">生产数量 (件)</label>
            <input
              type="number"
              id="quantity"
              value="100"
              min="1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算成本">
          计算成本
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="highlight">
          <div class="highlight-label">单位总成本</div>
          <div class="highlight-value" id="unitCost"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 成本结构</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">材料成本</div>
              <div class="result-value" id="materialCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">人工成本</div>
              <div class="result-value" id="laborCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">制造费用</div>
              <div class="result-value" id="overheadCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">管理费用</div>
              <div class="result-value" id="adminCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">销售费用</div>
              <div class="result-value" id="salesCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">建议售价</div>
              <div class="result-value" id="suggestedPrice"></div>
            </div>
          </div>

          <div class="cost-breakdown" id="costBreakdown"></div>
        </div>

        <div class="card">
          <div class="card-title">💰 总成本汇总</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">批次总成本</div>
              <div class="result-value" id="totalCost"></div>
            </div>
            <div class="result-item">
              <div class="result-label">预期总收入</div>
              <div class="result-value" id="totalRevenue"></div>
            </div>
            <div class="result-item">
              <div class="result-label">预期利润</div>
              <div class="result-value" id="totalProfit"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function addMaterial() {
        var list = document.getElementById("materialList");
        var item = document.createElement("div");
        item.className = "cost-item";

        var nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.placeholder = "材料名称";

        var priceInput = document.createElement("input");
        priceInput.type = "number";
        priceInput.placeholder = "单价";
        priceInput.min = "0";

        var qtyInput = document.createElement("input");
        qtyInput.type = "number";
        qtyInput.placeholder = "用量";
        qtyInput.min = "0";
        qtyInput.step = "0.1";

        var deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "×";
        deleteBtn.onclick = function () {
          deleteItem(deleteBtn);
        };

        item.appendChild(nameInput);
        item.appendChild(priceInput);
        item.appendChild(qtyInput);
        item.appendChild(deleteBtn);
        list.appendChild(item);
      }

      function deleteItem(btn) {
        var list = document.getElementById("materialList");
        if (list.children.length > 1) {
          btn.parentElement.remove();
        }
      }

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2) + "元";
      }

      function calculate() {
        // 材料成本
        var materialCost = 0;
        var materialItems = document.getElementById("materialList").children;
        for (var i = 0; i < materialItems.length; i++) {
          var inputs = materialItems[i].querySelectorAll("input");
          var price = parseFloat(inputs[1].value) || 0;
          var qty = parseFloat(inputs[2].value) || 0;
          materialCost += price * qty;
        }

        // 人工成本
        var laborHours = parseFloat(document.getElementById("laborHours").value) || 0;
        var laborRate = parseFloat(document.getElementById("laborRate").value) || 0;
        var laborCost = laborHours * laborRate;

        // 制造费用
        var depreciation = parseFloat(document.getElementById("depreciation").value) || 0;
        var utilities = parseFloat(document.getElementById("utilities").value) || 0;
        var rent = parseFloat(document.getElementById("rent").value) || 0;
        var otherCost = parseFloat(document.getElementById("otherCost").value) || 0;
        var overheadCost = depreciation + utilities + rent + otherCost;

        // 直接成本
        var directCost = materialCost + laborCost + overheadCost;

        // 间接费用
        var adminRate = parseFloat(document.getElementById("adminRate").value) / 100 || 0;
        var salesRate = parseFloat(document.getElementById("salesRate").value) / 100 || 0;
        var adminCost = directCost * adminRate;
        var salesCost = directCost * salesRate;

        // 总成本
        var unitCost = directCost + adminCost + salesCost;

        // 建议售价
        var profitRate = parseFloat(document.getElementById("profitRate").value) / 100 || 0.2;
        var suggestedPrice = unitCost * (1 + profitRate);

        // 批次计算
        var quantity = parseInt(document.getElementById("quantity").value) || 1;
        var totalCost = unitCost * quantity;
        var totalRevenue = suggestedPrice * quantity;
        var totalProfit = totalRevenue - totalCost;

        // 显示结果
        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("unitCost").textContent = formatMoney(unitCost);
        document.getElementById("materialCost").textContent = formatMoney(materialCost);
        document.getElementById("laborCost").textContent = formatMoney(laborCost);
        document.getElementById("overheadCost").textContent = formatMoney(overheadCost);
        document.getElementById("adminCost").textContent = formatMoney(adminCost);
        document.getElementById("salesCost").textContent = formatMoney(salesCost);
        document.getElementById("suggestedPrice").textContent = formatMoney(suggestedPrice);
        document.getElementById("totalCost").textContent = formatMoney(totalCost);
        document.getElementById("totalRevenue").textContent = formatMoney(totalRevenue);
        document.getElementById("totalProfit").textContent = formatMoney(totalProfit);

        // 成本结构图
        var costs = [
          { name: "材料成本", value: materialCost, color: "#6366f1" },
          { name: "人工成本", value: laborCost, color: "#8b5cf6" },
          { name: "制造费用", value: overheadCost, color: "#10b981" },
          { name: "管理费用", value: adminCost, color: "#f59e0b" },
          { name: "销售费用", value: salesCost, color: "#ef4444" }
        ];

        var breakdown = document.getElementById("costBreakdown");
        while (breakdown.firstChild) {
          breakdown.removeChild(breakdown.firstChild);
        }

        costs.forEach(function (cost) {
          var percentage = unitCost > 0 ? (cost.value / unitCost) * 100 : 0;

          var row = document.createElement("div");
          row.className = "cost-row";

          var nameSpan = document.createElement("span");
          nameSpan.textContent = cost.name;

          var valueSpan = document.createElement("span");
          valueSpan.textContent = formatMoney(cost.value) + " (" + percentage.toFixed(1) + "%)";

          row.appendChild(nameSpan);
          row.appendChild(valueSpan);

          var bar = document.createElement("div");
          bar.className = "cost-bar";
          var fill = document.createElement("div");
          fill.className = "cost-bar-fill";
          fill.style.width = percentage + "%";
          fill.style.background = cost.color;
          bar.appendChild(fill);

          var container = document.createElement("div");
          container.appendChild(row);
          container.appendChild(bar);
          breakdown.appendChild(container);
        });
      }

      calculate();
    </script>
  </body>
</html>

      * {

        padding: 0;

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);

        --color-border-strong: var(--border-strong, #3a3a4a);

        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);

        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;

      body {

        background: var(--bg-card);

        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;

      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

        margin-bottom: 16px;
      }

        display: block;

        font-size: 0.9rem;

      }

        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);

        display: grid;

        margin-bottom: 8px;

      }
      .result-value {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .result-value.green {
        color: var(--accent-green);
      }
      .result-value.red {
        color: var(--accent-red);
      }
      .result-value.orange {
        color: var(--orange);
      }
      .gauge-container {
        margin: 20px 0;

      }
      .gauge {
        width: 200px;
        height: 100px;
        margin: 0 auto;
        position: relative;

      }
      .gauge-bg {
        width: 200px;
        height: 100px;
        border-radius: 100px 100px 0 0;
        background: var(--border-subtle);

      }
      .gauge-fill {
        width: 200px;
        height: 100px;
        border-radius: 100px 100px 0 0;
        background: linear-gradient(90deg, var(--accent-red), var(--orange), var(--accent-green));
        position: absolute;
        transform-origin: bottom center;
        transform: rotate(-90deg);
        transition: transform 0.5s;
      }
      .gauge-cover {
        width: 160px;
        height: 80px;
        border-radius: 80px 80px 0 0;
        background: var(--bg-card);
        position: absolute;
        top: 20px;
        left: 20px;
      }
      .gauge-value {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.5rem;
        font-weight: 700;
      }
      .formula-box {
        background: var(--bg-deep);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .formula-title {
        font-size: 0.9rem;
        color: var(--accent-cyan);
        margin-bottom: 8px;
      }
      .formula {
        font-family: var(--font-mono);
        color: var(--text-secondary);
        line-height: 1.8;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>📊 利润率计算器</h1>
      <p class="subtitle">计算毛利率、净利率等关键盈利指标</p>

      <div class="card">
        <div class="card-title">💰 收入信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">销售收入 (元)</label>
            <input
              type="number"
              id="revenue"
              value="100000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">销售成本 (元)</label>
            <input
              type="number"
              id="cogs"
              value="60000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 运营费用</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">管理费用 (元)</label>
            <input
              type="number"
              id="adminExpense"
              value="10000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">销售费用 (元)</label>
            <input
              type="number"
              id="salesExpense"
              value="8000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">财务费用 (元)</label>
            <input
              type="number"
              id="financeExpense"
              value="2000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------">税费 (元)</label>
            <input
              type="number"
              id="tax"
              value="5000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算利润率">
          计算利润率
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📈 利润分析</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-icon">💵</div>
              <div class="result-label">毛利润</div>
              <div class="result-value green" id="grossProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">📊</div>
              <div class="result-label">毛利率</div>
              <div class="result-value" id="grossMargin"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">💰</div>
              <div class="result-label">营业利润</div>
              <div class="result-value" id="operatingProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">📈</div>
              <div class="result-label">营业利润率</div>
              <div class="result-value" id="operatingMargin"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">🏆</div>
              <div class="result-label">净利润</div>
              <div class="result-value" id="netProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">⭐</div>
              <div class="result-label">净利率</div>
              <div class="result-value" id="netMargin"></div>
            </div>
          </div>

          <div class="gauge-container">
            <p style="color: var(--text-secondary); margin-bottom: 10px">净利率健康度</p>
            <div class="gauge">
              <div class="gauge-bg"></div>
              <div class="gauge-fill" id="gaugeFill"></div>
              <div class="gauge-cover"></div>
              <div class="gauge-value" id="gaugeValue"></div>
            </div>
          </div>

          <div class="formula-box">
            <div class="formula-title">计算公式</div>
            <div class="formula">
              毛利润 = 销售收入 - 销售成本
              <br />
              毛利率 = 毛利润 / 销售收入 × 100%
              <br />
              营业利润 = 毛利润 - 管理费用 - 销售费用 - 财务费用
              <br />
              净利润 = 营业利润 - 税费
              <br />
              净利率 = 净利润 / 销售收入 × 100%
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2) + "元";
      }

      function getMarginColor(margin) {
        if (margin >= 20) return "green";
        if (margin >= 10) return "orange";
        return "red";
      }

      function calculate() {
        var revenue = parseFloat(document.getElementById("revenue").value) || 0;
        var cogs = parseFloat(document.getElementById("cogs").value) || 0;
        var adminExpense = parseFloat(document.getElementById("adminExpense").value) || 0;
        var salesExpense = parseFloat(document.getElementById("salesExpense").value) || 0;
        var financeExpense = parseFloat(document.getElementById("financeExpense").value) || 0;
        var tax = parseFloat(document.getElementById("tax").value) || 0;

        var grossProfit = revenue - cogs;
        var grossMargin = revenue > 0 ? (grossProfit / revenue) * 100 : 0;
        var operatingExpenses = adminExpense + salesExpense + financeExpense;
        var operatingProfit = grossProfit - operatingExpenses;
        var operatingMargin = revenue > 0 ? (operatingProfit / revenue) * 100 : 0;
        var netProfit = operatingProfit - tax;
        var netMargin = revenue > 0 ? (netProfit / revenue) * 100 : 0;

        document.getElementById("resultSection").classList.remove("hidden");

        var grossProfitEl = document.getElementById("grossProfit");
        grossProfitEl.textContent = formatMoney(grossProfit);
        grossProfitEl.className = "result-value " + (grossProfit >= 0 ? "green" : "red");

        var grossMarginEl = document.getElementById("grossMargin");
        grossMarginEl.textContent = grossMargin.toFixed(2) + "%";
        grossMarginEl.className = "result-value " + getMarginColor(grossMargin);

        var operatingProfitEl = document.getElementById("operatingProfit");
        operatingProfitEl.textContent = formatMoney(operatingProfit);
        operatingProfitEl.className = "result-value " + (operatingProfit >= 0 ? "green" : "red");

        var operatingMarginEl = document.getElementById("operatingMargin");
        operatingMarginEl.textContent = operatingMargin.toFixed(2) + "%";
        operatingMarginEl.className = "result-value " + getMarginColor(operatingMargin);

        var netProfitEl = document.getElementById("netProfit");
        netProfitEl.textContent = formatMoney(netProfit);
        netProfitEl.className = "result-value " + (netProfit >= 0 ? "green" : "red");

        var netMarginEl = document.getElementById("netMargin");
        netMarginEl.textContent = netMargin.toFixed(2) + "%";
        netMarginEl.className = "result-value " + getMarginColor(netMargin);

        // 更新仪表盘
        var gaugeRotation = (Math.min(Math.max(netMargin, -10), 30) / 40) * 180 - 90;
        document.getElementById("gaugeFill").style.transform = "rotate(" + gaugeRotation + "deg)";
        document.getElementById("gaugeValue").textContent = netMargin.toFixed(1) + "%";
      }

      calculate();
    </script>
  </body>
</html>

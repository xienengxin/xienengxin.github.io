<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }
      .summary-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .summary-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .summary-value {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .summary-value.green {
        color: var(--accent-green);
      }
      .summary-value.red {
        color: var(--accent-red);
      }
      .table-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }
      th,
      td {
        padding: 12px;
        text-align: right;
        border-bottom: 1px solid var(--border-subtle);
      }
      th {
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
      }
      th:first-child,
      td:first-child {
        text-align: left;
      }
      .row-header {
        font-weight: 500;
      }
      .row-total {
        background: var(--bg-deep);
        font-weight: 600;
      }
      .positive {
        color: var(--accent-green);
      }
      .negative {
        color: var(--accent-red);
      }
      .chart-container {
        height: 200px;
        margin-top: 20px;
        position: relative;
      }
      .chart-bar {
        position: absolute;
        bottom: 30px;
        width: 40px;
        border-radius: 4px 4px 0 0;
        transition: height 0.3s;
      }
      .chart-label {
        position: absolute;
        bottom: 5px;
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-align: center;
        width: 40px;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>💵 现金流预测</h1>
      <p class="subtitle">预测未来6个月的现金流入流出情况</p>

      <div class="card">
        <div class="card-title">💰 期初现金</div>
        <div class="form-group">
          <label for="input-----------">期初现金余额 (元)</label>
          <input
            type="number"
            id="openingBalance"
            value="100000"
            min="0"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
      </div>

      <div class="card">
        <div class="card-title">📈 预计月均收入</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">销售收入 (元)</label>
            <input
              type="number"
              id="salesIncome"
              value="80000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">其他收入 (元)</label>
            <input
              type="number"
              id="otherIncome"
              value="5000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">月增长率 (%)</label>
            <input
              type="number"
              id="growthRate"
              value="5"
              step="0.1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📉 预计月均支出</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">采购成本 (元)</label>
            <input
              type="number"
              id="purchaseCost"
              value="40000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">工资薪酬 (元)</label>
            <input
              type="number"
              id="payroll"
              value="25000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------">租金 (元)</label>
            <input
              type="number"
              id="rent"
              value="8000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input--------">水电费 (元)</label>
            <input
              type="number"
              id="utilities"
              value="2000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">营销费用 (元)</label>
            <input
              type="number"
              id="marketing"
              value="5000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">其他支出 (元)</label>
            <input
              type="number"
              id="otherExpense"
              value="3000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="生成预测">
          生成预测
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📊 现金流汇总</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-label">6个月总收入</div>
              <div class="summary-value green" id="totalInflow"></div>
            </div>
            <div class="summary-item">
              <div class="summary-label">6个月总支出</div>
              <div class="summary-value red" id="totalOutflow"></div>
            </div>
            <div class="summary-item">
              <div class="summary-label">净现金流</div>
              <div class="summary-value" id="netCashflow"></div>
            </div>
            <div class="summary-item">
              <div class="summary-label">期末余额</div>
              <div class="summary-value" id="endingBalance"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📅 月度现金流明细</div>
          <div class="table-container">
            <table id="cashflowTable">
              <thead>
                <tr>
                  <th>项目</th>
                  <th>第1月</th>
                  <th>第2月</th>
                  <th>第3月</th>
                  <th>第4月</th>
                  <th>第5月</th>
                  <th>第6月</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📈 现金余额趋势</div>
          <div class="chart-container" id="chartContainer"></div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(0) + "元";
      }

      function calculate() {
        var openingBalance = parseFloat(document.getElementById("openingBalance").value) || 0;
        var salesIncome = parseFloat(document.getElementById("salesIncome").value) || 0;
        var otherIncome = parseFloat(document.getElementById("otherIncome").value) || 0;
        var growthRate = parseFloat(document.getElementById("growthRate").value) / 100 || 0;
        var purchaseCost = parseFloat(document.getElementById("purchaseCost").value) || 0;
        var payroll = parseFloat(document.getElementById("payroll").value) || 0;
        var rent = parseFloat(document.getElementById("rent").value) || 0;
        var utilities = parseFloat(document.getElementById("utilities").value) || 0;
        var marketing = parseFloat(document.getElementById("marketing").value) || 0;
        var otherExpense = parseFloat(document.getElementById("otherExpense").value) || 0;

        var months = 6;
        var data = [];
        var balance = openingBalance;
        var totalInflow = 0;
        var totalOutflow = 0;

        for (var i = 0; i < months; i++) {
          var growthFactor = Math.pow(1 + growthRate, i);
          var monthSales = salesIncome * growthFactor;
          var monthOther = otherIncome * growthFactor;
          var inflow = monthSales + monthOther;

          var outflow = purchaseCost + payroll + rent + utilities + marketing + otherExpense;
          var netFlow = inflow - outflow;
          balance += netFlow;

          totalInflow += inflow;
          totalOutflow += outflow;

          data.push({
            month: i + 1,
            sales: monthSales,
            otherIn: monthOther,
            inflow: inflow,
            purchase: purchaseCost,
            payroll: payroll,
            rent: rent,
            utilities: utilities,
            marketing: marketing,
            otherOut: otherExpense,
            outflow: outflow,
            netFlow: netFlow,
            balance: balance
          });
        }

        document.getElementById("resultSection").classList.remove("hidden");

        // 汇总
        document.getElementById("totalInflow").textContent = formatMoney(totalInflow);
        document.getElementById("totalOutflow").textContent = formatMoney(totalOutflow);

        var netCashflow = totalInflow - totalOutflow;
        var netEl = document.getElementById("netCashflow");
        netEl.textContent = formatMoney(netCashflow);
        netEl.className = "summary-value " + (netCashflow >= 0 ? "green" : "red");

        var endEl = document.getElementById("endingBalance");
        endEl.textContent = formatMoney(balance);
        endEl.className = "summary-value " + (balance >= 0 ? "green" : "red");

        // 表格
        var tbody = document.getElementById("tableBody");
        while (tbody.firstChild) {
          tbody.removeChild(tbody.firstChild);
        }

        var rows = [
          { label: "期初余额", key: "opening", isHeader: true },
          { label: "收入", key: null, isHeader: true },
          { label: "  销售收入", key: "sales" },
          { label: "  其他收入", key: "otherIn" },
          { label: "收入合计", key: "inflow", isTotal: true },
          { label: "支出", key: null, isHeader: true },
          { label: "  采购成本", key: "purchase" },
          { label: "  工资薪酬", key: "payroll" },
          { label: "  租金", key: "rent" },
          { label: "  水电费", key: "utilities" },
          { label: "  营销费用", key: "marketing" },
          { label: "  其他支出", key: "otherOut" },
          { label: "支出合计", key: "outflow", isTotal: true },
          { label: "净现金流", key: "netFlow", isTotal: true },
          { label: "期末余额", key: "balance", isTotal: true }
        ];

        rows.forEach(function (rowDef) {
          var tr = document.createElement("tr");
          if (rowDef.isTotal) tr.className = "row-total";

          var th = document.createElement("td");
          th.className = "row-header";
          th.textContent = rowDef.label;
          tr.appendChild(th);

          for (var i = 0; i < months; i++) {
            var td = document.createElement("td");
            if (rowDef.key === "opening") {
              td.textContent = formatMoney(i === 0 ? openingBalance : data[i - 1].balance);
            } else if (rowDef.key) {
              var val = data[i][rowDef.key];
              td.textContent = formatMoney(val);
              if (rowDef.key === "netFlow" || rowDef.key === "balance") {
                td.className = val >= 0 ? "positive" : "negative";
              }
            }
            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        });

        // 图表
        var chart = document.getElementById("chartContainer");
        while (chart.firstChild) {
          chart.removeChild(chart.firstChild);
        }

        var maxBalance = Math.max.apply(
          null,
          data.map(function (d) {
            return Math.abs(d.balance);
          })
        );
        var chartWidth = chart.offsetWidth;
        var barWidth = 40;
        var gap = (chartWidth - barWidth * months) / (months + 1);

        data.forEach(function (d, i) {
          var barHeight = (Math.abs(d.balance) / maxBalance) * 150;
          var bar = document.createElement("div");
          bar.className = "chart-bar";
          bar.style.height = barHeight + "px";
          bar.style.left = gap * (i + 1) + barWidth * i + "px";
          bar.style.background = d.balance >= 0 ? "var(--accent-green)" : "var(--accent-red)";
          chart.appendChild(bar);

          var label = document.createElement("div");
          label.className = "chart-label";
          label.style.left = gap * (i + 1) + barWidth * i + "px";
          label.textContent = "第" + (i + 1) + "月";
          chart.appendChild(label);
        });
      }

      calculate();
    </script>
  </body>
</html>

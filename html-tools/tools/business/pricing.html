  <head>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .strategy-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 16px;
      }
      .strategy-card {
        background: var(--bg-deep);
        border: 2px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .strategy-card.active {
        border-color: var(--accent-cyan);
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
      }
      .strategy-card:hover {
        border-color: var(--accent-cyan);
      }
      .strategy-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }
      .strategy-name {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .strategy-desc {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }
      .price-result {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        border-radius: 12px;
        padding: 24px;
        color: white;
        text-align: center;
        margin-bottom: 16px;
      }
      .price-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .price-value {
        font-size: 3rem;
        font-weight: 700;
      }
      .price-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .price-option {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }
      .price-option-name {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .price-option-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .price-option-margin {
        font-size: 0.85rem;
        color: var(--accent-green);
        margin-top: 4px;
      }
      .analysis {
        margin-top: 16px;
        padding: 16px;
        background: var(--bg-deep);
        border-radius: 8px;
      }
      .analysis-title {
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--orange);
      }
      .analysis-text {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.8;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>💰 定价策略计算器</h1>
      <p class="subtitle">根据不同策略计算最优定价方案</p>

      <div class="card">
        <div class="card-title">📦 产品成本</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">单位成本 (元)</label>
            <input
              type="number"
              id="unitCost"
              value="80"
              min="0"
              step="0.01"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">目标利润率 (%)</label>
            <input
              type="number"
              id="targetMargin"
              value="30"
              min="0"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 市场信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input----------">竞品最低价 (元)</label>
            <input
              type="number"
              id="competitorLow"
              value="100"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">竞品最高价 (元)</label>
            <input
              type="number"
              id="competitorHigh"
              value="150"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">市场均价 (元)</label>
            <input
              type="number"
              id="marketAvg"
              value="120"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">顾客心理价位 (元)</label>
            <input
              type="number"
              id="customerExpect"
              value="99"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎯 选择定价策略</div>
        <div class="strategy-cards">
          <div class="strategy-card active" data-strategy="cost" onclick="selectStrategy('cost')">
            <div class="strategy-icon">🧮</div>
            <div class="strategy-name">成本加成定价</div>
            <div class="strategy-desc">基于成本加上目标利润率</div>
          </div>
          <div
            class="strategy-card"
            data-strategy="competition"
            onclick="selectStrategy('competition')"
          >
            <div class="strategy-icon">⚔️</div>
            <div class="strategy-name">竞争导向定价</div>
            <div class="strategy-desc">参考竞品价格区间定价</div>
          </div>
          <div class="strategy-card" data-strategy="value" onclick="selectStrategy('value')">
            <div class="strategy-icon">💎</div>
            <div class="strategy-name">价值导向定价</div>
            <div class="strategy-desc">基于顾客感知价值定价</div>
          </div>
          <div
            class="strategy-card"
            data-strategy="psychological"
            onclick="selectStrategy('psychological')"
          >
            <div class="strategy-icon">🧠</div>
            <div class="strategy-name">心理定价</div>
            <div class="strategy-desc">运用价格心理学技巧</div>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top: 16px" onclick="calculate()">
          计算定价
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="price-result">
          <div class="price-label">推荐定价</div>
          <div class="price-value" id="recommendedPrice"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 价格方案对比</div>
          <div class="price-grid">
            <div class="price-option">
              <div class="price-option-name">低价策略</div>
              <div class="price-option-value" id="lowPrice"></div>
              <div class="price-option-margin" id="lowMargin"></div>
            </div>
            <div class="price-option">
              <div class="price-option-name">中价策略</div>
              <div class="price-option-value" id="midPrice"></div>
              <div class="price-option-margin" id="midMargin"></div>
            </div>
            <div class="price-option">
              <div class="price-option-name">高价策略</div>
              <div class="price-option-value" id="highPrice"></div>
              <div class="price-option-margin" id="highMargin"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📊 定价分析</div>
          <div class="grid">
            <div class="form-group">
              <label style="color: var(--text-primary)">实际利润率</label>
              <div
                style="font-size: 1.5rem; font-weight: 700; color: var(--accent-green)"
                id="actualMargin"
              ></div>
            </div>
            <div class="form-group">
              <label style="color: var(--text-primary)">单位利润</label>
              <div
                style="font-size: 1.5rem; font-weight: 700; color: var(--accent-cyan)"
                id="unitProfit"
              ></div>
            </div>
            <div class="form-group">
              <label style="color: var(--text-primary)">相对市场均价</label>
              <div style="font-size: 1.5rem; font-weight: 700" id="vsMarket"></div>
            </div>
            <div class="form-group">
              <label style="color: var(--text-primary)">价格竞争力</label>
              <div style="font-size: 1.5rem; font-weight: 700" id="competitiveness"></div>
            </div>
          </div>

          <div class="analysis">
            <div class="analysis-title">💡 定价建议</div>
            <div class="analysis-text" id="analysisText"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      var selectedStrategy = "cost";

      function selectStrategy(strategy) {
        selectedStrategy = strategy;
        var cards = document.querySelectorAll(".strategy-card");
        cards.forEach(function (card) {
          card.classList.remove("active");
          if (card.dataset.strategy === strategy) {
            card.classList.add("active");
          }
        });
      }

      function formatPrice(num) {
        return "¥" + num.toFixed(2);
      }

      function psychologicalPrice(price) {
        if (price < 10) return Math.floor(price) - 0.1 + 0.9;
        if (price < 100) return Math.floor(price / 10) * 10 + 9;
        if (price < 1000) return Math.floor(price / 100) * 100 + 99;
        return Math.floor(price / 1000) * 1000 + 999;
      }

      function calculate() {
        var unitCost = parseFloat(document.getElementById("unitCost").value) || 0;
        var targetMargin = parseFloat(document.getElementById("targetMargin").value) / 100 || 0.3;
        var competitorLow = parseFloat(document.getElementById("competitorLow").value) || 0;
        var competitorHigh = parseFloat(document.getElementById("competitorHigh").value) || 0;
        var marketAvg = parseFloat(document.getElementById("marketAvg").value) || 0;
        var customerExpect = parseFloat(document.getElementById("customerExpect").value) || 0;

        var recommendedPrice = 0;
        var analysis = "";

        switch (selectedStrategy) {
          case "cost":
            recommendedPrice = unitCost / (1 - targetMargin);
            analysis =
              "成本加成定价法以成本为基础，加上预期利润来确定价格。当前成本 " +
              formatPrice(unitCost) +
              "，目标利润率 " +
              (targetMargin * 100).toFixed(0) +
              "%，建议定价 " +
              formatPrice(recommendedPrice) +
              "。此方法简单直接，但需关注市场接受度。";
            break;
          case "competition":
            recommendedPrice = (competitorLow + competitorHigh) / 2;
            analysis =
              "竞争导向定价参考市场竞品价格。当前竞品价格区间 " +
              formatPrice(competitorLow) +
              " - " +
              formatPrice(competitorHigh) +
              "，建议定价在区间中位。可根据产品差异化程度调整，差异化高可定价偏上，同质化严重则偏下。";
            break;
          case "value":
            recommendedPrice = customerExpect * 1.1;
            analysis =
              "价值导向定价以顾客感知价值为基础。顾客心理价位 " +
              formatPrice(customerExpect) +
              "，建议略高于心理价位定价，体现产品价值。同时需要加强价值传达，让顾客认可产品值这个价。";
            break;
          case "psychological":
            recommendedPrice = psychologicalPrice(unitCost / (1 - targetMargin));
            analysis =
              '心理定价运用消费心理学原理。价格尾数为9会让顾客感觉更便宜。例如99元比100元更有吸引力。建议配合促销标语如"不到百元"等增强效果。';
            break;
        }

        // 显示结果
        document.getElementById("resultSection").classList.remove("hidden");
        document.getElementById("recommendedPrice").textContent = formatPrice(recommendedPrice);

        // 三档价格
        var lowPrice = Math.max(unitCost * 1.1, competitorLow * 0.95);
        var midPrice = recommendedPrice;
        var highPrice = Math.min(unitCost * 2, competitorHigh * 1.05);

        document.getElementById("lowPrice").textContent = formatPrice(lowPrice);
        document.getElementById("midPrice").textContent = formatPrice(midPrice);
        document.getElementById("highPrice").textContent = formatPrice(highPrice);

        var lowMarginPct = (((lowPrice - unitCost) / lowPrice) * 100).toFixed(1);
        var midMarginPct = (((midPrice - unitCost) / midPrice) * 100).toFixed(1);
        var highMarginPct = (((highPrice - unitCost) / highPrice) * 100).toFixed(1);

        document.getElementById("lowMargin").textContent = "利润率 " + lowMarginPct + "%";
        document.getElementById("midMargin").textContent = "利润率 " + midMarginPct + "%";
        document.getElementById("highMargin").textContent = "利润率 " + highMarginPct + "%";

        // 分析数据
        var actualMargin = ((recommendedPrice - unitCost) / recommendedPrice) * 100;
        var unitProfit = recommendedPrice - unitCost;
        var vsMarket = ((recommendedPrice - marketAvg) / marketAvg) * 100;

        document.getElementById("actualMargin").textContent = actualMargin.toFixed(1) + "%";
        document.getElementById("unitProfit").textContent = formatPrice(unitProfit);

        var vsMarketEl = document.getElementById("vsMarket");
        vsMarketEl.textContent = (vsMarket >= 0 ? "+" : "") + vsMarket.toFixed(1) + "%";
        vsMarketEl.style.color =
          vsMarket > 10
            ? "var(--orange)"
            : vsMarket < -10
              ? "var(--accent-green)"
              : "var(--accent-cyan)";

        var competitiveness = "";
        if (recommendedPrice < competitorLow) {
          competitiveness = "价格优势";
          document.getElementById("competitiveness").style.color = "var(--accent-green)";
        } else if (recommendedPrice > competitorHigh) {
          competitiveness = "高端定位";
          document.getElementById("competitiveness").style.color = "var(--orange)";
        } else {
          competitiveness = "中等水平";
          document.getElementById("competitiveness").style.color = "var(--accent-cyan)";
        }
        document.getElementById("competitiveness").textContent = competitiveness;

        document.getElementById("analysisText").textContent = analysis;
      }

      calculate();
    </script>
  </body>
</html>

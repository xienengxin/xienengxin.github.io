  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文件合并器
    </nav>
    <div class="container">
      <header>
        <h1>📎 文件合并器</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 切换主题</button>
      </header>
      <div class="panel">
        <h3>📁 添加文件</h3>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" multiple />
          <div style="font-size: 2rem; margin-bottom: 0.5rem">📄</div>
          <p>
            拖放文件到这里
            <br />
            <small>或点击选择文件</small>
          </p>
        </div>
        <div class="file-list" id="fileList"></div>
        <button class="outline" style="width: 100%" onclick="clearAll()">🗑️ 清空全部</button>
      </div>
      <div class="panel">
        <h3>⚙️ 合并选项</h3>
        <div class="options">
          <label>
            分隔符
            <select id="separator">
              <option value="\n">换行符</option>
              <option value="\n\n">双换行</option>
              <option value="\n---\n">分隔线</option>
              <option value="">无分隔</option>
            </select>
          </label>
          <label>
            <input type="checkbox" id="addFilename" checked />
            添加文件名注释
          </label>
          <label>
            <input type="checkbox" id="trimContent" />
            去除首尾空白
          </label>
        </div>
      </div>
      <div class="panel">
        <h3>👁️ 预览</h3>
        <div class="preview" id="preview">合并后的内容将显示在这里...</div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem">
          <button class="btn-primary" onclick="mergeFiles()" style="flex: 1">🔄 合并预览</button>
          <button class="btn-success" onclick="downloadMerged()" style="flex: 1">💾 下载</button>
          <button onclick="copyMerged()" style="flex: 1">📋 复制</button>
        </div>
      </div>
    </div>
    <script>
      let files = [],
        mergedContent = "";
      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        initDropZone();
      });
      function initTheme() {
        const s = localStorage.getItem("theme");
        if (s) document.documentElement.setAttribute("data-theme", s);
      }
      window.toggleTheme = function () {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
      };
      function initDropZone() {
        const dz = document.getElementById("dropZone"),
          fi = document.getElementById("fileInput");
        dz.addEventListener("click", () => fi.click());
        dz.addEventListener("dragover", (e) => {
          e.preventDefault();
          dz.classList.add("dragover");
        });
        dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
        dz.addEventListener("drop", (e) => {
          e.preventDefault();
          dz.classList.remove("dragover");
          handleFiles(e.dataTransfer.files);
        });
        fi.addEventListener("change", (e) => {
          handleFiles(e.target.files);
          e.target.value = "";
        });
      }
      function handleFiles(fl) {
        Array.from(fl).forEach((f) => {
          const r = new FileReader();
          r.onload = (e) => {
            files.push({ name: f.name, size: f.size, content: e.target.result });
            renderList();
          };
          r.readAsText(f);
        });
      }
      function renderList() {
        document.getElementById("fileList").innerHTML = files
          .map(
            (f, i) =>
              '<div class="file-item"><span>📄</span><div class="info"><div class="name">' +
              f.name +
              '</div><div class="size">' +
              formatSize(f.size) +
              '</div></div><button class="remove" onclick="files.splice(' +
              i +
              ',1);renderList()">×</button></div>'
          )
          .join("");
      }
      window.clearAll = function () {
        files = [];
        renderList();
        document.getElementById("preview").textContent = "合并后的内容将显示在这里...";
      };
      function mergeFiles() {
        if (!files.length) {
          showToast("请先添加文件");
          return;
        }
        let sep = document.getElementById("separator").value.replace(/\\n/g, "\n");
        const addFn = document.getElementById("addFilename").checked,
          trim = document.getElementById("trimContent").checked;
        mergedContent = files
          .map((f) => {
            let c = f.content;
            if (trim) c = c.trim();
            if (addFn) c = "// === " + f.name + " ===\n" + c;
            return c;
          })
          .join(sep);
        document.getElementById("preview").textContent = mergedContent;
      }
      function downloadMerged() {
        if (!mergedContent) mergeFiles();
        if (!mergedContent) return;
        const b = new Blob([mergedContent], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "merged.txt";
        a.click();
      }
      window.copyMerged = async function () {
        if (!mergedContent) mergeFiles();
        if (!mergedContent) return;
        await navigator.clipboard.writeText(mergedContent);
        showToast("已复制");
      };
      function formatSize(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
        return (b / 1048576).toFixed(2) + " MB";
      }
      function showToast(m) {
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = m;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
      }
    </script>

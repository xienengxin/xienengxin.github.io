    <div class="container">
      <h1>📝 字数统计工具</h1>
      <p class="subtitle">统计字数、字符数、词数、句子数，分析文本</p>

      <div class="card">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="charCount">0</div>
            <div class="stat-label">字符数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="charNoSpace">0</div>
            <div class="stat-label">字符(不含空格)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="wordCount">0</div>
            <div class="stat-label">词数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="lineCount">0</div>
            <div class="stat-label">行数</div>
          </div>
        </div>

        <div class="textarea-wrapper">
          <textarea
            class="text-input"
            id="textInput"
            placeholder="在这里输入或粘贴文本..."
            oninput="analyzeText()"
          ></textarea>
        </div>

        <div class="toolbar">
          <button class="tool-btn" onclick="clearText()">🗑️ 清空</button>
          <button class="tool-btn" onclick="copyText()">📋 复制</button>
          <button class="tool-btn" onclick="pasteText()">📥 粘贴</button>
          <button class="tool-btn" onclick="removeSpaces()">🔧 去除空格</button>
          <button class="tool-btn" onclick="removeLineBreaks()">📄 去除换行</button>
          <button class="tool-btn" onclick="toUpperCase()">🔠 转大写</button>
          <button class="tool-btn" onclick="toLowerCase()">🔡 转小写</button>
        </div>

        <div class="read-time">
          <div class="read-time-item">
            <div class="read-time-value" id="readTimeNormal">0</div>
            <div class="read-time-label">阅读时间(分钟)</div>
          </div>
          <div class="read-time-item">
            <div class="read-time-value" id="readTimeFast">0</div>
            <div class="read-time-label">快速阅读(分钟)</div>
          </div>
          <div class="read-time-item">
            <div class="read-time-value" id="speakTime">0</div>
            <div class="read-time-label">朗读时间(分钟)</div>
          </div>
        </div>
      </div>

      <div class="card detail-section">
        <div class="section-title">📊 详细统计</div>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-label">中文字符</span>
            <span class="detail-value" id="chineseCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">英文字母</span>
            <span class="detail-value" id="englishCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">数字</span>
            <span class="detail-value" id="numberCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">标点符号</span>
            <span class="detail-value" id="punctuationCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">空格</span>
            <span class="detail-value" id="spaceCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">换行符</span>
            <span class="detail-value" id="newlineCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">句子数</span>
            <span class="detail-value" id="sentenceCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">段落数</span>
            <span class="detail-value" id="paragraphCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">英文单词</span>
            <span class="detail-value" id="englishWordCount">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">平均词长</span>
            <span class="detail-value" id="avgWordLength">0</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">最长行</span>
            <span class="detail-value" id="longestLine">0 字符</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">字节大小</span>
            <span class="detail-value" id="byteSize">0 B</span>
          </div>
        </div>
      </div>

      <div class="card frequency-section">
        <div class="section-title">🔤 字符频率</div>
        <div class="frequency-tabs">
          <button class="freq-tab active" onclick="showFrequency('all')">全部</button>
          <button class="freq-tab" onclick="showFrequency('chinese')">中文</button>
          <button class="freq-tab" onclick="showFrequency('english')">英文</button>
          <button class="freq-tab" onclick="showFrequency('number')">数字</button>
        </div>
        <div class="frequency-list" id="frequencyList">
          <div class="empty-state">输入文本后显示字符频率</div>
        </div>
      </div>
    </div>

    <script>
      let currentText = "";
      let charFrequency = {};
      let currentFreqType = "all";

      function analyzeText() {
        const text = document.getElementById("textInput").value;
        currentText = text;

        // 基本统计
        const charCount = text.length;
        const charNoSpace = text.replace(/\s/g, "").length;
        const lines = text.split("\n");
        const lineCount = text ? lines.length : 0;

        // 词数统计（中文按字，英文按词）
        const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
        const wordCount = chineseChars + englishWords;

        // 更新主要统计
        document.getElementById("charCount").textContent = charCount.toLocaleString();
        document.getElementById("charNoSpace").textContent = charNoSpace.toLocaleString();
        document.getElementById("wordCount").textContent = wordCount.toLocaleString();
        document.getElementById("lineCount").textContent = lineCount.toLocaleString();

        // 详细统计
        const englishCount = (text.match(/[a-zA-Z]/g) || []).length;
        const numberCount = (text.match(/[0-9]/g) || []).length;
        const punctuationCount = (
          text.match(/[，。！？、；：""''（）【】《》\.\,\!\?\;\:\"\'\(\)\[\]\{\}]/g) || []
        ).length;
        const spaceCount = (text.match(/ /g) || []).length;
        const newlineCount = (text.match(/\n/g) || []).length;

        // 句子数（以句号、问号、感叹号结尾）
        const sentenceCount = (text.match(/[。！？\.!\?]+/g) || []).length;

        // 段落数（非空行）
        const paragraphCount = lines.filter((line) => line.trim().length > 0).length;

        // 平均词长
        const words = text.match(/[a-zA-Z]+/g) || [];
        const avgWordLength =
          words.length > 0
            ? (words.reduce((sum, w) => sum + w.length, 0) / words.length).toFixed(1)
            : 0;

        // 最长行
        const longestLine = Math.max(...lines.map((l) => l.length), 0);

        // 字节大小
        const byteSize = new Blob([text]).size;

        document.getElementById("chineseCount").textContent = chineseChars.toLocaleString();
        document.getElementById("englishCount").textContent = englishCount.toLocaleString();
        document.getElementById("numberCount").textContent = numberCount.toLocaleString();
        document.getElementById("punctuationCount").textContent = punctuationCount.toLocaleString();
        document.getElementById("spaceCount").textContent = spaceCount.toLocaleString();
        document.getElementById("newlineCount").textContent = newlineCount.toLocaleString();
        document.getElementById("sentenceCount").textContent = sentenceCount.toLocaleString();
        document.getElementById("paragraphCount").textContent = paragraphCount.toLocaleString();
        document.getElementById("englishWordCount").textContent = englishWords.toLocaleString();
        document.getElementById("avgWordLength").textContent = avgWordLength;
        document.getElementById("longestLine").textContent = longestLine + " 字符";
        document.getElementById("byteSize").textContent = formatBytes(byteSize);

        // 阅读时间（假设中文300字/分钟，英文200词/分钟）
        const readTimeNormal = Math.ceil(chineseChars / 300 + englishWords / 200);
        const readTimeFast = Math.ceil(chineseChars / 500 + englishWords / 350);
        const speakTime = Math.ceil(chineseChars / 150 + englishWords / 120);

        document.getElementById("readTimeNormal").textContent = readTimeNormal || 0;
        document.getElementById("readTimeFast").textContent = readTimeFast || 0;
        document.getElementById("speakTime").textContent = speakTime || 0;

        // 计算字符频率
        calculateFrequency(text);
        showFrequency(currentFreqType);
      }

      function calculateFrequency(text) {
        charFrequency = {};
        for (let char of text) {
          if (char === "\n" || char === "\r") continue;
          charFrequency[char] = (charFrequency[char] || 0) + 1;
        }
      }

      function showFrequency(type) {
        currentFreqType = type;

        // 更新标签页
        document.querySelectorAll(".freq-tab").forEach((tab) => {
          tab.classList.remove("active");
          if (tab.textContent.includes(getTabName(type))) {
            tab.classList.add("active");
          }
        });

        const container = document.getElementById("frequencyList");

        if (Object.keys(charFrequency).length === 0) {
          container.innerHTML = '<div class="empty-state">输入文本后显示字符频率</div>';
          return;
        }

        // 过滤字符
        let filtered = Object.entries(charFrequency);

        switch (type) {
          case "chinese":
            filtered = filtered.filter(([char]) => /[\u4e00-\u9fa5]/.test(char));
            break;
          case "english":
            filtered = filtered.filter(([char]) => /[a-zA-Z]/.test(char));
            break;
          case "number":
            filtered = filtered.filter(([char]) => /[0-9]/.test(char));
            break;
        }

        // 排序（按频率降序）
        filtered.sort((a, b) => b[1] - a[1]);

        // 只显示前100个
        filtered = filtered.slice(0, 100);

        if (filtered.length === 0) {
          container.innerHTML = '<div class="empty-state">没有找到相关字符</div>';
          return;
        }

        container.innerHTML = filtered
          .map(
            ([char, count]) => `
                <div class="freq-item">
                    <span class="freq-char">${char === " " ? "空格" : char}</span>
                    <span class="freq-count">${count}</span>
                </div>
            `
          )
          .join("");
      }

      function getTabName(type) {
        const names = { all: "全部", chinese: "中文", english: "英文", number: "数字" };
        return names[type];
      }

      function formatBytes(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      function clearText() {
        document.getElementById("textInput").value = "";
        analyzeText();
      }

      function copyText() {
        const text = document.getElementById("textInput").value;
        navigator.clipboard.writeText(text).then(() => {
          alert("已复制到剪贴板");
        });
      }

      async function pasteText() {
        try {
          const text = await navigator.clipboard.readText();
          document.getElementById("textInput").value = text;
          analyzeText();
        } catch (err) {
          alert("无法访问剪贴板，请手动粘贴");
        }
      }

      function removeSpaces() {
        const textarea = document.getElementById("textInput");
        textarea.value = textarea.value.replace(/ /g, "");
        analyzeText();
      }

      function removeLineBreaks() {
        const textarea = document.getElementById("textInput");
        textarea.value = textarea.value.replace(/\n/g, "");
        analyzeText();
      }

      function toUpperCase() {
        const textarea = document.getElementById("textInput");
        textarea.value = textarea.value.toUpperCase();
        analyzeText();
      }

      function toLowerCase() {
        const textarea = document.getElementById("textInput");
        textarea.value = textarea.value.toLowerCase();
        analyzeText();
      }

      // 初始化
      analyzeText();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

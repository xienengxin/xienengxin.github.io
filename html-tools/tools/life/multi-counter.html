      .counter-card {
        background: var(--card-background-color);

      .counter-actions {

      }

      .counter-actions button {
        background: none;

        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;

      .counter-controls button:active {

      .btn-minus {

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      多功能计数器
    </nav>
    <div class="container">
      <header>
        <h1>🔢 多功能计数器</h1>
        <div class="header-actions">
          <button class="outline" onclick="exportData()">📥 导出</button>
          <button class="outline" onclick="importData()">📤 导入</button>
          <button class="theme-toggle" onclick="toggleTheme()">🌓 主题</button>
        </div>
      </header>

      <div class="summary-panel" id="summaryPanel" style="display: none">
        <div class="summary-card">
          <div class="label">计数器总数</div>
          <div class="value" id="totalCounters">0</div>
        </div>
        <div class="summary-card">
          <div class="label">总计数</div>
          <div class="value" id="totalCount">0</div>
        </div>
        <div class="summary-card">
          <div class="label">总操作次数</div>
          <div class="value" id="totalOperations">0</div>
        </div>
      </div>

      <div class="panel">
        <h3>➕ 添加计数器</h3>
        <div class="add-counter-form">
          <input
            type="text"
            id="counterName"
            placeholder="计数器名称（可选）"
            onkeypress="if (event.key === 'Enter') addCounter();"
          />
          <input
            type="number"
            id="initialValue"
            placeholder="初始值"
            value="0"
            style="width: 100px"
          />
          <button onclick="addCounter()">添加</button>
        </div>
        <div class="keyboard-hints">
          <span>
            <kbd>↑</kbd>
            /
            <kbd>↓</kbd>
            增减
          </span>
          <span>
            <kbd>R</kbd>
            重置
          </span>
          <span>
            <kbd>Tab</kbd>
            切换
          </span>
          <span>
            <kbd>Delete</kbd>
            删除
          </span>
        </div>
      </div>

      <div class="counters-grid" id="countersGrid">
        <div class="empty-state">
          <div class="icon">📊</div>
          <p>
            还没有计数器
            <br />
            <small>点击上方按钮添加一个</small>
          </p>
        </div>
      </div>
    </div>

    <input
      type="file"
      id="importInput"
      accept=".json"
      style="display: none"
      onchange="handleImport(event)"
    />

    <script>
      let counters = [];
      let selectedIndex = -1;

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        loadFromStorage();
        renderCounters();
        setupKeyboardShortcuts();
      });

      function initTheme() {
        const saved = localStorage.getItem("theme");
        if (saved) document.documentElement.setAttribute("data-theme", saved);
      }

      window.toggleTheme = function () {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      };

      function loadFromStorage() {
        const saved = localStorage.getItem("multiCounters");
        if (saved) {
          try {
            counters = JSON.parse(saved);
          } catch (e) {
            counters = [];
          }
        }
      }

      function saveToStorage() {
        localStorage.setItem("multiCounters", JSON.stringify(counters));
      }

      window.addCounter = function () {
        const nameInput = document.getElementById("counterName");
        const valueInput = document.getElementById("initialValue");
        const name = nameInput.value.trim() || "计数器 " + (counters.length + 1);
        const value = parseInt(valueInput.value) || 0;

        counters.push({
          id: Date.now(),
          name: name,
          value: value,
          initialValue: value,
          step: 1,
          operations: 0,
          createdAt: new Date().toISOString(),
          lastModified: new Date().toISOString()
        });

        nameInput.value = "";
        valueInput.value = "0";
        saveToStorage();
        renderCounters();
        showToast("计数器已添加");
      };

      function renderCounters() {
        const grid = document.getElementById("countersGrid");
        const summary = document.getElementById("summaryPanel");

        if (counters.length === 0) {
          grid.innerHTML =
            '<div class="empty-state"><div class="icon">📊</div><p>还没有计数器<br><small>点击上方按钮添加一个</small></p></div>';
          summary.style.display = "none";
          return;
        }

        summary.style.display = "grid";
        document.getElementById("totalCounters").textContent = counters.length;
        document.getElementById("totalCount").textContent = counters.reduce(
          (sum, c) => sum + c.value,
          0
        );
        document.getElementById("totalOperations").textContent = counters.reduce(
          (sum, c) => sum + c.operations,
          0
        );

        grid.innerHTML = counters
          .map(
            (counter, index) =>
              '<div class="counter-card ' +
              (index === selectedIndex ? "selected" : "") +
              '" data-index="' +
              index +
              '" onclick="selectCounter(' +
              index +
              ')">' +
              '<div class="counter-header">' +
              '<span class="counter-name">' +
              escapeHtml(counter.name) +
              "</span>" +
              '<div class="counter-actions">' +
              '<button onclick="event.stopPropagation(); editName(' +
              index +
              ')" title="编辑名称">✏️</button>' +
              '<button onclick="event.stopPropagation(); duplicateCounter(' +
              index +
              ')" title="复制">📋</button>' +
              '<button onclick="event.stopPropagation(); deleteCounter(' +
              index +
              ')" title="删除">🗑️</button>' +
              "</div>" +
              "</div>" +
              '<div class="counter-value">' +
              counter.value.toLocaleString() +
              "</div>" +
              '<div class="counter-controls">' +
              '<button class="btn-minus" onclick="event.stopPropagation(); updateValue(' +
              index +
              ', -1)">−</button>' +
              '<button class="btn-reset" onclick="event.stopPropagation(); resetCounter(' +
              index +
              ')">↺</button>' +
              '<button class="btn-plus" onclick="event.stopPropagation(); updateValue(' +
              index +
              ', 1)">+</button>' +
              "</div>" +
              '<div class="counter-step">' +
              "<span>步长:</span>" +
              '<input type="number" value="' +
              counter.step +
              '" min="1" onclick="event.stopPropagation()" onchange="updateStep(' +
              index +
              ', this.value)">' +
              "</div>" +
              '<div class="counter-meta">' +
              "<span>初始: " +
              counter.initialValue +
              "</span>" +
              "<span>操作: " +
              counter.operations +
              "次</span>" +
              "</div>" +
              "</div>"
          )
          .join("");
      }

      window.selectCounter = function (index) {
        selectedIndex = index;
        renderCounters();
      };

      window.updateValue = function (index, direction) {
        const counter = counters[index];
        counter.value += direction * counter.step;
        counter.operations++;
        counter.lastModified = new Date().toISOString();
        saveToStorage();
        renderCounters();
      };

      function resetCounter(index) {
        const counter = counters[index];
        counter.value = counter.initialValue;
        counter.operations++;
        counter.lastModified = new Date().toISOString();
        saveToStorage();
        renderCounters();
      }

      window.updateStep = function (index, value) {
        counters[index].step = Math.max(1, parseInt(value) || 1);
        saveToStorage();
      };

      window.editName = function (index) {
        const newName = prompt("输入新名称:", counters[index].name);
        if (newName !== null && newName.trim()) {
          counters[index].name = newName.trim();
          counters[index].lastModified = new Date().toISOString();
          saveToStorage();
          renderCounters();
        }
      };

      window.duplicateCounter = function (index) {
        const original = counters[index];
        counters.push({
          ...original,
          id: Date.now(),
          name: original.name + " (副本)",
          operations: 0,
          createdAt: new Date().toISOString(),
          lastModified: new Date().toISOString()
        });
        saveToStorage();
        renderCounters();
        showToast("计数器已复制");
      };

      function deleteCounter(index) {
        if (confirm('确定删除 "' + counters[index].name + '" 吗？')) {
          counters.splice(index, 1);
          if (selectedIndex >= counters.length) selectedIndex = counters.length - 1;
          saveToStorage();
          renderCounters();
          showToast("计数器已删除");
        }
      }

      function setupKeyboardShortcuts() {
        document.addEventListener("keydown", (e) => {
          if (e.target.tagName === "INPUT") return;

          if (selectedIndex >= 0 && selectedIndex < counters.length) {
            switch (e.key) {
              case "ArrowUp":
              case "+":
              case "=":
                e.preventDefault();
                updateValue(selectedIndex, 1);
                break;
              case "ArrowDown":
              case "-":
                e.preventDefault();
                updateValue(selectedIndex, -1);
                break;
              case "r":
              case "R":
                e.preventDefault();
                resetCounter(selectedIndex);
                break;
              case "Delete":
              case "Backspace":
                e.preventDefault();
                deleteCounter(selectedIndex);
                break;
            }
          }

          if (e.key === "Tab" && counters.length > 0) {
            e.preventDefault();
            if (e.shiftKey) {
              selectedIndex = selectedIndex <= 0 ? counters.length - 1 : selectedIndex - 1;
            } else {
              selectedIndex = (selectedIndex + 1) % counters.length;
            }
            renderCounters();
          }
        });
      }

      window.exportData = function () {
        if (counters.length === 0) {
          showToast("没有数据可导出");
          return;
        }

        const data = { version: 1, exportedAt: new Date().toISOString(), counters: counters };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "counters-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
        showToast("数据已导出");
      };

      window.importData = function () {
        document.getElementById("importInput").click();
      };

      window.handleImport = function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.counters && Array.isArray(data.counters)) {
              const action = confirm('是否合并到现有计数器？\n点击"确定"合并，点击"取消"替换全部');
              if (action) {
                counters = [...counters, ...data.counters];
              } else {
                counters = data.counters;
              }
              saveToStorage();
              renderCounters();
              showToast("已导入 " + data.counters.length + " 个计数器");
            } else {
              showToast("无效的数据格式");
            }
          } catch (err) {
            showToast("导入失败: " + err.message);
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      };

      window.escapeHtml = function (text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      };

      function showToast(message) {
        const existing = document.querySelector(".toast");
        if (existing) existing.remove();

        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => toast.remove(), 2500);
      }
    </script>
  </body>
</html>

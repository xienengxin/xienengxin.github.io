      <h1>✅ 习惯打卡追踪器</h1>
      <p class="subtitle">坚持每日打卡，养成良好习惯</p>

      <div class="add-habit">
        <input
          type="text"
          id="newHabitInput"
          placeholder="输入新习惯，如：每日阅读30分钟"
          onkeypress="handleEnter(event)"
        />
        <button onclick="addHabit()">+ 添加习惯</button>
      </div>

      <div class="habits-list" id="habitsList">
        <div class="empty-state">
          <div class="icon">📝</div>
          <div>
            还没有添加习惯
            <br />
            开始添加你想要坚持的好习惯吧！
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_habits_v1";
      let habits = [];

      function loadHabits() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          habits = saved ? JSON.parse(saved) : [];
        } catch (e) {
          habits = [];
        }
        renderHabits();
      }

      function saveHabits() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
      }

      function handleEnter(event) {
        if (event.key === "Enter") {
          addHabit();
        }
      }

      function addHabit() {
        const input = document.getElementById("newHabitInput");
        const name = input.value.trim();

        if (!name) return;

        habits.push({
          id: Date.now(),
          name: name,
          checks: {} // { '2024-01-15': true }
        });

        input.value = "";
        saveHabits();
        renderHabits();
      }

      function deleteHabit(id) {
        if (!confirm("确定要删除这个习惯吗？")) return;

        habits = habits.filter((h) => h.id !== id);
        saveHabits();
        renderHabits();
      }

      function toggleCheck(habitId, dateStr) {
        const habit = habits.find((h) => h.id === habitId);
        if (!habit) return;

        // Don't allow checking future dates
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const checkDate = new Date(dateStr);
        if (checkDate > today) return;

        if (habit.checks[dateStr]) {
          delete habit.checks[dateStr];
        } else {
          habit.checks[dateStr] = true;
        }

        saveHabits();
        renderHabits();
      }

      function getDateString(date) {
        return date.toISOString().split("T")[0];
      }

      function getLast30Days() {
        const days = [];
        const today = new Date();

        for (let i = 29; i >= 0; i--) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          days.push(date);
        }

        return days;
      }

      function calculateStreak(habit) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        let streak = 0;

        for (let i = 0; i < 365; i++) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          const dateStr = getDateString(date);

          if (habit.checks[dateStr]) {
            streak++;
          } else {
            break;
          }
        }

        return streak;
      }

      function calculateStats(habit) {
        const days = getLast30Days();
        const checked = days.filter((d) => habit.checks[getDateString(d)]).length;
        const rate = ((checked / 30) * 100).toFixed(0);
        const streak = calculateStreak(habit);

        return { checked, rate, streak };
      }

      function renderHabits() {
        const container = document.getElementById("habitsList");

        if (habits.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📝</div>
            <div>还没有添加习惯<br>开始添加你想要坚持的好习惯吧！</div>
          </div>
        `;
          return;
        }

        const days = getLast30Days();
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        container.innerHTML = habits
          .map((habit) => {
            const stats = calculateStats(habit);

            return `
          <div class="habit-card">
            <div class="habit-header">
              <div class="habit-title">${habit.name}</div>
              <div style="display:flex;align-items:center;gap:1rem">
                <div class="habit-streak">
                  <span class="icon">🔥</span>
                  <span>${stats.streak} 天连续打卡</span>
                </div>
                <button class="habit-delete" onclick="deleteHabit(${habit.id})">×</button>
              </div>
            </div>

            <div class="calendar-labels">
              <div>一</div>
              <div>二</div>
              <div>三</div>
              <div>四</div>
              <div>五</div>
              <div>六</div>
              <div>日</div>
            </div>

            <div class="calendar">
              ${days
                .map((day) => {
                  const dateStr = getDateString(day);
                  const isChecked = habit.checks[dateStr];
                  const isFuture = day > today;
                  const dayOfMonth = day.getDate();

                  return `
                  <div
                    class="calendar-day ${isChecked ? "checked" : ""} ${isFuture ? "future" : ""}"
                    onclick="${isFuture ? "" : `toggleCheck(${habit.id}, '${dateStr}')`}"
                    title="${day.toLocaleDateString("zh-CN")}"
                  >
                    ${isChecked ? "" : dayOfMonth}
                  </div>
                `;
                })
                .join("")}
            </div>

            <div class="stats">
              <div class="stat-item">
                <div class="stat-value">${stats.checked}</div>
                <div class="stat-label">30天内打卡</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${stats.rate}%</div>
                <div class="stat-label">完成率</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${Object.keys(habit.checks).length}</div>
                <div class="stat-label">总打卡天数</div>
              </div>
            </div>
          </div>
        `;
          })
          .join("");
      }

      // Initialize
      loadHabits();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

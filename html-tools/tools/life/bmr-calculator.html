              id="age"
              value="25"
              min="1"
              max="120"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <span class="input-unit">岁</span>
          </div>
        </div>

        <div class="form-group">
          <label>身高</label>
          <div class="input-with-unit">
            <input
              type="number"
              class="form-input"
              id="height"
              value="170"
              min="50"
              max="250"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <span class="input-unit">cm</span>
          </div>
        </div>

        <div class="form-group">
          <label>体重</label>
          <div class="input-with-unit">
            <input
              type="number"
              class="form-input"
              id="weight"
              value="65"
              min="20"
              max="300"
              step="0.1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <span class="input-unit">kg</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">🏃 活动水平</div>
        <div class="activity-select">
          <label class="activity-option active" onclick="setActivity(1.2)">
            <input type="radio" name="activity" value="1.2" checked />
            <div class="activity-name">久坐不动</div>
            <div class="activity-desc">办公室工作，几乎不运动</div>
          </label>
          <label class="activity-option" onclick="setActivity(1.375)">
            <input type="radio" name="activity" value="1.375" />
            <div class="activity-name">轻度活动</div>
            <div class="activity-desc">每周运动1-3次</div>
          </label>
          <label class="activity-option" onclick="setActivity(1.55)">
            <input type="radio" name="activity" value="1.55" />
            <div class="activity-name">中度活动</div>
            <div class="activity-desc">每周运动3-5次</div>
          </label>
          <label class="activity-option" onclick="setActivity(1.725)">
            <input type="radio" name="activity" value="1.725" />
            <div class="activity-name">高度活动</div>
            <div class="activity-desc">每周运动6-7次，高强度</div>
          </label>
          <label class="activity-option" onclick="setActivity(1.9)">
            <input type="radio" name="activity" value="1.9" />
            <div class="activity-name">专业运动员</div>
            <div class="activity-desc">每天高强度训练或体力劳动</div>
          </label>
        </div>
      </div>

      <button class="btn" onclick="calculate()" aria-label="计算代谢率">计算代谢率</button>

      <div id="resultSection" style="display: none; margin-top: 20px">
        <div class="result-card">
          <div class="result-label">基础代谢率 (BMR)</div>
          <div class="result-main" id="bmrValue">0</div>
          <div class="result-unit">千卡/天</div>

          <div class="result-grid">
            <div class="result-item">
              <div class="result-item-value" id="tdeeValue">0</div>
              <div class="result-item-label">每日总消耗 (TDEE)</div>
            </div>
            <div class="result-item">
              <div class="result-item-value" id="loseWeight">0</div>
              <div class="result-item-label">减重摄入建议</div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top: 20px">
          <div class="bmi-display">
            <div class="section-title" style="margin-bottom: 8px">📊 BMI 指数</div>
            <div class="bmi-bar">
              <div class="bmi-indicator" id="bmiIndicator"></div>
            </div>
            <div class="bmi-labels">
              <span>偏瘦</span>
              <span>正常</span>
              <span>超重</span>
              <span>肥胖</span>
            </div>
            <div class="bmi-value">
              <div class="bmi-number" id="bmiValue">0</div>
              <div class="bmi-status" id="bmiStatus">-</div>
            </div>
          </div>

          <div class="detail-section">
            <div class="section-title">📋 详细数据</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-label">理想体重</span>
                <span class="detail-value" id="idealWeight">-</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">体脂率(估)</span>
                <span class="detail-value" id="bodyFat">-</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">增重摄入</span>
                <span class="detail-value" id="gainWeight">-</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">维持体重</span>
                <span class="detail-value" id="maintainWeight">-</span>
              </div>
            </div>
          </div>

          <div class="tips-section">
            <div class="section-title">💡 健康建议</div>
            <div id="tipsList"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let gender = "male";
      let activityLevel = 1.2;

      function setGender(g) {
        gender = g;
        document.getElementById("genderMale").classList.toggle("active", g === "male");
        document.getElementById("genderFemale").classList.toggle("active", g === "female");
      }

      function setActivity(level) {
        activityLevel = level;
        document.querySelectorAll(".activity-option").forEach((opt) => {
          opt.classList.remove("active");
        });
        event.currentTarget.classList.add("active");
      }

      function calculate() {
        const age = parseInt(document.getElementById("age").value);
        const height = parseFloat(document.getElementById("height").value);
        const weight = parseFloat(document.getElementById("weight").value);

        if (!age || !height || !weight) {
          alert("请填写完整信息");
          return;
        }

        // Mifflin-St Jeor 公式计算 BMR
        let bmr;
        if (gender === "male") {
          bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else {
          bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }

        // TDEE = BMR * 活动系数
        const tdee = bmr * activityLevel;

        // BMI
        const bmi = weight / Math.pow(height / 100, 2);

        // 理想体重 (BMI = 22)
        const idealWeight = 22 * Math.pow(height / 100, 2);

        // 体脂率估算 (BMI法)
        let bodyFat;
        if (gender === "male") {
          bodyFat = 1.2 * bmi + 0.23 * age - 16.2;
        } else {
          bodyFat = 1.2 * bmi + 0.23 * age - 5.4;
        }
        bodyFat = Math.max(3, Math.min(60, bodyFat));

        // 显示结果
        document.getElementById("resultSection").style.display = "block";
        document.getElementById("bmrValue").textContent = Math.round(bmr);
        document.getElementById("tdeeValue").textContent = Math.round(tdee);
        document.getElementById("loseWeight").textContent = Math.round(tdee * 0.8);
        document.getElementById("bmiValue").textContent = bmi.toFixed(1);
        document.getElementById("idealWeight").textContent = idealWeight.toFixed(1) + " kg";
        document.getElementById("bodyFat").textContent = bodyFat.toFixed(1) + "%";
        document.getElementById("gainWeight").textContent = Math.round(tdee * 1.15) + " kcal";
        document.getElementById("maintainWeight").textContent = Math.round(tdee) + " kcal";

        // BMI 状态
        let bmiStatus, bmiPosition;
        if (bmi < 18.5) {
          bmiStatus = "偏瘦";
          bmiPosition = (bmi / 18.5) * 25;
        } else if (bmi < 24) {
          bmiStatus = "正常";
          bmiPosition = 25 + ((bmi - 18.5) / 5.5) * 25;
        } else if (bmi < 28) {
          bmiStatus = "超重";
          bmiPosition = 50 + ((bmi - 24) / 4) * 25;
        } else {
          bmiStatus = "肥胖";
          bmiPosition = 75 + Math.min(((bmi - 28) / 12) * 25, 25);
        }

        document.getElementById("bmiStatus").textContent = bmiStatus;
        document.getElementById("bmiIndicator").style.left = bmiPosition + "%";

        // 生成建议
        const tips = [];

        if (bmi < 18.5) {
          tips.push({
            icon: "🍽️",
            title: "适当增加热量摄入",
            desc: "建议每日摄入比TDEE多300-500千卡，选择高营养密度食物"
          });
        } else if (bmi >= 24) {
          tips.push({
            icon: "🥗",
            title: "控制热量摄入",
            desc: "建议每日摄入比TDEE少300-500千卡，安全减重速度为每周0.5-1kg"
          });
        }

        tips.push({
          icon: "💧",
          title: "保持水分摄入",
          desc: `建议每日饮水${Math.round(weight * 35)}ml，约${Math.round((weight * 35) / 250)}杯水`
        });

        tips.push({
          icon: "🏋️",
          title: "增加肌肉量",
          desc: "力量训练可以提高基础代谢率，每周建议进行2-3次力量训练"
        });

        tips.push({
          icon: "😴",
          title: "保证充足睡眠",
          desc: "睡眠不足会降低代谢率，建议每天保证7-9小时睡眠"
        });

        document.getElementById("tipsList").innerHTML = tips
          .map(
            (tip) => `
                <div class="tip-item">
                    <span class="tip-icon">${tip.icon}</span>
                    <div class="tip-content">
                        <div class="tip-title">${tip.title}</div>
                        <div class="tip-desc">${tip.desc}</div>
                    </div>
                </div>
            `
          )
          .join("");

        // 滚动到结果
        document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" });
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

    <div class="container">

              type="number"
              id="hours"
              value="0"
              min="0"
              max="99"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="time-input">
            <label for="input---">分钟</label>
            <input
              type="number"
              id="minutes"
              value="5"
              min="0"
              max="59"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="time-input">
            <label for="input--">秒</label>
            <input
              type="number"
              id="seconds"
              value="0"
              min="0"
              max="59"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="startBtn" onclick="startTimer()" aria-label="开始">
            开始
          </button>
          <button class="btn" id="pauseBtn" onclick="pauseTimer()" disabled aria-label="暂停">
            暂停
          </button>
          <button class="btn danger" id="resetBtn" onclick="resetTimer()" aria-label="重置">
            重置
          </button>
        </div>

        <div class="presets">
          <h4>快速设置</h4>
          <div class="preset-grid">
            <button class="preset-btn" onclick="setPreset(1, 0)" aria-label="1 分钟">1 分钟</button>
            <button class="preset-btn" onclick="setPreset(3, 0)" aria-label="3 分钟">3 分钟</button>

              25 分钟

              30 分钟

    <script>
      let timer = null;
      let remaining = 0;
      let total = 0;
      let isPaused = false;

      function formatTime(secs) {
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        return `${h.toString().padStart(2, "0")}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      }

      function updateDisplay() {
        document.getElementById("timeDisplay").textContent = formatTime(remaining);
        const progress = total > 0 ? ((total - remaining) / total) * 100 : 0;
        document.getElementById("progressFill").style.width = progress + "%";
      }

      function startTimer() {
        if (timer && !isPaused) return;

        if (!isPaused) {
          const h = parseInt(document.getElementById("hours").value) || 0;
          const m = parseInt(document.getElementById("minutes").value) || 0;
          const s = parseInt(document.getElementById("seconds").value) || 0;
          total = h * 3600 + m * 60 + s;
          remaining = total;
        }

        if (remaining <= 0) return;

        isPaused = false;
        document.getElementById("timeInputs").style.opacity = "0.5";
        document.getElementById("timeInputs").style.pointerEvents = "none";
        document.getElementById("startBtn").disabled = true;
        document.getElementById("pauseBtn").disabled = false;
        document.getElementById("statusLabel").textContent = "倒计时中...";
        document.getElementById("display").classList.remove("finished");

        timer = setInterval(() => {
          remaining--;
          updateDisplay();

          if (remaining <= 0) {
            clearInterval(timer);
            timer = null;
            onFinished();
          }
        }, 1000);
      }

      function pauseTimer() {
        if (!timer) return;

        clearInterval(timer);
        timer = null;
        isPaused = true;

        document.getElementById("startBtn").disabled = false;
        document.getElementById("startBtn").textContent = "继续";
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("statusLabel").textContent = "已暂停";
      }

      function resetTimer() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }

        remaining = 0;
        total = 0;
        isPaused = false;

        document.getElementById("timeDisplay").textContent = "00:00:00";
        document.getElementById("progressFill").style.width = "0%";
        document.getElementById("timeInputs").style.opacity = "1";
        document.getElementById("timeInputs").style.pointerEvents = "auto";
        document.getElementById("startBtn").disabled = false;
        document.getElementById("startBtn").textContent = "开始";
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("statusLabel").textContent = "设置时间开始倒计时";
        document.getElementById("display").classList.remove("finished");

        document.title = "倒计时器 - WebUtils";
      }

      function onFinished() {
        document.getElementById("display").classList.add("finished");
        document.getElementById("statusLabel").textContent = "时间到！";
        document.getElementById("startBtn").disabled = false;
        document.getElementById("startBtn").textContent = "开始";
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("timeInputs").style.opacity = "1";
        document.getElementById("timeInputs").style.pointerEvents = "auto";

        document.title = "⏰ 时间到！";

        // Try to play sound and show notification
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification("倒计时结束", { body: "时间到！", icon: "⏰" });
        }

        // Vibrate if supported
        if ("vibrate" in navigator) {
          navigator.vibrate([200, 100, 200, 100, 200]);
        }
      }

      function setPreset(minutes, seconds) {
        document.getElementById("hours").value = Math.floor(minutes / 60);
        document.getElementById("minutes").value = minutes % 60;
        document.getElementById("seconds").value = seconds;
      }

      // Request notification permission
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      // Update title with remaining time
      setInterval(() => {
        if (timer && remaining > 0) {
          document.title = `${formatTime(remaining)} - 倒计时`;
        }
      }, 1000);

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      番茄钟
    </nav>
    <div class="container">
      <div class="card">
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="setMode('work')" aria-label="工作">工作</button>
          <button class="mode-tab" onclick="setMode('shortBreak')" aria-label="短休息">
            短休息
          </button>
          <button class="mode-tab" onclick="setMode('longBreak')" aria-label="长休息">
            长休息
          </button>
        </div>
        <div class="timer-ring">
          <svg width="250" height="250">
            <circle class="bg" cx="125" cy="125" r="110"></circle>
            <circle
              class="progress"
              id="progress"
              cx="125"
              cy="125"
              r="110"
              stroke-dasharray="691.15"
              stroke-dashoffset="0"
            ></circle>
          </svg>
          <div class="timer-display">
            <div class="time" id="time">25:00</div>
            <div class="label" id="modeLabel">专注工作</div>
          </div>
        </div>
        <div class="controls">
          <button class="btn btn-secondary" onclick="reset()" aria-label="↺">↺</button>
          <button class="btn btn-primary" id="playBtn" onclick="toggle()" aria-label="▶">▶</button>
          <button class="btn btn-secondary" onclick="skip()" aria-label="⏭">⏭</button>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="completedCount">0</div>
            <div class="stat-label">完成番茄</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalTime">0</div>
            <div class="stat-label">分钟</div>
          </div>
        </div>
        <div class="settings">
          <div class="setting-row">
            <span class="setting-label">工作时长 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="workTime"
              value="25"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-row">
            <span class="setting-label">短休息 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="shortBreakTime"
              value="5"
              min="1"
              max="30"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-row">
            <span class="setting-label">长休息 (分钟)</span>
            <input
              type="number"
              class="setting-input"
              id="longBreakTime"
              value="15"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>
    </div>
    <script>
      let mode = "work";
      let isRunning = false;
      let timeLeft = 25 * 60;
      let totalSeconds = 25 * 60;
      let interval = null;
      let completedPomodoros = 0;
      let totalMinutes = 0;
      const modes = {
        work: { time: 25, label: "专注工作", color: "#e74c3c" },
        shortBreak: { time: 5, label: "短休息", color: "#27ae60" },
        longBreak: { time: 15, label: "长休息", color: "#3498db" }
      };
      function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById("time").textContent =
          `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
        const progress = (1 - timeLeft / totalSeconds) * 691.15;
        document.getElementById("progress").style.strokeDashoffset = progress;
        document.title = `${mins}:${secs.toString().padStart(2, "0")} - 番茄钟`;
      }
      function setMode(newMode) {
        mode = newMode;
        document.querySelectorAll(".mode-tab").forEach((tab, i) => {
          tab.classList.toggle("active", ["work", "shortBreak", "longBreak"][i] === newMode);
        });
        document.getElementById("progress").style.stroke = modes[mode].color;
        document.getElementById("modeLabel").textContent = modes[mode].label;
        reset();
      }
      function updateSettings() {
        modes.work.time = parseInt(document.getElementById("workTime").value) || 25;
        modes.shortBreak.time = parseInt(document.getElementById("shortBreakTime").value) || 5;
        modes.longBreak.time = parseInt(document.getElementById("longBreakTime").value) || 15;
        reset();
      }
      function toggle() {
        isRunning = !isRunning;
        document.getElementById("playBtn").textContent = isRunning ? "⏸" : "▶";
        if (isRunning) {
          interval = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
              clearInterval(interval);
              isRunning = false;
              document.getElementById("playBtn").textContent = "▶";
              if (mode === "work") {
                completedPomodoros++;
                totalMinutes += modes.work.time;
                document.getElementById("completedCount").textContent = completedPomodoros;
                document.getElementById("totalTime").textContent = totalMinutes;
                new Audio(
                  "data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleT0APYq95cmrYiQMXKvI9NChaCA="
                )
                  .play()
                  .catch(() => {});
              }
              alert(mode === "work" ? "工作时间结束，休息一下吧！" : "休息结束，开始工作！");
            }
          }, 1000);
        } else {
          clearInterval(interval);
        }
      }
      function reset() {
        clearInterval(interval);
        isRunning = false;
        document.getElementById("playBtn").textContent = "▶";
        timeLeft = modes[mode].time * 60;
        totalSeconds = timeLeft;
        updateDisplay();
      }
      function skip() {
        const nextMode =
          mode === "work" ? (completedPomodoros % 4 === 3 ? "longBreak" : "shortBreak") : "work";
        setMode(nextMode);
      }
      updateDisplay();
    </script>

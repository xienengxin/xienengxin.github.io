      function formatInput() {
        const input = document.getElementById("cardInput");
        let value = input.value.replace(/\D/g, "");
        // 每4位加空格
        value = value.replace(/(\d{4})(?=\d)/g, "$1 ");
        input.value = value;
      }

      async function pasteCard() {
        try {
          const text = await navigator.clipboard.readText();
          document.getElementById("cardInput").value = text.replace(/\D/g, "").substring(0, 19);
          formatInput();
        } catch (e) {
          console.error("无法访问剪贴板");
        }
      }

      function quickQuery(bin) {
        document.getElementById("cardInput").value = bin;
        query();
      }

      function query() {
        const cardNumber = document.getElementById("cardInput").value.replace(/\s/g, "");
        const resultSection = document.getElementById("resultSection");

        if (cardNumber.length < 6) {
          alert("请输入至少6位卡号");
          return;
        }

        // 查找匹配的BIN
        let result = null;
        let matchedBin = "";

        // 优先匹配长BIN
        for (let len = 8; len >= 3; len--) {
          const bin = cardNumber.substring(0, len);
          if (binDatabase[bin]) {
            result = binDatabase[bin];
            matchedBin = bin;
            break;
          }
        }

        if (!result) {
          // 根据卡号前缀猜测卡组织
          const prefix = cardNumber.substring(0, 2);
          let org = "银联";
          if (prefix === "4") org = "VISA";
          else if (prefix === "5") org = "MasterCard";
          else if (prefix === "62") org = "银联";
          else if (prefix === "35") org = "JCB";

          result = {
            bank: "未知银行",
            type: "未知",
            org: org,
            length: cardNumber.length > 16 ? 19 : 16,
            bankType: "未知",
            color: "#666"
          };
          matchedBin = cardNumber.substring(0, 6);
        }

        resultSection.classList.remove("hidden");

        // 更新银行卡显示
        const bankCard = document.getElementById("bankCard");
        bankCard.style.background = `linear-gradient(135deg, ${result.color}, ${adjustColor(result.color, -30)})`;

        document.getElementById("bankName").textContent = result.bank;
        document.getElementById("cardNumber").textContent = formatCardDisplay(cardNumber);
        document.getElementById("cardTypeDisplay").textContent = `${result.type} | ${result.org}`;

        // 更新详情
        document.getElementById("issuerBank").textContent = result.bank;
        document.getElementById("cardType").textContent = result.type;
        document.getElementById("cardOrg").textContent = result.org;
        document.getElementById("binCode").textContent = matchedBin;
        document.getElementById("cardLength").textContent = result.length + "位";
        document.getElementById("bankType").textContent = result.bankType;
      }

      function formatCardDisplay(num) {
        const masked =
          num.substring(0, 4) +
          " **** **** " +
          (num.length > 12 ? num.substring(num.length - 4) : "****");
        return masked;
      }

      function adjustColor(color, amount) {
        const hex = color.replace("#", "");
        const r = Math.max(0, Math.min(255, parseInt(hex.substring(0, 2), 16) + amount));
        const g = Math.max(0, Math.min(255, parseInt(hex.substring(2, 4), 16) + amount));
        const b = Math.max(0, Math.min(255, parseInt(hex.substring(4, 6), 16) + amount));
        return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
      }

      // 回车键触发查询
      document.getElementById("cardInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") query();
      });

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }

        }
      ];

      const tianGan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
      const diZhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

      // 初始化生肖网格
      function initZodiacGrid() {
        const grid = document.getElementById("zodiacGrid");
        const currentYear = new Date().getFullYear();

        zodiacData.forEach((zodiac, index) => {
          const item = document.createElement("div");
          item.className = "zodiac-item";
          item.onclick = () => selectZodiac(index);

          const emoji = document.createElement("div");
          emoji.className = "emoji";
          emoji.textContent = zodiac.emoji;

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = zodiac.name;

          // 计算最近的年份
          const years = document.createElement("div");
          years.className = "years";
          const recentYears = [];
          for (let y = currentYear; y >= currentYear - 24; y--) {
            if ((y - 4) % 12 === index) {
              recentYears.push(y);
            }
          }
          years.textContent = recentYears.slice(0, 2).join(", ");

          item.appendChild(emoji);
          item.appendChild(name);
          item.appendChild(years);
          grid.appendChild(item);
        });
      }

      function selectZodiac(index) {
        document.querySelectorAll(".zodiac-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
        });
        showResult(index, null);
      }

      function getGanZhi(year) {
        const gan = tianGan[(year - 4) % 10];
        const zhi = diZhi[(year - 4) % 12];
        return gan + zhi + "年";
      }

      function getZodiacIndex(year) {
        return (year - 4) % 12;
      }

      function query() {
        const year = parseInt(document.getElementById("yearInput").value);
        if (isNaN(year) || year < 1900 || year > 2100) {
          alert("请输入有效的年份（1900-2100）");
          return;
        }

        const index = getZodiacIndex(year);
        document.querySelectorAll(".zodiac-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
        });
        showResult(index, year);
      }

      function showResult(index, year) {
        const zodiac = zodiacData[index];
        const resultCard = document.getElementById("resultCard");
        resultCard.classList.remove("hidden");

        document.getElementById("zodiacEmoji").textContent = zodiac.emoji;
        document.getElementById("zodiacName").textContent = zodiac.name;
        document.getElementById("ganzhi").textContent = year ? getGanZhi(year) : "";
        document.getElementById("dizhi").textContent = zodiac.dizhi;
        document.getElementById("wuxing").textContent = zodiac.wuxing;
        document.getElementById("yinyang").textContent = zodiac.yinyang;
        document.getElementById("luckyNum").textContent = zodiac.luckyNum;
        document.getElementById("luckyColor").textContent = zodiac.luckyColor;
        document.getElementById("luckyFlower").textContent = zodiac.luckyFlower;

        // 性格特点
        const traitsContainer = document.getElementById("traits");
        traitsContainer.textContent = "";
        zodiac.traits.forEach((trait) => {
          const tag = document.createElement("span");
          tag.className = "trait-tag";
          tag.textContent = trait;
          traitsContainer.appendChild(tag);
        });

        // 相合生肖
        const goodMatch = document.getElementById("goodMatch");
        goodMatch.textContent = "";
        zodiac.good.forEach((name) => {
          const item = document.createElement("span");
          item.className = "compat-item good";
          item.textContent = name;
          goodMatch.appendChild(item);
        });

        // 相冲生肖
        const badMatch = document.getElementById("badMatch");
        badMatch.textContent = "";
        zodiac.bad.forEach((name) => {
          const item = document.createElement("span");
          item.className = "compat-item bad";
          item.textContent = name;
          badMatch.appendChild(item);
        });

        // 滚动到结果
        resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      // 回车键触发查询
      document.getElementById("yearInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") query();
      });

      initZodiacGrid();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }

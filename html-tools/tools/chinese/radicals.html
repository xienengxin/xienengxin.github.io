    <script>
      // 部首数据库

        {
          char: "一",

          pinyin: "héng",

          examples: ["一", "七", "丁", "万", "丈", "三", "上", "下", "不", "与"]

            "煎",
            "煞",
            "照",
            "煤",
            "煦",
            "煮",
            "熄",
            "熊",
            "熏",
            "熔",
            "熙",
            "熟",
            "熬",
            "燃",
            "燎",
            "燕",
            "燥",
            "爆",
            "爪",
            "爬",
            "爱"
          ]
        }
      ];

      let currentFilter = "all";

      function renderRadicals(radicals) {
        const grid = document.getElementById("radicalGrid");
        grid.textContent = "";

        radicals.forEach((radical) => {
          const item = document.createElement("div");
          item.className = "radical-item";
          item.onclick = () => showDetail(radical);

          const char = document.createElement("div");
          char.className = "char";
          char.textContent = radical.char;

          const strokes = document.createElement("div");
          strokes.className = "strokes";
          strokes.textContent = radical.strokes + "画";

          item.appendChild(char);
          item.appendChild(strokes);
          grid.appendChild(item);
        });

        document.getElementById("radicalCount").textContent = radicals.length;
      }

      function filterByStrokes(strokes) {
        currentFilter = strokes;
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.strokes === strokes);
        });

        let filtered;
        if (strokes === "all") {
          filtered = radicalDatabase;
        } else if (strokes === "6+") {
          filtered = radicalDatabase.filter((r) => r.strokes >= 6);
        } else {
          filtered = radicalDatabase.filter((r) => r.strokes === parseInt(strokes));
        }

        renderRadicals(filtered);
      }

      function search() {
        const query = document.getElementById("searchInput").value.trim();
        if (!query) {
          filterByStrokes(currentFilter);
          document.getElementById("detailCard").classList.add("hidden");
          return;
        }

        // 搜索部首
        const radicalMatch = radicalDatabase.find((r) => r.char === query || r.name === query);
        if (radicalMatch) {
          showDetail(radicalMatch);
          renderRadicals([radicalMatch]);
          return;
        }

        // 搜索包含该字的部首
        const containingRadicals = radicalDatabase.filter((r) => r.examples.includes(query));
        if (containingRadicals.length > 0) {
          renderRadicals(containingRadicals);
          if (containingRadicals.length === 1) {
            showDetail(containingRadicals[0]);
          }
          return;
        }

        // 没有找到
        document.getElementById("radicalGrid").textContent = "";
        const noResult = document.createElement("div");
        noResult.className = "no-result";
        noResult.textContent = "未找到相关部首";
        document.getElementById("radicalGrid").appendChild(noResult);
        document.getElementById("radicalCount").textContent = "0";
      }

      function showDetail(radical) {
        const detailCard = document.getElementById("detailCard");
        detailCard.classList.remove("hidden");

        document.getElementById("detailChar").textContent = radical.char;
        document.getElementById("detailName").textContent = radical.name;
        document.getElementById("detailPinyin").textContent = "拼音：" + radical.pinyin;
        document.getElementById("detailStrokes").textContent = radical.strokes;
        document.getElementById("detailExampleCount").textContent = radical.examples.length;

        const examplesGrid = document.getElementById("examplesGrid");
        examplesGrid.textContent = "";

        radical.examples.forEach((char) => {
          const item = document.createElement("div");
          item.className = "example-char";
          item.textContent = char;
          examplesGrid.appendChild(item);
        });

        // 高亮当前选中的部首
        document.querySelectorAll(".radical-item").forEach((item) => {
          const itemChar = item.querySelector(".char").textContent;
          item.classList.toggle("active", itemChar === radical.char);
        });

        detailCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      // 回车键搜索
      document.getElementById("searchInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") search();
      });

      // 初始渲染
      renderRadicals(radicalDatabase);

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

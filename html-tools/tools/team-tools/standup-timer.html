  <body>
    <div class="container">
      <div class="header">
        <a href="../../index.html" class="back-link">← 返回工具列表</a>
        <h1>站会计时器</h1>
        <p>每日站会时间管理</p>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 切换主题">
          🌓 切换主题
        </button>
      </div>

      <div class="panel">
        <div class="timer-display" id="timerDisplay">
          <div class="current-speaker" id="currentSpeaker">准备开始</div>
          <div class="timer-circle">
            <svg width="250" height="250">
              <circle class="timer-circle-bg" cx="125" cy="125" r="110"></circle>
              <circle
                class="timer-circle-progress"
                id="progressCircle"
                cx="125"
                cy="125"
                r="110"
                stroke-dasharray="691"
                stroke-dashoffset="0"
              ></circle>
            </svg>
            <div class="timer-text">
              <div class="timer-time" id="timerTime">02:00</div>
              <div class="timer-status" id="timerStatus">点击开始</div>
            </div>
          </div>
          <div class="controls">
            <button
              class="control-btn secondary"
              onclick="prevPerson()"
              title="上一位"
              aria-label="⏮"
            >
              ⏮
            </button>
            <button class="control-btn primary" id="playBtn" onclick="toggleTimer()" aria-label="▶">
              ▶
            </button>
            <button
              class="control-btn secondary"
              onclick="nextPerson()"
              title="下一位"
              aria-label="⏭"
            >
              ⏭
            </button>
            <button
              class="control-btn secondary"
              onclick="resetTimer()"
              title="重置"
              aria-label="🔄"
            >
              🔄
            </button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">⚙️ 设置</div>
        <div class="settings-row">
          <label for="input-----">每人时长</label>
          <input
            type="number"
            id="timePerPerson"
            value="120"
            min="30"
            max="600"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          秒
        </div>
        <div class="settings-row">
          <label for="input-----">预警时间</label>
          <input
            type="number"
            id="warningTime"
            value="30"
            min="5"
            max="120"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          秒 (剩余时变黄)
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">👥 参会人员</div>
        <div class="member-list" id="memberList"></div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="addMember()" aria-label="+ 添加成员">
            + 添加成员
          </button>
          <button class="btn btn-secondary shuffle-btn" onclick="shuffleMembers()">
            🔀 随机排序
          </button>
          <button class="btn btn-secondary" onclick="resetAll()" aria-label="🗑️ 重置全部">
            🗑️ 重置全部
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">📊 统计</div>
        <div class="progress-bar">
          <div class="progress-fill" id="overallProgress" style="width: 0%"></div>
        </div>
        <p style="text-align: center; margin-top: 10px; font-size: 13px">
          进度:
          <span id="progressText">0 / 0</span>
        </p>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="totalMembers">0</div>
            <div class="stat-label">总人数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="completedCount">0</div>
            <div class="stat-label">已完成</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalTime">0:00</div>
            <div class="stat-label">总耗时</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="avgTime">0:00</div>
            <div class="stat-label">平均时长</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const LS_KEY = "standup-timer-data";

      let members = [];
      let currentIndex = -1;
      let timeLeft = 120;
      let totalTimePerPerson = 120;
      let isRunning = false;
      let timerInterval = null;
      let totalElapsed = 0;

      function init() {
        const savedTheme = localStorage.getItem("theme") || "dark";
        if (savedTheme === "light") {
          document.body.setAttribute("data-theme", "light");
        }

        loadFromStorage();

        if (members.length === 0) {
          members = [
            { id: 1, name: "成员 1", done: false, time: 0 },
            { id: 2, name: "成员 2", done: false, time: 0 },
            { id: 3, name: "成员 3", done: false, time: 0 }
          ];
        }

        document.getElementById("timePerPerson").addEventListener("change", (e) => {
          totalTimePerPerson = parseInt(e.target.value) || 120;
          if (!isRunning && currentIndex === -1) {
            timeLeft = totalTimePerPerson;
            updateDisplay();
          }
          saveToStorage();
        });

        document.getElementById("warningTime").addEventListener("change", saveToStorage);

        renderMembers();
        updateDisplay();
        updateStats();
      }

      function generateId() {
        return Date.now() + Math.random().toString(36).substr(2, 9);
      }

      function addMember(name = "") {
        members.push({
          id: generateId(),
          name: name || "成员 " + (members.length + 1),
          done: false,
          time: 0
        });
        renderMembers();
        updateStats();
        saveToStorage();
      }

      function removeMember(id) {
        const index = members.findIndex((m) => m.id === id);
        if (index === currentIndex) {
          pauseTimer();
          currentIndex = -1;
        } else if (index < currentIndex) {
          currentIndex--;
        }
        members = members.filter((m) => m.id !== id);
        renderMembers();
        updateStats();
        saveToStorage();
      }

      function renderMembers() {
        const container = document.getElementById("memberList");
        container.textContent = "";

        members.forEach((member, index) => {
          const div = document.createElement("div");
          div.className = "member-item";
          if (index === currentIndex) div.classList.add("active");
          if (member.done) div.classList.add("done");

          const number = document.createElement("div");
          number.className = "member-number";
          number.textContent = member.done ? "✓" : index + 1;

          const nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.className = "member-input";
          nameInput.value = member.name;
          nameInput.addEventListener("input", (e) => {
            member.name = e.target.value;
            if (index === currentIndex) {
              document.getElementById("currentSpeaker").textContent =
                member.name || "成员 " + (index + 1);
            }
            saveToStorage();
          });
          nameInput.addEventListener("click", (e) => e.stopPropagation());

          const time = document.createElement("div");
          time.className = "member-time";
          time.textContent = formatTime(member.time);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "btn btn-danger";
          deleteBtn.textContent = "×";
          deleteBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            removeMember(member.id);
          });

          div.appendChild(number);
          div.appendChild(nameInput);
          div.appendChild(time);
          div.appendChild(deleteBtn);

          div.addEventListener("click", () => {
            if (!member.done) {
              selectMember(index);
            }
          });

          container.appendChild(div);
        });
      }

      function selectMember(index) {
        if (isRunning) {
          pauseTimer();
        }
        currentIndex = index;
        timeLeft = totalTimePerPerson;
        renderMembers();
        updateDisplay();
        document.getElementById("currentSpeaker").textContent =
          members[index]?.name || "成员 " + (index + 1);
        document.getElementById("timerStatus").textContent = "准备就绪";
      }

      function toggleTimer() {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      }

      function startTimer() {
        if (currentIndex === -1) {
          // Find first undone member
          const firstUndone = members.findIndex((m) => !m.done);
          if (firstUndone === -1) {
            showToast("所有成员已完成");
            return;
          }
          selectMember(firstUndone);
        }

        isRunning = true;
        document.getElementById("playBtn").textContent = "⏸";
        document.getElementById("timerStatus").textContent = "发言中...";
        document.getElementById("timerDisplay").classList.add("running");

        timerInterval = setInterval(() => {
          timeLeft--;
          totalElapsed++;

          if (currentIndex >= 0 && currentIndex < members.length) {
            members[currentIndex].time++;
          }

          updateDisplay();
          updateProgress();

          if (timeLeft <= 0) {
            markCurrentDone();
            nextPerson();
          }
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        document.getElementById("playBtn").textContent = "▶";
        document.getElementById("timerStatus").textContent = "已暂停";
        document.getElementById("timerDisplay").classList.remove("running");

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function resetTimer() {
        pauseTimer();
        timeLeft = totalTimePerPerson;
        updateDisplay();
        document.getElementById("timerStatus").textContent = "已重置";
      }

      function markCurrentDone() {
        if (currentIndex >= 0 && currentIndex < members.length) {
          members[currentIndex].done = true;
          playSound();
          saveToStorage();
        }
      }

      function nextPerson() {
        markCurrentDone();

        // Find next undone member
        let nextIndex = -1;
        for (let i = currentIndex + 1; i < members.length; i++) {
          if (!members[i].done) {
            nextIndex = i;
            break;
          }
        }

        if (nextIndex === -1) {
          // All done
          pauseTimer();
          currentIndex = -1;
          document.getElementById("currentSpeaker").textContent = "会议结束!";
          document.getElementById("timerStatus").textContent = "全部完成";
          showToast("站会结束!");
        } else {
          selectMember(nextIndex);
          if (isRunning) {
            startTimer();
          }
        }

        renderMembers();
        updateStats();
      }

      function prevPerson() {
        if (currentIndex > 0) {
          pauseTimer();
          // Reset current person
          if (currentIndex >= 0 && currentIndex < members.length) {
            members[currentIndex].done = false;
            members[currentIndex].time = 0;
          }
          currentIndex--;
          members[currentIndex].done = false;
          timeLeft = totalTimePerPerson - members[currentIndex].time;
          if (timeLeft < 0) timeLeft = totalTimePerPerson;
          renderMembers();
          updateDisplay();
          document.getElementById("currentSpeaker").textContent =
            members[currentIndex]?.name || "成员";
        }
      }

      function updateDisplay() {
        document.getElementById("timerTime").textContent = formatTime(timeLeft);

        const circumference = 2 * Math.PI * 110;
        const progress = timeLeft / totalTimePerPerson;
        const offset = circumference * (1 - progress);

        const progressCircle = document.getElementById("progressCircle");
        progressCircle.style.strokeDashoffset = offset;

        const warningTime = parseInt(document.getElementById("warningTime").value) || 30;
        progressCircle.classList.remove("warning", "danger");
        if (timeLeft <= 10) {
          progressCircle.classList.add("danger");
        } else if (timeLeft <= warningTime) {
          progressCircle.classList.add("warning");
        }
      }

      function updateProgress() {
        const completed = members.filter((m) => m.done).length;
        const total = members.length;
        const percent = total > 0 ? (completed / total) * 100 : 0;

        document.getElementById("overallProgress").style.width = percent + "%";
        document.getElementById("progressText").textContent = completed + " / " + total;
      }

      function updateStats() {
        const completed = members.filter((m) => m.done).length;
        const totalTime = members.reduce((sum, m) => sum + m.time, 0);
        const avgTime = completed > 0 ? Math.round(totalTime / completed) : 0;

        document.getElementById("totalMembers").textContent = members.length;
        document.getElementById("completedCount").textContent = completed;
        document.getElementById("totalTime").textContent = formatTime(totalTime);
        document.getElementById("avgTime").textContent = formatTime(avgTime);

        updateProgress();
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return mins + ":" + String(secs).padStart(2, "0");
      }

      function shuffleMembers() {
        pauseTimer();
        currentIndex = -1;

        // Reset all
        members.forEach((m) => {
          m.done = false;
          m.time = 0;
        });

        // Fisher-Yates shuffle
        for (let i = members.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [members[i], members[j]] = [members[j], members[i]];
        }

        timeLeft = totalTimePerPerson;
        totalElapsed = 0;
        renderMembers();
        updateDisplay();
        updateStats();
        saveToStorage();

        document.getElementById("currentSpeaker").textContent = "已随机排序";
        document.getElementById("timerStatus").textContent = "点击开始";
      }

      function resetAll() {
        if (confirm("确定要重置所有数据吗？")) {
          pauseTimer();
          currentIndex = -1;
          totalElapsed = 0;

          members.forEach((m) => {
            m.done = false;
            m.time = 0;
          });

          timeLeft = totalTimePerPerson;
          renderMembers();
          updateDisplay();
          updateStats();
          saveToStorage();

          document.getElementById("currentSpeaker").textContent = "准备开始";
          document.getElementById("timerStatus").textContent = "点击开始";
        }
      }

      function playSound() {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          oscillator.frequency.value = 800;
          oscillator.type = "sine";
          gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.3);
        } catch (e) {
          console.log("Sound not supported");
        }
      }

      function saveToStorage() {
        const data = {
          members: members,
          timePerPerson: parseInt(document.getElementById("timePerPerson").value) || 120,
          warningTime: parseInt(document.getElementById("warningTime").value) || 30
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.members) members = data.members;
            if (data.timePerPerson) {
              totalTimePerPerson = data.timePerPerson;
              document.getElementById("timePerPerson").value = data.timePerPerson;
              timeLeft = data.timePerPerson;
            }
            if (data.warningTime) {
              document.getElementById("warningTime").value = data.warningTime;
            }
          } catch (e) {
            console.error("Failed to load from storage:", e);
          }
        }
      }

      function showToast(message) {
        const toast = document.createElement("div");
        toast.style.cssText =
          "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent-color);color:#000;padding:12px 24px;border-radius:8px;z-index:1000;font-size:14px;";
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      window.toggleTheme = function () {
        const body = document.body;
        const currentTheme = body.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        body.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      init();
    </script>
  </body>
</html>

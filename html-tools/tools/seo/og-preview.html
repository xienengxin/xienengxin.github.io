      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;

      [data-theme="light"] {

        --text-primary: #1a1a1a;

        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      :root {
        --primary: #1877f2;
        --primary-hover: #166fe5;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;

      [data-theme="light"] {

      body {
        padding: 2rem;
        min-height: 100vh;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      header h1 {
        margin: 0;
        font-size: 1.75rem;
      }

      .theme-toggle {
        background: none;
        border: 1px solid var(--border-subtle);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 0.5rem;
        font-size: 1.25rem;
        width: 42px;
        height: 42px;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .input-group {
        display: flex;
        gap: 0.5rem;
      }

      .input-group input {
        flex: 1;
      }

      input,
      textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: 0.5rem;
        font-size: 1rem;
        background: var(--bg-card);
        color: inherit;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: var(--accent-cyan);
        color: white;
      }

      .btn-primary:hover {
        background: var(--accent-cyan);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid currentcolor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1.5rem;
        margin-top: 1.5rem;
      }

      .preview-item {
        border: 1px solid var(--border-subtle);
        border-radius: 0.75rem;
        overflow: hidden;
      }

      .preview-header {
        padding: 0.75rem 1rem;
        background: var(--border-subtle);
        font-weight: 600;
        font-size: 0.875rem;
      }

      .facebook-card,
      .twitter-card,
      .linkedin-card {
        background: #fff;
      }

      .facebook-card .image,
      .twitter-card .image,
      .linkedin-card .image,
      .slack-card .image {
        width: 100%;
        aspect-ratio: 1.91/1;
        background: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #65676b;
        font-size: 3rem;
        background-size: cover;
        background-position: center;
      }

      .facebook-card .content,
      .twitter-card .content,
      .linkedin-card .content,
      .slack-card .content {
        padding: 0.75rem;
      }

      .facebook-card {
        color: #1c1e21;
      }
      .facebook-card .domain {
        font-size: 0.75rem;
        color: #65676b;
        text-transform: uppercase;
      }
      .facebook-card .title {
        font-weight: 600;
        font-size: 1rem;
        color: #1c1e21;
        margin: 0.25rem 0;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .facebook-card .description {
        font-size: 0.875rem;
        color: #65676b;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .twitter-card {
        color: #0f1419;
        border-radius: 1rem;
      }
      .twitter-card .domain {
        font-size: 0.8125rem;
        color: #536471;
      }
      .twitter-card .title {
        font-size: 0.9375rem;
        color: #0f1419;
        margin: 0.125rem 0;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .twitter-card .description {
        font-size: 0.8125rem;
        color: #536471;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .linkedin-card .title {
        font-weight: 600;
        font-size: 0.875rem;
        color: #000;
        margin-bottom: 0.25rem;
      }
      .linkedin-card .domain {
        font-size: 0.75rem;
        color: rgba(0, 0, 0, 0.6);
      }

      .slack-card {
        background: #fff;
        color: #1d1c1d;
        border-left: 4px solid #36c5f0;
      }
      .slack-card .domain {
        font-size: 0.8125rem;
        font-weight: 700;
        color: #1264a3;
        margin-bottom: 0.25rem;
      }
      .slack-card .title {
        font-size: 0.9375rem;
        font-weight: 700;
        color: #1264a3;
        margin-bottom: 0.25rem;
      }
      .slack-card .description {
        font-size: 0.875rem;
        color: #1d1c1d;
        margin-bottom: 0.5rem;
      }

      .meta-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      .meta-table th,
      .meta-table td {
        padding: 0.75rem;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
      }

      .meta-table th {
        font-weight: 600;
        background: var(--border-subtle);
        width: 200px;
      }

      .meta-table td {
        word-break: break-all;
      }

      .tag {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        background: rgba(59, 130, 246, 0.1);
        color: var(--accent-cyan);
        border-radius: 0.25rem;
        font-size: 0.75rem;
        margin-right: 0.25rem;
      }

      .recommendation-item {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .recommendation-item.success {
        border-color: rgba(34, 197, 94, 0.3);
        background: rgba(34, 197, 94, 0.05);
      }
      .recommendation-item.warning {
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.05);
      }
      .recommendation-item.error {

        background: rgba(239, 68, 68, 0.05);
      }

      .recommendation-icon {
        font-size: 1.25rem;
      }
      .recommendation-content {
        flex: 1;
      }
      .recommendation-title {
        font-weight: 600;
        font-size: 0.875rem;
      }
      .recommendation-desc {
        font-size: 0.8125rem;
        color: var(--muted-color);
        margin-top: 0.25rem;
      }

      .history-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: 0.5rem;
        margin-bottom: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .history-item:hover {
        border-color: var(--accent-cyan);
        background: rgba(24, 119, 242, 0.05);
      }

      .history-favicon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: var(--border-subtle);
        background-size: cover;
      }

      .history-url {
        flex: 1;
        font-size: 0.875rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--muted-color);
      }

      .empty-state .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }

      @media (max-width: 640px) {

          padding: 1rem;
        }
        .preview-grid {
          grid-template-columns: 1fr;
        }
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 15px;

      .breadcrumb a {

        text-decoration: none;
      }
      .breadcrumb a:hover {

      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }

              onkeypress="handleKeyPress(event)"
            />
            <button class="btn btn-primary" id="fetchBtn" onclick="fetchOG()">
              <span>🔍</span>
              获取预览
            </button>
          </div>
        </div>
        <div id="historyList" style="display: none">
          <small style="color: var(--muted-color)">最近检测:</small>
        </div>
      </div>

      <div id="resultSection" style="display: none">
        <div class="card">
          <div class="card-title">👀 社交媒体预览</div>
          <div class="preview-grid">
            <div class="preview-item">
              <div class="preview-header">📘 Facebook</div>
              <div class="facebook-card">
                <div class="image" id="fbImage">🖼️</div>
                <div class="content">
                  <div class="domain" id="fbDomain">EXAMPLE.COM</div>
                  <div class="title" id="fbTitle">页面标题</div>
                  <div class="description" id="fbDesc">页面描述</div>
                </div>
              </div>
            </div>
            <div class="preview-item">
              <div class="preview-header">🐦 Twitter</div>
              <div class="twitter-card">
                <div class="image" id="twImage">🖼️</div>
                <div class="content">
                  <div class="domain" id="twDomain">example.com</div>
                  <div class="title" id="twTitle">页面标题</div>
                  <div class="description" id="twDesc">页面描述</div>
                </div>
              </div>
            </div>
            <div class="preview-item">
              <div class="preview-header">💼 LinkedIn</div>
              <div class="linkedin-card">
                <div class="image" id="liImage">🖼️</div>
                <div class="content">
                  <div class="title" id="liTitle">页面标题</div>
                  <div class="domain" id="liDomain">example.com</div>
                </div>
              </div>
            </div>
            <div class="preview-item">
              <div class="preview-header">💬 Slack</div>
              <div class="slack-card">
                <div class="content">
                  <div class="domain" id="slDomain">example.com</div>
                  <div class="title" id="slTitle">页面标题</div>
                  <div class="description" id="slDesc">页面描述</div>
                </div>
                <div class="image" id="slImage">🖼️</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📊 Meta 标签详情</div>
          <table class="meta-table" id="metaTable">
            <tbody></tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-title">✅ SEO 检查建议</div>
          <div id="recommendations"></div>
        </div>
      </div>

      <div id="emptyState" class="card">
        <div class="empty-state">
          <div class="icon">🔗</div>
          <h3>输入 URL 开始预览</h3>
          <p>输入任意网页地址，查看其在各大社交平台的分享预览效果</p>
        </div>
      </div>
    </div>

    <script>
      let ogData = {};

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        document.querySelector(".theme-toggle").textContent = newTheme === "light" ? "🌙" : "☀️";
      };

      function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.querySelector(".theme-toggle").textContent = savedTheme === "light" ? "🌙" : "☀️";
      }

      window.handleKeyPress = function (e) {
        if (e.key === "Enter") fetchOG();
      };

      function extractDomain(url) {
        try {
          return new URL(url).hostname;
        } catch {
          return "example.com";
        }
      }

      async function fetchOG() {
        const url = document.getElementById("urlInput").value.trim();
        if (!url) {
          alert("请输入 URL");
          return;
        }
        try {
          new URL(url);
        } catch {
          alert("请输入有效的 URL");
          return;
        }

        const btn = document.getElementById("fetchBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> 获取中...';

        try {
          await simulateFetch(url);
          saveToHistory(url);
          loadHistory();
        } catch (error) {
          alert("获取失败: " + error.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = "<span>🔍</span> 获取预览";
        }
      }

      async function simulateFetch(url) {
        await new Promise((resolve) => setTimeout(resolve, 800));
        const domain = extractDomain(url);
        ogData = {
          url: url,
          domain: domain,
          title: "示例页面标题 - " + domain,
          description:
            "这是一个示例页面描述。在实际使用中，这里会显示从目标网页提取的 Open Graph 描述信息。建议描述长度在 150-160 个字符之间。",
          image: "",
          type: "website",
          siteName: domain,
          locale: "zh_CN",
          twitter: { card: "summary_large_image", site: "", creator: "" }
        };
        renderPreviews();
        renderMetaTable();
        renderRecommendations();
        document.getElementById("emptyState").style.display = "none";
        document.getElementById("resultSection").style.display = "block";
      }

      function renderPreviews() {
        const { title, description, image, domain } = ogData;
        const setImage = (elementId, imageUrl) => {
          const el = document.getElementById(elementId);
          if (imageUrl) {
            el.style.backgroundImage = "url(" + imageUrl + ")";
            el.textContent = "";
          } else {
            el.style.backgroundImage = "none";
            el.textContent = "🖼️";
          }
        };
        setImage("fbImage", image);
        document.getElementById("fbDomain").textContent = domain.toUpperCase();
        document.getElementById("fbTitle").textContent = title;
        document.getElementById("fbDesc").textContent = description;
        setImage("twImage", image);
        document.getElementById("twDomain").textContent = domain;
        document.getElementById("twTitle").textContent = title;
        document.getElementById("twDesc").textContent = description;
        setImage("liImage", image);
        document.getElementById("liTitle").textContent = title;
        document.getElementById("liDomain").textContent = domain;
        setImage("slImage", image);
        document.getElementById("slDomain").textContent = domain;
        document.getElementById("slTitle").textContent = title;
        document.getElementById("slDesc").textContent = description;
      }

      function renderMetaTable() {
        const tbody = document.querySelector("#metaTable tbody");
        const rows = [
          { label: "og:title", value: ogData.title, tag: "Open Graph" },
          { label: "og:description", value: ogData.description, tag: "Open Graph" },
          { label: "og:image", value: ogData.image || "(未设置)", tag: "Open Graph" },
          { label: "og:url", value: ogData.url, tag: "Open Graph" },
          { label: "og:type", value: ogData.type, tag: "Open Graph" },
          { label: "og:site_name", value: ogData.siteName, tag: "Open Graph" },
          { label: "og:locale", value: ogData.locale, tag: "Open Graph" },
          { label: "twitter:card", value: ogData.twitter.card, tag: "Twitter" },
          { label: "twitter:site", value: ogData.twitter.site || "(未设置)", tag: "Twitter" }
        ];
        tbody.textContent = "";
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          const th = document.createElement("th");
          th.textContent = row.label;
          const td = document.createElement("td");
          const tagSpan = document.createElement("span");
          tagSpan.className = "tag";
          tagSpan.textContent = row.tag;
          td.appendChild(tagSpan);
          td.appendChild(document.createTextNode(" " + row.value));
          tr.appendChild(th);
          tr.appendChild(td);
          tbody.appendChild(tr);
        });
      }

      function renderRecommendations() {
        const container = document.getElementById("recommendations");
        const checks = [];
        if (ogData.title) {
          if (ogData.title.length <= 60) {
            checks.push({
              type: "success",
              icon: "✅",
              title: "标题长度合适",
              desc: "当前 " + ogData.title.length + " 字符，推荐 60 字符以内"
            });
          } else {
            checks.push({
              type: "warning",
              icon: "⚠️",
              title: "标题可能过长",
              desc: "当前 " + ogData.title.length + " 字符，可能会被截断"
            });
          }
        } else {
          checks.push({
            type: "error",
            icon: "❌",
            title: "缺少 og:title",
            desc: "建议添加 og:title 标签以优化社交分享效果"
          });
        }
        if (ogData.description) {
          if (ogData.description.length <= 160) {
            checks.push({
              type: "success",
              icon: "✅",
              title: "描述长度合适",
              desc: "当前 " + ogData.description.length + " 字符，推荐 160 字符以内"
            });
          } else {
            checks.push({
              type: "warning",
              icon: "⚠️",
              title: "描述可能过长",
              desc: "当前 " + ogData.description.length + " 字符，可能会被截断"
            });
          }
        } else {
          checks.push({
            type: "error",
            icon: "❌",
            title: "缺少 og:description",
            desc: "建议添加 og:description 标签提供页面摘要"
          });
        }
        if (ogData.image) {
          checks.push({
            type: "success",
            icon: "✅",
            title: "已设置分享图片",
            desc: "建议使用 1200x630 像素的图片以获得最佳效果"
          });
        } else {
          checks.push({
            type: "error",
            icon: "❌",
            title: "缺少 og:image",
            desc: "没有图片的链接在社交媒体上分享效果较差"
          });
        }
        if (ogData.twitter.card) {
          checks.push({
            type: "success",
            icon: "✅",
            title: "已设置 Twitter 卡片",
            desc: "类型: " + ogData.twitter.card
          });
        } else {
          checks.push({
            type: "warning",
            icon: "⚠️",
            title: "未设置 twitter:card",
            desc: "建议设置以优化 Twitter 分享效果"
          });
        }
        container.textContent = "";
        checks.forEach((check) => {
          const div = document.createElement("div");
          div.className = "recommendation-item " + check.type;
          const iconDiv = document.createElement("div");
          iconDiv.className = "recommendation-icon";
          iconDiv.textContent = check.icon;
          const contentDiv = document.createElement("div");
          contentDiv.className = "recommendation-content";
          const titleDiv = document.createElement("div");
          titleDiv.className = "recommendation-title";
          titleDiv.textContent = check.title;
          const descDiv = document.createElement("div");
          descDiv.className = "recommendation-desc";
          descDiv.textContent = check.desc;
          contentDiv.appendChild(titleDiv);
          contentDiv.appendChild(descDiv);
          div.appendChild(iconDiv);
          div.appendChild(contentDiv);
          container.appendChild(div);
        });
      }

      window.saveToHistory = function (url) {
        const history = JSON.parse(localStorage.getItem("ogHistory") || "[]");
        const index = history.indexOf(url);
        if (index > -1) history.splice(index, 1);
        history.unshift(url);
        if (history.length > 5) history.pop();
        localStorage.setItem("ogHistory", JSON.stringify(history));
      };

      window.loadHistory = function () {
        const history = JSON.parse(localStorage.getItem("ogHistory") || "[]");
        const container = document.getElementById("historyList");
        if (history.length === 0) {
          container.style.display = "none";
          return;
        }
        container.style.display = "block";
        container.querySelectorAll(".history-item").forEach((el) => el.remove());
        history.forEach((url) => {
          const div = document.createElement("div");
          div.className = "history-item";
          div.onclick = () => {
            document.getElementById("urlInput").value = url;
            fetchOG();
          };
          const favicon = document.createElement("div");
          favicon.className = "history-favicon";
          favicon.style.backgroundImage =
            "url(https://www.google.com/s2/favicons?domain=" + extractDomain(url) + "&sz=32)";
          const urlSpan = document.createElement("span");
          urlSpan.className = "history-url";
          urlSpan.textContent = url;
          div.appendChild(favicon);
          div.appendChild(urlSpan);
          container.appendChild(div);
        });
      };

      initTheme();
      loadHistory();
    </script>
  </body>
</html>

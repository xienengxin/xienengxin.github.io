      <h1>🏗️ 装修预算计算器</h1>
      <p class="subtitle">根据房屋面积和装修档次，智能估算装修预算</p>

      <div class="card">
        <div class="card-title">📐 房屋信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----------">建筑面积 (平方米)</label>
            <input
              type="number"
              id="area"
              value="100"
              min="1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>房屋类型</label>
            <select id="houseType">
              <option value="new">新房（毛坯）</option>
              <option value="used">二手房翻新</option>
              <option value="partial">局部改造</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎨 装修档次</div>
        <div class="level-select" id="levelSelect">
          <div class="level-btn" data-level="simple" onclick="selectLevel('simple')">
            <div class="level-name">简装</div>
            <div class="level-price">500-800元/平方米</div>
          </div>
          <div class="level-btn active" data-level="medium" onclick="selectLevel('medium')">
            <div class="level-name">中档</div>
            <div class="level-price">800-1200元/平方米</div>
          </div>
          <div class="level-btn" data-level="high" onclick="selectLevel('high')">
            <div class="level-name">精装</div>
            <div class="level-price">1200-2000元/平方米</div>
          </div>
          <div class="level-btn" data-level="luxury" onclick="selectLevel('luxury')">
            <div class="level-name">豪装</div>
            <div class="level-price">2000元以上/平方米</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">⚙️ 自定义选项</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-------------">设计费用 (元/平方米)</label>
            <input
              type="number"
              id="designFee"
              value="50"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input------------">家具家电预算 (万元)</label>
            <input
              type="number"
              id="furnitureBudget"
              value="5"
              min="0"
              step="0.1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input------------">预留备用金比例 (%)</label>
            <input
              type="number"
              id="contingency"
              value="10"
              min="0"
              max="50"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算预算">
          计算预算
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="highlight">
          <div class="highlight-label">预估总预算</div>
          <div class="highlight-value" id="totalBudget"></div>
        </div>

        <div class="card">
          <div class="card-title">📊 预算明细</div>
          <div id="budgetList"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 费用占比</div>
          <div id="proportionList"></div>
        </div>

        <div class="tips">
          <div class="tips-title">装修小贴士</div>
          <ul class="tips-list" id="tipsList"></ul>
        </div>
      </div>
    </div>

    <script>
      var selectedLevel = "medium";

      var levelPrices = {
        simple: {
          base: 600,
          water: 80,
          electric: 60,
          wall: 50,
          floor: 100,
          ceiling: 40,
          door: 60,
          kitchen: 80,
          bathroom: 80
        },
        medium: {
          base: 1000,
          water: 120,
          electric: 100,
          wall: 80,
          floor: 180,
          ceiling: 80,
          door: 120,
          kitchen: 150,
          bathroom: 150
        },
        high: {
          base: 1500,
          water: 180,
          electric: 150,
          wall: 120,
          floor: 300,
          ceiling: 150,
          door: 200,
          kitchen: 250,
          bathroom: 250
        },
        luxury: {
          base: 2500,
          water: 280,
          electric: 220,
          wall: 200,
          floor: 500,
          ceiling: 250,
          door: 350,
          kitchen: 400,
          bathroom: 400
        }
      };

      var houseTypeMultiplier = {
        new: 1,
        used: 1.15,
        partial: 0.6
      };

      function selectLevel(level) {
        selectedLevel = level;
        var buttons = document.querySelectorAll(".level-btn");
        buttons.forEach(function (btn) {
          btn.classList.remove("active");
          if (btn.dataset.level === level) {
            btn.classList.add("active");
          }
        });
      }

      function formatMoney(num) {
        if (num >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(0) + "元";
      }

      function calculate() {
        var area = parseFloat(document.getElementById("area").value) || 100;
        var houseType = document.getElementById("houseType").value;
        var designFee = parseFloat(document.getElementById("designFee").value) || 0;
        var furnitureBudget =
          parseFloat(document.getElementById("furnitureBudget").value) * 10000 || 0;
        var contingency = parseFloat(document.getElementById("contingency").value) / 100 || 0.1;

        var prices = levelPrices[selectedLevel];
        var multiplier = houseTypeMultiplier[houseType];

        var budgetItems = [
          { name: "水电改造", icon: "🔌", value: prices.water * area * multiplier },
          { name: "墙面工程", icon: "🧱", value: prices.wall * area * multiplier },
          { name: "地面工程", icon: "🪵", value: prices.floor * area * multiplier },
          { name: "吊顶工程", icon: "💡", value: prices.ceiling * area * multiplier },
          { name: "门窗工程", icon: "🚪", value: prices.door * area * 0.3 * multiplier },
          { name: "厨房装修", icon: "🍳", value: prices.kitchen * area * 0.15 * multiplier },
          { name: "卫浴装修", icon: "🚿", value: prices.bathroom * area * 0.1 * multiplier },
          { name: "设计费用", icon: "📐", value: designFee * area },
          { name: "家具家电", icon: "🛋️", value: furnitureBudget }
        ];

        var subtotal = budgetItems.reduce(function (sum, item) {
          return sum + item.value;
        }, 0);
        var contingencyAmount = subtotal * contingency;
        budgetItems.push({ name: "备用金", icon: "💰", value: contingencyAmount });

        var total = subtotal + contingencyAmount;

        document.getElementById("resultSection").classList.remove("hidden");
        document.getElementById("totalBudget").textContent = formatMoney(total);

        var budgetList = document.getElementById("budgetList");
        while (budgetList.firstChild) {
          budgetList.removeChild(budgetList.firstChild);
        }
        budgetItems.forEach(function (item) {
          var div = document.createElement("div");
          div.className = "budget-item";

          var nameSpan = document.createElement("span");
          nameSpan.className = "budget-name";
          nameSpan.textContent = item.icon + " " + item.name;

          var valueSpan = document.createElement("span");
          valueSpan.className = "budget-value";
          valueSpan.textContent = formatMoney(item.value);

          div.appendChild(nameSpan);
          div.appendChild(valueSpan);
          budgetList.appendChild(div);
        });

        var proportionList = document.getElementById("proportionList");
        while (proportionList.firstChild) {
          proportionList.removeChild(proportionList.firstChild);
        }
        budgetItems.forEach(function (item) {
          var percentage = (item.value / total) * 100;
          var div = document.createElement("div");
          div.className = "budget-item";

          var nameSpan = document.createElement("span");
          nameSpan.className = "budget-name";
          nameSpan.textContent = item.icon + " " + item.name;

          var barDiv = document.createElement("div");
          barDiv.className = "budget-bar";
          var fillDiv = document.createElement("div");
          fillDiv.className = "budget-fill";
          fillDiv.style.width = percentage + "%";
          barDiv.appendChild(fillDiv);

          var valueSpan = document.createElement("span");
          valueSpan.className = "budget-value";
          valueSpan.textContent = percentage.toFixed(1) + "%";

          div.appendChild(nameSpan);
          div.appendChild(barDiv);
          div.appendChild(valueSpan);
          proportionList.appendChild(div);
        });

        var tips = [];
        if (selectedLevel === "simple") {
          tips = [
            "简装注重实用性，建议选择性价比高的国产品牌",
            "水电隐蔽工程不要省，关系到居住安全",
            "可以考虑分阶段装修，后期再升级软装"
          ];
        } else if (selectedLevel === "medium") {
          tips = [
            "中档装修是性价比最高的选择",
            "建议在主材上适当投入，工艺可选中等",
            "厨卫空间可以适当增加预算，提升生活品质"
          ];
        } else if (selectedLevel === "high") {
          tips = [
            "精装修建议选择专业设计师进行整体规划",
            "可以考虑智能家居系统的预埋",
            "注重环保材料的选择，保障居住健康"
          ];
        } else {
          tips = [
            "豪装建议聘请知名设计师团队",
            "可以定制高端家具和进口主材",
            "考虑引入智能家居和全屋定制系统"
          ];
        }
        tips.push("建议保留10-15%的备用金应对突发情况");

        var tipsList = document.getElementById("tipsList");
        while (tipsList.firstChild) {
          tipsList.removeChild(tipsList.firstChild);
        }
        tips.forEach(function (tip) {
          var li = document.createElement("li");
          li.textContent = "💡 " + tip;
          tipsList.appendChild(li);
        });
      }

      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

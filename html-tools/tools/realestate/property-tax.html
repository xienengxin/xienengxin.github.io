        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .detail-table td {
        font-family: var(--font-mono);
      }
      .detail-table td:last-child {
        text-align: right;
        color: var(--color-accent-cyan);
      }
      .info-box {
        margin-top: 20px;
        padding: 16px;
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: var(--radius-md);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .info-box strong {
        color: var(--accent-yellow);
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .radio-group {
          flex-direction: column;
        }
        .radio-item {
          min-width: 100%;
        }
        .total-value {
          font-size: 2rem;
        }
        .tax-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">房产交易税费</span>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">📋</span>
            房产交易税费计算器
          </h1>
          <p class="desc">综合计算契税、个税、增值税、印花税等费用</p>
        </div>
      </div>

      <div class="main-card">
        <div class="form-section">
          <div class="form-group">
            <span class="form-label">房屋性质</span>
            <div class="radio-group">
              <div class="radio-item">
                <input type="radio" name="propertyType" id="newHouse" value="new" checked />
                <label for="newHouse">新房</label>
              </div>
              <div class="radio-item">
                <input type="radio" name="propertyType" id="secondHand" value="second" />
                <label for="secondHand">二手房</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <span class="form-label">购房套数</span>
            <div class="radio-group">
              <div class="radio-item">
                <input type="radio" name="houseCount" id="count1" value="1" checked />
                <label for="count1">首套</label>
              </div>
              <div class="radio-item">
                <input type="radio" name="houseCount" id="count2" value="2" />
                <label for="count2">二套</label>
              </div>
              <div class="radio-item">
                <input type="radio" name="houseCount" id="count3" value="3" />
                <label for="count3">三套+</label>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="area">房屋面积</label>
              <div class="input-group">
                <input type="number" id="area" placeholder="房屋面积" min="0" step="0.01" />
                <span class="input-suffix">㎡</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="price">成交总价</label>
              <div class="input-group">
                <input type="number" id="price" placeholder="成交总价" min="0" step="0.01" />
                <span class="input-suffix">万元</span>
              </div>
            </div>
          </div>

          <div class="form-row" id="secondHandFields" style="display: none">
            <div class="form-group">
              <label class="form-label" for="originalPrice">原购买价</label>
              <div class="input-group">
                <input
                  type="number"
                  id="originalPrice"
                  placeholder="原购买价格"
                  min="0"
                  step="0.01"
                />
                <span class="input-suffix">万元</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="holdYears">持有年限</label>
              <div class="input-group">
                <select id="holdYears">
                  <option value="0">不满2年</option>
                  <option value="2">满2年不满5年</option>
                  <option value="5">满5年</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-group" id="uniqueHouseGroup" style="display: none">
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" id="isUnique" />
                <span>卖方家庭唯一住房</span>
              </label>
            </div>
          </div>

          <button class="btn-calculate" id="btnCalculate">计算税费</button>
        </div>

        <div class="result-section" id="resultSection">
          <div class="total-card">
            <div class="total-label">税费总计</div>
            <div class="total-value" id="totalValue">¥0</div>
          </div>

          <div class="tax-grid" id="taxGrid"></div>

          <table class="detail-table">
            <thead>
              <tr>
                <th>税费项目</th>
                <th>计算方式</th>
                <th>金额</th>
              </tr>
            </thead>
            <tbody id="detailBody"></tbody>
          </table>

          <div class="info-box" id="infoBox"></div>
        </div>
      </div>

      <footer>
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </div>

    <script>
      const propertyTypeRadios = document.querySelectorAll('input[name="propertyType"]');
      const secondHandFields = document.getElementById("secondHandFields");
      const uniqueHouseGroup = document.getElementById("uniqueHouseGroup");
      const btnCalculate = document.getElementById("btnCalculate");
      const resultSection = document.getElementById("resultSection");

      propertyTypeRadios.forEach(function (radio) {
        radio.addEventListener("change", function () {
          const isSecond = this.value === "second";
          secondHandFields.style.display = isSecond ? "grid" : "none";
          uniqueHouseGroup.style.display = isSecond ? "block" : "none";
        });
      });

      function getSelectedValue(name) {
        const radios = document.querySelectorAll('input[name="' + name + '"]');
        for (const radio of radios) {
          if (radio.checked) return radio.value;
        }
        return null;
      }

      function formatMoney(num) {
        return num.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function calculateDeedTaxRate(houseCount, area) {
        if (houseCount === "1") {
          return area <= 90 ? 0.01 : 0.015;
        } else if (houseCount === "2") {
          return area <= 90 ? 0.01 : 0.02;
        } else {
          return 0.03;
        }
      }

      function calculate() {
        const propertyType = getSelectedValue("propertyType");
        const houseCount = getSelectedValue("houseCount");
        const area = parseFloat(document.getElementById("area").value);
        const price = parseFloat(document.getElementById("price").value);
        const originalPrice = parseFloat(document.getElementById("originalPrice").value) || 0;
        const holdYears = parseInt(document.getElementById("holdYears").value, 10);
        const isUnique = document.getElementById("isUnique").checked;

        if (isNaN(area) || area <= 0) {
          alert("请输入有效的房屋面积");
          return;
        }
        if (isNaN(price) || price <= 0) {
          alert("请输入有效的成交价格");
          return;
        }

        const priceYuan = price * 10000;
        const originalPriceYuan = originalPrice * 10000;
        const taxes = [];

        const deedTaxRate = calculateDeedTaxRate(houseCount, area);
        const deedTax = priceYuan * deedTaxRate;
        taxes.push({
          name: "契税",
          rate: (deedTaxRate * 100).toFixed(1) + "%",
          amount: deedTax,
          formula: "成交价 × " + (deedTaxRate * 100).toFixed(1) + "%",
          highlight: true
        });

        if (propertyType === "second") {
          let vatAmount = 0;
          let vatFormula = "";
          if (holdYears < 2) {
            vatAmount = priceYuan * 0.05;
            vatFormula = "成交价 × 5%";
          } else {
            vatAmount = 0;
            vatFormula = "满2年免征";
          }
          taxes.push({
            name: "增值税",
            rate: holdYears < 2 ? "5%" : "0%",
            amount: vatAmount,
            formula: vatFormula
          });

          const vatSurcharge = vatAmount * 0.12;
          taxes.push({
            name: "附加税",
            rate: "12%",
            amount: vatSurcharge,
            formula: "增值税 × 12%"
          });

          let incomeTax = 0;
          let incomeTaxFormula = "";
          if (holdYears >= 5 && isUnique) {
            incomeTax = 0;
            incomeTaxFormula = "满五唯一免征";
          } else if (originalPriceYuan > 0) {
            const profit = priceYuan - originalPriceYuan;
            incomeTax = profit > 0 ? profit * 0.2 : 0;
            incomeTaxFormula = "差额 × 20%";
          } else {
            incomeTax = priceYuan * 0.01;
            incomeTaxFormula = "成交价 × 1%";
          }
          taxes.push({
            name: "个人所得税",
            rate: holdYears >= 5 && isUnique ? "0%" : "20%/1%",
            amount: incomeTax,
            formula: incomeTaxFormula
          });
        }

        const stampTax = 0;
        taxes.push({
          name: "印花税",
          rate: "0%",
          amount: stampTax,
          formula: "住宅免征"
        });

        const total = taxes.reduce(function (sum, t) {
          return sum + t.amount;
        }, 0);

        document.getElementById("totalValue").textContent = "¥" + formatMoney(total);

        const taxGrid = document.getElementById("taxGrid");
        taxGrid.textContent = "";
        taxes.forEach(function (tax) {
          const card = document.createElement("div");
          card.className = "tax-card" + (tax.highlight ? " highlight" : "");

          const header = document.createElement("div");
          header.className = "tax-card-header";

          const name = document.createElement("span");
          name.className = "tax-card-name";
          name.textContent = tax.name;

          const rate = document.createElement("span");
          rate.className = "tax-card-rate";
          rate.textContent = tax.rate;

          header.appendChild(name);
          header.appendChild(rate);

          const value = document.createElement("div");
          value.className = "tax-card-value";
          value.textContent = "¥" + formatMoney(tax.amount);

          card.appendChild(header);
          card.appendChild(value);
          taxGrid.appendChild(card);
        });

        const detailBody = document.getElementById("detailBody");
        detailBody.textContent = "";
        taxes.forEach(function (tax) {
          const tr = document.createElement("tr");

          const tdName = document.createElement("td");
          tdName.textContent = tax.name;

          const tdFormula = document.createElement("td");
          tdFormula.textContent = tax.formula;

          const tdAmount = document.createElement("td");
          tdAmount.textContent = "¥" + formatMoney(tax.amount);

          tr.appendChild(tdName);
          tr.appendChild(tdFormula);
          tr.appendChild(tdAmount);
          detailBody.appendChild(tr);
        });

        const infoBox = document.getElementById("infoBox");
        infoBox.textContent = "";
        const strong = document.createElement("strong");
        strong.textContent = "说明：";
        infoBox.appendChild(strong);

        let infoText = "";
        if (propertyType === "new") {
          infoText = "新房交易主要缴纳契税。开发商通常会代缴维修基金和办证费用。";
        } else {
          infoText =
            "二手房交易涉及契税（买方）、增值税和个税（卖方）。满2年免增值税，满5年且唯一免个税。";
        }
        infoBox.appendChild(document.createTextNode(infoText));

        resultSection.classList.add("show");
      }

      btnCalculate.addEventListener("click", calculate);

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

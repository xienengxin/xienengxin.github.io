            <div class="form-group">

                />

            </div>
            <div class="form-group">
              <label>年利率</label>
              <div class="input-group">
                <input
                  type="number"

                  value="3.1"
                  min="0"
                  max="20"
                  step="0.01"
                  aria-label="数字输入框"

                />
                <span class="unit">%</span>

              <div class="quick-btns">

          </div>

          <div class="card fund">
            <div class="card-title">
              <span class="icon fund">公</span>
              公积金贷款
            </div>
            <div class="form-group">
              <label>贷款金额</label>
              <div class="input-group">
                <input
                  type="number"
                  id="fundAmount"
                  value="30"
                  min="0"
                  step="1"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
                <span class="unit">万元</span>
              </div>
              <div class="quick-btns">
                <button class="quick-btn" data-field="fundAmount" data-value="20">20万</button>
                <button class="quick-btn" data-field="fundAmount" data-value="30">30万</button>
                <button class="quick-btn" data-field="fundAmount" data-value="50">50万</button>
              </div>
            </div>
            <div class="form-group">
              <label>贷款年限</label>
              <div class="input-group">
                <input
                  type="number"
                  id="fundYears"
                  value="30"
                  min="1"
                  max="30"
                  step="1"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
                <span class="unit">年</span>
              </div>
            </div>
            <div class="form-group">
              <label>年利率</label>
              <div class="input-group">
                <input
                  type="number"
                  id="fundRate"
                  value="2.85"
                  min="0"
                  max="20"
                  step="0.01"
                  aria-label="数字输入框"
                  placeholder="请输入数字输入框"
                />
                <span class="unit">%</span>
              </div>
              <div class="quick-btns">
                <button class="quick-btn" data-field="fundRate" data-value="2.6">首套2.6%</button>
                <button class="quick-btn" data-field="fundRate" data-value="2.85">基准2.85%</button>
                <button class="quick-btn" data-field="fundRate" data-value="3.025">

          <div class="card">
            <div class="card-title">还款方式</div>
            <div class="toggle-container">
              <button class="toggle-btn active" data-type="equal-payment">等额本息</button>
              <button class="toggle-btn" data-type="equal-principal">等额本金</button>

        <div>
          <div class="result-hero">
            <div class="label">组合月供</div>
            <div class="big" id="totalMonthly">¥0.00</div>
            <div class="note" id="monthlyNote">每月固定还款</div>

          <div class="card">
            <div class="card-title">月供构成</div>
            <div class="breakdown-grid">
              <div class="breakdown-card commercial">
                <div class="title">商贷月供</div>
                <div class="value" id="commercialMonthly">¥0.00</div>
              </div>
              <div class="breakdown-card fund">
                <div class="title">公积金月供</div>
                <div class="value" id="fundMonthly">¥0.00</div>
              </div>
            </div>

            <div class="pie-container">
              <canvas id="pieChart" class="pie-chart"></canvas>
              <div class="pie-legend">
                <div class="legend-item">
                  <div class="legend-dot" style="background: var(--commercial)"></div>
                  <span>商贷本金</span>
                  <span class="legend-value" id="legendCommercialPrincipal">¥0万</span>
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background: #818cf8"></div>
                  <span>商贷利息</span>
                  <span class="legend-value" id="legendCommercialInterest">¥0万</span>
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background: var(--fund)"></div>
                  <span>公积金本金</span>
                  <span class="legend-value" id="legendFundPrincipal">¥0万</span>
                </div>
                <div class="legend-item">
                  <div class="legend-dot" style="background: #6ee7b7"></div>
                  <span>公积金利息</span>
                  <span class="legend-value" id="legendFundInterest">¥0万</span>
                </div>
              </div>
            </div>

            <div class="section-title">还款汇总</div>
            <div class="result-row">
              <span class="label">贷款总额</span>
              <span class="value" id="totalLoan">¥0.00万</span>
            </div>
            <div class="result-row">
              <span class="label">还款总额</span>
              <span class="value" id="totalPayment">¥0.00万</span>
            </div>
            <div class="result-row highlight">
              <span class="label">支付利息</span>
              <span class="value" id="totalInterest">¥0.00万</span>
            </div>

            <div class="section-title">分项明细</div>
            <div class="result-row">
              <span class="label">商贷总利息</span>
              <span class="value" id="commercialInterest">¥0.00万</span>
            </div>
            <div class="result-row">
              <span class="label">公积金总利息</span>
              <span class="value" id="fundInterest">¥0.00万</span>
            </div>

            <div class="tip-box">
              提示：公积金贷款额度受限于个人公积金账户余额和当地政策，建议咨询当地公积金管理中心。
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        let loanType = "equal-payment";

        const $ = (id) => document.getElementById(id);

        // 格式化金额
        function formatMoney(value) {
          return (
            "¥" +
            value.toLocaleString("zh-CN", {
              minimumFractionDigits: 2,
              maximumFractionDigits: 2
            })
          );
        }

        function formatWan(value) {
          return (
            "¥" +
            (value / 10000).toLocaleString("zh-CN", {
              minimumFractionDigits: 2,
              maximumFractionDigits: 2
            }) +
            "万"
          );
        }

        // 等额本息计算
        function calcEqualPayment(principal, months, monthlyRate) {
          if (principal === 0 || months === 0) {
            return { monthlyPayment: 0, totalPayment: 0, totalInterest: 0 };
          }

          if (monthlyRate === 0) {
            return {
              monthlyPayment: principal / months,
              totalPayment: principal,
              totalInterest: 0
            };
          }

          const monthlyPayment =
            (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) /
            (Math.pow(1 + monthlyRate, months) - 1);
          const totalPayment = monthlyPayment * months;
          const totalInterest = totalPayment - principal;

          return { monthlyPayment, totalPayment, totalInterest };
        }

        // 等额本金计算
        function calcEqualPrincipal(principal, months, monthlyRate) {
          if (principal === 0 || months === 0) {
            return { monthlyPayment: 0, totalPayment: 0, totalInterest: 0 };
          }

          const monthlyPrincipal = principal / months;
          let totalInterest = 0;
          let remaining = principal;

          for (let i = 0; i < months; i++) {
            totalInterest += remaining * monthlyRate;
            remaining -= monthlyPrincipal;
          }

          const firstMonthPayment = monthlyPrincipal + principal * monthlyRate;

          return {
            monthlyPayment: firstMonthPayment,
            totalPayment: principal + totalInterest,
            totalInterest: totalInterest
          };
        }

        // 绘制饼图
        function drawPieChart(
          commercialPrincipal,
          commercialInterest,
          fundPrincipal,
          fundInterest
        ) {
          const canvas = $("pieChart");
          const ctx = canvas.getContext("2d");
          const total = commercialPrincipal + commercialInterest + fundPrincipal + fundInterest;

          canvas.width = 160;
          canvas.height = 160;
          const cx = 80,
            cy = 80,
            radius = 65;

          ctx.clearRect(0, 0, 160, 160);

          if (total === 0) return;

          const segments = [
            { value: commercialPrincipal, color: "#6366f1" },
            { value: commercialInterest, color: "#818cf8" },
            { value: fundPrincipal, color: "#10b981" },
            { value: fundInterest, color: "#6ee7b7" }
          ];

          let startAngle = -Math.PI / 2;

          segments.forEach((seg) => {
            if (seg.value > 0) {
              const angle = (seg.value / total) * Math.PI * 2;
              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.arc(cx, cy, radius, startAngle, startAngle + angle);
              ctx.closePath();
              ctx.fillStyle = seg.color;
              ctx.fill();
              startAngle += angle;
            }
          });

          // 中心圆孔
          ctx.beginPath();
          ctx.arc(cx, cy, 30, 0, Math.PI * 2);
          ctx.fillStyle =
            getComputedStyle(document.body).getPropertyValue("--card").trim() || "#12121a";
          ctx.fill();
        }

        // 主计算函数
        function calculate() {
          const commercialAmount = parseFloat($("commercialAmount").value) * 10000 || 0;
          const commercialYears = parseInt($("commercialYears").value) || 0;
          const commercialRate = parseFloat($("commercialRate").value) / 100 || 0;

          const fundAmount = parseFloat($("fundAmount").value) * 10000 || 0;
          const fundYears = parseInt($("fundYears").value) || 0;
          const fundRate = parseFloat($("fundRate").value) / 100 || 0;

          const commercialMonths = commercialYears * 12;
          const fundMonths = fundYears * 12;
          const commercialMonthlyRate = commercialRate / 12;
          const fundMonthlyRate = fundRate / 12;

          let commercialResult, fundResult;

          if (loanType === "equal-payment") {
            commercialResult = calcEqualPayment(
              commercialAmount,
              commercialMonths,
              commercialMonthlyRate
            );
            fundResult = calcEqualPayment(fundAmount, fundMonths, fundMonthlyRate);
            $("monthlyNote").textContent = "每月固定还款";
          } else {
            commercialResult = calcEqualPrincipal(
              commercialAmount,
              commercialMonths,
              commercialMonthlyRate
            );
            fundResult = calcEqualPrincipal(fundAmount, fundMonths, fundMonthlyRate);
            $("monthlyNote").textContent = "首月月供（逐月递减）";
          }

          const totalMonthly = commercialResult.monthlyPayment + fundResult.monthlyPayment;
          const totalLoan = commercialAmount + fundAmount;
          const totalPayment = commercialResult.totalPayment + fundResult.totalPayment;
          const totalInterest = commercialResult.totalInterest + fundResult.totalInterest;

          // 更新显示
          $("totalMonthly").textContent = formatMoney(totalMonthly);
          $("commercialMonthly").textContent = formatMoney(commercialResult.monthlyPayment);
          $("fundMonthly").textContent = formatMoney(fundResult.monthlyPayment);

          $("totalLoan").textContent = formatWan(totalLoan);
          $("totalPayment").textContent = formatWan(totalPayment);
          $("totalInterest").textContent = formatWan(totalInterest);
          $("commercialInterest").textContent = formatWan(commercialResult.totalInterest);
          $("fundInterest").textContent = formatWan(fundResult.totalInterest);

          // 更新图例
          $("legendCommercialPrincipal").textContent = formatWan(commercialAmount);
          $("legendCommercialInterest").textContent = formatWan(commercialResult.totalInterest);
          $("legendFundPrincipal").textContent = formatWan(fundAmount);
          $("legendFundInterest").textContent = formatWan(fundResult.totalInterest);

          // 绘制饼图
          drawPieChart(
            commercialAmount,
            commercialResult.totalInterest,
            fundAmount,
            fundResult.totalInterest
          );
        }

        // 事件绑定
        function bindEvents() {
          // 输入框变化
          const inputs = [
            "commercialAmount",
            "commercialYears",
            "commercialRate",
            "fundAmount",
            "fundYears",
            "fundRate"
          ];
          inputs.forEach((id) => {
            $(id).addEventListener("input", calculate);
          });

          // 还款方式切换
          document.querySelectorAll(".toggle-btn").forEach((btn) => {
            btn.addEventListener("click", function () {
              document.querySelectorAll(".toggle-btn").forEach((b) => b.classList.remove("active"));
              this.classList.add("active");
              loanType = this.dataset.type;
              calculate();
            });
          });

          // 快捷按钮
          document.querySelectorAll(".quick-btn[data-field]").forEach((btn) => {
            btn.addEventListener("click", function () {
              const field = this.dataset.field;
              const value = this.dataset.value;
              $(field).value = value;
              calculate();
            });
          });
        }

        // 初始化
        bindEvents();
        calculate();
      })();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

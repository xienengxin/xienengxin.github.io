      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .result-cards {
          grid-template-columns: 1fr;
        }
        .result-card.primary {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">租房成本计算</span>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">🏘️</span>
            租房成本计算器
          </h1>
          <p class="desc">计算租期内总成本和月均支出</p>
        </div>
      </div>

      <div class="main-card">
        <div class="form-section">
          <h3 class="section-title">基本信息</h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="monthlyRent">月租金</label>
              <div class="input-group">
                <input type="number" id="monthlyRent" placeholder="每月租金" min="0" step="1" />
                <span class="input-suffix">元</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="leaseTerm">租期</label>
              <div class="input-group">
                <input type="number" id="leaseTerm" placeholder="租赁期限" min="1" value="12" />
                <span class="input-suffix">月</span>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="deposit">押金</label>
              <div class="input-group">
                <input type="number" id="deposit" placeholder="押金金额" min="0" step="1" />
                <span class="input-suffix">元</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="agencyFee">中介费</label>
              <div class="input-group">
                <input
                  type="number"
                  id="agencyFee"
                  placeholder="中介费"
                  min="0"
                  step="1"
                  value="0"
                />
                <span class="input-suffix">元</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="propertyFee">物业费（月）</label>
            <div class="input-group">
              <input
                type="number"
                id="propertyFee"
                placeholder="每月物业费"
                min="0"
                step="1"
                value="0"
              />
              <span class="input-suffix">元</span>
            </div>
          </div>

          <div class="optional-section">
            <div class="optional-header" id="optionalHeader">
              <span class="optional-title">其他费用（可选）</span>
              <span class="optional-toggle" id="optionalToggle">展开</span>
            </div>
            <div class="optional-content" id="optionalContent">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="utilities">水电费（月均）</label>
                  <div class="input-group">
                    <input
                      type="number"
                      id="utilities"
                      placeholder="水电燃气"
                      min="0"
                      step="1"
                      value="0"
                    />
                    <span class="input-suffix">元</span>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label" for="internet">网络费（月）</label>
                  <div class="input-group">
                    <input
                      type="number"
                      id="internet"
                      placeholder="宽带费用"
                      min="0"
                      step="1"
                      value="0"
                    />
                    <span class="input-suffix">元</span>
                  </div>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="parking">停车费（月）</label>
                  <div class="input-group">
                    <input
                      type="number"
                      id="parking"
                      placeholder="停车费"
                      min="0"
                      step="1"
                      value="0"
                    />
                    <span class="input-suffix">元</span>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label" for="other">其他费用（月）</label>
                  <div class="input-group">
                    <input type="number" id="other" placeholder="其他" min="0" step="1" value="0" />
                    <span class="input-suffix">元</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <button class="btn-calculate" id="btnCalculate">计算总成本</button>
        </div>

        <div class="result-section" id="resultSection">
          <div class="result-cards">
            <div class="result-card primary">
              <div class="result-label">租期总成本</div>
              <div class="result-value" id="totalCost">¥0</div>
            </div>
            <div class="result-card">
              <div class="result-label">月均成本</div>
              <div class="result-value" id="monthlyCost">¥0</div>
            </div>
            <div class="result-card">
              <div class="result-label">首月支出</div>
              <div class="result-value" id="firstMonth">¥0</div>
            </div>
          </div>

          <div class="breakdown-list" id="breakdownList"></div>

          <div class="chart-section">
            <h3 class="section-title">费用构成</h3>
            <div class="chart-bar" id="chartBar"></div>
            <div class="chart-legend" id="chartLegend"></div>
          </div>
        </div>
      </div>

      <footer>
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </div>

    <script>
      const optionalHeader = document.getElementById("optionalHeader");
      const optionalContent = document.getElementById("optionalContent");
      const optionalToggle = document.getElementById("optionalToggle");
      const btnCalculate = document.getElementById("btnCalculate");
      const resultSection = document.getElementById("resultSection");

      optionalHeader.addEventListener("click", function () {
        const isShow = optionalContent.classList.toggle("show");
        optionalToggle.textContent = isShow ? "收起" : "展开";
      });

      function formatMoney(num) {
        return num.toLocaleString("zh-CN", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }

      function calculate() {
        const monthlyRent = parseFloat(document.getElementById("monthlyRent").value) || 0;
        const leaseTerm = parseInt(document.getElementById("leaseTerm").value, 10) || 12;
        const deposit = parseFloat(document.getElementById("deposit").value) || 0;
        const agencyFee = parseFloat(document.getElementById("agencyFee").value) || 0;
        const propertyFee = parseFloat(document.getElementById("propertyFee").value) || 0;
        const utilities = parseFloat(document.getElementById("utilities").value) || 0;
        const internet = parseFloat(document.getElementById("internet").value) || 0;
        const parking = parseFloat(document.getElementById("parking").value) || 0;
        const other = parseFloat(document.getElementById("other").value) || 0;

        if (monthlyRent <= 0) {
          alert("请输入有效的月租金");
          return;
        }

        const totalRent = monthlyRent * leaseTerm;
        const totalProperty = propertyFee * leaseTerm;
        const totalUtilities = utilities * leaseTerm;
        const totalInternet = internet * leaseTerm;
        const totalParking = parking * leaseTerm;
        const totalOther = other * leaseTerm;

        const totalCost =
          totalRent +
          deposit +
          agencyFee +
          totalProperty +
          totalUtilities +
          totalInternet +
          totalParking +
          totalOther;
        const effectiveTotal =
          totalRent +
          agencyFee +
          totalProperty +
          totalUtilities +
          totalInternet +
          totalParking +
          totalOther;
        const monthlyCost = effectiveTotal / leaseTerm;
        const firstMonth =
          monthlyRent + deposit + agencyFee + propertyFee + utilities + internet + parking + other;

        document.getElementById("totalCost").textContent = "¥" + formatMoney(totalCost);
        document.getElementById("monthlyCost").textContent = "¥" + formatMoney(monthlyCost);
        document.getElementById("firstMonth").textContent = "¥" + formatMoney(firstMonth);

        const breakdownList = document.getElementById("breakdownList");
        breakdownList.textContent = "";

        const items = [
          { label: "租金 (" + leaseTerm + "个月)", value: totalRent, show: true },
          { label: "押金（可退还）", value: deposit, show: deposit > 0 },
          { label: "中介费", value: agencyFee, show: agencyFee > 0 },
          { label: "物业费 (" + leaseTerm + "个月)", value: totalProperty, show: propertyFee > 0 },
          { label: "水电费 (" + leaseTerm + "个月)", value: totalUtilities, show: utilities > 0 },
          { label: "网络费 (" + leaseTerm + "个月)", value: totalInternet, show: internet > 0 },
          { label: "停车费 (" + leaseTerm + "个月)", value: totalParking, show: parking > 0 },
          { label: "其他费用 (" + leaseTerm + "个月)", value: totalOther, show: other > 0 }
        ];

        items.forEach(function (item) {
          if (item.show) {
            const div = document.createElement("div");
            div.className = "breakdown-item";

            const labelSpan = document.createElement("span");
            labelSpan.className = "breakdown-label";
            labelSpan.textContent = item.label;

            const valueSpan = document.createElement("span");
            valueSpan.className = "breakdown-value";
            valueSpan.textContent = "¥" + formatMoney(item.value);

            div.appendChild(labelSpan);
            div.appendChild(valueSpan);
            breakdownList.appendChild(div);
          }
        });

        const totalDiv = document.createElement("div");
        totalDiv.className = "breakdown-item total";
        const totalLabel = document.createElement("span");
        totalLabel.className = "breakdown-label";
        totalLabel.textContent = "总计";
        const totalValue = document.createElement("span");
        totalValue.className = "breakdown-value";
        totalValue.textContent = "¥" + formatMoney(totalCost);
        totalDiv.appendChild(totalLabel);
        totalDiv.appendChild(totalValue);
        breakdownList.appendChild(totalDiv);

        const chartData = [
          { label: "租金", value: totalRent, color: "#00f5d4" },
          { label: "押金", value: deposit, color: "#fbbf24" },
          { label: "中介费", value: agencyFee, color: "#f97316" },
          { label: "物业费", value: totalProperty, color: "#a855f7" },
          { label: "水电", value: totalUtilities, color: "#3b82f6" },
          { label: "其他", value: totalInternet + totalParking + totalOther, color: "#6b7280" }
        ].filter(function (d) {
          return d.value > 0;
        });

        const chartBar = document.getElementById("chartBar");
        chartBar.textContent = "";
        chartData.forEach(function (d) {
          const segment = document.createElement("div");
          segment.className = "chart-segment";
          segment.style.width = (d.value / totalCost) * 100 + "%";
          segment.style.backgroundColor = d.color;
          chartBar.appendChild(segment);
        });

        const chartLegend = document.getElementById("chartLegend");
        chartLegend.textContent = "";
        chartData.forEach(function (d) {
          const item = document.createElement("div");
          item.className = "legend-item";

          const color = document.createElement("div");
          color.className = "legend-color";
          color.style.backgroundColor = d.color;

          const label = document.createElement("span");
          label.textContent = d.label + " " + ((d.value / totalCost) * 100).toFixed(1) + "%";

          item.appendChild(color);
          item.appendChild(label);
          chartLegend.appendChild(item);
        });

        resultSection.classList.add("show");
      }

      btnCalculate.addEventListener("click", calculate);

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

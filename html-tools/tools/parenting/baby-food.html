      function getStage(age) {
        if (age < 6) return "early";
        if (age < 8) return "beginning";
        if (age < 10) return "middle";
        if (age < 12) return "late";
        return "toddler";
      }

      function updateAge() {
        const age = parseInt(document.getElementById("ageSlider").value);
        document.getElementById("ageValue").textContent = age + "个月";

        const stage = getStage(age);
        const data = stageData[stage];

        document.getElementById("stageBadge").textContent = data.name;

        // Render schedule
        const scheduleHtml = data.schedule
          .map(
            (s) => `
        <div class="schedule-item">
          <div class="schedule-time">${s.time}</div>
          <div class="schedule-meal">${s.meal}</div>
          <div class="schedule-detail">${s.detail}</div>
        </div>
      `
          )
          .join("");
        document.getElementById("scheduleGrid").innerHTML = scheduleHtml;

        // Render foods
        const foodsHtml = data.foods
          .map(
            (f) => `
        <div class="food-item ${f.tag === "new" ? "new" : ""}">
          <div class="food-icon">${f.icon}</div>
          <div class="food-name">${f.name}</div>
          <div class="food-desc">${f.desc}</div>
          ${f.tag ? `<span class="food-tag ${f.tag}">${f.tag === "new" ? "新添加" : "注意"}</span>` : ""}
        </div>
      `
          )
          .join("");
        document.getElementById("foodGrid").innerHTML = foodsHtml;

        // Render tips
        const tipsHtml = data.tips
          .map(
            (t) => `
        <div class="tip-item">
          <span class="tip-icon">${t.icon}</span>
          <span class="tip-content">${t.content}</span>
        </div>
      `
          )
          .join("");
        document.getElementById("tipsList").innerHTML = tipsHtml;

        // Update warning
        document.getElementById("warningContent").textContent = data.warning;
      }

      // Initialize
      updateAge();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>

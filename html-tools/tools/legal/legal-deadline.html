      <h1>法律时限计算器</h1>
      <p class="desc">计算诉讼时效、上诉期限、答辩期限等各类法律时限</p>

      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label for="deadlineType">时限类型</label>
            <select id="deadlineType" onchange="updatePeriod()">
              <option value="custom">自定义时限</option>
              <optgroup label="诉讼时效">
                <option value="limitation_3y">普通诉讼时效（3年）</option>
                <option value="limitation_1y">特殊诉讼时效（1年）</option>
                <option value="limitation_20y">最长保护期（20年）</option>
              </optgroup>
              <optgroup label="民事诉讼期限">
                <option value="appeal_civil">民事上诉期（15天）</option>
                <option value="defense_civil">民事答辩期（15天）</option>
                <option value="enforcement">申请强制执行（2年）</option>
              </optgroup>
              <optgroup label="刑事诉讼期限">
                <option value="appeal_criminal">刑事上诉期（10天）</option>
              </optgroup>
              <optgroup label="行政诉讼期限">
                <option value="appeal_admin">行政上诉期（15天）</option>
                <option value="admin_sue">行政诉讼起诉期（6个月）</option>
                <option value="admin_review">行政复议申请期（60天）</option>
              </optgroup>
              <optgroup label="仲裁期限">
                <option value="arbitration_labor">劳动仲裁时效（1年）</option>
                <option value="arbitration_commercial">商事仲裁时效（参照诉讼时效）</option>
              </optgroup>
              <optgroup label="合同期限">
                <option value="contract_7d">7天冷静期</option>
                <option value="contract_30d">30天通知期</option>
                <option value="contract_90d">90天试用期</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label for="startDate">起算日期</label>
            <input type="date" id="startDate" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="periodValue">期限数值</label>
            <input type="number" id="periodValue" value="15" min="1" />
          </div>
          <div class="form-group">
            <label for="periodUnit">期限单位</label>
            <select id="periodUnit">
              <option value="day">天</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="excludeHolidays" />
            节假日顺延（期限最后一天为节假日时顺延至工作日）
          </label>
        </div>

        <div class="btn-row">
          <button class="primary" onclick="calculate()">计算截止日期</button>
          <button onclick="setToday()">设为今天</button>
          <button onclick="clearForm()">清空</button>
        </div>

        <div id="status" class="status"></div>

        <div id="resultCard" class="result-card" style="display: none">
          <div class="result-label">截止日期</div>
          <div id="resultDate" class="result-date"></div>
          <div id="resultCountdown" class="result-countdown"></div>

          <div class="deadline-info">
            <div class="deadline-info-item">
              <span class="deadline-info-label">起算日期</span>
              <span id="infoStartDate"></span>
            </div>
            <div class="deadline-info-item">
              <span class="deadline-info-label">期限</span>
              <span id="infoPeriod"></span>
            </div>
            <div class="deadline-info-item">
              <span class="deadline-info-label">截止日期</span>
              <span id="infoEndDate"></span>
            </div>
            <div class="deadline-info-item">
              <span class="deadline-info-label">剩余时间</span>
              <span id="infoRemaining"></span>
            </div>
          </div>
        </div>

        <div class="preset-list">
          <div class="preset-title">常用时限快捷选择</div>
          <div class="preset-grid">
            <div class="preset-item" onclick="selectPreset('limitation_3y')">
              <div class="preset-item-name">普通诉讼时效</div>
              <div class="preset-item-desc">3年 - 一般民事权利</div>
            </div>
            <div class="preset-item" onclick="selectPreset('appeal_civil')">
              <div class="preset-item-name">民事上诉期</div>
              <div class="preset-item-desc">15天 - 一审判决</div>
            </div>
            <div class="preset-item" onclick="selectPreset('admin_review')">
              <div class="preset-item-name">行政复议</div>
              <div class="preset-item-desc">60天 - 知道行政行为之日起</div>
            </div>
            <div class="preset-item" onclick="selectPreset('arbitration_labor')">
              <div class="preset-item-name">劳动仲裁</div>
              <div class="preset-item-desc">1年 - 知道权益被侵害之日起</div>
            </div>
            <div class="preset-item" onclick="selectPreset('enforcement')">
              <div class="preset-item-name">申请执行</div>
              <div class="preset-item-desc">2年 - 法律文书生效之日起</div>
            </div>
            <div class="preset-item" onclick="selectPreset('contract_7d')">
              <div class="preset-item-name">冷静期</div>
              <div class="preset-item-desc">7天 - 消费者无理由退货</div>
            </div>
          </div>
        </div>

        <div class="disclaimer">
          <strong>免责声明：</strong>
          本工具仅供参考，不构成法律建议。实际法律时限可能受多种因素影响（如中止、中断、节假日等），请以专业律师意见和最新法律规定为准。
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      var LS_KEY = "legal_deadline_v1";

      var presets = {
        limitation_3y: { value: 3, unit: "year", name: "普通诉讼时效（3年）" },
        limitation_1y: { value: 1, unit: "year", name: "特殊诉讼时效（1年）" },
        limitation_20y: { value: 20, unit: "year", name: "最长保护期（20年）" },
        appeal_civil: { value: 15, unit: "day", name: "民事上诉期（15天）" },
        defense_civil: { value: 15, unit: "day", name: "民事答辩期（15天）" },
        enforcement: { value: 2, unit: "year", name: "申请强制执行（2年）" },
        appeal_criminal: { value: 10, unit: "day", name: "刑事上诉期（10天）" },
        appeal_admin: { value: 15, unit: "day", name: "行政上诉期（15天）" },
        admin_sue: { value: 6, unit: "month", name: "行政诉讼起诉期（6个月）" },
        admin_review: { value: 60, unit: "day", name: "行政复议申请期（60天）" },
        arbitration_labor: { value: 1, unit: "year", name: "劳动仲裁时效（1年）" },
        arbitration_commercial: { value: 3, unit: "year", name: "商事仲裁时效" },
        contract_7d: { value: 7, unit: "day", name: "7天冷静期" },
        contract_30d: { value: 30, unit: "day", name: "30天通知期" },
        contract_90d: { value: 90, unit: "day", name: "90天试用期" }
      };

      function updatePeriod() {
        var type = document.getElementById("deadlineType").value;
        if (type !== "custom" && presets[type]) {
          var preset = presets[type];
          document.getElementById("periodValue").value = preset.value;
          document.getElementById("periodUnit").value = preset.unit;
        }
      }

      function selectPreset(type) {
        document.getElementById("deadlineType").value = type;
        updatePeriod();
        if (document.getElementById("startDate").value) {
          calculate();
        }
      }

      function setToday() {
        document.getElementById("startDate").value = new Date().toISOString().split("T")[0];
      }

      function calculate() {
        var startDateStr = document.getElementById("startDate").value;
        var periodValue = parseInt(document.getElementById("periodValue").value, 10);
        var periodUnit = document.getElementById("periodUnit").value;
        var excludeHolidays = document.getElementById("excludeHolidays").checked;

        if (!startDateStr) {
          showStatus("请选择起算日期", "error");
          return;
        }

        if (!periodValue || periodValue < 1) {
          showStatus("请输入有效的期限数值", "error");
          return;
        }

        var startDate = new Date(startDateStr);
        var endDate = new Date(startDate);

        // Calculate end date
        switch (periodUnit) {
          case "day":
            endDate.setDate(endDate.getDate() + periodValue);
            break;
          case "month":
            endDate.setMonth(endDate.getMonth() + periodValue);
            break;
          case "year":
            endDate.setFullYear(endDate.getFullYear() + periodValue);
            break;
        }

        // Check for holidays (simplified - just weekends)
        if (excludeHolidays) {
          while (endDate.getDay() === 0 || endDate.getDay() === 6) {
            endDate.setDate(endDate.getDate() + 1);
          }
        }

        // Calculate remaining days
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var diff = endDate.getTime() - today.getTime();
        var remainingDays = Math.ceil(diff / (1000 * 60 * 60 * 24));

        // Display results
        var resultCard = document.getElementById("resultCard");
        var resultDate = document.getElementById("resultDate");
        var resultCountdown = document.getElementById("resultCountdown");

        resultCard.style.display = "block";

        var dateStr =
          endDate.getFullYear() + "年" + (endDate.getMonth() + 1) + "月" + endDate.getDate() + "日";
        resultDate.textContent = dateStr;

        resultDate.className = "result-date";
        resultCountdown.className = "result-countdown";

        if (remainingDays < 0) {
          resultDate.classList.add("expired");
          resultCountdown.textContent = "已过期 " + Math.abs(remainingDays) + " 天";
          resultCountdown.classList.add("urgent");
        } else if (remainingDays <= 7) {
          resultDate.classList.add("warning");
          resultCountdown.textContent = "剩余 " + remainingDays + " 天（紧急）";
          resultCountdown.classList.add("urgent");
        } else if (remainingDays <= 30) {
          resultDate.classList.add("warning");
          resultCountdown.textContent = "剩余 " + remainingDays + " 天";
        } else {
          resultDate.classList.add("safe");
          resultCountdown.textContent = "剩余 " + remainingDays + " 天";
        }

        // Info details
        document.getElementById("infoStartDate").textContent = formatDate(startDate);
        document.getElementById("infoPeriod").textContent =
          periodValue + " " + getUnitName(periodUnit);
        document.getElementById("infoEndDate").textContent = formatDate(endDate);

        var remainingText;
        if (remainingDays < 0) {
          remainingText = "已过期 " + Math.abs(remainingDays) + " 天";
        } else if (remainingDays === 0) {
          remainingText = "今天到期";
        } else {
          remainingText = remainingDays + " 天";
        }
        document.getElementById("infoRemaining").textContent = remainingText;

        saveToStorage();
        showStatus("计算完成", "success");
      }

      function formatDate(date) {
        return (
          date.getFullYear() +
          "-" +
          String(date.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(date.getDate()).padStart(2, "0")
        );
      }

      function getUnitName(unit) {
        var names = {
          day: "天",
          month: "个月",
          year: "年"
        };
        return names[unit] || unit;
      }

      function clearForm() {
        document.getElementById("startDate").value = "";
        document.getElementById("deadlineType").value = "custom";
        document.getElementById("periodValue").value = "15";
        document.getElementById("periodUnit").value = "day";
        document.getElementById("resultCard").style.display = "none";
        localStorage.removeItem(LS_KEY);
        showStatus("已清空", "success");
      }

      function saveToStorage() {
        try {
          var data = {
            startDate: document.getElementById("startDate").value,
            deadlineType: document.getElementById("deadlineType").value,
            periodValue: document.getElementById("periodValue").value,
            periodUnit: document.getElementById("periodUnit").value,
            excludeHolidays: document.getElementById("excludeHolidays").checked
          };
          localStorage.setItem(LS_KEY, JSON.stringify(data));
        } catch (e) {}
      }

      function loadFromStorage() {
        try {
          var saved = localStorage.getItem(LS_KEY);
          if (saved) {
            var data = JSON.parse(saved);
            if (data.startDate) document.getElementById("startDate").value = data.startDate;
            if (data.deadlineType)
              document.getElementById("deadlineType").value = data.deadlineType;
            if (data.periodValue) document.getElementById("periodValue").value = data.periodValue;
            if (data.periodUnit) document.getElementById("periodUnit").value = data.periodUnit;
            if (data.excludeHolidays !== undefined)
              document.getElementById("excludeHolidays").checked = data.excludeHolidays;
          }
        } catch (e) {}
      }

      function showStatus(msg, type) {
        var el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      function toggleTheme() {
        var html = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }

      (function () {
        var savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          var btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = savedTheme === "dark" ? "🌙" : "☀️";
        }
        loadFromStorage();
      })();
    </script>
  </body>
</html>

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <h1>服务条款生成器</h1>
      <p class="desc">根据您的业务信息快速生成网站或应用的服务条款文档</p>

      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label for="companyName">公司/网站名称 *</label>
            <input type="text" id="companyName" placeholder="例如：示例科技有限公司" />
          </div>
          <div class="form-group">
            <label for="websiteUrl">网站地址 *</label>
            <input type="text" id="websiteUrl" placeholder="例如：https://example.com" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contactEmail">联系邮箱 *</label>
            <input type="email" id="contactEmail" placeholder="例如：contact@example.com" />
          </div>
          <div class="form-group">
            <label for="effectiveDate">生效日期</label>
            <input type="date" id="effectiveDate" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="serviceType">服务类型</label>
            <select id="serviceType">
              <option value="website">网站服务</option>
              <option value="saas">SaaS 软件服务</option>
              <option value="app">移动应用</option>
              <option value="ecommerce">电子商务</option>
              <option value="platform">平台服务</option>
            </select>
          </div>
          <div class="form-group">
            <label for="jurisdiction">司法管辖区</label>
            <select id="jurisdiction">
              <option value="cn">中国大陆</option>
              <option value="hk">中国香港</option>
              <option value="us">美国</option>
              <option value="eu">欧盟</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="serviceDescription">服务简述</label>
          <textarea
            id="serviceDescription"
            rows="3"
            placeholder="简要描述您提供的服务内容..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>包含条款</label>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="termAccount" checked />
              账户注册
            </label>
            <label>
              <input type="checkbox" id="termPayment" />
              付款条款
            </label>
            <label>
              <input type="checkbox" id="termRefund" />
              退款政策
            </label>
            <label>
              <input type="checkbox" id="termIP" checked />
              知识产权
            </label>
            <label>
              <input type="checkbox" id="termUGC" />
              用户内容
            </label>
            <label>
              <input type="checkbox" id="termPrivacy" checked />
              隐私条款
            </label>
            <label>
              <input type="checkbox" id="termTermination" checked />
              终止条款
            </label>
            <label>
              <input type="checkbox" id="termDispute" checked />
              争议解决
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="language">输出语言</label>
          <select id="language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="primary" onclick="generateTerms()">生成服务条款</button>
          <button onclick="copyOutput()">复制</button>
          <button onclick="downloadTerms()">下载</button>
          <button onclick="clearForm()">清空</button>
        </div>

        <div id="status" class="status"></div>

        <div class="output-section">
          <label for="output">生成的服务条款</label>
          <textarea
            id="output"
            class="output-area"
            readonly
            placeholder="点击【生成服务条款】按钮生成内容..."
          ></textarea>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      var LS_KEY = "terms_generator_form_v1";

      function getFormData() {
        return {
          companyName: document.getElementById("companyName").value.trim(),
          websiteUrl: document.getElementById("websiteUrl").value.trim(),
          contactEmail: document.getElementById("contactEmail").value.trim(),
          effectiveDate: document.getElementById("effectiveDate").value,
          serviceType: document.getElementById("serviceType").value,
          jurisdiction: document.getElementById("jurisdiction").value,
          serviceDescription: document.getElementById("serviceDescription").value.trim(),
          terms: {
            account: document.getElementById("termAccount").checked,
            payment: document.getElementById("termPayment").checked,
            refund: document.getElementById("termRefund").checked,
            ip: document.getElementById("termIP").checked,
            ugc: document.getElementById("termUGC").checked,
            privacy: document.getElementById("termPrivacy").checked,
            termination: document.getElementById("termTermination").checked,
            dispute: document.getElementById("termDispute").checked
          },
          language: document.getElementById("language").value
        };
      }

      function setFormData(data) {
        if (!data) return;
        if (data.companyName) document.getElementById("companyName").value = data.companyName;
        if (data.websiteUrl) document.getElementById("websiteUrl").value = data.websiteUrl;
        if (data.contactEmail) document.getElementById("contactEmail").value = data.contactEmail;
        if (data.effectiveDate) document.getElementById("effectiveDate").value = data.effectiveDate;
        if (data.serviceType) document.getElementById("serviceType").value = data.serviceType;

      function copyOutput() {
        var output = document.getElementById("output").value;
        if (!output) {
          showStatus("没有可复制的内容", "error");
          return;
        }
        navigator.clipboard
          .writeText(output)
          .then(function () {
            showStatus("已复制到剪贴板", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      }

      function downloadTerms() {
        var output = document.getElementById("output").value;
        if (!output) {
          showStatus("没有可下载的内容", "error");
          return;
        }
        var data = getFormData();
        var filename = (data.language === "zh" ? "服务条款" : "Terms_of_Service") + ".txt";
        var blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("下载已开始", "success");
      }

      function clearForm() {
        document.getElementById("companyName").value = "";
        document.getElementById("websiteUrl").value = "";
        document.getElementById("contactEmail").value = "";
        document.getElementById("effectiveDate").value = "";
        document.getElementById("serviceDescription").value = "";
        document.getElementById("output").value = "";

      // Theme toggle
      function toggleTheme() {
        var html = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }

      // Initialize
      (function () {
        var savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          var btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = savedTheme === "dark" ? "🌙" : "☀️";
        }
        loadFromStorage();
        if (!document.getElementById("effectiveDate").value) {
          document.getElementById("effectiveDate").value = new Date().toISOString().split("T")[0];
        }

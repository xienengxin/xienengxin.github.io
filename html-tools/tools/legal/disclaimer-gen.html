    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>

      <h1>免责声明生成器</h1>
      <p class="desc">根据您的业务类型快速生成免责声明文档</p>

      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label for="companyName">公司/网站名称 *</label>
            <input type="text" id="companyName" placeholder="例如：示例科技有限公司" />
          </div>
          <div class="form-group">
            <label for="websiteUrl">网站地址</label>
            <input type="text" id="websiteUrl" placeholder="例如：https://example.com" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="disclaimerType">免责声明类型</label>
            <select id="disclaimerType">
              <option value="general">通用免责声明</option>
              <option value="blog">博客/内容网站</option>
              <option value="ecommerce">电子商务</option>
              <option value="professional">专业服务咨询</option>
              <option value="finance">金融/投资信息</option>
              <option value="health">健康/医疗信息</option>
              <option value="legal">法律信息</option>
              <option value="software">软件/工具</option>
            </select>
          </div>
          <div class="form-group">
            <label for="language">输出语言</label>
            <select id="language">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contactEmail">联系邮箱</label>
            <input type="email" id="contactEmail" placeholder="例如：contact@example.com" />
          </div>
          <div class="form-group">
            <label for="lastUpdated">最后更新日期</label>
            <input type="date" id="lastUpdated" />
          </div>
        </div>

        <div class="form-group">
          <label>包含条款</label>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="includeAccuracy" checked />
              信息准确性
            </label>
            <label>
              <input type="checkbox" id="includeExternal" checked />
              外部链接
            </label>
            <label>
              <input type="checkbox" id="includeErrors" checked />
              技术错误
            </label>
            <label>
              <input type="checkbox" id="includeChanges" checked />
              变更权利
            </label>
            <label>
              <input type="checkbox" id="includeThirdParty" />
              第三方内容
            </label>
            <label>
              <input type="checkbox" id="includeViews" />
              观点声明
            </label>
            <label>
              <input type="checkbox" id="includeTestimonials" />
              用户评价
            </label>
            <label>
              <input type="checkbox" id="includeLiability" checked />
              责任限制
            </label>
          </div>
        </div>

        <div class="btn-row">
          <button class="primary" onclick="generateDisclaimer()">生成免责声明</button>
          <button onclick="copyOutput()">复制</button>
          <button onclick="downloadDisclaimer()">下载</button>
          <button onclick="clearForm()">清空</button>
        </div>

        <div id="status" class="status"></div>

        <div class="output-section">
          <label for="output">生成的免责声明</label>
          <textarea
            id="output"
            class="output-area"
            readonly
            placeholder="点击【生成免责声明】按钮生成内容..."
          ></textarea>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      var LS_KEY = "disclaimer_gen_form_v1";

      function getFormData() {
        return {
          companyName: document.getElementById("companyName").value.trim(),
          websiteUrl: document.getElementById("websiteUrl").value.trim(),
          disclaimerType: document.getElementById("disclaimerType").value,
          language: document.getElementById("language").value,
          contactEmail: document.getElementById("contactEmail").value.trim(),
          lastUpdated: document.getElementById("lastUpdated").value,
          includes: {
            accuracy: document.getElementById("includeAccuracy").checked,
            external: document.getElementById("includeExternal").checked,
            errors: document.getElementById("includeErrors").checked,
            changes: document.getElementById("includeChanges").checked,
            thirdParty: document.getElementById("includeThirdParty").checked,
            views: document.getElementById("includeViews").checked,
            testimonials: document.getElementById("includeTestimonials").checked,
            liability: document.getElementById("includeLiability").checked
          }
        };
      }

      function setFormData(data) {
        if (!data) return;
        if (data.companyName) document.getElementById("companyName").value = data.companyName;
        if (data.websiteUrl) document.getElementById("websiteUrl").value = data.websiteUrl;
        if (data.disclaimerType)
          document.getElementById("disclaimerType").value = data.disclaimerType;
        if (data.language) document.getElementById("language").value = data.language;
        if (data.contactEmail) document.getElementById("contactEmail").value = data.contactEmail;
        if (data.lastUpdated) document.getElementById("lastUpdated").value = data.lastUpdated;
        if (data.includes) {
          document.getElementById("includeAccuracy").checked = data.includes.accuracy !== false;
          document.getElementById("includeExternal").checked = data.includes.external !== false;
          document.getElementById("includeErrors").checked = data.includes.errors !== false;
          document.getElementById("includeChanges").checked = data.includes.changes !== false;
          document.getElementById("includeThirdParty").checked = !!data.includes.thirdParty;
          document.getElementById("includeViews").checked = !!data.includes.views;

      function copyOutput() {
        var output = document.getElementById("output").value;
        if (!output) {
          showStatus("没有可复制的内容", "error");
          return;
        }
        navigator.clipboard
          .writeText(output)
          .then(function () {
            showStatus("已复制到剪贴板", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      }

      function downloadDisclaimer() {
        var output = document.getElementById("output").value;
        if (!output) {
          showStatus("没有可下载的内容", "error");
          return;
        }
        var data = getFormData();
        var filename = (data.language === "zh" ? "免责声明" : "Disclaimer") + ".txt";
        var blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("下载已开始", "success");
      }

      function clearForm() {
        document.getElementById("companyName").value = "";
        document.getElementById("websiteUrl").value = "";
        document.getElementById("contactEmail").value = "";
        document.getElementById("lastUpdated").value = "";
        document.getElementById("output").value = "";
        localStorage.removeItem(LS_KEY);
        showStatus("已清空", "success");
      }

      document.querySelectorAll("input, select").forEach(function (el) {
        el.addEventListener("change", saveToStorage);
        el.addEventListener("input", saveToStorage);
      });

      function toggleTheme() {
        var html = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }

      (function () {
        var savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          var btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = savedTheme === "dark" ? "🌙" : "☀️";
        }
        loadFromStorage();
        if (!document.getElementById("lastUpdated").value) {
          document.getElementById("lastUpdated").value = new Date().toISOString().split("T")[0];
        }
      })();

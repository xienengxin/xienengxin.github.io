    <div class="bg-grid"></div>
    <div class="container">

      <h1>🧶 编织计数器</h1>
      <p class="subtitle">记录每一行，享受编织时光</p>

      <div id="countersContainer">
        <!-- Counters will be rendered here -->
      </div>

      <button class="add-counter" onclick="addCounter()">
        <span>+</span>
        添加计数器
      </button>

      <div class="sound-toggle">
        <input type="checkbox" id="soundEnabled" checked onchange="toggleSound()" />
        <label for="soundEnabled">🔔 计数音效</label>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let counters = JSON.parse(localStorage.getItem("knitting_counters") || "[]");
      let soundEnabled = localStorage.getItem("knitting_sound") !== "false";

      if (counters.length === 0) {
        counters = [{ id: 1, name: "行数", count: 0, target: 100 }];
      }

      let nextId = Math.max(...counters.map((c) => c.id)) + 1;

      // Audio context for click sound
      let audioCtx = null;

      function playClick() {
        if (!soundEnabled) return;

        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.value = 800;
        oscillator.type = "sine";

        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.1);
      }

      function saveCounters() {
        localStorage.setItem("knitting_counters", JSON.stringify(counters));
      }

      function render() {
        const container = document.getElementById("countersContainer");
        container.innerHTML = counters
          .map((c) => {
            const progress = c.target > 0 ? Math.min(100, (c.count / c.target) * 100) : 0;
            return `
          <div class="counter-card" data-id="${c.id}">
            <div class="counter-header">
              <div class="counter-name">
                <input type="text" value="${c.name}" onchange="updateName(${c.id}, this.value)">
              </div>
              <div class="counter-actions">
                <button class="action-btn" onclick="resetCounter(${c.id})" title="重置">🔄</button>
                <button class="action-btn delete" onclick="deleteCounter(${c.id})" title="删除">🗑️</button>
              </div>
            </div>

            <div class="counter-display">
              <div class="counter-value">${c.count}</div>
              ${c.target > 0 ? `<div class="counter-target">目标: ${c.target}</div>` : ""}
            </div>

            <div class="counter-buttons">
              <button class="count-btn" onclick="decrement(${c.id})">−</button>
              <button class="count-btn primary" onclick="increment(${c.id})">+</button>
            </div>

            ${
              c.target > 0
                ? `
              <div class="progress-bar">
                <div class="progress-fill" style="width:${progress}%"></div>
              </div>
            `
                : ""
            }

            <div class="target-input">
              <label>目标值:</label>
              <input type="number" value="${c.target}" min="0" onchange="updateTarget(${c.id}, this.value)">
            </div>
          </div>
        `;
          })
          .join("");
      }

      function addCounter() {
        counters.push({
          id: nextId++,
          name: "计数器" + counters.length,
          count: 0,
          target: 0
        });
        saveCounters();
        render();
      }

      function deleteCounter(id) {
        if (counters.length <= 1) {
          alert("至少保留一个计数器");
          return;
        }
        if (confirm("确定要删除这个计数器吗？")) {
          counters = counters.filter((c) => c.id !== id);
          saveCounters();
          render();
        }
      }

      function increment(id) {
        const counter = counters.find((c) => c.id === id);
        if (counter) {
          counter.count++;
          playClick();
          saveCounters();
          updateDisplay(id);

          // Check if target reached
          if (counter.target > 0 && counter.count === counter.target) {
            setTimeout(() => {
              alert("🎉 恭喜！已完成目标！");
            }, 100);
          }
        }
      }

      function decrement(id) {
        const counter = counters.find((c) => c.id === id);
        if (counter && counter.count > 0) {
          counter.count--;
          playClick();
          saveCounters();
          updateDisplay(id);
        }
      }

      function resetCounter(id) {
        if (confirm("确定要重置计数吗？")) {
          const counter = counters.find((c) => c.id === id);
          if (counter) {
            counter.count = 0;
            saveCounters();
            updateDisplay(id);
          }
        }
      }

      function updateName(id, name) {
        const counter = counters.find((c) => c.id === id);
        if (counter) {
          counter.name = name;
          saveCounters();
        }
      }

      function updateTarget(id, target) {
        const counter = counters.find((c) => c.id === id);
        if (counter) {
          counter.target = parseInt(target) || 0;
          saveCounters();
          render();
        }
      }

      function updateDisplay(id) {
        const counter = counters.find((c) => c.id === id);
        const card = document.querySelector(`.counter-card[data-id="${id}"]`);
        if (counter && card) {
          card.querySelector(".counter-value").textContent = counter.count;
          const progressFill = card.querySelector(".progress-fill");
          if (progressFill && counter.target > 0) {
            const progress = Math.min(100, (counter.count / counter.target) * 100);
            progressFill.style.width = progress + "%";
          }
        }
      }

      function toggleSound() {
        soundEnabled = document.getElementById("soundEnabled").checked;
        localStorage.setItem("knitting_sound", soundEnabled);
      }

      // Initialize
      document.getElementById("soundEnabled").checked = soundEnabled;
      render();

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          if (counters.length > 0) {
            increment(counters[0].id);
          }
        }
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

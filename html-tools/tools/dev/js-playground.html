    <header>

        <span class="js-logo">JS</span>
        JavaScript Playground
      </h1>
      <div class="header-actions">
        <button class="btn" onclick="formatCode()">🎨 格式化</button>
        <button class="btn btn-primary" onclick="runCode()">▶ 运行</button>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>
    </header>

    <div class="main-container">
      <div class="editor-panel">
        <div class="examples-bar">
          <button class="example-btn" onclick="loadExample('hello')">Hello World</button>
          <button class="example-btn" onclick="loadExample('array')">数组操作</button>
          <button class="example-btn" onclick="loadExample('async')">异步/Promise</button>
          <button class="example-btn" onclick="loadExample('fetch')">Fetch API</button>
          <button class="example-btn" onclick="loadExample('class')">ES6 Class</button>
          <button class="example-btn" onclick="loadExample('destructure')">解构赋值</button>
        </div>
        <div class="panel-header">
          <span>📝 代码编辑器</span>
          <span class="stats" id="editorStats">0 行 | 0 字符</span>
        </div>
        <div class="editor-container">
          <textarea
            id="codeEditor"
            spellcheck="false"
            placeholder="// 在这里输入 JavaScript 代码...
// 按 Ctrl+Enter 或点击运行按钮执行

console.log('Hello, World!');
"
          ></textarea>
        </div>
        <div class="shortcut-hint">
          <kbd>Ctrl</kbd>
          +
          <kbd>Enter</kbd>
          运行代码 |
          <kbd>Ctrl</kbd>
          +
          <kbd>S</kbd>
          格式化
        </div>
      </div>

      <div class="output-panel">
        <div class="panel-header">
          <span>📺 控制台输出</span>
          <button
            class="btn btn-danger"
            onclick="clearConsole()"
            style="padding: 4px 10px; font-size: 12px"
          >
            🗑️ 清空
          </button>
        </div>
        <div class="console-output" id="consoleOutput">
          <div class="empty-console">运行代码后，输出将显示在这里...</div>
        </div>
      </div>
    </div>

    <script>
      const examples = {
        hello: `// Hello World 示例

// 不同类型的日志
console.log('普通日志');
console.warn('警告信息');
console.error('错误信息');
console.info('提示信息');

// 返回值
'JavaScript is awesome! 🚀'`,

        array: `// 数组操作示例

// map - 映射

// filter - 过滤

// reduce - 归约

// find - 查找

// 链式调用
const result = numbers
  .filter(n => n % 2 === 0)
  .map(n => n ** 2)
  .reduce((acc, n) => acc + n, 0);

        async: `// 异步编程示例
console.log('1. 开始执行');

// Promise
const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

// async/await
async function demo() {
  console.log('2. 进入异步函数');
  
  await delay(100);
  console.log('3. 100ms 后');
  
  await delay(100);
  console.log('4. 又 100ms 后');
  
  return '异步执行完成! ✨';
}

// Promise.all
async function parallel() {
  const start = Date.now();
  await Promise.all([
    delay(100),
    delay(100),
    delay(100)
  ]);
  console.log(\`并行执行耗时: \${Date.now() - start}ms\`);
}

demo().then(result => console.log('5.', result));
parallel();

console.log('注意: 这条会先输出，因为上面是异步的');`,

        fetch: `// Fetch API 示例 (使用公开 API)

        class: `// ES6 Class 示例

const dog = new Dog('旺财', '金毛');

        destructure: `// 解构赋值示例

// 数组解构

// 对象解构

      };

      // Theme handling
      function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
      }

      window.toggleTheme = function () {
        const current = document.documentElement.getAttribute("data-theme");
        const newTheme = current === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // Console override
      const consoleOutput = document.getElementById("consoleOutput");
      const originalConsole = {
        log: console.log,
        warn: console.warn,
        error: console.error,
        info: console.info
      };

      function addConsoleItem(type, args) {
        // Remove empty state
        const empty = consoleOutput.querySelector(".empty-console");
        if (empty) empty.remove();

        const item = document.createElement("div");
        item.className = `console-item ${type}`;

        const icons = {
          log: "●",
          warn: "⚠",
          error: "✖",
          info: "ℹ",
          result: "←"
        };

        const content = args
          .map((arg) => {
            if (arg === null) return "null";
            if (arg === undefined) return "undefined";
            if (typeof arg === "object") {
              try {
                return JSON.stringify(arg, null, 2);
              } catch {
                return String(arg);
              }
            }
            return String(arg);
          })
          .join(" ");

        item.innerHTML = `
                <span class="icon">${icons[type]}</span>
                <span class="content">${escapeHTML(content)}</span>
            `;

        consoleOutput.appendChild(item);
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }

      function escapeHTML(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function setupConsole() {
        console.log = (...args) => {
          originalConsole.log(...args);
          addConsoleItem("log", args);
        };
        console.warn = (...args) => {
          originalConsole.warn(...args);
          addConsoleItem("warn", args);
        };
        console.error = (...args) => {
          originalConsole.error(...args);
          addConsoleItem("error", args);
        };
        console.info = (...args) => {
          originalConsole.info(...args);
          addConsoleItem("info", args);
        };
      }

      function clearConsole() {
        consoleOutput.innerHTML = '<div class="empty-console">控制台已清空</div>';
      }

      // Run code
      function runCode() {
        clearConsole();
        const code = document.getElementById("codeEditor").value;

        try {
          // Use Function constructor for better isolation
          const result = new Function(code)();

          // Show return value if any
          if (result !== undefined) {
            setTimeout(() => {
              addConsoleItem("result", [result]);
            }, 0);
          }
        } catch (err) {
          console.error(err.toString());
        }
      }

      // Format code (basic)
      function formatCode() {
        const editor = document.getElementById("codeEditor");
        let code = editor.value;

        // Very basic formatting
        code = code.replace(/;(?!\n)/g, ";\n");
        code = code.replace(/\{(?!\n)/g, "{\n");
        code = code.replace(/(?<!\n)\}/g, "\n}");

        editor.value = code;
        updateStats();
      }

      // Load example
      window.loadExample = function (name) {
        document.getElementById("codeEditor").value = examples[name] || "";
        updateStats();
        clearConsole();
      };

      // Update stats
      function updateStats() {
        const code = document.getElementById("codeEditor").value;
        const lines = code.split("\n").length;
        const chars = code.length;
        document.getElementById("editorStats").textContent = `${lines} 行 | ${chars} 字符`;
      }

      // Tab handling
      document.getElementById("codeEditor").addEventListener("keydown", function (e) {
        if (e.key === "Tab") {
          e.preventDefault();
          const start = this.selectionStart;
          const end = this.selectionEnd;
          this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + 2;
        }

        // Ctrl+Enter to run
        if (e.key === "Enter" && e.ctrlKey) {
          e.preventDefault();
          runCode();
        }

        // Ctrl+S to format
        if (e.key === "s" && e.ctrlKey) {
          e.preventDefault();
          formatCode();
        }
      });

      document.getElementById("codeEditor").addEventListener("input", updateStats);

      // Initialize
      initTheme();
      setupConsole();
      loadExample("hello");
    </script>
  </body>
</html>

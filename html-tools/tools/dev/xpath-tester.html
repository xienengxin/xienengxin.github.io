  <body>

    <div class="header">

    <div class="container">
      <div class="card">
        <div class="input-row">
          <div class="input-group">
            <label>XPath表达式</label>
            <input type="text" id="xpath" placeholder="//div[@class='example']" value="//title" />
          </div>
          <button class="btn btn-primary" onclick="evaluate()">执行查询</button>
        </div>

        <div class="examples">
          <span style="color: var(--color-text-secondary); margin-right: 0.5rem">示例:</span>
          <button class="example-btn" onclick="setExample('//title')">获取标题</button>

          <button class="example-btn" onclick="setExample('//div[@class]')">有class的div</button>
          <button class="example-btn" onclick="setExample('//text()')">所有文本</button>
          <button class="example-btn" onclick="setExample('//*[@id]')">有id的元素</button>
          <button class="example-btn" onclick="setExample('//img/@src')">所有图片</button>
        </div>
      </div>

      <div class="editor-grid">
        <div class="card">
          <h3 style="margin-bottom: 1rem">XML/HTML 内容</h3>
          <textarea id="xmlContent" placeholder="粘贴XML或HTML内容...">

  &lt;head&gt;
    &lt;title&gt;示例页面&lt;/title&gt;
  &lt;/head&gt;
  &lt;body&gt;
    &lt;div class="container"&gt;
      &lt;h1 id="main-title"&gt;欢迎&lt;/h1&gt;
      &lt;p class="intro"&gt;这是一个示例页面&lt;/p&gt;
      &lt;ul&gt;
        &lt;li&gt;&lt;a href="/page1"&gt;链接1&lt;/a&gt;&lt;/li&gt;
        &lt;li&gt;&lt;a href="/page2"&gt;链接2&lt;/a&gt;&lt;/li&gt;

            <div class="result-header">

            </div>

    <script>
      window.setExample = function (xpath) {
        document.getElementById("xpath").value = xpath;
        evaluate();
      };

      function evaluate() {
        const xpath = document.getElementById("xpath").value.trim();
        const xmlContent = document.getElementById("xmlContent").value;
        const resultList = document.getElementById("resultList");
        const resultCount = document.getElementById("resultCount");

        if (!xpath || !xmlContent) {
          resultList.innerHTML =
            '<div class="result-item error">请输入XPath表达式和XML/HTML内容</div>';
          resultCount.textContent = "0 个";
          return;
        }

        try {
          // Parse XML/HTML
          const parser = new DOMParser();
          let doc;

          // Try parsing as XML first
          doc = parser.parseFromString(xmlContent, "text/xml");

          // Check for parse errors
          const parseError = doc.querySelector("parsererror");
          if (parseError) {
            // Try as HTML
            doc = parser.parseFromString(xmlContent, "text/html");
          }

          // Evaluate XPath
          const results = [];
          const xpathResult = doc.evaluate(xpath, doc, null, XPathResult.ANY_TYPE, null);

          let node;
          switch (xpathResult.resultType) {
            case XPathResult.NUMBER_TYPE:
              results.push({ type: "number", value: xpathResult.numberValue });
              break;
            case XPathResult.STRING_TYPE:
              results.push({ type: "string", value: xpathResult.stringValue });
              break;
            case XPathResult.BOOLEAN_TYPE:
              results.push({ type: "boolean", value: xpathResult.booleanValue });
              break;
            default:
              while ((node = xpathResult.iterateNext()) !== null) {
                let value, path;

                if (node.nodeType === Node.ATTRIBUTE_NODE) {
                  value = node.value;
                  path = `@${node.name}`;
                } else if (node.nodeType === Node.TEXT_NODE) {
                  value = node.textContent.trim();
                  path = "text()";
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                  value = node.outerHTML || serializeElement(node);
                  path = getElementPath(node);
                } else {
                  value = node.textContent;
                  path = node.nodeName;
                }

                if (value) {
                  results.push({ type: "node", value, path });
                }
              }
          }

          resultCount.textContent = `${results.length} 个`;

          if (results.length === 0) {
            resultList.innerHTML =
              '<div class="result-item" style="color: var(--color-text-secondary);">未找到匹配结果</div>';
          } else {
            resultList.innerHTML = results
              .map(
                (r, i) => `
                        <div class="result-item" onclick="copyResult(this)">
                            ${r.path ? `<div class="path">[${i + 1}] ${r.path}</div>` : ""}
                            ${escapeHtml(String(r.value))}
                        </div>
                    `
              )
              .join("");
          }
        } catch (e) {
          resultList.innerHTML = `<div class="result-item error">错误: ${escapeHtml(e.message)}</div>`;
          resultCount.textContent = "错误";
        }
      }

      function getElementPath(element) {
        const parts = [];
        while (element && element.nodeType === Node.ELEMENT_NODE) {
          let selector = element.nodeName.toLowerCase();
          if (element.id) {
            selector += `#${element.id}`;
          } else if (element.className) {
            selector += `.${element.className.split(" ")[0]}`;
          }
          parts.unshift(selector);
          element = element.parentNode;
        }
        return parts.join(" > ");
      }

      function serializeElement(element) {
        const serializer = new XMLSerializer();
        return serializer.serializeToString(element);
      }

      window.escapeHtml = function (text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      };

      window.copyResult = function (element) {
        const text = element.textContent;
        navigator.clipboard.writeText(text);
        showToast();
      };

      function showToast() {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Auto-evaluate on Enter
      document.getElementById("xpath").addEventListener("keypress", (e) => {
        if (e.key === "Enter") evaluate();
      });

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

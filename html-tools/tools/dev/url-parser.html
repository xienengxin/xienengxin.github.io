        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);

        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);

        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);

        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {

        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */

        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */

        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);

        /* Pico 浅色覆盖（默认 Pico 行为） */

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;

      }
      .container {
        max-width: 900px;

      }
      .theme-toggle {
        cursor: pointer;

        border-radius: 8px;
        color: white;
        font-size: 1rem;
      }
      .back-link {

        border-radius: 8px;

      .input-section {
        margin-bottom: 1.5rem;
      }
      .input-section label {
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: block;
      }
      .input-wrapper {
        display: flex;
        gap: 0.5rem;
      }
      .input-wrapper input {
        flex: 1;
        font-family: "SF Mono", Monaco, monospace;
      }
      .input-wrapper button {
        white-space: nowrap;
      }
      .quick-urls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .quick-urls button {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        background: var(--code-background-color);
        border: 1px solid var(--muted-border-color);
        border-radius: 4px;
        cursor: pointer;
      }
      .quick-urls button:hover {
        background: var(--primary-color);
        color: white;
      }
      .parts-grid {
        display: grid;
        gap: 1rem;
      }
      .part-card {
        background: var(--card-background-color);
        border-radius: 12px;
        padding: 1rem;
        border: 1px solid var(--muted-border-color);
      }
      .part-card.highlight {
        border-color: var(--primary-color);
        background: color-mix(in srgb, var(--primary-color) 5%, transparent);
      }
      .part-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .part-name {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--muted-color);
      }
      .part-copy {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .part-value {
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.95rem;
        word-break: break-all;
        min-height: 1.5rem;
        color: var(--primary-color);
      }
      .part-value.empty {
        color: var(--muted-color);
        font-style: italic;
      }
      .params-section {
        margin-top: 1rem;
      }
      .params-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .params-table th,
      .params-table td {
        padding: 0.75rem;
        text-align: left;
        border-bottom: 1px solid var(--muted-border-color);
      }
      .params-table th {
        background: var(--code-background-color);
        font-weight: 600;
      }
      .params-table td {
        font-family: "SF Mono", Monaco, monospace;
      }
      .params-table .key {
        color: var(--primary-color);
      }
      .params-table .value {
        color: #10b981;
        word-break: break-all;
      }
      .params-table .decoded {
        color: var(--muted-color);
        font-size: 0.85rem;
      }
      .builder-section {
        margin-top: 2rem;
        background: var(--card-background-color);
        padding: 1.5rem;
        border-radius: 12px;
      }
      .builder-section h3 {
        margin-top: 0;
        margin-bottom: 1rem;
      }
      .builder-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }
      .builder-grid label {
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
        display: block;
        color: var(--muted-color);
      }
      .builder-grid input {
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.9rem;
      }
      .result-url {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--code-background-color);
        border-radius: 8px;
        font-family: "SF Mono", Monaco, monospace;
        word-break: break-all;
        font-size: 0.9rem;
      }
      .structure-visual {
        margin: 1.5rem 0;
        padding: 1rem;
        background: var(--code-background-color);
        border-radius: 8px;
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.85rem;
        overflow-x: auto;
        white-space: nowrap;
      }
      .structure-visual span {
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        margin: 0 1px;
      }
      .structure-visual .protocol {
        background: #ef4444;
        color: white;
      }
      .structure-visual .host {
        background: #3b82f6;
        color: white;
      }
      .structure-visual .port {
        background: #8b5cf6;
        color: white;
      }
      .structure-visual .path {
        background: #10b981;
        color: white;
      }
      .structure-visual .query {
        background: #f59e0b;
        color: white;
      }
      .structure-visual .hash {
        background: #ec4899;
        color: white;
      }
      .structure-visual .sep {
        color: var(--muted-color);
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .tabs button {
        padding: 0.5rem 1rem;
        border: none;
        background: var(--code-background-color);
        border-radius: 8px;
        cursor: pointer;
      }
      .tabs button.active {
        background: var(--primary-color);
        color: white;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        background: #10b981;
        color: white;
        border-radius: 8px;
        font-weight: 500;
        z-index: 1000;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      @media (max-width: 640px) {
        .builder-grid {
          grid-template-columns: 1fr;
        }
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);

      }

        margin: 0 5px;
      }

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      URL 解析器
    </nav>
    <div class="container">
      <header>
        <h1>🔗 URL 解析器</h1>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
      </header>

      <div class="input-section">
        <label for="urlInput">输入 URL</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="urlInput"
            placeholder="https://example.com/path?key=value#section"
            autofocus
          />
          <button onclick="parseUrl()">解析</button>
          <button onclick="clearAll()" class="secondary">清空</button>
        </div>
        <div class="quick-urls">
          <span style="color: var(--muted-color); font-size: 0.8rem">示例:</span>
          <button onclick="setExample(0)">基础 URL</button>
          <button onclick="setExample(1)">带参数</button>
          <button onclick="setExample(2)">带认证</button>
          <button onclick="setExample(3)">复杂参数</button>
          <button onclick="setExample(4)">IPv6</button>
        </div>
      </div>

      <div id="result" style="display: none">
        <div class="structure-visual" id="structureVisual"></div>

        <div class="tabs">
          <button class="active" onclick="switchTab('parse')">URL 解析</button>
          <button onclick="switchTab('build')">URL 构建</button>
        </div>

        <div id="parseTab">
          <div class="parts-grid">
            <div class="part-card" data-part="href">
              <div class="part-header">
                <span class="part-name">完整 URL (href)</span>
                <button class="part-copy" onclick="copyPart('href')">复制</button>
              </div>
              <div class="part-value" id="partHref"></div>
            </div>
            <div class="part-card" data-part="protocol">
              <div class="part-header">
                <span class="part-name">协议 (protocol)</span>
                <button class="part-copy" onclick="copyPart('protocol')">复制</button>
              </div>
              <div class="part-value" id="partProtocol"></div>
            </div>
            <div class="part-card" data-part="host">
              <div class="part-header">
                <span class="part-name">主机 (host)</span>
                <button class="part-copy" onclick="copyPart('host')">复制</button>
              </div>
              <div class="part-value" id="partHost"></div>
            </div>
            <div class="part-card" data-part="hostname">
              <div class="part-header">
                <span class="part-name">主机名 (hostname)</span>
                <button class="part-copy" onclick="copyPart('hostname')">复制</button>
              </div>
              <div class="part-value" id="partHostname"></div>
            </div>
            <div class="part-card" data-part="port">
              <div class="part-header">
                <span class="part-name">端口 (port)</span>
                <button class="part-copy" onclick="copyPart('port')">复制</button>
              </div>
              <div class="part-value" id="partPort"></div>
            </div>
            <div class="part-card" data-part="origin">
              <div class="part-header">
                <span class="part-name">源 (origin)</span>
                <button class="part-copy" onclick="copyPart('origin')">复制</button>
              </div>
              <div class="part-value" id="partOrigin"></div>
            </div>
            <div class="part-card" data-part="pathname">
              <div class="part-header">
                <span class="part-name">路径 (pathname)</span>
                <button class="part-copy" onclick="copyPart('pathname')">复制</button>
              </div>
              <div class="part-value" id="partPathname"></div>
            </div>
            <div class="part-card" data-part="search">
              <div class="part-header">
                <span class="part-name">查询字符串 (search)</span>
                <button class="part-copy" onclick="copyPart('search')">复制</button>
              </div>
              <div class="part-value" id="partSearch"></div>
            </div>
            <div class="part-card" data-part="hash">
              <div class="part-header">
                <span class="part-name">哈希 (hash)</span>
                <button class="part-copy" onclick="copyPart('hash')">复制</button>
              </div>
              <div class="part-value" id="partHash"></div>
            </div>
            <div class="part-card" data-part="username">
              <div class="part-header">
                <span class="part-name">用户名 (username)</span>
                <button class="part-copy" onclick="copyPart('username')">复制</button>
              </div>
              <div class="part-value" id="partUsername"></div>
            </div>
            <div class="part-card" data-part="password">
              <div class="part-header">
                <span class="part-name">密码 (password)</span>
                <button class="part-copy" onclick="copyPart('password')">复制</button>
              </div>
              <div class="part-value" id="partPassword"></div>
            </div>
          </div>

          <div class="params-section" id="paramsSection" style="display: none">
            <h3>查询参数</h3>
            <table class="params-table">
              <thead>
                <tr>
                  <th style="width: 30%">参数名</th>
                  <th style="width: 35%">原始值</th>
                  <th style="width: 35%">解码值</th>
                </tr>
              </thead>
              <tbody id="paramsBody"></tbody>
            </table>
          </div>
        </div>

        <div id="buildTab" style="display: none">
          <div class="builder-section">
            <h3>URL 构建器</h3>
            <div class="builder-grid">
              <div>
                <label>协议</label>
                <input type="text" id="buildProtocol" placeholder="https" oninput="buildUrl()" />
              </div>
              <div>
                <label>用户名</label>
                <input type="text" id="buildUsername" placeholder="user" oninput="buildUrl()" />
              </div>
              <div>
                <label>密码</label>
                <input type="text" id="buildPassword" placeholder="pass" oninput="buildUrl()" />
              </div>
              <div>
                <label>主机名</label>
                <input
                  type="text"
                  id="buildHostname"
                  placeholder="example.com"
                  oninput="buildUrl()"
                />
              </div>
              <div>
                <label>端口</label>
                <input type="text" id="buildPort" placeholder="8080" oninput="buildUrl()" />
              </div>
              <div>
                <label>路径</label>
                <input
                  type="text"
                  id="buildPathname"
                  placeholder="/path/to/page"
                  oninput="buildUrl()"
                />
              </div>
              <div style="grid-column: 1 / -1">
                <label>查询参数 (key=value，每行一个)</label>
                <textarea
                  id="buildParams"
                  rows="3"
                  placeholder="name=value&#10;foo=bar"
                  oninput="buildUrl()"
                ></textarea>
              </div>
              <div>
                <label>哈希</label>
                <input type="text" id="buildHash" placeholder="section" oninput="buildUrl()" />
              </div>
            </div>
            <div class="result-url" id="builtUrl"></div>
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem">
              <button onclick="copyBuiltUrl()">复制 URL</button>
              <button onclick="useBuiltUrl()" class="secondary">使用此 URL</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const examples = [
        "https://www.example.com/path/to/page",
        "https://api.example.com/v1/users?page=1&limit=10&sort=name",
        "https://user:password@secure.example.com:8443/admin",
        "https://search.example.com/results?q=%E4%B8%AD%E6%96%87&category=all&tags[]=js&tags[]=html#top",
        "http://[2001:db8::1]:8080/ipv6/test?enabled=true"
      ];

      let currentUrl = null;

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      (function () {
        const savedTheme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      window.setExample = function (index) {
        document.getElementById("urlInput").value = examples[index];
        parseUrl();
      };

      window.clearAll = function () {
        document.getElementById("urlInput").value = "";
        document.getElementById("result").style.display = "none";
        currentUrl = null;
      };

      function parseUrl() {
        const input = document.getElementById("urlInput").value.trim();
        if (!input) {
          showToast("请输入 URL", "error");
          return;
        }

        try {
          currentUrl = new URL(input);
          displayResult();
          document.getElementById("result").style.display = "block";
        } catch (e) {
          showToast("无效的 URL 格式", "error");
        }
      }

      function displayResult() {
        if (!currentUrl) return;

        // Structure visual
        let structure = "";
        structure += `<span class="protocol">${currentUrl.protocol.replace(":", "")}</span>`;
        structure += '<span class="sep">://</span>';
        if (currentUrl.username) {
          structure += `<span class="protocol">${currentUrl.username}</span>`;
          if (currentUrl.password) {
            structure += `<span class="sep">:</span><span class="protocol">${currentUrl.password}</span>`;
          }
          structure += '<span class="sep">@</span>';
        }
        structure += `<span class="host">${currentUrl.hostname}</span>`;
        if (currentUrl.port) {
          structure += `<span class="sep">:</span><span class="port">${currentUrl.port}</span>`;
        }
        if (currentUrl.pathname !== "/") {
          structure += `<span class="path">${currentUrl.pathname}</span>`;
        }
        if (currentUrl.search) {
          structure += `<span class="query">${currentUrl.search}</span>`;
        }
        if (currentUrl.hash) {
          structure += `<span class="hash">${currentUrl.hash}</span>`;
        }
        document.getElementById("structureVisual").innerHTML = structure;

        // Parts
        const parts = [
          "href",
          "protocol",
          "host",
          "hostname",
          "port",
          "origin",
          "pathname",
          "search",
          "hash",
          "username",
          "password"
        ];
        parts.forEach((part) => {
          const elem = document.getElementById(
            "part" + part.charAt(0).toUpperCase() + part.slice(1)
          );
          const value = currentUrl[part] || "";
          elem.textContent = value || "(空)";
          elem.className = value ? "part-value" : "part-value empty";
          elem.closest(".part-card").classList.toggle("highlight", !!value && value !== "/");
        });

        // Query params
        const params = currentUrl.searchParams;
        const paramsBody = document.getElementById("paramsBody");
        paramsBody.innerHTML = "";

        if ([...params].length > 0) {
          document.getElementById("paramsSection").style.display = "block";
          params.forEach((value, key) => {
            const tr = document.createElement("tr");
            const decoded = decodeURIComponent(value);
            tr.innerHTML = `
                        <td class="key">${escapeHtml(key)}</td>
                        <td class="value">${escapeHtml(value)}</td>
                        <td class="decoded">${value !== decoded ? escapeHtml(decoded) : "-"}</td>
                    `;
            paramsBody.appendChild(tr);
          });
        } else {
          document.getElementById("paramsSection").style.display = "none";
        }

        // Fill builder
        document.getElementById("buildProtocol").value = currentUrl.protocol.replace(":", "");
        document.getElementById("buildUsername").value = currentUrl.username;
        document.getElementById("buildPassword").value = currentUrl.password;
        document.getElementById("buildHostname").value = currentUrl.hostname;
        document.getElementById("buildPort").value = currentUrl.port;
        document.getElementById("buildPathname").value = currentUrl.pathname;
        document.getElementById("buildHash").value = currentUrl.hash.replace("#", "");

        const paramsArr = [];
        params.forEach((value, key) => paramsArr.push(`${key}=${value}`));
        document.getElementById("buildParams").value = paramsArr.join("\n");

        buildUrl();
      }

      window.switchTab = function (tab) {
        document.querySelectorAll(".tabs button").forEach((btn) => btn.classList.remove("active"));
        document
          .querySelector(`.tabs button[onclick="switchTab('${tab}')"]`)
          .classList.add("active");
        document.getElementById("parseTab").style.display = tab === "parse" ? "block" : "none";
        document.getElementById("buildTab").style.display = tab === "build" ? "block" : "none";
      };

      function buildUrl() {
        const protocol = document.getElementById("buildProtocol").value || "https";
        const username = document.getElementById("buildUsername").value;
        const password = document.getElementById("buildPassword").value;
        const hostname = document.getElementById("buildHostname").value || "example.com";
        const port = document.getElementById("buildPort").value;
        const pathname = document.getElementById("buildPathname").value || "/";
        const paramsText = document.getElementById("buildParams").value;
        const hash = document.getElementById("buildHash").value;

        let url = `${protocol}://`;
        if (username) {
          url += username;
          if (password) url += `:${password}`;
          url += "@";
        }
        url += hostname;
        if (port) url += `:${port}`;
        url += pathname.startsWith("/") ? pathname : `/${pathname}`;

        if (paramsText.trim()) {
          const params = paramsText
            .split("\n")
            .map((line) => line.trim())
            .filter((line) => line.includes("="))
            .join("&");
          if (params) url += `?${params}`;
        }

        if (hash) url += `#${hash}`;

        document.getElementById("builtUrl").textContent = url;
      }

      window.copyBuiltUrl = function () {
        const url = document.getElementById("builtUrl").textContent;
        navigator.clipboard.writeText(url);
        showToast("URL 已复制");
      };

      window.useBuiltUrl = function () {
        document.getElementById("urlInput").value = document.getElementById("builtUrl").textContent;
        switchTab("parse");
        parseUrl();
      };

      window.copyPart = function (part) {
        const elem = document.getElementById("part" + part.charAt(0).toUpperCase() + part.slice(1));
        const value = elem.textContent;
        if (value && value !== "(空)") {
          navigator.clipboard.writeText(value);
          showToast("已复制");
        }
      };

      window.escapeHtml = function (text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      };

      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.background = type === "error" ? "#ef4444" : "#10b981";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Auto parse on input
      document.getElementById("urlInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") parseUrl();
      });

      // Init with example
      setExample(1);
    </script>
  </body>
</html>

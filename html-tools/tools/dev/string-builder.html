  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      字符串拼接器
    </nav>
    <div class="container">
      <header>
        <h1>🔗 字符串拼接器</h1>
        <button id="themeToggle" class="outline">🌙</button>
      </header>
      <div class="main-grid">
        <div class="panel">
          <h3>
            字符串片段
            <span class="count" id="partCount">0 个</span>
          </h3>
          <div class="presets">
            <button onclick="addPreset('prefix')">前缀</button>
            <button onclick="addPreset('suffix')">后缀</button>
            <button onclick="addPreset('quote')">引号包裹</button>
            <button onclick="addPreset('bracket')">括号包裹</button>
            <button onclick="addPreset('newline')">换行符</button>
            <button onclick="addPreset('tab')">制表符</button>
          </div>
          <div class="parts-list" id="partsList"></div>
          <div class="add-part">
            <input type="text" id="newPartInput" placeholder="输入新片段..." />
            <button onclick="addPart()" class="primary">添加</button>
          </div>
        </div>
        <div class="panel">
          <h3>输出结果</h3>
          <div class="settings">
            <label>
              分隔符：
              <input type="text" id="delimiter" value="" style="width: 60px" placeholder="无" />
            </label>
            <label>
              每行个数：
              <input type="number" id="perLine" value="0" min="0" style="width: 60px" />
            </label>
            <label>
              <input type="checkbox" id="addQuotes" />
              引号包裹
            </label>
          </div>
          <div class="output-area" id="outputArea"></div>
          <div class="actions">
            <button onclick="copyOutput()" class="primary">复制结果</button>
            <button onclick="clearAll()" class="secondary">清空全部</button>
            <button onclick="downloadOutput()" class="outline">下载</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      let parts = [];
      const $ = (id) => document.getElementById(id);
      function render() {
        $("partCount").textContent = parts.length + " 个";
        $("partsList").innerHTML = parts
          .map(
            (p, i) =>
              '<div class="part-item" draggable="true" data-index="' +
              i +
              '">' +
              '<span class="drag-handle">☰</span>' +
              '<input type="text" value="' +
              escapeHtml(p) +
              '" onchange="updatePart(' +
              i +
              ', this.value)">' +
              '<button class="remove-btn" onclick="removePart(' +
              i +
              ')">×</button>' +
              "</div>"
          )
          .join("");
        updateOutput();
        setupDragDrop();
      }
      function updateOutput() {
        const delimiter = $("delimiter").value;
        const perLine = parseInt($("perLine").value) || 0;
        const addQuotes = $("addQuotes").checked;
        let result = parts.map((p) => (addQuotes ? '"' + p + '"' : p));
        if (perLine > 0) {
          const lines = [];
          for (let i = 0; i < result.length; i += perLine) {
            lines.push(result.slice(i, i + perLine).join(delimiter));
          }
          $("outputArea").textContent = lines.join("\n");
        } else {
          $("outputArea").textContent = result.join(delimiter);
        }
      }
      function addPart(value) {
        const v = value || $("newPartInput").value.trim();
        if (v) {
          parts.push(v);
          $("newPartInput").value = "";
          render();
        }
      }
      window.updatePart = function (i, v) {
        parts[i] = v;
        updateOutput();
      };
      window.removePart = function (i) {
        parts.splice(i, 1);
        render();
      };
      window.addPreset = function (type) {
        switch (type) {
          case "prefix":
            parts.unshift("PREFIX_");
            break;
          case "suffix":
            parts.push("_SUFFIX");
            break;
          case "quote":
            parts.unshift('"');
            parts.push('"');
            break;
          case "bracket":
            parts.unshift("(");
            parts.push(")");
            break;
          case "newline":
            parts.push("\\n");
            break;
          case "tab":
            parts.push("\\t");
            break;
        }
        render();
      };
      window.copyOutput = function () {
        navigator.clipboard.writeText($("outputArea").textContent);
        alert("已复制");
      };
      window.clearAll = function () {
        if (confirm("确定清空?")) {
          parts = [];
          render();
        }
      };
      window.downloadOutput = function () {
        const blob = new Blob([$("outputArea").textContent], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "string-output.txt";
        a.click();
      };
      function setupDragDrop() {
        const items = document.querySelectorAll(".part-item");
        items.forEach((item) => {
          item.ondragstart = (e) => {
            e.dataTransfer.setData("text/plain", item.dataset.index);
            item.style.opacity = "0.5";
          };
          item.ondragend = () => {
            item.style.opacity = "1";
          };
          item.ondragover = (e) => e.preventDefault();
          item.ondrop = (e) => {
            e.preventDefault();
            const from = parseInt(e.dataTransfer.getData("text/plain"));
            const to = parseInt(item.dataset.index);
            if (from !== to) {
              const [moved] = parts.splice(from, 1);
              parts.splice(to, 0, moved);
              render();
            }
          };
        });
      }
      window.escapeHtml = function (t) {
        return t
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      };
      $("delimiter").oninput = updateOutput;
      $("perLine").oninput = updateOutput;
      $("addQuotes").onchange = updateOutput;
      $("newPartInput").onkeypress = (e) => {
        if (e.key === "Enter") addPart();
      };
      function loadTheme() {
        const t = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
        $("themeToggle").textContent = t === "dark" ? "☀️" : "🌙";
      }
      window.toggleTheme = function () {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
        $("themeToggle").textContent = n === "dark" ? "☀️" : "🌙";
      };
      $("themeToggle").onclick = toggleTheme;
      loadTheme();
      render();
    </script>
  </body>
</html>

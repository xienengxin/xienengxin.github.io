    <div class="container">
      <header>
        <h1>🎭 CSS 滤镜生成器</h1>
        <div class="header-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓">🌓</button>
        </div>
      </header>

      <div class="main-layout">
        <div class="controls-panel">
          <h3>
            滤镜控制
            <button class="reset-btn secondary outline" onclick="resetAll()" aria-label="重置">
              重置
            </button>
          </h3>

          <div class="control-group">
            <label>
              模糊 (blur)
              <span id="blurValue">0px</span>
            </label>
            <input
              type="range"
              id="blur"
              min="0"
              max="20"
              value="0"
              step="0.5"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              亮度 (brightness)
              <span id="brightnessValue">100%</span>
            </label>
            <input
              type="range"
              id="brightness"
              min="0"
              max="200"
              value="100"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              对比度 (contrast)
              <span id="contrastValue">100%</span>
            </label>
            <input
              type="range"
              id="contrast"
              min="0"
              max="200"
              value="100"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              灰度 (grayscale)
              <span id="grayscaleValue">0%</span>
            </label>
            <input
              type="range"
              id="grayscale"
              min="0"
              max="100"
              value="0"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              色相旋转 (hue-rotate)
              <span id="hueRotateValue">0deg</span>
            </label>
            <input
              type="range"
              id="hueRotate"
              min="0"
              max="360"
              value="0"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              反色 (invert)
              <span id="invertValue">0%</span>
            </label>
            <input type="range" id="invert" min="0" max="100" value="0" oninput="updateFilter()" />
          </div>

          <div class="control-group">
            <label>
              透明度 (opacity)
              <span id="opacityValue">100%</span>
            </label>
            <input
              type="range"
              id="opacity"
              min="0"
              max="100"
              value="100"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              饱和度 (saturate)
              <span id="saturateValue">100%</span>
            </label>
            <input
              type="range"
              id="saturate"
              min="0"
              max="200"
              value="100"
              oninput="updateFilter()"
            />
          </div>

          <div class="control-group">
            <label>
              褐色 (sepia)
              <span id="sepiaValue">0%</span>
            </label>
            <input type="range" id="sepia" min="0" max="100" value="0" oninput="updateFilter()" />
          </div>

          <div class="control-group">
            <label>阴影 (drop-shadow)</label>
            <div class="control-row">
              <input
                type="range"
                id="shadowX"
                min="-20"
                max="20"
                value="0"
                oninput="updateFilter()"
                title="X偏移"
                style="flex: 1"
              />
              <input
                type="range"
                id="shadowY"
                min="-20"
                max="20"
                value="0"
                oninput="updateFilter()"
                title="Y偏移"
                style="flex: 1"
              />
              <input
                type="range"
                id="shadowBlur"
                min="0"
                max="20"
                value="0"
                oninput="updateFilter()"
                title="模糊"
                style="flex: 1"
              />
              <input
                type="color"
                id="shadowColor"
                value="#000000"
                oninput="updateFilter()"
                aria-label="颜色选择器"
              />
            </div>
          </div>

          <div class="presets-section">
            <h3>预设效果</h3>
            <div class="presets-grid">
              <button class="preset-btn" onclick="applyPreset('vintage')" aria-label="复古">
                复古
              </button>
              <button class="preset-btn" onclick="applyPreset('noir')" aria-label="黑白">
                黑白
              </button>
              <button class="preset-btn" onclick="applyPreset('warm')" aria-label="暖色">
                暖色
              </button>
              <button class="preset-btn" onclick="applyPreset('cold')" aria-label="冷色">
                冷色
              </button>
              <button class="preset-btn" onclick="applyPreset('dramatic')" aria-label="戏剧">
                戏剧
              </button>
              <button class="preset-btn" onclick="applyPreset('fade')" aria-label="褪色">
                褪色
              </button>
              <button class="preset-btn" onclick="applyPreset('vivid')" aria-label="鲜艳">
                鲜艳
              </button>
              <button class="preset-btn" onclick="applyPreset('dreamy')" aria-label="梦幻">
                梦幻
              </button>
            </div>
          </div>
        </div>

        <div class="preview-panel">
          <div class="preview-tabs">
            <button class="active" onclick="setPreviewType('image')" aria-label="图片">图片</button>
            <button onclick="setPreviewType('text')" aria-label="文字">文字</button>
            <button onclick="setPreviewType('box')" aria-label="元素">元素</button>
            <span style="margin-left: auto"></span>
            <button onclick="setBg('checker')" aria-label="棋盘">棋盘</button>
            <button onclick="setBg('light-bg')" aria-label="浅色">浅色</button>
            <button onclick="setBg('dark-bg')" aria-label="深色">深色</button>
          </div>

          <div class="preview-container checker" id="previewContainer">
            <img
              id="previewImage"
              class="preview-image"
              src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600"
              alt="Preview"
            />
            <div id="previewText" class="preview-text" style="display: none">示例文字</div>
            <div id="previewBox" class="preview-box" style="display: none"></div>
          </div>

          <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)" />
            <p>📷 点击上传自定义图片，或拖拽图片到此处</p>
          </div>

          <div class="comparison">
            <div class="comparison-item">
              <div class="label">原图</div>
              <div class="preview">
                <img
                  id="originalImage"
                  src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600"
                  alt="Original"
                />
              </div>
            </div>
            <div class="comparison-item">
              <div class="label">效果</div>
              <div class="preview">
                <img
                  id="filteredImage"
                  src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600"
                  alt="Filtered"
                />
              </div>
            </div>
          </div>

          <div class="code-output">
            <h3>
              CSS 代码
              <button class="copy-btn" onclick="copyCode()" aria-label="复制">复制</button>
            </h3>
            <pre id="codeOutput">filter: none;</pre>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const presets = {
        vintage: {
          blur: 0,
          brightness: 110,
          contrast: 85,
          grayscale: 20,
          hueRotate: 0,
          invert: 0,
          opacity: 100,
          saturate: 80,
          sepia: 30
        },
        noir: {
          blur: 0,
          brightness: 100,
          contrast: 120,
          grayscale: 100,
          hueRotate: 0,
          invert: 0,
          opacity: 100,
          saturate: 0,
          sepia: 0
        },
        warm: {
          blur: 0,
          brightness: 105,
          contrast: 100,
          grayscale: 0,
          hueRotate: 20,
          invert: 0,
          opacity: 100,
          saturate: 120,
          sepia: 20
        },
        cold: {
          blur: 0,
          brightness: 100,
          contrast: 100,
          grayscale: 0,
          hueRotate: 180,
          invert: 0,
          opacity: 100,
          saturate: 80,
          sepia: 0
        },
        dramatic: {
          blur: 0,
          brightness: 90,
          contrast: 150,
          grayscale: 0,
          hueRotate: 0,
          invert: 0,
          opacity: 100,
          saturate: 130,
          sepia: 0
        },
        fade: {
          blur: 0,
          brightness: 120,
          contrast: 80,
          grayscale: 0,
          hueRotate: 0,
          invert: 0,
          opacity: 90,
          saturate: 70,
          sepia: 10
        },
        vivid: {
          blur: 0,
          brightness: 110,
          contrast: 120,
          grayscale: 0,
          hueRotate: 0,
          invert: 0,
          opacity: 100,
          saturate: 180,
          sepia: 0
        },
        dreamy: {
          blur: 2,
          brightness: 110,
          contrast: 90,
          grayscale: 0,
          hueRotate: 0,
          invert: 0,
          opacity: 100,
          saturate: 90,
          sepia: 15
        }
      };

      const defaults = {
        blur: 0,
        brightness: 100,
        contrast: 100,
        grayscale: 0,
        hueRotate: 0,
        invert: 0,
        opacity: 100,
        saturate: 100,
        sepia: 0,
        shadowX: 0,
        shadowY: 0,
        shadowBlur: 0,
        shadowColor: "#000000"
      };

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      (function () {
        const savedTheme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      function updateFilter() {
        const blur = document.getElementById("blur").value;
        const brightness = document.getElementById("brightness").value;
        const contrast = document.getElementById("contrast").value;
        const grayscale = document.getElementById("grayscale").value;
        const hueRotate = document.getElementById("hueRotate").value;
        const invert = document.getElementById("invert").value;
        const opacity = document.getElementById("opacity").value;
        const saturate = document.getElementById("saturate").value;
        const sepia = document.getElementById("sepia").value;
        const shadowX = document.getElementById("shadowX").value;
        const shadowY = document.getElementById("shadowY").value;
        const shadowBlur = document.getElementById("shadowBlur").value;
        const shadowColor = document.getElementById("shadowColor").value;

        // Update labels
        document.getElementById("blurValue").textContent = blur + "px";
        document.getElementById("brightnessValue").textContent = brightness + "%";
        document.getElementById("contrastValue").textContent = contrast + "%";
        document.getElementById("grayscaleValue").textContent = grayscale + "%";
        document.getElementById("hueRotateValue").textContent = hueRotate + "deg";
        document.getElementById("invertValue").textContent = invert + "%";
        document.getElementById("opacityValue").textContent = opacity + "%";
        document.getElementById("saturateValue").textContent = saturate + "%";
        document.getElementById("sepiaValue").textContent = sepia + "%";

        // Build filter string
        const filters = [];
        if (blur != 0) filters.push(`blur(${blur}px)`);
        if (brightness != 100) filters.push(`brightness(${brightness}%)`);
        if (contrast != 100) filters.push(`contrast(${contrast}%)`);
        if (grayscale != 0) filters.push(`grayscale(${grayscale}%)`);
        if (hueRotate != 0) filters.push(`hue-rotate(${hueRotate}deg)`);
        if (invert != 0) filters.push(`invert(${invert}%)`);
        if (opacity != 100) filters.push(`opacity(${opacity}%)`);
        if (saturate != 100) filters.push(`saturate(${saturate}%)`);
        if (sepia != 0) filters.push(`sepia(${sepia}%)`);
        if (shadowX != 0 || shadowY != 0 || shadowBlur != 0) {
          filters.push(`drop-shadow(${shadowX}px ${shadowY}px ${shadowBlur}px ${shadowColor})`);
        }

        const filterValue = filters.length > 0 ? filters.join(" ") : "none";

        // Apply to preview elements
        document.getElementById("previewImage").style.filter = filterValue;
        document.getElementById("previewText").style.filter = filterValue;
        document.getElementById("previewBox").style.filter = filterValue;
        document.getElementById("filteredImage").style.filter = filterValue;

        // Update code output
        document.getElementById("codeOutput").textContent = `filter: ${filterValue};`;
      }

      window.resetAll = function () {
        Object.keys(defaults).forEach((key) => {
          const el = document.getElementById(key);
          if (el) el.value = defaults[key];
        });
        updateFilter();
      };

      window.applyPreset = function (name) {
        const preset = presets[name];
        Object.keys(preset).forEach((key) => {
          const el = document.getElementById(key);
          if (el) el.value = preset[key];
        });
        // Reset shadow
        document.getElementById("shadowX").value = 0;
        document.getElementById("shadowY").value = 0;
        document.getElementById("shadowBlur").value = 0;
        updateFilter();
      };

      function setPreviewType(type) {
        document.getElementById("previewImage").style.display = type === "image" ? "block" : "none";
        document.getElementById("previewText").style.display = type === "text" ? "block" : "none";
        document.getElementById("previewBox").style.display = type === "box" ? "block" : "none";

        document
          .querySelectorAll(".preview-tabs button")
          .forEach((btn) => btn.classList.remove("active"));
        document
          .querySelector(`.preview-tabs button[onclick="setPreviewType('${type}')"]`)
          .classList.add("active");
      }

      window.setBg = function (className) {
        const container = document.getElementById("previewContainer");
        container.className = "preview-container " + className;
      };

      function handleUpload(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            const src = e.target.result;
            document.getElementById("previewImage").src = src;
            document.getElementById("originalImage").src = src;
            document.getElementById("filteredImage").src = src;
            setPreviewType("image");
          };
          reader.readAsDataURL(file);
        }
      }

      window.copyCode = function () {
        const code = document.getElementById("codeOutput").textContent;
        navigator.clipboard.writeText(code);
        showToast("已复制到剪贴板");
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Drag and drop
      const uploadZone = document.querySelector(".upload-zone");
      uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.style.borderColor = "var(--primary-color)";
      });
      uploadZone.addEventListener("dragleave", () => {
        uploadZone.style.borderColor = "";
      });
      uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.style.borderColor = "";
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          document.getElementById("fileInput").files = e.dataTransfer.files;
          handleUpload({ target: { files: [file] } });
        }
      });

      // Init
      updateFilter();
    </script>
  </body>
</html>

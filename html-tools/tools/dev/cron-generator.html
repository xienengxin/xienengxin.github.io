  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">

    <div class="container">
      <h1>⏰ Cron生成器</h1>
      <div class="cron-display" id="cron">* * * * *</div>
      <div class="fields">
        <div class="field">
          <label for="input---">分钟</label>
          <input
            type="text"
            id="minute"
            value="*"
            oninput="updateCron()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
        <div class="field">
          <label for="input---">小时</label>
          <input
            type="text"
            id="hour"
            value="*"
            oninput="updateCron()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
        <div class="field">
          <label for="input--">日</label>
          <input
            type="text"
            id="day"
            value="*"
            oninput="updateCron()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
        <div class="field">
          <label for="input--">月</label>
          <input
            type="text"
            id="month"
            value="*"
            oninput="updateCron()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
        <div class="field">
          <label for="input---">星期</label>
          <input
            type="text"
            id="weekday"
            value="*"
            oninput="updateCron()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
      </div>
      <div class="presets">
        <button class="preset" onclick="setPreset('* * * * *')" aria-label="每分钟">每分钟</button>
        <button class="preset" onclick="setPreset('0 * * * *')" aria-label="每小时">每小时</button>
        <button class="preset" onclick="setPreset('0 0 * * *')" aria-label="每天午夜">
          每天午夜
        </button>
        <button class="preset" onclick="setPreset('0 0 * * 0')" aria-label="每周日">每周日</button>
        <button class="preset" onclick="setPreset('0 0 1 * *')" aria-label="每月1号">
          每月1号
        </button>
        <button class="preset" onclick="setPreset('*/5 * * * *')" aria-label="每5分钟">
          每5分钟
        </button>
        <button class="preset" onclick="setPreset('0 */2 * * *')" aria-label="每2小时">
          每2小时
        </button>
        <button class="preset" onclick="setPreset('0 9-17 * * 1-5')" aria-label="工作时间">
          工作时间
        </button>
      </div>
      <div class="description" id="desc">每分钟执行一次</div>
    </div>
    <script>
      function updateCron() {
        const cron = ["minute", "hour", "day", "month", "weekday"]
          .map((id) => document.getElementById(id).value || "*")
          .join(" ");
        document.getElementById("cron").textContent = cron;
        describeCron(cron);
      }
      function setPreset(cron) {
        const parts = cron.split(" ");
        ["minute", "hour", "day", "month", "weekday"].forEach(
          (id, i) => (document.getElementById(id).value = parts[i])
        );
        document.getElementById("cron").textContent = cron;
        describeCron(cron);
      }
      function describeCron(cron) {
        const descs = {
          "* * * * *": "每分钟执行",
          "0 * * * *": "每小时整点执行",
          "0 0 * * *": "每天午夜执行",
          "0 0 * * 0": "每周日午夜执行",
          "0 0 1 * *": "每月1号午夜执行",
          "*/5 * * * *": "每5分钟执行",
          "0 */2 * * *": "每2小时执行",
          "0 9-17 * * 1-5": "工作日9点到17点每小时执行"
        };
        document.getElementById("desc").textContent = descs[cron] || "自定义计划";
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>

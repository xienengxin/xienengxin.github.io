        border-radius: 0.5rem;
        color: white;
        cursor: pointer;
      }

      }
      .container {
        max-width: 1600px;
        margin: 0 auto;

      }
      .endpoint-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .endpoint-bar input {
        flex: 1;
        min-width: 300px;
        padding: 0.75rem 1rem;
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: 0.5rem;
        color: var(--color-text-primary);
        font-size: 0.95rem;
      }
      .btn {
        padding: 0.75rem 1.5rem;
        background: var(--accent-cyan);
        color: white;
        border: none;
        border-radius: 0.5rem;

        font-size: 0.95rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;

      .btn:hover {
        opacity: 0.9;
      }
      .btn-secondary {
        background: var(--bg-tertiary);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }
      .playground {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        height: calc(100vh - 220px);
        min-height: 500px;
      }
      .panel {
        background: var(--bg-secondary);
        border-radius: 0.75rem;
        border: 1px solid var(--border-subtle);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-tertiary);
      }
      .panel-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-secondary);
      }
      .panel-tabs {
        display: flex;
        gap: 0.5rem;
      }
      .panel-tab {
        padding: 0.25rem 0.75rem;
        background: transparent;
        border: none;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 0.8rem;
        border-radius: 0.25rem;
      }
      .panel-tab.active {
        background: var(--accent-cyan);
        color: white;
      }
      .panel-content {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      textarea {
        width: 100%;
        height: 100%;
        padding: 1rem;
        background: transparent;
        border: none;
        color: var(--color-text-primary);
        font-family: Monaco, Menlo, Consolas, monospace;
        font-size: 0.9rem;
        resize: none;
        line-height: 1.5;
      }
      textarea:focus {
        outline: none;
      }
      .result-view {
        width: 100%;
        height: 100%;
        padding: 1rem;
        overflow: auto;
        font-family: Monaco, Menlo, Consolas, monospace;
        font-size: 0.9rem;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }
      .result-success {
        color: var(--accent-green);
      }
      .result-error {
        color: #ef4444;
      }

        border-top: 1px solid var(--border-subtle);

      }
      .variables-header {
        padding: 0.5rem 1rem;
        background: var(--bg-tertiary);

        height: 100%;
      }
      .history {
        background: var(--bg-secondary);
        border-radius: 0.75rem;
        border: 1px solid var(--border-subtle);
        margin-top: 1rem;
        max-height: 200px;
        overflow: hidden;
      }
      .history-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        background: var(--bg-tertiary);
      }
      .history-list {
        max-height: 150px;
        overflow-y: auto;
      }
      .history-item {
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--border-subtle);
        cursor: pointer;
        font-size: 0.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .history-item:hover {
        background: var(--bg-tertiary);
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .history-query {
        font-family: var(--font-mono);
        color: var(--color-text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 70%;
      }
      .history-time {
        color: var(--color-text-secondary);
        font-size: 0.75rem;
      }
      .status-bar {
        display: flex;
        gap: 1rem;
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        margin-top: 0.5rem;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

        color: var(--color-text-secondary);

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      GraphQL Playground
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()">🌓 主题</button>
      </div>
      <div class="header-content">
        <h1>⬡ GraphQL Playground</h1>
      </div>
    </div>

    <div class="container">
      <div class="endpoint-bar">
        <input
          type="text"
          id="endpointUrl"
          placeholder="GraphQL Endpoint URL (例如: https://api.example.com/graphql)"
          value=""
        />
        <button class="btn" onclick="executeQuery()">▶ 执行</button>
        <button class="btn btn-secondary" onclick="loadExample()">示例查询</button>
        <button class="btn btn-secondary" onclick="fetchSchema()">获取Schema</button>
      </div>

      <div class="playground">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">查询</span>
            <div class="panel-tabs">
              <button class="panel-tab active" onclick="switchTab('query')">Query</button>
              <button class="panel-tab" onclick="switchTab('mutation')">Mutation</button>
              <button class="panel-tab" onclick="switchTab('subscription')">Subscription</button>
            </div>
          </div>
          <div class="panel-content">
            <textarea id="queryEditor" placeholder="输入GraphQL查询..."></textarea>
            <button class="prettify-btn" onclick="prettifyQuery()">格式化</button>
          </div>
          <div class="variables-section">
            <div class="variables-header" onclick="toggleVariables()">
              <span>变量 (JSON)</span>
              <span id="varToggle">▼</span>
            </div>
            <div class="variables-content" id="variablesContent">
              <textarea id="variablesEditor" placeholder='{"key": "value"}'></textarea>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">响应</span>
            <div class="panel-tabs">
              <button class="panel-tab active" id="resultTab">结果</button>
              <button class="panel-tab" id="schemaTab" onclick="showSchema()">Schema</button>
            </div>
          </div>
          <div class="panel-content">
            <div class="result-view" id="resultView">
              <span style="color: var(--color-text-secondary)">执行查询后结果将显示在这里...</span>
            </div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-item" id="statusTime">响应时间: -</div>
        <div class="status-item" id="statusSize">响应大小: -</div>
      </div>

      <div class="history" id="historyPanel">
        <div class="history-header">查询历史</div>
        <div class="history-list" id="historyList">
          <div
            style="
              padding: 1rem;
              color: var(--color-text-secondary);
              text-align: center;
              font-size: 0.85rem;
            "
          >
            暂无历史记录
          </div>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      let queryHistory = JSON.parse(localStorage.getItem("graphql_history") || "[]");
      let currentSchema = null;

      window.loadExample = function () {
        document.getElementById("queryEditor").value = `# 示例GraphQL查询
query GetUsers($limit: Int) {
  users(limit: $limit) {
    id
    name
    email
    posts {
      id
      title
      createdAt
    }
  }
}

# 你也可以尝试mutation
# mutation CreateUser($input: CreateUserInput!) {
#   createUser(input: $input) {
#     id
#     name
#   }
# }`;
        document.getElementById("variablesEditor").value = JSON.stringify({ limit: 10 }, null, 2);
      };

      window.switchTab = function (type) {
        document
          .querySelectorAll(".panel-tabs .panel-tab")
          .forEach((t) => t.classList.remove("active"));
        event.target.classList.add("active");

        const templates = {
          query: "query {\n  \n}",
          mutation: "mutation {\n  \n}",
          subscription: "subscription {\n  \n}"
        };

        const editor = document.getElementById("queryEditor");
        if (!editor.value.trim()) {
          editor.value = templates[type];
        }
      };

      window.toggleVariables = function () {
        const content = document.getElementById("variablesContent");
        const toggle = document.getElementById("varToggle");
        if (content.style.display === "none") {
          content.style.display = "block";
          toggle.textContent = "▼";
        } else {
          content.style.display = "none";
          toggle.textContent = "▶";
        }
      };

      async function executeQuery() {
        const endpoint = document.getElementById("endpointUrl").value.trim();
        const query = document.getElementById("queryEditor").value.trim();
        const variablesStr = document.getElementById("variablesEditor").value.trim();

        if (!endpoint) {
          showResult({ error: "请输入GraphQL Endpoint URL" }, true);
          return;
        }

        if (!query) {
          showResult({ error: "请输入GraphQL查询" }, true);
          return;
        }

        let variables = null;
        if (variablesStr) {
          try {
            variables = JSON.parse(variablesStr);
          } catch (e) {
            showResult({ error: "变量JSON格式错误: " + e.message }, true);
            return;
          }
        }

        const startTime = performance.now();

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              query,
              variables
            })
          });

          const endTime = performance.now();
          const data = await response.json();
          const responseSize = JSON.stringify(data).length;

          document.getElementById("statusTime").textContent =
            `响应时间: ${Math.round(endTime - startTime)}ms`;
          document.getElementById("statusSize").textContent =
            `响应大小: ${formatBytes(responseSize)}`;

          showResult(data, !!data.errors);
          addToHistory(query, variables);
        } catch (e) {
          showResult({ error: "请求失败: " + e.message }, true);
        }
      }

      function showResult(data, isError = false) {
        const resultView = document.getElementById("resultView");
        resultView.className = "result-view " + (isError ? "result-error" : "result-success");
        resultView.textContent = JSON.stringify(data, null, 2);
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      function addToHistory(query, variables) {
        const item = {
          query: query.substring(0, 100),
          fullQuery: query,
          variables,
          time: new Date().toLocaleTimeString()
        };
        queryHistory.unshift(item);
        if (queryHistory.length > 20) queryHistory.pop();
        localStorage.setItem("graphql_history", JSON.stringify(queryHistory));
        renderHistory();
      }

      function renderHistory() {
        const list = document.getElementById("historyList");
        if (queryHistory.length === 0) {
          list.innerHTML =
            '<div style="padding: 1rem; color: var(--color-text-secondary); text-align: center; font-size: 0.85rem;">暂无历史记录</div>';
          return;
        }
        list.innerHTML = queryHistory
          .map(
            (item, i) => `
                <div class="history-item" onclick="loadHistory(${i})">
                    <span class="history-query">${escapeHtml(item.query)}</span>
                    <span class="history-time">${item.time}</span>
                </div>
            `
          )
          .join("");
      }

      window.loadHistory = function (index) {
        const item = queryHistory[index];
        document.getElementById("queryEditor").value = item.fullQuery;
        if (item.variables) {
          document.getElementById("variablesEditor").value = JSON.stringify(
            item.variables,
            null,
            2
          );
        }
      };

      window.escapeHtml = function (str) {
        return str.replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;"
            })[m]
        );
      };

      window.prettifyQuery = function () {
        const editor = document.getElementById("queryEditor");
        let query = editor.value;

        // Basic prettification
        query = query.replace(/\{/g, " {\n");
        query = query.replace(/\}/g, "\n}");
        query = query.replace(/,\s*/g, "\n");

        // Re-indent
        const lines = query.split("\n");
        let indent = 0;
        const formatted = lines
          .map((line) => {
            line = line.trim();
            if (!line) return "";
            if (line.startsWith("}")) indent--;
            const result = "  ".repeat(Math.max(0, indent)) + line;
            if (line.endsWith("{")) indent++;
            return result;
          })
          .filter((l) => l)
          .join("\n");

        editor.value = formatted;
      };

      window.fetchSchema = async function () {
        const endpoint = document.getElementById("endpointUrl").value.trim();
        if (!endpoint) {
          showResult({ error: "请输入GraphQL Endpoint URL" }, true);
          return;
        }

        const introspectionQuery = `
                query IntrospectionQuery {
                    __schema {
                        types {
                            name
                            kind
                            fields {
                                name
                                type {
                                    name
                                    kind
                                }
                            }
                        }
                    }
                }
            `;

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: introspectionQuery })
          });
          const data = await response.json();
          currentSchema = data;
          showResult(data, !!data.errors);
        } catch (e) {
          showResult({ error: "获取Schema失败: " + e.message }, true);
        }
      };

      window.showSchema = function () {
        if (currentSchema) {
          showResult(currentSchema, false);
        } else {
          showResult({ message: '请先点击"获取Schema"按钮' }, false);
        }
      };

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          executeQuery();
        }
      });

      renderHistory();
    </script>
  </body>
</html>

      // 状态
      const state = {
        selected: new Set(),
        category: "all",
        search: ""
      };

      // DOM
      const optionsList = document.getElementById("options-list");
      const selectedTags = document.getElementById("selected-tags");
      const outputEl = document.getElementById("output");
      const searchInput = document.getElementById("search");
      const categoryTabs = document.querySelectorAll(".category-tab");
      const copyBtn = document.getElementById("copy-btn");
      const downloadBtn = document.getElementById("download-btn");
      const clearBtn = document.getElementById("clear-btn");
      const messageEl = document.getElementById("message");

      // 渲染选项列表
      function renderOptions() {
        const filteredTemplates = Object.entries(templates).filter(([key, template]) => {
          const matchCategory = state.category === "all" || template.category === state.category;
          const matchSearch =
            state.search === "" ||
            template.name.toLowerCase().includes(state.search.toLowerCase()) ||
            key.toLowerCase().includes(state.search.toLowerCase());
          return matchCategory && matchSearch;
        });

        optionsList.innerHTML = filteredTemplates
          .map(
            ([key, template]) => `
        <label class="option-item ${state.selected.has(key) ? "selected" : ""}" data-key="${key}">
          <input type="checkbox" ${state.selected.has(key) ? "checked" : ""}>
          <span class="option-checkbox">✓</span>
          <span class="option-name">${template.name}</span>
        </label>
      `
          )
          .join("");

        // 绑定事件
        optionsList.querySelectorAll(".option-item").forEach((item) => {
          item.addEventListener("click", () => {
            const key = item.dataset.key;
            if (state.selected.has(key)) {
              state.selected.delete(key);
            } else {
              state.selected.add(key);
            }
            renderOptions();
            renderSelectedTags();
            renderOutput();
          });
        });
      }

      // 渲染已选标签
      function renderSelectedTags() {
        if (state.selected.size === 0) {
          selectedTags.innerHTML = '<span class="empty-hint">请在左侧选择语言或框架</span>';
          return;
        }

        selectedTags.innerHTML = Array.from(state.selected)
          .map(
            (key) => `
        <span class="selected-tag">
          ${templates[key].name}
          <span class="remove" data-key="${key}">×</span>
        </span>
      `
          )
          .join("");

        // 绑定删除事件
        selectedTags.querySelectorAll(".remove").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            state.selected.delete(btn.dataset.key);
            renderOptions();
            renderSelectedTags();
            renderOutput();
          });
        });
      }

      // 渲染输出
      function renderOutput() {
        if (state.selected.size === 0) {
          outputEl.innerHTML =
            '<span class="comment"># 选择语言或框架后，将自动生成 .gitignore 内容</span>';
          return;
        }

        const sections = Array.from(state.selected).map((key) => {
          const template = templates[key];
          return `# ========================================
# ${template.name}
# ========================================
${template.content}`;
        });

        outputEl.textContent = sections.join("\n\n");
      }

      // 复制
      window.copyOutput = async function () {
        const text = outputEl.textContent;
        try {
          await navigator.clipboard.writeText(text);
          showMessage("已复制到剪贴板", "success");
        } catch (err) {
          showMessage("复制失败", "error");
        }
      };

      // 下载
      window.downloadFile = function () {
        const text = outputEl.textContent;
        const blob = new Blob([text], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = ".gitignore";
        a.click();
        URL.revokeObjectURL(url);
        showMessage("文件已下载", "success");
      };

      // 清空
      function clearSelection() {
        state.selected.clear();
        renderOptions();
        renderSelectedTags();
        renderOutput();
      }

      // 显示消息
      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + type;
        setTimeout(() => {
          messageEl.className = "message";
        }, 3000);
      }

      // 事件
      searchInput.addEventListener("input", (e) => {
        state.search = e.target.value;
        renderOptions();
      });

      categoryTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          categoryTabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          state.category = tab.dataset.category;
          renderOptions();
        });
      });

      copyBtn.addEventListener("click", copyOutput);
      downloadBtn.addEventListener("click", downloadFile);
      clearBtn.addEventListener("click", clearSelection);

      // 初始化
      renderOptions();
      renderSelectedTags();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>

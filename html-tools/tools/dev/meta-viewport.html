        inset: 0;

        border-radius: 12px;

        content: "";

        width: 18px;
        left: 3px;

        border-radius: 50%;
        transition: 0.3s;
      }

    <div class="container">
      <div class="header">
        <a href="../../index.html" class="back-link">← 返回</a>
        <h1>📱 Viewport Meta 生成器</h1>
        <p>生成响应式网页的 viewport 标签</p>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓">🌓</button>
      </div>

      <div class="card">
        <div class="preset-buttons">
          <button class="preset-btn" onclick="applyPreset('responsive')" aria-label="📱 标准响应式">
            📱 标准响应式
          </button>
          <button class="preset-btn" onclick="applyPreset('fixed')" aria-label="🖥️ 固定宽度">
            🖥️ 固定宽度
          </button>
          <button class="preset-btn" onclick="applyPreset('nozoom')" aria-label="🔒 禁止缩放">
            🔒 禁止缩放
          </button>
          <button class="preset-btn" onclick="applyPreset('pwa')" aria-label="📲 PWA 推荐">
            📲 PWA 推荐
          </button>
        </div>

        <div class="options-grid">
          <div class="option-group">
            <h4>基本设置</h4>
            <div class="option-row">
              <label>宽度</label>
              <select id="width" onchange="generate()">
                <option value="device-width">device-width</option>
                <option value="custom">自定义</option>
              </select>
            </div>
            <div class="option-row" id="customWidthRow" style="display: none">
              <label for="input------">自定义宽度</label>
              <input
                type="number"
                id="customWidth"
                value="1024"
                onchange="generate()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="option-row">
              <label for="input-----">初始缩放</label>
              <input
                type="number"
                id="initialScale"
                value="1"
                min="0.1"
                max="10"
                step="0.1"
                onchange="generate()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>

          <div class="option-group">
            <h4>缩放限制</h4>
            <div class="option-row">
              <label for="input-----">最小缩放</label>
              <input
                type="number"
                id="minimumScale"
                value="1"
                min="0.1"
                max="10"
                step="0.1"
                onchange="generate()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="option-row">
              <label for="input-----">最大缩放</label>
              <input
                type="number"
                id="maximumScale"
                value="5"
                min="0.1"
                max="10"
                step="0.1"
                onchange="generate()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="option-row">
              <label>允许用户缩放</label>
              <label class="toggle">
                <input type="checkbox" id="userScalable" checked onchange="generate()" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="option-group">
            <h4>iOS 特定</h4>
            <div class="option-row">
              <label>视口适配</label>
              <select id="viewportFit" onchange="generate()">
                <option value="">默认</option>
                <option value="auto">auto</option>
                <option value="contain">contain</option>
                <option value="cover">cover</option>
              </select>
            </div>
          </div>

          <div class="option-group">
            <h4>其他选项</h4>
            <div class="option-row">
              <label>高度</label>
              <select id="height" onchange="generate()">
                <option value="">不设置</option>
                <option value="device-height">device-height</option>
              </select>
            </div>
          </div>
        </div>

        <div class="output-section">
          <h3>生成的代码</h3>
          <div class="code-output" id="output" onclick="copyCode()"></div>
        </div>

        <div class="info-box">
          💡
          <strong>提示：</strong>
          点击代码即可复制。标准响应式网站推荐使用
          <code>width=device-width, initial-scale=1.0</code>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
      window.toggleTheme = function () {
        const t =
          document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      document.getElementById("width").addEventListener("change", function () {
        document.getElementById("customWidthRow").style.display =
          this.value === "custom" ? "flex" : "none";
        generate();
      });

      window.applyPreset = function (preset) {
        const presets = {
          responsive: {
            width: "device-width",
            initialScale: 1,
            minimumScale: 1,
            maximumScale: 5,
            userScalable: true,
            viewportFit: "",
            height: ""
          },
          fixed: {
            width: "custom",
            customWidth: 1024,
            initialScale: 1,
            minimumScale: 1,
            maximumScale: 1,
            userScalable: false,
            viewportFit: "",
            height: ""
          },
          nozoom: {
            width: "device-width",
            initialScale: 1,
            minimumScale: 1,
            maximumScale: 1,
            userScalable: false,
            viewportFit: "",
            height: ""
          },
          pwa: {
            width: "device-width",
            initialScale: 1,
            minimumScale: 1,
            maximumScale: 5,
            userScalable: true,
            viewportFit: "cover",
            height: ""
          }
        };
        const p = presets[preset];
        document.getElementById("width").value = p.width;
        document.getElementById("customWidthRow").style.display =
          p.width === "custom" ? "flex" : "none";
        if (p.customWidth) document.getElementById("customWidth").value = p.customWidth;
        document.getElementById("initialScale").value = p.initialScale;
        document.getElementById("minimumScale").value = p.minimumScale;
        document.getElementById("maximumScale").value = p.maximumScale;
        document.getElementById("userScalable").checked = p.userScalable;
        document.getElementById("viewportFit").value = p.viewportFit;
        document.getElementById("height").value = p.height;
        generate();
      };

      window.generate = function () {
        const parts = [];
        const width = document.getElementById("width").value;
        if (width === "custom") {
          parts.push("width=" + document.getElementById("customWidth").value);
        } else {
          parts.push("width=" + width);
        }

        const height = document.getElementById("height").value;
        if (height) parts.push("height=" + height);

        parts.push("initial-scale=" + document.getElementById("initialScale").value);
        parts.push("minimum-scale=" + document.getElementById("minimumScale").value);
        parts.push("maximum-scale=" + document.getElementById("maximumScale").value);
        parts.push(
          "user-scalable=" + (document.getElementById("userScalable").checked ? "yes" : "no")
        );

        const viewportFit = document.getElementById("viewportFit").value;
        if (viewportFit) parts.push("viewport-fit=" + viewportFit);

        const meta = `<meta name="viewport" content="${parts.join(", ")}">`;
        document.getElementById("output").textContent = meta;
      };

      window.copyCode = function () {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      };

      generate();
    </script>
  </body>
</html>

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Excel 预览器
    </nav>
    <div class="container">
      <header>
        <div>
          <h1>Excel 预览器</h1>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
          <span class="theme-icon">🌙</span>
        </button>
      </header>

      <main>
        <div class="upload-section" id="uploadSection">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.ods" />
          <div class="upload-icon">📊</div>
          <p class="upload-text">
            拖拽文件到此处，或
            <strong>点击选择文件</strong>
          </p>
          <p class="upload-text" style="font-size: 0.85rem">支持 .xlsx, .xls, .csv, .ods 格式</p>
        </div>

        <div class="file-info" id="fileInfo">
          <div class="file-meta">
            <span class="file-icon">📗</span>
            <div>
              <div class="file-name" id="fileName">-</div>
              <div class="file-size" id="fileSize">-</div>
            </div>
          </div>
          <button
            onclick="clearFile()"
            style="
              background: var(--error-color);
              color: white;
              border: none;
              padding: 0.5rem 1rem;
              border-radius: 6px;
              cursor: pointer;
            "
          >
            清除文件
          </button>
        </div>

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="table-container" id="tableContainer" style="display: none">
          <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索内容..." oninput="searchTable()" />
            <button onclick="exportCSV()">导出 CSV</button>
            <button onclick="exportJSON()">导出 JSON</button>
            <button onclick="copyTable()">复制表格</button>
          </div>
          <div class="table-scroll" id="tableScroll">
            <table class="data-table" id="dataTable"></table>
          </div>
          <div class="stats" id="stats"></div>
        </div>
      </main>
    </div>

    <script>
      var workbook = null;
      var currentSheet = null;
      var currentData = [];

      window.toggleTheme = function () {
        var html = document.documentElement;
        var newTheme = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        document.querySelector(".theme-icon").textContent = newTheme === "light" ? "🌙" : "☀️";
      };
      (function () {
        var savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.querySelector(".theme-icon").textContent = savedTheme === "light" ? "🌙" : "☀️";
      })();

      var uploadSection = document.getElementById("uploadSection");
      var fileInput = document.getElementById("fileInput");

      uploadSection.addEventListener("click", function () {
        fileInput.click();
      });
      uploadSection.addEventListener("dragover", function (e) {
        e.preventDefault();
        uploadSection.classList.add("dragover");
      });
      uploadSection.addEventListener("dragleave", function () {
        uploadSection.classList.remove("dragover");
      });
      uploadSection.addEventListener("drop", function (e) {
        e.preventDefault();
        uploadSection.classList.remove("dragover");
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", function () {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
      });

      function handleFile(file) {
        var validTypes = [
          "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
          "application/vnd.ms-excel",
          "text/csv",
          "application/vnd.oasis.opendocument.spreadsheet"
        ];
        var validExts = [".xlsx", ".xls", ".csv", ".ods"];
        var ext = "." + file.name.split(".").pop().toLowerCase();

        if (!validExts.includes(ext)) {
          alert("不支持的文件格式");
          return;
        }

        document.getElementById("fileName").textContent = file.name;
        document.getElementById("fileSize").textContent = formatFileSize(file.size);
        document.getElementById("fileInfo").classList.add("show");

        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            workbook = XLSX.read(e.target.result, { type: "array", cellDates: true });
            renderSheetTabs();
            selectSheet(workbook.SheetNames[0]);
            document.getElementById("tableContainer").style.display = "block";
          } catch (err) {
            alert("文件解析失败: " + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      window.formatFileSize = function (bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      };

      function renderSheetTabs() {
        var tabs = document.getElementById("sheetTabs");
        tabs.innerHTML = "";
        workbook.SheetNames.forEach(function (name, idx) {
          var btn = document.createElement("button");
          btn.className = "sheet-tab" + (idx === 0 ? " active" : "");
          btn.textContent = name;
          btn.onclick = function () {
            selectSheet(name);
          };
          tabs.appendChild(btn);
        });
      }

      function selectSheet(name) {
        currentSheet = name;
        document.querySelectorAll(".sheet-tab").forEach(function (tab) {
          tab.classList.toggle("active", tab.textContent === name);
        });

        var sheet = workbook.Sheets[name];
        currentData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        renderTable(currentData);
      }

      function renderTable(data) {
        var table = document.getElementById("dataTable");
        if (!data.length) {
          table.innerHTML = '<tr><td class="empty-state">此工作表为空</td></tr>';
          document.getElementById("stats").innerHTML = "";
          return;
        }

        var html = '<thead><tr><th class="row-num">#</th>';
        var colCount = Math.max.apply(
          null,
          data.map(function (r) {
            return r.length;
          })
        );
        for (var c = 0; c < colCount; c++) {
          html += "<th>" + getColumnName(c) + "</th>";
        }
        html += "</tr></thead><tbody>";

        data.forEach(function (row, idx) {
          html += '<tr><td class="row-num">' + (idx + 1) + "</td>";
          for (var c = 0; c < colCount; c++) {
            var cell = row[c];
            var cellClass = getCellClass(cell);
            var display = formatCell(cell);
            html += '<td class="' + cellClass + '">' + escapeHtml(display) + "</td>";
          }
          html += "</tr>";
        });
        html += "</tbody>";
        table.innerHTML = html;

        var stats = document.getElementById("stats");
        var cellCount = data.reduce(function (sum, row) {
          return (
            sum +
            row.filter(function (c) {
              return c !== "";
            }).length
          );
        }, 0);
        stats.innerHTML =
          "<span>行数: " +
          data.length +
          "</span>" +
          "<span>列数: " +
          colCount +
          "</span>" +
          "<span>非空单元格: " +
          cellCount +
          "</span>";
      }

      function getColumnName(idx) {
        var name = "";
        while (idx >= 0) {
          name = String.fromCharCode(65 + (idx % 26)) + name;
          idx = Math.floor(idx / 26) - 1;
        }
        return name;
      }

      function getCellClass(val) {
        if (typeof val === "number") return "cell-number";
        if (val instanceof Date) return "cell-date";
        if (typeof val === "boolean") return "cell-bool";
        return "";
      }

      function formatCell(val) {
        if (val === null || val === undefined || val === "") return "";
        if (val instanceof Date) {
          return (
            val.toLocaleDateString("zh-CN") +
            " " +
            val.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
          );
        }
        if (typeof val === "boolean") return val ? "TRUE" : "FALSE";
        return String(val);
      }

      window.escapeHtml = function (str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      };

      window.searchTable = function () {
        var query = document.getElementById("searchInput").value.toLowerCase();
        var rows = document.querySelectorAll("#dataTable tbody tr");
        rows.forEach(function (row) {
          var text = row.textContent.toLowerCase();
          row.style.display = text.includes(query) ? "" : "none";
        });
      };

      window.exportCSV = function () {
        if (!workbook || !currentSheet) return;
        var sheet = workbook.Sheets[currentSheet];
        var csv = XLSX.utils.sheet_to_csv(sheet);
        downloadFile(csv, currentSheet + ".csv", "text/csv");
      };

      window.exportJSON = function () {
        if (!currentData.length) return;
        var headers = currentData[0];
        var jsonData = currentData.slice(1).map(function (row) {
          var obj = {};
          headers.forEach(function (h, i) {
            obj[h || "col" + i] = row[i];
          });
          return obj;
        });
        downloadFile(JSON.stringify(jsonData, null, 2), currentSheet + ".json", "application/json");
      };

      window.downloadFile = function (content, filename, type) {
        var blob = new Blob([content], { type: type });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      window.copyTable = function () {
        if (!currentData.length) return;
        var text = currentData
          .map(function (row) {
            return row.join("\t");
          })
          .join("\n");
        navigator.clipboard.writeText(text).then(function () {
          alert("表格已复制到剪贴板");
        });
      };

      window.clearFile = function () {
        workbook = null;
        currentSheet = null;
        currentData = [];
        fileInput.value = "";
        document.getElementById("fileInfo").classList.remove("show");
        document.getElementById("sheetTabs").innerHTML = "";
        document.getElementById("tableContainer").style.display = "none";
      };
    </script>
  </body>
</html>

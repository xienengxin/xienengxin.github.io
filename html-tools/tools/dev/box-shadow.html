    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        margin-bottom: 24px;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--color-accent-cyan);
      }

      header {
        margin-bottom: 32px;
      }

      h1 {
        font-family: var(--font-mono);
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(
          135deg,
          var(--color-text-primary) 0%,
          var(--color-text-secondary) 100%
        );
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .desc {
        color: var(--color-text-secondary);
        font-size: 0.95rem;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 24px;
      }

      @media (width <= 900px) {
        .main-layout {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--color-bg-card);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
      }

      .card-title {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Preview Area */
      .preview-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .preview-container {
        background: var(--preview-bg, #1a1a2e);
        border-radius: var(--radius-md);
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        transition: background 0.3s;
      }

      .preview-box {
        width: var(--box-size, 160px);
        height: var(--box-size, 160px);
        background: var(--box-color, #3a3a5a);
        border-radius: var(--box-radius, 16px);
        transition: all 0.3s ease;
      }

      .preview-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
      }

      .preview-control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .preview-control label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .preview-control input[type="color"] {
        width: 100%;
        height: 36px;
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        cursor: pointer;
        padding: 2px;
      }

      .preview-control input[type="color"]:hover {
        border-color: var(--color-accent-cyan);
      }

      .preview-control input[type="number"] {
        width: 100%;
        padding: 8px 12px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--color-bg-surface);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        outline: none;
      }

      .preview-control input[type="number"]:focus {
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 0 3px var(--glow-cyan);
      }

      /* CSS Output */
      .css-output {
        margin-top: 20px;
      }

      .code-block {
        background: var(--color-bg-surface);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-accent-cyan);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 150px;
        overflow-y: auto;
      }

      .output-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      /* Controls Panel */
      .controls-panel {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Presets */
      .presets-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .preset-btn {
        aspect-ratio: 1;
        background: var(--color-bg-surface);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preset-btn:hover {
        border-color: var(--color-accent-cyan);
        transform: translateY(-2px);
      }

      .preset-btn.active {
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 12px var(--glow-cyan);
      }

      .preset-preview {
        width: 24px;
        height: 24px;
        background: var(--color-bg-card);
        border-radius: 4px;
      }

      .preset-btn[title]::after {
        content: attr(title);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        font-size: 0.7rem;
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 10;
      }

      .preset-btn:hover::after {
        opacity: 1;
      }

      /* Layers Management */
      .layers-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .layers-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 150px;
        overflow-y: auto;
      }

      .layer-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--color-bg-surface);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
      }

      .layer-item:hover {
        border-color: var(--border-strong);
      }

      .layer-item.active {
        border-color: var(--color-accent-cyan);
        background: rgb(0, 245, 212, 0.05);
      }

      .layer-color {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .layer-name {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--color-text-primary);
        flex: 1;
      }

      .layer-toggle {
        width: 20px;
        height: 20px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.9rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .layer-toggle:hover {
        color: var(--color-text-primary);
      }

      .layer-toggle.hidden {
        opacity: 0.4;
      }

      .layer-delete {
        width: 20px;
        height: 20px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .layer-delete:hover {
        color: var(--accent-magenta);
      }

      /* Sliders */
      .slider-group {
        margin-bottom: 16px;
      }

      .slider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .slider-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--color-text-secondary);
      }

      .slider-value {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--color-accent-cyan);
        background: var(--color-bg-surface);
        padding: 2px 8px;
        border-radius: var(--radius-sm);
      }

      .slider-input {
        width: 100%;
        height: 6px;
        appearance: none;
        background: var(--border-subtle);
        border-radius: 3px;
        outline: none;
      }

      .slider-input::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;

  <body>

        🌙

      <div class="main-layout">

    <script>
      // Constants
      const LS_KEY = "box_shadow_state_v1";

      // Preset styles
      const PRESETS = [
        {
          name: "柔和",
          layers: [
            {
              offsetX: 0,
              offsetY: 2,
              blur: 8,
              spread: 0,
              color: "#000000",

        {

        {

            {

            },

        {

            }
          ]
        },
        {

          layers: [
            {
              offsetX: 6,
              offsetY: 6,
              blur: 12,
              spread: 0,
              color: "#000000",
              opacity: 30,
              inset: false
            },
            {
              offsetX: -6,
              offsetY: -6,
              blur: 12,
              spread: 0,
              color: "#ffffff",
              opacity: 8,
              inset: false
            }
          ]
        },
        {
          name: "新拟态凹",
          layers: [
            {
              offsetX: 4,
              offsetY: 4,
              blur: 8,
              spread: 0,
              color: "#000000",
              opacity: 25,
              inset: true
            },
            {
              offsetX: -4,
              offsetY: -4,
              blur: 8,
              spread: 0,
              color: "#ffffff",
              opacity: 5,
              inset: true
            }
          ]
        },
        {
          name: "青色发光",
          layers: [
            {
              offsetX: 0,
              offsetY: 0,
              blur: 20,
              spread: 2,
              color: "#00f5d4",
              opacity: 50,
              inset: false
            }
          ]
        },
        {
          name: "品红发光",
          layers: [
            {
              offsetX: 0,
              offsetY: 0,
              blur: 20,
              spread: 2,
              color: "#f72585",
              opacity: 50,
              inset: false
            }
          ]
        },
        {
          name: "多层柔和",
          layers: [
            {
              offsetX: 0,
              offsetY: 1,
              blur: 2,
              spread: 0,
              color: "#000000",
              opacity: 5,
              inset: false
            },
            {
              offsetX: 0,
              offsetY: 2,
              blur: 4,
              spread: 0,
              color: "#000000",
              opacity: 5,
              inset: false
            },
            {
              offsetX: 0,
              offsetY: 4,
              blur: 8,
              spread: 0,
              color: "#000000",
              opacity: 5,
              inset: false
            },
            {
              offsetX: 0,
              offsetY: 8,
              blur: 16,
              spread: 0,
              color: "#000000",
              opacity: 5,
              inset: false
            }
          ]
        },
        {
          name: "边框发光",
          layers: [
            {
              offsetX: 0,
              offsetY: 0,
              blur: 0,
              spread: 1,
              color: "#00f5d4",
              opacity: 80,
              inset: false
            },
            {
              offsetX: 0,
              offsetY: 0,
              blur: 10,
              spread: 0,
              color: "#00f5d4",
              opacity: 40,
              inset: false
            }
          ]
        }
      ];

      // State
      let state = {
        layers: [
          {
            offsetX: 0,
            offsetY: 4,
            blur: 12,
            spread: 0,
            color: "#000000",
            opacity: 25,
            inset: false,
            visible: true
          }
        ],
        currentLayer: 0,
        preview: { bgColor: "#1a1a2e", boxColor: "#3a3a5a", boxSize: 160, boxRadius: 16 }
      };

      // DOM Elements
      const previewContainer = document.getElementById("previewContainer");
      const previewBox = document.getElementById("previewBox");
      const codeOutput = document.getElementById("codeOutput");
      const statusEl = document.getElementById("status");
      const presetsGrid = document.getElementById("presetsGrid");
      const layersList = document.getElementById("layersList");

      // Sliders
      const sliders = {
        offsetX: document.getElementById("offsetX"),
        offsetY: document.getElementById("offsetY"),
        blur: document.getElementById("blur"),
        spread: document.getElementById("spread"),
        opacity: document.getElementById("opacity")
      };

      const sliderValues = {
        offsetX: document.getElementById("offsetXValue"),
        offsetY: document.getElementById("offsetYValue"),
        blur: document.getElementById("blurValue"),
        spread: document.getElementById("spreadValue"),
        opacity: document.getElementById("opacityValue")
      };

      // Preview controls
      const bgColorInput = document.getElementById("bgColor");
      const boxColorInput = document.getElementById("boxColor");
      const boxSizeInput = document.getElementById("boxSize");
      const boxRadiusInput = document.getElementById("boxRadius");
      const shadowColorInput = document.getElementById("shadowColor");
      const insetCheckbox = document.getElementById("inset");
      const insetToggle = document.getElementById("insetToggle");

      // Buttons
      const copyBtn = document.getElementById("copyBtn");
      const shareBtn = document.getElementById("shareBtn");
      const resetBtn = document.getElementById("resetBtn");
      const addLayerBtn = document.getElementById("addLayerBtn");

      // Helper: convert hex to rgba
      function hexToRgba(hex, opacity) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return "rgba(" + r + ", " + g + ", " + b + ", " + (opacity / 100).toFixed(2) + ")";
      }

      // Generate box-shadow CSS
      function generateShadowCSS() {
        const visibleLayers = state.layers.filter(function (l) {
          return l.visible !== false;
        });
        if (visibleLayers.length === 0) return "none";

        return visibleLayers
          .map(function (layer) {
            const inset = layer.inset ? "inset " : "";
            const color = hexToRgba(layer.color, layer.opacity);
            return (
              inset +
              layer.offsetX +
              "px " +
              layer.offsetY +
              "px " +
              layer.blur +
              "px " +
              layer.spread +
              "px " +
              color
            );
          })
          .join(",\n             ");
      }

      // Update preview
      window.updatePreview = function () {
        const shadow = generateShadowCSS();
        previewBox.style.boxShadow = shadow;
        previewContainer.style.background = state.preview.bgColor;
        previewBox.style.background = state.preview.boxColor;
        previewBox.style.setProperty("--box-size", state.preview.boxSize + "px");
        previewBox.style.width = state.preview.boxSize + "px";
        previewBox.style.height = state.preview.boxSize + "px";
        previewBox.style.borderRadius = state.preview.boxRadius + "px";

        // Update code output
        const cssValue = generateShadowCSS();
        codeOutput.textContent = "box-shadow: " + cssValue + ";";

        // Save state
        saveState();
      };

      // Update slider values display
      function updateSliderDisplay() {
        const layer = state.layers[state.currentLayer];
        if (!layer) return;

        sliders.offsetX.value = layer.offsetX;
        sliders.offsetY.value = layer.offsetY;
        sliders.blur.value = layer.blur;
        sliders.spread.value = layer.spread;
        sliders.opacity.value = layer.opacity;
        shadowColorInput.value = layer.color;
        insetCheckbox.checked = layer.inset;
        insetToggle.classList.toggle("active", layer.inset);

        sliderValues.offsetX.textContent = layer.offsetX + "px";
        sliderValues.offsetY.textContent = layer.offsetY + "px";
        sliderValues.blur.textContent = layer.blur + "px";
        sliderValues.spread.textContent = layer.spread + "px";
        sliderValues.opacity.textContent = layer.opacity + "%";
      }

      // Create layer item element
      function createLayerItem(layer, index) {
        const item = document.createElement("div");
        item.className = "layer-item" + (index === state.currentLayer ? " active" : "");

        const colorDiv = document.createElement("div");
        colorDiv.className = "layer-color";
        colorDiv.style.background = hexToRgba(layer.color, layer.opacity);

        const nameSpan = document.createElement("span");
        nameSpan.className = "layer-name";
        nameSpan.textContent = (layer.inset ? "Inset " : "") + "层 " + (index + 1);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "layer-toggle" + (layer.visible === false ? " hidden" : "");
        toggleBtn.setAttribute("data-index", index);
        toggleBtn.title = "切换可见性";
        toggleBtn.textContent = layer.visible === false ? "◯" : "◉";
        toggleBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          state.layers[index].visible = state.layers[index].visible === false;
          renderLayers();
          updatePreview();
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "layer-delete";
        deleteBtn.setAttribute("data-index", index);
        deleteBtn.title = "删除层";
        deleteBtn.textContent = "×";
        deleteBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (state.layers.length > 1) {
            state.layers.splice(index, 1);
            if (state.currentLayer >= state.layers.length) {
              state.currentLayer = state.layers.length - 1;
            }
            renderLayers();
            updateSliderDisplay();
            updatePreview();
          }
        });

        item.appendChild(colorDiv);
        item.appendChild(nameSpan);
        item.appendChild(toggleBtn);
        item.appendChild(deleteBtn);

        item.addEventListener("click", function (e) {
          if (
            !e.target.classList.contains("layer-toggle") &&
            !e.target.classList.contains("layer-delete")
          ) {
            state.currentLayer = index;
            renderLayers();
            updateSliderDisplay();
          }
        });

        return item;
      }

      // Render layers list
      function renderLayers() {
        // Clear existing layers
        while (layersList.firstChild) {
          layersList.removeChild(layersList.firstChild);
        }

        state.layers.forEach(function (layer, index) {
          const item = createLayerItem(layer, index);
          layersList.appendChild(item);
        });
      }

      // Create preset button element
      function createPresetBtn(preset, index) {
        const btn = document.createElement("button");
        btn.className = "preset-btn";
        btn.title = preset.name;

        const preview = document.createElement("div");
        preview.className = "preset-preview";

        // Generate shadow for preview
        const shadowCSS = preset.layers
          .map(function (layer) {
            const inset = layer.inset ? "inset " : "";
            const color = hexToRgba(layer.color, layer.opacity);
            return (
              inset +
              layer.offsetX * 0.3 +
              "px " +
              layer.offsetY * 0.3 +
              "px " +
              layer.blur * 0.3 +
              "px " +
              layer.spread * 0.3 +
              "px " +
              color
            );
          })
          .join(", ");
        preview.style.boxShadow = shadowCSS;

        btn.appendChild(preview);
        btn.addEventListener("click", function () {
          applyPreset(index);
        });

        return btn;
      }

      // Render presets
      function renderPresets() {
        // Clear existing presets
        while (presetsGrid.firstChild) {
          presetsGrid.removeChild(presetsGrid.firstChild);
        }

        PRESETS.forEach(function (preset, index) {
          const btn = createPresetBtn(preset, index);
          presetsGrid.appendChild(btn);
        });
      }

      // Apply preset
      window.applyPreset = function (index) {
        const preset = PRESETS[index];
        state.layers = preset.layers.map(function (l) {
          return Object.assign({}, l, { visible: true });
        });
        state.currentLayer = 0;
        renderLayers();
        updateSliderDisplay();
        updatePreview();
        showStatus("已应用预设: " + preset.name, "success");
      };

      // Show status message
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status show " + type;
        setTimeout(function () {
          statusEl.classList.remove("show");
        }, 2000);
      }

      // Save state to localStorage
      function saveState() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(state));
        } catch (e) {
          // Ignore storage errors
        }
      }

      // Load state from localStorage
      function loadState() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            state = Object.assign({}, state, parsed);
            return true;
          }
        } catch (e) {
          // Ignore parse errors
        }
        return false;
      }

      // Load from URL hash
      window.loadFromUrl = function () {
        const hash = location.hash.slice(1);
        if (hash) {
          try {
            const decoded = decodeURIComponent(atob(hash));
            const parsed = JSON.parse(decoded);
            state = Object.assign({}, state, parsed);
            return true;
          } catch (e) {
            // Invalid hash, ignore
          }
        }
        return false;
      };

      // Save to URL hash
      function saveToUrl() {
        try {
          const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
          history.replaceState(null, "", "#" + encoded);
        } catch (e) {
          // Ignore errors
        }
      }

      // Copy to clipboard
      window.copyCode = function () {
        const code = codeOutput.textContent;
        navigator.clipboard
          .writeText(code)
          .then(function () {
            showStatus("已复制到剪贴板", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      };

      // Share link
      function shareLink() {
        saveToUrl();
        const url = window.location.href;
        navigator.clipboard
          .writeText(url)
          .then(function () {
            showStatus("链接已复制", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      }

      // Reset to default
      function resetState() {
        state = {
          layers: [
            {
              offsetX: 0,
              offsetY: 4,
              blur: 12,
              spread: 0,
              color: "#000000",
              opacity: 25,
              inset: false,
              visible: true
            }
          ],
          currentLayer: 0,
          preview: { bgColor: "#1a1a2e", boxColor: "#3a3a5a", boxSize: 160, boxRadius: 16 }
        };
        bgColorInput.value = state.preview.bgColor;
        boxColorInput.value = state.preview.boxColor;
        boxSizeInput.value = state.preview.boxSize;
        boxRadiusInput.value = state.preview.boxRadius;
        renderLayers();
        updateSliderDisplay();
        updatePreview();
        history.replaceState(null, "", location.pathname);
        showStatus("已重置", "success");
      }

      // Add new layer
      window.addLayer = function () {
        if (state.layers.length >= 10) {
          showStatus("最多支持 10 层阴影", "error");
          return;
        }
        state.layers.push({
          offsetX: 0,
          offsetY: 4,
          blur: 12,
          spread: 0,
          color: "#000000",
          opacity: 25,
          inset: false,
          visible: true
        });
        state.currentLayer = state.layers.length - 1;
        renderLayers();
        updateSliderDisplay();
        updatePreview();
      };

      // Event Listeners - Sliders
      Object.keys(sliders).forEach(function (key) {
        sliders[key].addEventListener("input", function () {
          const value = parseInt(sliders[key].value);
          state.layers[state.currentLayer][key] = value;
          sliderValues[key].textContent = value + (key === "opacity" ? "%" : "px");
          renderLayers();
          updatePreview();
        });
      });

      // Shadow color
      shadowColorInput.addEventListener("input", function () {
        state.layers[state.currentLayer].color = shadowColorInput.value;
        renderLayers();
        updatePreview();
      });

      // Inset toggle
      insetToggle.addEventListener("click", function () {
        const newValue = !insetCheckbox.checked;
        insetCheckbox.checked = newValue;
        insetToggle.classList.toggle("active", newValue);
        state.layers[state.currentLayer].inset = newValue;
        renderLayers();
        updatePreview();
      });

      // Preview controls
      bgColorInput.addEventListener("input", function () {
        state.preview.bgColor = bgColorInput.value;
        updatePreview();
      });

      boxColorInput.addEventListener("input", function () {
        state.preview.boxColor = boxColorInput.value;
        updatePreview();
      });

      boxSizeInput.addEventListener("input", function () {
        state.preview.boxSize = parseInt(boxSizeInput.value) || 160;
        updatePreview();
      });

      boxRadiusInput.addEventListener("input", function () {
        state.preview.boxRadius = parseInt(boxRadiusInput.value) || 0;
        updatePreview();
      });

      // Buttons
      copyBtn.addEventListener("click", copyCode);
      shareBtn.addEventListener("click", shareLink);
      resetBtn.addEventListener("click", resetState);
      addLayerBtn.addEventListener("click", addLayer);

      // Initialize
      function init() {
        // Try to load from URL first, then localStorage
        if (!loadFromUrl()) {
          loadState();
        }

        // Update preview controls
        bgColorInput.value = state.preview.bgColor;
        boxColorInput.value = state.preview.boxColor;
        boxSizeInput.value = state.preview.boxSize;
        boxRadiusInput.value = state.preview.boxRadius;

        renderPresets();
        renderLayers();
        updateSliderDisplay();
        updatePreview();
      }

      init();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <div class="container">
      <header>
        <h1>JSONPath 查询器</h1>
        <p class="subtitle">使用 JSONPath 表达式查询和提取 JSON 数据</p>
      </header>

      <div class="panel">
        <h2 class="panel-title">查询表达式</h2>
        <div class="examples">
          <button class="example-btn" onclick="setQuery('$')">$ (根)</button>
          <button class="example-btn" onclick="setQuery('$.store.book[*]')">$.store.book[*]</button>
          <button class="example-btn" onclick="setQuery('$.store.book[0]')">$.store.book[0]</button>
          <button class="example-btn" onclick="setQuery('$.store.book[-1]')">
            $.store.book[-1]
          </button>
          <button class="example-btn" onclick="setQuery('$.store.book[0,1]')">
            $.store.book[0,1]
          </button>
          <button class="example-btn" onclick="setQuery('$.store.book[:2]')">
            $.store.book[:2]
          </button>
          <button class="example-btn" onclick="setQuery('$..author')">$..author</button>
          <button class="example-btn" onclick="setQuery('$..book[?(@.price<10)]')">
            $..book[?(@.price&lt;10)]
          </button>
          <button
            class="example-btn"
            onclick="setQuery('$..book[?(@.category==&quot;fiction&quot;)]')"
          >
            ?(@.category=="fiction")
          </button>
        </div>
        <div class="query-section">
          <input
            type="text"
            id="queryInput"
            placeholder="输入 JSONPath 表达式，如 $.store.book[*].author"
            value="$.store.book[*].author"
            onkeypress="if (event.key === 'Enter') executeQuery();"
          />
          <button class="btn btn-primary" onclick="executeQuery()">查询</button>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="editor-section">
            <div class="result-header">
              <label>JSON 数据</label>
              <div>
                <button
                  class="btn btn-secondary"
                  onclick="formatJSON()"
                  style="padding: 8px 15px; font-size: 0.85rem"
                >
                  格式化
                </button>
                <button
                  class="btn btn-secondary"
                  onclick="loadSample()"
                  style="padding: 8px 15px; font-size: 0.85rem"
                >
                  示例数据
                </button>
              </div>
            </div>
            <textarea
              id="jsonInput"
              placeholder="粘贴 JSON 数据..."
              oninput="executeQuery()"
            ></textarea>
          </div>
        </div>

        <div class="panel">
          <div class="result-section">
            <div class="result-header">
              <label>查询结果</label>
              <span class="result-count" id="resultCount"></span>
            </div>
            <div class="result-output" id="resultOutput">查询结果将显示在这里...</div>
            <div style="margin-top: 15px">
              <button class="btn btn-secondary" onclick="copyResult()" style="padding: 10px 20px">
                📋 复制结果
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">JSONPath 语法参考</h2>
        <div class="syntax-help">
          <div class="syntax-item">
            <code>$</code>
            <div class="desc">根对象/元素</div>
          </div>
          <div class="syntax-item">
            <code>@</code>
            <div class="desc">当前对象/元素</div>
          </div>
          <div class="syntax-item">
            <code>.property</code>
            <div class="desc">子属性</div>
          </div>
          <div class="syntax-item">
            <code>['property']</code>
            <div class="desc">子属性 (另一种写法)</div>
          </div>
          <div class="syntax-item">
            <code>[n]</code>
            <div class="desc">数组第 n 个元素</div>
          </div>
          <div class="syntax-item">
            <code>[*]</code>
            <div class="desc">所有元素</div>
          </div>
          <div class="syntax-item">
            <code>[start:end]</code>
            <div class="desc">数组切片</div>
          </div>
          <div class="syntax-item">
            <code>..</code>
            <div class="desc">递归下降 (深度搜索)</div>
          </div>
          <div class="syntax-item">
            <code>[?(@.price&lt;10)]</code>
            <div class="desc">过滤表达式</div>
          </div>
          <div class="syntax-item">
            <code>[(@.length-1)]</code>
            <div class="desc">脚本表达式</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const sampleJSON = {
        store: {
          book: [
            {
              category: "reference",
              author: "Nigel Rees",
              title: "Sayings of the Century",
              price: 8.95
            },
            {
              category: "fiction",
              author: "Evelyn Waugh",
              title: "Sword of Honour",
              price: 12.99
            },
            {
              category: "fiction",
              author: "Herman Melville",
              title: "Moby Dick",
              isbn: "0-553-21311-3",
              price: 8.99
            },
            {
              category: "fiction",
              author: "J. R. R. Tolkien",
              title: "The Lord of the Rings",
              isbn: "0-395-19395-8",
              price: 22.99
            }
          ],
          bicycle: {
            color: "red",
            price: 19.95
          }
        }
      };

      // Theme toggle
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // Initialize theme
      (function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      window.loadSample = function () {
        document.getElementById("jsonInput").value = JSON.stringify(sampleJSON, null, 2);
        executeQuery();
      };

      window.setQuery = function (query) {
        document.getElementById("queryInput").value = query;
        executeQuery();
      };

      window.formatJSON = function () {
        const input = document.getElementById("jsonInput");
        try {
          const json = JSON.parse(input.value);
          input.value = JSON.stringify(json, null, 2);
        } catch (e) {
          showToast("JSON 格式错误");
        }
      };

      function executeQuery() {
        const jsonStr = document.getElementById("jsonInput").value.trim();
        const query = document.getElementById("queryInput").value.trim();
        const output = document.getElementById("resultOutput");
        const countEl = document.getElementById("resultCount");

        if (!jsonStr) {
          output.textContent = "请输入 JSON 数据";
          output.className = "result-output";
          countEl.textContent = "";
          return;
        }

        if (!query) {
          output.textContent = "请输入查询表达式";
          output.className = "result-output";
          countEl.textContent = "";
          return;
        }

        try {
          const json = JSON.parse(jsonStr);
          const result = JSONPath.JSONPath({ path: query, json: json });

          if (
            result === undefined ||
            result === null ||
            (Array.isArray(result) && result.length === 0)
          ) {
            output.textContent = "没有找到匹配的结果";
            output.className = "result-output";
            countEl.textContent = "0 个结果";
          } else {
            output.textContent = JSON.stringify(result, null, 2);
            output.className = "result-output success";
            const count = Array.isArray(result) ? result.length : 1;
            countEl.textContent = `${count} 个结果`;
          }
        } catch (e) {
          output.textContent = "错误: " + e.message;
          output.className = "result-output error";
          countEl.textContent = "";
        }
      }

      window.copyResult = function () {
        const output = document.getElementById("resultOutput");
        navigator.clipboard.writeText(output.textContent).then(() => {
          showToast("已复制结果");
        });
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Initialize with sample data
      loadSample();
    </script>
  </body>
</html>

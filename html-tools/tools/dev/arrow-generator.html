    <div class="container">
      <header>
        <h1>➡️ 箭头符号生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
          🌓
        </button>
      </header>

      <div class="generator-section">
        <h2>选择方向</h2>

        <h2>选择样式</h2>
        <div class="style-options" id="styleOptions"></div>

        <div class="result-display">
          <div class="result-arrow" id="resultArrow" onclick="copyArrow()" title="点击复制">→</div>
          <div class="result-info" id="resultInfo">Unicode: U+2192</div>
          <div class="copy-hint">点击箭头复制到剪贴板</div>
        </div>
      </div>

      <div class="custom-arrow">
        <h3>🔧 自定义ASCII箭头</h3>
        <div class="custom-inputs">
          <input
            type="text"
            id="leftPart"
            value="<"
            maxlength="3"
            oninput="updateCustomArrow()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
          <input
            type="text"
            id="bodyPart"
            value="-"
            maxlength="1"
            oninput="updateCustomArrow()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
          <span>×</span>
          <input
            type="number"
            id="bodyLength"
            value="3"
            min="0"
            max="20"
            oninput="updateCustomArrow()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          <input
            type="text"
            id="rightPart"
            value=">"
            maxlength="3"
            oninput="updateCustomArrow()"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
          <button onclick="copyCustomArrow()" aria-label="复制">复制</button>
        </div>
        <div class="custom-preview" id="customPreview">&lt;---&gt;</div>
      </div>

      <div class="arrow-gallery">
        <h3>📦 箭头符号库</h3>
        <div id="galleryContent"></div>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <script>
      const directions = [
        { id: "nw", label: "↖" },
        { id: "n", label: "↑" },
        { id: "ne", label: "↗" },
        { id: "w", label: "←" },
        { id: "center", label: "" },
        { id: "e", label: "→" },
        { id: "sw", label: "↙" },
        { id: "s", label: "↓" },
        { id: "se", label: "↘" }
      ];

      const arrowStyles = {
        simple: {
          name: "简单",
          arrows: { n: "↑", ne: "↗", e: "→", se: "↘", s: "↓", sw: "↙", w: "←", nw: "↖" }
        },
        double: {
          name: "双线",
          arrows: { n: "⇑", ne: "⇗", e: "⇒", se: "⇘", s: "⇓", sw: "⇙", w: "⇐", nw: "⇖" }
        },
        heavy: {
          name: "粗体",
          arrows: { n: "⬆", ne: "⬈", e: "➡", se: "⬊", s: "⬇", sw: "⬋", w: "⬅", nw: "⬉" }
        },
        outline: {
          name: "空心",
          arrows: { n: "⇧", ne: "⬀", e: "⇨", se: "⬂", s: "⇩", sw: "⬃", w: "⇦", nw: "⬁" }
        },
        triangle: {
          name: "三角",
          arrows: { n: "▲", ne: "◥", e: "▶", se: "◢", s: "▼", sw: "◣", w: "◀", nw: "◤" }
        },
        curved: {
          name: "弯曲",
          arrows: { n: "⤴", ne: "↱", e: "↪", se: "↳", s: "⤵", sw: "↲", w: "↩", nw: "↰" }
        }
      };

      const arrowGallery = {
        基本箭头: ["←", "→", "↑", "↓", "↔", "↕", "↖", "↗", "↘", "↙"],
        双线箭头: ["⇐", "⇒", "⇑", "⇓", "⇔", "⇕", "⇖", "⇗", "⇘", "⇙"],
        粗箭头: ["⬅", "➡", "⬆", "⬇", "⬈", "⬉", "⬊", "⬋"],
        圆形箭头: ["↺", "↻", "⟲", "⟳", "↶", "↷"],
        波浪箭头: ["↜", "↝", "↭", "⇜", "⇝"],
        虚线箭头: ["⇠", "⇢", "⇡", "⇣", "⤌", "⤍", "⤎", "⤏"],
        带尾箭头: ["↢", "↣", "↤", "↦", "↧", "↥"],
        双头箭头: ["↞", "↠", "↟", "↡", "⇞", "⇟"],
        手指箭头: ["☜", "☞", "☝", "☟", "👆", "👇", "👈", "👉"],
        特殊箭头: [
          "➔",
          "➙",
          "➛",
          "➜",
          "➝",
          "➞",
          "➟",
          "➠",
          "➢",
          "➣",
          "➤",
          "➥",
          "➦",
          "➧",
          "➨",
          "➩",
          "➪",
          "➫",
          "➬",
          "➭",
          "➮",
          "➯",
          "➱",
          "➲"
        ],
        数学箭头: ["⟵", "⟶", "⟷", "⟸", "⟹", "⟺", "⟻", "⟼", "⟽", "⟾", "⟿"],
        带圈箭头: ["➀", "➁", "➂", "➃", "➄", "➅", "➆", "➇", "➈", "➉"]
      };

      let currentDirection = "e";
      let currentStyle = "simple";

      function init() {
        renderDirectionGrid();
        renderStyleOptions();
        renderGallery();
        updateResult();

        const savedTheme = localStorage.getItem("arrow-generator-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      }

      function renderDirectionGrid() {
        const grid = document.getElementById("directionGrid");
        while (grid.firstChild) {
          grid.removeChild(grid.firstChild);
        }

        directions.forEach(function (dir) {
          const btn = document.createElement("button");
          btn.className = "direction-btn" + (dir.id === currentDirection ? " active" : "");
          btn.textContent = dir.label;

          if (dir.id !== "center") {
            btn.onclick = function () {
              selectDirection(dir.id);
            };
          } else {
            btn.disabled = true;
            btn.style.visibility = "hidden";
          }

          grid.appendChild(btn);
        });
      }

      function renderStyleOptions() {
        const container = document.getElementById("styleOptions");
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        Object.keys(arrowStyles).forEach(function (styleId) {
          const style = arrowStyles[styleId];
          const btn = document.createElement("button");
          btn.className = "style-btn" + (styleId === currentStyle ? " active" : "");
          btn.textContent = style.name + " " + style.arrows.e;
          btn.onclick = function () {
            selectStyle(styleId);
          };
          container.appendChild(btn);
        });
      }

      function renderGallery() {
        const container = document.getElementById("galleryContent");
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        Object.keys(arrowGallery).forEach(function (categoryName) {
          const category = document.createElement("div");
          category.className = "gallery-category";

          const title = document.createElement("h4");
          title.textContent = categoryName;
          category.appendChild(title);

          const grid = document.createElement("div");
          grid.className = "gallery-grid";

          arrowGallery[categoryName].forEach(function (arrow) {
            const item = document.createElement("div");
            item.className = "gallery-item";
            item.textContent = arrow;
            item.title = "点击复制: " + arrow;
            item.onclick = function () {
              copyText(arrow);
            };
            grid.appendChild(item);
          });

          category.appendChild(grid);
          container.appendChild(category);
        });
      }

      function selectDirection(dir) {
        currentDirection = dir;
        renderDirectionGrid();
        updateResult();
      }

      window.selectStyle = function (style) {
        currentStyle = style;
        renderStyleOptions();
        updateResult();
      };

      function updateResult() {
        const arrow = arrowStyles[currentStyle].arrows[currentDirection];
        const resultArrow = document.getElementById("resultArrow");
        const resultInfo = document.getElementById("resultInfo");

        resultArrow.textContent = arrow;
        resultInfo.textContent =
          "Unicode: U+" + arrow.charCodeAt(0).toString(16).toUpperCase().padStart(4, "0");
      }

      window.copyArrow = function () {
        const arrow = document.getElementById("resultArrow").textContent;
        copyText(arrow);
      };

      window.updateCustomArrow = function () {
        const left = document.getElementById("leftPart").value;
        const body = document.getElementById("bodyPart").value;
        const length = parseInt(document.getElementById("bodyLength").value) || 0;
        const right = document.getElementById("rightPart").value;

        const arrow = left + body.repeat(length) + right;
        document.getElementById("customPreview").textContent = arrow || "(空)";
      };

      window.copyCustomArrow = function () {
        const arrow = document.getElementById("customPreview").textContent;
        if (arrow && arrow !== "(空)") {
          copyText(arrow);
        }
      };

      window.copyText = function (text) {
        navigator.clipboard.writeText(text).then(function () {
          showToast("已复制: " + text);
        });
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("arrow-generator-theme", newTheme);
      };

      init();
    </script>
  </body>
</html>

      .theme-toggle {
        position: fixed;

        z-index: 100;
        transition: all 0.2s;

        align-items: center;
        justify-content: center;

      .origin-marker {

        width: 10px;
        height: 10px;
        background: #ff4757;

    <div class="container">
      <div class="header">
        <h1>CSS Transform 生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
          🌓
        </button>
      </div>

      <div class="main-grid">
        <div class="controls-panel">
          <div class="presets-section">
            <label>快速预设</label>
            <div class="presets-grid">
              <button class="preset-btn" onclick="applyPreset('flip')" aria-label="水平翻转">
                水平翻转
              </button>
              <button class="preset-btn" onclick="applyPreset('flipV')" aria-label="垂直翻转">
                垂直翻转
              </button>
              <button class="preset-btn" onclick="applyPreset('rotate45')" aria-label="旋转45°">
                旋转45°
              </button>
              <button class="preset-btn" onclick="applyPreset('scale2x')" aria-label="放大2倍">
                放大2倍
              </button>
              <button class="preset-btn" onclick="applyPreset('skew')" aria-label="倾斜">
                倾斜
              </button>
              <button class="preset-btn" onclick="applyPreset('perspective')" aria-label="透视">
                透视
              </button>
              <button class="preset-btn" onclick="applyPreset('card3d')" aria-label="3D卡片">
                3D卡片
              </button>
              <button class="preset-btn" onclick="applyPreset('swing')" aria-label="摆动">
                摆动
              </button>
            </div>
          </div>

          <div class="section-title">2D 变换</div>

          <div class="control-group">
            <div class="control-header">
              <label>translateX (水平位移)</label>
              <span class="control-value" id="translateXValue">0px</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="translateX"
                min="-200"
                max="200"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('translateX', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>translateY (垂直位移)</label>
              <span class="control-value" id="translateYValue">0px</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="translateY"
                min="-200"
                max="200"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('translateY', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>rotate (旋转)</label>
              <span class="control-value" id="rotateValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="rotate"
                min="-180"
                max="180"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('rotate', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>scaleX (水平缩放)</label>
              <span class="control-value" id="scaleXValue">1</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="scaleX"
                min="0"
                max="3"
                value="1"
                step="0.1"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('scaleX', 1)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>scaleY (垂直缩放)</label>
              <span class="control-value" id="scaleYValue">1</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="scaleY"
                min="0"
                max="3"
                value="1"
                step="0.1"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('scaleY', 1)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>skewX (水平倾斜)</label>
              <span class="control-value" id="skewXValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="skewX"
                min="-60"
                max="60"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('skewX', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>skewY (垂直倾斜)</label>
              <span class="control-value" id="skewYValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="skewY"
                min="-60"
                max="60"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('skewY', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="section-title">3D 变换</div>

          <div class="control-group">
            <div class="control-header">
              <label>perspective (透视距离)</label>
              <span class="control-value" id="perspectiveValue">800px</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="perspective"
                min="100"
                max="2000"
                value="800"
                oninput="updateTransform()"
              />
              <button
                class="reset-btn"
                onclick="resetControl('perspective', 800)"
                aria-label="重置"
              >
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>rotateX (X轴旋转)</label>
              <span class="control-value" id="rotateXValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="rotateX"
                min="-180"
                max="180"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('rotateX', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>rotateY (Y轴旋转)</label>
              <span class="control-value" id="rotateYValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="rotateY"
                min="-180"
                max="180"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('rotateY', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>rotateZ (Z轴旋转)</label>
              <span class="control-value" id="rotateZValue">0deg</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="rotateZ"
                min="-180"
                max="180"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('rotateZ', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label>translateZ (Z轴位移)</label>
              <span class="control-value" id="translateZValue">0px</span>
            </div>
            <div class="slider-container">
              <input
                type="range"
                id="translateZ"
                min="-300"
                max="300"
                value="0"
                oninput="updateTransform()"
              />
              <button class="reset-btn" onclick="resetControl('translateZ', 0)" aria-label="重置">
                重置
              </button>
            </div>
          </div>

          <div class="section-title">变换原点</div>

          <div class="origin-presets">
            <button class="origin-preset-btn" onclick="setOrigin('0%', '0%')" aria-label="左上">
              左上
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('50%', '0%')" aria-label="上中">
              上中
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('100%', '0%')" aria-label="右上">
              右上
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('0%', '50%')" aria-label="左中">
              左中
            </button>
            <button
              class="origin-preset-btn active"
              onclick="setOrigin('50%', '50%')"
              aria-label="中心"
            >
              中心
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('100%', '50%')" aria-label="右中">
              右中
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('0%', '100%')" aria-label="左下">
              左下
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('50%', '100%')" aria-label="下中">
              下中
            </button>
            <button class="origin-preset-btn" onclick="setOrigin('100%', '100%')" aria-label="右下">
              右下
            </button>
          </div>

          <div class="origin-controls">
            <div>
              <label style="font-size: 12px">
                X:
                <span id="originXValue">50%</span>
              </label>
              <input
                type="range"
                id="originX"
                min="0"
                max="100"
                value="50"
                oninput="updateOrigin()"
              />
            </div>
            <div>
              <label style="font-size: 12px">
                Y:
                <span id="originYValue">50%</span>
              </label>
              <input
                type="range"
                id="originY"
                min="0"
                max="100"
                value="50"
                oninput="updateOrigin()"
              />
            </div>
          </div>

          <button class="reset-all-btn" onclick="resetAll()" aria-label="重置所有变换">
            重置所有变换
          </button>
        </div>

        <div class="preview-area">
          <div class="preview-container">
            <h3>预览</h3>
            <div class="preview-stage" id="previewStage">
              <div class="preview-box" id="previewBox">Transform</div>
            </div>
          </div>

          <div class="code-output">
            <h3>CSS 代码</h3>
            <div class="code-block" id="codeOutput"></div>
            <button class="copy-btn" onclick="copyCode()" aria-label="复制代码">复制代码</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const defaults = {
        translateX: 0,
        translateY: 0,
        rotate: 0,
        scaleX: 1,
        scaleY: 1,
        skewX: 0,
        skewY: 0,
        perspective: 800,
        rotateX: 0,
        rotateY: 0,
        rotateZ: 0,
        translateZ: 0,
        originX: 50,
        originY: 50
      };

      function updateTransform() {
        const translateX = document.getElementById("translateX").value;
        const translateY = document.getElementById("translateY").value;
        const rotate = document.getElementById("rotate").value;
        const scaleX = document.getElementById("scaleX").value;
        const scaleY = document.getElementById("scaleY").value;
        const skewX = document.getElementById("skewX").value;
        const skewY = document.getElementById("skewY").value;
        const perspective = document.getElementById("perspective").value;
        const rotateX = document.getElementById("rotateX").value;
        const rotateY = document.getElementById("rotateY").value;
        const rotateZ = document.getElementById("rotateZ").value;
        const translateZ = document.getElementById("translateZ").value;

        document.getElementById("translateXValue").textContent = translateX + "px";
        document.getElementById("translateYValue").textContent = translateY + "px";
        document.getElementById("rotateValue").textContent = rotate + "deg";
        document.getElementById("scaleXValue").textContent = scaleX;
        document.getElementById("scaleYValue").textContent = scaleY;
        document.getElementById("skewXValue").textContent = skewX + "deg";
        document.getElementById("skewYValue").textContent = skewY + "deg";
        document.getElementById("perspectiveValue").textContent = perspective + "px";
        document.getElementById("rotateXValue").textContent = rotateX + "deg";
        document.getElementById("rotateYValue").textContent = rotateY + "deg";
        document.getElementById("rotateZValue").textContent = rotateZ + "deg";
        document.getElementById("translateZValue").textContent = translateZ + "px";

        document.getElementById("previewStage").style.perspective = perspective + "px";

        let transformParts = [];
        if (translateX != 0 || translateY != 0 || translateZ != 0) {
          transformParts.push(
            "translate3d(" + translateX + "px, " + translateY + "px, " + translateZ + "px)"
          );
        }
        if (rotateX != 0) transformParts.push("rotateX(" + rotateX + "deg)");
        if (rotateY != 0) transformParts.push("rotateY(" + rotateY + "deg)");
        if (rotateZ != 0) transformParts.push("rotateZ(" + rotateZ + "deg)");
        if (rotate != 0) transformParts.push("rotate(" + rotate + "deg)");
        if (scaleX != 1 || scaleY != 1) {
          transformParts.push("scale(" + scaleX + ", " + scaleY + ")");
        }
        if (skewX != 0 || skewY != 0) {
          transformParts.push("skew(" + skewX + "deg, " + skewY + "deg)");
        }

        const transformValue = transformParts.length > 0 ? transformParts.join(" ") : "none";
        document.getElementById("previewBox").style.transform = transformValue;

        generateCode(transformParts, perspective);
      }

      function updateOrigin() {
        const originX = document.getElementById("originX").value;
        const originY = document.getElementById("originY").value;

        document.getElementById("originXValue").textContent = originX + "%";
        document.getElementById("originYValue").textContent = originY + "%";

        document.getElementById("previewBox").style.transformOrigin =
          originX + "% " + originY + "%";

        document
          .querySelectorAll(".origin-preset-btn")
          .forEach((btn) => btn.classList.remove("active"));

        updateTransform();
      }

      function setOrigin(x, y) {
        document.getElementById("originX").value = parseInt(x);
        document.getElementById("originY").value = parseInt(y);

        document.querySelectorAll(".origin-preset-btn").forEach((btn) => {
          btn.classList.remove("active");
          if (btn.onclick.toString().includes(x) && btn.onclick.toString().includes(y)) {
            btn.classList.add("active");
          }
        });

        updateOrigin();
      }

      function generateCode(transformParts, perspective) {
        const originX = document.getElementById("originX").value;
        const originY = document.getElementById("originY").value;

        let css = ".container {\n";
        css += "  perspective: " + perspective + "px;\n";
        css += "}\n\n";
        css += ".element {\n";

        if (transformParts.length > 0) {
          css += "  transform: " + transformParts.join("\n             ") + ";\n";
        } else {
          css += "  transform: none;\n";
        }

        if (originX != 50 || originY != 50) {
          css += "  transform-origin: " + originX + "% " + originY + "%;\n";
        }

        css += "  transform-style: preserve-3d;\n";
        css += "}";

        document.getElementById("codeOutput").textContent = css;
      }

      window.resetControl = function (id, defaultValue) {
        document.getElementById(id).value = defaultValue;
        updateTransform();
      };

      window.resetAll = function () {
        Object.keys(defaults).forEach((key) => {
          const el = document.getElementById(key);
          if (el) el.value = defaults[key];
        });

        document
          .querySelectorAll(".origin-preset-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.querySelectorAll(".origin-preset-btn")[4].classList.add("active");

        updateOrigin();
        updateTransform();
      };

      window.applyPreset = function (preset) {
        resetAll();

        switch (preset) {
          case "flip":
            document.getElementById("scaleX").value = -1;
            break;
          case "flipV":
            document.getElementById("scaleY").value = -1;
            break;
          case "rotate45":
            document.getElementById("rotate").value = 45;
            break;
          case "scale2x":
            document.getElementById("scaleX").value = 2;
            document.getElementById("scaleY").value = 2;
            break;
          case "skew":
            document.getElementById("skewX").value = 20;
            document.getElementById("skewY").value = 10;
            break;
          case "perspective":
            document.getElementById("perspective").value = 500;
            document.getElementById("rotateY").value = 45;
            break;
          case "card3d":
            document.getElementById("perspective").value = 600;
            document.getElementById("rotateX").value = 20;
            document.getElementById("rotateY").value = -30;
            break;
          case "swing":
            document.getElementById("rotate").value = 15;
            setOrigin("50%", "0%");
            break;
        }

        updateTransform();
      };

      window.copyCode = function () {
        const code = document.getElementById("codeOutput").textContent;
        navigator.clipboard.writeText(code).then(() => {
          const btn = document.querySelector(".copy-btn");
          btn.textContent = "已复制!";
          setTimeout(() => {
            btn.textContent = "复制代码";
          }, 2000);
        });
      };

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        html.setAttribute("data-theme", currentTheme === "light" ? "dark" : "light");
      };

      updateTransform();
    </script>
  </body>
</html>

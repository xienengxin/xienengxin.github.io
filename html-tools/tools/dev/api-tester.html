  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      API测试工具
    </nav>
    <div class="container">
      <h1>🔌 API测试工具</h1>
      <div class="card">
        <div class="input-row">
          <select class="method-select" id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
            <option value="DELETE">DELETE</option>
          </select>
          <input
            type="text"
            class="url-input"
            id="url"
            placeholder="输入API地址..."
            value="https://jsonplaceholder.typicode.com/posts/1"
          />
          <button class="btn" onclick="sendRequest()">发送请求</button>
        </div>
        <div class="tabs">
          <button class="tab active" onclick="switchTab('headers')">请求头</button>
          <button class="tab" onclick="switchTab('body')">请求体</button>
          <button class="tab" onclick="switchTab('params')">参数</button>
        </div>
        <div class="tab-content active" id="headers-tab">
          <div id="headers-list">
            <div class="header-row">
              <input type="text" placeholder="键" value="Content-Type" />
              <input type="text" placeholder="值" value="application/json" />
              <button onclick="this.parentElement.remove()">删除</button>
            </div>
          </div>
          <button class="add-header" onclick="addHeader()">+ 添加请求头</button>
        </div>
        <div class="tab-content" id="body-tab">
          <textarea id="requestBody" placeholder='{"key": "value"}'></textarea>
        </div>
        <div class="tab-content" id="params-tab">
          <div id="params-list"></div>
          <button class="add-header" onclick="addParam()">+ 添加参数</button>
        </div>
      </div>
      <div class="card response" id="response" style="display: none">
        <div class="response-header">
          <span class="status" id="status">200 OK</span>
          <span class="response-time" id="responseTime">0ms</span>
        </div>
        <div class="response-body">
          <pre id="responseBody"></pre>
        </div>
      </div>
    </div>
    <script>
      function switchTab(tab) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((t) => t.classList.remove("active"));
        document.querySelector(`.tab-content#${tab}-tab`).classList.add("active");
        event.target.classList.add("active");
      }
      function addHeader() {
        const html = `<div class="header-row"><input type="text" placeholder="键"><input type="text" placeholder="值"><button onclick="this.parentElement.remove()">删除</button></div>`;
        document.getElementById("headers-list").insertAdjacentHTML("beforeend", html);
      }
      function addParam() {
        const html = `<div class="header-row"><input type="text" placeholder="键"><input type="text" placeholder="值"><button onclick="this.parentElement.remove()">删除</button></div>`;
        document.getElementById("params-list").insertAdjacentHTML("beforeend", html);
      }
      async function sendRequest() {
        const method = document.getElementById("method").value;
        let url = document.getElementById("url").value;
        const headers = {};
        document.querySelectorAll("#headers-list .header-row").forEach((row) => {
          const inputs = row.querySelectorAll("input");
          if (inputs[0].value && inputs[1].value) headers[inputs[0].value] = inputs[1].value;
        });
        const params = new URLSearchParams();
        document.querySelectorAll("#params-list .header-row").forEach((row) => {
          const inputs = row.querySelectorAll("input");
          if (inputs[0].value) params.append(inputs[0].value, inputs[1].value);
        });
        if (params.toString()) url += "?" + params.toString();
        const options = { method, headers };
        if (["POST", "PUT", "PATCH"].includes(method)) {
          options.body = document.getElementById("requestBody").value;
        }
        const startTime = Date.now();
        try {
          const response = await fetch(url, options);
          const endTime = Date.now();
          const statusEl = document.getElementById("status");
          statusEl.textContent = `${response.status} ${response.statusText}`;
          statusEl.className = "status " + (response.ok ? "success" : "error");
          document.getElementById("responseTime").textContent = `${endTime - startTime}ms`;
          const text = await response.text();
          try {
            const json = JSON.parse(text);
            document.getElementById("responseBody").textContent = JSON.stringify(json, null, 2);
          } catch {
            document.getElementById("responseBody").textContent = text;
          }
          document.getElementById("response").style.display = "block";
        } catch (error) {
          document.getElementById("status").textContent = "Error";
          document.getElementById("status").className = "status error";
          document.getElementById("responseBody").textContent = error.message;
          document.getElementById("response").style.display = "block";
        }
      }
    </script>

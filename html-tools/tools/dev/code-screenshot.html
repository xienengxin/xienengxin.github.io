      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {

        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;

        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);

        /* 圆角 */

        --nav-height: 56px;

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);

        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);

        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);

        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        transition: all var(--transition-normal);
      }

      .back-link:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--color-accent-cyan), var(--accent-blue));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
      }

      @media (max-width: 900px) {
        .main-layout {
          grid-template-columns: 1fr;
        }
      }

      /* 控制面板 */
      .control-panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px;
        height: fit-content;
        position: sticky;
        top: 24px;
      }

      .control-section {
        margin-bottom: 20px;
      }

      .control-section:last-child {
        margin-bottom: 0;
      }

      .control-section h3 {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .control-row {
        margin-bottom: 12px;
      }

      .control-row label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: block;
        margin-bottom: 6px;
      }

      input[type="range"] {
        width: 100%;
        height: 6px;
        background: var(--bg-input);
        border-radius: 3px;
        outline: none;
        -webkit-appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--color-accent-cyan);
        border-radius: 50%;
        cursor: pointer;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 10px 12px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        outline: none;
      }

      input[type="text"]:focus,
      input[type="number"]:focus {
        border-color: var(--color-accent-cyan);
      }

      select {
        width: 100%;
        padding: 10px 12px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        outline: none;
      }

      select:focus {
        border-color: var(--color-accent-cyan);
      }

      .gradient-presets {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .gradient-btn {
        width: 100%;
        aspect-ratio: 1;
        border: 2px solid transparent;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .gradient-btn:hover {
        transform: scale(1.1);
      }

      .gradient-btn.active {
        border-color: var(--color-accent-cyan);
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-accent-cyan);
      }

      .checkbox-row span {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--color-text-secondary);
      }

      /* 编辑区域 */
      .editor-panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        display: flex;
        flex-direction: column;
      }

      .editor-toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      button {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 10px 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-normal);
        white-space: nowrap;
      }

      button:hover {
        background: var(--bg-card-hover);
        color: var(--color-text-primary);
        border-color: var(--color-accent-cyan);
      }

      button.primary {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      button.primary:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }

      /* 代码输入区 */
      .code-input-wrapper {
        margin-bottom: 20px;
      }

      #code-input {
        width: 100%;
        min-height: 200px;
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1.5;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        resize: vertical;
        outline: none;
        tab-size: 2;
      }

      #code-input:focus {
        border-color: var(--color-accent-cyan);
      }

      /* 预览区域 */
      .preview-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .preview-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      .preview-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 300px;
        background: repeating-conic-gradient(
            var(--color-bg-surface) 0% 25%,
            var(--color-bg-deep) 0% 50%
          )
          50% / 20px 20px;
        border-radius: var(--radius-md);
        overflow: auto;
        padding: 40px;
      }

      /* 代码窗口样式 */
      .code-window {
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .window-header {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: #1e1e2e;
      }

      .window-dots {
        display: flex;
        gap: 8px;
      }

      .window-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .window-dot.red {
        background: #ff5f56;
      }
      .window-dot.yellow {
        background: #ffbd2e;
      }
      .window-dot.green {
        background: #27ca40;
      }

      .window-title {
        flex: 1;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 12px;
        color: #888;
        margin: 0 16px;
      }

      .window-body {
        padding: 20px;
        background: #1e1e2e;
        overflow-x: auto;
      }

      .window-body pre {
        margin: 0;
        font-family: var(--code-font, "JetBrains Mono"), monospace;
        font-size: var(--code-font-size, 14px);
        line-height: 1.6;
      }

      .window-body code {
        font-family: inherit;
        background: none !important;
        padding: 0 !important;
      }

      /* 行号 */
      .line-numbers {
        display: inline-block;
        text-align: right;

    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script>
      // 状态
      const state = {
        code: "",
        language: "javascript",
        theme: "one-dark",
        gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
        padding: 48,
        fontSize: 14,
        fontFamily: "JetBrains Mono",
        windowTitle: "",
        showDots: true,
        showLineNumbers: true
      };

      // 主题颜色配置
      const themes = {
        dracula: { bg: "#282a36", header: "#21222c", text: "#f8f8f2" },
        monokai: { bg: "#272822", header: "#1e1f1a", text: "#f8f8f2" },
        nord: { bg: "#2e3440", header: "#242933", text: "#d8dee9" },
        "github-dark": { bg: "#0d1117", header: "#010409", text: "#c9d1d9" },
        "one-dark": { bg: "#282c34", header: "#21252b", text: "#abb2bf" },
        "solarized-dark": { bg: "#002b36", header: "#001f27", text: "#839496" },
        material: { bg: "#263238", header: "#1e272c", text: "#eeffff" },
        synthwave: { bg: "#2b213a", header: "#241b31", text: "#f92aad" }
      };

      // 语言映射
      const languageMap = {
        dockerfile: "docker",
        vue: "markup"
      };

      // DOM 元素
      const codeInput = document.getElementById("code-input");
      const codePreview = document.getElementById("code-preview");
      const previewContainer = document.getElementById("preview-container");
      const messageEl = document.getElementById("message");

      // 控制元素
      const languageSelect = document.getElementById("language");
      const themeSelect = document.getElementById("theme");
      const paddingInput = document.getElementById("padding");
      const fontSizeInput = document.getElementById("font-size");
      const fontFamilySelect = document.getElementById("font-family");
      const windowTitleInput = document.getElementById("window-title");
      const showDotsCheck = document.getElementById("show-dots");
      const showLineNumbersCheck = document.getElementById("show-line-numbers");
      const gradientBtns = document.querySelectorAll(".gradient-btn");

      // 值显示
      const paddingValue = document.getElementById("padding-value");
      const fontSizeValue = document.getElementById("font-size-value");

      // 按钮
      const pasteBtn = document.getElementById("paste-btn");
      const sampleBtn = document.getElementById("sample-btn");
      const copyBtn = document.getElementById("copy-btn");
      const downloadBtn = document.getElementById("download-btn");
      const downloadSvgBtn = document.getElementById("download-svg-btn");
      const shareBtn = document.getElementById("share-btn");

      // 渲染预览
      function render() {
        const code = codeInput.value || "// 在上方输入代码";
        const lang = languageMap[state.language] || state.language;
        const theme = themes[state.theme];

        // 高亮代码
        let highlightedCode;
        try {
          highlightedCode = Prism.highlight(
            code,
            Prism.languages[lang] || Prism.languages.javascript,
            lang
          );
        } catch (e) {
          highlightedCode = escapeHtml(code);
        }

        // 生成行号
        const lines = code.split("\n");
        let lineNumbers = "";
        if (state.showLineNumbers) {
          lineNumbers = `<span class="line-numbers">${lines.map((_, i) => i + 1).join("\n")}</span>`;
        }

        // 生成窗口标题
        const title = state.windowTitle || getDefaultTitle(state.language);

        // 生成HTML
        const html = `
        <div class="code-window theme-${state.theme}" style="--code-font: '${state.fontFamily}'; --code-font-size: ${state.fontSize}px;">
          <div class="window-header" style="background: ${theme.header}; ${!state.showDots && !title ? "display: none;" : ""}">
            ${
              state.showDots
                ? `
              <div class="window-dots">
                <span class="window-dot red"></span>
                <span class="window-dot yellow"></span>
                <span class="window-dot green"></span>
              </div>
            `
                : "<div></div>"
            }
            <div class="window-title">${title}</div>
            <div style="width: 52px;"></div>
          </div>
          <div class="window-body" style="background: ${theme.bg}; color: ${theme.text}; padding: 20px;">
            <pre style="display: flex;">${lineNumbers}<code class="language-${lang}">${highlightedCode}</code></pre>
          </div>
        </div>
      `;

        codePreview.innerHTML = html;

        // 设置背景
        if (state.gradient === "transparent") {
          previewContainer.style.background =
            "repeating-conic-gradient(var(--color-bg-surface) 0% 25%, var(--color-bg-deep) 0% 50%) 50% / 20px 20px";
        } else {
          previewContainer.style.background = state.gradient;
        }
        previewContainer.style.padding = state.padding + "px";
      }

      // 获取默认标题
      function getDefaultTitle(lang) {
        const extensions = {
          javascript: "script.js",
          typescript: "script.ts",
          python: "script.py",
          java: "Main.java",
          cpp: "main.cpp",
          c: "main.c",
          csharp: "Program.cs",
          go: "main.go",
          rust: "main.rs",
          ruby: "script.rb",
          php: "index.php",
          swift: "main.swift",
          kotlin: "Main.kt",
          sql: "query.sql",
          html: "index.html",
          css: "style.css",
          json: "data.json",
          yaml: "config.yaml",
          bash: "script.sh",
          dockerfile: "Dockerfile",
          markdown: "README.md"
        };
        return extensions[lang] || "untitled";
      }

      // HTML转义
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // 显示消息
      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + type;
        setTimeout(() => {
          messageEl.className = "message";
        }, 3000);
      }

      // 复制图片到剪贴板
      async function copyImage() {
        try {
          const canvas = await html2canvas(codePreview.querySelector(".code-window"), {
            backgroundColor: state.gradient === "transparent" ? null : undefined,
            scale: 2
          });

          canvas.toBlob(async (blob) => {
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            showMessage("已复制到剪贴板", "success");
          });
        } catch (err) {
          showMessage("复制失败: " + err.message, "error");
        }
      }

      // 下载PNG
      async function downloadPng() {
        try {
          // 创建带背景的容器
          const wrapper = document.createElement("div");
          wrapper.style.cssText = `
          display: inline-block;
          padding: ${state.padding}px;
          background: ${state.gradient === "transparent" ? "transparent" : state.gradient};
        `;
          wrapper.appendChild(codePreview.querySelector(".code-window").cloneNode(true));
          document.body.appendChild(wrapper);

          const canvas = await html2canvas(wrapper, {
            backgroundColor: state.gradient === "transparent" ? null : undefined,
            scale: 2
          });

          document.body.removeChild(wrapper);

          const url = canvas.toDataURL("image/png");
          const a = document.createElement("a");
          a.href = url;
          a.download = `code-screenshot-${Date.now()}.png`;
          a.click();
          showMessage("图片已下载", "success");
        } catch (err) {
          showMessage("下载失败: " + err.message, "error");
        }
      }

      // 下载SVG
      function downloadSvg() {
        try {
          const codeWindow = codePreview.querySelector(".code-window");
          const rect = codeWindow.getBoundingClientRect();
          const width = rect.width + state.padding * 2;
          const height = rect.height + state.padding * 2;

          // 简化的SVG导出
          const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <foreignObject x="${state.padding}" y="${state.padding}" width="${rect.width}" height="${rect.height}">
    <div xmlns="http://www.w3.org/1999/xhtml">
      ${codeWindow.outerHTML}
    </div>
  </foreignObject>
</svg>`;

          const blob = new Blob([svg], { type: "image/svg+xml" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `code-screenshot-${Date.now()}.svg`;
          a.click();
          URL.revokeObjectURL(url);
          showMessage("SVG已下载", "success");
        } catch (err) {
          showMessage("下载失败: " + err.message, "error");
        }
      }

      // 分享链接
      function shareLink() {
        const data = {
          c: codeInput.value,
          l: state.language,
          t: state.theme,
          g: state.gradient,
          p: state.padding,
          f: state.fontSize,
          ff: state.fontFamily,
          wt: state.windowTitle,
          sd: state.showDots,
          sln: state.showLineNumbers
        };
        const hash = btoa(encodeURIComponent(JSON.stringify(data)));
        const url = location.origin + location.pathname + "#" + hash;
        navigator.clipboard.writeText(url).then(() => {
          showMessage("链接已复制到剪贴板", "success");
        });
        history.replaceState(null, "", "#" + hash);
      }

      // 从URL加载状态
      function loadFromUrl() {
        const hash = location.hash.slice(1);
        if (!hash) return;
        try {
          const data = JSON.parse(decodeURIComponent(atob(hash)));
          if (data.c) codeInput.value = data.c;
          if (data.l) {
            state.language = data.l;
            languageSelect.value = data.l;
          }
          if (data.t) {
            state.theme = data.t;
            themeSelect.value = data.t;
          }
          if (data.g) {
            state.gradient = data.g;
            gradientBtns.forEach((btn) => {
              btn.classList.toggle("active", btn.dataset.gradient === data.g);
            });
          }
          if (data.p) {
            state.padding = data.p;
            paddingInput.value = data.p;
            paddingValue.textContent = data.p + "px";
          }
          if (data.f) {
            state.fontSize = data.f;
            fontSizeInput.value = data.f;
            fontSizeValue.textContent = data.f + "px";
          }
          if (data.ff) {
            state.fontFamily = data.ff;
            fontFamilySelect.value = data.ff;
          }
          if (data.wt) {
            state.windowTitle = data.wt;
            windowTitleInput.value = data.wt;
          }
          if (typeof data.sd !== "undefined") {
            state.showDots = data.sd;
            showDotsCheck.checked = data.sd;
          }
          if (typeof data.sln !== "undefined") {
            state.showLineNumbers = data.sln;
            showLineNumbersCheck.checked = data.sln;
          }
        } catch (e) {
          console.error("Failed to load from URL", e);
        }
      }

      // 示例代码
      const sampleCodes = {
        javascript: `function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

// 计算前10个斐波那契数
for (let i = 0; i < 10; i++) {
  console.log(\`F(\${i}) = \${fibonacci(i)}\`);
}`,
        python: `def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

# 测试
print(quicksort([3, 6, 8, 10, 1, 2, 1]))`,
        go: `package main

import "fmt"

func main() {
    messages := make(chan string)

    go func() {
        messages <- "Hello, World!"
    }()

    msg := <-messages
    fmt.Println(msg)
}`,
        rust: `fn main() {
    let numbers = vec![1, 2, 3, 4, 5];
    
    let sum: i32 = numbers
        .iter()
        .filter(|&x| x % 2 == 0)
        .map(|x| x * 2)
        .sum();
    
    println!("Sum: {}", sum);
}`
      };

      function loadSampleCode() {
        const lang = state.language;
        codeInput.value = sampleCodes[lang] || sampleCodes.javascript;
        render();
      }

      // 粘贴代码
      async function pasteCode() {
        try {
          const text = await navigator.clipboard.readText();
          codeInput.value = text;
          render();
          showMessage("代码已粘贴", "success");
        } catch (err) {
          showMessage("粘贴失败: " + err.message, "error");
        }
      }

      // 事件监听
      codeInput.addEventListener("input", render);

      languageSelect.addEventListener("change", (e) => {
        state.language = e.target.value;
        render();
      });

      themeSelect.addEventListener("change", (e) => {
        state.theme = e.target.value;
        render();
      });

      paddingInput.addEventListener("input", (e) => {
        state.padding = parseInt(e.target.value);
        paddingValue.textContent = state.padding + "px";
        render();
      });

      fontSizeInput.addEventListener("input", (e) => {
        state.fontSize = parseInt(e.target.value);
        fontSizeValue.textContent = state.fontSize + "px";
        render();
      });

      fontFamilySelect.addEventListener("change", (e) => {
        state.fontFamily = e.target.value;
        render();
      });

      windowTitleInput.addEventListener("input", (e) => {
        state.windowTitle = e.target.value;
        render();
      });

      showDotsCheck.addEventListener("change", (e) => {
        state.showDots = e.target.checked;
        render();
      });

      showLineNumbersCheck.addEventListener("change", (e) => {
        state.showLineNumbers = e.target.checked;
        render();
      });

      gradientBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          gradientBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          state.gradient = btn.dataset.gradient;
          render();
        });
      });

      pasteBtn.addEventListener("click", pasteCode);
      sampleBtn.addEventListener("click", loadSampleCode);
      copyBtn.addEventListener("click", copyImage);
      downloadBtn.addEventListener("click", downloadPng);
      downloadSvgBtn.addEventListener("click", downloadSvg);
      shareBtn.addEventListener("click", shareLink);

      // 初始化
      loadFromUrl();
      render();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

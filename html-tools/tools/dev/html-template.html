<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 模板生成器 - WebUtils</title>
    <meta name="keywords" content="HTML 模板生成器, 工具, 在线, 实用" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      :root {
        --primary: #06b6d4;
        --primary-hover: #0891b2;
      }
      body {
        padding: 1rem;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .main-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 1rem;
      }
      @media (max-width: 768px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        background: var(--pico-card-background-color);
        border-radius: 8px;
        padding: 1rem;
      }
      .section {
        margin-bottom: 1rem;
      }
      .section-title {
        font-weight: 600;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        color: var(--pico-muted-color);
      }
      label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        cursor: pointer;
      }
      label input[type="checkbox"] {
        margin: 0;
      }
      select,
      input[type="text"] {
        padding: 0.5rem;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }
      .template-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .template-btn {
        padding: 0.75rem 1rem;
        text-align: left;
        background: var(--pico-card-background-color);
        border: 2px solid var(--pico-muted-border-color);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .template-btn:hover {
        border-color: var(--accent-cyan);
      }
      .template-btn.active {
        border-color: var(--accent-cyan);
        background: rgba(6, 182, 212, 0.1);
      }
      .template-btn strong {
        display: block;
        margin-bottom: 0.25rem;
      }
      .template-btn small {
        color: var(--pico-muted-color);
      }
      .output-area {
        position: relative;
      }
      .output-area textarea {
        min-height: 500px;
        font-family: Monaco, Menlo, monospace;
        font-size: 0.85rem;
      }
      .btn-group {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .btn-group button {
        flex: 1;
        padding: 0.5rem;
        font-size: 0.85rem;
      }
      .preview-frame {
        width: 100%;
        height: 500px;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 4px;
        background: white;
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .tabs button {
        padding: 0.5rem 1rem;
        border: none;
        background: none;
        cursor: pointer;
        border-bottom: 2px solid transparent;
      }
      .tabs button.active {
        border-bottom-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .tag-input {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.5rem;
        background: var(--accent-cyan);
        color: white;
        border-radius: 4px;
        font-size: 0.8rem;
      }
      .tag button {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0;
        font-size: 1rem;
        line-height: 1;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      HTML 模板生成器
    </nav>
    <div class="container">
      <header>
        <h1>📄 HTML 模板生成器</h1>
        <button id="themeToggle" class="outline">🌙</button>
      </header>

      <div class="main-grid">
        <div class="panel">
          <div class="section">
            <div class="section-title">选择模板</div>
            <div class="template-list">
              <button class="template-btn active" data-template="basic">
                <strong>基础 HTML5</strong>
                <small>简洁的 HTML5 骨架</small>
              </button>
              <button class="template-btn" data-template="landing">
                <strong>Landing Page</strong>
                <small>营销落地页模板</small>
              </button>
              <button class="template-btn" data-template="form">
                <strong>表单页面</strong>
                <small>登录/注册表单模板</small>
              </button>
              <button class="template-btn" data-template="dashboard">
                <strong>Dashboard</strong>
                <small>管理后台布局</small>
              </button>
              <button class="template-btn" data-template="blog">
                <strong>博客文章</strong>
                <small>文章页面模板</small>
              </button>
              <button class="template-btn" data-template="email">
                <strong>邮件模板</strong>
                <small>兼容性邮件 HTML</small>
              </button>
            </div>
          </div>

          <div class="section">
            <div class="section-title">页面信息</div>
            <input type="text" id="pageTitle" placeholder="页面标题" value="我的页面" />
            <input type="text" id="pageDesc" placeholder="页面描述" />
            <input type="text" id="pageAuthor" placeholder="作者" />
          </div>

          <div class="section">
            <div class="section-title">功能选项</div>
            <label>
              <input type="checkbox" id="optViewport" checked />
              Viewport Meta
            </label>
            <label>
              <input type="checkbox" id="optCharset" checked />
              UTF-8 编码
            </label>
            <label>
              <input type="checkbox" id="optFavicon" />
              Favicon
            </label>
            <label>
              <input type="checkbox" id="optOG" />
              Open Graph 标签
            </label>
            <label>
              <input type="checkbox" id="optTwitter" />
              Twitter Card
            </label>
            <label>
              <input type="checkbox" id="optCanonical" />
              Canonical URL
            </label>
          </div>

          <div class="section">
            <div class="section-title">CSS 框架</div>
            <select id="cssFramework">
              <option value="none">无</option>
              <option value="pico">Pico CSS</option>
              <option value="bootstrap">Bootstrap 5</option>
              <option value="tailwind">Tailwind CSS</option>
              <option value="bulma">Bulma</option>
              <option value="normalize">Normalize.css</option>
            </select>
          </div>

          <div class="section">
            <div class="section-title">JS 库</div>
            <label>
              <input type="checkbox" id="libAlpine" />
              Alpine.js
            </label>
            <label>
              <input type="checkbox" id="libVue" />
              Vue 3 CDN
            </label>
            <label>
              <input type="checkbox" id="libJQuery" />
              jQuery
            </label>
            <label>
              <input type="checkbox" id="libAxios" />
              Axios
            </label>
          </div>

          <button id="generateBtn" style="width: 100%">生成代码</button>
        </div>

        <div class="panel output-area">
          <div class="tabs">
            <button class="active" data-tab="code">代码</button>
            <button data-tab="preview">预览</button>
          </div>
          <div id="codeTab">
            <div class="btn-group">
              <button id="copyBtn">📋 复制</button>
              <button id="downloadBtn">💾 下载</button>
              <button id="formatBtn">🎨 格式化</button>
            </div>
            <textarea id="output" readonly></textarea>
          </div>
          <div id="previewTab" style="display: none">
            <iframe id="previewFrame" class="preview-frame"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script>
      const templates = {
        basic: () => `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    ${getMeta()}
    <title>${getTitle()} - WebUtils</title>
    ${getCSS()}
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>${getTitle()}</h1>
    <p>欢迎访问我的页面。</p>
    ${getJS()}
</body>
</html>`,

        landing: () => `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    ${getMeta()}
    <title>${getTitle()} - WebUtils</title>
    ${getCSS()}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.25rem; margin-bottom: 2rem; opacity: 0.9; }
        .btn { display: inline-block; padding: 1rem 2rem; background: white; color: #667eea; text-decoration: none; border-radius: 8px; font-weight: 600; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .features { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .features h2 { text-align: center; margin-bottom: 3rem; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .feature { text-align: center; padding: 2rem; border-radius: 8px; background: #f8f9fa; }
        .feature-icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <section class="hero">
        <h1>${getTitle()}</h1>
        <p>${getDesc() || "打造卓越产品，提升用户体验"}</p>
        <a href="#features" class="btn">了解更多</a>

      // Helper functions
      function getTitle() {
        return document.getElementById("pageTitle").value || "我的页面";
      }
      function getDesc() {
        return document.getElementById("pageDesc").value;
      }
      function getAuthor() {
        return document.getElementById("pageAuthor").value;
      }

      function getMeta() {
        let meta = [];
        if (document.getElementById("optCharset").checked) meta.push('<meta charset="UTF-8">');
        if (document.getElementById("optViewport").checked)
          meta.push('<meta name="viewport" content="width=device-width, initial-scale=1.0">');
        if (getDesc()) meta.push(`<meta name="description" content="${getDesc()}">`);
        if (getAuthor()) meta.push(`<meta name="author" content="${getAuthor()}">`);
        if (document.getElementById("optFavicon").checked)
          meta.push('<link rel="icon" href="/favicon.ico">');
        if (document.getElementById("optCanonical").checked)
          meta.push('<link rel="canonical" href="https://example.com/">');
        if (document.getElementById("optOG").checked) {
          meta.push(`<meta property="og:title" content="${getTitle()}">`);
          meta.push(`<meta property="og:description" content="${getDesc() || ""}">`);
          meta.push('<meta property="og:type" content="website">');
          meta.push('<meta property="og:url" content="https://example.com/">');
        }
        if (document.getElementById("optTwitter").checked) {
          meta.push('<meta name="twitter:card" content="summary_large_image">');
          meta.push(`<meta name="twitter:title" content="${getTitle()}">`);
          meta.push(`<meta name="twitter:description" content="${getDesc() || ""}">`);
        }
        return meta.join("\n    ");
      }

      function getCSS() {
        const framework = document.getElementById("cssFramework").value;
        const cssLinks = {
          pico: '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">',
          bootstrap:
            '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css">',
          tailwind: '<script src="https://cdn.tailwindcss.com"><\/script>',
          bulma:
            '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9/css/bulma.min.css">',
          normalize:
            '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8/normalize.min.css">'
        };
        return cssLinks[framework] || "";
      }

      function getJS() {
        let scripts = [];
        if (document.getElementById("libAlpine").checked)
          scripts.push(
            '<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"><\/script>'
          );
        if (document.getElementById("libVue").checked)
          scripts.push(
            '<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.min.js"><\/script>'
          );
        if (document.getElementById("libJQuery").checked)
          scripts.push(
            '<script src="https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js"><\/script>'
          );
        if (document.getElementById("libAxios").checked)
          scripts.push(
            '<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"><\/script>'
          );
        if (document.getElementById("cssFramework").value === "bootstrap")
          scripts.push(
            '<script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"><\/script>'
          );
        return scripts.join("\n    ");
      }

      let currentTemplate = "basic";

      window.generate = function () {
        const output = templates[currentTemplate]();
        document.getElementById("output").value = output;
        updatePreview(output);
      };

      window.updatePreview = function (html) {
        const iframe = document.getElementById("previewFrame");
        iframe.srcdoc = html;
      };

      // Event listeners
      document.querySelectorAll(".template-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".template-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentTemplate = btn.dataset.template;
          generate();
        });
      });

      document.querySelectorAll(".tabs button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const tab = btn.dataset.tab;
          document.getElementById("codeTab").style.display = tab === "code" ? "block" : "none";
          document.getElementById("previewTab").style.display =
            tab === "preview" ? "block" : "none";
        });
      });

      document.getElementById("generateBtn").addEventListener("click", generate);

      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(document.getElementById("output").value);
        document.getElementById("copyBtn").textContent = "✓ 已复制";
        setTimeout(() => (document.getElementById("copyBtn").textContent = "📋 复制"), 2000);
      });

      document.getElementById("downloadBtn").addEventListener("click", () => {
        const blob = new Blob([document.getElementById("output").value], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "template.html";
        a.click();
      });

      document.getElementById("formatBtn").addEventListener("click", () => {
        const textarea = document.getElementById("output");
        let html = textarea.value;
        let formatted = "";
        let indent = 0;
        html.split(/>\s*</).forEach((element, i) => {
          if (i > 0) element = "<" + element;
          if (i < html.split(/>\s*</).length - 1) element = element + ">";
          if (element.match(/^<\/\w/)) indent--;
          formatted += "  ".repeat(Math.max(0, indent)) + element.trim() + "\n";
          if (element.match(/^<\w[^>]*[^\/]>.*$/)) indent++;
        });
        textarea.value = formatted.trim();
      });

      // Theme toggle
      const theme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", theme);
      document.getElementById("themeToggle").textContent = theme === "dark" ? "☀️" : "🌙";

      document.getElementById("themeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        document.getElementById("themeToggle").textContent = next === "dark" ? "☀️" : "🌙";
      });

      // Auto-generate on input changes
      ["pageTitle", "pageDesc", "pageAuthor", "cssFramework"].forEach((id) => {
        document.getElementById(id).addEventListener("input", generate);
      });
      document.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
        cb.addEventListener("change", generate);
      });

      // Initial generation
      generate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

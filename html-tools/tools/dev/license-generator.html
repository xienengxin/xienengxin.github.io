          name: "The Unlicense",
          desc: "放弃所有版权，进入公共领域",
          permissions: ["商业使用", "修改", "分发", "私人使用"],
          conditions: [],
          limitations: ["无责任担保"],
          text: `This is free and unencumbered software released into the public domain.

Anyone is free to copy, modify, publish, use, compile, sell, or
distribute this software, either in source code form or as a compiled
binary, for any purpose, commercial or non-commercial, and by any
means.

In jurisdictions that recognize copyright laws, the author or authors
of this software dedicate any and all copyright interest in the
software to the public domain. We make this dedication for the benefit
of the public at large and to the detriment of our heirs and
successors. We intend this dedication to be an overt act of
relinquishment in perpetuity of all present and future rights to this
software under copyright law.

THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND,
EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF
MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT.

ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR
OTHER DEALINGS IN THE SOFTWARE.

For more information, please refer to <https://unlicense.org>`
        }
      };

      let currentLicense = "MIT";

      function renderLicenseList() {
        const list = document.getElementById("licenseList");
        list.innerHTML = Object.entries(licenses)
          .map(
            ([key, l]) => `
        <button class="license-btn ${key === currentLicense ? "active" : ""}" data-license="${key}">
            <strong>${l.name}</strong>
            <small>${l.desc}</small>
        </button>
    `
          )
          .join("");
        list.querySelectorAll(".license-btn").forEach((btn) => {
          btn.onclick = () => {
            currentLicense = btn.dataset.license;
            renderLicenseList();
            generate();
          };
        });
      }

      window.generate = function () {
        const l = licenses[currentLicense];
        const year = document.getElementById("year").value || new Date().getFullYear();
        const author = document.getElementById("authorName").value || "[Your Name]";
        let text = l.text.replace(/\[YEAR\]/g, year).replace(/\[AUTHOR\]/g, author);
        document.getElementById("output").value = text;
        document.getElementById("licenseInfo").innerHTML = `
        <strong>${l.name}</strong><br>
        <span style="color:green">✓ ${l.permissions.join(" ✓ ")}</span><br>
        ${l.conditions.length ? `<span style="color:orange">⚠ ${l.conditions.join(" ⚠ ")}</span><br>` : ""}
        <span style="color:red">✕ ${l.limitations.join(" ✕ ")}</span>
    `;
      };

      window.copy = function () {
        navigator.clipboard.writeText(document.getElementById("output").value);
        event.target.textContent = "✓ 已复制";
        setTimeout(() => (event.target.textContent = "📋 复制"), 2000);
      };

      window.download = function () {
        const blob = new Blob([document.getElementById("output").value], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "LICENSE";
        a.click();
      };

      document.getElementById("year").value = new Date().getFullYear();
      ["authorName", "projectName", "year"].forEach((id) => {
        document.getElementById(id).addEventListener("input", generate);
      });

      const theme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", theme);
      document.getElementById("themeToggle").textContent = theme === "dark" ? "☀️" : "🌙";
      document.getElementById("themeToggle").onclick = () => {
        const next =
          document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        document.getElementById("themeToggle").textContent = next === "dark" ? "☀️" : "🌙";
      };

      renderLicenseList();
      generate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

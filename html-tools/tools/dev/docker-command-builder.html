    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;

        --radius-md: 8px;

          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

        --border-strong: #d5d5d5;

      * {
        box-sizing: border-box;
      }

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>Docker 命令生成器</h1>
      <p class="desc">可视化生成 Docker 常用命令</p>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="showPanel('run')">运行容器</button>
          <button class="tab" onclick="showPanel('build')">构建镜像</button>
          <button class="tab" onclick="showPanel('exec')">执行命令</button>
          <button class="tab" onclick="showPanel('compose')">Compose</button>
          <button class="tab" onclick="showPanel('image')">镜像管理</button>
          <button class="tab" onclick="showPanel('container')">容器管理</button>
        </div>

        <!-- Run Panel -->
        <div class="panel active" id="panel-run">
          <div class="form-row">
            <div class="form-group">
              <label>镜像名称</label>
              <input
                type="text"
                id="run-image"
                placeholder="nginx:latest"
                oninput="buildRun()"
                value="nginx:latest"
              />
            </div>
            <div class="form-group">
              <label>容器名称</label>
              <input type="text" id="run-name" placeholder="my-container" oninput="buildRun()" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>端口映射 (host:container)</label>
              <input
                type="text"
                id="run-ports"
                placeholder="8080:80, 443:443"
                oninput="buildRun()"
              />
            </div>
            <div class="form-group">
              <label>卷挂载 (host:container)</label>
              <input
                type="text"
                id="run-volumes"
                placeholder="/data:/app/data"
                oninput="buildRun()"
              />
            </div>
          </div>
          <div class="form-group">
            <label>环境变量 (KEY=VALUE, 每行一个)</label>
            <textarea
              id="run-env"
              placeholder="NODE_ENV=production&#10;DEBUG=true"
              oninput="buildRun()"
            ></textarea>
          </div>
          <div class="form-group">
            <label>选项</label>
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="run-detach" checked onchange="buildRun()" />
                后台运行 (-d)
              </label>
              <label>
                <input type="checkbox" id="run-rm" onchange="buildRun()" />
                退出后删除 (--rm)
              </label>
              <label>
                <input type="checkbox" id="run-it" onchange="buildRun()" />
                交互模式 (-it)
              </label>
              <label>
                <input type="checkbox" id="run-restart" onchange="buildRun()" />
                自动重启
              </label>
            </div>
          </div>
          <div class="form-group">
            <label>自定义命令 (可选)</label>
            <input
              type="text"
              id="run-cmd"
              placeholder="/bin/sh -c 'echo hello'"
              oninput="buildRun()"
            />
          </div>
        </div>

        <!-- Build Panel -->
        <div class="panel" id="panel-build">
          <div class="form-row">
            <div class="form-group">
              <label>镜像标签</label>
              <input
                type="text"
                id="build-tag"
                placeholder="myapp:v1.0"
                oninput="buildBuild()"
                value="myapp:latest"
              />
            </div>
            <div class="form-group">
              <label>Dockerfile 路径</label>
              <input
                type="text"
                id="build-file"
                placeholder="./Dockerfile"
                oninput="buildBuild()"
              />
            </div>
          </div>
          <div class="form-group">
            <label>构建上下文</label>
            <input
              type="text"
              id="build-context"
              placeholder="."
              oninput="buildBuild()"
              value="."
            />
          </div>
          <div class="form-group">
            <label>构建参数 (KEY=VALUE)</label>
            <textarea
              id="build-args"
              placeholder="VERSION=1.0&#10;ENV=prod"
              oninput="buildBuild()"
            ></textarea>
          </div>
          <div class="form-group">
            <label>选项</label>
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="build-no-cache" onchange="buildBuild()" />
                不使用缓存
              </label>
              <label>
                <input type="checkbox" id="build-pull" onchange="buildBuild()" />
                总是拉取基础镜像
              </label>
            </div>
          </div>
        </div>

        <!-- Exec Panel -->
        <div class="panel" id="panel-exec">
          <div class="form-group">
            <label>容器名称/ID</label>
            <input
              type="text"
              id="exec-container"
              placeholder="my-container"
              oninput="buildExec()"
            />
          </div>
          <div class="form-group">
            <label>命令</label>
            <input
              type="text"
              id="exec-cmd"
              placeholder="/bin/bash"
              oninput="buildExec()"
              value="/bin/bash"
            />
          </div>
          <div class="form-group">
            <label>选项</label>
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="exec-it" checked onchange="buildExec()" />
                交互模式 (-it)
              </label>
              <label>
                <input type="checkbox" id="exec-user" onchange="buildExec()" />
                指定用户
              </label>
            </div>
          </div>
          <div class="form-group" id="exec-user-input" style="display: none">
            <label>用户</label>
            <input type="text" id="exec-user-name" placeholder="root" oninput="buildExec()" />
          </div>
        </div>

        <!-- Compose Panel -->
        <div class="panel" id="panel-compose">
          <div class="form-group">
            <label>操作</label>
            <select id="compose-action" onchange="buildCompose()">
              <option value="up">启动 (up)</option>
              <option value="down">停止 (down)</option>
              <option value="build">构建 (build)</option>
              <option value="logs">日志 (logs)</option>
              <option value="ps">状态 (ps)</option>
              <option value="restart">重启 (restart)</option>
            </select>
          </div>
          <div class="form-group">
            <label>文件路径</label>
            <input
              type="text"
              id="compose-file"
              placeholder="docker-compose.yml"
              oninput="buildCompose()"
            />
          </div>
          <div class="form-group">
            <label>服务名称 (可选)</label>
            <input type="text" id="compose-service" placeholder="web" oninput="buildCompose()" />
          </div>
          <div class="form-group">
            <label>选项</label>
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="compose-detach" checked onchange="buildCompose()" />
                后台运行 (-d)
              </label>
              <label>
                <input type="checkbox" id="compose-build" onchange="buildCompose()" />
                构建镜像 (--build)
              </label>
              <label>
                <input type="checkbox" id="compose-follow" onchange="buildCompose()" />
                跟踪日志 (-f)
              </label>
            </div>
          </div>
        </div>

        <!-- Image Panel -->
        <div class="panel" id="panel-image">
          <div class="form-group">
            <label>操作</label>
            <select id="image-action" onchange="buildImage()">
              <option value="pull">拉取 (pull)</option>
              <option value="push">推送 (push)</option>
              <option value="tag">标记 (tag)</option>
              <option value="rmi">删除 (rmi)</option>
              <option value="ls">列表 (images)</option>
              <option value="prune">清理 (prune)</option>
            </select>
          </div>
          <div class="form-group" id="image-name-group">
            <label>镜像名称</label>
            <input type="text" id="image-name" placeholder="nginx:latest" oninput="buildImage()" />
          </div>
          <div class="form-group" id="image-new-tag-group" style="display: none">
            <label>新标签</label>
            <input
              type="text"
              id="image-new-tag"
              placeholder="myregistry/nginx:v1"
              oninput="buildImage()"
            />
          </div>
        </div>

        <!-- Container Panel -->
        <div class="panel" id="panel-container">
          <div class="form-group">
            <label>操作</label>
            <select id="container-action" onchange="buildContainer()">
              <option value="start">启动 (start)</option>
              <option value="stop">停止 (stop)</option>
              <option value="restart">重启 (restart)</option>
              <option value="rm">删除 (rm)</option>
              <option value="logs">日志 (logs)</option>
              <option value="ps">列表 (ps)</option>
              <option value="inspect">详情 (inspect)</option>
            </select>
          </div>
          <div class="form-group" id="container-name-group">
            <label>容器名称/ID</label>
            <input
              type="text"
              id="container-name"
              placeholder="my-container"
              oninput="buildContainer()"
            />
          </div>
          <div class="form-group">
            <label>选项</label>
            <div class="checkbox-group">
              <label>
                <input type="checkbox" id="container-force" onchange="buildContainer()" />
                强制 (-f)
              </label>
              <label>
                <input type="checkbox" id="container-all" onchange="buildContainer()" />
                包含已停止 (-a)
              </label>
              <label>
                <input type="checkbox" id="container-follow" onchange="buildContainer()" />
                跟踪日志 (-f)
              </label>
            </div>
          </div>
        </div>

        <div class="result">
          <div class="label">生成的命令</div>
          <div class="command" id="command">docker run -d nginx:latest</div>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="copyCommand()">复制命令</button>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      let currentPanel = "run";

      function showPanel(name) {
        currentPanel = name;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("panel-" + name).classList.add("active");

        const builders = {
          run: buildRun,
          build: buildBuild,
          exec: buildExec,
          compose: buildCompose,
          image: buildImage,
          container: buildContainer
        };
        if (builders[name]) builders[name]();
      }

      function setCommand(cmd) {
        document.getElementById("command").textContent = cmd;
      }

      function buildRun() {
        const image = document.getElementById("run-image").value.trim() || "<image>";
        const name = document.getElementById("run-name").value.trim();
        const ports = document.getElementById("run-ports").value.trim();
        const volumes = document.getElementById("run-volumes").value.trim();
        const env = document.getElementById("run-env").value.trim();
        const detach = document.getElementById("run-detach").checked;
        const rm = document.getElementById("run-rm").checked;
        const it = document.getElementById("run-it").checked;
        const restart = document.getElementById("run-restart").checked;
        const cmd = document.getElementById("run-cmd").value.trim();

        let command = "docker run";
        if (detach) command += " -d";
        if (rm) command += " --rm";
        if (it) command += " -it";
        if (restart) command += " --restart=unless-stopped";
        if (name) command += ` --name ${name}`;

        if (ports) {
          ports.split(",").forEach((p) => {
            command += ` -p ${p.trim()}`;
          });
        }

        if (volumes) {
          volumes.split(",").forEach((v) => {
            command += ` -v ${v.trim()}`;
          });
        }

        if (env) {
          env.split("\n").forEach((e) => {
            if (e.trim()) command += ` -e ${e.trim()}`;
          });
        }

        command += ` ${image}`;
        if (cmd) command += ` ${cmd}`;

        setCommand(command);
      }

      function buildBuild() {
        const tag = document.getElementById("build-tag").value.trim() || "<tag>";
        const file = document.getElementById("build-file").value.trim();
        const context = document.getElementById("build-context").value.trim() || ".";
        const args = document.getElementById("build-args").value.trim();
        const noCache = document.getElementById("build-no-cache").checked;
        const pull = document.getElementById("build-pull").checked;

        let command = "docker build";
        command += ` -t ${tag}`;
        if (file) command += ` -f ${file}`;
        if (noCache) command += " --no-cache";
        if (pull) command += " --pull";

        if (args) {
          args.split("\n").forEach((a) => {
            if (a.trim()) command += ` --build-arg ${a.trim()}`;
          });
        }

        command += ` ${context}`;
        setCommand(command);
      }

      function buildExec() {
        const container = document.getElementById("exec-container").value.trim() || "<container>";
        const cmd = document.getElementById("exec-cmd").value.trim() || "/bin/bash";
        const it = document.getElementById("exec-it").checked;
        const userEnabled = document.getElementById("exec-user").checked;
        const user = document.getElementById("exec-user-name").value.trim();

        document.getElementById("exec-user-input").style.display = userEnabled ? "block" : "none";

        let command = "docker exec";
        if (it) command += " -it";
        if (userEnabled && user) command += ` -u ${user}`;
        command += ` ${container} ${cmd}`;

        setCommand(command);
      }

      function buildCompose() {
        const action = document.getElementById("compose-action").value;
        const file = document.getElementById("compose-file").value.trim();
        const service = document.getElementById("compose-service").value.trim();
        const detach = document.getElementById("compose-detach").checked;
        const build = document.getElementById("compose-build").checked;
        const follow = document.getElementById("compose-follow").checked;

        let command = "docker compose";
        if (file) command += ` -f ${file}`;
        command += ` ${action}`;

        if (action === "up") {
          if (detach) command += " -d";
          if (build) command += " --build";
        }
        if (action === "logs" && follow) command += " -f";

        if (service) command += ` ${service}`;
        setCommand(command);
      }

      function buildImage() {
        const action = document.getElementById("image-action").value;
        const name = document.getElementById("image-name").value.trim();
        const newTag = document.getElementById("image-new-tag").value.trim();

        document.getElementById("image-name-group").style.display = ["ls", "prune"].includes(action)
          ? "none"
          : "block";
        document.getElementById("image-new-tag-group").style.display =
          action === "tag" ? "block" : "none";

        let command = "docker";
        switch (action) {
          case "pull":
            command += ` pull ${name || "<image>"}`;
            break;
          case "push":
            command += ` push ${name || "<image>"}`;
            break;
          case "tag":
            command += ` tag ${name || "<image>"} ${newTag || "<new-tag>"}`;
            break;
          case "rmi":
            command += ` rmi ${name || "<image>"}`;
            break;
          case "ls":
            command += " images";
            break;
          case "prune":
            command += " image prune -a";
            break;
        }

        setCommand(command);
      }

      function buildContainer() {
        const action = document.getElementById("container-action").value;
        const name = document.getElementById("container-name").value.trim();
        const force = document.getElementById("container-force").checked;
        const all = document.getElementById("container-all").checked;
        const follow = document.getElementById("container-follow").checked;

        document.getElementById("container-name-group").style.display =
          action === "ps" ? "none" : "block";

        let command = "docker";
        switch (action) {
          case "start":
          case "stop":
          case "restart":
            command += ` ${action} ${name || "<container>"}`;
            break;
          case "rm":
            command += ` rm${force ? " -f" : ""} ${name || "<container>"}`;
            break;
          case "logs":
            command += ` logs${follow ? " -f" : ""} ${name || "<container>"}`;
            break;
          case "ps":
            command += ` ps${all ? " -a" : ""}`;
            break;
          case "inspect":
            command += ` inspect ${name || "<container>"}`;
            break;
        }

        setCommand(command);
      }

      function copyCommand() {
        const cmd = document.getElementById("command").textContent;
        navigator.clipboard.writeText(cmd);
      }

      buildRun();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

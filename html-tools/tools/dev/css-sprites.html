              min="0"
              max="50"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-item">
            <label for="input-css----">CSS类名前缀</label>
            <input
              type="text"
              id="prefix"
              value="sprite"
              style="
                padding: 0.75rem;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-subtle);
                border-radius: 0.5rem;
                color: var(--color-text-primary);
              "
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
          </div>
          <div class="setting-item">
            <label>输出格式</label>
            <select id="format">
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="webp">WebP</option>
            </select>
          </div>
        </div>
      </div>

      <div class="images-section" id="imagesSection" style="display: none">
        <div class="images-header">
          <h3>
            📷 已添加的图片 (
            <span id="imageCount">0</span>
            )
          </h3>
          <div>
            <button class="btn btn-secondary" onclick="clearImages()" aria-label="清空">
              清空
            </button>
            <button class="btn" onclick="generateSprite()" aria-label="生成雪碧图">
              生成雪碧图
            </button>
          </div>
        </div>
        <div class="images-grid" id="imagesGrid"></div>
      </div>

      <div class="output-section" id="outputSection">
        <div class="output-header">
          <h3>📤 输出结果</h3>
          <div class="output-tabs">
            <button class="tab-btn active" onclick="switchTab('preview')" aria-label="预览">
              预览
            </button>
            <button class="tab-btn" onclick="switchTab('css')" aria-label="CSS代码">CSS代码</button>
            <button class="tab-btn" onclick="switchTab('html')" aria-label="HTML示例">
              HTML示例
            </button>
          </div>
        </div>
        <div class="output-content">
          <div class="tab-content active" id="previewTab">
            <div class="sprite-preview" id="spritePreview"></div>
            <div class="actions">
              <button class="btn" onclick="downloadSprite()" aria-label="下载雪碧图">
                下载雪碧图
              </button>
            </div>
          </div>
          <div class="tab-content" id="cssTab">
            <div class="code-block" id="cssCode"></div>
            <div class="actions">
              <button class="btn" onclick="copyCSS()" aria-label="复制CSS">复制CSS</button>
            </div>
          </div>
          <div class="tab-content" id="htmlTab">
            <div class="code-block" id="htmlCode"></div>
            <div class="actions">
              <button class="btn" onclick="copyHTML()" aria-label="复制HTML">复制HTML</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      let images = [];
      let spriteCanvas = null;
      let spriteData = [];

      // File input handling
      document.getElementById("fileInput").addEventListener("change", handleFiles);

      // Drag and drop
      const uploadSection = document.getElementById("uploadSection");
      uploadSection.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadSection.classList.add("dragover");
      });
      uploadSection.addEventListener("dragleave", () => {
        uploadSection.classList.remove("dragover");
      });
      uploadSection.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadSection.classList.remove("dragover");
        handleFiles({ target: { files: e.dataTransfer.files } });
      });

      function handleFiles(e) {
        const files = Array.from(e.target.files).filter((f) => f.type.startsWith("image/"));

        files.forEach((file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              images.push({
                name: file.name.replace(/\.[^/.]+$/, ""),
                img: img,
                width: img.width,
                height: img.height
              });
              renderImages();
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function renderImages() {
        const section = document.getElementById("imagesSection");
        const grid = document.getElementById("imagesGrid");
        const count = document.getElementById("imageCount");

        if (images.length === 0) {
          section.style.display = "none";
          return;
        }

        section.style.display = "block";
        count.textContent = images.length;

        grid.innerHTML = images
          .map(
            (img, i) => `
                <div class="image-item">
                    <button class="image-remove" onclick="removeImage(${i})" aria-label="×">×</button>
                    <img src="${img.img.src}" alt="${img.name}">
                    <div class="image-name">${img.name}</div>
                </div>
            `
          )
          .join("");
      }

      window.removeImage = function (index) {
        images.splice(index, 1);
        renderImages();
      };

      window.clearImages = function () {
        images = [];
        renderImages();
        document.getElementById("outputSection").classList.remove("visible");
      };

      window.generateSprite = function () {
        if (images.length === 0) {
          alert("请先添加图片");
          return;
        }

        const layout = document.getElementById("layout").value;
        const padding = parseInt(document.getElementById("padding").value) || 0;
        const prefix = document.getElementById("prefix").value || "sprite";
        const format = document.getElementById("format").value;

        spriteData = [];
        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");

        if (layout === "horizontal") {
          // Horizontal layout
          let totalWidth = images.reduce((sum, img) => sum + img.width + padding, -padding);
          let maxHeight = Math.max(...images.map((img) => img.height));

          canvas.width = totalWidth;
          canvas.height = maxHeight;

          let x = 0;
          images.forEach((img, i) => {
            ctx.drawImage(img.img, x, 0);
            spriteData.push({
              name: img.name,
              x: x,
              y: 0,
              width: img.width,
              height: img.height
            });
            x += img.width + padding;
          });
        } else if (layout === "vertical") {
          // Vertical layout
          let maxWidth = Math.max(...images.map((img) => img.width));
          let totalHeight = images.reduce((sum, img) => sum + img.height + padding, -padding);

          canvas.width = maxWidth;
          canvas.height = totalHeight;

          let y = 0;
          images.forEach((img, i) => {
            ctx.drawImage(img.img, 0, y);
            spriteData.push({
              name: img.name,
              x: 0,
              y: y,
              width: img.width,
              height: img.height
            });
            y += img.height + padding;
          });
        } else {
          // Packed layout (simple row-based packing)
          const maxWidth = 512;
          let rows = [];
          let currentRow = { images: [], width: 0, height: 0 };

          images.forEach((img) => {
            if (currentRow.width + img.width + padding > maxWidth && currentRow.images.length > 0) {
              rows.push(currentRow);
              currentRow = { images: [], width: 0, height: 0 };
            }
            currentRow.images.push(img);
            currentRow.width += img.width + padding;
            currentRow.height = Math.max(currentRow.height, img.height);
          });
          if (currentRow.images.length > 0) rows.push(currentRow);

          let totalWidth = Math.max(...rows.map((r) => r.width - padding));
          let totalHeight = rows.reduce((sum, r) => sum + r.height + padding, -padding);

          canvas.width = totalWidth;
          canvas.height = totalHeight;

          let y = 0;
          rows.forEach((row) => {
            let x = 0;
            row.images.forEach((img) => {
              ctx.drawImage(img.img, x, y);
              spriteData.push({
                name: img.name,
                x: x,
                y: y,
                width: img.width,
                height: img.height
              });
              x += img.width + padding;
            });
            y += row.height + padding;
          });
        }

        spriteCanvas = canvas;

        // Show output
        const outputSection = document.getElementById("outputSection");
        outputSection.classList.add("visible");

        // Preview
        document.getElementById("spritePreview").innerHTML =
          `<img src="${canvas.toDataURL("image/" + format)}">`;

        // Generate CSS
        let css = `.${prefix} {\n  background-image: url('sprite.${format}');\n  background-repeat: no-repeat;\n}\n\n`;
        spriteData.forEach((item) => {
          const className = item.name.replace(/[^a-zA-Z0-9_-]/g, "-");
          css += `.${prefix}-${className} {\n`;
          css += `  width: ${item.width}px;\n`;
          css += `  height: ${item.height}px;\n`;
          css += `  background-position: -${item.x}px -${item.y}px;\n`;
          css += "}\n\n";
        });
        document.getElementById("cssCode").textContent = css;

        // Generate HTML
        let html = "<!-- 使用示例 -->\n";
        spriteData.forEach((item) => {
          const className = item.name.replace(/[^a-zA-Z0-9_-]/g, "-");
          html += `<span class="${prefix} ${prefix}-${className}"></span>\n`;
        });
        document.getElementById("htmlCode").textContent = html;

        // Switch to preview tab
        switchTab("preview");
      };

      window.switchTab = function (tab) {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));

        document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add("active");
        document.getElementById(tab + "Tab").classList.add("active");
      };

      window.downloadSprite = function () {
        if (!spriteCanvas) return;

        const format = document.getElementById("format").value;
        const link = document.createElement("a");
        link.download = `sprite.${format}`;
        link.href = spriteCanvas.toDataURL("image/" + format);
        link.click();
      };

      window.copyCSS = function () {
        navigator.clipboard.writeText(document.getElementById("cssCode").textContent);
        alert("CSS代码已复制");
      };

      window.copyHTML = function () {
        navigator.clipboard.writeText(document.getElementById("htmlCode").textContent);
        alert("HTML代码已复制");
      };
    </script>
  </body>
</html>

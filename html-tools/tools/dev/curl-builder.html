      :root {

        position: fixed;

      .form-group {

      .form-group select,
      .form-group textarea {

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>cURL 命令生成器</h1>
      <p class="desc">可视化生成 cURL HTTP 请求命令</p>

      <div class="card">
        <div class="form-group">
          <label>请求方法和 URL</label>
          <div class="method-url">
            <select id="method" onchange="buildCurl()">
              <option value="GET">GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
              <option value="HEAD">HEAD</option>
              <option value="OPTIONS">OPTIONS</option>
            </select>
            <input
              type="text"
              id="url"
              placeholder="https://api.example.com/endpoint"
              oninput="buildCurl()"
              value="https://api.example.com/users"
            />
          </div>
        </div>

        <div class="form-group">
          <label>请求头</label>
          <div class="headers-list" id="headersList">
            <div class="header-row">
              <input
                type="text"
                placeholder="Header 名称"
                value="Content-Type"
                oninput="buildCurl()"
              />
              <input
                type="text"
                placeholder="Header 值"
                value="application/json"
                oninput="buildCurl()"
              />
              <button class="delete-btn" onclick="removeHeader(this)">×</button>
            </div>
            <div class="header-row">
              <input
                type="text"
                placeholder="Header 名称"
                value="Authorization"
                oninput="buildCurl()"
              />
              <input
                type="text"
                placeholder="Header 值"
                value="Bearer YOUR_TOKEN"
                oninput="buildCurl()"
              />
              <button class="delete-btn" onclick="removeHeader(this)">×</button>
            </div>
          </div>
          <button class="add-btn" onclick="addHeader()">+ 添加请求头</button>
        </div>

        <div class="form-group">
          <label>请求体 (JSON)</label>
          <textarea id="body" placeholder='"key": "value"' oninput="buildCurl()">
{"name": "John", "email": "john@example.com"}</textarea
          >
        </div>

        <div class="form-group">
          <label>认证</label>
          <div class="form-row">
            <select id="authType" onchange="buildCurl()">
              <option value="none">无</option>
              <option value="basic">Basic Auth</option>
              <option value="bearer">Bearer Token</option>
            </select>
            <input
              type="text"
              id="authValue"
              placeholder="用户名:密码 或 Token"
              oninput="buildCurl()"
            />
          </div>
        </div>

        <div class="form-group">
          <label>选项</label>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="optVerbose" onchange="buildCurl()" />
              详细输出 (-v)
            </label>
            <label>
              <input type="checkbox" id="optInsecure" onchange="buildCurl()" />
              忽略 SSL (-k)
            </label>
            <label>
              <input type="checkbox" id="optLocation" checked onchange="buildCurl()" />
              跟随重定向 (-L)
            </label>
            <label>
              <input type="checkbox" id="optSilent" onchange="buildCurl()" />
              静默模式 (-s)
            </label>
            <label>
              <input type="checkbox" id="optOutput" onchange="buildCurl()" />
              输出到文件
            </label>
          </div>
        </div>

        <div class="form-group" id="outputFileGroup" style="display: none">
          <label>输出文件名</label>
          <input type="text" id="outputFile" placeholder="response.json" oninput="buildCurl()" />
        </div>

        <div class="form-group">
          <label>超时设置 (秒)</label>
          <input
            type="number"
            id="timeout"
            placeholder="不限制"
            oninput="buildCurl()"
            style="width: 150px"
          />
        </div>

        <div class="result">
          <div class="label">生成的 cURL 命令</div>
          <div class="command" id="command">curl -X GET "https://api.example.com/users"</div>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="copyCommand()">复制命令</button>
          <button class="btn" onclick="resetForm()">重置</button>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function getHeaders() {
        const rows = document.querySelectorAll("#headersList .header-row");
        const headers = [];
        rows.forEach((row) => {
          const inputs = row.querySelectorAll("input");
          const name = inputs[0].value.trim();
          const value = inputs[1].value.trim();
          if (name && value) {
            headers.push({ name, value });
          }
        });
        return headers;
      }

      function addHeader() {
        const list = document.getElementById("headersList");
        const row = document.createElement("div");
        row.className = "header-row";
        row.innerHTML = `
        <input type="text" placeholder="Header 名称" oninput="buildCurl()" />
        <input type="text" placeholder="Header 值" oninput="buildCurl()" />
        <button class="delete-btn" onclick="removeHeader(this)">×</button>
      `;
        list.appendChild(row);
      }

      function removeHeader(btn) {
        btn.parentElement.remove();
        buildCurl();
      }

      function buildCurl() {
        const method = document.getElementById("method").value;
        const url = document.getElementById("url").value.trim();
        const body = document.getElementById("body").value.trim();
        const authType = document.getElementById("authType").value;
        const authValue = document.getElementById("authValue").value.trim();
        const headers = getHeaders();

        const verbose = document.getElementById("optVerbose").checked;
        const insecure = document.getElementById("optInsecure").checked;
        const location = document.getElementById("optLocation").checked;
        const silent = document.getElementById("optSilent").checked;
        const outputEnabled = document.getElementById("optOutput").checked;
        const outputFile = document.getElementById("outputFile").value.trim();
        const timeout = document.getElementById("timeout").value.trim();

        document.getElementById("outputFileGroup").style.display = outputEnabled ? "block" : "none";

        let parts = ["curl"];

        // Method (skip for GET)
        if (method !== "GET") {
          parts.push(`-X ${method}`);
        }

        // Options
        if (verbose) parts.push("-v");
        if (insecure) parts.push("-k");
        if (location) parts.push("-L");
        if (silent) parts.push("-s");

        // Timeout
        if (timeout) {
          parts.push(`--max-time ${timeout}`);
        }

        // Auth
        if (authType === "basic" && authValue) {
          parts.push(`-u "${authValue}"`);
        } else if (authType === "bearer" && authValue) {
          parts.push(`-H "Authorization: Bearer ${authValue}"`);
        }

        // Headers
        headers.forEach((h) => {
          parts.push(`-H "${h.name}: ${h.value}"`);
        });

        // Body
        if (body && ["POST", "PUT", "PATCH"].includes(method)) {
          const escapedBody = body.replace(/"/g, '\\"');
          parts.push(`-d "${escapedBody}"`);
        }

        // Output file
        if (outputEnabled && outputFile) {
          parts.push(`-o ${outputFile}`);
        }

        // URL
        parts.push(`"${url || "https://example.com"}"`);

        document.getElementById("command").textContent = parts.join(" \\\n  ");
      }

      function copyCommand() {
        const cmd = document.getElementById("command").textContent.replace(/\\\n\s+/g, " ");
        navigator.clipboard.writeText(cmd);
      }

      function resetForm() {
        document.getElementById("method").value = "GET";
        document.getElementById("url").value = "";
        document.getElementById("body").value = "";
        document.getElementById("authType").value = "none";
        document.getElementById("authValue").value = "";
        document.getElementById("headersList").innerHTML = `
        <div class="header-row">
          <input type="text" placeholder="Header 名称" oninput="buildCurl()" />
          <input type="text" placeholder="Header 值" oninput="buildCurl()" />
          <button class="delete-btn" onclick="removeHeader(this)">×</button>
        </div>
      `;
        document.querySelectorAll(".checkbox-group input").forEach((cb) => (cb.checked = false));
        document.getElementById("optLocation").checked = true;
        document.getElementById("timeout").value = "";
        buildCurl();
      }

      buildCurl();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

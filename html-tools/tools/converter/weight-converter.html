  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      重量换算器
    </nav>
    <div class="container">
      <h1>⚖️ 重量换算器</h1>
      <div class="card">
        <div class="quick-values">
          <button class="quick-btn" onclick="setQuick(1, 'kg')" aria-label="1公斤">1公斤</button>
          <button class="quick-btn" onclick="setQuick(1, 'lb')" aria-label="1磅">1磅</button>
          <button class="quick-btn" onclick="setQuick(1, 'jin')" aria-label="1斤">1斤</button>
          <button class="quick-btn" onclick="setQuick(1, 'oz')" aria-label="1盎司">1盎司</button>
          <button class="quick-btn" onclick="setQuick(100, 'g')" aria-label="100克">100克</button>
        </div>
        <div class="input-row">
          <input
            type="number"
            id="valueInput"
            value="1"
            oninput="convert()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          <select id="unitSelect" onchange="convert()">
            <option value="kg">千克 (kg)</option>
            <option value="g">克 (g)</option>
            <option value="mg">毫克 (mg)</option>
            <option value="t">吨 (t)</option>
            <option value="lb">磅 (lb)</option>
            <option value="oz">盎司 (oz)</option>
            <option value="jin">斤</option>
            <option value="liang">两</option>
            <option value="qian">钱</option>
          </select>
        </div>
        <h3>公制单位</h3>
        <div class="results" id="metricResults"></div>
        <h3>英制单位</h3>
        <div class="results" id="imperialResults"></div>
        <h3>市制单位</h3>
        <div class="results" id="chineseResults"></div>
      </div>
    </div>
    <script>
      const units = {
        t: { name: "吨", factor: 1000000, category: "metric" },
        kg: { name: "千克", factor: 1000, category: "metric" },
        g: { name: "克", factor: 1, category: "metric" },
        mg: { name: "毫克", factor: 0.001, category: "metric" },
        lb: { name: "磅", factor: 453.592, category: "imperial" },
        oz: { name: "盎司", factor: 28.3495, category: "imperial" },
        st: { name: "英石", factor: 6350.29, category: "imperial" },
        jin: { name: "斤", factor: 500, category: "chinese" },
        liang: { name: "两", factor: 50, category: "chinese" },
        qian: { name: "钱", factor: 5, category: "chinese" }
      };

      function setQuick(val, unit) {
        document.getElementById("valueInput").value = val;
        document.getElementById("unitSelect").value = unit;
        convert();
      }

      function convert() {
        const value = parseFloat(document.getElementById("valueInput").value) || 0;
        const fromUnit = document.getElementById("unitSelect").value;
        const grams = value * units[fromUnit].factor;

        function render(unitList, containerId) {
          document.getElementById(containerId).innerHTML = unitList
            .map((u) => {
              const result = grams / units[u].factor;
              return `<div class="result-row ${u === fromUnit ? "highlight" : ""}">
                        <span>${units[u].name} (${u})</span>
                        <span style="font-weight:bold;font-family:monospace">${formatNum(result)}</span>
                    </div>`;
            })
            .join("");
        }

        render(["t", "kg", "g", "mg"], "metricResults");
        render(["lb", "oz", "st"], "imperialResults");
        render(["jin", "liang", "qian"], "chineseResults");
      }

      function formatNum(n) {
        if (Math.abs(n) >= 1e6 || (Math.abs(n) < 0.0001 && n !== 0)) return n.toExponential(4);
        return Number.isInteger(n) ? n : n.toFixed(4).replace(/\.?0+$/, "");
      }

      convert();
    </script>

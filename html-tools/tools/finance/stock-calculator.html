    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>📈 股票收益计算器</h1>
      <p class="subtitle">计算股票投资盈亏、成本均价和收益率</p>

      <div class="card">
        <div class="card-title">买入信息</div>
        <div class="grid">
          <div class="form-group">
            <label>买入价格 (元/股)</label>
            <input
              type="number"
              id="buyPrice"
              placeholder="10.00"
              step="0.01"
              oninput="calculate()"
            />
          </div>
          <div class="form-group">
            <label>买入数量 (股)</label>
            <input type="number" id="buyQty" placeholder="1000" oninput="calculate()" />
          </div>
          <div class="form-group">
            <label>买入手续费率 (%)</label>
            <input type="number" id="buyFeeRate" value="0.025" step="0.001" oninput="calculate()" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">卖出信息</div>
        <div class="grid">
          <div class="form-group">
            <label>卖出价格 (元/股)</label>
            <input
              type="number"
              id="sellPrice"
              placeholder="12.00"
              step="0.01"
              oninput="calculate()"
            />
          </div>
          <div class="form-group">
            <label>卖出数量 (股)</label>
            <input type="number" id="sellQty" placeholder="1000" oninput="calculate()" />
          </div>
          <div class="form-group">
            <label>卖出手续费率 (%)</label>
            <input
              type="number"
              id="sellFeeRate"
              value="0.025"
              step="0.001"
              oninput="calculate()"
            />
          </div>
        </div>
        <div class="grid" style="margin-top: 8px">
          <div class="form-group">
            <label>印花税率 (%)</label>
            <input type="number" id="stampTax" value="0.05" step="0.01" oninput="calculate()" />
          </div>
          <div class="form-group">
            <label>过户费率 (%)</label>
            <input
              type="number"
              id="transferFee"
              value="0.001"
              step="0.0001"
              oninput="calculate()"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">计算结果</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">买入总成本</div>
            <div class="result-value" id="totalCost">-</div>
          </div>
          <div class="result-item">
            <div class="result-label">卖出总收入</div>
            <div class="result-value" id="totalRevenue">-</div>
          </div>
          <div class="result-item">
            <div class="result-label">总手续费</div>
            <div class="result-value" id="totalFees">-</div>
          </div>
          <div class="result-item">
            <div class="result-label">净盈亏</div>
            <div class="result-value" id="netProfit">-</div>
          </div>
          <div class="result-item">
            <div class="result-label">收益率</div>
            <div class="result-value" id="returnRate">-</div>
          </div>
          <div class="result-item">
            <div class="result-label">成本价</div>
            <div class="result-value" id="costPrice">-</div>
          </div>
        </div>

        <div class="tips">
          <h4>费用说明</h4>
          <ul>
            <li>佣金：买卖双向收取，最低5元，一般为成交金额的0.025%</li>
            <li>印花税：仅卖出时收取，税率为成交金额的0.05%（2023年8月下调）</li>
            <li>过户费：买卖双向收取，按成交金额的0.001%</li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      function calculate() {
        const buyPrice = parseFloat(document.getElementById("buyPrice").value) || 0;
        const buyQty = parseFloat(document.getElementById("buyQty").value) || 0;
        const buyFeeRate = parseFloat(document.getElementById("buyFeeRate").value) / 100 || 0;
        const sellPrice = parseFloat(document.getElementById("sellPrice").value) || 0;
        const sellQty = parseFloat(document.getElementById("sellQty").value) || 0;
        const sellFeeRate = parseFloat(document.getElementById("sellFeeRate").value) / 100 || 0;
        const stampTaxRate = parseFloat(document.getElementById("stampTax").value) / 100 || 0;
        const transferFeeRate = parseFloat(document.getElementById("transferFee").value) / 100 || 0;

        // 买入成本计算
        const buyAmount = buyPrice * buyQty;
        const buyFee = Math.max(buyAmount * buyFeeRate, 5); // 最低5元
        const buyTransfer = buyAmount * transferFeeRate;
        const totalCost = buyAmount + buyFee + buyTransfer;

        // 卖出收入计算
        const sellAmount = sellPrice * sellQty;
        const sellFee = Math.max(sellAmount * sellFeeRate, 5);
        const stampTax = sellAmount * stampTaxRate;
        const sellTransfer = sellAmount * transferFeeRate;
        const totalRevenue = sellAmount - sellFee - stampTax - sellTransfer;

        // 总费用
        const totalFees = buyFee + buyTransfer + sellFee + stampTax + sellTransfer;

        // 净盈亏
        const netProfit = totalRevenue - totalCost;

        // 收益率
        const returnRate = totalCost > 0 ? (netProfit / totalCost) * 100 : 0;

        // 成本价（含手续费）
        const costPrice = buyQty > 0 ? totalCost / buyQty : 0;

        const fmt = (n) =>
          n.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.getElementById("totalCost").textContent = "¥" + fmt(totalCost);
        document.getElementById("totalRevenue").textContent = "¥" + fmt(totalRevenue);
        document.getElementById("totalFees").textContent = "¥" + fmt(totalFees);

        const profitEl = document.getElementById("netProfit");
        profitEl.textContent = (netProfit >= 0 ? "+¥" : "-¥") + fmt(Math.abs(netProfit));
        profitEl.className = "result-value " + (netProfit >= 0 ? "profit" : "loss");

        const rateEl = document.getElementById("returnRate");
        rateEl.textContent = (returnRate >= 0 ? "+" : "") + returnRate.toFixed(2) + "%";
        rateEl.className = "result-value " + (returnRate >= 0 ? "profit" : "loss");

        document.getElementById("costPrice").textContent = "¥" + fmt(costPrice);
      }

      // 初始化
      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

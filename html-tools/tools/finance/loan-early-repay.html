        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;

        /* 辉光 */

        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);

        /* hover/elevated 替换为浅色调 */

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;

      [data-theme="light"] {
        --bg-deep: #fafafa;

        --bg-card: #fff;
        --bg-input: #f5f5f5;

        --border-strong: #d5d5d5;

        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

      *,

      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;

      body {
        font-family: var(--font-sans);

        min-height: 100vh;

      .bg-grid {

        inset: 0;

          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 700px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-green));

        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;

      .card-title {
        font-size: 1rem;
        font-weight: 500;

      .form-row {
        display: grid;

        gap: 1rem;

      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-group.full {
        grid-column: span 2;
      }
      .form-group label {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .form-group input,
      .form-group select {
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);

      .method-btn {

        border: 1px solid var(--border-subtle);

        transition: all 0.2s;

      .method-btn:hover {

      .method-btn.active {
        background: var(--color-accent-cyan);

      .method-name {

      }
      .method-desc {
        font-size: 0.75rem;

      }
      .result-card {

      .savings {

        font-size: 3rem;

      .savings-label {

        display: grid;

      .compare-col {

      .compare-header {
        font-size: 0.9rem;

      }
      @media (max-width: 600px) {
        .form-row,
        .compare-grid {
          grid-template-columns: 1fr;
        }
      }

    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">提前还贷计算器</span>
      </nav>

      <h1>提前还贷计算器</h1>
      <p class="subtitle">计算提前还款节省的利息</p>

      <div class="card">
        <div class="card-title">📋 贷款信息</div>
        <div class="form-row">
          <div class="form-group">
            <label for="input----------">贷款总额 (万元)</label>
            <input
              type="number"
              id="loanAmount"
              value="100"
              min="1"
              step="1"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">贷款期限 (年)</label>
            <input
              type="number"
              id="loanYears"
              value="30"
              min="1"
              max="30"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input--------">年利率 (%)</label>
            <input
              type="number"
              id="rate"
              value="4.9"
              min="0"
              max="20"
              step="0.01"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">已还期数 (月)</label>
            <input
              type="number"
              id="paidMonths"
              value="12"
              min="0"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <div class="form-group full">
          <label for="input------------">提前还款金额 (万元)</label>
          <input
            type="number"
            id="earlyAmount"
            value="20"
            min="0"
            step="1"
            oninput="calculate()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
      </div>

      <div class="card">
        <div class="card-title">🔧 还款方式</div>
        <div class="method-selector">
          <div class="method-btn active" onclick="setMethod('equal_payment')">
            <div class="method-name">等额本息</div>
            <div class="method-desc">每月还款额固定</div>
          </div>
          <div class="method-btn" onclick="setMethod('equal_principal')">
            <div class="method-name">等额本金</div>
            <div class="method-desc">每月还款额递减</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">💡 提前还款后选择</div>
        <div class="method-selector">
          <div class="method-btn active" onclick="setOption('reduce_years')">
            <div class="method-name">缩短期限</div>
            <div class="method-desc">月供不变，提前还清</div>
          </div>
          <div class="method-btn" onclick="setOption('reduce_payment')">
            <div class="method-name">减少月供</div>
            <div class="method-desc">期限不变，降低月供</div>
          </div>
        </div>
      </div>

      <div class="card result-card">
        <div class="card-title">📊 计算结果</div>
        <div class="savings">
          <div class="savings-value" id="totalSavings">¥0</div>
          <div class="savings-label">节省利息</div>
        </div>

        <div class="compare-grid">
          <div class="compare-col">
            <div class="compare-header">提前还款前</div>
            <div class="compare-item">
              <div class="compare-label">月供</div>
              <div class="compare-value" id="oldPayment">¥0</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余期数</div>
              <div class="compare-value" id="oldMonths">0月</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余本金</div>
              <div class="compare-value" id="oldPrincipal">¥0</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余利息</div>
              <div class="compare-value" id="oldInterest">¥0</div>
            </div>
          </div>

          <div class="compare-col">
            <div class="compare-header">提前还款后</div>
            <div class="compare-item">
              <div class="compare-label">月供</div>
              <div class="compare-value" id="newPayment" style="color: var(--accent-green)">¥0</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余期数</div>
              <div class="compare-value" id="newMonths" style="color: var(--accent-green)">0月</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余本金</div>
              <div class="compare-value" id="newPrincipal" style="color: var(--accent-green)">
                ¥0
              </div>
            </div>
            <div class="compare-item">
              <div class="compare-label">剩余利息</div>
              <div class="compare-value" id="newInterest" style="color: var(--accent-green)">
                ¥0
              </div>
            </div>
          </div>
        </div>

        <div class="tips">
          <div class="tips-title">💡 温馨提示</div>
          <div class="tips-content" id="tips">计算后显示建议...</div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let repayMethod = "equal_payment";
      let earlyOption = "reduce_years";

      function setMethod(method) {
        repayMethod = method;
        document
          .querySelectorAll(".method-selector")[0]
          .querySelectorAll(".method-btn")
          .forEach((btn, i) => {
            btn.classList.toggle(
              "active",
              (method === "equal_payment" && i === 0) || (method === "equal_principal" && i === 1)
            );
          });
        calculate();
      }

      function setOption(option) {
        earlyOption = option;
        document
          .querySelectorAll(".method-selector")[1]
          .querySelectorAll(".method-btn")
          .forEach((btn, i) => {
            btn.classList.toggle(
              "active",
              (option === "reduce_years" && i === 0) || (option === "reduce_payment" && i === 1)
            );
          });
        calculate();
      }

      function calculateEqualPayment(principal, rate, months) {
        const monthlyRate = rate / 12;
        const payment =
          (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) /
          (Math.pow(1 + monthlyRate, months) - 1);
        return payment;
      }

      function getRemainingPrincipal(loanAmount, rate, totalMonths, paidMonths, method) {
        const monthlyRate = rate / 12;

        if (method === "equal_payment") {
          const payment = calculateEqualPayment(loanAmount, rate, totalMonths);
          let remaining = loanAmount;

          for (let i = 0; i < paidMonths; i++) {
            const interest = remaining * monthlyRate;
            const principalPaid = payment - interest;
            remaining -= principalPaid;
          }

          return remaining;
        } else {
          const monthlyPrincipal = loanAmount / totalMonths;
          return loanAmount - monthlyPrincipal * paidMonths;
        }
      }

      function calculateTotalInterest(principal, rate, months, method) {
        const monthlyRate = rate / 12;
        let totalInterest = 0;

        if (method === "equal_payment") {
          const payment = calculateEqualPayment(principal, rate, months);
          totalInterest = payment * months - principal;
        } else {
          const monthlyPrincipal = principal / months;
          let remaining = principal;

          for (let i = 0; i < months; i++) {
            totalInterest += remaining * monthlyRate;
            remaining -= monthlyPrincipal;
          }
        }

        return totalInterest;
      }

      function calculate() {
        const loanAmount = parseFloat(document.getElementById("loanAmount").value) * 10000 || 0;
        const loanYears = parseInt(document.getElementById("loanYears").value) || 0;
        const rate = parseFloat(document.getElementById("rate").value) / 100 || 0;
        const paidMonths = parseInt(document.getElementById("paidMonths").value) || 0;
        const earlyAmount = parseFloat(document.getElementById("earlyAmount").value) * 10000 || 0;

        const totalMonths = loanYears * 12;
        const remainingMonths = totalMonths - paidMonths;

        // Before early repayment
        const remainingPrincipal = getRemainingPrincipal(
          loanAmount,
          rate,
          totalMonths,
          paidMonths,
          repayMethod
        );
        const oldInterest = calculateTotalInterest(
          remainingPrincipal,
          rate,
          remainingMonths,
          repayMethod
        );
        const oldPayment =
          repayMethod === "equal_payment"
            ? calculateEqualPayment(loanAmount, rate, totalMonths)
            : remainingPrincipal / remainingMonths + (remainingPrincipal * rate) / 12;

        // After early repayment
        const newPrincipal = Math.max(0, remainingPrincipal - earlyAmount);

        let newMonths, newPayment, newInterest;

        if (earlyOption === "reduce_years") {
          // Keep payment same, reduce years
          newPayment = oldPayment;
          // Calculate new months needed
          if (repayMethod === "equal_payment") {
            const monthlyRate = rate / 12;
            newMonths = Math.ceil(
              Math.log(newPayment / (newPayment - newPrincipal * monthlyRate)) /
                Math.log(1 + monthlyRate)
            );
          } else {
            const monthlyPrincipal = newPrincipal / remainingMonths;
            newMonths = Math.ceil(newPrincipal / (oldPayment - (newPrincipal * rate) / 12 / 2));
          }
          newMonths = Math.min(newMonths, remainingMonths);
        } else {
          // Keep years same, reduce payment
          newMonths = remainingMonths;
          newPayment =
            repayMethod === "equal_payment"
              ? calculateEqualPayment(newPrincipal, rate, newMonths)
              : newPrincipal / newMonths + (newPrincipal * rate) / 12;
        }

        newInterest = calculateTotalInterest(newPrincipal, rate, newMonths, repayMethod);

        const savings = oldInterest - newInterest;

        // Update display
        document.getElementById("totalSavings").textContent =
          "¥" + Math.round(savings).toLocaleString();

        document.getElementById("oldPayment").textContent =
          "¥" + Math.round(oldPayment).toLocaleString();
        document.getElementById("oldMonths").textContent = remainingMonths + "月";
        document.getElementById("oldPrincipal").textContent =
          "¥" + Math.round(remainingPrincipal).toLocaleString();
        document.getElementById("oldInterest").textContent =
          "¥" + Math.round(oldInterest).toLocaleString();

        document.getElementById("newPayment").textContent =
          "¥" + Math.round(newPayment).toLocaleString();
        document.getElementById("newMonths").textContent = newMonths + "月";
        document.getElementById("newPrincipal").textContent =
          "¥" + Math.round(newPrincipal).toLocaleString();
        document.getElementById("newInterest").textContent =
          "¥" + Math.round(newInterest).toLocaleString();

        // Generate tips
        generateTips(savings, earlyAmount, newMonths, remainingMonths, newPayment, oldPayment);
      }

      function generateTips(savings, earlyAmount, newMonths, oldMonths, newPayment, oldPayment) {
        const tips = [];

        tips.push(
          `💰 提前还款 ${(earlyAmount / 10000).toFixed(0)} 万元，节省利息 ${(savings / 10000).toFixed(1)} 万元`
        );

        if (earlyOption === "reduce_years") {
          const reducedMonths = oldMonths - newMonths;
          const years = Math.floor(reducedMonths / 12);
          const months = reducedMonths % 12;
          tips.push(
            `⏰ 提前 ${years > 0 ? years + "年" : ""}${months > 0 ? months + "个月" : ""} 还清贷款`
          );
        } else {
          const reduction = oldPayment - newPayment;
          tips.push(`📉 月供减少 ${Math.round(reduction).toLocaleString()} 元，减轻还款压力`);
        }

        tips.push("📋 提前还款可能需要支付违约金，建议咨询银行");
        tips.push("💡 如有更高收益投资机会，可考虑不提前还款");

        document.getElementById("tips").innerHTML = tips.join("<br>");
      }

      // Initialize
      calculate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

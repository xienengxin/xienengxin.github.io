  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#finance">财务工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">预算追踪</span>
      </nav>

      <h1>💰 预算追踪器</h1>
      <p class="subtitle">记录每一笔收支，掌握财务状况</p>

      <div class="summary">
        <div class="summary-card income">
          <div class="summary-label">总收入</div>
          <div class="summary-value" id="totalIncome">¥0</div>
        </div>
        <div class="summary-card expense">
          <div class="summary-label">总支出</div>
          <div class="summary-value" id="totalExpense">¥0</div>
        </div>
        <div class="summary-card balance">
          <div class="summary-label">结余</div>
          <div class="summary-value" id="balance">¥0</div>
        </div>
      </div>

      <div class="add-transaction">
        <input type="text" id="description" placeholder="描述" onkeypress="handleEnter(event)" />
        <input
          type="number"
          id="amount"
          placeholder="金额"
          min="0"
          step="0.01"
          onkeypress="handleEnter(event)"
        />
        <select id="type">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>
        <select id="category">
          <option value="工资">工资</option>
          <option value="餐饮">餐饮</option>
          <option value="交通">交通</option>
          <option value="购物">购物</option>
          <option value="娱乐">娱乐</option>
          <option value="医疗">医疗</option>
          <option value="其他">其他</option>
        </select>
        <button onclick="addTransaction()">+ 添加</button>
      </div>

      <div class="transactions-list" id="transactionsList">
        <div class="empty-state">暂无交易记录</div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_budget_v1";

      // HTML escape function to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
      let transactions = [];

      function loadTransactions() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          transactions = saved ? JSON.parse(saved) : [];
        } catch (e) {
          transactions = [];
        }
        render();
      }

      function saveTransactions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
      }

      function handleEnter(event) {
        if (event.key === "Enter") {
          addTransaction();
        }
      }

      function addTransaction() {
        const description = document.getElementById("description").value.trim();
        const amount = parseFloat(document.getElementById("amount").value);
        const type = document.getElementById("type").value;
        const category = document.getElementById("category").value;

        if (!description || !amount || amount <= 0) {
          alert("请输入描述和金额");
          return;
        }

        transactions.unshift({
          id: Date.now(),
          description,
          amount,
          type,
          category,
          date: new Date().toISOString()
        });

        document.getElementById("description").value = "";
        document.getElementById("amount").value = "";

        saveTransactions();
        render();
      }

      function deleteTransaction(id) {
        if (!confirm("确定要删除这条记录吗？")) return;
        transactions = transactions.filter((t) => t.id !== id);
        saveTransactions();
        render();
      }

      function render() {
        const container = document.getElementById("transactionsList");

        if (transactions.length === 0) {
          container.innerHTML = '<div class="empty-state">暂无交易记录</div>';
          updateSummary();
          return;
        }

        container.innerHTML = transactions
          .map(
            (t) => `
        <div class="transaction-item ${t.type}">
          <div class="transaction-info">
            <div class="transaction-desc">${escapeHtml(t.description)}</div>
            <div class="transaction-meta">
              ${t.category} · ${new Date(t.date).toLocaleDateString("zh-CN")}
            </div>
          </div>
          <div class="transaction-amount">
            ${t.type === "income" ? "+" : "-"}¥${t.amount.toFixed(2)}
          </div>
          <button class="transaction-delete" onclick="deleteTransaction(${t.id})">×</button>
        </div>
      `
          )
          .join("");

        updateSummary();
      }

      function updateSummary() {
        const income = transactions
          .filter((t) => t.type === "income")
          .reduce((sum, t) => sum + t.amount, 0);

        const expense = transactions
          .filter((t) => t.type === "expense")
          .reduce((sum, t) => sum + t.amount, 0);

        const balance = income - expense;

        document.getElementById("totalIncome").textContent = "¥" + income.toFixed(2);
        document.getElementById("totalExpense").textContent = "¥" + expense.toFixed(2);
        document.getElementById("balance").textContent = "¥" + balance.toFixed(2);
      }

      // Initialize
      loadTransactions();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

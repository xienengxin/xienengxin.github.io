      :root {

        --text-muted: #55556a;

        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;

        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

        margin: 0;
        padding: 0;
      }

      .back-link:hover {
        color: var(--accent-pink);
        background: var(--color-bg-card);
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        color: var(--color-text-secondary);
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
      }
      .form-group input,

        width: 100%;

        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        transition: all 0.2s;

      .form-group input:focus,

      .input-hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      /* Model Selection */
      .model-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .model-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
      }
      .model-item:hover {
        border-color: var(--color-accent-cyan);
      }
      .model-item.selected {
        border-color: var(--accent-pink);
        background: rgba(244, 114, 182, 0.1);
      }
      .model-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent-pink);
      }
      .model-info {
        flex: 1;
        min-width: 0;
      }
      .model-name {
        font-weight: 500;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .model-vendor {
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .model-badge {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-openai {
        background: rgba(16, 185, 129, 0.2);
        color: var(--accent-green);
      }
      .badge-anthropic {
        background: rgba(244, 114, 182, 0.2);
        color: var(--accent-pink);
      }
      .badge-google {
        background: rgba(59, 130, 246, 0.2);
        color: var(--accent-blue);
      }
      .badge-deepseek {
        background: rgba(139, 92, 246, 0.2);
        color: var(--color-accent-purple);
      }
      .badge-meta {
        background: rgba(245, 158, 11, 0.2);
        color: var(--accent-orange);
      }

      .results-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .results-table th,
      .results-table td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
      }
      .results-table th {
        font-weight: 500;
        color: var(--color-text-secondary);
        font-size: 0.8rem;

      }
      .results-table .price-cell {

        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .vendor-icon {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }
      .stat-item {
        text-align: center;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);

      .stat-value {
        font-size: 1.5rem;
        font-weight: 600;
        font-family: var(--font-mono);
        color: var(--color-accent-cyan);

      .stat-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      .info-section {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .info-section strong {
        color: var(--color-text-primary);
      }
      .update-time {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: right;
        margin-top: 0.5rem;

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          padding: 1rem;

        }

        }
        .results-table {
          font-size: 0.8rem;
        }
        .results-table th,

      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);

      .breadcrumb a {
        color: #667eea;

      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      AI API 价格计算器

    <div class="bg-grid"></div>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <h1>💰 AI API 价格计算器</h1>
      <p class="subtitle">对比主流 AI 模型的 API 价格，估算使用成本</p>

      <!-- 使用量输入 -->
      <div class="card">
        <div class="card-title">📊 使用量设置</div>
        <div class="grid-2">
          <div class="form-group">
            <label>输入 Tokens (每次请求)</label>
            <input type="number" id="inputTokens" value="1000" min="0" onchange="calculate()" />
            <div class="input-hint">约 750 个英文单词 / 500 个中文字</div>
          </div>
          <div class="form-group">
            <label>输出 Tokens (每次请求)</label>
            <input type="number" id="outputTokens" value="500" min="0" onchange="calculate()" />
            <div class="input-hint">AI 生成的回复长度</div>
          </div>
          <div class="form-group">
            <label>每日请求次数</label>
            <input type="number" id="dailyRequests" value="100" min="0" onchange="calculate()" />
          </div>
          <div class="form-group">
            <label>计算周期</label>
            <select id="period" onchange="calculate()">
              <option value="1">每天</option>
              <option value="7">每周</option>
              <option value="30" selected>每月</option>
              <option value="365">每年</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 模型选择 -->
      <div class="card">
        <div class="card-title">
          🤖 选择模型
          <span style="font-weight: normal; font-size: 0.8rem; color: var(--text-muted)">
            (点击选择要对比的模型)
          </span>
        </div>
        <div class="model-grid" id="modelGrid"></div>
      </div>

      <!-- 计算结果 -->
      <div class="card">
        <div class="card-title">📈 成本对比</div>
        <div style="overflow-x: auto">
          <table class="results-table" id="resultsTable">
            <thead>
              <tr>
                <th>模型</th>
                <th>输入价格</th>
                <th>输出价格</th>
                <th>单次成本</th>
                <th>周期总成本</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="info-section">
          <strong>💡 说明：</strong>
          价格单位为美元 (USD)，基于各厂商官方 API 定价。
          实际费用可能因批量折扣、缓存命中、区域定价等因素有所不同。
          <div class="update-time">价格更新时间：2025年1月</div>
        </div>
      </div>
    </div>

    <script>
      // AI 模型价格数据 (USD per 1M tokens)
      const models = [
        // OpenAI
        {
          id: "gpt-4o",
          name: "GPT-4o",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 2.5,
          outputPrice: 10,
          context: "128K",
          selected: true
        },
        {
          id: "gpt-4o-mini",
          name: "GPT-4o Mini",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 0.15,
          outputPrice: 0.6,
          context: "128K",
          selected: true
        },
        {
          id: "gpt-4-turbo",
          name: "GPT-4 Turbo",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 10,
          outputPrice: 30,
          context: "128K",
          selected: false
        },
        {
          id: "o1",
          name: "o1",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 15,
          outputPrice: 60,
          context: "200K",
          selected: false
        },
        {
          id: "o1-mini",
          name: "o1-mini",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 3,
          outputPrice: 12,
          context: "128K",
          selected: false
        },
        {
          id: "o3-mini",
          name: "o3-mini",
          vendor: "OpenAI",
          badge: "openai",
          inputPrice: 1.1,
          outputPrice: 4.4,
          context: "200K",
          selected: true
        },

        // Anthropic
        {
          id: "claude-opus-4",
          name: "Claude Opus 4",
          vendor: "Anthropic",
          badge: "anthropic",
          inputPrice: 15,
          outputPrice: 75,
          context: "200K",
          selected: false
        },
        {
          id: "claude-sonnet-4",
          name: "Claude Sonnet 4",
          vendor: "Anthropic",
          badge: "anthropic",
          inputPrice: 3,
          outputPrice: 15,
          context: "200K",
          selected: true
        },
        {
          id: "claude-3.5-sonnet",
          name: "Claude 3.5 Sonnet",
          vendor: "Anthropic",
          badge: "anthropic",
          inputPrice: 3,
          outputPrice: 15,
          context: "200K",
          selected: false
        },
        {
          id: "claude-3.5-haiku",
          name: "Claude 3.5 Haiku",
          vendor: "Anthropic",
          badge: "anthropic",
          inputPrice: 0.8,
          outputPrice: 4,
          context: "200K",
          selected: true
        },

        // Google
        {
          id: "gemini-2.5-pro",
          name: "Gemini 2.5 Pro",
          vendor: "Google",
          badge: "google",
          inputPrice: 1.25,
          outputPrice: 10,
          context: "1M",
          selected: true
        },
        {
          id: "gemini-2.5-flash",
          name: "Gemini 2.5 Flash",
          vendor: "Google",
          badge: "google",
          inputPrice: 0.15,
          outputPrice: 0.6,
          context: "1M",
          selected: true
        },
        {
          id: "gemini-2.0-flash",
          name: "Gemini 2.0 Flash",
          vendor: "Google",
          badge: "google",
          inputPrice: 0.1,
          outputPrice: 0.4,
          context: "1M",
          selected: false
        },

        // DeepSeek
        {
          id: "deepseek-v3",
          name: "DeepSeek V3",
          vendor: "DeepSeek",
          badge: "deepseek",
          inputPrice: 0.27,
          outputPrice: 1.1,
          context: "64K",
          selected: true
        },
        {
          id: "deepseek-r1",
          name: "DeepSeek R1",
          vendor: "DeepSeek",
          badge: "deepseek",
          inputPrice: 0.55,
          outputPrice: 2.19,
          context: "64K",
          selected: true
        },

        // Meta (via API providers)
        {
          id: "llama-3.3-70b",
          name: "Llama 3.3 70B",
          vendor: "Meta",
          badge: "meta",
          inputPrice: 0.8,
          outputPrice: 0.8,
          context: "128K",
          selected: false
        },
        {
          id: "llama-3.1-405b",
          name: "Llama 3.1 405B",
          vendor: "Meta",
          badge: "meta",
          inputPrice: 3,
          outputPrice: 3,
          context: "128K",
          selected: false
        }
      ];

      // 初始化
      function init() {
        renderModelGrid();
        calculate();
        loadTheme();
      }

      // 渲染模型选择网格
      function renderModelGrid() {
        const grid = document.getElementById("modelGrid");
        grid.innerHTML = models
          .map(
            (model, idx) => `
        <label class="model-item ${model.selected ? "selected" : ""}" data-idx="${idx}">
          <input type="checkbox" ${model.selected ? "checked" : ""} onchange="toggleModel(${idx})">
          <div class="model-info">
            <div class="model-name">${model.name}</div>
            <div class="model-vendor">${model.vendor} · ${model.context}</div>
          </div>
          <span class="model-badge badge-${model.badge}">${model.vendor.slice(0, 2)}</span>
        </label>
      `
          )
          .join("");
      }

      // 切换模型选择
      window.toggleModel = function (idx) {
        models[idx].selected = !models[idx].selected;
        const item = document.querySelector(`.model-item[data-idx="${idx}"]`);
        item.classList.toggle("selected", models[idx].selected);
        calculate();
      };

      // 计算成本
      window.calculate = function () {
        const inputTokens = parseInt(document.getElementById("inputTokens").value) || 0;
        const outputTokens = parseInt(document.getElementById("outputTokens").value) || 0;
        const dailyRequests = parseInt(document.getElementById("dailyRequests").value) || 0;
        const period = parseInt(document.getElementById("period").value) || 30;

        const selectedModels = models.filter((m) => m.selected);
        const results = selectedModels.map((model) => {
          const inputCost = (inputTokens / 1000000) * model.inputPrice;
          const outputCost = (outputTokens / 1000000) * model.outputPrice;
          const perRequestCost = inputCost + outputCost;
          const totalCost = perRequestCost * dailyRequests * period;
          return {
            ...model,
            inputCost,
            outputCost,
            perRequestCost,
            totalCost
          };
        });

        // 按总成本排序
        results.sort((a, b) => a.totalCost - b.totalCost);

        // 找出最低价
        const minCost = results.length > 0 ? results[0].totalCost : 0;

        // 渲染结果表格
        const tbody = document.getElementById("resultsBody");
        tbody.innerHTML = results
          .map(
            (r, _idx) => `
        <tr>
          <td>
            <div class="model-col">
              <span class="vendor-icon badge-${r.badge}">${r.vendor.slice(0, 2).toUpperCase()}</span>
              <span>${r.name}</span>
            </div>
          </td>
          <td class="price-cell">$${r.inputPrice}/M</td>
          <td class="price-cell">$${r.outputPrice}/M</td>
          <td class="price-cell">$${r.perRequestCost.toFixed(6)}</td>
          <td class="price-cell ${r.totalCost === minCost && results.length > 1 ? "best-price" : ""}">
            $${r.totalCost.toFixed(2)}
            ${r.totalCost === minCost && results.length > 1 ? " ✓" : ""}
          </td>
        </tr>
      `
          )
          .join("");

        // 渲染统计信息
        const totalRequests = dailyRequests * period;
        const totalInputTokens = inputTokens * totalRequests;
        const totalOutputTokens = outputTokens * totalRequests;
        const periodLabel = { 1: "天", 7: "周", 30: "月", 365: "年" }[period];

        const statsGrid = document.getElementById("statsGrid");
        statsGrid.innerHTML = `
        <div class="stat-item">
          <div class="stat-value">${formatNumber(totalRequests)}</div>
          <div class="stat-label">总请求数 / ${periodLabel}</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${formatTokens(totalInputTokens)}</div>
          <div class="stat-label">总输入 Tokens</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${formatTokens(totalOutputTokens)}</div>
          <div class="stat-label">总输出 Tokens</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" style="color: var(--accent-green)">$${minCost.toFixed(2)}</div>
          <div class="stat-label">最低成本</div>
        </div>
      `;
      };

      // 格式化数字
      function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
        if (num >= 1000) return (num / 1000).toFixed(1) + "K";
        return num.toString();
      }

      function formatTokens(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
        if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
        if (num >= 1000) return (num / 1000).toFixed(1) + "K";
        return num.toString();
      }

      // 主题切换
      window.toggleTheme = function () {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") !== "light";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.querySelector(".theme-toggle").textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      };

      function loadTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
      }

      // 启动
      init();
    </script>
  </body>
</html>

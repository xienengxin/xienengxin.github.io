  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      URL Slug 生成器
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()">🌓 主题</button>
      </div>
      <h1>🔗 URL Slug 生成器</h1>
      <p>将文本转换为 URL 友好的 slug 格式</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="input-group">
          <label>输入文本</label>
          <textarea id="input" placeholder="输入标题或文本..." oninput="generate()">
Hello World - 这是一个示例标题!</textarea
          >
        </div>

        <div class="options">
          <label class="option">
            <input type="checkbox" id="lowercase" checked onchange="generate()" />
            小写
          </label>
          <label class="option">
            <input type="checkbox" id="removeChinese" onchange="generate()" />
            移除中文
          </label>
          <label class="option">
            <input type="checkbox" id="removeNumbers" onchange="generate()" />
            移除数字
          </label>
          <label class="option">
            <span>分隔符:</span>
            <select
              id="separator"
              onchange="generate()"
              style="width: auto; padding: 0.25rem 0.5rem"
            >
              <option value="-">连字符 (-)</option>
              <option value="_">下划线 (_)</option>
              <option value="">无</option>
            </select>
          </label>
        </div>

        <div class="input-group">
          <label>生成的 Slug (点击复制)</label>
          <div class="output-box" id="output" onclick="copySlug()"></div>
        </div>

        <div class="preview">
          <div class="preview-label">URL 预览</div>
          <div class="preview-url">
            https://example.com/blog/
            <span id="urlPreview"></span>
          </div>
        </div>

        <div class="examples">
          <div class="examples-title">示例文本</div>
          <div class="example-list">
            <button class="example-btn" onclick="setExample('How to Build a REST API')">
              How to Build a REST API
            </button>
            <button class="example-btn" onclick="setExample('10 Tips for Better Code')">
              10 Tips for Better Code
            </button>
            <button class="example-btn" onclick="setExample('React vs Vue: 2024 比较')">
              React vs Vue: 2024 比较
            </button>
            <button class="example-btn" onclick="setExample('JavaScript 入门教程 #1')">
              JavaScript 入门教程 #1
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制到剪贴板</div>
    <script>
      window.generate = function () {
        const input = document.getElementById("input").value;
        const lowercase = document.getElementById("lowercase").checked;
        const removeChinese = document.getElementById("removeChinese").checked;
        const removeNumbers = document.getElementById("removeNumbers").checked;
        const separator = document.getElementById("separator").value;

        let slug = input;

        // Convert to lowercase if option is checked
        if (lowercase) slug = slug.toLowerCase();

        // Remove Chinese characters if option is checked
        if (removeChinese) slug = slug.replace(/[\u4e00-\u9fa5]/g, "");

        // Remove numbers if option is checked
        if (removeNumbers) slug = slug.replace(/[0-9]/g, "");

        // Replace special characters and spaces
        slug = slug
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "") // Remove accents
          .replace(/[^a-zA-Z0-9\u4e00-\u9fa5\s-]/g, "") // Keep only alphanumeric, Chinese, spaces, hyphens
          .trim()
          .replace(/\s+/g, separator) // Replace spaces with separator
          .replace(new RegExp(`${separator}+`, "g"), separator) // Remove multiple separators
          .replace(new RegExp(`^${separator}|${separator}$`, "g"), ""); // Remove leading/trailing separators

        document.getElementById("output").textContent = slug || "(空)";
        document.getElementById("urlPreview").textContent = slug || "slug";
      };

      window.setExample = function (text) {
        document.getElementById("input").value = text;
        generate();
      };

      window.copySlug = function () {
        const slug = document.getElementById("output").textContent;
        if (slug && slug !== "(空)") {
          navigator.clipboard.writeText(slug);
          document.getElementById("toast").classList.add("show");
          setTimeout(() => document.getElementById("toast").classList.remove("show"), 2000);
        }
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      generate();
    </script>

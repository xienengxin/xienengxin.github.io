    <script>
      class TweetGenerator {
        constructor() {
          this.theme = "dark";
          this.verified = "blue";
          this.avatarData = null;
          this.init();
        }

        init() {
          this.bindEvents();
          this.updatePreview();
        }

        bindEvents() {
          // Input events
          const inputs = [
            "displayName",
            "username",
            "tweetContent",
            "tweetTime",
            "tweetDate",
            "viewCount",
            "replyCount",
            "retweetCount",
            "likeCount",
            "bookmarkCount"
          ];
          inputs.forEach((id) => {
            document.getElementById(id).addEventListener("input", () => this.updatePreview());
          });

          // Avatar upload
          document.getElementById("avatarInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (e) => {
                this.avatarData = e.target.result;
                this.updatePreview();
              };
              reader.readAsDataURL(file);
            }
          });

          // Theme toggle
          document.querySelectorAll("[data-theme]").forEach((btn) => {
            btn.addEventListener("click", () => {
              document
                .querySelectorAll("[data-theme]")
                .forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              this.theme = btn.dataset.theme;
              this.updatePreview();
            });
          });

          // Verified toggle
          document.querySelectorAll("[data-verify]").forEach((btn) => {
            btn.addEventListener("click", () => {
              document
                .querySelectorAll("[data-verify]")
                .forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              this.verified = btn.dataset.verify;
              this.updatePreview();
            });
          });

          // Download button
          document
            .getElementById("downloadBtn")
            .addEventListener("click", () => this.downloadImage());

          // Copy button
          document.getElementById("copyBtn").addEventListener("click", () => this.copyImage());
        }

        updatePreview() {
          const card = document.getElementById("tweetCard");
          card.className = `tweet-card ${this.theme}`;

          // Avatar
          const avatarEl = document.getElementById("tweetAvatar").querySelector("img");
          if (this.avatarData) {
            avatarEl.src = this.avatarData;
            document.getElementById("avatarPreview").innerHTML =
              `<img src="${this.avatarData}" alt="Avatar">`;
          }

          // User info
          const displayName = document.getElementById("displayName").value || "Name";
          const username = document.getElementById("username").value || "username";

          const tweetNameEl = document.getElementById("tweetName");
          tweetNameEl.textContent = displayName;
          tweetNameEl.insertAdjacentHTML("beforeend", this.getVerifiedBadge());
          document.getElementById("tweetHandle").textContent = "@" + username;

          // Content
          document.getElementById("tweetContentPreview").textContent =
            document.getElementById("tweetContent").value;

          // Time and stats
          document.getElementById("tweetTimePreview").textContent =
            document.getElementById("tweetTime").value;
          document.getElementById("tweetDatePreview").textContent =
            document.getElementById("tweetDate").value;
          document.getElementById("tweetViewsPreview").textContent =
            document.getElementById("viewCount").value;
          document.getElementById("tweetRepliesPreview").textContent =
            document.getElementById("replyCount").value;
          document.getElementById("tweetRetweetsPreview").textContent =
            document.getElementById("retweetCount").value;
          document.getElementById("tweetLikesPreview").textContent =
            document.getElementById("likeCount").value;
          document.getElementById("tweetBookmarksPreview").textContent =
            document.getElementById("bookmarkCount").value;
        }

        getVerifiedBadge() {
          if (this.verified === "none") return "";

        async downloadImage() {
          const card = document.getElementById("tweetCard");
          try {
            const canvas = await html2canvas(card, {
              backgroundColor: this.theme === "dark" ? "#000000" : "#ffffff",
              scale: 2,
              useCORS: true
            });

            const link = document.createElement("a");
            link.download = `tweet_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            this.showToast("图片已下载");
          } catch (error) {
            console.error("Download error:", error);
            this.showToast("下载失败");
          }
        }

        async copyImage() {
          const card = document.getElementById("tweetCard");
          try {
            const canvas = await html2canvas(card, {
              backgroundColor: this.theme === "dark" ? "#000000" : "#ffffff",
              scale: 2,
              useCORS: true
            });

            canvas.toBlob(async (blob) => {
              try {
                await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                this.showToast("已复制到剪贴板");
              } catch (err) {
                console.error("Copy error:", err);
                this.showToast("复制失败，请使用下载功能");
              }
            });
          } catch (error) {
            console.error("Copy error:", error);
            this.showToast("复制失败");
          }
        }

        showToast(message) {
          const toast = document.getElementById("toast");
          document.getElementById("toastMessage").textContent = message;
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 3000);
        }
      }

      const generator = new TweetGenerator();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

              <option value="1">🇺🇸 +1</option>
              <option value="44">🇬🇧 +44</option>
              <option value="81">🇯🇵 +81</option>
              <option value="82">🇰🇷 +82</option>
              <option value="852">🇭🇰 +852</option>
              <option value="853">🇲🇴 +853</option>
              <option value="886">🇹🇼 +886</option>
              <option value="65">🇸🇬 +65</option>
              <option value="60">🇲🇾 +60</option>
              <option value="66">🇹🇭 +66</option>
              <option value="84">🇻🇳 +84</option>
              <option value="91">🇮🇳 +91</option>
              <option value="61">🇦🇺 +61</option>
              <option value="49">🇩🇪 +49</option>
              <option value="33">🇫🇷 +33</option>
              <option value="39">🇮🇹 +39</option>
              <option value="34">🇪🇸 +34</option>
              <option value="7">🇷🇺 +7</option>
              <option value="55">🇧🇷 +55</option>
            </select>
            <input type="tel" id="phoneNumber" placeholder="13800138000" />
          </div>
          <div class="form-hint">输入不含国家代码的手机号</div>
        </div>

        <div class="form-group">
          <label class="form-label">预设消息 (可选)</label>
          <textarea id="message" placeholder="你好，我想咨询..."></textarea>
          <div class="form-hint">对方打开链接后会自动填入此消息</div>
        </div>
      </div>

      <div class="output-section">
        <div class="output-label">生成的链接</div>
        <input type="text" class="output-url" id="outputUrl" readonly placeholder="wa.me/..." />

        <div class="button-group">
          <button class="btn btn-whatsapp" onclick="openWhatsApp()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
              />
            </svg>
            打开 WhatsApp
          </button>
          <button class="btn btn-copy" onclick="copyUrl()">复制链接</button>
        </div>
      </div>

      <div class="preview-section">
        <div class="preview-title">预览</div>
        <div class="preview-phone">
          <div class="preview-phone-icon">📱</div>
          <div class="preview-phone-number" id="previewPhone">+86 138 0013 8000</div>
        </div>
        <div class="preview-message" id="previewMessage">你好，我想咨询...</div>
      </div>

      <div class="tips">
        <h3>使用说明</h3>
        <ul>
          <li>生成的链接可分享给任何人，点击后直接打开 WhatsApp 对话</li>
          <li>适合放在网站、名片、社交媒体上作为联系方式</li>
          <li>预设消息会自动填入对话框，用户可修改后发送</li>
          <li>链接格式: wa.me/[国家代码][手机号]?text=[消息]</li>
        </ul>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        const countryCode = document.getElementById("countryCode");
        const phoneNumber = document.getElementById("phoneNumber");
        const message = document.getElementById("message");
        const outputUrl = document.getElementById("outputUrl");
        const previewPhone = document.getElementById("previewPhone");
        const previewMessage = document.getElementById("previewMessage");

        function formatPhoneDisplay(code, number) {
          const cleaned = number.replace(/\D/g, "");
          if (!cleaned) return `+${code}`;

          // 简单格式化显示
          let formatted = cleaned;
          if (cleaned.length > 7) {
            formatted = cleaned.slice(0, 3) + " " + cleaned.slice(3, 7) + " " + cleaned.slice(7);
          } else if (cleaned.length > 3) {
            formatted = cleaned.slice(0, 3) + " " + cleaned.slice(3);
          }
          return `+${code} ${formatted}`;
        }

        function generateUrl() {
          const code = countryCode.value;
          const number = phoneNumber.value.replace(/\D/g, "");
          const msg = message.value.trim();

          // 更新预览
          previewPhone.textContent = formatPhoneDisplay(code, number);

          if (msg) {
            previewMessage.textContent = msg;
            previewMessage.classList.remove("empty");
          } else {
            previewMessage.textContent = "(无预设消息)";
            previewMessage.classList.add("empty");
          }

          // 生成链接
          if (!number) {
            outputUrl.value = "";
            return;
          }

          let url = `https://wa.me/${code}${number}`;
          if (msg) {
            url += `?text=${encodeURIComponent(msg)}`;
          }
          outputUrl.value = url;
        }

        function openWhatsApp() {
          const url = outputUrl.value;
          if (!url) {
            alert("请先输入手机号码");
            return;
          }
          window.open(url, "_blank");
        }

        function copyUrl() {
          const url = outputUrl.value;
          if (!url) {
            alert("请先输入手机号码");
            return;
          }

          navigator.clipboard.writeText(url).then(() => {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = "已复制!";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 1500);
          });
        }

        // 绑定事件
        countryCode.addEventListener("change", generateUrl);
        phoneNumber.addEventListener("input", generateUrl);
        message.addEventListener("input", generateUrl);

        // 暴露全局函数
        window.openWhatsApp = openWhatsApp;
        window.copyUrl = copyUrl;

        // 初始化
        generateUrl();
      })();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      证书生成器
    </nav>
    <main class="container">
      <div class="header no-print">
        <h1>🏆 证书生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
      </div>

      <div class="container-grid">
        <!-- 左侧：设置面板 -->
        <div class="no-print">
          <!-- 模板选择 -->
          <div class="card">
            <h3>📄 选择模板</h3>
            <div class="template-grid" id="templateGrid">
              <div
                class="template-btn active"
                data-template="honor"
                onclick="selectTemplate('honor')"
              >
                <span class="icon">🏅</span>
                <span class="name">荣誉证书</span>
              </div>
              <div
                class="template-btn"
                data-template="completion"
                onclick="selectTemplate('completion')"
              >
                <span class="icon">📜</span>
                <span class="name">结业证书</span>
              </div>
              <div
                class="template-btn"
                data-template="training"
                onclick="selectTemplate('training')"
              >
                <span class="icon">📚</span>
                <span class="name">培训证书</span>
              </div>
              <div
                class="template-btn"
                data-template="employee"
                onclick="selectTemplate('employee')"
              >
                <span class="icon">⭐</span>
                <span class="name">优秀员工</span>
              </div>
              <div
                class="template-btn"
                data-template="volunteer"
                onclick="selectTemplate('volunteer')"
              >
                <span class="icon">❤️</span>
                <span class="name">志愿者证书</span>
              </div>
              <div class="template-btn" data-template="award" onclick="selectTemplate('award')">
                <span class="icon">🏆</span>
                <span class="name">奖状</span>
              </div>
              <div
                class="template-btn"
                data-template="appointment"
                onclick="selectTemplate('appointment')"
              >
                <span class="icon">📋</span>
                <span class="name">聘书</span>
              </div>
              <div class="template-btn" data-template="thanks" onclick="selectTemplate('thanks')">
                <span class="icon">🙏</span>
                <span class="name">感谢状</span>
              </div>
            </div>
          </div>

          <!-- 颁发机构 -->
          <div class="card">
            <h3>🏢 颁发机构</h3>
            <label>
              机构名称
              <input
                type="text"
                id="orgName"
                placeholder="XX公司/学校/组织"
                oninput="updatePreview()"
              />
            </label>
            <label>
              Logo（可选）
              <input
                type="file"
                id="logoFile"
                accept="image/*"
                onchange="handleLogoUpload(event)"
              />
            </label>
          </div>

          <!-- 证书内容 -->
          <div class="card">
            <h3>✏️ 证书内容</h3>
            <label>
              证书标题
              <input type="text" id="certTitle" placeholder="荣誉证书" oninput="updatePreview()" />
            </label>
            <label>
              获得者姓名
              <input type="text" id="recipientName" placeholder="张三" oninput="updatePreview()" />
            </label>
            <label>
              证书正文
              <textarea
                id="certContent"
                rows="4"
                placeholder="在XX活动中表现突出，特发此证，以资鼓励。"
                oninput="updatePreview()"
              ></textarea>
            </label>
            <div class="form-row">
              <label>
                颁发日期
                <input type="date" id="issueDate" oninput="updatePreview()" />
              </label>
              <label>
                证书编号
                <input
                  type="text"
                  id="certNumber"
                  placeholder="CERT-001"
                  oninput="updatePreview()"
                />
              </label>
            </div>
          </div>

          <!-- 操作按钮 -->
          <div class="action-buttons">
            <button onclick="printCertificate()">🖨️ 打印</button>
            <button onclick="exportPDF()" class="secondary">📥 导出PDF</button>
          </div>

          <div class="action-buttons" style="margin-top: 0.5rem">
            <button onclick="saveData()" class="contrast">💾 保存</button>
            <button onclick="loadData()" class="outline">📂 加载</button>
          </div>
        </div>

        <!-- 右侧：证书预览 -->
        <div class="preview-wrapper">
          <div class="certificate template-honor" id="certificatePreview">
            <div class="corner-decoration corner-tl"></div>
            <div class="corner-decoration corner-tr"></div>
            <div class="corner-decoration corner-bl"></div>
            <div class="corner-decoration corner-br"></div>
            <div class="certificate-number" id="previewNumber">编号：CERT-001</div>
            <div class="certificate-inner">
              <div class="certificate-header">
                <img
                  class="certificate-logo"
                  id="previewLogo"
                  src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                  alt="Logo"
                  style="display: none"
                />
                <div class="certificate-org" id="previewOrg">XX公司</div>
                <div class="certificate-title" id="previewTitle">荣誉证书</div>
              </div>
              <div class="certificate-body">
                <div class="certificate-name" id="previewName">张三</div>
                <div class="certificate-content" id="previewContent">
                  在XX活动中表现突出，特发此证，以资鼓励。
                </div>
              </div>
              <div class="certificate-footer">
                <div class="certificate-date" id="previewDate">颁发日期：2024年1月1日</div>
                <div class="certificate-seal">
                  <div class="seal-placeholder">盖章处</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- html2pdf库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
      // 当前模板
      let currentTemplate = "honor";
      let logoDataUrl = "";

      // 模板配置
      const templateConfig = {
        honor: {
          title: "荣誉证书",
          content: "在工作中表现优异，成绩突出，特发此证，以资鼓励。"
        },
        completion: {
          title: "结业证书",
          content: "已完成本机构举办的培训课程全部学习内容，成绩合格，准予结业。"
        },
        training: {
          title: "培训证书",
          content: "参加了本机构举办的专业培训课程，经考核合格，特颁发此证书。"
        },
        employee: {
          title: "优秀员工证书",
          content: "在年度工作中勤勉尽责、业绩突出，被评为优秀员工，特发此证。"
        },
        volunteer: {
          title: "志愿者证书",
          content: "积极参与志愿服务活动，无私奉献，表现优秀，特颁发此证书以表彰。"
        },
        award: {
          title: "奖 状",
          content: "在本次活动/比赛中表现出色，荣获优秀奖，特发此状，以资鼓励。"
        },
        appointment: {
          title: "聘 书",
          content: "经研究决定，聘任为本机构顾问/专家，聘期一年，特发此证。"
        },
        thanks: {
          title: "感谢状",
          content: "感谢您对本机构工作的大力支持与帮助，特颁发此状，以表谢意。"
        }
      };

      // 初始化
      document.addEventListener("DOMContentLoaded", () => {
        // 设置默认日期
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("issueDate").value = today;

        // 生成证书编号
        document.getElementById("certNumber").value = "CERT-" + Date.now().toString().slice(-6);

        // 设置默认内容
        document.getElementById("certTitle").value = templateConfig.honor.title;
        document.getElementById("certContent").value = templateConfig.honor.content;

        // 加载保存的主题
        const savedTheme = localStorage.getItem("cert-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }

        updatePreview();
      });

      // 主题切换
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("cert-theme", newTheme);
      };

      // 选择模板
      window.selectTemplate = function (template) {
        currentTemplate = template;

        // 更新按钮状态
        document.querySelectorAll(".template-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        const targetBtn = document.querySelector('[data-template="' + template + '"]');
        if (targetBtn) {
          targetBtn.classList.add("active");
        }

        // 更新证书样式
        const cert = document.getElementById("certificatePreview");
        cert.className = "certificate template-" + template;

        // 更新默认内容
        const config = templateConfig[template];
        document.getElementById("certTitle").value = config.title;
        document.getElementById("certContent").value = config.content;

        updatePreview();
      };

      // 处理Logo上传
      window.handleLogoUpload = function (event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            logoDataUrl = e.target.result;
            updatePreview();
          };
          reader.readAsDataURL(file);
        }
      };

      // 格式化日期
      function formatDate(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        return year + "年" + month + "月" + day + "日";
      }

      // 更新预览
      window.updatePreview = function () {
        const orgName = document.getElementById("orgName").value || "XX公司";
        const certTitle = document.getElementById("certTitle").value || "荣誉证书";
        const recipientName = document.getElementById("recipientName").value || "张三";
        const certContent = document.getElementById("certContent").value || "特发此证，以资鼓励。";
        const issueDate = document.getElementById("issueDate").value;
        const certNumber = document.getElementById("certNumber").value || "CERT-001";

        document.getElementById("previewOrg").textContent = orgName;
        document.getElementById("previewTitle").textContent = certTitle;
        document.getElementById("previewName").textContent = recipientName;
        document.getElementById("previewContent").textContent = certContent;
        document.getElementById("previewDate").textContent = "颁发日期：" + formatDate(issueDate);
        document.getElementById("previewNumber").textContent = "编号：" + certNumber;

        const logoImg = document.getElementById("previewLogo");
        if (logoDataUrl) {
          logoImg.src = logoDataUrl;
          logoImg.style.display = "block";
        } else {
          logoImg.style.display = "none";
        }
      };

      // 打印证书
      window.printCertificate = function () {
        window.print();
      };

      // 导出PDF
      window.exportPDF = function () {
        const element = document.getElementById("certificatePreview");
        const recipientName = document.getElementById("recipientName").value || "certificate";
        const certTitle = document.getElementById("certTitle").value || "certificate";

        const opt = {
          margin: 0,
          filename: certTitle + "-" + recipientName + ".pdf",
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "landscape" }
        };

        html2pdf().set(opt).from(element).save();
      };

      // 保存数据
      window.saveData = function () {
        const data = {
          template: currentTemplate,
          orgName: document.getElementById("orgName").value,
          logoDataUrl: logoDataUrl,
          certTitle: document.getElementById("certTitle").value,
          recipientName: document.getElementById("recipientName").value,
          certContent: document.getElementById("certContent").value,
          issueDate: document.getElementById("issueDate").value,
          certNumber: document.getElementById("certNumber").value
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "certificate-" + (data.recipientName || "data") + ".json";
        a.click();
        URL.revokeObjectURL(url);
      };

      // 加载数据
      window.loadData = function () {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);

                if (data.template) {
                  selectTemplate(data.template);
                }

                document.getElementById("orgName").value = data.orgName || "";
                document.getElementById("certTitle").value = data.certTitle || "";
                document.getElementById("recipientName").value = data.recipientName || "";
                document.getElementById("certContent").value = data.certContent || "";
                document.getElementById("issueDate").value = data.issueDate || "";
                document.getElementById("certNumber").value = data.certNumber || "";

                if (data.logoDataUrl) {
                  logoDataUrl = data.logoDataUrl;
                }

                updatePreview();
                alert("数据加载成功！");
              } catch (err) {
                alert("文件格式错误，请选择有效的JSON文件");
              }
            };
            reader.readAsText(file);
          }
        };
        input.click();
      };
    </script>
  </body>
</html>

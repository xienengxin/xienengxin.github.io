  <body>
    <nav class="breadcrumb">

    <div class="container">
      <header>
        <h1>🎧 白噪音生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
          🌓
        </button>
      </header>

      <div class="main-control">
        <button class="play-button" id="playBtn" onclick="togglePlay()">
          <span id="playIcon">▶</span>
        </button>
        <p id="statusText">点击播放</p>
      </div>

      <div class="visualizer" id="visualizer"></div>

      <div class="volume-control">
        <span class="volume-icon">🔈</span>
        <input
          type="range"
          id="masterVolume"
          min="0"
          max="100"
          value="50"
          oninput="updateMasterVolume(this.value)"
        />
        <span class="volume-icon">🔊</span>
        <span id="volumeValue">50%</span>
      </div>

      <h3>🎵 噪音类型</h3>
      <div class="noise-types">
        <div class="noise-card active" data-type="white" onclick="selectNoiseType('white')">
          <div class="icon">⚪</div>
          <div class="name">白噪音</div>
          <div class="desc">全频均衡</div>
        </div>
        <div class="noise-card" data-type="pink" onclick="selectNoiseType('pink')">
          <div class="icon">🩷</div>
          <div class="name">粉噪音</div>
          <div class="desc">低频丰富</div>
        </div>
        <div class="noise-card" data-type="brown" onclick="selectNoiseType('brown')">
          <div class="icon">🟤</div>
          <div class="name">褐噪音</div>
          <div class="desc">深沉低频</div>
        </div>
        <div class="noise-card" data-type="blue" onclick="selectNoiseType('blue')">
          <div class="icon">🔵</div>
          <div class="name">蓝噪音</div>
          <div class="desc">高频明亮</div>
        </div>
      </div>

      <div class="mixer-section">
        <h3>🎛️ 环境音混合</h3>
        <div class="mixer-item">
          <span class="icon">🌧️</span>
          <span class="name">雨声</span>
          <input
            type="range"
            min="0"
            max="100"
            value="0"
            data-sound="rain"
            oninput="updateMixer('rain', this.value)"
          />
          <span class="value" id="rain-value">0%</span>
        </div>
        <div class="mixer-item">
          <span class="icon">🌊</span>
          <span class="name">海浪</span>
          <input
            type="range"
            min="0"
            max="100"
            value="0"
            data-sound="ocean"
            oninput="updateMixer('ocean', this.value)"
          />
          <span class="value" id="ocean-value">0%</span>
        </div>
        <div class="mixer-item">
          <span class="icon">🔥</span>
          <span class="name">篝火</span>
          <input
            type="range"
            min="0"
            max="100"
            value="0"
            data-sound="fire"
            oninput="updateMixer('fire', this.value)"
          />
          <span class="value" id="fire-value">0%</span>
        </div>
        <div class="mixer-item">
          <span class="icon">🌲</span>
          <span class="name">森林</span>
          <input
            type="range"
            min="0"
            max="100"
            value="0"
            data-sound="forest"
            oninput="updateMixer('forest', this.value)"
          />
          <span class="value" id="forest-value">0%</span>
        </div>
      </div>

      <div class="timer-section">
        <h3>⏱️ 定时器</h3>
        <div class="timer-presets">
          <button class="outline" onclick="setTimer(15)" aria-label="15分钟">15分钟</button>
          <button class="outline" onclick="setTimer(30)" aria-label="30分钟">30分钟</button>
          <button class="outline" onclick="setTimer(60)" aria-label="1小时">1小时</button>
          <button class="outline" onclick="setTimer(120)" aria-label="2小时">2小时</button>
          <button class="outline secondary" onclick="clearTimer()" aria-label="取消">取消</button>
        </div>
        <div class="timer-display" id="timerDisplay">--:--</div>
      </div>
    </div>

    <script>
      let audioContext = null;
      let masterGain = null;
      let noiseNode = null;
      let isPlaying = false;
      let currentNoiseType = "white";
      let timerInterval = null;
      let timerSeconds = 0;
      let analyser = null;
      let visualizerBars = [];

      // 环境音混合器
      const mixerGains = {
        rain: null,
        ocean: null,
        fire: null,
        forest: null
      };

      const mixerNodes = {
        rain: null,
        ocean: null,
        fire: null,
        forest: null
      };

      // 初始化可视化器
      function initVisualizer() {
        const visualizer = document.getElementById("visualizer");
        // Clear existing bars safely
        while (visualizer.firstChild) {
          visualizer.removeChild(visualizer.firstChild);
        }
        visualizerBars = [];
        for (let i = 0; i < 32; i++) {
          const bar = document.createElement("div");
          bar.className = "visualizer-bar";
          bar.style.height = "4px";
          visualizer.appendChild(bar);
          visualizerBars.push(bar);
        }
      }

      function updateVisualizer() {
        if (!analyser || !isPlaying) {
          visualizerBars.forEach((bar) => (bar.style.height = "4px"));
          return;
        }

        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);

        const step = Math.floor(dataArray.length / visualizerBars.length);
        for (let i = 0; i < visualizerBars.length; i++) {
          const value = dataArray[i * step];
          const height = Math.max(4, (value / 255) * 50);
          visualizerBars[i].style.height = height + "px";
        }

        requestAnimationFrame(updateVisualizer);
      }

      function initAudio() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioContext.createGain();
        masterGain.gain.value = 0.5;

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;

        masterGain.connect(analyser);
        analyser.connect(audioContext.destination);

        // 初始化混合器增益节点
        Object.keys(mixerGains).forEach((key) => {
          mixerGains[key] = audioContext.createGain();
          mixerGains[key].gain.value = 0;
          mixerGains[key].connect(masterGain);
        });
      }

      function createNoiseNode(type) {
        const bufferSize = 2 * audioContext.sampleRate;
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = buffer.getChannelData(0);

        switch (type) {
          case "white":
            for (let i = 0; i < bufferSize; i++) {
              output[i] = Math.random() * 2 - 1;
            }
            break;

          case "pink":
            let b0 = 0,
              b1 = 0,
              b2 = 0,
              b3 = 0,
              b4 = 0,
              b5 = 0,
              b6 = 0;
            for (let i = 0; i < bufferSize; i++) {
              const white = Math.random() * 2 - 1;
              b0 = 0.99886 * b0 + white * 0.0555179;
              b1 = 0.99332 * b1 + white * 0.0750759;
              b2 = 0.969 * b2 + white * 0.153852;
              b3 = 0.8665 * b3 + white * 0.3104856;
              b4 = 0.55 * b4 + white * 0.5329522;
              b5 = -0.7616 * b5 - white * 0.016898;
              output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
              b6 = white * 0.115926;
            }
            break;

          case "brown":
            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
              const white = Math.random() * 2 - 1;
              output[i] = (lastOut + 0.02 * white) / 1.02;
              lastOut = output[i];
              output[i] *= 3.5;
            }
            break;

          case "blue":
            let lastBlue = 0;
            for (let i = 0; i < bufferSize; i++) {
              const white = Math.random() * 2 - 1;
              output[i] = white - lastBlue;
              lastBlue = white;
              output[i] *= 0.5;
            }
            break;
        }

        const node = audioContext.createBufferSource();
        node.buffer = buffer;
        node.loop = true;
        return node;
      }

      function createEnvironmentSound(type) {
        const bufferSize = 4 * audioContext.sampleRate;
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = buffer.getChannelData(0);

        switch (type) {
          case "rain":
            for (let i = 0; i < bufferSize; i++) {
              output[i] = (Math.random() * 2 - 1) * 0.3;
              if (Math.random() > 0.99) {
                output[i] += (Math.random() - 0.5) * 0.5;
              }
            }
            break;

          case "ocean":
            for (let i = 0; i < bufferSize; i++) {
              const t = i / audioContext.sampleRate;
              const wave = Math.sin(t * 0.1) * 0.5 + 0.5;
              output[i] = (Math.random() * 2 - 1) * wave * 0.4;
            }
            break;

          case "fire":
            let fireState = 0;
            for (let i = 0; i < bufferSize; i++) {
              fireState += (Math.random() - 0.5) * 0.1;
              fireState *= 0.99;
              output[i] = (Math.random() * 2 - 1) * 0.2 + fireState;
              if (Math.random() > 0.995) {
                output[i] += (Math.random() - 0.5) * 0.8;
              }
            }
            break;

          case "forest":
            for (let i = 0; i < bufferSize; i++) {
              output[i] = (Math.random() * 2 - 1) * 0.1;
              if (Math.random() > 0.999) {
                const chirpLength = Math.floor(Math.random() * 1000) + 500;
                for (let j = 0; j < chirpLength && i + j < bufferSize; j++) {
                  output[i + j] += Math.sin(j * 0.1) * Math.exp(-j / 200) * 0.3;
                }
              }
            }
            break;
        }

        const node = audioContext.createBufferSource();
        node.buffer = buffer;
        node.loop = true;
        return node;
      }

      window.togglePlay = function () {
        if (!audioContext) {
          initAudio();
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        if (isPlaying) {
          stopPlay();
        } else {
          startPlay();
        }
      };

      function startPlay() {
        noiseNode = createNoiseNode(currentNoiseType);
        noiseNode.connect(masterGain);
        noiseNode.start();

        // 启动环境音
        Object.keys(mixerNodes).forEach((key) => {
          if (mixerGains[key].gain.value > 0) {
            mixerNodes[key] = createEnvironmentSound(key);
            mixerNodes[key].connect(mixerGains[key]);
            mixerNodes[key].start();
          }
        });

        isPlaying = true;
        document.getElementById("playIcon").textContent = "⏸";
        document.getElementById("playBtn").classList.add("playing");
        document.getElementById("statusText").textContent = "正在播放";

        updateVisualizer();
      }

      function stopPlay() {
        if (noiseNode) {
          noiseNode.stop();
          noiseNode = null;
        }

        Object.keys(mixerNodes).forEach((key) => {
          if (mixerNodes[key]) {
            mixerNodes[key].stop();
            mixerNodes[key] = null;
          }
        });

        isPlaying = false;
        document.getElementById("playIcon").textContent = "▶";
        document.getElementById("playBtn").classList.remove("playing");
        document.getElementById("statusText").textContent = "点击播放";
      }

      window.selectNoiseType = function (type) {
        document.querySelectorAll(".noise-card").forEach((card) => {
          card.classList.remove("active");
        });
        document.querySelector('[data-type="' + type + '"]').classList.add("active");

        currentNoiseType = type;

        if (isPlaying) {
          if (noiseNode) {
            noiseNode.stop();
          }
          noiseNode = createNoiseNode(type);
          noiseNode.connect(masterGain);
          noiseNode.start();
        }
      };

      window.updateMasterVolume = function (value) {
        if (masterGain) {
          masterGain.gain.value = value / 100;
        }
        document.getElementById("volumeValue").textContent = value + "%";
      };

      window.updateMixer = function (type, value) {
        document.getElementById(type + "-value").textContent = value + "%";

        if (!audioContext) {
          initAudio();
        }

        const gainValue = value / 100;
        mixerGains[type].gain.value = gainValue;

        if (isPlaying) {
          if (gainValue > 0 && !mixerNodes[type]) {
            mixerNodes[type] = createEnvironmentSound(type);
            mixerNodes[type].connect(mixerGains[type]);
            mixerNodes[type].start();
          } else if (gainValue === 0 && mixerNodes[type]) {
            mixerNodes[type].stop();
            mixerNodes[type] = null;
          }
        }
      };

      window.setTimer = function (minutes) {
        clearTimer();
        timerSeconds = minutes * 60;
        updateTimerDisplay();

        timerInterval = setInterval(function () {
          timerSeconds--;
          updateTimerDisplay();

          if (timerSeconds <= 0) {
            clearTimer();
            if (isPlaying) {
              togglePlay();
            }
          }
        }, 1000);
      };

      function clearTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        timerSeconds = 0;
        document.getElementById("timerDisplay").textContent = "--:--";
      }

      function updateTimerDisplay() {
        const hours = Math.floor(timerSeconds / 3600);
        const minutes = Math.floor((timerSeconds % 3600) / 60);
        const seconds = timerSeconds % 60;

        let display;
        if (hours > 0) {
          display =
            hours +
            ":" +
            minutes.toString().padStart(2, "0") +
            ":" +
            seconds.toString().padStart(2, "0");
        } else {
          display = minutes.toString().padStart(2, "0") + ":" + seconds.toString().padStart(2, "0");
        }
        document.getElementById("timerDisplay").textContent = display;
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("white-noise-theme", newTheme);
      };

      // 初始化
      document.addEventListener("DOMContentLoaded", function () {
        initVisualizer();

        const savedTheme = localStorage.getItem("white-noise-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      });
    </script>
  </body>
</html>

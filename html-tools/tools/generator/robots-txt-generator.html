  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>robots.txt 生成器</h1>
      <p class="desc">生成搜索引擎爬虫配置文件</p>

      <div class="card">
        <div class="presets">
          <h4>快速模板</h4>
          <div class="preset-btns">
            <button class="preset-btn" onclick="setPreset('allow')">允许所有</button>
            <button class="preset-btn" onclick="setPreset('block')">阻止所有</button>
            <button class="preset-btn" onclick="setPreset('standard')">标准配置</button>
            <button class="preset-btn" onclick="setPreset('wordpress')">WordPress</button>
          </div>
        </div>

        <div class="grid">
          <div>
            <h4>爬虫规则</h4>
            <div class="form-group">
              <label>User-Agent</label>
              <select id="userAgent" onchange="generate()">
                <option value="*">* (所有爬虫)</option>
                <option value="Googlebot">Googlebot</option>
                <option value="Bingbot">Bingbot</option>
                <option value="Baiduspider">Baiduspider</option>
                <option value="Yandex">Yandex</option>
              </select>
            </div>

            <div class="rule-list" id="ruleList">
              <div class="rule-item">
                <select onchange="generate()">
                  <option value="Disallow">Disallow</option>
                  <option value="Allow">Allow</option>
                </select>
                <input type="text" value="/admin/" oninput="generate()" placeholder="/path/" />
                <button onclick="removeRule(this)">×</button>
              </div>
              <div class="rule-item">
                <select onchange="generate()">
                  <option value="Disallow">Disallow</option>
                  <option value="Allow">Allow</option>
                </select>
                <input type="text" value="/private/" oninput="generate()" placeholder="/path/" />
                <button onclick="removeRule(this)">×</button>
              </div>
            </div>
            <button class="add-btn" onclick="addRule()">+ 添加规则</button>

            <div style="margin-top: 20px">
              <h4>其他设置</h4>
              <div class="form-group">
                <label>Sitemap URL (可选)</label>
                <input
                  type="text"
                  id="sitemap"
                  value="https://example.com/sitemap.xml"
                  oninput="generate()"
                />
              </div>
              <div class="form-group">
                <label>Crawl-delay (秒, 可选)</label>
                <input
                  type="number"
                  id="crawlDelay"
                  placeholder="不设置"
                  min="0"
                  oninput="generate()"
                />
              </div>
              <div class="checkbox-group">
                <label>
                  <input type="checkbox" id="addComments" checked onchange="generate()" />
                  添加注释说明
                </label>
              </div>
            </div>
          </div>

          <div>
            <h4>生成的 robots.txt</h4>
            <div class="output-code" id="output"></div>
            <div class="btn-row">
              <button class="btn primary" onclick="copyCode()">复制</button>
              <button class="btn" onclick="downloadFile()">下载文件</button>
            </div>
          </div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function getRules() {
        const rules = [];
        document.querySelectorAll("#ruleList .rule-item").forEach((item) => {
          const type = item.querySelector("select").value;
          const path = item.querySelector("input").value.trim();
          if (path) {
            rules.push({ type, path });
          }
        });
        return rules;
      }

      function addRule() {
        const list = document.getElementById("ruleList");
        const item = document.createElement("div");
        item.className = "rule-item";
        item.innerHTML = `
        <select onchange="generate()">
          <option value="Disallow">Disallow</option>
          <option value="Allow">Allow</option>
        </select>
        <input type="text" value="" oninput="generate()" placeholder="/path/" />
        <button onclick="removeRule(this)">×</button>
      `;
        list.appendChild(item);
      }

      function removeRule(btn) {
        btn.parentElement.remove();
        generate();
      }

      function generate() {
        const userAgent = document.getElementById("userAgent").value;
        const rules = getRules();
        const sitemap = document.getElementById("sitemap").value.trim();
        const crawlDelay = document.getElementById("crawlDelay").value;
        const addComments = document.getElementById("addComments").checked;

        let code = "";

        if (addComments) {
          code += "# robots.txt\n";
          code += "# Generated by WebUtils\n";
          code += "# https://example.com/robots.txt\n\n";
        }

        code += `User-agent: ${userAgent}\n`;

        rules.forEach((rule) => {
          code += `${rule.type}: ${rule.path}\n`;
        });

        if (crawlDelay) {
          code += `Crawl-delay: ${crawlDelay}\n`;
        }

        if (sitemap) {
          code += `\nSitemap: ${sitemap}\n`;
        }

        document.getElementById("output").textContent = code;
      }

      function copyCode() {
        const code = document.getElementById("output").textContent;
        navigator.clipboard.writeText(code);
      }

      function downloadFile() {
        const code = document.getElementById("output").textContent;
        const blob = new Blob([code], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "robots.txt";
        a.click();
        URL.revokeObjectURL(url);
      }

      generate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>

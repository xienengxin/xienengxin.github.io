  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>随机姓名生成器</h1>
      <p class="desc">生成随机中英文姓名，适合测试数据</p>

      <div class="card">
        <div class="options">
          <label>类型:</label>
          <select id="type">
            <option value="chinese">中文姓名</option>
            <option value="english">英文姓名</option>
            <option value="both">中英文混合</option>
          </select>
          <label>性别:</label>
          <select id="gender">
            <option value="random">随机</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
          <label for="input----">数量:</label>
          <input
            type="number"
            id="count"
            value="10"
            min="1"
            max="100"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          <button class="btn primary" onclick="generate()" aria-label="生成">生成</button>
        </div>

        <div class="result">
          <div class="name-list" id="nameList"></div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <div class="btn-row">
            <button class="btn" onclick="copyText()" aria-label="复制全部">复制全部</button>
            <button class="btn" onclick="generate()" aria-label="重新生成">重新生成</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const chineseSurnames = [
        "王",
        "李",
        "张",
        "刘",
        "陈",
        "杨",
        "黄",
        "赵",
        "周",
        "吴",
        "徐",
        "孙",
        "马",
        "朱",
        "胡",
        "郭",
        "林",
        "何",
        "高",
        "罗"
      ];
      const chineseMaleNames = [
        "伟",
        "强",
        "磊",
        "洋",
        "勇",
        "军",
        "杰",
        "涛",
        "明",
        "辉",
        "鹏",
        "飞",
        "超",
        "宇",
        "俊",
        "浩",
        "峰",
        "华",
        "建",
        "志"
      ];
      const chineseFemaleNames = [
        "芳",
        "娟",
        "敏",
        "静",
        "丽",
        "婷",
        "雪",
        "燕",
        "玲",
        "华",
        "红",
        "梅",
        "秀",
        "英",
        "莉",
        "桂",
        "兰",
        "萍",
        "霞",
        "颖"
      ];

      const englishMaleFirstNames = [
        "James",
        "John",
        "Robert",
        "Michael",
        "William",
        "David",
        "Richard",
        "Joseph",
        "Thomas",
        "Christopher",
        "Daniel",
        "Matthew",
        "Anthony",
        "Mark",
        "Steven"
      ];
      const englishFemaleFirstNames = [
        "Mary",
        "Patricia",
        "Jennifer",
        "Linda",
        "Elizabeth",
        "Barbara",
        "Susan",
        "Jessica",
        "Sarah",
        "Karen",
        "Lisa",
        "Nancy",
        "Emily",
        "Ashley",
        "Amanda"
      ];
      const englishLastNames = [
        "Smith",
        "Johnson",
        "Williams",
        "Brown",
        "Jones",
        "Garcia",
        "Miller",
        "Davis",
        "Rodriguez",
        "Martinez",
        "Anderson",
        "Taylor",
        "Thomas",
        "Moore",
        "Jackson"
      ];

      function random(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function generateChineseName(gender) {
        const surname = random(chineseSurnames);
        const g = gender === "random" ? (Math.random() > 0.5 ? "male" : "female") : gender;
        const names = g === "male" ? chineseMaleNames : chineseFemaleNames;
        const nameLength = Math.random() > 0.5 ? 1 : 2;
        let name = "";
        for (let i = 0; i < nameLength; i++) {
          name += random(names);
        }
        return { name: surname + name, type: "中文", gender: g === "male" ? "男" : "女" };
      }

      function generateEnglishName(gender) {
        const g = gender === "random" ? (Math.random() > 0.5 ? "male" : "female") : gender;
        const firstNames = g === "male" ? englishMaleFirstNames : englishFemaleFirstNames;
        const firstName = random(firstNames);
        const lastName = random(englishLastNames);
        return {
          name: firstName + " " + lastName,
          type: "English",
          gender: g === "male" ? "男" : "女"
        };
      }

      function generate() {
        const type = document.getElementById("type").value;
        const gender = document.getElementById("gender").value;
        const count = parseInt(document.getElementById("count").value) || 10;

        const names = [];
        for (let i = 0; i < count; i++) {
          let name;
          if (type === "chinese") {
            name = generateChineseName(gender);
          } else if (type === "english") {
            name = generateEnglishName(gender);
          } else {
            name = Math.random() > 0.5 ? generateChineseName(gender) : generateEnglishName(gender);
          }
          names.push(name);
        }

        // 显示名字卡片
        document.getElementById("nameList").innerHTML = names
          .map(
            (n) => `
        <div class="name-item" onclick="copyName('${n.name}')">
          <div class="name">${n.name}</div>
          <div class="type">${n.type} · ${n.gender}</div>
        </div>
      `
          )
          .join("");

        // 显示文本列表
        document.getElementById("output").value = names.map((n) => n.name).join("\n");
      }

      function copyName(name) {
        navigator.clipboard.writeText(name).then(() => {
          document.getElementById("status").textContent = "已复制: " + name;
          setTimeout(() => (document.getElementById("status").textContent = ""), 2000);
        });
      }

      function copyText() {
        const text = document.getElementById("output").value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          document.getElementById("status").textContent = "已复制全部姓名";
          setTimeout(() => (document.getElementById("status").textContent = ""), 2000);
        });
      }

      generate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

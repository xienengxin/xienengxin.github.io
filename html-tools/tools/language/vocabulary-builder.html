  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

        <span class="breadcrumb-separator">/</span>

      </nav>

      <h1>📖 单词本</h1>
      <p class="subtitle">记录生词，卡片复习，提升词汇量</p>

      <div class="modes">
        <button class="mode-btn active" onclick="switchMode('add')">添加单词</button>
        <button class="mode-btn" onclick="switchMode('list')">单词列表</button>
        <button class="mode-btn" onclick="switchMode('review')">卡片复习</button>
      </div>

      <div class="view active" id="addView">
        <div class="add-form">
          <input type="text" id="word" placeholder="单词" onkeypress="handleEnter(event)" />
          <textarea id="meaning" placeholder="释义、例句"></textarea>
          <button onclick="addWord()">+ 添加到单词本</button>
        </div>
      </div>

      <div class="view" id="listView">
        <div class="word-list" id="wordList">
          <div class="empty-state">还没有添加单词</div>
        </div>
      </div>

      <div class="view" id="reviewView">
        <div id="flashcardContainer">
          <div class="empty-state">还没有单词可以复习</div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_vocabulary_v1";
      let words = [];
      let currentMode = "add";
      let reviewIndex = 0;
      let isFlipped = false;

      function loadWords() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          words = saved ? JSON.parse(saved) : [];
        } catch (e) {
          words = [];
        }
      }

      function saveWords() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
      }

      function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll(".mode-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));

        if (mode === "add") {
          document.getElementById("addView").classList.add("active");
        } else if (mode === "list") {
          document.getElementById("listView").classList.add("active");
          renderList();
        } else if (mode === "review") {
          document.getElementById("reviewView").classList.add("active");
          reviewIndex = 0;
          isFlipped = false;
          renderReview();
        }
      }

      function handleEnter(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          addWord();
        }
      }

      function addWord() {
        const word = document.getElementById("word").value.trim();
        const meaning = document.getElementById("meaning").value.trim();

        if (!word || !meaning) {
          alert("请输入单词和释义");
          return;
        }

        words.unshift({
          id: Date.now(),
          word,
          meaning,
          addedAt: new Date().toISOString()
        });

        document.getElementById("word").value = "";
        document.getElementById("meaning").value = "";

        saveWords();
        alert("已添加到单词本！");
      }

      function deleteWord(id) {
        if (!confirm("确定要删除这个单词吗？")) return;
        words = words.filter((w) => w.id !== id);
        saveWords();
        renderList();
      }

      function renderList() {
        const container = document.getElementById("wordList");

        if (words.length === 0) {
          container.innerHTML = '<div class="empty-state">还没有添加单词</div>';
          return;
        }

        container.innerHTML = words
          .map(
            (w) => `
        <div class="word-card">
          <div class="word-header">
            <div class="word-text">${w.word}</div>
            <button class="word-delete" onclick="deleteWord(${w.id})">×</button>
          </div>
          <div class="word-meaning">${w.meaning}</div>
        </div>
      `
          )
          .join("");
      }

      function renderReview() {
        const container = document.getElementById("flashcardContainer");

        if (words.length === 0) {
          container.innerHTML = '<div class="empty-state">还没有单词可以复习</div>';
          return;
        }

        const word = words[reviewIndex];

        container.innerHTML = `
        <div class="flashcard" id="flashcard" onclick="flip()">
          <div class="flashcard-word">${word.word}</div>
          <div class="flashcard-meaning" style="display:none">${word.meaning}</div>
        </div>
        <div class="flashcard-controls">
          <button onclick="previousCard()">← 上一个</button>
          <button onclick="flip()">翻转卡片</button>
          <button onclick="nextCard()">下一个 →</button>
        </div>
        <p style="text-align:center;color:var(--text-muted);margin-top:1rem">
          ${reviewIndex + 1} / ${words.length}
        </p>
      `;
      }

      function flip() {
        isFlipped = !isFlipped;
        const card = document.getElementById("flashcard");
        const meaning = card.querySelector(".flashcard-meaning");

        if (isFlipped) {
          card.classList.add("flipped");
          meaning.style.display = "block";
        } else {
          card.classList.remove("flipped");
          meaning.style.display = "none";
        }
      }

      function nextCard() {
        reviewIndex = (reviewIndex + 1) % words.length;
        isFlipped = false;
        renderReview();
      }

      function previousCard() {
        reviewIndex = (reviewIndex - 1 + words.length) % words.length;
        isFlipped = false;
        renderReview();
      }

      // Keyboard shortcuts for review
      document.addEventListener("keydown", (e) => {
        if (currentMode === "review") {
          if (e.code === "Space" || e.code === "ArrowUp") {
            e.preventDefault();
            flip();
          } else if (e.code === "ArrowRight") {
            nextCard();
          } else if (e.code === "ArrowLeft") {
            previousCard();
          }
        }
      });

      // Initialize
      loadWords();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

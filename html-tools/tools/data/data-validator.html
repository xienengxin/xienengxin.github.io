        /* 玻璃拟态 */

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */

        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        flex-wrap: wrap;
      }

      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }

      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }

      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .title-section {
        flex: 1;
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-section h1 .icon {
        font-size: 1.8rem;
      }

      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .main-content {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }

      .tool-section {
        margin-bottom: 24px;
      }

      .section-title {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .input-group {
        margin-bottom: 16px;
      }

      .input-label {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
      }

      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        transition: border-color 0.2s;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      .type-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .type-btn {
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .type-btn:hover {
        border-color: var(--color-accent-cyan);
      }

      .type-btn.active {
        background: rgba(0, 245, 212, 0.1);
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        flex: 1;
        min-width: 120px;
        padding: 12px 20px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px var(--glow-cyan);
      }

      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .stat-item {
        padding: 16px 20px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        flex: 1;
        min-width: 120px;
        text-align: center;
      }

      .stat-item.valid {
        border-color: var(--accent-green);
        background: rgba(16, 185, 129, 0.1);
      }

      .stat-item.invalid {
        border-color: var(--accent-red);
        background: rgba(244, 63, 94, 0.1);
      }

      .stat-value {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
      }

      .stat-item.valid .stat-value {
        color: var(--accent-green);
      }

      .stat-item.invalid .stat-value {
        color: var(--accent-red);
      }

      .stat-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .stat-percent {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .results-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 768px) {
        .results-container {
          grid-template-columns: 1fr;
        }
      }

      .result-panel {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
      }

      .result-panel.valid {
        border-color: var(--accent-green);
      }

      .result-panel.invalid {
        border-color: var(--accent-red);
      }

      .result-header {
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 600;
        background: var(--color-bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .result-panel.valid .result-header {
        color: var(--accent-green);
      }

      .result-panel.invalid .result-header {
        color: var(--accent-red);
      }

      .result-content {
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .result-item {
        padding: 6px 0;
        border-bottom: 1px solid var(--border-subtle);
      }

      .result-item:last-child {
        border-bottom: none;
      }

      .result-item.valid {
        color: var(--accent-green);
      }

      .result-item.invalid {
        color: var(--accent-red);
      }

      .empty-state {
        color: var(--text-muted);
        text-align: center;
        padding: 24px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .container {
          padding: 16px;
        }

        .btn-row {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <div class="container">
      <header class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">数据验证器</span>
        </nav>
        <div class="title-section">
          <h1>
            <span class="icon">✓</span>
            数据验证器
          </h1>
          <p>验证数据格式，支持数字、邮箱、URL、日期、手机号等</p>
        </div>
      </header>

      <main class="main-content">
        <div class="tool-section">
          <div class="section-title">数据输入</div>
          <div class="input-group">
            <label class="input-label">输入数据（每行一条）</label>
            <textarea
              id="input"
              placeholder="输入要验证的数据，每行一条...&#10;示例:&#10;test@example.com&#10;invalid-email&#10;hello@world.org"
            ></textarea>
          </div>
        </div>

        <div class="tool-section">
          <div class="section-title">验证类型</div>
          <div class="type-selector">
            <button class="type-btn active" data-type="email">📧 邮箱</button>
            <button class="type-btn" data-type="url">🔗 URL</button>
            <button class="type-btn" data-type="number">🔢 数字</button>
            <button class="type-btn" data-type="integer">123 整数</button>
            <button class="type-btn" data-type="phone-cn">📱 手机号(中国)</button>
            <button class="type-btn" data-type="date">📅 日期</button>
            <button class="type-btn" data-type="ipv4">🌐 IPv4</button>
            <button class="type-btn" data-type="hex-color">🎨 十六进制颜色</button>
            <button class="type-btn" data-type="uuid">🆔 UUID</button>
            <button class="type-btn" data-type="json">📋 JSON</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="validateData()">✓ 验证</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
          </div>
        </div>

        <div class="tool-section">
          <div class="section-title">验证结果</div>
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value" id="totalCount">0</div>
              <div class="stat-label">总数</div>
            </div>
            <div class="stat-item valid">
              <div class="stat-value" id="validCount">0</div>
              <div class="stat-label">有效</div>
              <div class="stat-percent" id="validPercent">0%</div>
            </div>
            <div class="stat-item invalid">
              <div class="stat-value" id="invalidCount">0</div>
              <div class="stat-label">无效</div>
              <div class="stat-percent" id="invalidPercent">0%</div>
            </div>
          </div>

          <div class="results-container">
            <div class="result-panel valid">
              <div class="result-header">
                <span>✓ 有效数据</span>
                <button
                  class="btn btn-secondary"
                  style="flex: 0; min-width: auto; padding: 6px 12px"
                  onclick="copyValid()"
                >
                  复制
                </button>
              </div>
              <div class="result-content" id="validList">
                <div class="empty-state">验证后显示...</div>
              </div>
            </div>
            <div class="result-panel invalid">
              <div class="result-header">
                <span>✗ 无效数据</span>
                <button
                  class="btn btn-secondary"
                  style="flex: 0; min-width: auto; padding: 6px 12px"
                  onclick="copyInvalid()"
                >
                  复制
                </button>
              </div>
              <div class="result-content" id="invalidList">
                <div class="empty-state">验证后显示...</div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">操作成功</div>

    <script>
      const LS_KEY = "data-validator-state";
      let currentType = "email";
      let validItems = [];
      let invalidItems = [];

      // Elements
      const inputEl = document.getElementById("input");

      // Type selector
      document.querySelectorAll(".type-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".type-btn").forEach((b) => b.classList.remove("active"));
          this.classList.add("active");
          currentType = this.dataset.type;
          saveState();
        });
      });

      // Validators
      const validators = {
        email: (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
        url: (v) => {
          try {
            new URL(v);
            return true;
          } catch {
            return false;
          }
        },
        number: (v) => !isNaN(parseFloat(v)) && isFinite(v),
        integer: (v) => /^-?\d+$/.test(v),
        "phone-cn": (v) => /^1[3-9]\d{9}$/.test(v.replace(/\s+/g, "")),
        date: (v) => {
          // Supports: YYYY-MM-DD, YYYY/MM/DD, DD-MM-YYYY, DD/MM/YYYY
          const patterns = [
            /^\d{4}-\d{2}-\d{2}$/,
            /^\d{4}\/\d{2}\/\d{2}$/,
            /^\d{2}-\d{2}-\d{4}$/,
            /^\d{2}\/\d{2}\/\d{4}$/
          ];
          if (!patterns.some((p) => p.test(v))) return false;
          const date = new Date(v);
          return !isNaN(date.getTime());
        },
        ipv4: (v) => {
          const parts = v.split(".");
          if (parts.length !== 4) return false;
          return parts.every((p) => {
            const num = parseInt(p, 10);
            return !isNaN(num) && num >= 0 && num <= 255 && p === String(num);
          });
        },
        "hex-color": (v) => /^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(v),
        uuid: (v) =>
          /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(v),
        json: (v) => {
          try {
            JSON.parse(v);
            return true;
          } catch {
            return false;
          }
        }
      };

      // Parse lines
      function parseLines(text) {
        return text
          .split("\n")
          .map((l) => l.trim())
          .filter((l) => l !== "");
      }

      // Create result item element safely
      function createResultItem(text, isValid) {
        const div = document.createElement("div");
        div.className = "result-item " + (isValid ? "valid" : "invalid");
        div.textContent = text;
        return div;
      }

      // Validate data
      function validateData() {
        const lines = parseLines(inputEl.value);
        if (lines.length === 0) {
          showToast("请输入数据");
          return;
        }

        const validator = validators[currentType];
        validItems = [];
        invalidItems = [];

        lines.forEach((line) => {
          if (validator(line)) {
            validItems.push(line);
          } else {
            invalidItems.push(line);
          }
        });

        // Update stats
        const total = lines.length;
        const validCount = validItems.length;
        const invalidCount = invalidItems.length;

        document.getElementById("totalCount").textContent = total;
        document.getElementById("validCount").textContent = validCount;
        document.getElementById("invalidCount").textContent = invalidCount;
        document.getElementById("validPercent").textContent =
          total > 0 ? ((validCount / total) * 100).toFixed(1) + "%" : "0%";
        document.getElementById("invalidPercent").textContent =
          total > 0 ? ((invalidCount / total) * 100).toFixed(1) + "%" : "0%";

        // Update lists using safe DOM methods
        const validList = document.getElementById("validList");
        const invalidList = document.getElementById("invalidList");

        // Clear existing content
        validList.textContent = "";
        invalidList.textContent = "";

        if (validItems.length > 0) {
          validItems.forEach((item) => {
            validList.appendChild(createResultItem(item, true));
          });
        } else {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "empty-state";
          emptyDiv.textContent = "无有效数据";
          validList.appendChild(emptyDiv);
        }

        if (invalidItems.length > 0) {
          invalidItems.forEach((item) => {
            invalidList.appendChild(createResultItem(item, false));
          });
        } else {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "empty-state";
          emptyDiv.textContent = "无无效数据";
          invalidList.appendChild(emptyDiv);
        }

        saveState();
        showToast("验证完成");
      }

      // Copy valid items
      function copyValid() {
        if (validItems.length === 0) {
          showToast("没有可复制的有效数据");
          return;
        }
        navigator.clipboard.writeText(validItems.join("\n")).then(() => {
          showToast("有效数据已复制");
        });
      }

      // Copy invalid items
      function copyInvalid() {
        if (invalidItems.length === 0) {
          showToast("没有可复制的无效数据");
          return;
        }
        navigator.clipboard.writeText(invalidItems.join("\n")).then(() => {
          showToast("无效数据已复制");
        });
      }

      // Clear all
      function clearAll() {
        inputEl.value = "";
        validItems = [];
        invalidItems = [];
        document.getElementById("totalCount").textContent = "0";
        document.getElementById("validCount").textContent = "0";
        document.getElementById("invalidCount").textContent = "0";
        document.getElementById("validPercent").textContent = "0%";
        document.getElementById("invalidPercent").textContent = "0%";

        const validList = document.getElementById("validList");
        const invalidList = document.getElementById("invalidList");
        validList.textContent = "";
        invalidList.textContent = "";

        const emptyValid = document.createElement("div");
        emptyValid.className = "empty-state";
        emptyValid.textContent = "验证后显示...";
        validList.appendChild(emptyValid);

        const emptyInvalid = document.createElement("div");
        emptyInvalid.className = "empty-state";
        emptyInvalid.textContent = "验证后显示...";
        invalidList.appendChild(emptyInvalid);

        localStorage.removeItem(LS_KEY);
        showToast("已清空");
      }

      // Save state
      function saveState() {
        const state = {
          input: inputEl.value,
          type: currentType
        };
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      }

      // Load state
      function loadState() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const state = JSON.parse(saved);
            inputEl.value = state.input || "";

            if (state.type) {
              currentType = state.type;
              document.querySelectorAll(".type-btn").forEach((btn) => {
                if (btn.dataset.type === state.type) {
                  btn.classList.add("active");
                } else {
                  btn.classList.remove("active");
                }
              });
            }
          }
        } catch {
          // ignore
        }
      }

      // Theme toggle
      function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      // Show toast
      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Init theme
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      // Auto-save on input
      inputEl.addEventListener("input", saveState);

      // Load state on init
      loadState();
    </script>
  </body>
</html>

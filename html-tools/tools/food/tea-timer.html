      <h1>泡茶计时器</h1>
      <p class="subtitle">不同茶类推荐温度和冲泡时间</p>

      <div class="card">
        <h3 style="margin-bottom: 16px">选择茶类</h3>
        <div class="tea-grid">
          <button class="tea-btn active" data-tea="green" onclick="setTea('green')">
            <div class="icon">🍵</div>
            <div class="name">绿茶</div>
          </button>
          <button class="tea-btn" data-tea="white" onclick="setTea('white')">
            <div class="icon">🤍</div>
            <div class="name">白茶</div>
          </button>
          <button class="tea-btn" data-tea="yellow" onclick="setTea('yellow')">
            <div class="icon">💛</div>
            <div class="name">黄茶</div>
          </button>
          <button class="tea-btn" data-tea="oolong" onclick="setTea('oolong')">
            <div class="icon">🧡</div>
            <div class="name">乌龙茶</div>
          </button>
          <button class="tea-btn" data-tea="black" onclick="setTea('black')">
            <div class="icon">🖤</div>
            <div class="name">红茶</div>
          </button>
          <button class="tea-btn" data-tea="puerh" onclick="setTea('puerh')">
            <div class="icon">🫖</div>
            <div class="name">普洱茶</div>
          </button>
          <button class="tea-btn" data-tea="herbal" onclick="setTea('herbal')">
            <div class="icon">🌿</div>
            <div class="name">花草茶</div>
          </button>
          <button class="tea-btn" data-tea="matcha" onclick="setTea('matcha')">
            <div class="icon">🍃</div>
            <div class="name">抹茶</div>
          </button>
          <button class="tea-btn" data-tea="custom" onclick="setTea('custom')">
            <div class="icon">⚙️</div>
            <div class="name">自定义</div>
          </button>
        </div>

        <div class="steep-count">
          <span style="color: var(--text-secondary)">第</span>
          <button class="steep-btn" onclick="changeSteep(-1)">−</button>
          <span class="steep-num" id="steepNum">1</span>
          <button class="steep-btn" onclick="changeSteep(1)">+</button>
          <span style="color: var(--text-secondary)">泡</span>
        </div>
      </div>

      <div class="card">
        <div class="timer-display">
          <div class="timer-time" id="timerDisplay">03:00</div>
          <div class="timer-label" id="timerLabel">准备开始</div>
        </div>

        <div class="control-buttons">
          <button class="control-btn primary" id="startBtn" onclick="toggleTimer()">开始</button>
          <button class="control-btn secondary" onclick="resetTimer()">重置</button>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 16px">冲泡参数</h3>
        <div class="param-row">
          <span class="label">推荐水温</span>
          <span class="value" id="tempValue">80°C</span>
        </div>
        <div class="param-row">
          <span class="label">首泡时间</span>
          <span class="value" id="firstSteep">3分钟</span>
        </div>
        <div class="param-row">
          <span class="label">茶水比例</span>
          <span class="value" id="ratioValue">1:50</span>
        </div>
        <div class="param-row">
          <span class="label">可冲泡次数</span>
          <span class="value" id="steepCount">3-4次</span>
        </div>

        <div class="steeping-info">
          <div class="steeping-item">
            <div class="value" id="currentTemp">80°C</div>
            <div class="label">当前泡水温</div>
          </div>
          <div class="steeping-item">
            <div class="value" id="currentTime">3:00</div>
            <div class="label">当前泡时间</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 12px">冲泡技巧</h3>
        <div class="tips-box" id="tips"></div>
      </div>
    </div>

    <script>
      var teas = {
        green: {
          name: "绿茶",
          temp: 80,
          firstTime: 180,
          ratio: "1:50",
          steeps: "3-4次",
          increment: 30,
          tips: [
            "1. 水温不宜过高，80°C左右最佳",
            "2. 第一泡可快速出汤，避免苦涩",
            "3. 玻璃杯冲泡可欣赏茶叶舒展",
            "4. 存放避光防潮，保持茶叶鲜爽"
          ]
        },
        white: {
          name: "白茶",
          temp: 90,
          firstTime: 180,
          ratio: "1:40",
          steeps: "5-7次",
          increment: 20,
          tips: [
            "1. 白毫银针水温可略低85°C",
            "2. 老白茶可用沸水冲泡",
            "3. 白茶越陈越香，可长期存放",
            "4. 盖碗或紫砂壶冲泡皆可"
          ]
        },
        yellow: {
          name: "黄茶",
          temp: 85,
          firstTime: 180,
          ratio: "1:50",
          steeps: "3-4次",
          increment: 30,
          tips: [
            "1. 黄茶较为珍贵，冲泡需细心",
            "2. 水温85°C，保留茶香",
            "3. 闷黄工艺使茶性更温和",
            "4. 玻璃杯冲泡可观赏茶汤"
          ]
        },
        oolong: {
          name: "乌龙茶",
          temp: 95,
          firstTime: 30,
          ratio: "1:20",
          steeps: "7-10次",
          increment: 5,
          tips: [
            "1. 功夫茶冲泡，快进快出",
            "2. 首泡润茶，倒掉不饮",
            "3. 铁观音、大红袍可用沸水",
            "4. 紫砂壶更能激发茶香"
          ]
        },
        black: {
          name: "红茶",
          temp: 95,
          firstTime: 180,
          ratio: "1:50",
          steeps: "3-4次",
          increment: 30,
          tips: [
            "1. 红茶可用沸水冲泡",
            "2. 工夫红茶时间可适当缩短",
            "3. 可加入牛奶制作奶茶",
            "4. 冬季饮用暖胃驱寒"
          ]
        },
        puerh: {
          name: "普洱茶",
          temp: 100,
          firstTime: 15,
          ratio: "1:20",
          steeps: "10-15次",
          increment: 5,
          tips: [
            "1. 沸水冲泡，醒茶很重要",
            "2. 前两泡润茶，快速出汤倒掉",
            "3. 生普水温可略低，熟普用沸水",
            "4. 普洱越陈越香，注意存放条件"
          ]
        },
        herbal: {
          name: "花草茶",
          temp: 100,
          firstTime: 300,
          ratio: "1:80",
          steeps: "2-3次",
          increment: 60,
          tips: [
            "1. 沸水冲泡，释放花草精华",
            "2. 加盖焖泡效果更佳",
            "3. 可根据口味调整浓度",
            "4. 玫瑰、菊花、洛神等各有功效"
          ]
        },
        matcha: {
          name: "抹茶",
          temp: 80,
          firstTime: 60,
          ratio: "1:60",
          steeps: "1次",
          increment: 0,
          tips: [
            "1. 先筛粉去除结块",
            "2. 用茶筅快速搅打至起泡",
            "3. 水温不宜过高，80°C最佳",
            "4. 现冲现饮，不宜久放"
          ]
        },
        custom: {
          name: "自定义",
          temp: 90,
          firstTime: 180,
          ratio: "自定义",
          steeps: "自定义",
          increment: 30,
          tips: [
            "1. 根据茶叶特性调整参数",
            "2. 嫩叶水温低，老叶水温高",
            "3. 多次冲泡逐渐延长时间",
            "4. 品茶记录心得，总结经验"
          ]
        }
      };

      var currentTea = "green";
      var currentSteep = 1;
      var totalSeconds = 180;
      var remainingSeconds = 180;
      var timerInterval = null;
      var isRunning = false;

      function setTea(tea) {
        currentTea = tea;
        currentSteep = 1;
        var config = teas[tea];

        document.querySelectorAll(".tea-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.tea === tea);
        });

        document.getElementById("steepNum").textContent = currentSteep;
        document.getElementById("tempValue").textContent = config.temp + "°C";
        document.getElementById("firstSteep").textContent = formatTime(config.firstTime);
        document.getElementById("ratioValue").textContent = config.ratio;
        document.getElementById("steepCount").textContent = config.steeps;

        updateSteepParams();
        resetTimer();

        var tipsEl = document.getElementById("tips");
        while (tipsEl.firstChild) tipsEl.removeChild(tipsEl.firstChild);
        config.tips.forEach(function (tip) {
          var div = document.createElement("div");
          div.textContent = tip;
          tipsEl.appendChild(div);
        });
      }

      function changeSteep(delta) {
        currentSteep = Math.max(1, currentSteep + delta);
        document.getElementById("steepNum").textContent = currentSteep;
        updateSteepParams();
        resetTimer();
      }

      function updateSteepParams() {
        var config = teas[currentTea];
        var steepTime = config.firstTime + (currentSteep - 1) * config.increment;
        var steepTemp = config.temp;

        if (currentTea === "puerh" || currentTea === "oolong") {
          steepTemp = Math.max(90, config.temp - (currentSteep - 1) * 2);
        }

        totalSeconds = steepTime;
        remainingSeconds = steepTime;

        document.getElementById("currentTemp").textContent = steepTemp + "°C";
        document.getElementById("currentTime").textContent = formatTime(steepTime);
        document.getElementById("timerDisplay").textContent = formatTimerDisplay(steepTime);
      }

      function formatTime(seconds) {
        if (seconds < 60) {
          return seconds + "秒";
        }
        var mins = Math.floor(seconds / 60);
        var secs = seconds % 60;
        if (secs === 0) {
          return mins + "分钟";
        }
        return mins + "分" + secs + "秒";
      }

      function formatTimerDisplay(seconds) {
        var mins = Math.floor(seconds / 60);
        var secs = seconds % 60;
        return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
      }

      function toggleTimer() {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      }

      function startTimer() {
        if (remainingSeconds <= 0) {
          resetTimer();
        }
        isRunning = true;
        document.getElementById("startBtn").textContent = "暂停";
        document.getElementById("timerDisplay").classList.add("running");
        document.getElementById("timerDisplay").classList.remove("finished");
        document.getElementById("timerLabel").textContent = "正在冲泡...";

        timerInterval = setInterval(function () {
          remainingSeconds--;
          document.getElementById("timerDisplay").textContent =
            formatTimerDisplay(remainingSeconds);

          if (remainingSeconds <= 0) {
            finishTimer();
          }
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        document.getElementById("startBtn").textContent = "继续";
        document.getElementById("timerDisplay").classList.remove("running");
        document.getElementById("timerLabel").textContent = "已暂停";
      }

      function finishTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        document.getElementById("startBtn").textContent = "开始";
        document.getElementById("timerDisplay").classList.remove("running");
        document.getElementById("timerDisplay").classList.add("finished");
        document.getElementById("timerLabel").textContent = "冲泡完成！";

        if ("Notification" in window && Notification.permission === "granted") {
          new Notification("泡茶计时器", {
            body: teas[currentTea].name + "第" + currentSteep + "泡完成！"
          });
        }

        try {
          var audio = new AudioContext();
          var oscillator = audio.createOscillator();
          var gain = audio.createGain();
          oscillator.connect(gain);
          gain.connect(audio.destination);
          oscillator.frequency.value = 800;
          gain.gain.value = 0.3;
          oscillator.start();
          setTimeout(function () {
            oscillator.stop();
          }, 200);
        } catch (e) {}
      }

      function resetTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        remainingSeconds = totalSeconds;
        document.getElementById("startBtn").textContent = "开始";
        document.getElementById("timerDisplay").textContent = formatTimerDisplay(totalSeconds);
        document.getElementById("timerDisplay").classList.remove("running", "finished");
        document.getElementById("timerLabel").textContent = "准备开始";
      }

      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      setTea("green");

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

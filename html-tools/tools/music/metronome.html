<html lang="zh-CN">
  <head>

    <link

    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .metronome-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
      }
      .bpm-display {
        margin-bottom: 2rem;
      }
      .bpm-value {
        font-family: var(--font-mono);
        font-size: 6rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        line-height: 1;
        transition: color 0.1s;
      }
      .bpm-value.beat {
        color: var(--color-accent-purple);
      }
      .bpm-label {
        font-size: 1.25rem;
        color: var(--color-text-secondary);
        margin-top: 0.5rem;
      }
      .bpm-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .bpm-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid var(--border-subtle);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bpm-btn:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .bpm-btn:active {
        transform: scale(0.95);
      }
      .bpm-slider {
        flex: 1;
        max-width: 200px;
        -webkit-appearance: none;
        height: 8px;
        border-radius: 4px;
        background: var(--color-bg-surface);
        outline: none;
      }
      .bpm-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-blue), var(--color-accent-cyan));
        cursor: pointer;
      }
      .beats-display {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      .beat-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--color-bg-surface);
        border: 2px solid var(--border-subtle);
        transition: all 0.1s;
      }
      .beat-dot.active {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 15px var(--color-accent-cyan);
      }
      .beat-dot.first.active {
        background: var(--color-accent-purple);
        border-color: var(--color-accent-purple);
        box-shadow: 0 0 15px var(--color-accent-purple);
      }
      .play-btn {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--accent-blue), var(--color-accent-cyan));
        color: #000;
        font-size: 2.5rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
      }
      .play-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0, 245, 212, 0.3);
      }
      .play-btn.playing {
        background: linear-gradient(135deg, #ff6b6b, #ff8787);
      }
      .settings {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
      }
      .setting-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .setting-group label {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .setting-group select {
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .tempo-presets {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-top: 1.5rem;
      }
      .preset-btn {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.8rem;
        transition: all 0.2s;
      }
      .preset-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-text-primary);
      }
      .tap-tempo {
        margin-top: 1.5rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .tap-btn {
        width: 100%;
        padding: 1rem;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .tap-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-text-primary);
      }
      .tap-btn:active {
        background: var(--bg-hover);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">BPM节拍器</span>
      </nav>

      <h1>BPM节拍器</h1>
      <p class="subtitle">可视化节拍器，支持多种拍号和音色</p>

      <div class="metronome-card">
        <div class="bpm-display">
          <div class="bpm-value" id="bpmValue">120</div>
          <div class="bpm-label">BPM</div>
        </div>

        <div class="bpm-controls">
          <button class="bpm-btn" onclick="adjustBPM(-10)" aria-label="−10">−10</button>
          <button class="bpm-btn" onclick="adjustBPM(-1)" aria-label="−">−</button>
          <input
            type="range"
            class="bpm-slider"
            id="bpmSlider"
            min="20"
            max="300"
            value="120"
            oninput="setBPM(this.value)"
          />
          <button class="bpm-btn" onclick="adjustBPM(1)" aria-label="+">+</button>
          <button class="bpm-btn" onclick="adjustBPM(10)" aria-label="+10">+10</button>
        </div>

        <div class="beats-display" id="beatsDisplay">
          <div class="beat-dot first"></div>
          <div class="beat-dot"></div>
          <div class="beat-dot"></div>
          <div class="beat-dot"></div>
        </div>

        <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="▶">▶</button>

        <div class="settings">
          <div class="setting-group">
            <label>拍号</label>
            <select id="timeSignature" onchange="updateTimeSignature()">
              <option value="2">2/4</option>
              <option value="3">3/4</option>
              <option value="4" selected>4/4</option>
              <option value="6">6/8</option>
            </select>
          </div>
          <div class="setting-group">
            <label>音色</label>
            <select id="soundType" onchange="updateSound()">
              <option value="click">木鱼</option>
              <option value="beep" selected>电子</option>
              <option value="drum">鼓点</option>
            </select>
          </div>
        </div>

        <div class="tempo-presets">
          <button class="preset-btn" onclick="setBPM(60)" aria-label="Largo 60">Largo 60</button>
          <button class="preset-btn" onclick="setBPM(80)" aria-label="Andante 80">
            Andante 80
          </button>
          <button class="preset-btn" onclick="setBPM(100)" aria-label="Moderato 100">
            Moderato 100
          </button>
          <button class="preset-btn" onclick="setBPM(120)" aria-label="Allegro 120">
            Allegro 120
          </button>
          <button class="preset-btn" onclick="setBPM(140)" aria-label="Vivace 140">
            Vivace 140
          </button>
          <button class="preset-btn" onclick="setBPM(180)" aria-label="Presto 180">
            Presto 180
          </button>
        </div>

        <div class="tap-tempo">
          <button
            class="tap-btn"
            id="tapBtn"
            onclick="tapTempo()"
            aria-label="点击测速 (Tap Tempo)"
          >
            点击测速 (Tap Tempo)
          </button>
        </div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let bpm = 120;
      let isPlaying = false;
      let currentBeat = 0;
      let beatsPerMeasure = 4;
      let intervalId = null;
      let audioContext = null;
      let tapTimes = [];

      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playSound(isAccent) {
        initAudio();
        const soundType = document.getElementById("soundType").value;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        if (soundType === "click") {
          oscillator.type = "sine";
          oscillator.frequency.value = isAccent ? 1000 : 800;
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
        } else if (soundType === "beep") {
          oscillator.type = "square";
          oscillator.frequency.value = isAccent ? 880 : 440;
          gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
        } else if (soundType === "drum") {
          oscillator.type = "triangle";
          oscillator.frequency.value = isAccent ? 200 : 150;
          gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        }

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.1);
      }

      function setBPM(value) {
        bpm = Math.max(20, Math.min(300, parseInt(value)));
        document.getElementById("bpmValue").textContent = bpm;
        document.getElementById("bpmSlider").value = bpm;
        if (isPlaying) {
          stopMetronome();
          startMetronome();
        }
      }

      function adjustBPM(delta) {
        setBPM(bpm + delta);
      }

      function updateTimeSignature() {
        beatsPerMeasure = parseInt(document.getElementById("timeSignature").value);
        const container = document.getElementById("beatsDisplay");
        container.innerHTML = "";
        for (let i = 0; i < beatsPerMeasure; i++) {
          const dot = document.createElement("div");
          dot.className = "beat-dot" + (i === 0 ? " first" : "");
          container.appendChild(dot);
        }
        currentBeat = 0;
      }

      function updateSound() {
        // Sound type is read directly in playSound
      }

      function tick() {
        const dots = document.querySelectorAll(".beat-dot");
        dots.forEach((d) => d.classList.remove("active"));

        playSound(currentBeat === 0);
        dots[currentBeat].classList.add("active");

        // Visual feedback on BPM display
        const bpmDisplay = document.getElementById("bpmValue");
        bpmDisplay.classList.add("beat");
        setTimeout(() => bpmDisplay.classList.remove("beat"), 50);

        currentBeat = (currentBeat + 1) % beatsPerMeasure;
      }

      function startMetronome() {
        currentBeat = 0;
        const interval = 60000 / bpm;
        tick();
        intervalId = setInterval(tick, interval);
      }

      function stopMetronome() {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
        document.querySelectorAll(".beat-dot").forEach((d) => d.classList.remove("active"));
      }

      function togglePlay() {
        const btn = document.getElementById("playBtn");
        isPlaying = !isPlaying;

        if (isPlaying) {
          initAudio();
          btn.textContent = "⏸";
          btn.classList.add("playing");
          startMetronome();
        } else {
          btn.textContent = "▶";
          btn.classList.remove("playing");
          stopMetronome();
        }
      }

      function tapTempo() {
        const now = Date.now();
        tapTimes.push(now);

        // Keep only last 5 taps
        if (tapTimes.length > 5) {
          tapTimes.shift();
        }

        if (tapTimes.length >= 2) {
          const intervals = [];
          for (let i = 1; i < tapTimes.length; i++) {
            intervals.push(tapTimes[i] - tapTimes[i - 1]);
          }
          const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
          const calculatedBPM = Math.round(60000 / avgInterval);
          setBPM(calculatedBPM);
        }

        // Reset if no tap for 2 seconds
        setTimeout(() => {
          if (Date.now() - tapTimes[tapTimes.length - 1] > 2000) {
            tapTimes = [];
          }
        }, 2000);
      }

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          togglePlay();
        } else if (e.code === "ArrowUp") {
          adjustBPM(1);
        } else if (e.code === "ArrowDown") {
          adjustBPM(-1);
        } else if (e.code === "KeyT") {
          tapTempo();
        }
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

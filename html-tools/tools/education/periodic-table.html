      ];

      const categoryNames = {
        alkali: "碱金属",
        alkaline: "碱土金属",
        transition: "过渡金属",
        "post-trans": "后过渡金属",
        metalloid: "类金属",
        nonmetal: "非金属",
        halogen: "卤素",
        noble: "稀有气体",
        lanthanide: "镧系元素",
        actinide: "锕系元素"
      };

      function buildTable() {
        const table = document.getElementById("periodicTable");
        const lanthanideRow = document.getElementById("lanthanideRow");
        const actinideRow = document.getElementById("actinideRow");

        table.textContent = "";
        lanthanideRow.textContent = "";
        actinideRow.textContent = "";

        // Build main table (7 periods x 18 groups)
        for (let p = 1; p <= 7; p++) {
          for (let g = 1; g <= 18; g++) {
            const el = elements.find((e) => e.p === p && e.g === g);
            if (el) {
              table.appendChild(createElementDiv(el));
            } else {
              const empty = document.createElement("div");
              empty.className = "element empty";
              table.appendChild(empty);
            }
          }
        }

        // Lanthanides (58-71)
        const label1 = document.createElement("div");
        label1.className = "series-label";
        label1.textContent = "镧系";
        lanthanideRow.appendChild(label1);

        for (let n = 58; n <= 71; n++) {
          const el = elements.find((e) => e.n === n);
          if (el) lanthanideRow.appendChild(createElementDiv(el));
        }

        // Actinides (90-103)
        const label2 = document.createElement("div");
        label2.className = "series-label";
        label2.textContent = "锕系";
        actinideRow.appendChild(label2);

        for (let n = 90; n <= 103; n++) {
          const el = elements.find((e) => e.n === n);
          if (el) actinideRow.appendChild(createElementDiv(el));
        }
      }

      function createElementDiv(el) {
        const div = document.createElement("div");
        div.className = "element " + el.c;
        div.dataset.number = el.n;

        const num = document.createElement("span");
        num.className = "number";
        num.textContent = el.n;

        const sym = document.createElement("span");
        sym.className = "symbol";
        sym.textContent = el.s;

        const name = document.createElement("span");
        name.className = "name";
        name.textContent = el.name;

        div.appendChild(num);
        div.appendChild(sym);
        div.appendChild(name);

        div.addEventListener("click", () => showDetail(el));

        return div;
      }

      function showDetail(el) {
        const panel = document.getElementById("detailPanel");
        panel.classList.add("active");

        const symbolDiv = document.getElementById("detailSymbol");
        symbolDiv.textContent = el.s;
        symbolDiv.className = "detail-symbol " + el.c;

        document.getElementById("detailName").textContent = el.name;
        document.getElementById("detailEnName").textContent = el.en;
        document.getElementById("detailCategory").textContent = categoryNames[el.c];
        document.getElementById("detailNumber").textContent = el.n;
        document.getElementById("detailMass").textContent = el.m;
        document.getElementById("detailConfig").textContent = el.config;
        document.getElementById("detailElectronegativity").textContent = el.en2 || "-";
        document.getElementById("detailDensity").textContent = el.d ? el.d + " g/cm³" : "-";
        document.getElementById("detailMelting").textContent = el.mp !== null ? el.mp + " °C" : "-";
        document.getElementById("detailBoiling").textContent = el.bp !== null ? el.bp + " °C" : "-";
        document.getElementById("detailYear").textContent =
          el.y > 0 ? el.y : "公元前" + Math.abs(el.y);
      }

      function searchElement(query) {
        query = query.toLowerCase().trim();

        document.querySelectorAll(".element:not(.empty)").forEach((div) => {
          const n = parseInt(div.dataset.number);
          const el = elements.find((e) => e.n === n);

          if (!query) {
            div.style.opacity = "1";
            return;
          }

          const match =
            el.s.toLowerCase().includes(query) ||
            el.name.includes(query) ||
            el.en.toLowerCase().includes(query) ||
            el.n.toString() === query;

          div.style.opacity = match ? "1" : "0.2";
        });
      }

      buildTable();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>

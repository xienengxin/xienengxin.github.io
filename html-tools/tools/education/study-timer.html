      <h1>🍅 学习计时器</h1>
      <p class="subtitle">番茄钟工作法，提升专注力</p>

      <div class="card">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="work">专注</button>
          <button class="mode-tab" data-mode="break">短休息</button>
          <button class="mode-tab" data-mode="longBreak">长休息</button>
        </div>

        <div class="timer-display">
          <div class="timer-circle" id="timerCircle">
            <svg viewBox="0 0 100 100">
              <circle class="bg" cx="50" cy="50" r="45" />
              <circle
                class="progress"
                id="progressCircle"
                cx="50"
                cy="50"
                r="45"
                stroke-dasharray="282.7"
                stroke-dashoffset="0"
              />
            </svg>
            <div>
              <div class="timer-time" id="timerDisplay">25:00</div>
              <div class="timer-label" id="timerLabel">准备开始</div>
            </div>
          </div>

          <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()" aria-label="开始">
              开始
            </button>
            <button class="btn btn-outline" onclick="resetTimer()" aria-label="重置">重置</button>
            <button class="btn btn-outline" onclick="skipTimer()" aria-label="跳过">跳过</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">今日统计</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="value" id="todayPomodoros">0</div>
            <div class="label">完成番茄</div>
          </div>
          <div class="stat-card">
            <div class="value" id="todayMinutes">0</div>
            <div class="label">专注分钟</div>
          </div>
          <div class="stat-card">
            <div class="value" id="currentStreak">0</div>
            <div class="label">连续天数</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">时间设置（分钟）</div>
        <div class="settings-grid">
          <div class="setting-item">
            <label for="input-----">专注时间</label>
            <input
              type="number"
              id="workTime"
              value="25"
              min="1"
              max="120"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-item">
            <label for="input----">短休息</label>
            <input
              type="number"
              id="breakTime"
              value="5"
              min="1"
              max="30"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-item">
            <label for="input----">长休息</label>
            <input
              type="number"
              id="longBreakTime"
              value="15"
              min="5"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>

        <div style="margin-top: 20px">
          <div class="toggle-row">
            <span>自动开始下一个</span>
            <div class="toggle" id="autoStartToggle" onclick="toggleSetting('autoStart')"></div>
          </div>
          <div class="toggle-row">
            <span>声音提醒</span>
            <div class="toggle active" id="soundToggle" onclick="toggleSetting('sound')"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let timer = null;
      let timeLeft = 25 * 60;
      let totalTime = 25 * 60;
      let isRunning = false;
      let currentMode = "work";
      let pomodoroCount = 0;

      let settings = {
        workTime: 25,
        breakTime: 5,
        longBreakTime: 15,
        autoStart: false,
        sound: true
      };

      let stats = {
        todayPomodoros: 0,
        todayMinutes: 0,
        lastDate: "",
        streak: 0
      };

      const modeColors = {
        work: "#ef4444",
        break: "#22c55e",
        longBreak: "#3b82f6"
      };

      function init() {
        loadSettings();
        loadStats();
        updateDisplay();
        updateStatsDisplay();

        document.querySelectorAll(".mode-tab").forEach((tab) => {
          tab.addEventListener("click", () => switchMode(tab.dataset.mode));
        });
      }

      function loadSettings() {
        const saved = localStorage.getItem("pomodoro_settings");
        if (saved) {
          try {
            settings = { ...settings, ...JSON.parse(saved) };
          } catch (e) {}
        }

        document.getElementById("workTime").value = settings.workTime;
        document.getElementById("breakTime").value = settings.breakTime;
        document.getElementById("longBreakTime").value = settings.longBreakTime;
        document.getElementById("autoStartToggle").classList.toggle("active", settings.autoStart);
        document.getElementById("soundToggle").classList.toggle("active", settings.sound);
      }

      function loadStats() {
        const saved = localStorage.getItem("pomodoro_stats");
        if (saved) {
          try {
            stats = { ...stats, ...JSON.parse(saved) };
          } catch (e) {}
        }

        const today = new Date().toDateString();
        if (stats.lastDate !== today) {
          if (stats.lastDate === new Date(Date.now() - 86400000).toDateString()) {
            stats.streak++;
          } else if (stats.lastDate !== "") {
            stats.streak = 0;
          }
          stats.todayPomodoros = 0;
          stats.todayMinutes = 0;
          stats.lastDate = today;
          saveStats();
        }
      }

      function saveSettings() {
        localStorage.setItem("pomodoro_settings", JSON.stringify(settings));
      }

      function saveStats() {
        localStorage.setItem("pomodoro_stats", JSON.stringify(stats));
      }

      function updateSettings() {
        settings.workTime = parseInt(document.getElementById("workTime").value) || 25;
        settings.breakTime = parseInt(document.getElementById("breakTime").value) || 5;
        settings.longBreakTime = parseInt(document.getElementById("longBreakTime").value) || 15;
        saveSettings();

        if (!isRunning) {
          switchMode(currentMode);
        }
      }

      function toggleSetting(key) {
        settings[key] = !settings[key];
        const toggle = document.getElementById(key + "Toggle");
        if (toggle) {
          toggle.classList.toggle("active", settings[key]);
        }
        saveSettings();
      }

      function switchMode(mode) {
        currentMode = mode;

        document.querySelectorAll(".mode-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.mode === mode);
        });

        let minutes;
        switch (mode) {
          case "work":
            minutes = settings.workTime;
            break;
          case "break":
            minutes = settings.breakTime;
            break;
          case "longBreak":
            minutes = settings.longBreakTime;
            break;
        }

        timeLeft = minutes * 60;
        totalTime = minutes * 60;

        document.documentElement.style.setProperty("--accent", modeColors[mode]);

        if (isRunning) {
          pauseTimer();
        }

        updateDisplay();
      }

      function toggleTimer() {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      }

      function startTimer() {
        isRunning = true;
        document.getElementById("startBtn").textContent = "暂停";
        document.getElementById("timerLabel").textContent =
          currentMode === "work" ? "专注中..." : "休息中...";

        timer = setInterval(() => {
          timeLeft--;
          updateDisplay();

          if (timeLeft <= 0) {
            completeTimer();
          }
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        clearInterval(timer);
        document.getElementById("startBtn").textContent = "继续";
        document.getElementById("timerLabel").textContent = "已暂停";
      }

      function resetTimer() {
        pauseTimer();
        switchMode(currentMode);
        document.getElementById("startBtn").textContent = "开始";
        document.getElementById("timerLabel").textContent = "准备开始";
      }

      function skipTimer() {
        completeTimer();
      }

      function completeTimer() {
        pauseTimer();

        if (settings.sound) {
          playSound();
        }

        if (currentMode === "work") {
          pomodoroCount++;
          stats.todayPomodoros++;
          stats.todayMinutes += settings.workTime;
          saveStats();
          updateStatsDisplay();

          if (pomodoroCount % 4 === 0) {
            switchMode("longBreak");
          } else {
            switchMode("break");
          }
        } else {
          switchMode("work");
        }

        if (settings.autoStart) {
          startTimer();
        } else {
          document.getElementById("timerLabel").textContent = "已完成！";
        }
      }

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timerDisplay").textContent =
          String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

        const progress = (totalTime - timeLeft) / totalTime;
        const circumference = 2 * Math.PI * 45;
        const offset = circumference * (1 - progress);
        document.getElementById("progressCircle").style.strokeDashoffset = offset;
      }

      function updateStatsDisplay() {
        document.getElementById("todayPomodoros").textContent = stats.todayPomodoros;
        document.getElementById("todayMinutes").textContent = stats.todayMinutes;
        document.getElementById("currentStreak").textContent = stats.streak;
      }

      function playSound() {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);

          oscillator.frequency.value = 800;
          oscillator.type = "sine";
          gainNode.gain.value = 0.3;

          oscillator.start();
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
          oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {}
      }

      init();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

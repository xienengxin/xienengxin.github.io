      <h1>📈 APY/APR计算器</h1>
      <p class="subtitle">年化收益率与年利率之间的转换计算</p>

      <div class="card">
        <div class="card-title">🔄 转换方向</div>
        <div class="tabs">
          <div class="tab active" onclick="switchMode('aprToApy')">APR → APY</div>
          <div class="tab" onclick="switchMode('apyToApr')">APY → APR</div>
        </div>
      </div>

      <div class="card" id="aprToApyCard">
        <div class="card-title">📊 APR转APY</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-apr--------">APR (年利率) %</label>
            <input
              type="number"
              id="aprInput"
              value="36.5"
              min="0"
              step="0.01"
              oninput="calcAprToApy()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>复利频率</label>
            <select id="compoundFreq" onchange="calcAprToApy()">
              <option value="365">每日复利</option>
              <option value="52">每周复利</option>
              <option value="12">每月复利</option>
              <option value="4">每季复利</option>
              <option value="2">每半年复利</option>
              <option value="1">每年复利</option>
            </select>
          </div>
        </div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">APY (年化收益率)</div>
            <div class="result-value" id="apyResult">44.02%</div>
          </div>
          <div class="result-item">
            <div class="result-label">复利收益增幅</div>
            <div class="result-value" id="compoundGain">+7.52%</div>
          </div>
        </div>
        <div class="formula">
          APY = (1 + APR/n)^n - 1
          <br />
          n = 复利次数/年
        </div>
      </div>

      <div class="card hidden" id="apyToAprCard">
        <div class="card-title">📊 APY转APR</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-apy----------">APY (年化收益率) %</label>
            <input
              type="number"
              id="apyInput"
              value="44.02"
              min="0"
              step="0.01"
              oninput="calcApyToApr()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>复利频率</label>
            <select id="compoundFreq2" onchange="calcApyToApr()">
              <option value="365">每日复利</option>
              <option value="52">每周复利</option>
              <option value="12">每月复利</option>
              <option value="4">每季复利</option>
              <option value="2">每半年复利</option>
              <option value="1">每年复利</option>
            </select>
          </div>
        </div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">APR (年利率)</div>
            <div class="result-value" id="aprResult">36.50%</div>
          </div>
          <div class="result-item">
            <div class="result-label">每期利率</div>
            <div class="result-value" id="periodRate">0.10%</div>
          </div>
        </div>
        <div class="formula">
          APR = n × ((1 + APY)^(1/n) - 1)
          <br />
          n = 复利次数/年
        </div>
      </div>

      <div class="card">
        <div class="card-title">💰 收益模拟</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----usdt-">本金 (USDT)</label>
            <input
              type="number"
              id="principal"
              value="10000"
              min="0"
              oninput="calcEarnings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">投资期限 (天)</label>
            <input
              type="number"
              id="days"
              value="365"
              min="1"
              oninput="calcEarnings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">简单利息收益</div>
            <div class="result-value" id="simpleEarning">3,650</div>
          </div>
          <div class="result-item">
            <div class="result-label">复利收益</div>
            <div class="result-value" id="compoundEarning">4,402</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var mode = "aprToApy";

      function switchMode(newMode) {
        mode = newMode;
        document.querySelectorAll(".tab").forEach(function (tab, idx) {
          tab.classList.remove("active");
          if ((newMode === "aprToApy" && idx === 0) || (newMode === "apyToApr" && idx === 1)) {
            tab.classList.add("active");
          }
        });
        document.getElementById("aprToApyCard").classList.toggle("hidden", newMode !== "aprToApy");
        document.getElementById("apyToAprCard").classList.toggle("hidden", newMode !== "apyToApr");
        calcEarnings();
      }

      function calcAprToApy() {
        var apr = parseFloat(document.getElementById("aprInput").value) / 100 || 0;
        var n = parseInt(document.getElementById("compoundFreq").value) || 365;

        var apy = Math.pow(1 + apr / n, n) - 1;
        var gain = apy - apr;

        document.getElementById("apyResult").textContent = (apy * 100).toFixed(2) + "%";
        document.getElementById("compoundGain").textContent = "+" + (gain * 100).toFixed(2) + "%";
        calcEarnings();
      }

      function calcApyToApr() {
        var apy = parseFloat(document.getElementById("apyInput").value) / 100 || 0;
        var n = parseInt(document.getElementById("compoundFreq2").value) || 365;

        var apr = n * (Math.pow(1 + apy, 1 / n) - 1);
        var periodRate = apr / n;

        document.getElementById("aprResult").textContent = (apr * 100).toFixed(2) + "%";
        document.getElementById("periodRate").textContent = (periodRate * 100).toFixed(4) + "%";
        calcEarnings();
      }

      function calcEarnings() {
        var principal = parseFloat(document.getElementById("principal").value) || 0;
        var days = parseInt(document.getElementById("days").value) || 365;

        var apr, apy, n;
        if (mode === "aprToApy") {
          apr = parseFloat(document.getElementById("aprInput").value) / 100 || 0;
          n = parseInt(document.getElementById("compoundFreq").value) || 365;
          apy = Math.pow(1 + apr / n, n) - 1;
        } else {
          apy = parseFloat(document.getElementById("apyInput").value) / 100 || 0;
          n = parseInt(document.getElementById("compoundFreq2").value) || 365;
          apr = n * (Math.pow(1 + apy, 1 / n) - 1);
        }

        var simpleEarning = (principal * apr * days) / 365;
        var compoundEarning = principal * (Math.pow(1 + apy, days / 365) - 1);

        document.getElementById("simpleEarning").textContent = simpleEarning.toLocaleString(
          "en-US",
          { maximumFractionDigits: 0 }
        );
        document.getElementById("compoundEarning").textContent = compoundEarning.toLocaleString(
          "en-US",
          { maximumFractionDigits: 0 }
        );
      }

      calcAprToApy();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

      <h1>⚡ 杠杆计算器</h1>
      <p class="subtitle">计算合约杠杆交易的盈亏和风险</p>

      <div class="card">
        <div class="card-title">💰 仓位设置</div>
        <div class="grid">
          <div class="form-group">
            <label for="input------usdt-">保证金 (USDT)</label>
            <input
              type="number"
              id="margin"
              value="1000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------usdt-">开仓价格 (USDT)</label>
            <input
              type="number"
              id="entryPrice"
              value="30000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>方向</label>
            <select id="direction">
              <option value="long">做多 (Long)</option>
              <option value="short">做空 (Short)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>杠杆倍数</label>
          <div class="leverage-select" id="leverageSelect">
            <div class="leverage-btn" data-leverage="1">1x</div>
            <div class="leverage-btn" data-leverage="2">2x</div>
            <div class="leverage-btn" data-leverage="3">3x</div>
            <div class="leverage-btn" data-leverage="5">5x</div>
            <div class="leverage-btn active" data-leverage="10">10x</div>
            <div class="leverage-btn" data-leverage="20">20x</div>
            <div class="leverage-btn" data-leverage="50">50x</div>
            <div class="leverage-btn" data-leverage="100">100x</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 价格变动模拟</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-------usdt-">目标价格 (USDT)</label>
            <input
              type="number"
              id="targetPrice"
              value="33000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算盈亏">
          计算盈亏
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📈 杠杆交易结果</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">仓位价值</div>
              <div class="result-value" id="positionValue"></div>
            </div>
            <div class="result-item">
              <div class="result-label">仓位数量</div>
              <div class="result-value" id="positionSize"></div>
            </div>
            <div class="result-item">
              <div class="result-label">价格变动</div>
              <div class="result-value" id="priceChange"></div>
            </div>
            <div class="result-item">
              <div class="result-label">盈亏金额</div>
              <div class="result-value" id="pnl"></div>
            </div>
            <div class="result-item">
              <div class="result-label">收益率</div>
              <div class="result-value" id="returnRate"></div>
            </div>
            <div class="result-item">
              <div class="result-label">爆仓价格</div>
              <div class="result-value red" id="liquidationPrice"></div>
            </div>
          </div>

          <div class="warning">
            <div class="warning-title">⚠️ 风险提示</div>
            <div class="warning-text" id="riskWarning"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var selectedLeverage = 10;

      document.getElementById("leverageSelect").addEventListener("click", function (e) {
        if (e.target.classList.contains("leverage-btn")) {
          document.querySelectorAll(".leverage-btn").forEach(function (btn) {
            btn.classList.remove("active");
          });
          e.target.classList.add("active");
          selectedLeverage = parseInt(e.target.dataset.leverage);
        }
      });

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2) + " USDT";
      }

      function calculate() {
        var margin = parseFloat(document.getElementById("margin").value) || 0;
        var entryPrice = parseFloat(document.getElementById("entryPrice").value) || 1;
        var direction = document.getElementById("direction").value;
        var targetPrice = parseFloat(document.getElementById("targetPrice").value) || entryPrice;

        var positionValue = margin * selectedLeverage;
        var positionSize = positionValue / entryPrice;
        var priceChangeAbs = targetPrice - entryPrice;
        var priceChangePct = (priceChangeAbs / entryPrice) * 100;

        var pnl;
        if (direction === "long") {
          pnl = positionSize * priceChangeAbs;
        } else {
          pnl = positionSize * -priceChangeAbs;
        }

        var returnRate = (pnl / margin) * 100;

        // 爆仓价格计算（假设维持保证金率5%）
        var maintenanceMarginRate = 0.05;
        var liquidationPrice;
        if (direction === "long") {
          liquidationPrice = entryPrice * (1 - (1 - maintenanceMarginRate) / selectedLeverage);
        } else {
          liquidationPrice = entryPrice * (1 + (1 - maintenanceMarginRate) / selectedLeverage);
        }

        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("positionValue").textContent = formatMoney(positionValue);
        document.getElementById("positionSize").textContent = positionSize.toFixed(6);

        var pcEl = document.getElementById("priceChange");
        pcEl.textContent = (priceChangePct >= 0 ? "+" : "") + priceChangePct.toFixed(2) + "%";
        pcEl.className = "result-value " + (priceChangePct >= 0 ? "green" : "red");

        var pnlEl = document.getElementById("pnl");
        pnlEl.textContent = (pnl >= 0 ? "+" : "") + formatMoney(pnl);
        pnlEl.className = "result-value " + (pnl >= 0 ? "green" : "red");

        var rrEl = document.getElementById("returnRate");
        rrEl.textContent = (returnRate >= 0 ? "+" : "") + returnRate.toFixed(2) + "%";
        rrEl.className = "result-value " + (returnRate >= 0 ? "green" : "red");

        document.getElementById("liquidationPrice").textContent =
          liquidationPrice.toFixed(2) + " USDT";

        var riskLevel;
        if (selectedLeverage <= 3) {
          riskLevel = "低风险";
        } else if (selectedLeverage <= 10) {
          riskLevel = "中等风险";
        } else if (selectedLeverage <= 50) {
          riskLevel = "高风险";
        } else {
          riskLevel = "极高风险";
        }

        var distanceToLiq = Math.abs(((entryPrice - liquidationPrice) / entryPrice) * 100);

        document.getElementById("riskWarning").textContent =
          "当前杠杆倍数: " +
          selectedLeverage +
          "x (" +
          riskLevel +
          ")\n" +
          "距离爆仓价格仅 " +
          distanceToLiq.toFixed(2) +
          "%\n" +
          "高杠杆交易风险极大，请谨慎操作，建议设置止损。";
      }

      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

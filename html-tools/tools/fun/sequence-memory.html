    <div class="header">

      <h1>🧠 序列记忆测试</h1>
      <p>记住闪烁的顺序</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="container">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">当前等级</div>
          <div class="stat-value" id="currentLevel">1</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">本轮得分</div>
          <div class="stat-value" id="currentScore">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">最高纪录</div>
          <div class="stat-value best" id="bestScore">0</div>
        </div>
      </div>

      <div class="game-info">
        <div class="level-display" id="levelDisplay">准备开始</div>
        <div class="status-text" id="statusText">点击开始按钮开始游戏</div>
      </div>

      <div class="grid-container">
        <div class="grid" id="grid"></div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-title">游戏结束!</div>
        <div class="result-score" id="finalScore">0</div>
        <div class="result-label">最终得分</div>
        <button class="btn btn-primary" onclick="startGame()">再来一次</button>
      </div>

      <div class="controls" id="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startGame()">开始游戏</button>
      </div>

      <div class="info-box">
        <h3>游戏规则</h3>
        <p>
          1. 观察方块闪烁的顺序
          <br />
          2. 按相同顺序点击方块
          <br />
          3. 每轮会增加一个新的方块
          <br />
          4. 记住的序列越长，得分越高
        </p>
      </div>
    </div>

    <script>
      // 游戏配置
      const GRID_SIZE = 9;
      const FLASH_DURATION = 400;
      const FLASH_INTERVAL = 600;

      // 游戏状态
      let sequence = [];
      let playerIndex = 0;
      let level = 1;
      let score = 0;
      let bestScore = 0;
      let isPlaying = false;
      let isShowingSequence = false;

      // DOM 元素
      const grid = document.getElementById("grid");
      const levelDisplay = document.getElementById("levelDisplay");
      const statusText = document.getElementById("statusText");
      const currentLevelEl = document.getElementById("currentLevel");
      const currentScoreEl = document.getElementById("currentScore");
      const bestScoreEl = document.getElementById("bestScore");
      const resultPanel = document.getElementById("resultPanel");
      const finalScoreEl = document.getElementById("finalScore");
      const startBtn = document.getElementById("startBtn");
      const controls = document.getElementById("controls");

      // 初始化网格
      function initGrid() {
        grid.innerHTML = "";
        for (let i = 0; i < GRID_SIZE; i++) {
          const tile = document.createElement("div");
          tile.className = "tile disabled";
          tile.dataset.index = i;
          tile.addEventListener("click", () => handleTileClick(i));
          grid.appendChild(tile);
        }
      }

      // 加载最高分
      function loadBestScore() {
        const saved = localStorage.getItem("sequenceMemoryBest");
        if (saved) {
          bestScore = parseInt(saved);
          bestScoreEl.textContent = bestScore;
        }
      }

      // 保存最高分
      function saveBestScore() {
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("sequenceMemoryBest", bestScore);
          bestScoreEl.textContent = bestScore;
        }
      }

      // 开始游戏
      function startGame() {
        sequence = [];
        playerIndex = 0;
        level = 1;
        score = 0;
        isPlaying = true;

        resultPanel.classList.remove("show");
        controls.style.display = "none";

        updateDisplay();
        addToSequence();
      }

      // 添加新的序列
      function addToSequence() {
        const newIndex = Math.floor(Math.random() * GRID_SIZE);
        sequence.push(newIndex);
        playerIndex = 0;

        levelDisplay.textContent = `等级 ${level}`;
        statusText.textContent = "观察序列...";

        setTimeout(() => showSequence(), 500);
      }

      // 显示序列
      async function showSequence() {
        isShowingSequence = true;
        setTilesDisabled(true);

        for (let i = 0; i < sequence.length; i++) {
          await flashTile(sequence[i]);
          await sleep(FLASH_INTERVAL - FLASH_DURATION);
        }

        isShowingSequence = false;
        setTilesDisabled(false);
        statusText.textContent = "请按顺序点击";
      }

      // 闪烁方块
      function flashTile(index) {
        return new Promise((resolve) => {
          const tiles = grid.querySelectorAll(".tile");
          const tile = tiles[index];
          tile.classList.add("active");
          playSound(400 + index * 50, 0.15);

          setTimeout(() => {
            tile.classList.remove("active");
            resolve();
          }, FLASH_DURATION);
        });
      }

      // 处理点击
      function handleTileClick(index) {
        if (!isPlaying || isShowingSequence) return;

        const tiles = grid.querySelectorAll(".tile");
        const tile = tiles[index];

        if (index === sequence[playerIndex]) {
          // 正确
          tile.classList.add("correct");
          playSound(600 + playerIndex * 50, 0.1);
          setTimeout(() => tile.classList.remove("correct"), 200);

          playerIndex++;

          if (playerIndex === sequence.length) {
            // 完成本轮
            score += level;
            level++;
            updateDisplay();

            setTilesDisabled(true);
            statusText.textContent = "太棒了！";

            setTimeout(() => addToSequence(), 1000);
          }
        } else {
          // 错误
          tile.classList.add("wrong");
          playSound(200, 0.2);
          setTimeout(() => tile.classList.remove("wrong"), 300);

          gameOver();
        }
      }

      // 游戏结束
      function gameOver() {
        isPlaying = false;
        setTilesDisabled(true);

        saveBestScore();

        levelDisplay.textContent = "游戏结束";
        statusText.textContent = "";

        finalScoreEl.textContent = score;
        resultPanel.classList.add("show");
        controls.style.display = "flex";
        startBtn.textContent = "再来一次";
      }

      // 更新显示
      function updateDisplay() {
        currentLevelEl.textContent = level;
        currentScoreEl.textContent = score;
      }

      // 设置方块禁用状态
      function setTilesDisabled(disabled) {
        const tiles = grid.querySelectorAll(".tile");
        tiles.forEach((tile) => {
          if (disabled) {
            tile.classList.add("disabled");
          } else {
            tile.classList.remove("disabled");
          }
        });
      }

      // 工具函数
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      // 播放音效
      function playSound(freq, duration) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = "sine";
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {}
      }

      // 主题切换
      function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector(".theme-toggle");
        if (body.getAttribute("data-theme") === "light") {
          body.removeAttribute("data-theme");
          btn.textContent = "🌙";
          localStorage.setItem("theme", "dark");
        } else {
          body.setAttribute("data-theme", "light");
          btn.textContent = "☀️";
          localStorage.setItem("theme", "light");
        }
      }

      // 初始化
      (function init() {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") {
          document.body.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
        initGrid();
        loadBestScore();
      })();
    </script>
  </body>
</html>

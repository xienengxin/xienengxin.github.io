    <div class="header">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>🪙 抛硬币</h1>
      <p>公平随机 · 帮你做决定</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="container">
      <div class="coin-area">
        <div class="coin-container">
          <div class="coin" id="coin" onclick="flipCoin()">
            <div class="coin-face coin-heads">
              <div class="coin-inner">
                <span>👑</span>
                <span class="coin-label">正面</span>
              </div>
            </div>
            <div class="coin-face coin-tails">
              <div class="coin-inner">
                <span>🦅</span>
                <span class="coin-label">反面</span>
              </div>
            </div>
          </div>
        </div>
        <div class="result-text" id="resultText">点击硬币开始</div>
        <button class="flip-btn" id="flipBtn" onclick="flipCoin()">🪙 抛硬币</button>
        <div class="shake-hint">💡 点击硬币或摇动手机</div>
      </div>

      <div class="stats-panel">
        <div class="stats-title">📊 统计概率</div>
        <div class="stats-bars">
          <div class="stat-bar">
            <div class="stat-bar-header">
              <span class="stat-bar-label">正面 vs 反面</span>
              <span class="stat-bar-value">
                <span id="headsCount">0</span>
                :
                <span id="tailsCount">0</span>
              </span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill-heads" id="headsBar" style="width: 50%">50%</div>
              <div class="stat-bar-fill-tails" id="tailsBar" style="width: 50%">50%</div>
            </div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="totalFlips">0</div>
            <div class="stat-label">总次数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="headsPercent">-</div>
            <div class="stat-label">正面概率</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="tailsPercent">-</div>
            <div class="stat-label">反面概率</div>
          </div>
        </div>
        <div class="streak-display">
          当前连续:
          <span class="streak-value" id="currentStreak">-</span>
          &nbsp;|&nbsp; 最长连续:
          <span class="streak-value" id="maxStreak">-</span>
        </div>
      </div>

      <div class="history-section">
        <div class="history-title">
          <span>📜 历史记录 (最近50次)</span>
          <button class="history-clear" onclick="clearHistory()">清空</button>
        </div>
        <div class="history-list" id="historyList">
          <span style="color: var(--color-text-secondary); font-size: 13px; padding: 10px">
            暂无记录
          </span>
        </div>
      </div>
    </div>

    <script>
      let isFlipping = false;
      let stats = JSON.parse(
        localStorage.getItem("coinStats") ||
          '{"heads":0,"tails":0,"history":[],"currentStreak":0,"currentStreakType":null,"maxStreak":0}'
      );

      // 音频
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playFlipSound() {
        initAudio();
        // 硬币翻转音效
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800 + Math.random() * 400;
            oscillator.type = "sine";
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.05);
          }, i * 100);
        }
      }

      function playResultSound(isHeads) {
        initAudio();
        const freq = isHeads ? 523.25 : 392;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = freq;
        oscillator.type = "sine";
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
      }

      // 加密安全随机
      function secureRandom() {
        const array = new Uint32Array(1);
        crypto.getRandomValues(array);
        return array[0] / (0xffffffff + 1);
      }

      function flipCoin() {
        if (isFlipping) return;
        isFlipping = true;

        initAudio();
        const coin = document.getElementById("coin");
        const flipBtn = document.getElementById("flipBtn");
        const resultText = document.getElementById("resultText");

        flipBtn.disabled = true;
        resultText.textContent = "...";
        resultText.className = "result-text";

        // 使用加密随机
        const isHeads = secureRandom() >= 0.5;

        // 移除之前的动画类
        coin.classList.remove("flipping", "flipping-tails");

        // 强制重绘
        void coin.offsetWidth;

        // 添加动画
        playFlipSound();
        coin.classList.add(isHeads ? "flipping" : "flipping-tails");

        setTimeout(() => {
          // 显示结果
          if (isHeads) {
            resultText.textContent = "👑 正面";
            resultText.className = "result-text result-heads";
            stats.heads++;
          } else {
            resultText.textContent = "🦅 反面";
            resultText.className = "result-text result-tails";
            stats.tails++;
          }

          playResultSound(isHeads);

          // 更新连续记录
          const resultType = isHeads ? "heads" : "tails";
          if (stats.currentStreakType === resultType) {
            stats.currentStreak++;
          } else {
            stats.currentStreakType = resultType;
            stats.currentStreak = 1;
          }
          if (stats.currentStreak > stats.maxStreak) {
            stats.maxStreak = stats.currentStreak;
          }

          // 添加历史
          stats.history.unshift(isHeads ? "heads" : "tails");
          if (stats.history.length > 50) stats.history.pop();

          localStorage.setItem("coinStats", JSON.stringify(stats));
          updateUI();

          isFlipping = false;
          flipBtn.disabled = false;
        }, 1000);
      }

      function updateUI() {
        const total = stats.heads + stats.tails;

        document.getElementById("headsCount").textContent = stats.heads;
        document.getElementById("tailsCount").textContent = stats.tails;
        document.getElementById("totalFlips").textContent = total;

        if (total > 0) {
          const headsP = ((stats.heads / total) * 100).toFixed(1);
          const tailsP = ((stats.tails / total) * 100).toFixed(1);

          document.getElementById("headsPercent").textContent = headsP + "%";
          document.getElementById("tailsPercent").textContent = tailsP + "%";

          document.getElementById("headsBar").style.width = headsP + "%";
          document.getElementById("headsBar").textContent = headsP + "%";
          document.getElementById("tailsBar").style.width = tailsP + "%";
          document.getElementById("tailsBar").textContent = tailsP + "%";
        } else {
          document.getElementById("headsPercent").textContent = "-";
          document.getElementById("tailsPercent").textContent = "-";
          document.getElementById("headsBar").style.width = "50%";
          document.getElementById("headsBar").textContent = "50%";
          document.getElementById("tailsBar").style.width = "50%";
          document.getElementById("tailsBar").textContent = "50%";
        }

        const streakType =
          stats.currentStreakType === "heads"
            ? "正面"
            : stats.currentStreakType === "tails"
              ? "反面"
              : "-";
        document.getElementById("currentStreak").textContent =
          stats.currentStreak > 0 ? `${stats.currentStreak}次${streakType}` : "-";
        document.getElementById("maxStreak").textContent =
          stats.maxStreak > 0 ? `${stats.maxStreak}次` : "-";

        renderHistory();
      }

      function renderHistory() {
        const list = document.getElementById("historyList");
        if (stats.history.length === 0) {
          list.innerHTML =
            '<span style="color:var(--color-text-secondary);font-size:13px;padding:10px;">暂无记录</span>';
          return;
        }
        list.innerHTML = stats.history
          .map(
            (h) =>
              `<div class="history-item ${h === "heads" ? "history-heads" : "history-tails"}">${h === "heads" ? "👑" : "🦅"}</div>`
          )
          .join("");
      }

      function clearHistory() {
        stats = {
          heads: 0,
          tails: 0,
          history: [],
          currentStreak: 0,
          currentStreakType: null,
          maxStreak: 0
        };
        localStorage.setItem("coinStats", JSON.stringify(stats));
        document.getElementById("resultText").textContent = "点击硬币开始";
        document.getElementById("resultText").className = "result-text";
        updateUI();
      }

      // 摇动检测
      let lastShake = 0;
      if (window.DeviceMotionEvent) {
        window.addEventListener("devicemotion", (e) => {
          const acc = e.accelerationIncludingGravity;
          if (acc) {
            const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
            if (total > 35 && Date.now() - lastShake > 1500) {
              lastShake = Date.now();
              flipCoin();
            }
          }
        });
      }

      // 键盘
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter") {
          e.preventDefault();
          flipCoin();
        }
      });

      function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      // 初始化
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      updateUI();
    </script>
  </body>
</html>

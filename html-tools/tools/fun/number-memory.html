          <div class="level-item">
            <span class="label">优秀</span>
            <span class="value">9-10 位</span>
          </div>
          <div class="level-item">
            <span class="label">卓越</span>
            <span class="value">11-12 位</span>
          </div>
          <div class="level-item">
            <span class="label">超凡</span>
            <span class="value">13-15 位</span>
          </div>
          <div class="level-item">
            <span class="label">天才</span>
            <span class="value">16+ 位</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 游戏配置
      const BASE_DISPLAY_TIME = 1000; // 每位数字的基础显示时间
      const MIN_DISPLAY_TIME = 500; // 最短显示时间

      // 游戏状态
      let level = 1;
      let currentNumber = "";
      let bestScore = 0;
      let displayTimeout = null;

      // DOM 元素
      const gamePanel = document.getElementById("gamePanel");
      const gameContent = document.getElementById("gameContent");
      const currentLevelEl = document.getElementById("currentLevel");
      const digitCountEl = document.getElementById("digitCount");
      const bestScoreEl = document.getElementById("bestScore");

      // 加载最高分
      function loadBestScore() {
        const saved = localStorage.getItem("numberMemoryBest");
        if (saved) {
          bestScore = parseInt(saved);
          bestScoreEl.textContent = bestScore;
        }
      }

      // 保存最高分
      function saveBestScore() {
        if (level - 1 > bestScore) {
          bestScore = level - 1;
          localStorage.setItem("numberMemoryBest", bestScore);
          bestScoreEl.textContent = bestScore;
        }
      }

      // 生成随机数字
      function generateNumber(digits) {
        let num = "";
        for (let i = 0; i < digits; i++) {
          // 第一位不能是0
          if (i === 0) {
            num += Math.floor(Math.random() * 9) + 1;
          } else {
            num += Math.floor(Math.random() * 10);
          }
        }
        return num;
      }

      // 计算显示时间
      function getDisplayTime(digits) {
        // 每位数字约1秒，但随着位数增加，每位时间递减
        const timePerDigit = Math.max(MIN_DISPLAY_TIME, BASE_DISPLAY_TIME - (digits - 1) * 50);
        return digits * timePerDigit;
      }

      // 开始游戏
      function startGame() {
        level = 1;
        updateDisplay();
        showNumber();
      }

      // 显示数字
      function showNumber() {
        const digits = level;
        currentNumber = generateNumber(digits);
        const displayTime = getDisplayTime(digits);

        // 确定字体大小类
        let sizeClass = "";
        if (digits > 12) sizeClass = "xlarge";
        else if (digits > 8) sizeClass = "large";

        gameContent.innerHTML = `
                <div class="number-display ${sizeClass}">${currentNumber}</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            `;

        // 进度条动画
        const progressFill = document.getElementById("progressFill");
        progressFill.style.width = "100%";

        let startTime = Date.now();
        const updateProgress = () => {
          const elapsed = Date.now() - startTime;
          const remaining = Math.max(0, 100 - (elapsed / displayTime) * 100);
          progressFill.style.width = remaining + "%";

          if (remaining > 0) {
            requestAnimationFrame(updateProgress);
          }
        };
        requestAnimationFrame(updateProgress);

        // 显示时间结束后切换到输入
        displayTimeout = setTimeout(() => {
          showInput();
        }, displayTime);
      }

      // 显示输入界面
      function showInput() {
        gameContent.innerHTML = `
                <div class="input-section">
                    <div style="font-size: 16px; color: var(--color-text-secondary); margin-bottom: 15px;">
                        输入你记住的数字
                    </div>
                    <input type="text" 
                           id="answerInput" 
                           class="number-input" 
                           inputmode="numeric" 
                           pattern="[0-9]*"
                           autocomplete="off"
                           autofocus>
                    <div class="hint-text">按 Enter 提交</div>
                </div>
            `;

        const input = document.getElementById("answerInput");
        input.focus();

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            checkAnswer(input.value);
          }
        });

        // 只允许输入数字
        input.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^0-9]/g, "");
        });
      }

      // 检查答案
      function checkAnswer(answer) {
        const input = document.getElementById("answerInput");

        if (answer === currentNumber) {
          // 正确
          input.classList.add("correct");
          playSound(800, 0.1);
          setTimeout(() => playSound(1000, 0.1), 100);

          setTimeout(() => {
            showCorrectResult();
          }, 500);
        } else {
          // 错误
          input.classList.add("wrong");
          playSound(200, 0.2);

          setTimeout(() => {
            showWrongResult(answer);
          }, 500);
        }
      }

      // 显示正确结果
      function showCorrectResult() {
        gameContent.innerHTML = `
                <div class="result-correct">✓ 正确!</div>
                <div class="result-numbers">
                    <div class="result-row">
                        <span class="result-label">数字</span>
                        <span class="result-value">${currentNumber}</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="nextLevel()">下一关</button>
            `;
      }

      // 显示错误结果
      function showWrongResult(answer) {
        saveBestScore();

        gameContent.innerHTML = `
                <div class="result-wrong">✗ 错误</div>
                <div class="result-numbers">
                    <div class="result-row">
                        <span class="result-label">正确答案</span>
                        <span class="result-value" style="color: var(--accent-green)">${currentNumber}</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">你的答案</span>
                        <span class="result-value" style="color: var(--error)">${answer || "(空)"}</span>
                    </div>
                </div>
                <div class="final-result">
                    <div class="final-score">${level - 1}</div>
                    <div class="final-label">最终等级 (${level - 1} 位数字)</div>
                </div>
                <button class="btn btn-primary" onclick="startGame()">重新开始</button>
            `;
      }

      // 下一关
      function nextLevel() {
        level++;
        updateDisplay();
        showNumber();
      }

      // 更新显示
      function updateDisplay() {
        currentLevelEl.textContent = level;
        digitCountEl.textContent = level;
      }

      // 播放音效
      function playSound(freq, duration) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = "sine";
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {}
      }

      // 主题切换
      function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector(".theme-toggle");
        if (body.getAttribute("data-theme") === "light") {
          body.removeAttribute("data-theme");
          btn.textContent = "🌙";
          localStorage.setItem("theme", "dark");
        } else {
          body.setAttribute("data-theme", "light");
          btn.textContent = "☀️";
          localStorage.setItem("theme", "light");
        }
      }

      // 初始化
      (function init() {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") {
          document.body.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
        loadBestScore();
      })();
    </script>
  </body>
</html>

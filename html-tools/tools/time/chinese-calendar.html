        font-size: 1.5rem;

        padding: 0.5rem;
      }

        font-size: 1.2rem;
        font-weight: 600;
      }
      .weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted-color);
        margin-bottom: 0.5rem;
      }
      .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
      }
      .day {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
      }
      .day:hover {
        background: rgba(220, 38, 38, 0.1);
      }
      .day.today {
        background: var(--primary-color);
        color: white;
      }
      .day.selected {
        outline: 2px solid var(--primary-color);
      }
      .day.other-month {
        opacity: 0.3;
      }
      .day .lunar {
        font-size: 0.6rem;
        color: var(--muted-color);
        margin-top: 2px;
      }
      .day.today .lunar {
        color: rgba(255, 255, 255, 0.8);
      }
      .day.festival .lunar {
        color: var(--primary-color);
        font-weight: 500;
      }
      .day.today.festival .lunar {
        color: #fef08a;
      }
      .detail {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--code-background-color);
        border-radius: 8px;
      }
      .detail h3 {
        margin: 0 0 0.5rem;
        font-size: 1.2rem;
        color: var(--primary-color);
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        font-size: 0.85rem;
      }
      .detail-grid .label {
        color: var(--muted-color);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        background: var(--primary-color);
        color: white;
        border-radius: 8px;
        z-index: 1000;
      }

      .breadcrumb a {

      .breadcrumb span {

          font-size: 0.8rem;
        }

        "9-9": "重阳节",
        "12-30": "除夕"
      };
      const SOLAR_FESTIVALS = {
        "1-1": "元旦",
        "2-14": "情人节",
        "3-8": "妇女节",
        "4-1": "愚人节",
        "5-1": "劳动节",
        "6-1": "儿童节",
        "10-1": "国庆节",
        "12-25": "圣诞节"
      };

      let currentYear, currentMonth, selectedDate;

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        const today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth();
        selectedDate = today;
        render();
      });

      function initTheme() {
        const s = localStorage.getItem("theme");
        if (s) document.documentElement.setAttribute("data-theme", s);
      }
      window.toggleTheme = function () {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
      };

      function lYear(y) {
        return LUNAR_INFO[y - 1900] & 0xffff;
      }
      function leapMonth(y) {
        return LUNAR_INFO[y - 1900] & 0xf;
      }
      function leapDays(y) {
        return leapMonth(y) ? (LUNAR_INFO[y - 1900] & 0x10000 ? 30 : 29) : 0;
      }
      function monthDays(y, m) {
        return LUNAR_INFO[y - 1900] & (0x10000 >> m) ? 30 : 29;
      }

      function toLunar(date) {
        let y = date.getFullYear(),
          m = date.getMonth() + 1,
          d = date.getDate();
        let offset = Math.floor((Date.UTC(y, m - 1, d) - Date.UTC(1900, 0, 31)) / 86400000);
        let ly = 1900,
          lm = 1,
          ld,
          leap = 0,
          isLeap = false;

        for (; ly < 2101 && offset > 0; ly++) offset -= lYear(ly);
        if (offset < 0) {
          offset += lYear(ly);
          ly--;
        }

        leap = leapMonth(ly);
        for (lm = 1; lm < 13 && offset > 0; lm++) {
          if (leap > 0 && lm === leap + 1 && !isLeap) {
            lm--;
            isLeap = true;
          } else if (isLeap && lm === leap + 1) isLeap = false;
          offset -= isLeap ? leapDays(ly) : monthDays(ly, lm);
        }
        if (offset === 0 && leap > 0 && lm === leap + 1) {
          if (isLeap) isLeap = false;
          else {
            isLeap = true;
            lm--;
          }
        }
        if (offset < 0) {
          offset += isLeap ? leapDays(ly) : monthDays(ly, lm);
          lm--;
        }
        ld = offset + 1;

        return { year: ly, month: lm, day: ld, isLeap: isLeap };
      }

      function getGanZhi(y) {
        return GAN[(y - 4) % 10] + ZHI[(y - 4) % 12];
      }
      function getAnimal(y) {
        return ANIMALS[(y - 4) % 12];
      }

      function render() {
        document.getElementById("currentMonth").textContent =
          currentYear + "年" + (currentMonth + 1) + "月";

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDay = firstDay.getDay();
        const daysInMonth = lastDay.getDate();
        const today = new Date();

        let html = "";
        const prevMonth = new Date(currentYear, currentMonth, 0);
        for (let i = startDay - 1; i >= 0; i--) {
          const d = new Date(currentYear, currentMonth - 1, prevMonth.getDate() - i);
          html += renderDay(d, true, today);
        }
        for (let i = 1; i <= daysInMonth; i++) {
          const d = new Date(currentYear, currentMonth, i);
          html += renderDay(d, false, today);
        }
        const remaining = 42 - (startDay + daysInMonth);
        for (let i = 1; i <= remaining; i++) {
          const d = new Date(currentYear, currentMonth + 1, i);
          html += renderDay(d, true, today);
        }

        document.getElementById("daysGrid").innerHTML = html;
        showDetail(selectedDate);
      }

      function renderDay(date, isOther, today) {
        const lunar = toLunar(date);
        const lunarText =
          lunar.day === 1
            ? (lunar.isLeap ? "闰" : "") + LUNAR_MONTH[lunar.month - 1] + "月"
            : LUNAR_DAY[lunar.day - 1];
        const festival =
          FESTIVALS[lunar.month + "-" + lunar.day] ||
          SOLAR_FESTIVALS[date.getMonth() + 1 + "-" + date.getDate()];
        const isToday = date.toDateString() === today.toDateString();
        const isSelected = date.toDateString() === selectedDate.toDateString();

        let cls = "day";
        if (isOther) cls += " other-month";
        if (isToday) cls += " today";
        if (isSelected) cls += " selected";
        if (festival) cls += " festival";

        return (
          '<div class="' +
          cls +
          '" onclick="selectDate(' +
          date.getFullYear() +
          "," +
          date.getMonth() +
          "," +
          date.getDate() +
          ')">' +
          "<span>" +
          date.getDate() +
          "</span>" +
          '<span class="lunar">' +
          (festival || lunarText) +
          "</span>" +
          "</div>"
        );
      }

      window.selectDate = function (y, m, d) {
        selectedDate = new Date(y, m, d);
        render();
      };

      function showDetail(date) {
        const lunar = toLunar(date);
        const festival =
          FESTIVALS[lunar.month + "-" + lunar.day] ||
          SOLAR_FESTIVALS[date.getMonth() + 1 + "-" + date.getDate()];

        document.getElementById("detail").innerHTML =
          "<h3>" +
          date.getFullYear() +
          "年" +
          (date.getMonth() + 1) +
          "月" +
          date.getDate() +
          "日</h3>" +
          '<div class="detail-grid">' +
          '<span class="label">农历</span><span>' +
          (lunar.isLeap ? "闰" : "") +
          LUNAR_MONTH[lunar.month - 1] +
          "月" +
          LUNAR_DAY[lunar.day - 1] +
          "</span>" +
          '<span class="label">干支年</span><span>' +
          getGanZhi(lunar.year) +
          "年 (" +
          getAnimal(lunar.year) +
          ")</span>" +
          '<span class="label">节日</span><span>' +
          (festival || "-") +
          "</span>" +
          '<span class="label">星期</span><span>星期' +
          "日一二三四五六"[date.getDay()] +
          "</span>" +
          "</div>";
      }

      window.changeMonth = function (delta) {
        currentMonth += delta;
        if (currentMonth < 0) {
          currentMonth = 11;
          currentYear--;
        }
        if (currentMonth > 11) {
          currentMonth = 0;
          currentYear++;
        }
        render();
      };
    </script>
  </body>
</html>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      番茄钟计时器
    </nav>
    <div class="container">
      <div class="header">
        <h1>🍅 番茄钟计时器</h1>
        <p>专注工作，高效休息</p>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 切换主题">
          🌓 切换主题
        </button>
      </div>

      <div class="panel">
        <div class="mode-tabs">
          <div class="mode-tab work active" data-mode="work" onclick="setMode('work')">
            <div class="mode-name">🍅 专注</div>
            <div class="mode-time" id="workModeTime">25 分钟</div>
          </div>
          <div class="mode-tab break" data-mode="break" onclick="setMode('break')">
            <div class="mode-name">☕ 短休息</div>
            <div class="mode-time" id="breakModeTime">5 分钟</div>
          </div>
          <div class="mode-tab long-break" data-mode="longBreak" onclick="setMode('longBreak')">
            <div class="mode-name">🌴 长休息</div>
            <div class="mode-time" id="longBreakModeTime">15 分钟</div>
          </div>
        </div>

        <div class="timer-display" id="timerDisplay">
          <div class="timer-circle">
            <svg width="280" height="280">
              <circle class="timer-circle-bg" cx="140" cy="140" r="130"></circle>
              <circle
                class="timer-circle-progress"
                id="progressCircle"
                cx="140"
                cy="140"
                r="130"
                stroke-dasharray="816.8"
                stroke-dashoffset="0"
              ></circle>
            </svg>
            <div class="timer-text">
              <div class="timer-time" id="timerTime">25:00</div>
              <div class="timer-status" id="timerStatus">准备开始</div>
            </div>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn secondary" onclick="resetTimer()" title="重置" aria-label="🔄">
            🔄
          </button>
          <button class="control-btn primary" id="playBtn" onclick="toggleTimer()" aria-label="▶">
            ▶
          </button>
          <button class="control-btn secondary" onclick="skipTimer()" title="跳过" aria-label="⏭">
            ⏭
          </button>
        </div>

        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="completedPomodoros">0</div>
            <div class="stat-label">完成番茄</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalFocusTime">0</div>
            <div class="stat-label">专注分钟</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">⚙️ 设置</div>
        <div class="settings-grid">
          <div class="setting-item">
            <div class="setting-label">专注时长 (分钟)</div>
            <input
              type="number"
              class="setting-input"
              id="workDuration"
              value="25"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-item">
            <div class="setting-label">短休息 (分钟)</div>
            <input
              type="number"
              class="setting-input"
              id="breakDuration"
              value="5"
              min="1"
              max="30"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="setting-item">
            <div class="setting-label">长休息 (分钟)</div>
            <input
              type="number"
              class="setting-input"
              id="longBreakDuration"
              value="15"
              min="1"
              max="60"
              onchange="updateSettings()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="autoStartBreak" checked />
          <label for="autoStartBreak">自动开始休息</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="autoStartWork" />
          <label for="autoStartWork">休息后自动开始下一个番茄</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="soundEnabled" checked />
          <label for="soundEnabled">启用提示音</label>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">📝 任务</div>
        <div class="task-input-row">
          <input
            type="text"
            class="task-input"
            id="taskInput"
            placeholder="添加任务..."
            onkeypress="if (event.key === 'Enter') addTask();"
            aria-label="文本输入框"
          />
          <button class="btn btn-primary" onclick="addTask()" aria-label="添加">添加</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </div>
    </div>

    <script>
      let currentMode = "work";
      let timeLeft = 25 * 60;
      let totalTime = 25 * 60;
      let isRunning = false;
      let timerInterval = null;
      let completedPomodoros = 0;
      let totalFocusTime = 0;
      let pomodorosSinceLastLongBreak = 0;
      let tasks = [];

      const durations = {
        work: 25,
        break: 5,
        longBreak: 15
      };

      const colors = {
        work: "#e94560",
        break: "#4ade80",
        longBreak: "#60a5fa"
      };

      // Theme toggle
      window.toggleTheme = function () {
        const body = document.body;
        const currentTheme = body.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        body.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // Load saved data - 必须在 IIFE 之前定义
      window.loadData = function () {
        const saved = localStorage.getItem("pomodoroData");
        if (saved) {
          const data = JSON.parse(saved);

          // Reset stats if it's a new day
          if (data.date === new Date().toDateString()) {
            completedPomodoros = data.completedPomodoros || 0;
            totalFocusTime = data.totalFocusTime || 0;
            tasks = data.tasks || [];
          }

          if (data.durations) {
            durations.work = data.durations.work || 25;
            durations.break = data.durations.break || 5;
            durations.longBreak = data.durations.longBreak || 15;

            document.getElementById("workDuration").value = durations.work;
            document.getElementById("breakDuration").value = durations.break;
            document.getElementById("longBreakDuration").value = durations.longBreak;
          }

          document.getElementById("completedPomodoros").textContent = completedPomodoros;
          document.getElementById("totalFocusTime").textContent = totalFocusTime;
          renderTasks();
          updateSettings();
        }
      };

      (function () {
        const savedTheme = localStorage.getItem("theme") || "dark";
        if (savedTheme === "light") {
          document.body.setAttribute("data-theme", "light");
        }
        loadData();
      })();

      window.setMode = function (mode) {
        currentMode = mode;
        document.querySelectorAll(".mode-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.mode === mode);
        });

        totalTime = durations[mode] * 60;
        timeLeft = totalTime;

        document.getElementById("progressCircle").style.stroke = colors[mode];

        updateDisplay();
        updateProgress();

        if (isRunning) {
          pauseTimer();
        }
      };

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timerTime").textContent =
          `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        // Update page title
        document.title = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")} - 番茄钟`;
      }

      function updateProgress() {
        const progress = timeLeft / totalTime;
        const circumference = 2 * Math.PI * 130;
        const offset = circumference * (1 - progress);
        document.getElementById("progressCircle").style.strokeDashoffset = offset;
      }

      window.toggleTimer = function () {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      };

      function startTimer() {
        isRunning = true;
        document.getElementById("playBtn").textContent = "⏸";
        document.getElementById("timerStatus").textContent =
          currentMode === "work" ? "专注中..." : "休息中...";
        document.getElementById("timerDisplay").classList.add("running");

        timerInterval = setInterval(() => {
          timeLeft--;
          updateDisplay();
          updateProgress();

          if (timeLeft <= 0) {
            completeTimer();
          }
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        document.getElementById("playBtn").textContent = "▶";
        document.getElementById("timerStatus").textContent = "已暂停";
        document.getElementById("timerDisplay").classList.remove("running");

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      window.resetTimer = function () {
        pauseTimer();
        timeLeft = totalTime;
        updateDisplay();
        updateProgress();
        document.getElementById("timerStatus").textContent = "准备开始";
      };

      window.skipTimer = function () {
        completeTimer();
      };

      function completeTimer() {
        pauseTimer();
        playSound();

        if (currentMode === "work") {
          completedPomodoros++;
          totalFocusTime += durations.work;
          pomodorosSinceLastLongBreak++;

          document.getElementById("completedPomodoros").textContent = completedPomodoros;
          document.getElementById("totalFocusTime").textContent = totalFocusTime;

          // Update active task
          const activeTask = tasks.find((t) => !t.completed);
          if (activeTask) {
            activeTask.pomodoros++;
            renderTasks();
          }

          saveData();

          // Auto start break
          if (document.getElementById("autoStartBreak").checked) {
            if (pomodorosSinceLastLongBreak >= 4) {
              pomodorosSinceLastLongBreak = 0;
              setMode("longBreak");
            } else {
              setMode("break");
            }
            setTimeout(() => startTimer(), 1000);
          } else {
            setMode("break");
          }
        } else {
          // Break completed
          if (document.getElementById("autoStartWork").checked) {
            setMode("work");
            setTimeout(() => startTimer(), 1000);
          } else {
            setMode("work");
          }
        }

        // Show notification
        if (Notification.permission === "granted") {
          new Notification("番茄钟", {
            body: currentMode === "work" ? "休息时间到！" : "准备开始新的番茄！",
            icon: "🍅"
          });
        }
      }

      function playSound() {
        if (!document.getElementById("soundEnabled").checked) return;

        // Create a simple beep sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.value = 800;
        oscillator.type = "sine";
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
      }

      function updateSettings() {
        durations.work = parseInt(document.getElementById("workDuration").value) || 25;
        durations.break = parseInt(document.getElementById("breakDuration").value) || 5;
        durations.longBreak = parseInt(document.getElementById("longBreakDuration").value) || 15;

        document.getElementById("workModeTime").textContent = durations.work + " 分钟";
        document.getElementById("breakModeTime").textContent = durations.break + " 分钟";
        document.getElementById("longBreakModeTime").textContent = durations.longBreak + " 分钟";

        if (!isRunning) {
          totalTime = durations[currentMode] * 60;
          timeLeft = totalTime;
          updateDisplay();
          updateProgress();
        }

        saveData();
      }

      window.addTask = function () {
        const input = document.getElementById("taskInput");
        const name = input.value.trim();
        if (!name) return;

        tasks.push({
          id: Date.now(),
          name: name,
          completed: false,
          pomodoros: 0
        });

        input.value = "";
        renderTasks();
        saveData();
      };

      window.toggleTask = function (id) {
        const task = tasks.find((t) => t.id === id);
        if (task) {
          task.completed = !task.completed;
          renderTasks();
          saveData();
        }
      };

      window.deleteTask = function (id) {
        tasks = tasks.filter((t) => t.id !== id);
        renderTasks();
        saveData();
      };

      function renderTasks() {
        const list = document.getElementById("taskList");
        if (tasks.length === 0) {
          list.innerHTML =
            '<p style="text-align: center; opacity: 0.5; padding: 20px;">暂无任务</p>';
          return;
        }

        list.innerHTML = tasks
          .map(
            (task) => `
                <div class="task-item ${task.completed ? "completed" : ""}">
                    <input type="checkbox" ${task.completed ? "checked" : ""} onchange="toggleTask(${task.id})">
                    <span class="task-name">${escapeHtml(task.name)}</span>
                    <span class="task-pomodoros">🍅 ${task.pomodoros}</span>
                    <button class="task-delete" onclick="deleteTask(${task.id})" aria-label="×">×</button>
                </div>
            `
          )
          .join("");
      }

      window.escapeHtml = function (text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      };

      window.saveData = function () {
        const data = {
          completedPomodoros,
          totalFocusTime,
          tasks,
          durations,
          date: new Date().toDateString()
        };
        localStorage.setItem("pomodoroData", JSON.stringify(data));
      };

      // Request notification permission
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      // Initialize display
      updateDisplay();
      renderTasks();
    </script>
  </body>
</html>

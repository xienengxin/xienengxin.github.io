      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */

        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */

      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizelegibility;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
        overflow-x: hidden;
      }

      /* ===== Photo/Display Mode: Full-screen countdown for screenshots ===== */
      body.photo-mode .nav-bar,
      body.photo-mode .footer {
        display: none !important;
      }

      body.photo-mode .hero-header {
        display: none !important;
      }

      body.photo-mode .actions,
      body.photo-mode .meta,
      body.photo-mode .subline,
      body.photo-mode .select-wrapper {
        display: none !important;
      }

      body.photo-mode .main-content {
        padding: 0 !important;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      body.photo-mode .container {
        max-width: none;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: 0;
        gap: 0;
      }

      body.photo-mode .hero {
        background: transparent;
        border: none;
        box-shadow: none;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      body.photo-mode .countdown {
        margin: 0 !important;
        padding: 0 2vw;
        width: 100%;
        height: 100%;
        max-width: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        align-content: center;
        justify-content: center;
        gap: 0;
      }

      body.photo-mode .tile {
        padding: 1vh 2vw;
        border-radius: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        aspect-ratio: auto;
        flex: 0 0 auto;
        width: 20%;
        min-height: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      body.photo-mode .tile::before {
        display: none;
      }

      body.photo-mode .value {
        font-size: clamp(8rem, 15vw, 20rem);
        line-height: 1;
        font-weight: 900;
        text-shadow:
          0 0 60px rgba(0, 212, 170, 0.4),
          0 0 120px rgba(0, 212, 170, 0.2);
      }

      body.photo-mode .label {
        font-size: clamp(1.2rem, 2.5vw, 2.5rem);
        margin-top: 0.5vh;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* Photo mode tablet - 3 columns top, 2 bottom */
      @media (max-width: 1024px) {
        body.photo-mode .tile {
          width: 33.33%;
        }

        body.photo-mode .value {
          font-size: clamp(6rem, 18vw, 14rem);
        }

        body.photo-mode .label {
          font-size: clamp(1rem, 3vw, 2rem);
        }
      }

      /* Photo mode mobile - 2x2 + 1 layout */
      @media (max-width: 768px) {
        body.photo-mode .tile {
          width: 50%;
          padding: 2vh 1vw;
        }

        body.photo-mode .value {
          font-size: clamp(5rem, 22vw, 12rem);
        }

        body.photo-mode .label {
          font-size: clamp(1rem, 4vw, 1.8rem);
        }
      }

      /* Photo mode small mobile */
      @media (max-width: 480px) {
        body.photo-mode .tile {
          width: 50%;
          padding: 1.5vh 1vw;
        }

        body.photo-mode .value {
          font-size: clamp(4rem, 20vw, 10rem);
        }

        body.photo-mode .label {
          font-size: clamp(0.9rem, 4vw, 1.5rem);
        }
      }

      /* Photo mode landscape - all 5 in one row */
      @media (orientation: landscape) {
        body.photo-mode .countdown {
          flex-wrap: nowrap;
          padding: 0 1vw;
        }

        body.photo-mode .tile {
          width: 20%;
          height: 100%;
          padding: 0 1vw;
        }

        body.photo-mode .value {
          font-size: clamp(4rem, 12vw, 16rem);
        }

        body.photo-mode .label {
          font-size: clamp(0.9rem, 2vw, 1.8rem);
        }
      }

      /* Photo mode landscape on smaller screens */
      @media (max-width: 920px) and (orientation: landscape) {
        body.photo-mode .value {
          font-size: clamp(3rem, 10vw, 8rem);
        }

        body.photo-mode .label {
          font-size: clamp(0.7rem, 2vw, 1.2rem);
        }
      }

      /* Photo mode hint - more prominent */
      .photo-mode-hint {
        position: fixed;
        bottom: clamp(20px, 5vh, 40px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: clamp(10px, 2vh, 16px) clamp(20px, 4vw, 32px);
        border-radius: 30px;
        font-size: clamp(0.85rem, 2vw, 1rem);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 2000;
        backdrop-filter: blur(10px);
      }

      body.photo-mode .photo-mode-hint {
        opacity: 1;
        animation: fade-out 4s forwards 3s;
      }

      @keyframes fade-out {
        to {
          opacity: 0;
        }
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.06) 0%, transparent 55%),
          radial-gradient(circle at 80% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 55%),
          radial-gradient(circle at 55% 85%, rgba(59, 130, 246, 0.04) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.08) 0%, transparent 55%),
          radial-gradient(circle at 80% 30%, rgba(124, 58, 237, 0.07) 0%, transparent 55%),
          radial-gradient(circle at 55% 85%, rgba(37, 99, 235, 0.06) 0%, transparent 60%);
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.06;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.35"/></svg>');
        background-size: 120px 120px;
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-4);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-2);
      }

      .nav-back {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition:
          background var(--transition-fast),
          transform var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back:active {
        transform: scale(0.96);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: none;
      }

      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.01em;
      }

      .nav-actions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: var(--space-2);
      }

      .theme-toggle {
        display: inline-flex;

    <script>
      const LS_KEY = "new-year-countdown-state-v1";

      const els = {
        yearSelect: document.getElementById("yearSelect"),
        targetYearText: document.getElementById("targetYearText"),
        tzText: document.getElementById("tzText"),
        targetAt: document.getElementById("targetAt"),
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds"),
        milliseconds: document.getElementById("milliseconds"),
        subtitle: document.getElementById("subtitle"),
        progressBar: document.getElementById("progressBar"),
        toast: document.getElementById("toast"),
        fireworks: document.getElementById("fireworks")
      };

      let state = {
        year: 2026
      };

      let timerId = null;
      let celebrationRunning = false;

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatTargetLabel(date) {
        const yyyy = date.getFullYear();
        const mm = pad2(date.getMonth() + 1);
        const dd = pad2(date.getDate());
        const hh = pad2(date.getHours());
        const mi = pad2(date.getMinutes());
        return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
      }

      function getTargetDate(year) {
        return new Date(year, 0, 1, 0, 0, 0, 0);
      }

      function getYearProgress(targetYear) {
        const start = new Date(targetYear - 1, 0, 1, 0, 0, 0, 0);
        const end = new Date(targetYear, 0, 1, 0, 0, 0, 0);
        const now = new Date();
        const clamped = Math.min(Math.max(now.getTime(), start.getTime()), end.getTime());
        const ratio = (clamped - start.getTime()) / (end.getTime() - start.getTime());
        return Math.min(Math.max(ratio, 0), 1);
      }

      function showToast(text) {
        els.toast.textContent = text;
        els.toast.classList.add("show");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => {
          els.toast.classList.remove("show");
        }, 2000);
      }

      function saveState() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(state));
        } catch {
          // ignore
        }
      }

      function loadState() {
        const params = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        const y = params.get("y");
        if (y && /^\d{4}$/.test(y)) {
          state.year = Number(y);
          return;
        }

        try {
          const raw = localStorage.getItem(LS_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed.year === "number") {
            state.year = parsed.year;
          }
        } catch {
          // ignore
        }
      }

      function syncHash() {
        const params = new URLSearchParams();
        params.set("y", String(state.year));
        const next = `#${params.toString()}`;
        if (location.hash !== next) {
          history.replaceState(null, "", next);
        }
      }

      function initYearSelect() {
        const now = new Date();
        const currentYear = now.getFullYear();

        const nextYear =
          now.getTime() < getTargetDate(currentYear + 1).getTime()
            ? currentYear + 1
            : currentYear + 2;
        if (!state.year) state.year = nextYear;

        const years = [];
        for (let y = currentYear; y <= currentYear + 8; y++) {
          years.push(y);
        }

        els.yearSelect.replaceChildren();
        for (const y of years) {
          const opt = document.createElement("option");
          opt.value = String(y);
          opt.textContent = String(y);
          els.yearSelect.appendChild(opt);
        }

        if (!years.includes(state.year)) {
          state.year = nextYear;
        }

        els.yearSelect.value = String(state.year);
        els.yearSelect.addEventListener("change", () => {
          state.year = Number(els.yearSelect.value);
          saveState();
          syncHash();
          renderStatic();
          tick();
        });
      }

      function renderStatic() {
        els.targetYearText.textContent = String(state.year);

        const target = getTargetDate(state.year);
        els.targetAt.textContent = formatTargetLabel(target);

        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local";
        els.tzText.textContent = tz;

        const progress = getYearProgress(state.year);
        els.progressBar.style.width = `${Math.round(progress * 100)}%`;
      }

      function setTiles({ d, h, m, s, ms }) {
        els.days.textContent = String(d);
        els.hours.textContent = pad2(h);
        els.minutes.textContent = pad2(m);
        els.seconds.textContent = pad2(s);
        els.milliseconds.textContent = String(ms).padStart(3, "0");
      }

      function tick() {
        const now = new Date();
        const target = getTargetDate(state.year);
        const diffMs = target.getTime() - now.getTime();

        if (diffMs <= 0) {
          setTiles({ d: 0, h: 0, m: 0, s: 0, ms: 0 });
          els.subtitle.textContent = `新年快乐！欢迎来到 ${state.year}。`;
          maybeCelebrate();
          return;
        }

        const totalSeconds = Math.floor(diffMs / 1000);
        const d = Math.floor(totalSeconds / 86400);
        const h = Math.floor((totalSeconds % 86400) / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        const ms = diffMs % 1000;

        setTiles({ d, h, m, s, ms });
        els.subtitle.textContent = `还剩 ${d} 天 ${pad2(h)}:${pad2(m)}:${pad2(s)}`;
      }

      function startTimer() {
        stopTimer();

        const loop = () => {
          tick();
          timerId = requestAnimationFrame(loop);
        };

        loop();
      }

      function stopTimer() {
        if (timerId) {
          cancelAnimationFrame(timerId);
          timerId = null;
        }
      }

      function toggleFullscreen() {
        const el = document.documentElement;
        if (!document.fullscreenElement) {
          el.requestFullscreen?.().catch(() => {
            showToast("当前浏览器不支持全屏");
          });
        } else {
          document.exitFullscreen?.();
        }
      }

      function togglePhotoMode() {
        document.body.classList.toggle("photo-mode");

        const isInPhotoMode = document.body.classList.contains("photo-mode");

        if (isInPhotoMode) {
          // Also request fullscreen for better experience
          document.documentElement.requestFullscreen?.().catch(() => {});
        } else {
          // Exit fullscreen if exiting photo mode
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          }
        }
      }

      function exitPhotoMode() {
        if (document.body.classList.contains("photo-mode")) {
          document.body.classList.remove("photo-mode");
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          }
        }
      }

      // Auto fullscreen on mobile (requires user interaction first)
      let mobileFullscreenRequested = false;
      function requestMobileFullscreen() {
        // Only on mobile devices and not already requested
        if (mobileFullscreenRequested) return;
        if (window.innerWidth > 768) return;
        if (document.fullscreenElement) return;

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile) return;

        // Check if user has interacted with the page
        mobileFullscreenRequested = true;

        // Request fullscreen after a short delay
        setTimeout(() => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().catch(() => {
              // Silently fail if not supported or blocked
            });
          }
        }, 300);
      }

      async function copyShareLink() {
        syncHash();
        const url = location.href;

        try {
          await navigator.clipboard.writeText(url);
          showToast("分享链接已复制");
          return;
        } catch {
          // fallback
        }

        const ta = document.createElement("textarea");
        ta.value = url;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();

        try {
          document.execCommand("copy");
          showToast("分享链接已复制");
        } catch {
          showToast("复制失败，请手动复制地址栏");
        } finally {
          ta.remove();
        }
      }

      function testCelebration() {
        showToast("测试庆祝效果 🎆");
        startFireworks();
        window.setTimeout(() => {
          stopFireworks();
        }, 5000);
      }

      function resetToNextYear() {
        const now = new Date();
        const nextYear = now.getFullYear() + 1;
        state.year = nextYear;
        els.yearSelect.value = String(nextYear);
        saveState();
        syncHash();
        renderStatic();
        tick();
        showToast(`已重置到 ${nextYear} 年`);
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      const motionOK = !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let fw = null;

      function maybeCelebrate() {
        if (celebrationRunning || !motionOK) return;
        celebrationRunning = true;
        showToast("新年快乐！");
        startFireworks();
        window.setTimeout(() => {
          stopFireworks();
        }, 9000);
      }

      function startFireworks() {
        const canvas = els.fireworks;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

        const resize = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          canvas.width = Math.floor(w * dpr);
          canvas.height = Math.floor(h * dpr);
          canvas.style.width = `${w}px`;
          canvas.style.height = `${h}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };

        resize();
        window.addEventListener("resize", resize);

        const particles = [];
        const rand = (min, max) => min + Math.random() * (max - min);

        const burst = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          const x = rand(w * 0.15, w * 0.85);
          const y = rand(h * 0.15, h * 0.5);
          const count = Math.floor(rand(36, 64));

          const hues = [160, 255, 205, 285, 35];
          const hue = hues[Math.floor(Math.random() * hues.length)];

          for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 * i) / count + rand(-0.04, 0.04);
            const v = rand(2.2, 4.6);
            particles.push({
              x,
              y,
              vx: Math.cos(a) * v,
              vy: Math.sin(a) * v,
              life: rand(0.9, 1.25),
              age: 0,
              hue,
              size: rand(1.2, 2.4)
            });
          }
        };

        let last = performance.now();

        const frame = (t) => {
          const dt = Math.min(0.033, (t - last) / 1000);
          last = t;

          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          ctx.globalCompositeOperation = "lighter";

          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.age += dt;
            if (p.age >= p.life) {
              particles.splice(i, 1);
              continue;
            }

            p.vy += 2.2 * dt;
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.992;
            p.vy *= 0.992;

            const k = 1 - p.age / p.life;
            const alpha = Math.max(0, Math.min(1, k));

            ctx.fillStyle = `hsla(${p.hue}, 95%, 65%, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.globalCompositeOperation = "source-over";

          if (Math.random() < 0.06) burst();
          fw = requestAnimationFrame(frame);
        };

        burst();
        fw = requestAnimationFrame(frame);

        stopFireworks._cleanup = () => {
          window.removeEventListener("resize", resize);
        };
      }

      function stopFireworks() {
        if (fw) {
          cancelAnimationFrame(fw);
          fw = null;
        }

        if (typeof stopFireworks._cleanup === "function") {
          stopFireworks._cleanup();
          stopFireworks._cleanup = null;
        }

        const ctx = els.fireworks.getContext("2d");
        if (ctx) ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function init() {
        initTheme();
        loadState();
        initYearSelect();
        syncHash();
        renderStatic();
        startTimer();

        window.setInterval(renderStatic, 60 * 1000);

        window.addEventListener("hashchange", () => {
          loadState();
          els.yearSelect.value = String(state.year);
          renderStatic();
          tick();
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
          if (!localStorage.getItem("theme")) {
            document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
          }
        });

        // Mobile fullscreen: tap on hero section to enter fullscreen
        const heroSection = document.querySelector(".hero");
        if (heroSection) {
          heroSection.addEventListener("click", (e) => {
            // Don't trigger if clicking on buttons or form elements
            if (e.target.closest("button, select, a")) return;
            requestMobileFullscreen();
          });
        }

        // Also add a global touch listener for first interaction
        let hasInteracted = false;
        document.addEventListener(
          "touchstart",
          () => {
            if (!hasInteracted) {
              hasInteracted = true;
              // Request fullscreen on first tap if on mobile
              if (
                window.innerWidth <= 768 &&
                /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
              ) {
                setTimeout(() => {
                  if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen?.().catch(() => {});
                  }
                }, 500);
              }
            }
          },
          { once: true }
        );

        // Photo mode: ESC key to exit
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            exitPhotoMode();
          }
        });

        // Photo mode: click anywhere to exit
        document.addEventListener("click", (e) => {
          if (document.body.classList.contains("photo-mode")) {
            // Don't exit if clicking the photo mode button
            if (e.target.closest('[onclick="togglePhotoMode()"]')) return;
            exitPhotoMode();
          }
        });
      }

      init();
    </script>
  </body>
</html>

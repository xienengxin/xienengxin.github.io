      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

        background-image:
          linear-gradient(rgb(16, 185, 129, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgb(16, 185, 129, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;

        flex-wrap: wrap;

        border-radius: var(--radius-sm);

      .back-link:hover {

        cursor: pointer;
      }

        margin-top: 24px;

      }
      footer a {

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      链接提取器
    </nav>
    <div class="bg-grid"></div>
    <div class="container">
      <div class="header">
        <a href="../../index.html" class="back-link">← 返回</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">🔗</span>
            链接提取器
          </h1>
          <p class="desc">从HTML或文本中提取所有链接</p>
        </div>
      </div>
      <div class="main-card">
        <textarea id="input" placeholder="粘贴HTML代码或包含链接的文本..."></textarea>
        <div class="btns">
          <button class="btn" onclick="extract()">提取链接</button>
          <button class="btn btn-sec" onclick="copyAll()">复制全部</button>
        </div>
        <div id="stats" class="stats"></div>
        <div class="results" id="results"></div>
      </div>
      <footer>
        <p>
          <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
          ·
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </div>
    <script>
      let links = [];
      // HTML 转义函数，防止 XSS
      window.escapeHtml = function (s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      };
      window.extract = function () {
        const text = document.getElementById("input").value;
        const hrefPattern = /href\s*=\s*["']([^"']+)["']/gi;
        const urlPattern = /https?:\/\/[^\s<>"']+/g;
        const set = new Set();
        let m;
        while ((m = hrefPattern.exec(text)) !== null) set.add(m[1]);
        while ((m = urlPattern.exec(text)) !== null) set.add(m[0]);
        links = [...set].filter((l) => l.startsWith("http") || l.startsWith("/"));
        document.getElementById("stats").textContent = "找到 " + links.length + " 个链接";
        document.getElementById("results").innerHTML =
          links
            .map((l, i) => {
              const safe = escapeHtml(l);
              return (
                '<div class="link"><a href="' +
                safe +
                '" target="_blank" rel="noopener">' +
                safe +
                '</a><button class="copy-btn" onclick="copy(' +
                i +
                ')">复制</button></div>'
              );
            })
            .join("") || '<div style="color:var(--text-muted)">未找到链接</div>';
      };
      window.copy = function (i) {
        navigator.clipboard.writeText(links[i]);
      };
      window.copyAll = function () {
        navigator.clipboard.writeText(links.join("\n"));
      };
      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>

  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#gardening">园艺工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">浇水日程</span>
      </nav>

      <h1>🌱 浇水日程</h1>
      <p class="subtitle">照顾好每一株植物</p>

      <div class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>植物名称</label>
            <input type="text" id="plantName" placeholder="例如：绿萝、仙人掌" />
          </div>
          <div class="form-group">
            <label>浇水频率（天）</label>
            <input type="number" id="frequency" placeholder="7" min="1" value="7" />
          </div>
        </div>
        <button class="add-btn" onclick="addPlant()">➕ 添加植物</button>
      </div>

      <div class="plants-list" id="plantsList">
        <div class="empty-state">
          还没有添加植物
          <br />
          点击上方添加您的第一株植物
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_watering_v1";
      let plants = [];

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function loadData() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          plants = saved ? JSON.parse(saved) : [];
        } catch (e) {
          plants = [];
        }
        renderPlants();
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(plants));
      }

      function addPlant() {
        const name = document.getElementById("plantName").value.trim();
        const frequency = parseInt(document.getElementById("frequency").value);

        if (!name) {
          alert("请输入植物名称");
          return;
        }

        if (!frequency || frequency < 1) {
          alert("请输入有效的浇水频率");
          return;
        }

        plants.push({
          id: Date.now(),
          name,
          frequency,
          lastWatered: new Date().toISOString().split("T")[0]
        });

        saveData();
        renderPlants();

        document.getElementById("plantName").value = "";
        document.getElementById("frequency").value = "7";
      }

      function deletePlant(id) {
        if (!confirm("确定要删除这株植物吗？")) return;
        plants = plants.filter((p) => p.id !== id);
        saveData();
        renderPlants();
      }

      function waterPlant(id) {
        const plant = plants.find((p) => p.id === id);
        if (plant) {
          plant.lastWatered = new Date().toISOString().split("T")[0];
          saveData();
          renderPlants();
        }
      }

      function getNextWatering(lastWatered, frequency) {
        const last = new Date(lastWatered);
        const next = new Date(last);
        next.setDate(next.getDate() + frequency);
        return next;
      }

      function getDaysUntil(date) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(date);
        target.setHours(0, 0, 0, 0);
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        return diff;
      }

      function renderPlants() {
        const container = document.getElementById("plantsList");

        if (plants.length === 0) {
          container.innerHTML =
            '<div class="empty-state">还没有添加植物<br>点击上方添加您的第一株植物</div>';
          return;
        }

        // Sort by next watering date
        const sorted = plants.sort((a, b) => {
          const nextA = getNextWatering(a.lastWatered, a.frequency);
          const nextB = getNextWatering(b.lastWatered, b.frequency);
          return nextA - nextB;
        });

        container.innerHTML = sorted
          .map((plant) => {
            const nextWatering = getNextWatering(plant.lastWatered, plant.frequency);
            const daysUntil = getDaysUntil(nextWatering);
            const isUrgent = daysUntil <= 0;
            const isToday = daysUntil === 0;

            let statusText = "";
            if (daysUntil < 0) statusText = `需要浇水（已逾期 ${Math.abs(daysUntil)} 天）`;
            else if (daysUntil === 0) statusText = "今天需要浇水";
            else if (daysUntil === 1) statusText = "明天需要浇水";
            else statusText = `${daysUntil} 天后浇水`;

            return `
          <div class="plant-card ${isUrgent ? "urgent" : ""}">
            <div class="plant-header">
              <div class="plant-name">${escapeHtml(plant.name)}</div>
              <button class="plant-delete" onclick="deletePlant(${plant.id})">×</button>
            </div>

            <div class="plant-info">
              <div class="info-row">
                <span class="info-label">浇水频率</span>
                <span class="info-value">每 ${plant.frequency} 天</span>
              </div>
              <div class="info-row">
                <span class="info-label">上次浇水</span>
                <span class="info-value">${plant.lastWatered}</span>
              </div>
            </div>

            <div class="next-watering ${isToday ? "today" : ""}">
              <div class="next-label">下次浇水</div>
              <div class="next-date ${isUrgent ? "urgent" : ""}">${statusText}</div>
            </div>

            <button class="watered-btn" onclick="waterPlant(${plant.id})">💧 已浇水</button>
          </div>
        `;
          })
          .join("");
      }

      // Initialize
      loadData();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);

        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      .input-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }

      label {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-text-secondary);
      }

      select {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      .weather-display {
        display: none;
      }

      .weather-display.active {
        display: block;
      }

      .weather-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-6);
      }

      .weather-stat {
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        text-align: center;
      }

      .weather-stat-icon {
        font-size: 2rem;
        margin-bottom: var(--space-2);
      }

      .weather-stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
      }

      .weather-stat-label {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: var(--space-3);
        margin-bottom: var(--space-6);
      }

      .month-card {
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-3);
        text-align: center;
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .month-card:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
      }

      .month-card.selected {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.1);
      }

      .month-card.best {
        border-color: var(--color-success);
        background: rgba(34, 197, 94, 0.1);
      }

      .month-card.good {
        border-color: var(--color-warning);
        background: rgba(245, 158, 11, 0.05);
      }

      .month-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: var(--space-2);
      }

      .month-temp {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--color-accent-primary);
      }

      .month-rain {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      .month-icon {
        font-size: 1.25rem;
        margin-bottom: var(--space-1);
      }

      .recommendation-box {
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);

          country: "马尔代夫",
          climate: "热带季风气候",
          bestMonths: [0, 1, 2, 3],
          goodMonths: [4, 11],
          weather: [
            { high: 30, low: 26, rain: 114, condition: "旱季" },
            { high: 31, low: 26, rain: 38, condition: "旱季" },
            { high: 31, low: 27, rain: 74, condition: "旱季" },
            { high: 32, low: 27, rain: 123, condition: "过渡" },
            { high: 31, low: 27, rain: 219, condition: "雨季" },
            { high: 31, low: 26, rain: 167, condition: "雨季" },
            { high: 30, low: 26, rain: 150, condition: "雨季" },
            { high: 30, low: 26, rain: 176, condition: "雨季" },
            { high: 30, low: 26, rain: 199, condition: "雨季" },
            { high: 30, low: 26, rain: 194, condition: "雨季" },
            { high: 30, low: 26, rain: 231, condition: "雨季" },
            { high: 30, low: 26, rain: 217, condition: "过渡" }
          ],
          tips: "12月至4月是旱季，海水清澈适合浮潜和潜水",
          packing: ["防晒霜", "泳衣", "浮潜装备", "轻薄衣物"]
        }
      };

      var selectedMonth = new Date().getMonth();

      function init() {
        var select = document.getElementById("destination");
        select.textContent = "";

        var defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "请选择目的地...";
        select.appendChild(defaultOption);

        Object.keys(destinations).forEach(function (key) {
          var dest = destinations[key];
          var option = document.createElement("option");
          option.value = key;
          option.textContent = dest.name + " - " + dest.country;
          select.appendChild(option);
        });

        document.getElementById("month").value = selectedMonth;
        loadState();
      }

      function showWeather() {
        var destId = document.getElementById("destination").value;
        selectedMonth = parseInt(document.getElementById("month").value);

        if (!destId) {
          document.getElementById("weatherDisplay").classList.remove("active");
          return;
        }

        var dest = destinations[destId];
        var monthData = dest.weather[selectedMonth];

        document.getElementById("weatherTitle").textContent =
          "🌤️ " + dest.name + " - " + monthNames[selectedMonth] + "天气";

        renderWeatherSummary(dest, monthData);
        renderMonthGrid(dest);
        renderRecommendation(dest, selectedMonth);

        document.getElementById("weatherDisplay").classList.add("active");
        saveState();
      }

      function renderWeatherSummary(dest, monthData) {
        var container = document.getElementById("weatherSummary");
        container.textContent = "";

        var stats = [
          { icon: "🌡️", value: monthData.high + "°C", label: "最高温度" },
          { icon: "❄️", value: monthData.low + "°C", label: "最低温度" },
          { icon: "🌧️", value: monthData.rain + "mm", label: "月降水量" },
          {
            icon: getWeatherIcon(monthData.condition),
            value: monthData.condition,
            label: "天气状况"
          }
        ];

        stats.forEach(function (stat) {
          var div = document.createElement("div");
          div.className = "weather-stat";

          var icon = document.createElement("div");
          icon.className = "weather-stat-icon";
          icon.textContent = stat.icon;

          var value = document.createElement("div");
          value.className = "weather-stat-value";
          value.textContent = stat.value;

          var label = document.createElement("div");
          label.className = "weather-stat-label";
          label.textContent = stat.label;

          div.appendChild(icon);
          div.appendChild(value);
          div.appendChild(label);
          container.appendChild(div);
        });
      }

      function renderMonthGrid(dest) {
        var container = document.getElementById("monthGrid");
        container.textContent = "";

        for (var i = 0; i < 12; i++) {
          var monthData = dest.weather[i];
          var isBest = dest.bestMonths.indexOf(i) !== -1;
          var isGood = dest.goodMonths.indexOf(i) !== -1;
          var isSelected = i === selectedMonth;

          var card = document.createElement("div");
          card.className = "month-card";
          if (isBest) card.className += " best";
          else if (isGood) card.className += " good";
          if (isSelected) card.className += " selected";
          card.onclick = (function (month) {
            return function () {
              document.getElementById("month").value = month;
              showWeather();
            };
          })(i);

          var icon = document.createElement("div");
          icon.className = "month-icon";
          icon.textContent = getWeatherIcon(monthData.condition);

          var name = document.createElement("div");
          name.className = "month-name";
          name.textContent = monthNames[i].substring(0, 2);

          var temp = document.createElement("div");
          temp.className = "month-temp";
          temp.textContent = monthData.low + "~" + monthData.high + "°";

          var rain = document.createElement("div");
          rain.className = "month-rain";
          rain.textContent = monthData.rain + "mm";

          card.appendChild(icon);
          card.appendChild(name);
          card.appendChild(temp);
          card.appendChild(rain);
          container.appendChild(card);
        }
      }

      function renderRecommendation(dest, month) {
        var container = document.getElementById("recommendation");
        container.textContent = "";

        var isBest = dest.bestMonths.indexOf(month) !== -1;
        var isGood = dest.goodMonths.indexOf(month) !== -1;

        var title = document.createElement("div");
        title.className = "recommendation-title";
        if (isBest) {
          title.textContent = "✨ 最佳旅行时间！";
        } else if (isGood) {
          title.textContent = "👍 适合旅行";
        } else {
          title.textContent = "⚠️ 非最佳时段";
        }

        var content = document.createElement("div");
        content.className = "recommendation-content";

        var bestMonthsText = dest.bestMonths
          .map(function (m) {
            return monthNames[m];
          })
          .join("、");

        content.textContent = dest.tips + "\n\n最佳旅行月份：" + bestMonthsText;

        var packingDiv = document.createElement("div");
        packingDiv.className = "packing-tips";

        var packingLabel = document.createElement("span");
        packingLabel.style.cssText =
          "font-weight: 600; color: var(--color-text-primary); margin-right: var(--space-2);";
        packingLabel.textContent = "建议携带：";
        packingDiv.appendChild(packingLabel);

        dest.packing.forEach(function (item) {
          var span = document.createElement("span");
          span.className = "packing-item";
          span.textContent = item;
          packingDiv.appendChild(span);
        });

        container.appendChild(title);
        container.appendChild(content);
        container.appendChild(packingDiv);
      }

      function getWeatherIcon(condition) {
        var icons = {
          晴热: "☀️",
          晴冷: "🌤️",
          酷热: "🔥",
          炎热: "☀️",
          温暖: "🌤️",
          舒适: "😊",
          凉爽: "🍂",
          温和: "🌸",
          多云: "⛅",
          阴冷: "🌥️",
          寒冷: "❄️",
          严寒: "🥶",
          雨季: "🌧️",
          多雨: "🌧️",
          较少雨: "🌤️",
          过渡: "⛅",
          梅雨: "🌧️",
          凉季: "😊",
          夏季: "☀️",
          冬季: "❄️",
          春季: "🌸",
          秋季: "🍂",
          旱季: "☀️",
          热: "🌡️"
        };
        return icons[condition] || "🌤️";
      }

      async function copyWeatherInfo() {
        var destId = document.getElementById("destination").value;
        if (!destId) return;

        var dest = destinations[destId];
        var monthData = dest.weather[selectedMonth];

        var text = dest.name + " - " + monthNames[selectedMonth] + "天气\n";
        text += "========================\n\n";
        text += "气候类型：" + dest.climate + "\n";
        text += "温度范围：" + monthData.low + "°C ~ " + monthData.high + "°C\n";
        text += "月降水量：" + monthData.rain + "mm\n";
        text += "天气状况：" + monthData.condition + "\n\n";

        var bestMonthsText = dest.bestMonths
          .map(function (m) {
            return monthNames[m];
          })
          .join("、");
        text += "最佳旅行月份：" + bestMonthsText + "\n\n";
        text += "旅行提示：" + dest.tips + "\n\n";
        text += "建议携带：" + dest.packing.join("、");

        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制到剪贴板", "success");
        } catch (e) {
          showToast("复制失败");
        }
      }

      function saveState() {
        var state = {
          destination: document.getElementById("destination").value,
          month: document.getElementById("month").value
        };
        localStorage.setItem("weather-planner-state", JSON.stringify(state));
      }

      function loadState() {
        var saved = localStorage.getItem("weather-planner-state");
        if (saved) {
          try {
            var state = JSON.parse(saved);
            if (state.destination) {
              document.getElementById("destination").value = state.destination;
            }
            if (state.month !== undefined) {
              document.getElementById("month").value = state.month;
              selectedMonth = parseInt(state.month);
            }
            showWeather();
          } catch (e) {
            // ignore
          }
        }
      }

      function showToast(message, type) {
        var toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show " + (type || "");
        setTimeout(function () {
          toast.className = "toast";
        }, 2000);
      }

      function toggleTheme() {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      initTheme();
      init();
    </script>
  </body>
</html>

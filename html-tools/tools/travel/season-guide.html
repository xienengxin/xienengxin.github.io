        border-radius: 50%;
        border: 1px solid var(--border-subtle);

        color: var(--accent-red);

        display: grid;

        gap: 12px;

      .season-item {
        padding: 12px;
        background: var(--bg-input);

      .season-label {
        font-size: 0.75rem;

      .season-value {

        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }

      .legend-dot {

        background: rgba(244, 63, 94, 0.3);

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      @media (max-width: 768px) {
        .container {
          padding: 16px;
        }
        .months-grid {
          grid-template-columns: repeat(6, 1fr);
        }
        .season-info {
          grid-template-columns: 1fr;
        }
      }
    </style>

      function toggleTheme() {
        var body = document.body;
        var isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      (function () {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function filterDestinations() {
        var search = document.getElementById("searchInput").value.toLowerCase();
        var filtered = destinations.filter(function (d) {
          return d.name.toLowerCase().includes(search) || d.region.toLowerCase().includes(search);
        });
        renderDestinations(filtered);
      }

      function renderDestinations(list) {
        var container = document.getElementById("destinationList");
        container.textContent = "";

        list.forEach(function (dest) {
          var card = document.createElement("div");
          card.className = "destination-card";

          var header = document.createElement("div");
          header.className = "destination-header";
          var flag = document.createElement("div");
          flag.className = "destination-flag";
          flag.textContent = dest.flag;
          var nameDiv = document.createElement("div");
          var name = document.createElement("div");
          name.className = "destination-name";
          name.textContent = dest.name;
          var region = document.createElement("div");
          region.className = "destination-region";
          region.textContent = dest.region;
          nameDiv.appendChild(name);
          nameDiv.appendChild(region);
          header.appendChild(flag);
          header.appendChild(nameDiv);

          var monthsGrid = document.createElement("div");
          monthsGrid.className = "months-grid";
          dest.months.forEach(function (rating, i) {
            var cell = document.createElement("div");
            cell.className = "month-cell " + rating;
            var monthName = document.createElement("div");
            monthName.className = "month-name";
            monthName.textContent = monthNames[i];
            cell.appendChild(monthName);
            monthsGrid.appendChild(cell);
          });

          var seasonInfo = document.createElement("div");
          seasonInfo.className = "season-info";
          var infoItems = [
            { label: "最佳时间", value: dest.bestTime },
            { label: "气候类型", value: dest.climate },
            { label: "平均温度", value: dest.avgTemp }
          ];
          infoItems.forEach(function (item) {
            var el = document.createElement("div");
            el.className = "season-item";
            var label = document.createElement("div");
            label.className = "season-label";
            label.textContent = item.label;
            var value = document.createElement("div");
            value.className = "season-value";
            value.textContent = item.value;
            el.appendChild(label);
            el.appendChild(value);
            seasonInfo.appendChild(el);
          });

          var highlight = document.createElement("div");
          highlight.className = "highlight-box";
          highlight.textContent = "💡 " + dest.tips;

          card.appendChild(header);
          card.appendChild(monthsGrid);
          card.appendChild(seasonInfo);
          card.appendChild(highlight);
          container.appendChild(card);
        });
      }

      function showToast(msg) {
        var toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      // Initialize
      filterDestinations();
    </script>

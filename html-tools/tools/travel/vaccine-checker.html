    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */

        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);

        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);

        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;

        /* 单名旧约定 */

        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);

        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        margin-bottom: var(--space-5);
      }

      label {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-text-secondary);
      }

      select {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      .region-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }

      .region-btn {
        padding: var(--space-2) var(--space-3);
        font-size: 0.875rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .region-btn:hover {
        border-color: var(--color-accent-primary);
        color: var(--color-accent-primary);
      }

      .region-btn.active {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #000;
      }

      .vaccine-section {
        margin-bottom: var(--space-6);
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
        padding-bottom: var(--space-3);
        border-bottom: 1px solid var(--color-border-default);
      }

      .section-icon {
        font-size: 1.25rem;
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      .vaccine-list {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .vaccine-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-4);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        transition: all var(--transition-fast);
      }

      .vaccine-item:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
      }

      .vaccine-status {
        width: 24px;
        height: 24px;
        border-radius: var(--radius-full);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        flex-shrink: 0;
      }

      .status-required {
        background: rgba(239, 68, 68, 0.2);
        color: var(--color-error);
      }

      .status-recommended {
        background: rgba(245, 158, 11, 0.2);
        color: var(--color-warning);
      }

      .status-routine {
        background: rgba(0, 212, 170, 0.2);
        color: var(--color-accent-primary);
      }

      .vaccine-info {
        flex: 1;
      }

      .vaccine-name {
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: var(--space-1);
      }

      .vaccine-desc {
        font-size: 0.875rem;

        });
      }

      function selectRegion(regionId) {
        currentRegion = regionId;

        const buttons = document.querySelectorAll(".region-btn");
        buttons.forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.region === regionId);
        });

        const select = document.getElementById("destination");
        select.textContent = "";

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "请选择目的地...";
        select.appendChild(defaultOption);

        if (destinations[regionId]) {
          destinations[regionId].forEach(function (dest) {
            const option = document.createElement("option");
            option.value = dest.id;
            option.textContent = dest.name;
            select.appendChild(option);
          });
        }

        document.getElementById("resultCard").style.display = "none";
        saveState();
      }

      function showVaccines() {
        const destId = document.getElementById("destination").value;
        if (!destId || !currentRegion) {
          document.getElementById("resultCard").style.display = "none";
          return;
        }

        const dest = destinations[currentRegion].find(function (d) {
          return d.id === destId;
        });
        if (!dest) return;

        document.getElementById("resultTitle").textContent = "💉 " + dest.name + " - 疫苗要求";

        const container = document.getElementById("vaccineResults");
        container.textContent = "";

        // Required vaccines
        if (dest.required.length > 0) {
          const section = createVaccineSection("🔴 入境必需", "required", dest.required);
          container.appendChild(section);
        }

        // Recommended vaccines
        if (dest.recommended.length > 0) {
          const section = createVaccineSection("🟡 强烈推荐", "recommended", dest.recommended);
          container.appendChild(section);
        }

        // Routine vaccines
        if (dest.routine.length > 0) {
          const section = createVaccineSection("🟢 常规疫苗", "routine", dest.routine);
          container.appendChild(section);
        }

        // Notes
        if (dest.notes) {
          const notesDiv = document.createElement("div");
          notesDiv.className = "vaccine-section";

          const header = document.createElement("div");
          header.className = "section-header";

          const icon = document.createElement("span");
          icon.className = "section-icon";
          icon.textContent = "📝";

          const title = document.createElement("span");
          title.className = "section-title";
          title.textContent = "特别提示";

          header.appendChild(icon);
          header.appendChild(title);

          const noteText = document.createElement("div");
          noteText.style.cssText =
            "padding: var(--space-3); background: var(--color-bg-subtle); border-radius: var(--radius-md); color: var(--color-text-secondary);";
          noteText.textContent = dest.notes;

          notesDiv.appendChild(header);
          notesDiv.appendChild(noteText);
          container.appendChild(notesDiv);
        }

        document.getElementById("resultCard").style.display = "block";
        saveState();
      }

      function createVaccineSection(title, status, vaccines) {
        const section = document.createElement("div");
        section.className = "vaccine-section";

        const header = document.createElement("div");
        header.className = "section-header";

        const sectionTitle = document.createElement("span");
        sectionTitle.className = "section-title";
        sectionTitle.textContent = title;

        header.appendChild(sectionTitle);

        const list = document.createElement("div");
        list.className = "vaccine-list";

        vaccines.forEach(function (vaccineId) {
          const vaccine = vaccineTypes[vaccineId];
          if (!vaccine) return;

          const item = document.createElement("div");
          item.className = "vaccine-item";

          const statusEl = document.createElement("div");
          statusEl.className = "vaccine-status status-" + status;
          statusEl.textContent = status === "required" ? "!" : status === "recommended" ? "+" : "✓";

          const info = document.createElement("div");
          info.className = "vaccine-info";

          const name = document.createElement("div");
          name.className = "vaccine-name";
          name.textContent = vaccine.name;

          const desc = document.createElement("div");
          desc.className = "vaccine-desc";
          desc.textContent = vaccine.desc;

          const timing = document.createElement("div");
          timing.className = "vaccine-timing";
          timing.textContent = "⏱️ " + vaccine.timing;

          info.appendChild(name);
          info.appendChild(desc);
          info.appendChild(timing);

          item.appendChild(statusEl);
          item.appendChild(info);
          list.appendChild(item);
        });

        section.appendChild(header);
        section.appendChild(list);
        return section;
      }

      async function copyVaccineInfo() {
        const destId = document.getElementById("destination").value;
        if (!destId || !currentRegion) return;

        const dest = destinations[currentRegion].find(function (d) {
          return d.id === destId;
        });
        if (!dest) return;

        let text = "疫苗要求 - " + dest.name + "\n";
        text += "========================\n\n";

        if (dest.required.length > 0) {
          text += "【入境必需】\n";
          dest.required.forEach(function (v) {
            const vaccine = vaccineTypes[v];
            if (vaccine) {
              text += "• " + vaccine.name + "\n";
              text += "  " + vaccine.timing + "\n";
            }
          });
          text += "\n";
        }

        if (dest.recommended.length > 0) {
          text += "【强烈推荐】\n";
          dest.recommended.forEach(function (v) {
            const vaccine = vaccineTypes[v];
            if (vaccine) {
              text += "• " + vaccine.name + "\n";
              text += "  " + vaccine.timing + "\n";
            }
          });
          text += "\n";
        }

        if (dest.routine.length > 0) {
          text += "【常规疫苗】\n";
          dest.routine.forEach(function (v) {
            const vaccine = vaccineTypes[v];
            if (vaccine) {
              text += "• " + vaccine.name + "\n";
            }
          });
          text += "\n";
        }

        if (dest.notes) {
          text += "【特别提示】\n" + dest.notes + "\n";
        }

        text += "\n⚠️ 以上信息仅供参考，请咨询专业旅行医学门诊获取最新建议";

        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制到剪贴板", "success");
        } catch (e) {
          showToast("复制失败");
        }
      }

      function saveState() {
        const state = {
          region: currentRegion,
          destination: document.getElementById("destination").value
        };
        localStorage.setItem("vaccine-checker-state", JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem("vaccine-checker-state");
        if (saved) {
          try {
            const state = JSON.parse(saved);
            if (state.region) {
              selectRegion(state.region);
              if (state.destination) {
                document.getElementById("destination").value = state.destination;
                showVaccines();
              }
            }
          } catch (e) {
            // ignore
          }
        }
      }

      function showToast(message, type) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show " + (type || "");
        setTimeout(function () {
          toast.className = "toast";
        }, 2000);
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      initTheme();
      renderRegionButtons();
      loadState();
    </script>
  </body>
</html>

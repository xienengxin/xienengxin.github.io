    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.5;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
      }
      .nav-actions {
        display: flex;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
      }

      .input-mode-tabs {
        display: flex;
        gap: var(--space-2);
        margin-bottom: var(--space-5);
      }

      .tab-btn {
        flex: 1;
        padding: var(--space-3);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .tab-btn:hover {
        border-color: var(--color-accent-primary);
      }
      .tab-btn.active {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
      }

      .mode-panel {
        display: none;
      }
      .mode-panel.active {
        display: block;
      }

      .flight-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }

      .input-group {
        margin-bottom: var(--space-4);
      }
      .input-group:last-child {
        margin-bottom: 0;
      }
      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      input,
      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }
      button:hover {
        border-color: var(--color-accent-primary);
      }
      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }
      button.primary:hover {
        background: #00c299;
        box-shadow: var(--shadow-glow);
      }

      .btn-row {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-5);
      }

      .result-display {
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-6);
        margin-top: var(--space-5);
        text-align: center;
      }

      .result-time {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
        margin-bottom: var(--space-3);
      }

      .result-breakdown {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-4);
        margin-top: var(--space-5);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-subtle);
      }

      .breakdown-item {
        text-align: center;
      }
      .breakdown-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: var(--space-1);
      }
      .breakdown-value {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        font-family: var(--font-mono);
      }

      .route-presets {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-5);
      }

      .preset-chip {
        padding: var(--space-2) var(--space-3);
        font-size: 0.8125rem;
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-full);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .preset-chip:hover {
        border-color: var(--color-accent-primary);
      }

      .info-note {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: var(--space-4);
        padding: var(--space-3);
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
      }

      @media (max-width: 640px) {
        .flight-grid {
          grid-template-columns: 1fr;
        }
        .result-time {
          font-size: 2rem;
        }
        .result-breakdown {
          grid-template-columns: 1fr;
          gap: var(--space-3);
        }
      }

      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }
        .nav-content {
          padding: 0 var(--space-4);
        }
        .nav-back-text {
          display: none;
        }
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }
        .card {
          padding: var(--space-4);
        }
        .input-mode-tabs {
          flex-direction: column;
        }
      }
    </style>
  </head>

    <main class="main-content">
      <div class="container">
        <div class="card">
          <h2 class="card-title">飞行时间估算器</h2>

          <div class="input-mode-tabs">
            <button class="tab-btn active" onclick="switchMode('cities')">选择城市</button>
            <button class="tab-btn" onclick="switchMode('distance')">输入距离</button>
          </div>

          <!-- City Selection Mode -->
          <div id="citiesPanel" class="mode-panel active">
            <div class="flight-grid">
              <div class="input-group">
                <label>出发城市</label>
                <select id="fromCity"></select>
              </div>
              <div class="input-group">
                <label>到达城市</label>
                <select id="toCity"></select>
              </div>
            </div>
            <div class="route-presets" id="routePresets"></div>
          </div>

          <!-- Distance Input Mode -->
          <div id="distancePanel" class="mode-panel">
            <div class="input-group">
              <label>飞行距离 (公里)</label>
              <input type="number" id="distanceInput" min="0" step="1" placeholder="例如: 1000" />
            </div>
          </div>

          <div class="btn-row">
            <button onclick="clearAll()">清除</button>
            <button class="primary" onclick="calculate()">计算飞行时间</button>
          </div>

          <div class="result-display" id="resultDisplay" style="display: none">
            <div class="result-time" id="resultTime">0h 0m</div>
            <div class="result-breakdown">
              <div class="breakdown-item">
                <div class="breakdown-label">起飞阶段</div>
                <div class="breakdown-value" id="takeoffTime">30 分钟</div>
              </div>
              <div class="breakdown-item">
                <div class="breakdown-label">巡航飞行</div>
                <div class="breakdown-value" id="cruiseTime">0 分钟</div>
              </div>
              <div class="breakdown-item">
                <div class="breakdown-label">降落阶段</div>
                <div class="breakdown-value" id="landingTime">20 分钟</div>
              </div>
            </div>
          </div>

          <div class="info-note">
            提示: 估算基于平均巡航速度 850 km/h，起飞阶段约 30 分钟，降落阶段约 20
            分钟。实际飞行时间可能因天气、航线和机型而异。
          </div>
        </div>
      </div>
    </main>

    <script>
      var CITIES = {
        北京: { lat: 39.9042, lon: 116.4074 },
        上海: { lat: 31.2304, lon: 121.4737 },
        广州: { lat: 23.1291, lon: 113.2644 },
        深圳: { lat: 22.5431, lon: 114.0579 },
        香港: { lat: 22.3193, lon: 114.1694 },
        台北: { lat: 25.033, lon: 121.5654 },
        东京: { lat: 35.6762, lon: 139.6503 },
        首尔: { lat: 37.5665, lon: 126.978 },
        新加坡: { lat: 1.3521, lon: 103.8198 },
        曼谷: { lat: 13.7563, lon: 100.5018 },
        悉尼: { lat: -33.8688, lon: 151.2093 },
        纽约: { lat: 40.7128, lon: -74.006 },
        洛杉矶: { lat: 34.0522, lon: -118.2437 },
        旧金山: { lat: 37.7749, lon: -122.4194 },
        伦敦: { lat: 51.5074, lon: -0.1278 },
        巴黎: { lat: 48.8566, lon: 2.3522 },
        迪拜: { lat: 25.2048, lon: 55.2708 }
      };

      var ROUTE_PRESETS = [
        ["北京", "上海"],
        ["上海", "东京"],
        ["北京", "香港"],
        ["北京", "纽约"],
        ["上海", "洛杉矶"],
        ["北京", "伦敦"]
      ];

      // Average cruise speed in km/h
      var CRUISE_SPEED = 850;
      // Takeoff phase in minutes
      var TAKEOFF_TIME = 30;
      // Landing phase in minutes
      var LANDING_TIME = 20;

      var currentMode = "cities";

      function init() {
        initTheme();
        populateCities();
        renderRoutePresets();
      }

      function populateCities() {
        var fromSelect = document.getElementById("fromCity");
        var toSelect = document.getElementById("toCity");

        Object.keys(CITIES).forEach(function (name) {
          var opt1 = document.createElement("option");
          opt1.value = name;
          opt1.textContent = name;
          fromSelect.appendChild(opt1);

          var opt2 = document.createElement("option");
          opt2.value = name;
          opt2.textContent = name;
          toSelect.appendChild(opt2);
        });

        fromSelect.value = "北京";
        toSelect.value = "上海";
      }

      function renderRoutePresets() {
        var container = document.getElementById("routePresets");
        container.textContent = "";

        ROUTE_PRESETS.forEach(function (route) {
          var chip = document.createElement("button");
          chip.className = "preset-chip";
          chip.textContent = route[0] + " → " + route[1];
          chip.onclick = function () {
            applyPreset(route[0], route[1]);
          };
          container.appendChild(chip);
        });
      }

      function applyPreset(from, to) {
        document.getElementById("fromCity").value = from;
        document.getElementById("toCity").value = to;
        calculate();
      }

      function switchMode(mode) {
        currentMode = mode;

        var tabs = document.querySelectorAll(".tab-btn");
        tabs.forEach(function (tab) {
          tab.classList.remove("active");
        });
        event.target.classList.add("active");

        document.getElementById("citiesPanel").classList.remove("active");
        document.getElementById("distancePanel").classList.remove("active");

        if (mode === "cities") {
          document.getElementById("citiesPanel").classList.add("active");
        } else {
          document.getElementById("distancePanel").classList.add("active");
        }

        document.getElementById("resultDisplay").style.display = "none";
      }

      function calculate() {
        var distance;

        if (currentMode === "cities") {
          var from = document.getElementById("fromCity").value;
          var to = document.getElementById("toCity").value;

          if (!from || !to) {
            alert("请选择出发和到达城市");
            return;
          }

          var fromCity = CITIES[from];
          var toCity = CITIES[to];
          distance = haversine(fromCity.lat, fromCity.lon, toCity.lat, toCity.lon);
        } else {
          distance = parseFloat(document.getElementById("distanceInput").value);
          if (isNaN(distance) || distance <= 0) {
            alert("请输入有效的距离");
            return;
          }
        }

        // Calculate cruise time in minutes
        var cruiseMinutes = (distance / CRUISE_SPEED) * 60;
        var totalMinutes = cruiseMinutes + TAKEOFF_TIME + LANDING_TIME;

        // Format time
        var hours = Math.floor(totalMinutes / 60);
        var minutes = Math.round(totalMinutes % 60);

        document.getElementById("resultTime").textContent = hours + "h " + minutes + "m";
        document.getElementById("takeoffTime").textContent = TAKEOFF_TIME + " 分钟";
        document.getElementById("cruiseTime").textContent = Math.round(cruiseMinutes) + " 分钟";
        document.getElementById("landingTime").textContent = LANDING_TIME + " 分钟";

        document.getElementById("resultDisplay").style.display = "block";
      }

      function haversine(lat1, lon1, lat2, lon2) {
        var R = 6371;
        var dLat = toRad(lat2 - lat1);
        var dLon = toRad(lon2 - lon1);
        var a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      function toRad(deg) {
        return deg * (Math.PI / 180);
      }

      function clearAll() {
        document.getElementById("fromCity").selectedIndex = 0;
        document.getElementById("toCity").selectedIndex = 0;
        document.getElementById("distanceInput").value = "";
        document.getElementById("resultDisplay").style.display = "none";
      }

      function toggleTheme() {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      init();
    </script>
  </body>
</html>

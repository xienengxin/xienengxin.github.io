      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;

        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      .input-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }

      label {

        font-weight: 500;
        color: var(--color-text-secondary);
      }

        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
      }

      }

        border-radius: var(--radius-md);

        transition: all var(--transition-fast);

        padding: var(--space-5);
        margin-top: var(--space-5);

      }

      .summary-value {
        font-size: 1.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
      }

      .summary-label {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin-top: var(--space-1);
      }

      .tips-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .tips-list li {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-3);
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      .tip-icon {
        flex-shrink: 0;
      }

      .button-group {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-5);
        flex-wrap: wrap;
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #000;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      .toast {
        position: fixed;
        bottom: calc(var(--space-6) + var(--safe-area-bottom));
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-5);
        font-size: 0.875rem;
        color: var(--color-text-primary);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        visibility: hidden;
        transition: all var(--transition-normal);
        z-index: 2000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .toast.success {
        border-color: var(--color-success);
        color: var(--color-success);
      }

      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .input-row {
          grid-template-columns: 1fr;
        }

        .button-group {
          gap: var(--space-2);
        }

        button {
          padding: var(--space-2) var(--space-3);
          font-size: 0.875rem;
          flex: 1;
        }
      }

      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>

        <h1 class="nav-title">旅行保险清单</h1>

        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        <div class="card">
          <h2 class="card-title">🛫 行程信息</h2>
          <div class="input-row">
            <div class="input-group">
              <label for="duration">行程天数</label>
              <input
                type="number"
                id="duration"
                min="1"
                max="365"
                value="7"
                oninput="calculate()"
              />
            </div>
            <div class="input-group">
              <label for="tripCost">行程总费用 (元)</label>
              <input type="number" id="tripCost" min="0" value="10000" oninput="calculate()" />
            </div>
            <div class="input-group">
              <label for="destination">目的地类型</label>
              <select id="destination" onchange="calculate()">
                <option value="domestic">国内</option>
                <option value="asia">亚洲</option>
                <option value="europe">欧洲/澳洲</option>
                <option value="america">美洲</option>
                <option value="adventure">探险/极限运动</option>
              </select>
            </div>
            <div class="input-group">
              <label for="travelers">旅行人数</label>
              <input
                type="number"
                id="travelers"
                min="1"
                max="20"
                value="1"
                oninput="calculate()"
              />
            </div>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">🛡️ 保险项目清单</h2>
          <div class="checklist" id="checklist"></div>

          <div class="summary-card">
            <div class="summary-grid">
              <div class="summary-item">
                <div class="summary-value" id="totalCoverage">¥0</div>
                <div class="summary-label">建议总保额</div>
              </div>
              <div class="summary-item">
                <div class="summary-value" id="checkedCount">0/0</div>
                <div class="summary-label">已勾选项目</div>
              </div>
              <div class="summary-item">
                <div class="summary-value" id="estimatedPremium">¥0</div>
                <div class="summary-label">预估保费</div>
              </div>
            </div>
          </div>

          <div class="button-group">
            <button onclick="checkAll()">全选</button>
            <button onclick="checkEssential()">仅选必备</button>
            <button onclick="clearAllChecks()">清除</button>
            <button onclick="copyChecklist()" class="primary">复制清单</button>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">💡 购买保险注意事项</h2>
          <ul class="tips-list">
            <li>
              <span class="tip-icon">💡</span>
              出行前至少提前1-3天购买，部分保险有等待期
            </li>
            <li>
              <span class="tip-icon">💡</span>
              仔细阅读免责条款，了解哪些情况不在保障范围内
            </li>
            <li>
              <span class="tip-icon">💡</span>
              保留所有医疗收据和报告，理赔时需要提供
            </li>
            <li>
              <span class="tip-icon">💡</span>
              高风险活动（潜水、滑雪等）需单独确认是否承保
            </li>
            <li>
              <span class="tip-icon">💡</span>
              既往病症通常不在保障范围内，需如实告知
            </li>
            <li>
              <span class="tip-icon">💡</span>
              比较多家保险公司的产品，选择性价比最高的
            </li>
            <li>
              <span class="tip-icon">💡</span>
              确认紧急救援服务的联系方式，保存到手机中
            </li>
            <li>
              <span class="tip-icon">💡</span>
              境外旅行建议选择有全球救援网络的保险公司
            </li>
          </ul>
        </div>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      const insuranceItems = [
        {
          id: "medical",
          name: "医疗费用",
          desc: "覆盖旅途中的突发疾病和意外伤害医疗费用",
          importance: "essential",
          baseAmount: 100000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.5, america: 2, adventure: 2 }
        },
        {
          id: "emergency",
          name: "紧急医疗运送",
          desc: "包括紧急转运、医疗遣返和遗体运送费用",
          importance: "essential",
          baseAmount: 200000,
          multiplier: { domestic: 0.3, asia: 1, europe: 1.5, america: 2, adventure: 2.5 }
        },
        {
          id: "trip_cancel",
          name: "行程取消",
          desc: "因不可预见的原因取消行程时的损失赔偿",
          importance: "recommended",
          baseAmount: 0,
          useTripCost: true,
          multiplier: { domestic: 1, asia: 1, europe: 1, america: 1, adventure: 1 }
        },
        {
          id: "trip_interrupt",
          name: "行程中断",
          desc: "行程中因意外需要中断旅行的额外费用",
          importance: "recommended",
          baseAmount: 0,
          useTripCost: true,
          costMultiplier: 1.5,
          multiplier: { domestic: 1, asia: 1, europe: 1, america: 1, adventure: 1 }
        },
        {
          id: "baggage_loss",
          name: "行李丢失/延误",
          desc: "托运行李丢失或延误的赔偿",
          importance: "recommended",
          baseAmount: 5000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.2, america: 1.5, adventure: 1 }
        },
        {
          id: "flight_delay",
          name: "航班延误",
          desc: "航班延误超过一定时间的补偿",
          importance: "optional",
          baseAmount: 2000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1, america: 1.2, adventure: 1 }
        },
        {
          id: "personal_liability",
          name: "个人责任",
          desc: "在旅途中意外造成他人人身伤害或财产损失的赔偿",
          importance: "recommended",
          baseAmount: 100000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.5, america: 2, adventure: 1.5 }
        },
        {
          id: "accident",
          name: "意外身故/伤残",
          desc: "因意外导致的身故或伤残赔偿",
          importance: "essential",
          baseAmount: 500000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1, america: 1, adventure: 1.5 }
        },
        {
          id: "dental",
          name: "紧急牙科治疗",
          desc: "旅途中突发牙科急症的治疗费用",
          importance: "optional",
          baseAmount: 5000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.2, america: 1.5, adventure: 1 }
        },
        {
          id: "document_loss",
          name: "证件遗失",
          desc: "护照、签证等证件丢失的补办费用和相关损失",
          importance: "optional",
          baseAmount: 3000,
          multiplier: { domestic: 0.2, asia: 1, europe: 1, america: 1, adventure: 1 }
        },
        {
          id: "rental_car",
          name: "租车保险补充",
          desc: "租车时的额外保险保障，包括车辆损坏和盗窃",
          importance: "optional",
          baseAmount: 50000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.2, america: 1.5, adventure: 1 }
        },
        {
          id: "sports",
          name: "高风险运动",
          desc: "滑雪、潜水、攀岩等高风险运动的专项保障",
          importance: "optional",
          baseAmount: 100000,
          multiplier: { domestic: 0.5, asia: 1, europe: 1.2, america: 1.2, adventure: 2 }
        }
      ];

      const importanceLabels = {
        essential: "必备",
        recommended: "推荐",
        optional: "可选"
      };

      function renderChecklist() {
        const container = document.getElementById("checklist");
        const destination = document.getElementById("destination").value;
        const tripCost = parseFloat(document.getElementById("tripCost").value) || 0;

        container.textContent = "";

        insuranceItems.forEach((item) => {
          let amount = item.baseAmount * (item.multiplier[destination] || 1);
          if (item.useTripCost) {
            amount = tripCost * (item.costMultiplier || 1);
          }

          const label = document.createElement("label");
          label.className = "checklist-item";
          label.id = "item-" + item.id;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.id = "check-" + item.id;
          checkbox.onchange = updateSummary;

          const info = document.createElement("div");
          info.className = "checklist-info";

          const title = document.createElement("div");
          title.className = "checklist-title";
          title.textContent = item.name;

          const badge = document.createElement("span");
          badge.className = "importance-badge importance-" + item.importance;
          badge.textContent = importanceLabels[item.importance];
          title.appendChild(badge);

          const desc = document.createElement("div");
          desc.className = "checklist-desc";
          desc.textContent = item.desc;

          const amountDiv = document.createElement("div");
          amountDiv.className = "checklist-amount";
          amountDiv.textContent = "建议保额: ¥" + formatNumber(amount);

          info.appendChild(title);
          info.appendChild(desc);
          info.appendChild(amountDiv);

          label.appendChild(checkbox);
          label.appendChild(info);
          container.appendChild(label);
        });

        updateSummary();
      }

      function calculate() {
        renderChecklist();
        saveState();
      }

      function updateSummary() {
        const destination = document.getElementById("destination").value;
        const tripCost = parseFloat(document.getElementById("tripCost").value) || 0;
        const duration = parseInt(document.getElementById("duration").value) || 7;
        const travelers = parseInt(document.getElementById("travelers").value) || 1;

        let totalCoverage = 0;
        let checkedCount = 0;

        insuranceItems.forEach((item) => {
          const checkbox = document.getElementById("check-" + item.id);
          const container = document.getElementById("item-" + item.id);

          if (checkbox && checkbox.checked) {
            checkedCount++;
            container.classList.add("checked");

            let amount = item.baseAmount * (item.multiplier[destination] || 1);
            if (item.useTripCost) {
              amount = tripCost * (item.costMultiplier || 1);
            }
            totalCoverage += amount;
          } else if (container) {
            container.classList.remove("checked");
          }
        });

        document.getElementById("totalCoverage").textContent = "¥" + formatNumber(totalCoverage);
        document.getElementById("checkedCount").textContent =
          checkedCount + "/" + insuranceItems.length;

        const basePremiumRate =
          {
            domestic: 0.001,
            asia: 0.002,
            europe: 0.003,
            america: 0.004,
            adventure: 0.005
          }[destination] || 0.002;

        const estimatedPremium = Math.round(
          totalCoverage * basePremiumRate * (duration / 7) * travelers
        );
        document.getElementById("estimatedPremium").textContent =
          "¥" + formatNumber(estimatedPremium);

        saveState();
      }

      function checkAll() {
        insuranceItems.forEach((item) => {
          const checkbox = document.getElementById("check-" + item.id);
          if (checkbox) checkbox.checked = true;
        });
        updateSummary();
        showToast("已全选", "success");
      }

      function checkEssential() {
        insuranceItems.forEach((item) => {
          const checkbox = document.getElementById("check-" + item.id);
          if (checkbox) {
            checkbox.checked = item.importance === "essential";
          }
        });
        updateSummary();
        showToast("已选择必备项目", "success");
      }

      function clearAllChecks() {
        insuranceItems.forEach((item) => {
          const checkbox = document.getElementById("check-" + item.id);
          if (checkbox) checkbox.checked = false;
        });
        updateSummary();
        showToast("已清除", "success");
      }

      async function copyChecklist() {
        const destination = document.getElementById("destination").value;
        const tripCost = document.getElementById("tripCost").value;
        const duration = document.getElementById("duration").value;

        const destNames = {
          domestic: "国内",
          asia: "亚洲",
          europe: "欧洲/澳洲",
          america: "美洲",
          adventure: "探险/极限运动"
        };

        let text = "旅行保险清单\n";
        text += "================\n";
        text += "行程天数: " + duration + " 天\n";
        text += "行程费用: ¥" + formatNumber(tripCost) + "\n";
        text += "目的地: " + destNames[destination] + "\n\n";

        text += "已选保险项目:\n";
        text += "----------------\n";

        insuranceItems.forEach((item) => {
          const checkbox = document.getElementById("check-" + item.id);
          if (checkbox && checkbox.checked) {
            let amount = item.baseAmount * (item.multiplier[destination] || 1);
            if (item.useTripCost) {
              amount = parseFloat(tripCost) * (item.costMultiplier || 1);
            }
            text += "✓ " + item.name + " - 建议保额: ¥" + formatNumber(amount) + "\n";
            text += "  " + item.desc + "\n\n";
          }
        });

        text += "\n建议总保额: " + document.getElementById("totalCoverage").textContent;
        text += "\n预估保费: " + document.getElementById("estimatedPremium").textContent;

        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制到剪贴板", "success");
        } catch (e) {
          showToast("复制失败");
        }
      }

      function formatNumber(num) {
        return Math.round(num).toLocaleString("zh-CN");
      }

      function saveState() {
        const state = {
          duration: document.getElementById("duration").value,
          tripCost: document.getElementById("tripCost").value,
          destination: document.getElementById("destination").value,
          travelers: document.getElementById("travelers").value,
          checked: insuranceItems
            .filter((item) => {
              const checkbox = document.getElementById("check-" + item.id);
              return checkbox && checkbox.checked;
            })
            .map((item) => item.id)
        };
        localStorage.setItem("travel-insurance-state", JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem("travel-insurance-state");
        if (saved) {
          try {
            const state = JSON.parse(saved);
            document.getElementById("duration").value = state.duration || 7;
            document.getElementById("tripCost").value = state.tripCost || 10000;
            document.getElementById("destination").value = state.destination || "domestic";
            document.getElementById("travelers").value = state.travelers || 1;

            renderChecklist();

            if (state.checked) {
              state.checked.forEach((id) => {
                const checkbox = document.getElementById("check-" + id);
                if (checkbox) checkbox.checked = true;
              });
              updateSummary();
            }
          } catch (e) {
            renderChecklist();
          }
        } else {
          renderChecklist();
        }
      }

      function showToast(message, type) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show " + (type || "");
        setTimeout(function () {
          toast.className = "toast";
        }, 2000);
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      initTheme();
      loadState();
    </script>
  </body>
</html>

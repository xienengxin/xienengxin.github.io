      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;

        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;

      * {

        display: flex;

        gap: 2px;

      .detail-label {
        color: var(--text-muted);
        font-size: 0.75rem;
      }
      .detail-value {
        color: var(--color-text-primary);
        font-family: var(--font-mono);
      }

        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border-subtle);

        padding: 6px 12px;

        font-size: 0.75rem;

        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .action-btn:hover {
        border-color: var(--accent-green);
        color: var(--accent-green);
      }
      .action-btn.delete:hover {
        border-color: var(--accent-red);
        color: var(--accent-red);
      }

        padding: 40px;

      .empty-state-icon {

        margin-bottom: 16px;

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      @media (max-width: 600px) {
        .container {
          padding: 16px;

        .form-grid {
          grid-template-columns: 1fr;
        }
        .btn-row {
          flex-direction: column;
        }
        .btn {
          width: 100%;
        }
      }

        <div class="section-title">添加行李</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">行李牌号</label>
            <input type="text" class="form-input" id="tagNumber" placeholder="例如: AA123456" />
          </div>
          <div class="form-group">
            <label class="form-label">航班号</label>
            <input type="text" class="form-input" id="flightNumber" placeholder="例如: CA1234" />
          </div>
          <div class="form-group">
            <label class="form-label">出发地</label>
            <input type="text" class="form-input" id="origin" placeholder="例如: PEK 北京" />
          </div>
          <div class="form-group">
            <label class="form-label">目的地</label>
            <input type="text" class="form-input" id="destination" placeholder="例如: LAX 洛杉矶" />
          </div>
          <div class="form-group">
            <label class="form-label">行李描述</label>
            <input
              type="text"
              class="form-input"
              id="description"
              placeholder="例如: 黑色大号行李箱"
            />
          </div>
          <div class="form-group">
            <label class="form-label">状态</label>
            <select class="form-select" id="status">
              <option value="checked">已托运</option>
              <option value="transit">中转中</option>
              <option value="arrived">已到达</option>
              <option value="delayed">延误</option>
              <option value="lost">丢失</option>
            </select>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addBaggage()">➕ 添加行李</button>
          <button class="btn btn-secondary" onclick="clearForm()">🔄 清空表单</button>
        </div>

        <div class="section-title">我的行李</div>
        <div class="baggage-list" id="baggageList">
          <div class="empty-state">
            <div class="empty-state-icon">🧳</div>
            <p>暂无行李记录，添加您的第一件行李吧！</p>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      var LS_KEY = "baggage_tracker_data";
      var baggageData = [];

      function toggleTheme() {
        var body = document.body;
        var isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      (function () {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function loadData() {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          try {
            baggageData = JSON.parse(saved);
          } catch (e) {
            baggageData = [];
          }
        }
        renderList();
      }

      function saveData() {
        localStorage.setItem(LS_KEY, JSON.stringify(baggageData));
      }

      function addBaggage() {
        var tagNumber = document.getElementById("tagNumber").value.trim();
        var flightNumber = document.getElementById("flightNumber").value.trim();
        var origin = document.getElementById("origin").value.trim();
        var destination = document.getElementById("destination").value.trim();
        var description = document.getElementById("description").value.trim();
        var status = document.getElementById("status").value;

        if (!tagNumber) {
          showToast("请输入行李牌号");
          return;
        }

        var baggage = {
          id: Date.now().toString(),
          tagNumber: tagNumber,
          flightNumber: flightNumber,
          origin: origin,
          destination: destination,
          description: description,
          status: status,
          createdAt: new Date().toISOString(),
          timeline: [
            {
              time: new Date().toISOString(),
              text: "行李已添加追踪",
              status: status
            }
          ]
        };

        baggageData.unshift(baggage);
        saveData();
        renderList();
        clearForm();
        showToast("行李已添加");
      }

      function clearForm() {
        document.getElementById("tagNumber").value = "";
        document.getElementById("flightNumber").value = "";
        document.getElementById("origin").value = "";
        document.getElementById("destination").value = "";
        document.getElementById("description").value = "";
        document.getElementById("status").value = "checked";
      }

      function updateStatus(id, newStatus) {
        var baggage = baggageData.find(function (b) {
          return b.id === id;
        });
        if (baggage) {
          var statusNames = {
            checked: "已托运",
            transit: "中转中",
            arrived: "已到达",
            delayed: "延误",
            lost: "丢失"
          };
          baggage.status = newStatus;
          baggage.timeline.unshift({
            time: new Date().toISOString(),
            text: "状态更新为: " + statusNames[newStatus],
            status: newStatus
          });
          saveData();
          renderList();
          showToast("状态已更新");
        }
      }

      function addNote(id) {
        var note = prompt("添加备注:");
        if (note && note.trim()) {
          var baggage = baggageData.find(function (b) {
            return b.id === id;
          });
          if (baggage) {
            baggage.timeline.unshift({
              time: new Date().toISOString(),
              text: note.trim(),
              status: baggage.status
            });
            saveData();
            renderList();
            showToast("备注已添加");
          }
        }
      }

      function deleteBaggage(id) {
        if (confirm("确定要删除这件行李吗？")) {
          baggageData = baggageData.filter(function (b) {
            return b.id !== id;
          });
          saveData();
          renderList();
          showToast("行李已删除");
        }
      }

      function formatDateTime(isoString) {
        var date = new Date(isoString);
        return (
          date.toLocaleDateString("zh-CN") +
          " " +
          date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
        );
      }

      function renderList() {
        var listEl = document.getElementById("baggageList");
        listEl.textContent = "";

        if (baggageData.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "empty-state";
          var iconDiv = document.createElement("div");
          iconDiv.className = "empty-state-icon";
          iconDiv.textContent = "🧳";
          var pEl = document.createElement("p");
          pEl.textContent = "暂无行李记录，添加您的第一件行李吧！";
          emptyDiv.appendChild(iconDiv);
          emptyDiv.appendChild(pEl);
          listEl.appendChild(emptyDiv);
          return;
        }

        var statusClasses = {
          checked: "status-checked",
          transit: "status-transit",
          arrived: "status-arrived",
          delayed: "status-delayed",
          lost: "status-lost"
        };
        var statusNames = {
          checked: "已托运",
          transit: "中转中",
          arrived: "已到达",
          delayed: "延误",
          lost: "丢失"
        };

        baggageData.forEach(function (baggage) {
          var item = document.createElement("div");
          item.className = "baggage-item";

          var header = document.createElement("div");
          header.className = "baggage-header";
          var tag = document.createElement("div");
          tag.className = "baggage-tag";
          tag.textContent = "🏷️ " + baggage.tagNumber;
          var status = document.createElement("div");
          status.className = "baggage-status " + statusClasses[baggage.status];
          status.textContent = statusNames[baggage.status];
          header.appendChild(tag);
          header.appendChild(status);

          var details = document.createElement("div");
          details.className = "baggage-details";
          var detailsData = [
            { label: "航班", value: baggage.flightNumber || "-" },
            { label: "出发地", value: baggage.origin || "-" },
            { label: "目的地", value: baggage.destination || "-" },
            { label: "描述", value: baggage.description || "-" }
          ];
          detailsData.forEach(function (d) {
            var detailItem = document.createElement("div");
            detailItem.className = "detail-item";
            var labelEl = document.createElement("div");
            labelEl.className = "detail-label";
            labelEl.textContent = d.label;
            var valueEl = document.createElement("div");
            valueEl.className = "detail-value";
            valueEl.textContent = d.value;
            detailItem.appendChild(labelEl);
            detailItem.appendChild(valueEl);
            details.appendChild(detailItem);
          });

          var timeline = document.createElement("div");
          timeline.className = "baggage-timeline";
          baggage.timeline.slice(0, 3).forEach(function (entry) {
            var timelineItem = document.createElement("div");
            timelineItem.className = "timeline-item";
            var dot = document.createElement("div");
            dot.className = "timeline-dot";
            var content = document.createElement("div");
            content.className = "timeline-content";
            var timeEl = document.createElement("div");
            timeEl.className = "timeline-time";
            timeEl.textContent = formatDateTime(entry.time);
            var textEl = document.createElement("div");
            textEl.className = "timeline-text";
            textEl.textContent = entry.text;
            content.appendChild(timeEl);
            content.appendChild(textEl);
            timelineItem.appendChild(dot);
            timelineItem.appendChild(content);
            timeline.appendChild(timelineItem);
          });

          var actions = document.createElement("div");
          actions.className = "baggage-actions";

          var statusSelect = document.createElement("select");
          statusSelect.className = "action-btn";
          statusSelect.style.padding = "6px";
          Object.keys(statusNames).forEach(function (key) {
            var opt = document.createElement("option");
            opt.value = key;
            opt.textContent = statusNames[key];
            if (key === baggage.status) opt.selected = true;
            statusSelect.appendChild(opt);
          });
          statusSelect.onchange = function () {
            updateStatus(baggage.id, this.value);
          };

          var noteBtn = document.createElement("button");
          noteBtn.className = "action-btn";
          noteBtn.textContent = "📝 备注";
          noteBtn.onclick = function () {
            addNote(baggage.id);
          };

          var deleteBtn = document.createElement("button");
          deleteBtn.className = "action-btn delete";
          deleteBtn.textContent = "🗑️ 删除";
          deleteBtn.onclick = function () {
            deleteBaggage(baggage.id);
          };

          actions.appendChild(statusSelect);
          actions.appendChild(noteBtn);
          actions.appendChild(deleteBtn);

          item.appendChild(header);
          item.appendChild(details);
          item.appendChild(timeline);
          item.appendChild(actions);
          listEl.appendChild(item);
        });
      }

      function showToast(msg) {
        var toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      // Initialize
      loadData();
    </script>
  </body>
</html>

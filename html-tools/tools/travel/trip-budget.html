    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.5rem;
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .budget-section {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-4);
        align-items: flex-end;
        margin-bottom: var(--space-6);
        padding: var(--space-5);
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
      }
      .budget-input-group {
        flex: 1;
        min-width: 200px;
      }
      .budget-input-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: var(--space-2);
      }
      .budget-input {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--color-text-primary);
        background: var(--color-bg-input);
        border: 2px solid var(--color-border-default);
        border-radius: var(--radius-md);
        transition: all var(--transition-fast);
      }
      .budget-input:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
      }
      .budget-summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-4);
        text-align: center;
      }
      .summary-item {
        padding: var(--space-3);
      }
      .summary-value {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 700;
      }
      .summary-value.spent {
        color: var(--color-warning);
      }
      .summary-value.remaining {
        color: var(--color-success);
      }
      .summary-value.remaining.over {
        color: var(--color-error);
      }
      .summary-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: var(--space-1);
      }
      .progress-container {
        margin-bottom: var(--space-6);
      }
      .progress-bar {
        height: 12px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-full);
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-full);
        transition: width var(--transition-normal);
      }
      .progress-fill.warning {
        background: linear-gradient(90deg, var(--color-warning), #f97316);
      }
      .progress-fill.danger {
        background: linear-gradient(90deg, var(--color-error), #dc2626);
      }
      .progress-text {
        display: flex;
        justify-content: space-between;
        margin-top: var(--space-2);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .add-expense-form {
        display: grid;

    <script>
      var LS_KEY = "trip_budget_v1";

      var categoryNames = {
        flights: "✈️ 机票",
        hotel: "🏨 住宿",
        food: "🍜 餐饮",
        transport: "🚗 交通",
        activities: "🎭 活动",
        shopping: "🛍️ 购物",
        other: "📦 其他"
      };

      var categoryIcons = {
        flights: "✈️",
        hotel: "🏨",
        food: "🍜",
        transport: "🚗",
        activities: "🎭",
        shopping: "🛍️",
        other: "📦"
      };

      var state = {
        budget: 0,
        expenses: []
      };

      function loadFromStorage() {
        try {
          var saved = localStorage.getItem(LS_KEY);
          if (saved) {
            state = JSON.parse(saved);
          }
        } catch (e) {
          console.error("Failed to load from storage:", e);
        }
      }

      function saveToStorage() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(state));
        } catch (e) {
          console.error("Failed to save to storage:", e);
        }
      }

      function loadFromUrl() {
        var hash = location.hash.slice(1);
        if (!hash) return false;
        try {
          var data = JSON.parse(decodeURIComponent(atob(hash)));
          if (data && typeof data.budget === "number" && Array.isArray(data.expenses)) {
            state = data;
            saveToStorage();
            return true;
          }
        } catch (e) {
          console.error("Failed to load from URL:", e);
        }
        return false;
      }

      function saveToUrl() {
        try {
          var data = btoa(encodeURIComponent(JSON.stringify(state)));
          if (data.length < 2000) {
            history.replaceState(null, "", "#" + data);
          }
        } catch (e) {
          console.error("Failed to save to URL:", e);
        }
      }

      function formatCurrency(amount) {
        return (
          "¥" +
          amount.toLocaleString("zh-CN", { minimumFractionDigits: 0, maximumFractionDigits: 2 })
        );
      }

      function calculateTotals() {
        var totals = {
          flights: 0,
          hotel: 0,
          food: 0,
          transport: 0,
          activities: 0,
          shopping: 0,
          other: 0
        };

        var total = 0;
        state.expenses.forEach(function (expense) {
          totals[expense.category] = (totals[expense.category] || 0) + expense.amount;
          total += expense.amount;
        });

        return { totals: totals, total: total };
      }

      function updateUI() {
        var budgetInput = document.getElementById("totalBudget");
        budgetInput.value = state.budget || "";

        var calc = calculateTotals();
        var spent = calc.total;
        var remaining = state.budget - spent;
        var percentage = state.budget > 0 ? Math.min((spent / state.budget) * 100, 100) : 0;

        document.getElementById("totalSpent").textContent = formatCurrency(spent);

        var remainingEl = document.getElementById("remaining");
        remainingEl.textContent = formatCurrency(remaining);
        if (remaining < 0) {
          remainingEl.classList.add("over");
        } else {
          remainingEl.classList.remove("over");
        }

        document.getElementById("percentage").textContent = percentage.toFixed(1) + "%";

        var progressFill = document.getElementById("progressFill");
        var actualPercentage = state.budget > 0 ? (spent / state.budget) * 100 : 0;
        progressFill.style.width = Math.min(actualPercentage, 100) + "%";
        progressFill.classList.remove("warning", "danger");
        if (actualPercentage >= 100) {
          progressFill.classList.add("danger");
        } else if (actualPercentage >= 80) {
          progressFill.classList.add("warning");
        }

        document.getElementById("progressSpent").textContent = formatCurrency(spent);
        document.getElementById("progressTotal").textContent = "/ " + formatCurrency(state.budget);

        Object.keys(calc.totals).forEach(function (cat) {
          var item = document.querySelector(
            '.category-item[data-category="' + cat + '"] .category-amount'
          );
          if (item) {
            item.textContent = formatCurrency(calc.totals[cat]);
          }
        });

        renderExpenses();
      }

      function renderExpenses() {
        var container = document.getElementById("expenseItems");
        var countEl = document.getElementById("expenseCount");

        countEl.textContent = state.expenses.length + " 笔";

        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        if (state.expenses.length === 0) {
          var emptyState = document.createElement("div");
          emptyState.className = "empty-state";
          var emptyIcon = document.createElement("div");
          emptyIcon.className = "empty-state-icon";
          emptyIcon.textContent = "📝";
          var emptyText = document.createElement("div");
          emptyText.className = "empty-state-text";
          emptyText.textContent = "还没有消费记录，添加第一笔吧";
          emptyState.appendChild(emptyIcon);
          emptyState.appendChild(emptyText);
          container.appendChild(emptyState);
          return;
        }

        var sorted = state.expenses.slice().reverse();
        sorted.forEach(function (expense, idx) {
          var realIdx = state.expenses.length - 1 - idx;

          var item = document.createElement("div");
          item.className = "expense-item";
          item.setAttribute("data-category", expense.category);

          var icon = document.createElement("div");
          icon.className = "expense-icon";
          icon.textContent = categoryIcons[expense.category];

          var details = document.createElement("div");
          details.className = "expense-details";

          var desc = document.createElement("div");
          desc.className = "expense-description";
          desc.textContent = expense.description;

          var cat = document.createElement("div");
          cat.className = "expense-category";
          cat.textContent = categoryNames[expense.category];

          details.appendChild(desc);
          details.appendChild(cat);

          var amount = document.createElement("div");
          amount.className = "expense-amount";
          amount.textContent = formatCurrency(expense.amount);

          var deleteBtn = document.createElement("button");
          deleteBtn.className = "btn-delete";
          deleteBtn.setAttribute("aria-label", "删除");
          deleteBtn.setAttribute("data-index", realIdx);
          deleteBtn.addEventListener("click", function () {
            deleteExpense(parseInt(this.getAttribute("data-index"), 10));
          });

          var deleteSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          deleteSvg.setAttribute("viewBox", "0 0 24 24");
          deleteSvg.setAttribute("fill", "none");
          deleteSvg.setAttribute("stroke", "currentColor");
          deleteSvg.setAttribute("stroke-width", "2");
          deleteSvg.setAttribute("stroke-linecap", "round");
          deleteSvg.setAttribute("stroke-linejoin", "round");

          var polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          polyline.setAttribute("points", "3 6 5 6 21 6");

          var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute(
            "d",
            "M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          );

          deleteSvg.appendChild(polyline);
          deleteSvg.appendChild(path);
          deleteBtn.appendChild(deleteSvg);

          item.appendChild(icon);
          item.appendChild(details);
          item.appendChild(amount);
          item.appendChild(deleteBtn);

          container.appendChild(item);
        });
      }

      function addExpense(description, amount, category) {
        state.expenses.push({
          id: Date.now(),
          description: description,
          amount: amount,
          category: category,
          createdAt: new Date().toISOString()
        });
        saveToStorage();
        saveToUrl();
        updateUI();
      }

      function deleteExpense(index) {
        if (index >= 0 && index < state.expenses.length) {
          state.expenses.splice(index, 1);
          saveToStorage();
          saveToUrl();
          updateUI();
        }
      }

      function clearAll() {
        if (confirm("确定要清空所有数据吗？此操作不可恢复。")) {
          state = { budget: 0, expenses: [] };
          saveToStorage();
          history.replaceState(null, "", location.pathname);
          updateUI();
        }
      }

      document.getElementById("totalBudget").addEventListener("input", function (e) {
        state.budget = parseFloat(e.target.value) || 0;
        saveToStorage();
        saveToUrl();
        updateUI();
      });

      document.getElementById("expenseForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var descEl = document.getElementById("description");
        var amountEl = document.getElementById("amount");
        var categoryEl = document.getElementById("category");

        var description = descEl.value.trim();
        var amount = parseFloat(amountEl.value);
        var category = categoryEl.value;

        if (description && amount > 0 && category) {
          addExpense(description, amount, category);
          descEl.value = "";
          amountEl.value = "";
          descEl.focus();
        }
      });

      document.getElementById("btnShare").addEventListener("click", function () {
        saveToUrl();
        navigator.clipboard
          .writeText(location.href)
          .then(function () {
            alert("链接已复制到剪贴板");
          })
          .catch(function () {
            alert("复制失败，请手动复制地址栏链接");
          });
      });

      document.getElementById("btnClear").addEventListener("click", clearAll);

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme")) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        }
      });

      initTheme();
      if (!loadFromUrl()) {
        loadFromStorage();
      }
      updateUI();
    </script>
  </body>
</html>

      :root {

        --accent-yellow: #fbbf24;

        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;

      .breadcrumb {

        gap: 8px;
        font-family: var(--font-mono);

        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--accent-green);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }
      .main-content {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
      }
      .controls {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .language-select {
        flex: 1;
        min-width: 150px;
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
      }
      .language-select:focus {
        outline: none;
        border-color: var(--accent-green);
      }
      .category-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .category-tab {
        padding: 8px 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .category-tab:hover {
        border-color: var(--accent-green);
        color: var(--accent-green);
      }
      .category-tab.active {
        background: var(--accent-green);
        color: var(--color-bg-deep);
        border-color: var(--accent-green);
      }
      .phrase-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .phrase-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .phrase-card:hover {
        border-color: var(--accent-green);
      }
      .phrase-chinese {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--color-text-primary);
      }
      .phrase-translation {
        font-size: 1.1rem;
        color: var(--accent-green);
        margin-bottom: 6px;
      }
      .phrase-pronunciation {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--text-muted);
        font-style: italic;
      }
      .copy-hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 8px;
        text-align: right;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      @media (max-width: 600px) {
        .container {
          padding: 16px;
        }
        .controls {
          flex-direction: column;
        }
        .language-select {
          width: 100%;
        }
      }
    </style>

      var currentCategory = "greetings";
      var currentLanguage = "en";

      function toggleTheme() {
        var body = document.body;
        var isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      (function () {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function renderTabs() {
        var container = document.getElementById("categoryTabs");
        container.textContent = "";
        Object.keys(phrases).forEach(function (key) {
          var tab = document.createElement("button");
          tab.className = "category-tab" + (key === currentCategory ? " active" : "");
          tab.textContent = phrases[key].name;
          tab.onclick = function () {
            currentCategory = key;
            renderTabs();
            renderPhrases();
          };
          container.appendChild(tab);
        });
      }

      function renderPhrases() {
        currentLanguage = document.getElementById("languageSelect").value;
        var container = document.getElementById("phraseList");
        container.textContent = "";

        var items = phrases[currentCategory].items;
        items.forEach(function (item) {
          var card = document.createElement("div");
          card.className = "phrase-card";
          card.onclick = function () {
            copyText(item[currentLanguage]);
          };

          var chinese = document.createElement("div");
          chinese.className = "phrase-chinese";
          chinese.textContent = item.zh;

          var translation = document.createElement("div");
          translation.className = "phrase-translation";
          translation.textContent = item[currentLanguage];

          var pronunciation = document.createElement("div");
          pronunciation.className = "phrase-pronunciation";
          pronunciation.textContent = item[currentLanguage + "Pron"];

          var hint = document.createElement("div");
          hint.className = "copy-hint";
          hint.textContent = "点击复制";

          card.appendChild(chinese);
          card.appendChild(translation);
          card.appendChild(pronunciation);
          card.appendChild(hint);
          container.appendChild(card);
        });
      }

      function copyText(text) {
        navigator.clipboard.writeText(text).then(function () {
          showToast("已复制: " + text);
        });
      }

      function showToast(msg) {
        var toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      // Initialize
      renderTabs();
      renderPhrases();
    </script>

    <style>
      /* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Drop Zone
         ============================================ */
      .drop-zone {
        border: 2px dashed var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-8) var(--space-6);
        text-align: center;
        transition: all var(--transition-normal);
        cursor: pointer;
        background: var(--color-bg-subtle);
      }

      .drop-zone:hover {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.05);
      }

      .drop-zone.dragover {
        border-color: var(--color-accent-primary);
        background: rgba(0, 212, 170, 0.08);
      }

      .drop-zone-icon {
        font-size: 3rem;
        margin-bottom: var(--space-4);
      }

      .drop-zone-text {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
      }

      .drop-zone-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      input[type="file"] {
        display: none;
      }

      /* ============================================
         File Info
         ============================================ */
      .file-info {
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        margin-top: var(--space-5);
        display: none;
      }

      .file-info.visible {
        display: block;
      }

      .file-name {
        font-family: var(--font-mono);
        font-size: 1rem;
        color: var(--color-accent-primary);
        margin-bottom: var(--space-2);
        word-break: break-all;
      }

      .file-meta {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* ============================================
         Progress
         ============================================ */
      .progress-container {
        margin-top: var(--space-5);
        display: none;
      }

      .progress-container.visible {
        display: block;
      }

      .progress-bar {
        height: 8px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-full);
        overflow: hidden;
        margin-bottom: var(--space-2);
      }

      .progress-fill {
        height: 100%;
        background: var(--color-accent-primary);
        border-radius: var(--radius-full);
        transition: width 0.1s ease;
        width: 0%;
      }

      .progress-text {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-align: center;
      }

      /* ============================================
         Hash Results
         ============================================ */
      .hash-results {
        margin-top: var(--space-6);
        display: none;
      }

      .hash-results.visible {
        display: block;
      }

      .hash-item {
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        padding: var(--space-4);
        margin-bottom: var(--space-3);
        position: relative;
      }

      .hash-item .label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: var(--space-2);
        font-weight: 600;
      }

      .hash-item .value {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-primary);
        word-break: break-all;
        padding-right: 60px;
      }

      .hash-item .copy-btn {
        position: absolute;
        top: 50%;
        right: var(--space-3);
        transform: translateY(-50%);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        padding: var(--space-1) var(--space-3);
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-weight: 500;
      }

      .hash-item .copy-btn:hover {
        border-color: var(--color-accent-primary);
        color: var(--color-accent-primary);
        background: var(--color-bg-subtle);
      }

      /* ============================================
         Verify Section
         ============================================ */
      .verify-section {
        margin-top: var(--space-6);
      }

      .verify-section label {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: var(--space-3);
        font-weight: 600;
      }

      .verify-input {
        display: flex;
        gap: var(--space-3);
        margin-bottom: var(--space-4);
      }

      input[type="text"] {
        flex: 1;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: var(--space-3) var(--space-4);
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        transition: all var(--transition-fast);
      }

      input[type="text"]:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      /* ============================================
         Buttons
         ============================================ */
      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #fff;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      /* ============================================
         Verify Result
         ============================================ */
      .verify-result {
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        display: none;
        font-weight: 500;
      }

      .verify-result.match {
        display: block;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid var(--color-success);
        color: var(--color-success);
      }

      .verify-result.mismatch {
        display: block;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--color-error);
        color: var(--color-error);
      }

      /* ============================================
         Status
         ============================================ */
      .status {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-accent-primary);
        margin-top: var(--space-3);
        min-height: 20px;
        font-weight: 500;
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .drop-zone {
          padding: var(--space-5) var(--space-3);
        }

        .drop-zone-icon {
          font-size: 2rem;
        }

        .verify-input {
          flex-direction: column;
        }

        .hash-item .copy-btn {
          position: relative;
          top: auto;
          right: auto;
          transform: none;
          width: 100%;
          margin-top: var(--space-2);
        }
      }

      /* Tablet */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      /* Desktop */
      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>

        <h1 class="nav-title">文件哈希校验</h1>

        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <!-- File Upload Card -->
        <div class="card">
          <h2 class="card-title">上传文件</h2>
          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">拖拽文件到此处，或点击选择文件</div>
            <div class="drop-zone-hint">文件不会上传，完全在本地计算</div>
            <input type="file" id="fileInput" />
          </div>

          <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-meta" id="fileMeta"></div>
          </div>

          <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">计算中...</div>
          </div>

          <div id="status" class="status"></div>
        </div>

        <!-- Hash Results Card -->
        <div class="card">
          <h2 class="card-title">哈希值</h2>
          <div class="hash-results" id="hashResults">
            <div class="hash-item">
              <div class="label">MD5</div>
              <div class="value" id="md5Hash">-</div>
              <button class="copy-btn" data-hash="md5">复制</button>
            </div>
            <div class="hash-item">
              <div class="label">SHA-1</div>
              <div class="value" id="sha1Hash">-</div>
              <button class="copy-btn" data-hash="sha1">复制</button>
            </div>
            <div class="hash-item">
              <div class="label">SHA-256</div>
              <div class="value" id="sha256Hash">-</div>
              <button class="copy-btn" data-hash="sha256">复制</button>
            </div>
            <div class="hash-item">
              <div class="label">SHA-512</div>
              <div class="value" id="sha512Hash">-</div>
              <button class="copy-btn" data-hash="sha512">复制</button>
            </div>
          </div>
        </div>

        <!-- Verify Card -->
        <div class="card">
          <h2 class="card-title">验证哈希值</h2>
          <div class="verify-section">
            <label>输入要验证的哈希值</label>
            <div class="verify-input">
              <input type="text" id="verifyInput" placeholder="粘贴要验证的哈希值..." />
              <button id="btnVerify" class="primary">验证</button>
            </div>
            <div class="verify-result" id="verifyResult"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
      // ============================================
      // Elements
      // ============================================
      var dropZone = document.getElementById("dropZone");
      var fileInput = document.getElementById("fileInput");
      var fileInfo = document.getElementById("fileInfo");
      var progressContainer = document.getElementById("progressContainer");
      var progressFill = document.getElementById("progressFill");
      var progressText = document.getElementById("progressText");
      var hashResults = document.getElementById("hashResults");
      var verifyInput = document.getElementById("verifyInput");
      var verifyResult = document.getElementById("verifyResult");
      var statusEl = document.getElementById("status");

      var currentHashes = {};

      // ============================================
      // Utility Functions
      // ============================================
      window.formatFileSize = function (bytes) {
        if (bytes === 0) return "0 B";
        var k = 1024;
        var sizes = ["B", "KB", "MB", "GB", "TB"];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      };

      function arrayBufferToWordArray(ab) {
        var i8a = new Uint8Array(ab);
        var a = [];
        for (var i = 0; i < i8a.length; i += 4) {
          a.push((i8a[i] << 24) | (i8a[i + 1] << 16) | (i8a[i + 2] << 8) | i8a[i + 3]);
        }
        return CryptoJS.lib.WordArray.create(a, i8a.length);
      }

      // ============================================
      // Hash Calculation
      // ============================================
      async function calculateHashes(file) {
        fileInfo.classList.add("visible");
        document.getElementById("fileName").textContent = file.name;
        document.getElementById("fileMeta").textContent =
          formatFileSize(file.size) + " · " + (file.type || "未知类型");

        progressContainer.classList.add("visible");
        hashResults.classList.remove("visible");
        verifyResult.className = "verify-result";

        var chunkSize = 2 * 1024 * 1024; // 2MB chunks
        var chunks = Math.ceil(file.size / chunkSize);
        var currentChunk = 0;

        var md5 = CryptoJS.algo.MD5.create();
        var sha1 = CryptoJS.algo.SHA1.create();
        var sha256 = CryptoJS.algo.SHA256.create();
        var sha512 = CryptoJS.algo.SHA512.create();

        function readChunk(start) {
          return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            var end = Math.min(start + chunkSize, file.size);
            var blob = file.slice(start, end);

            reader.onload = function (e) {
              resolve(e.target.result);
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(blob);
          });
        }

        for (var i = 0; i < chunks; i++) {
          var chunk = await readChunk(i * chunkSize);
          var wordArray = arrayBufferToWordArray(chunk);

          md5.update(wordArray);
          sha1.update(wordArray);
          sha256.update(wordArray);
          sha512.update(wordArray);

          var progress = Math.round(((i + 1) / chunks) * 100);
          progressFill.style.width = progress + "%";
          progressText.textContent = "计算中... " + progress + "%";
        }

        currentHashes = {
          md5: md5.finalize().toString(),
          sha1: sha1.finalize().toString(),
          sha256: sha256.finalize().toString(),
          sha512: sha512.finalize().toString()
        };

        document.getElementById("md5Hash").textContent = currentHashes.md5;
        document.getElementById("sha1Hash").textContent = currentHashes.sha1;
        document.getElementById("sha256Hash").textContent = currentHashes.sha256;
        document.getElementById("sha512Hash").textContent = currentHashes.sha512;

        progressContainer.classList.remove("visible");
        hashResults.classList.add("visible");
        showStatus("哈希计算完成");
      }

      function handleFile(file) {
        if (!file) return;
        calculateHashes(file);
      }

      // ============================================
      // Drop Zone Events
      // ============================================
      dropZone.addEventListener("click", function () {
        fileInput.click();
      });

      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        var files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) {
          handleFile(fileInput.files[0]);
        }
      });

      // ============================================
      // Copy Buttons
      // ============================================
      document.querySelectorAll(".copy-btn").forEach(function (btn) {
        btn.addEventListener("click", async function () {
          var hashType = btn.getAttribute("data-hash");
          var hash = currentHashes[hashType];
          if (hash) {
            try {
              await navigator.clipboard.writeText(hash);
              showStatus(hashType.toUpperCase() + " 已复制");
            } catch (e) {
              showStatus("复制失败");
            }
          }
        });
      });

      // ============================================
      // Verify Hash
      // ============================================
      document.getElementById("btnVerify").addEventListener("click", function () {
        var input = verifyInput.value.trim().toLowerCase();
        if (!input) {
          verifyResult.className = "verify-result";
          return;
        }

        var matched = false;
        var matchedType = "";

        for (var type in currentHashes) {
          if (currentHashes[type].toLowerCase() === input) {
            matched = true;
            matchedType = type.toUpperCase();
            break;
          }
        }

        if (matched) {
          verifyResult.className = "verify-result match";
          verifyResult.textContent = "✓ 哈希值匹配！(" + matchedType + ")";
        } else {
          verifyResult.className = "verify-result mismatch";
          verifyResult.textContent = "✗ 哈希值不匹配";
        }
      });

      verifyInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          document.getElementById("btnVerify").click();
        }
      });

      // ============================================
      // Status Message
      // ============================================
      function showStatus(msg) {
        statusEl.textContent = msg;
        setTimeout(function () {
          statusEl.textContent = "";
        }, 2000);
      }

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      // ============================================
      // Initialize
      // ============================================
      initTheme();
    </script>
  </body>
</html>

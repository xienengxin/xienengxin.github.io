      :root {

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      .container {
        max-width: 1100px;
        padding: 20px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .drop-zone {
        border: 3px dashed var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 1.5rem;
      }
      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--pico-primary);
        background: var(--pico-primary-focus);
      }
      .drop-zone-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      .drop-zone p {
        margin: 0.5rem 0;
        color: var(--pico-muted-color);
      }
      .file-input {
        display: none;
      }
      .panel {
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        padding: 1rem;
        background: var(--pico-card-background-color);
        margin-bottom: 1rem;
      }
      .panel h3 {
        margin-top: 0;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .panel h3 .badge {
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        background: var(--pico-primary);
        color: white;
        border-radius: 3px;
        font-weight: normal;
      }
      .file-preview {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 1.5rem;
        margin-bottom: 1rem;
      }
      @media (max-width: 600px) {
        .file-preview {
          grid-template-columns: 1fr;
        }
      }
      .preview-image {
        max-width: 200px;
        max-height: 200px;
        object-fit: contain;
        border-radius: var(--pico-border-radius);
        background: var(--pico-background-color);
      }
      .preview-icon {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        background: var(--pico-background-color);
        border-radius: var(--pico-border-radius);
      }
      .basic-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 0.75rem;
      }
      .info-item {
        background: var(--pico-background-color);
        padding: 0.75rem;
        border-radius: var(--pico-border-radius);
      }
      .info-label {
        font-size: 0.8rem;
        color: var(--pico-muted-color);
        margin-bottom: 0.25rem;
      }
      .info-value {
        font-weight: bold;
        word-break: break-all;
      }
      .metadata-table {
        width: 100%;
        border-collapse: collapse;
      }
      .metadata-table th,
      .metadata-table td {
        padding: 0.5rem 0.75rem;
        text-align: left;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }
      .metadata-table th {
        background: var(--pico-background-color);
        font-weight: bold;
        width: 35%;
      }
      .metadata-table td {
        word-break: break-all;
      }
      .metadata-table tr:last-child th,
      .metadata-table tr:last-child td {
        border-bottom: none;
      }
      .category-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .category-tab {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        border: 1px solid var(--pico-muted-border-color);
        background: var(--pico-background-color);
        border-radius: var(--pico-border-radius);
        cursor: pointer;
      }
      .category-tab:hover {
        background: var(--pico-primary-focus);
      }
      .category-tab.active {
        background: var(--pico-primary);
        color: white;
        border-color: var(--pico-primary);
      }
      .empty-state {
        text-align: center;
        padding: 2rem;
        color: var(--pico-muted-color);
      }
      .privacy-warning {
        background: #fef3c7;
        color: #92400e;
        padding: 0.75rem 1rem;
        border-radius: var(--pico-border-radius);
        margin-bottom: 1rem;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
      }
      [data-theme="dark"] .privacy-warning {
        background: #92400e;
        color: #fef3c7;
      }
      .privacy-warning-icon {
        font-size: 1.2rem;
      }
      .toolbar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .toolbar button {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        margin: 0;
      }
      .json-view {
        background: var(--pico-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);

        overflow: auto;

      .gps-link {

      .hidden {

      .breadcrumb {

      }

        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文件元数据查看器
    </nav>
    <main class="container">
      <div class="header">
        <h1>文件元数据查看器</h1>
        <button id="themeToggle" class="outline">深色模式</button>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">📁</div>
        <p><strong>拖拽文件到此处</strong></p>
        <p>或点击选择文件</p>
        <p><small>支持图片、音频、视频、文档等多种格式</small></p>
        <input type="file" id="fileInput" class="file-input" />
      </div>

      <div id="resultArea" class="hidden">
        <div id="privacyWarning" class="privacy-warning hidden">
          <span class="privacy-warning-icon">⚠️</span>
          <div>
            <strong>隐私提示：</strong>
            此文件包含敏感信息（如 GPS 位置），分享前请考虑移除这些元数据。
          </div>
        </div>

        <div class="panel">
          <h3>基本信息</h3>
          <div class="file-preview">
            <div id="filePreview"></div>
            <div class="basic-info" id="basicInfo"></div>
          </div>
        </div>

        <div class="panel" id="metadataPanel">
          <h3>
            <span>详细元数据</span>
            <span class="badge" id="metadataCount">0 项</span>
          </h3>
          <div class="category-tabs" id="categoryTabs"></div>
          <div id="metadataContent"></div>
        </div>

        <div class="panel">
          <h3>原始数据 (JSON)</h3>
          <div class="toolbar">
            <button class="secondary" onclick="copyJson()" aria-label="复制 JSON">复制 JSON</button>
            <button class="secondary" onclick="downloadJson()" aria-label="下载 JSON">
              下载 JSON
            </button>
          </div>
          <div class="json-view" id="jsonView"></div>
        </div>
      </div>
    </main>

    <script>
      const themeToggle = document.getElementById("themeToggle");
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const resultArea = document.getElementById("resultArea");
      const privacyWarning = document.getElementById("privacyWarning");
      const filePreviewEl = document.getElementById("filePreview");
      const basicInfoEl = document.getElementById("basicInfo");
      const categoryTabsEl = document.getElementById("categoryTabs");
      const metadataContentEl = document.getElementById("metadataContent");
      const metadataCountEl = document.getElementById("metadataCount");
      const jsonViewEl = document.getElementById("jsonView");

      let currentMetadata = null;
      let currentCategory = "all";

      // 文件类型图标映射
      const fileIcons = {
        image: "🖼️",
        video: "🎬",
        audio: "🎵",
        "application/pdf": "📄",
        "application/msword": "📝",
        "application/vnd.openxmlformats-officedocument": "📝",
        text: "📃",
        "application/zip": "📦",
        "application/x-rar": "📦",
        default: "📁"
      };

      // 主题切换
      function initTheme() {
        const savedTheme = localStorage.getItem("metadata-viewer-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        updateThemeButton(savedTheme);
      }

      function updateThemeButton(theme) {
        themeToggle.textContent = theme === "dark" ? "浅色模式" : "深色模式";
      }

      themeToggle.addEventListener("click", () => {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("metadata-viewer-theme", newTheme);
        updateThemeButton(newTheme);
      });

      // 拖拽处理
      dropZone.addEventListener("click", () => fileInput.click());

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length > 0) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
          handleFile(e.target.files[0]);
        }
        fileInput.value = "";
      });

      // 处理文件
      function handleFile(file) {
        const metadata = {
          basic: {
            name: file.name,
            size: file.size,
            type: file.type || "unknown",
            lastModified: new Date(file.lastModified)
          },
          file: {},
          image: {},
          exif: {},
          other: {}
        };

        // 文件扩展名
        const ext = file.name.split(".").pop().toLowerCase();
        metadata.file.extension = ext;

        // 判断文件类型类别
        const typeCategory = file.type.split("/")[0];

        // 处理图片
        if (typeCategory === "image") {
          const reader = new FileReader();
          reader.onload = (e) => {
            // 显示预览
            filePreviewEl.innerHTML = `<img class="preview-image" src="${e.target.result}" alt="Preview">`;

            // 获取图片尺寸
            const img = new Image();
            img.onload = () => {
              metadata.image.width = img.naturalWidth;
              metadata.image.height = img.naturalHeight;
              metadata.image.aspectRatio = (img.naturalWidth / img.naturalHeight).toFixed(2);

              // 尝试读取 EXIF
              readImageExif(e.target.result, metadata);
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        } else {
          // 非图片文件显示图标
          const icon = getFileIcon(file.type);
          filePreviewEl.innerHTML = `<div class="preview-icon">${icon}</div>`;
          displayMetadata(metadata);
        }
      }

      // 获取文件图标
      function getFileIcon(mimeType) {
        if (!mimeType) return fileIcons.default;

        const category = mimeType.split("/")[0];
        if (fileIcons[mimeType]) return fileIcons[mimeType];
        if (fileIcons[category]) return fileIcons[category];

        for (const key in fileIcons) {
          if (mimeType.startsWith(key)) return fileIcons[key];
        }

        return fileIcons.default;
      }

      // 读取图片 EXIF（简化版，使用 canvas 方式）
      function readImageExif(dataUrl, metadata) {
        // 简化的 EXIF 读取 - 只能获取基本信息
        // 完整的 EXIF 读取需要专门的库如 exif-js

        // 检查是否为 JPEG
        if (dataUrl.includes("data:image/jpeg")) {
          metadata.exif.format = "JPEG";
          metadata.exif.note = "完整 EXIF 读取需要专门的解析库";
        } else if (dataUrl.includes("data:image/png")) {
          metadata.file.format = "PNG";
          metadata.file.note = "PNG 格式通常不包含 EXIF 信息";
        }

        displayMetadata(metadata);
      }

      // 显示元数据
      function displayMetadata(metadata) {
        currentMetadata = metadata;
        resultArea.classList.remove("hidden");

        // 基本信息
        basicInfoEl.innerHTML = `
                <div class="info-item">
                    <div class="info-label">文件名</div>
                    <div class="info-value">${metadata.basic.name}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">文件大小</div>
                    <div class="info-value">${formatSize(metadata.basic.size)}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">MIME 类型</div>
                    <div class="info-value">${metadata.basic.type}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">修改时间</div>
                    <div class="info-value">${formatDate(metadata.basic.lastModified)}</div>
                </div>
                ${
                  metadata.image.width
                    ? `
                <div class="info-item">
                    <div class="info-label">图片尺寸</div>
                    <div class="info-value">${metadata.image.width} × ${metadata.image.height} px</div>
                </div>
                <div class="info-item">
                    <div class="info-label">宽高比</div>
                    <div class="info-value">${metadata.image.aspectRatio}</div>
                </div>
                `
                    : ""
                }
            `;

        // 构建分类数据
        const categories = {
          all: { label: "全部", data: {} },
          file: { label: "文件信息", data: metadata.file },
          image: { label: "图片信息", data: metadata.image },
          exif: { label: "EXIF 数据", data: metadata.exif }
        };

        // 合并所有数据到 all
        Object.assign(categories.all.data, metadata.file, metadata.image, metadata.exif);

        // 渲染分类标签
        const tabs = Object.entries(categories)
          .filter(([key, cat]) => Object.keys(cat.data).length > 0 || key === "all")
          .map(
            ([key, cat]) => `
                    <button class="category-tab ${key === currentCategory ? "active" : ""}" 
                            onclick="switchCategory('${key}')" aria-label="${cat.label}">${cat.label}</button>
                `
          )
          .join("");
        categoryTabsEl.innerHTML = tabs;

        // 渲染元数据表格
        renderMetadataTable(categories[currentCategory].data);

        // 更新计数
        const totalCount = Object.keys(categories.all.data).length;
        metadataCountEl.textContent = `${totalCount} 项`;

        // JSON 视图
        jsonViewEl.textContent = JSON.stringify(metadata, null, 2);

        // 隐私警告（如果有 GPS 数据）
        const hasGps = metadata.exif && (metadata.exif.GPSLatitude || metadata.exif.gps);
        privacyWarning.classList.toggle("hidden", !hasGps);
      }

      // 切换分类
      window.switchCategory = function (category) {
        currentCategory = category;
        if (currentMetadata) {
          displayMetadata(currentMetadata);
        }
      };

      // 渲染元数据表格
      function renderMetadataTable(data) {
        const entries = Object.entries(data).filter(
          ([k, v]) => v !== undefined && v !== null && v !== ""
        );

        if (entries.length === 0) {
          metadataContentEl.innerHTML = '<div class="empty-state">暂无数据</div>';
          return;
        }

        const rows = entries
          .map(([key, value]) => {
            let displayValue = value;
            if (typeof value === "object") {
              displayValue = JSON.stringify(value);
            }
            return `
                    <tr>
                        <th>${formatKey(key)}</th>
                        <td>${displayValue}</td>
                    </tr>
                `;
          })
          .join("");

        metadataContentEl.innerHTML = `
                <table class="metadata-table">
                    ${rows}
                </table>
            `;
      }

      // 格式化键名
      function formatKey(key) {
        return key
          .replace(/([A-Z])/g, " $1")
          .replace(/^./, (str) => str.toUpperCase())
          .replace(/_/g, " ");
      }

      // 格式化文件大小
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
      }

      // 格式化日期
      function formatDate(date) {
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      // 复制 JSON
      window.copyJson = function () {
        if (!currentMetadata) return;
        navigator.clipboard.writeText(JSON.stringify(currentMetadata, null, 2)).then(() => {
          alert("已复制到剪贴板！");
        });
      };

      // 下载 JSON
      window.downloadJson = function () {
        if (!currentMetadata) return;
        const content = JSON.stringify(currentMetadata, null, 2);
        const blob = new Blob([content], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${currentMetadata.basic.name}_metadata.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // 初始化
      initTheme();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

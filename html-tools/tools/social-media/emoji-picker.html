    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      .title-section {
        flex: 1;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent-yellow), #f59e0b);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }
      .main-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }
      .search-section {
        margin-bottom: 20px;
      }
      .search-input {
        width: 100%;
        padding: 14px 18px;
        font-family: var(--font-mono);
        font-size: 1rem;
        background: var(--bg-input);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        transition: all 0.2s;
      }
      .search-input:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 0 4px var(--glow-cyan);
      }
      .search-input::placeholder {
        color: var(--text-muted);
      }
      .categories {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .category-btn {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .category-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .category-btn.active {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }
      .recent-section {
        margin-bottom: 20px;
        padding: 16px;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
      }
      .recent-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
      }
      .recent-emojis {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .emoji-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
        gap: 8px;
        max-height: 400px;
        overflow-y: auto;
        padding: 4px;
      }
      .emoji-btn {
        width: 50px;
        height: 50px;
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
      }
      .emoji-btn:hover {
        transform: scale(1.15);
        border-color: var(--color-accent-cyan);
        background: var(--glow-cyan);
      }
      .copied-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: #fff;
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }
      .copied-toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .selected-section {
        margin-top: 20px;
        padding: 16px;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
      }
      .selected-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .selected-emojis {
        min-height: 40px;
        padding: 10px;
        background: var(--bg-input);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        font-size: 1.5rem;
        letter-spacing: 4px;
      }
      .selected-actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      .selected-actions button {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 8px 16px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .selected-actions button:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .selected-actions button.primary {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .emoji-grid {
          grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
        }
        .emoji-btn {
          width: 45px;
          height: 45px;
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">Emoji 选择器</span>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">😀</span>
            Emoji 选择器
          </h1>
          <p class="desc">快速搜索、选择和复制 Emoji 表情符号</p>
        </div>
      </div>

      <div class="main-card">
        <div class="search-section">
          <input
            type="text"
            class="search-input"
            id="search"
            placeholder="搜索 emoji (例如: smile, heart, 笑脸, 爱心)..."
          />
        </div>

        <div class="categories" id="categories"></div>

        <div class="recent-section" id="recentSection" style="display: none">
          <div class="recent-label">最近使用</div>
          <div class="recent-emojis" id="recentEmojis"></div>
        </div>

        <div class="emoji-grid" id="emojiGrid"></div>

        <div class="selected-section">
          <div class="selected-label">已选择的 Emoji</div>
          <div class="selected-emojis" id="selectedEmojis"></div>
          <div class="selected-actions">
            <button class="primary" id="btnCopySelected">复制全部</button>
            <button id="btnClearSelected">清空</button>
          </div>
        </div>
      </div>

      <footer>

      const searchKeywords = {
        smile: ["😀", "😃", "😄", "😁", "😆", "🙂", "😊"],
        笑: ["😀", "😃", "😄", "😁", "😆", "🤣", "😂", "🙂", "😊"],

        爱心: ["❤️", "🧡", "💛", "💚", "💙", "💜", "💕", "💖", "💗", "💘", "💝"],

        猫: ["🐱", "🐈", "🐈‍⬛", "😺", "😸", "😹", "😻", "😼", "😽", "🙀", "😿", "😾"],

        思考: ["🤔", "💭", "🧐"]
      };

      let currentCategory = "smileys";

      function init() {
        loadRecentEmojis();
        loadSelectedEmojis();
        renderCategories();
        renderEmojis(currentCategory);
        renderRecentEmojis();
      }

      function renderCategories() {
        categoriesEl.textContent = "";

        for (const [key, data] of Object.entries(emojiData)) {
          const btn = document.createElement("button");
          btn.className = "category-btn" + (key === currentCategory ? " active" : "");
          btn.textContent = data.icon + " " + data.name;
          btn.addEventListener("click", function () {
            currentCategory = key;
            renderCategories();
            renderEmojis(key);
          });
          categoriesEl.appendChild(btn);
        }
      }

      function renderEmojis(category) {
        emojiGridEl.textContent = "";

        const emojis = emojiData[category]?.emojis || [];
        for (const emoji of emojis) {
          const btn = document.createElement("button");
          btn.className = "emoji-btn";
          btn.textContent = emoji;
          btn.addEventListener("click", function () {
            selectEmoji(emoji);
          });
          emojiGridEl.appendChild(btn);
        }
      }

      function renderSearchResults(emojis) {
        emojiGridEl.textContent = "";

        for (const emoji of emojis) {
          const btn = document.createElement("button");
          btn.className = "emoji-btn";
          btn.textContent = emoji;
          btn.addEventListener("click", function () {
            selectEmoji(emoji);
          });
          emojiGridEl.appendChild(btn);
        }
      }

      function selectEmoji(emoji) {
        selectedEmojis += emoji;
        selectedEmojisEl.textContent = selectedEmojis;

        addToRecent(emoji);
        copyToClipboard(emoji);
        saveSelectedEmojis();
      }

      function addToRecent(emoji) {
        recentEmojis = recentEmojis.filter(function (e) {
          return e !== emoji;
        });
        recentEmojis.unshift(emoji);
        recentEmojis = recentEmojis.slice(0, 20);
        saveRecentEmojis();
        renderRecentEmojis();
      }

      function renderRecentEmojis() {
        if (recentEmojis.length === 0) {
          recentSectionEl.style.display = "none";
          return;
        }

        recentSectionEl.style.display = "block";
        recentEmojisEl.textContent = "";

        for (const emoji of recentEmojis) {
          const btn = document.createElement("button");
          btn.className = "emoji-btn";
          btn.textContent = emoji;
          btn.addEventListener("click", function () {
            selectEmoji(emoji);
          });
          recentEmojisEl.appendChild(btn);
        }
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(function () {
          showToast();
        });
      }

      function showToast() {
        copiedToastEl.classList.add("show");
        setTimeout(function () {
          copiedToastEl.classList.remove("show");
        }, 1500);
      }

      function saveRecentEmojis() {
        localStorage.setItem(LS_RECENT_KEY, JSON.stringify(recentEmojis));
      }

      function loadRecentEmojis() {
        try {
          const saved = localStorage.getItem(LS_RECENT_KEY);
          if (saved) {
            recentEmojis = JSON.parse(saved);
          }
        } catch (e) {}
      }

      function saveSelectedEmojis() {
        localStorage.setItem(LS_SELECTED_KEY, selectedEmojis);
      }

      function loadSelectedEmojis() {
        const saved = localStorage.getItem(LS_SELECTED_KEY);
        if (saved) {
          selectedEmojis = saved;
          selectedEmojisEl.textContent = selectedEmojis;
        }
      }

      function searchEmojis(query) {
        if (!query) {
          renderEmojis(currentCategory);
          return;
        }

        const queryLower = query.toLowerCase();
        const results = new Set();

        // Check keywords
        for (const [keyword, emojis] of Object.entries(searchKeywords)) {
          if (
            keyword.toLowerCase().includes(queryLower) ||
            queryLower.includes(keyword.toLowerCase())
          ) {
            for (const emoji of emojis) {
              results.add(emoji);
            }
          }
        }

        // Search in all categories
        for (const data of Object.values(emojiData)) {
          for (const emoji of data.emojis) {
            if (data.name.toLowerCase().includes(queryLower)) {
              results.add(emoji);
            }
          }
        }

        if (results.size > 0) {
          renderSearchResults(Array.from(results));
        } else {
          emojiGridEl.textContent = "";
          const msg = document.createElement("div");
          msg.style.cssText =
            "grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;";
          msg.textContent = "未找到匹配的 emoji";
          emojiGridEl.appendChild(msg);
        }
      }

      searchEl.addEventListener("input", function () {
        searchEmojis(searchEl.value.trim());
      });

      document.getElementById("btnCopySelected").addEventListener("click", function () {
        if (selectedEmojis) {
          copyToClipboard(selectedEmojis);
        }
      });

      document.getElementById("btnClearSelected").addEventListener("click", function () {
        selectedEmojis = "";
        selectedEmojisEl.textContent = "";
        localStorage.removeItem(LS_SELECTED_KEY);
      });

      init();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>

    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      .title-section {
        flex: 1;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent-blue), #4cc9f0);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #fff;
      }
      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }
      .main-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        transition: all 0.2s;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 0 4px var(--glow-cyan);
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--text-muted);
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 20px 0;
        padding: 20px 0;
        border-top: 1px solid var(--border-subtle);
        border-bottom: 1px solid var(--border-subtle);
      }
      button {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 10px 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      button.primary {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }
      button.primary:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }
      .preview-section {
        margin-top: 20px;
      }
      .preview-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }
      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }
      .preview-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .preview-header {
        padding: 12px 16px;
        background: var(--bg-input);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .preview-platform {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }
      .preview-platform-icon {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .preview-platform-icon.twitter {
        background: #1da1f2;
        color: #fff;
      }
      .preview-platform-icon.facebook {
        background: #1877f2;
        color: #fff;
      }
      .preview-platform-icon.linkedin {
        background: #0a66c2;
        color: #fff;
      }
      .preview-platform-icon.slack {
        background: #4a154b;
        color: #fff;
      }
      .preview-content {
        padding: 0;
      }

      /* Twitter Card */
      .twitter-card {
        border: 1px solid #e1e8ed;
        border-radius: 14px;
        margin: 12px;
        overflow: hidden;
        background: #fff;
      }
      .twitter-card-image {
        width: 100%;
        height: 150px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 2rem;
      }
      .twitter-card-body {
        padding: 12px;
      }
      .twitter-card-url {
        font-size: 0.75rem;
        color: #657786;
        margin-bottom: 4px;
      }
      .twitter-card-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #14171a;
        margin-bottom: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .twitter-card-desc {
        font-size: 0.8rem;
        color: #657786;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Facebook Card */
      .facebook-card {
        border: 1px solid #dddfe2;
        margin: 12px;
        overflow: hidden;
        background: #fff;
      }
      .facebook-card-image {
        width: 100%;
        height: 150px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 2rem;
      }
      .facebook-card-body {
        padding: 10px 12px;
        border-top: 1px solid #dddfe2;
        background: #f2f3f5;
      }
      .facebook-card-url {
        font-size: 0.7rem;
        color: #606770;
        text-transform: uppercase;
      }
      .facebook-card-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: #1d2129;
        margin: 4px 0;
      }
      .facebook-card-desc {
        font-size: 0.8rem;
        color: #606770;
      }

      /* LinkedIn Card */
      .linkedin-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        margin: 12px;
        overflow: hidden;
        background: #fff;
      }
      .linkedin-card-image {
        width: 100%;
        height: 150px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 2rem;
      }
      .linkedin-card-body {
        padding: 12px;
      }
      .linkedin-card-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: rgba(0, 0, 0, 0.9);
        margin-bottom: 4px;
      }
      .linkedin-card-url {
        font-size: 0.75rem;
        color: rgba(0, 0, 0, 0.6);
      }

      /* Slack Card */
      .slack-card {
        border-left: 4px solid #36c5f0;
        margin: 12px;
        padding: 8px 12px;
        background: #fff;
      }
      .slack-card-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #1264a3;
        margin-bottom: 4px;
      }
      .slack-card-desc {
        font-size: 0.8rem;
        color: #1d1c1d;
        margin-bottom: 8px;
      }
      .slack-card-image {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.5rem;
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 16px;
      }
      .status.success {
        color: var(--accent-green);
      }
      .status.error {
        color: var(--accent-red);
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .preview-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">社交分享预览器</span>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">🔗</span>
            社交分享预览器
          </h1>
          <p class="desc">预览链接在 Twitter、Facebook、LinkedIn 等平台的分享卡片效果</p>
        </div>
      </div>

      <div class="main-card">
        <div class="form-group">
          <label>页面标题 (og:title)</label>
          <input type="text" id="ogTitle" placeholder="输入标题..." />
        </div>

        <div class="form-group">
          <label>页面描述 (og:description)</label>
          <textarea id="ogDescription" placeholder="输入描述..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>页面 URL</label>
            <input type="text" id="ogUrl" placeholder="https://example.com/page" />
          </div>
          <div class="form-group">
            <label>图片 URL (og:image)</label>
            <input type="text" id="ogImage" placeholder="https://example.com/image.jpg" />
          </div>
        </div>

        <div class="toolbar">
          <button class="primary" id="btnPreview">生成预览</button>
          <button id="btnClear">清空</button>
        </div>

        <div class="preview-section">
          <div class="preview-label">预览效果</div>
          <div class="preview-grid" id="previewGrid"></div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <footer>
        <p>
          <a href="https://github.com/nicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </div>

    <script>
      const ogTitleEl = document.getElementById("ogTitle");
      const ogDescriptionEl = document.getElementById("ogDescription");
      const ogUrlEl = document.getElementById("ogUrl");
      const ogImageEl = document.getElementById("ogImage");
      const previewGridEl = document.getElementById("previewGrid");
      const statusEl = document.getElementById("status");

      const LS_KEY = "social_preview_v1";

      function generatePreview() {
        const title = ogTitleEl.value.trim() || "页面标题";
        const description = ogDescriptionEl.value.trim() || "页面描述会显示在这里...";
        const url = ogUrlEl.value.trim() || "example.com";
        const image = ogImageEl.value.trim();

        const domain = extractDomain(url);

        previewGridEl.textContent = "";

        // Twitter Card
        const twitterCard = createPreviewCard("Twitter", "twitter", function (content) {
          const card = document.createElement("div");
          card.className = "twitter-card";

          const imgDiv = document.createElement("div");
          imgDiv.className = "twitter-card-image";
          if (image) {
            const img = document.createElement("img");
            img.src = image;
            img.style.cssText = "width:100%;height:100%;object-fit:cover;";
            img.alt = title;
            img.onerror = function () {
              this.parentNode.textContent = "🖼️";
            };
            imgDiv.appendChild(img);
          } else {
            imgDiv.textContent = "🖼️";
          }

          const body = document.createElement("div");
          body.className = "twitter-card-body";

          const urlSpan = document.createElement("div");
          urlSpan.className = "twitter-card-url";
          urlSpan.textContent = domain;

          const titleDiv = document.createElement("div");
          titleDiv.className = "twitter-card-title";
          titleDiv.textContent = title;

          const descDiv = document.createElement("div");
          descDiv.className = "twitter-card-desc";
          descDiv.textContent = description;

          body.appendChild(urlSpan);
          body.appendChild(titleDiv);
          body.appendChild(descDiv);

          card.appendChild(imgDiv);
          card.appendChild(body);
          content.appendChild(card);
        });
        previewGridEl.appendChild(twitterCard);

        // Facebook Card
        const facebookCard = createPreviewCard("Facebook", "facebook", function (content) {
          const card = document.createElement("div");
          card.className = "facebook-card";

          const imgDiv = document.createElement("div");
          imgDiv.className = "facebook-card-image";
          if (image) {
            const img = document.createElement("img");
            img.src = image;
            img.style.cssText = "width:100%;height:100%;object-fit:cover;";
            img.alt = title;
            img.onerror = function () {
              this.parentNode.textContent = "🖼️";
            };
            imgDiv.appendChild(img);
          } else {
            imgDiv.textContent = "🖼️";
          }

          const body = document.createElement("div");
          body.className = "facebook-card-body";

          const urlSpan = document.createElement("div");
          urlSpan.className = "facebook-card-url";
          urlSpan.textContent = domain;

          const titleDiv = document.createElement("div");
          titleDiv.className = "facebook-card-title";
          titleDiv.textContent = title;

          const descDiv = document.createElement("div");
          descDiv.className = "facebook-card-desc";
          descDiv.textContent = description;

          body.appendChild(urlSpan);
          body.appendChild(titleDiv);
          body.appendChild(descDiv);

          card.appendChild(imgDiv);
          card.appendChild(body);
          content.appendChild(card);
        });
        previewGridEl.appendChild(facebookCard);

        // LinkedIn Card
        const linkedinCard = createPreviewCard("LinkedIn", "linkedin", function (content) {
          const card = document.createElement("div");
          card.className = "linkedin-card";

          const imgDiv = document.createElement("div");
          imgDiv.className = "linkedin-card-image";
          if (image) {
            const img = document.createElement("img");
            img.src = image;
            img.style.cssText = "width:100%;height:100%;object-fit:cover;";
            img.alt = title;
            img.onerror = function () {
              this.parentNode.textContent = "🖼️";
            };
            imgDiv.appendChild(img);
          } else {
            imgDiv.textContent = "🖼️";
          }

          const body = document.createElement("div");
          body.className = "linkedin-card-body";

          const titleDiv = document.createElement("div");
          titleDiv.className = "linkedin-card-title";
          titleDiv.textContent = title;

          const urlSpan = document.createElement("div");
          urlSpan.className = "linkedin-card-url";
          urlSpan.textContent = domain;

          body.appendChild(titleDiv);
          body.appendChild(urlSpan);

          card.appendChild(imgDiv);
          card.appendChild(body);
          content.appendChild(card);
        });
        previewGridEl.appendChild(linkedinCard);

        // Slack Card
        const slackCard = createPreviewCard("Slack", "slack", function (content) {
          const card = document.createElement("div");
          card.className = "slack-card";

          const titleDiv = document.createElement("div");
          titleDiv.className = "slack-card-title";
          titleDiv.textContent = title;

          const descDiv = document.createElement("div");
          descDiv.className = "slack-card-desc";
          descDiv.textContent = description;

          card.appendChild(titleDiv);
          card.appendChild(descDiv);

          if (image) {
            const imgDiv = document.createElement("div");
            imgDiv.className = "slack-card-image";
            const img = document.createElement("img");
            img.src = image;
            img.style.cssText = "width:100%;height:100%;object-fit:cover;border-radius:4px;";
            img.alt = title;
            img.onerror = function () {
              this.parentNode.textContent = "🖼️";
            };
            imgDiv.appendChild(img);
            card.appendChild(imgDiv);
          }

          content.appendChild(card);
        });
        previewGridEl.appendChild(slackCard);

        saveToStorage();
        showStatus("预览已生成", "success");
      }

      function createPreviewCard(platform, iconClass, renderFn) {
        const card = document.createElement("div");
        card.className = "preview-card";

        const header = document.createElement("div");
        header.className = "preview-header";

        const icon = document.createElement("span");
        icon.className = "preview-platform-icon " + iconClass;

        const iconMap = {
          twitter: "𝕏",
          facebook: "f",
          linkedin: "in",
          slack: "#"
        };
        icon.textContent = iconMap[iconClass] || "?";

        const name = document.createElement("span");
        name.className = "preview-platform";
        name.textContent = platform;

        header.appendChild(icon);
        header.appendChild(name);

        const content = document.createElement("div");
        content.className = "preview-content";

        renderFn(content);

        card.appendChild(header);
        card.appendChild(content);

        return card;
      }

      function extractDomain(url) {
        try {
          if (!url.startsWith("http")) {
            url = "https://" + url;
          }
          const urlObj = new URL(url);
          return urlObj.hostname;
        } catch (e) {
          return url.split("/")[0];
        }
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function saveToStorage() {
        const data = {
          title: ogTitleEl.value,
          description: ogDescriptionEl.value,
          url: ogUrlEl.value,
          image: ogImageEl.value
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            if (data.title) ogTitleEl.value = data.title;
            if (data.description) ogDescriptionEl.value = data.description;
            if (data.url) ogUrlEl.value = data.url;
            if (data.image) ogImageEl.value = data.image;
          }
        } catch (e) {}
      }

      document.getElementById("btnPreview").addEventListener("click", generatePreview);

      document.getElementById("btnClear").addEventListener("click", function () {
        ogTitleEl.value = "";
        ogDescriptionEl.value = "";
        ogUrlEl.value = "";
        ogImageEl.value = "";
        previewGridEl.textContent = "";
        statusEl.textContent = "";
        statusEl.className = "status";
        localStorage.removeItem(LS_KEY);
      });

      ogTitleEl.addEventListener("input", saveToStorage);
      ogDescriptionEl.addEventListener("input", saveToStorage);
      ogUrlEl.addEventListener("input", saveToStorage);
      ogImageEl.addEventListener("input", saveToStorage);

      loadFromStorage();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

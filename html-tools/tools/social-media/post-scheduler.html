        --color-error: var(--accent-red, #f43f5e);

        --color-info: var(--accent-blue, #4cc9f0);

        /* 玻璃拟态 */

        --glass-border: rgba(255, 255, 255, 0.08);

        /* 辉光 */

        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);

        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;

        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;

        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);

        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);

        --pico-code-background-color: var(--bg-input, #0e0e14);

        --pico-primary-inverse: #0a0a0f;

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {

        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */

        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */

        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      .title-section {
        flex: 1;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent-yellow), #ff9500);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #fff;
      }
      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }
      .main-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }
      .options {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .options label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .options select {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 8px 12px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        cursor: pointer;
      }
      .options select:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }
      button {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 500;
        padding: 10px 20px;
        background: var(--color-accent-cyan);
        border: none;
        border-radius: var(--radius-sm);
        color: var(--color-bg-deep);
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }
      .result-section {
        margin-top: 24px;
      }
      .result-title {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }
      .time-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        margin-bottom: 24px;
      }
      .day-column {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .day-header {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: center;
        padding: 8px 0;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .time-slot {
        padding: 8px 4px;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        text-align: center;
        border-radius: var(--radius-sm);
        transition: all 0.2s;
      }
      .time-slot.hot {
        background: var(--accent-pink);
        color: #fff;
      }
      .time-slot.warm {
        background: var(--accent-yellow);
        color: var(--color-bg-deep);
      }
      .time-slot.normal {
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
      }
      .best-times {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .best-time-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
      }
      .best-time-card.primary {
        border-color: var(--color-accent-cyan);
        background: var(--glow-cyan);
      }
      .best-time-label {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .best-time-value {
        font-family: var(--font-mono);
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
      }
      .best-time-card.primary .best-time-value {
        color: var(--color-text-primary);
      }
      .best-time-desc {
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        margin-top: 6px;
      }
      .legend {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-subtle);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: var(--color-text-secondary);
      }
      .legend-color {
        width: 16px;
        height: 16px;
        border-radius: var(--radius-sm);
      }
      .legend-color.hot {
        background: var(--accent-pink);
      }
      .legend-color.warm {
        background: var(--accent-yellow);
      }
      .legend-color.normal {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
      }
      .tips-section {
        margin-top: 24px;
        padding: 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
      }
      .tips-title {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: 12px;
      }
      .tips-list {
        list-style: none;
      }
      .tips-list li {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        padding: 6px 0;
        padding-left: 20px;
        position: relative;
      }
      .tips-list li::before {
        content: "→";
        position: absolute;
        left: 0;
        color: var(--color-accent-cyan);
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .time-grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .options {
          flex-direction: column;
          gap: 12px;
        }
      }
    </style>

      function analyze() {
        const platform = platformEl.value;
        const audience = audienceEl.value;

        const data = scheduleData[platform]?.general || scheduleData.instagram.general;

        renderTimeGrid(data);
        renderBestTimes(data);
        renderTips(data);
        saveToStorage();
      }

      function renderTimeGrid(data) {
        timeGridEl.textContent = "";

        for (let d = 0; d < 7; d++) {
          const col = document.createElement("div");
          col.className = "day-column";

          const header = document.createElement("div");
          header.className = "day-header";
          header.textContent = days[d];
          col.appendChild(header);

          for (let s = 0; s < timeSlots.length; s++) {
            const slot = document.createElement("div");
            slot.className = "time-slot";

            const isHot = data.hot.some(function (h) {
              return h.day === d && h.slot === s;
            });
            const isWarm = data.warm.some(function (w) {
              return w.day === d && w.slot === s;
            });

            if (isHot) {
              slot.classList.add("hot");
            } else if (isWarm) {
              slot.classList.add("warm");
            } else {
              slot.classList.add("normal");
            }

            slot.textContent = timeSlots[s];
            col.appendChild(slot);
          }

          timeGridEl.appendChild(col);
        }
      }

      function renderBestTimes(data) {
        bestTimesEl.textContent = "";

        for (let i = 0; i < data.bestTimes.length; i++) {
          const time = data.bestTimes[i];
          const card = document.createElement("div");
          card.className = "best-time-card" + (i === 0 ? " primary" : "");

          const label = document.createElement("div");
          label.className = "best-time-label";
          label.textContent = i === 0 ? "最佳时段" : "推荐时段 " + i;

          const value = document.createElement("div");
          value.className = "best-time-value";
          value.textContent = time;

          card.appendChild(label);
          card.appendChild(value);
          bestTimesEl.appendChild(card);
        }
      }

      function renderTips(data) {
        tipsListEl.textContent = "";

        for (const tip of data.tips) {
          const li = document.createElement("li");
          li.textContent = tip;
          tipsListEl.appendChild(li);
        }
      }

      function saveToStorage() {
        const settings = {
          platform: platformEl.value,
          audience: audienceEl.value,
          timezone: timezoneEl.value
        };
        localStorage.setItem(LS_KEY, JSON.stringify(settings));
      }

      function loadFromStorage() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const settings = JSON.parse(saved);
            if (settings.platform) platformEl.value = settings.platform;
            if (settings.audience) audienceEl.value = settings.audience;
            if (settings.timezone) timezoneEl.value = settings.timezone;
          }
        } catch (e) {}
      }

      document.getElementById("btnAnalyze").addEventListener("click", analyze);

      platformEl.addEventListener("change", analyze);
      audienceEl.addEventListener("change", analyze);

      loadFromStorage();
      analyze();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();

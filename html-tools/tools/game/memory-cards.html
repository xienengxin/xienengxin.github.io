  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">记忆翻牌</span>
      </nav>

      <h1>🎴 记忆翻牌</h1>
      <p class="subtitle">找出所有配对的卡片</p>

      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="moves">0</div>
          <div class="stat-label">步数</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="pairs">0/0</div>
          <div class="stat-label">配对</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="timer">00:00</div>
          <div class="stat-label">时间</div>
        </div>
      </div>

      <div class="difficulty-selector">
        <button class="diff-btn" onclick="setDifficulty('easy')">简单 3×2</button>
        <button class="diff-btn active" onclick="setDifficulty('medium')">中等 4×4</button>
        <button class="diff-btn" onclick="setDifficulty('hard')">困难 5×4</button>
      </div>

      <div class="game-board medium" id="gameBoard">
        <!-- Cards will be rendered here -->
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="startGame()">新游戏</button>
      </div>

      <div class="win-modal" id="winModal">
        <div class="win-content">
          <div class="win-icon">🎉</div>
          <div class="win-title">恭喜过关!</div>
          <div class="win-stats">
            <div>
              总步数:
              <span id="finalMoves">0</span>
            </div>
            <div>
              用时:
              <span id="finalTime">00:00</span>
            </div>
          </div>
          <button
            class="btn btn-primary"
            onclick="
              closeModal();
              startGame();
            "
          >
            再玩一次
          </button>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const emojis = [
        "🍎",
        "🍊",
        "🍋",
        "🍇",
        "🍓",
        "🍒",
        "🥝",
        "🍑",
        "🥭",
        "🍍",
        "🥥",
        "🍌",
        "🌟",
        "🌙",
        "☀️",
        "⭐",
        "💎",
        "🎈",
        "🎁",
        "🎨"
      ];

      let difficulty = "medium";
      let cards = [];
      let flippedCards = [];
      let matchedPairs = 0;
      let totalPairs = 0;
      let moves = 0;
      let timer = null;
      let seconds = 0;
      let gameStarted = false;
      let locked = false;

      const difficultySettings = {
        easy: { pairs: 3, cols: 3 },
        medium: { pairs: 8, cols: 4 },
        hard: { pairs: 10, cols: 5 }
      };

      function setDifficulty(diff) {
        difficulty = diff;
        document.querySelectorAll(".diff-btn").forEach((btn) => btn.classList.remove("active"));
        document
          .querySelector(`.diff-btn:nth-child(${diff === "easy" ? 1 : diff === "medium" ? 2 : 3})`)
          .classList.add("active");

        const board = document.getElementById("gameBoard");
        board.className = "game-board " + diff;
        startGame();
      }

      function shuffle(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function startGame() {
        // Reset state
        stopTimer();
        flippedCards = [];
        matchedPairs = 0;
        moves = 0;
        seconds = 0;
        gameStarted = false;
        locked = false;

        const settings = difficultySettings[difficulty];
        totalPairs = settings.pairs;

        // Select random emojis
        const selectedEmojis = shuffle(emojis).slice(0, totalPairs);
        const cardValues = shuffle([...selectedEmojis, ...selectedEmojis]);

        cards = cardValues.map((emoji, index) => ({
          id: index,
          emoji,
          flipped: false,
          matched: false
        }));

        render();
        updateStats();
      }

      function render() {
        const board = document.getElementById("gameBoard");
        board.innerHTML = cards
          .map(
            (card) => `
        <div class="card ${card.flipped ? "flipped" : ""} ${card.matched ? "matched" : ""}"
          data-id="${card.id}" onclick="flipCard(${card.id})">
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back">${card.emoji}</div>
          </div>
        </div>
      `
          )
          .join("");
      }

      function flipCard(id) {
        if (locked) return;

        const card = cards.find((c) => c.id === id);
        if (!card || card.flipped || card.matched) return;

        // Start timer on first flip
        if (!gameStarted) {
          gameStarted = true;
          startTimer();
        }

        card.flipped = true;
        flippedCards.push(card);
        updateCardDOM(card);

        if (flippedCards.length === 2) {
          moves++;
          updateStats();
          checkMatch();
        }
      }

      function checkMatch() {
        locked = true;
        const [card1, card2] = flippedCards;

        if (card1.emoji === card2.emoji) {
          // Match found
          card1.matched = true;
          card2.matched = true;
          matchedPairs++;
          flippedCards = [];
          locked = false;
          updateStats();

          updateCardDOM(card1);
          updateCardDOM(card2);

          if (matchedPairs === totalPairs) {
            stopTimer();
            setTimeout(showWin, 500);
          }
        } else {
          // No match
          setTimeout(() => {
            card1.flipped = false;
            card2.flipped = false;
            flippedCards = [];
            locked = false;
            updateCardDOM(card1);
            updateCardDOM(card2);
          }, 1000);
        }
      }

      function updateCardDOM(card) {
        const el = document.querySelector(`.card[data-id="${card.id}"]`);
        if (el) {
          el.classList.toggle("flipped", card.flipped);
          el.classList.toggle("matched", card.matched);
        }
      }

      function updateStats() {
        document.getElementById("moves").textContent = moves;
        document.getElementById("pairs").textContent = `${matchedPairs}/${totalPairs}`;
      }

      function startTimer() {
        timer = setInterval(() => {
          seconds++;
          document.getElementById("timer").textContent = formatTime(seconds);
        }, 1000);
      }

      function stopTimer() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function formatTime(s) {
        const mins = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const secs = (s % 60).toString().padStart(2, "0");
        return `${mins}:${secs}`;
      }

      function showWin() {
        document.getElementById("finalMoves").textContent = moves;
        document.getElementById("finalTime").textContent = formatTime(seconds);
        document.getElementById("winModal").classList.add("show");
      }

      function closeModal() {
        document.getElementById("winModal").classList.remove("show");
      }

      // Initialize
      startGame();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

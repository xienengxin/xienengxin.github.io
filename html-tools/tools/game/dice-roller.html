        }

        }
      }

      <div class="controls">
        <input type="number" id="diceCount" value="2" min="1" max="20" placeholder="骰子数量" />
        <button class="roll-btn" onclick="rollDice()">🎲 投骰子</button>
      </div>

      <div class="results" id="results">
        <div class="empty-state">点击"投骰子"开始</div>
      </div>

      <div class="history">
        <div class="history-title">
          <span>📜 投骰记录</span>
          <button class="clear-btn" onclick="clearHistory()">清空</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-state">暂无记录</div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_dice_history_v1";
      let currentDiceType = 6;
      let history = [];

      function loadHistory() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          history = saved ? JSON.parse(saved) : [];
        } catch (e) {
          history = [];
        }
        renderHistory();
      }

      function saveHistory() {
        // Keep only last 20 rolls
        if (history.length > 20) {
          history = history.slice(-20);
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      }

      function selectDice(sides) {
        currentDiceType = sides;
        document.querySelectorAll(".dice-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.closest(".dice-btn").classList.add("active");
      }

      function rollDice() {
        const count = parseInt(document.getElementById("diceCount").value) || 1;
        const validCount = Math.max(1, Math.min(20, count));

        const results = [];
        for (let i = 0; i < validCount; i++) {
          results.push(Math.floor(Math.random() * currentDiceType) + 1);
        }

        const total = results.reduce((sum, val) => sum + val, 0);

        displayResults(results, total);
        addToHistory(validCount, currentDiceType, results, total);

        // Play sound effect
        playSound();
      }

      function displayResults(results, total) {
        const container = document.getElementById("results");

        const diceHTML = results.map((result) => `<div class="die">${result}</div>`).join("");

        container.innerHTML = `
        <div class="dice-display">${diceHTML}</div>
        <div class="total">${total}</div>
        <div class="total-label">总点数</div>
      `;
      }

      function addToHistory(count, sides, results, total) {
        const formula = `${count}D${sides}`;
        const resultStr = results.join(" + ");

        history.unshift({
          timestamp: new Date().toLocaleTimeString("zh-CN"),
          formula,
          resultStr,
          total
        });

        saveHistory();
        renderHistory();
      }

      function renderHistory() {
        const container = document.getElementById("historyList");

        if (history.length === 0) {
          container.innerHTML = '<div class="empty-state">暂无记录</div>';
          return;
        }

        container.innerHTML = history
          .map(
            (item) => `
        <div class="history-item">
          <div class="history-details">
            <div class="history-formula">${item.timestamp} - ${item.formula}: ${item.resultStr}</div>
          </div>
          <div class="history-result">${item.total}</div>
        </div>
      `
          )
          .join("");
      }

      function clearHistory() {
        if (!confirm("确定要清空所有记录吗？")) return;
        history = [];
        saveHistory();
        renderHistory();
      }

      function playSound() {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 400;
        oscillator.type = "sine";

        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
      }

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          rollDice();
        }
      });

      // Initialize
      loadHistory();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

        background-size: 50px 50px;

      .board-container {
        display: flex;
        justify-content: center;
        margin-bottom: 1rem;
      }
      .board {
        background: #dcb35c;
        border-radius: 4px;
        padding: 10px;
        position: relative;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(15, 24px);
        grid-template-rows: repeat(15, 24px);
        gap: 0;
      }
      .cell {
        width: 24px;
        height: 24px;
        position: relative;
        cursor: pointer;
      }
      .cell::before,
      .cell::after {
        content: "";
        position: absolute;
        background: #8b6914;
      }
      .cell::before {
        width: 1px;
        height: 100%;
        left: 50%;
        top: 0;
      }
      .cell::after {
        height: 1px;
        width: 100%;
        top: 50%;
        left: 0;
      }
      .cell:first-child::after,
      .cell:nth-child(15n + 1)::after {
        width: 50%;
        left: 50%;
      }
      .cell:nth-child(-n + 15)::before {
        height: 50%;
        top: 50%;
      }
      .cell:nth-child(15n)::after {
        width: 50%;
      }
      .cell:nth-last-child(-n + 15)::before {
        height: 50%;
      }
      .stone {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;

      .stone.black {

      }
      .stone.white {

      }
      .stone.last::after {
        content: "";
        position: absolute;
        width: 6px;
        height: 6px;
        background: red;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .stone.win {
        animation: pulse 0.5s ease-in-out infinite alternate;

          transform: translate(-50%, -50%) scale(1);

  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">五子棋</span>
      </nav>

      <h1>五子棋</h1>
      <p class="subtitle">先连成五子者获胜</p>

      <div class="game-card">
        <div class="status" id="status">
          <span class="black">●</span>
          黑棋先行
        </div>

        <div class="board-container">
          <div class="board">
            <div class="grid" id="board"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" onclick="resetGame()">新游戏</button>
          <button class="btn btn-secondary" onclick="undoMove()">悔棋</button>
        </div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const BOARD_SIZE = 15;
      let board = [];
      let currentPlayer = "black";
      let gameOver = false;
      let history = [];
      let lastMove = null;

      // Star points (天元和星位)
      const starPoints = [
        [3, 3],
        [3, 7],
        [3, 11],
        [7, 3],
        [7, 7],
        [7, 11],
        [11, 3],
        [11, 7],
        [11, 11]
      ];

      function initBoard() {
        const boardEl = document.getElementById("board");
        boardEl.innerHTML = "";
        board = [];

        for (let i = 0; i < BOARD_SIZE; i++) {
          board[i] = [];
          for (let j = 0; j < BOARD_SIZE; j++) {
            board[i][j] = null;
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = i;
            cell.dataset.col = j;
            cell.onclick = () => makeMove(i, j);
            boardEl.appendChild(cell);

            // Add star points
            if (starPoints.some(([r, c]) => r === i && c === j)) {
              const star = document.createElement("div");
              star.className = "star";
              star.style.top = "50%";
              star.style.left = "50%";
              cell.appendChild(star);
            }
          }
        }
      }

      function makeMove(row, col) {
        if (gameOver || board[row][col]) return;

        board[row][col] = currentPlayer;
        history.push({ row, col, player: currentPlayer });

        // Remove last marker
        if (lastMove) {
          const lastCell = document.querySelector(
            `[data-row="${lastMove.row}"][data-col="${lastMove.col}"] .stone`
          );
          if (lastCell) lastCell.classList.remove("last");
        }

        // Add stone
        const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
        const stone = document.createElement("div");
        stone.className = `stone ${currentPlayer} last`;
        cell.appendChild(stone);

        lastMove = { row, col };

        // Check win
        const winCells = checkWin(row, col);
        if (winCells) {
          gameOver = true;
          winCells.forEach(([r, c]) => {
            const winStone = document.querySelector(`[data-row="${r}"][data-col="${c}"] .stone`);
            if (winStone) winStone.classList.add("win");
          });
          updateStatus(
            `<span class="${currentPlayer}">${currentPlayer === "black" ? "●" : "○"}</span> ${currentPlayer === "black" ? "黑棋" : "白棋"}获胜!`
          );
          return;
        }

        // Check draw
        if (history.length === BOARD_SIZE * BOARD_SIZE) {
          gameOver = true;
          updateStatus("平局!");
          return;
        }

        // Switch player
        currentPlayer = currentPlayer === "black" ? "white" : "black";
        updateStatus(
          `<span class="${currentPlayer}">${currentPlayer === "black" ? "●" : "○"}</span> ${currentPlayer === "black" ? "黑棋" : "白棋"}回合`
        );
      }

      function checkWin(row, col) {
        const player = board[row][col];
        const directions = [
          [
            [0, 1],
            [0, -1]
          ], // horizontal
          [
            [1, 0],
            [-1, 0]
          ], // vertical
          [
            [1, 1],
            [-1, -1]
          ], // diagonal
          [
            [1, -1],
            [-1, 1]
          ] // anti-diagonal
        ];

        for (let [dir1, dir2] of directions) {
          let cells = [[row, col]];

          for (let [dr, dc] of [dir1, dir2]) {
            let r = row + dr,
              c = col + dc;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
              cells.push([r, c]);
              r += dr;
              c += dc;
            }
          }

          if (cells.length >= 5) return cells;
        }
        return null;
      }

      function undoMove() {
        if (history.length === 0 || gameOver) return;

        const last = history.pop();
        board[last.row][last.col] = null;

        const cell = document.querySelector(`[data-row="${last.row}"][data-col="${last.col}"]`);
        const stone = cell.querySelector(".stone");
        if (stone) stone.remove();

        currentPlayer = last.player;

        // Update last marker
        if (history.length > 0) {
          const prev = history[history.length - 1];
          const prevStone = document.querySelector(
            `[data-row="${prev.row}"][data-col="${prev.col}"] .stone`
          );
          if (prevStone) prevStone.classList.add("last");
          lastMove = prev;
        } else {
          lastMove = null;
        }

        updateStatus(
          `<span class="${currentPlayer}">${currentPlayer === "black" ? "●" : "○"}</span> ${currentPlayer === "black" ? "黑棋" : "白棋"}回合`
        );
      }

      function resetGame() {
        gameOver = false;
        currentPlayer = "black";
        history = [];
        lastMove = null;
        initBoard();
        updateStatus('<span class="black">●</span> 黑棋先行');
      }

      function updateStatus(html) {
        document.getElementById("status").innerHTML = html;
      }

      // Initialize
      initBoard();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

  <body>
    <div class="header">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>⭕ 井字棋</h1>
      <p>经典三子棋游戏</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="container">
      <div class="score-board">
        <div class="score-item">
          <div class="symbol x">✕</div>
          <div class="value" id="scoreX">0</div>
          <div class="label">玩家 X</div>
        </div>
        <div class="score-item">
          <div class="symbol" style="color: var(--color-text-secondary)">—</div>
          <div class="value" id="scoreDraw">0</div>
          <div class="label">平局</div>
        </div>
        <div class="score-item">
          <div class="symbol o">○</div>
          <div class="value" id="scoreO">0</div>
          <div class="label">玩家 O</div>
        </div>
      </div>

      <div class="mode-select">
        <label>
          <input type="radio" name="mode" value="pvp" checked />
          <span>👥 双人对战</span>
        </label>
        <label>
          <input type="radio" name="mode" value="pve" />
          <span>🤖 人机对战</span>
        </label>
      </div>

      <div class="status" id="status">轮到 ✕ 下棋</div>

      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="controls">
        <button class="btn" onclick="resetGame()">🔄 新游戏</button>
        <button class="btn secondary" onclick="resetScore()">重置比分</button>
      </div>
    </div>

    <script>
      const board = ["", "", "", "", "", "", "", "", ""];
      let currentPlayer = "X";
      let gameActive = true;
      let scoreX = 0;
      let scoreO = 0;
      let scoreDraw = 0;

      const winPatterns = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6]
      ];

      const cells = document.querySelectorAll(".cell");
      const statusEl = document.getElementById("status");

      cells.forEach((cell) => {
        cell.addEventListener("click", () => handleCellClick(cell));
      });

      document.querySelectorAll('input[name="mode"]').forEach((radio) => {
        radio.addEventListener("change", resetGame);
      });

      function handleCellClick(cell) {
        const index = parseInt(cell.dataset.index);

        if (board[index] !== "" || !gameActive) return;

        makeMove(index, currentPlayer);

        if (gameActive && getMode() === "pve" && currentPlayer === "O") {
          setTimeout(aiMove, 300);
        }
      }

      function makeMove(index, player) {
        board[index] = player;
        const cell = cells[index];
        cell.textContent = player === "X" ? "✕" : "○";
        cell.classList.add(player.toLowerCase(), "taken");

        if (checkWin(player)) {
          gameActive = false;
          highlightWin(player);
          statusEl.textContent = `${player === "X" ? "✕" : "○"} 获胜！`;
          if (player === "X") scoreX++;
          else scoreO++;
          updateScore();
          return;
        }

        if (board.every((cell) => cell !== "")) {
          gameActive = false;
          statusEl.textContent = "平局！";
          scoreDraw++;
          updateScore();
          return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusEl.textContent = `轮到 ${currentPlayer === "X" ? "✕" : "○"} 下棋`;
      }

      function checkWin(player) {
        return winPatterns.some((pattern) => {
          return pattern.every((index) => board[index] === player);
        });
      }

      function highlightWin(player) {
        winPatterns.forEach((pattern) => {
          if (pattern.every((index) => board[index] === player)) {
            pattern.forEach((index) => {
              cells[index].classList.add("win");
            });
          }
        });
      }

      function getMode() {
        return document.querySelector('input[name="mode"]:checked').value;
      }

      function aiMove() {
        if (!gameActive) return;

        // 简单 AI：优先中心、角落、边
        let move = findWinningMove("O") || findWinningMove("X") || findBestMove();

        if (move !== null) {
          makeMove(move, "O");
        }
      }

      function findWinningMove(player) {
        for (let pattern of winPatterns) {
          const [a, b, c] = pattern;
          const cells = [board[a], board[b], board[c]];
          const playerCount = cells.filter((c) => c === player).length;
          const emptyCount = cells.filter((c) => c === "").length;

          if (playerCount === 2 && emptyCount === 1) {
            const emptyIndex = pattern.find((i) => board[i] === "");
            return emptyIndex;
          }
        }
        return null;
      }

      function findBestMove() {
        const priorities = [4, 0, 2, 6, 8, 1, 3, 5, 7];
        for (let index of priorities) {
          if (board[index] === "") return index;
        }
        return null;
      }

      function resetGame() {
        board.fill("");
        currentPlayer = "X";
        gameActive = true;
        statusEl.textContent = "轮到 ✕ 下棋";

        cells.forEach((cell) => {
          cell.textContent = "";
          cell.className = "cell";
        });
      }

      function resetScore() {
        scoreX = 0;
        scoreO = 0;
        scoreDraw = 0;
        updateScore();
        resetGame();
      }

      function updateScore() {
        document.getElementById("scoreX").textContent = scoreX;
        document.getElementById("scoreO").textContent = scoreO;
        document.getElementById("scoreDraw").textContent = scoreDraw;
      }

      function toggleTheme() {
        const current = document.body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
  </body>
</html>

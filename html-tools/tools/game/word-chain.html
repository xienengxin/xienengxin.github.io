  <body>
    <div class="header">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>成语接龙</h1>
      <p>用最后一个字接新成语</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="container">
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">得分</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="combo">0</div>
          <div class="stat-label">连击</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="count">0</div>
          <div class="stat-label">接龙数</div>
        </div>
      </div>

      <div class="current-word">
        <div class="label">当前成语</div>
        <div class="word" id="currentWord">一心一意</div>
        <div class="hint">
          请输入以「
          <span id="nextChar">意</span>
          」开头的成语
        </div>
      </div>

      <div class="message" id="message"></div>

      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            class="input-field"
            id="inputField"
            placeholder="输入成语..."
            maxlength="8"
          />
          <button class="btn" onclick="submitWord()">提交</button>
        </div>
      </div>

      <div class="history">
        <h3>接龙历史</h3>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="controls">
        <button class="btn secondary" onclick="getHint()">提示</button>
        <button class="btn secondary" onclick="resetGame()">重新开始</button>
      </div>
    </div>

      let currentWord = "";
      let nextChar = "";
      let history = [];
      let score = 0;
      let combo = 0;

      function initGame() {
        const startWords = ["一心一意", "一帆风顺", "心想事成", "风调雨顺"];
        currentWord = startWords[Math.floor(Math.random() * startWords.length)];
        nextChar = currentWord[currentWord.length - 1];
        history = [currentWord];
        score = 0;
        combo = 0;
        updateDisplay();
      }

      function updateDisplay() {
        document.getElementById("currentWord").textContent = currentWord;
        document.getElementById("nextChar").textContent = nextChar;
        document.getElementById("score").textContent = score;
        document.getElementById("combo").textContent = combo;
        document.getElementById("count").textContent = history.length;

        const historyList = document.getElementById("historyList");
        historyList.textContent = "";
        history.forEach(function (word) {
          const span = document.createElement("span");
          span.className = "history-item";
          span.textContent = word;
          historyList.appendChild(span);
        });
      }

      function showMessage(text, type) {
        const msg = document.getElementById("message");
        msg.textContent = text;
        msg.className = "message show " + type;
        setTimeout(function () {
          msg.classList.remove("show");
        }, 2000);
      }

      function validateIdiom(word) {
        // 检查长度
        if (word.length !== 4) {
          return { valid: false, message: "成语应为四个字" };
        }

        // 检查首字
        if (word[0] !== nextChar) {
          return { valid: false, message: "成语首字应为「" + nextChar + "」" };
        }

        // 检查是否已用过
        if (history.includes(word)) {
          return { valid: false, message: "这个成语已经用过了" };
        }

        // 检查是否在库中（或接受用户输入）
        const charIdioms = idioms[nextChar] || [];
        if (!charIdioms.includes(word)) {
          // 宽松模式：允许用户输入的成语
          return { valid: true, message: "接龙成功！" };
        }

        return { valid: true, message: "接龙成功！" };
      }

      function submitWord() {
        const input = document.getElementById("inputField");
        const word = input.value.trim();

        if (!word) {
          showMessage("请输入成语", "error");
          return;
        }

        const result = validateIdiom(word);

        if (result.valid) {
          currentWord = word;
          nextChar = word[word.length - 1];
          history.push(word);
          combo++;
          score += 10 * combo;
          showMessage(result.message + " +" + 10 * combo + "分", "success");
          input.value = "";
          updateDisplay();
        } else {
          combo = 0;
          showMessage(result.message, "error");
          updateDisplay();
        }
      }

      function getHint() {
        const hints = idioms[nextChar];
        if (hints && hints.length > 0) {
          const availableHints = hints.filter(function (h) {
            return !history.includes(h);
          });
          if (availableHints.length > 0) {
            const hint = availableHints[Math.floor(Math.random() * availableHints.length)];
            showMessage("提示: " + hint[0] + hint[1] + "○○", "success");
            score = Math.max(0, score - 5);
            updateDisplay();
          } else {
            showMessage("没有更多提示了", "error");
          }
        } else {
          showMessage("暂无提示", "error");
        }
      }

      function resetGame() {
        initGame();
        document.getElementById("inputField").value = "";
        showMessage("游戏已重置", "success");
      }

      document.getElementById("inputField").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          submitWord();
        }
      });

      function toggleTheme() {
        const current = document.body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      initGame();

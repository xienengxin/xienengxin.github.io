  <body>
    <div class="header">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>🧱 打砖块</h1>
      <p>经典打砖块游戏</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="container">
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">分数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="level">1</div>
          <div class="stat-label">关卡</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="lives">3</div>
          <div class="stat-label">生命</div>
        </div>
      </div>

      <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">打砖块</h2>
          <p id="overlayText">点击开始游戏</p>
          <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
      </div>

      <div class="controls-hint">
        <kbd>←</kbd>
        <kbd>→</kbd>
        或鼠标/触摸移动挡板
      </div>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const overlay = document.getElementById("overlay");

      // 设置画布大小
      function resizeCanvas() {
        const container = canvas.parentElement;
        const width = container.clientWidth - 20;
        canvas.width = width;
        canvas.height = width * 1.2;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // 游戏变量
      let score = 0;
      let lives = 3;
      let level = 1;
      let gameRunning = false;

      // 挡板
      const paddle = {
        width: 80,
        height: 12,
        x: 0,
        speed: 8
      };
      paddle.x = (canvas.width - paddle.width) / 2;

      // 球
      const ball = {
        radius: 8,
        x: canvas.width / 2,
        y: canvas.height - 50,
        dx: 4,
        dy: -4
      };

      // 砖块
      const brickConfig = {
        rows: 5,
        cols: 8,
        width: 0,
        height: 20,
        padding: 5,
        offsetTop: 40,
        offsetLeft: 10
      };

      let bricks = [];

      const colors = ["#f72585", "#7209b7", "#3a0ca3", "#4361ee", "#4cc9f0", "#f59e0b"];

      function initBricks() {
        bricks = [];
        brickConfig.width =
          (canvas.width -
            brickConfig.offsetLeft * 2 -
            brickConfig.padding * (brickConfig.cols - 1)) /
          brickConfig.cols;

        for (let row = 0; row < brickConfig.rows; row++) {
          bricks[row] = [];
          for (let col = 0; col < brickConfig.cols; col++) {
            bricks[row][col] = {
              x: brickConfig.offsetLeft + col * (brickConfig.width + brickConfig.padding),
              y: brickConfig.offsetTop + row * (brickConfig.height + brickConfig.padding),
              status: 1,
              color: colors[row % colors.length]
            };
          }
        }
      }

      function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height - 50;
        ball.dx = (Math.random() > 0.5 ? 1 : -1) * (3 + level);
        ball.dy = -(3 + level);
        paddle.x = (canvas.width - paddle.width) / 2;
      }

      function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.closePath();
      }

      function drawPaddle() {
        ctx.beginPath();
        ctx.roundRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height, 6);
        ctx.fillStyle = "#00f5d4";
        ctx.fill();
        ctx.closePath();
      }

      function drawBricks() {
        for (let row = 0; row < brickConfig.rows; row++) {
          for (let col = 0; col < brickConfig.cols; col++) {
            const brick = bricks[row][col];
            if (brick.status === 1) {
              ctx.beginPath();
              ctx.roundRect(brick.x, brick.y, brickConfig.width, brickConfig.height, 4);
              ctx.fillStyle = brick.color;
              ctx.fill();
              ctx.closePath();
            }
          }
        }
      }

      function collisionDetection() {
        for (let row = 0; row < brickConfig.rows; row++) {
          for (let col = 0; col < brickConfig.cols; col++) {
            const brick = bricks[row][col];
            if (brick.status === 1) {
              if (
                ball.x > brick.x &&
                ball.x < brick.x + brickConfig.width &&
                ball.y > brick.y &&
                ball.y < brick.y + brickConfig.height
              ) {
                ball.dy = -ball.dy;
                brick.status = 0;
                score += 10 * level;
                updateStats();

                // 检查是否过关
                if (bricks.flat().every((b) => b.status === 0)) {
                  level++;
                  initBricks();
                  resetBall();
                  updateStats();
                }
              }
            }
          }
        }
      }

      function draw() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBricks();
        drawBall();
        drawPaddle();
        collisionDetection();

        // 墙壁碰撞
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
          ball.dx = -ball.dx;
        }
        if (ball.y + ball.dy < ball.radius) {
          ball.dy = -ball.dy;
        }

        // 挡板碰撞
        if (ball.y + ball.dy > canvas.height - paddle.height - 10 - ball.radius) {
          if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
            // 根据击中位置改变反弹角度
            const hitPoint = (ball.x - paddle.x) / paddle.width;
            ball.dx = 8 * (hitPoint - 0.5);
            ball.dy = -Math.abs(ball.dy);
          } else if (ball.y + ball.dy > canvas.height - ball.radius) {
            lives--;
            updateStats();
            if (lives <= 0) {
              gameOver();
              return;
            }
            resetBall();
          }
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        requestAnimationFrame(draw);
      }

      function updateStats() {
        document.getElementById("score").textContent = score;
        document.getElementById("level").textContent = level;
        document.getElementById("lives").textContent = lives;
      }

      function startGame() {
        score = 0;
        lives = 3;
        level = 1;
        gameRunning = true;
        overlay.classList.add("hidden");
        initBricks();
        resetBall();
        updateStats();
        draw();
      }

      function gameOver() {
        gameRunning = false;
        document.getElementById("overlayTitle").textContent = "游戏结束";
        document.getElementById("overlayText").textContent = `最终得分: ${score}`;
        overlay.classList.remove("hidden");
      }

      // 键盘控制
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && paddle.x > 0) {
          paddle.x -= paddle.speed * 3;
        } else if (e.key === "ArrowRight" && paddle.x < canvas.width - paddle.width) {
          paddle.x += paddle.speed * 3;
        }
      });

      // 鼠标控制
      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const relativeX = (e.clientX - rect.left) * scaleX;

        if (relativeX > paddle.width / 2 && relativeX < canvas.width - paddle.width / 2) {
          paddle.x = relativeX - paddle.width / 2;
        }
      });

      // 触摸控制
      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const relativeX = (e.touches[0].clientX - rect.left) * scaleX;

        if (relativeX > paddle.width / 2 && relativeX < canvas.width - paddle.width / 2) {
          paddle.x = relativeX - paddle.width / 2;
        }
      });

      function toggleTheme() {
        const current = document.body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      initBricks();
    </script>
  </body>
</html>

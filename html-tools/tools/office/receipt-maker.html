    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-bg-deep);
        box-shadow: 0 4px 12px rgba(0, 212, 170, 0.25);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        background: #00b894;
        box-shadow: var(--shadow-glow);
      }
      .panels {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: var(--space-5);
        flex: 1;
        min-height: 400px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .form-section {
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
      }
      .form-section-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: var(--space-3);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
        margin-bottom: var(--space-3);
      }
      .form-row.single {
        grid-template-columns: 1fr;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }
      .form-group label {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {

    <script>
      const LS_KEY = "receipt_maker_data_v1";
      let items = [];

      // DOM elements
      const storeNameEl = document.getElementById("storeName");
      const storeAddressEl = document.getElementById("storeAddress");
      const receiptNoEl = document.getElementById("receiptNo");
      const receiptDateEl = document.getElementById("receiptDate");
      const receiptTimeEl = document.getElementById("receiptTime");
      const cashierEl = document.getElementById("cashier");
      const enableTaxEl = document.getElementById("enableTax");
      const taxRateEl = document.getElementById("taxRate");
      const paymentMethodEl = document.getElementById("paymentMethod");
      const amountPaidEl = document.getElementById("amountPaid");
      const itemsListEl = document.getElementById("itemsList");
      const statusEl = document.getElementById("status");

      // Generate receipt number
      function generateReceiptNo() {
        const now = new Date();
        const dateStr =
          now.getFullYear().toString().slice(-2) +
          String(now.getMonth() + 1).padStart(2, "0") +
          String(now.getDate()).padStart(2, "0");
        const rand = Math.floor(Math.random() * 10000)
          .toString()
          .padStart(4, "0");
        return "RCP" + dateStr + rand;
      }

      // Initialize date and time
      function initDateTime() {
        const now = new Date();
        receiptDateEl.value = now.toISOString().split("T")[0];
        receiptTimeEl.value = now.toTimeString().slice(0, 5);
      }

      // Add item
      function addItem(name, qty, price) {
        name = name || "";
        qty = qty || 1;
        price = price || 0;
        const id = Date.now() + Math.random();
        items.push({ id: id, name: name, qty: qty, price: price });
        renderItems();
        saveToStorage();
      }

      // Remove item
      function removeItem(id) {
        items = items.filter(function (item) {
          return item.id !== id;
        });
        renderItems();
        updatePreview();
        saveToStorage();
      }

      // Update item
      function updateItem(id, field, value) {
        var item = items.find(function (i) {
          return i.id === id;
        });
        if (item) {
          if (field === "qty" || field === "price") {
            item[field] = parseFloat(value) || 0;
          } else {
            item[field] = value;
          }
          renderItems();
          updatePreview();
          saveToStorage();
        }
      }

      // Create item row element
      function createItemRow(item) {
        var total = (item.qty * item.price).toFixed(2);
        var row = document.createElement("div");
        row.className = "item-row";

        var nameInput = document.createElement("input");
        nameInput.type = "text";
        nameInput.value = item.name;
        nameInput.placeholder = "商品名称";
        nameInput.addEventListener("input", function () {
          updateItem(item.id, "name", this.value);
        });

        var qtyInput = document.createElement("input");
        qtyInput.type = "number";
        qtyInput.value = item.qty;
        qtyInput.min = "1";
        qtyInput.step = "1";
        qtyInput.addEventListener("input", function () {
          updateItem(item.id, "qty", this.value);
        });

        var priceInput = document.createElement("input");
        priceInput.type = "number";
        priceInput.value = item.price;
        priceInput.min = "0";
        priceInput.step = "0.01";
        priceInput.addEventListener("input", function () {
          updateItem(item.id, "price", this.value);
        });

        var totalSpan = document.createElement("span");
        totalSpan.className = "item-total";
        totalSpan.textContent = "¥" + total;

        var removeBtn = document.createElement("button");
        removeBtn.className = "btn btn-remove";
        removeBtn.textContent = "×";
        removeBtn.title = "删除";
        removeBtn.addEventListener("click", function () {
          removeItem(item.id);
        });

        row.appendChild(nameInput);
        row.appendChild(qtyInput);
        row.appendChild(priceInput);
        row.appendChild(totalSpan);
        row.appendChild(removeBtn);

        return row;
      }

      // Render items list
      function renderItems() {
        itemsListEl.textContent = "";
        items.forEach(function (item) {
          itemsListEl.appendChild(createItemRow(item));
        });
      }

      // Calculate totals
      function calculateTotals() {
        var subtotal = items.reduce(function (sum, item) {
          return sum + item.qty * item.price;
        }, 0);
        var taxEnabled = enableTaxEl.checked;
        var taxRate = parseFloat(taxRateEl.value) || 0;
        var tax = taxEnabled ? subtotal * (taxRate / 100) : 0;
        var total = subtotal + tax;
        return {
          subtotal: subtotal,
          tax: tax,
          total: total,
          taxRate: taxRate,
          taxEnabled: taxEnabled
        };
      }

      // Create preview item line
      function createPreviewItemLine(item) {
        var total = (item.qty * item.price).toFixed(2);
        var line = document.createElement("div");
        line.className = "item-line";

        var nameSpan = document.createElement("span");
        nameSpan.className = "item-name";
        nameSpan.textContent = item.name || "-";

        var qtySpan = document.createElement("span");
        qtySpan.className = "item-qty";
        qtySpan.textContent = "x" + item.qty;

        var priceSpan = document.createElement("span");
        priceSpan.className = "item-price";
        priceSpan.textContent = "¥" + total;

        line.appendChild(nameSpan);
        line.appendChild(qtySpan);
        line.appendChild(priceSpan);

        return line;
      }

      // Update preview
      function updatePreview() {
        // Store info
        document.getElementById("previewStoreName").textContent = storeNameEl.value || "商家名称";
        document.getElementById("previewStoreAddress").textContent =
          storeAddressEl.value || "商家地址";

        // Receipt info
        document.getElementById("previewReceiptNo").textContent = receiptNoEl.value || "-";
        document.getElementById("previewDate").textContent = receiptDateEl.value || "-";
        document.getElementById("previewTime").textContent = receiptTimeEl.value || "-";

        var cashierRow = document.getElementById("previewCashierRow");
        if (cashierEl.value) {
          cashierRow.style.display = "flex";
          document.getElementById("previewCashier").textContent = cashierEl.value;
        } else {
          cashierRow.style.display = "none";
        }

        // Items
        var previewItems = document.getElementById("previewItems");
        previewItems.textContent = "";
        items.forEach(function (item) {
          if (item.name || item.price > 0) {
            previewItems.appendChild(createPreviewItemLine(item));
          }
        });

        // Totals
        var totals = calculateTotals();
        document.getElementById("previewSubtotal").textContent = "¥" + totals.subtotal.toFixed(2);

        var taxRow = document.getElementById("previewTaxRow");
        if (totals.taxEnabled) {
          taxRow.style.display = "flex";
          document.getElementById("previewTaxRate").textContent = totals.taxRate;
          document.getElementById("previewTax").textContent = "¥" + totals.tax.toFixed(2);
        } else {
          taxRow.style.display = "none";
        }

        document.getElementById("previewTotal").textContent = "¥" + totals.total.toFixed(2);

        // Payment
        var paymentLabels = {
          cash: "现金",
          card: "银行卡",
          wechat: "微信支付",
          alipay: "支付宝",
          other: "其他"
        };
        document.getElementById("previewPayment").textContent =
          paymentLabels[paymentMethodEl.value] || "现金";

        // Amount paid and change
        var paidRow = document.getElementById("previewPaidRow");
        var changeRow = document.getElementById("previewChangeRow");
        var amountPaid = parseFloat(amountPaidEl.value) || 0;

        if (amountPaid > 0) {
          paidRow.style.display = "flex";
          document.getElementById("previewPaid").textContent = "¥" + amountPaid.toFixed(2);

          if (amountPaid >= totals.total) {
            changeRow.style.display = "flex";
            document.getElementById("previewChange").textContent =
              "¥" + (amountPaid - totals.total).toFixed(2);
          } else {
            changeRow.style.display = "none";
          }
        } else {
          paidRow.style.display = "none";
          changeRow.style.display = "none";
        }
      }

      // Save to localStorage
      function saveToStorage() {
        var data = {
          storeName: storeNameEl.value,
          storeAddress: storeAddressEl.value,
          receiptNo: receiptNoEl.value,
          receiptDate: receiptDateEl.value,
          receiptTime: receiptTimeEl.value,
          cashier: cashierEl.value,
          enableTax: enableTaxEl.checked,
          taxRate: taxRateEl.value,
          paymentMethod: paymentMethodEl.value,
          amountPaid: amountPaidEl.value,
          items: items
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      // Load from localStorage
      function loadFromStorage() {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          try {
            var data = JSON.parse(saved);
            storeNameEl.value = data.storeName || "";
            storeAddressEl.value = data.storeAddress || "";
            receiptNoEl.value = data.receiptNo || generateReceiptNo();
            receiptDateEl.value = data.receiptDate || "";
            receiptTimeEl.value = data.receiptTime || "";
            cashierEl.value = data.cashier || "";
            enableTaxEl.checked = data.enableTax || false;
            taxRateEl.value = data.taxRate || "6";
            taxRateEl.disabled = !enableTaxEl.checked;
            paymentMethodEl.value = data.paymentMethod || "cash";
            amountPaidEl.value = data.amountPaid || "";
            items = data.items || [];
            renderItems();
            updatePreview();
            return true;
          } catch (e) {
            return false;
          }
        }
        return false;
      }

      // Clear all
      function clearAll() {
        storeNameEl.value = "";
        storeAddressEl.value = "";
        receiptNoEl.value = generateReceiptNo();
        initDateTime();
        cashierEl.value = "";
        enableTaxEl.checked = false;
        taxRateEl.value = "6";
        taxRateEl.disabled = true;
        paymentMethodEl.value = "cash";
        amountPaidEl.value = "";
        items = [];
        renderItems();
        updatePreview();
        localStorage.removeItem(LS_KEY);
        showStatus("已清空", "success");
      }

      // Print
      function printReceipt() {
        window.print();
      }

      // Show status
      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
        setTimeout(function () {
          statusEl.textContent = "";
          statusEl.className = "status";
        }, 2000);
      }

      // Theme toggle
      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme")) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        }
      });

      // Event listeners
      document.getElementById("btnPrint").addEventListener("click", printReceipt);
      document.getElementById("btnClear").addEventListener("click", clearAll);
      document.getElementById("btnAddItem").addEventListener("click", function () {
        addItem();
      });

      enableTaxEl.addEventListener("change", function () {
        taxRateEl.disabled = !this.checked;
        updatePreview();
        saveToStorage();
      });

      // Input listeners for auto-update
      [
        storeNameEl,
        storeAddressEl,
        receiptDateEl,
        receiptTimeEl,
        cashierEl,
        taxRateEl,
        paymentMethodEl,
        amountPaidEl
      ].forEach(function (el) {
        el.addEventListener("input", function () {
          updatePreview();
          saveToStorage();
        });
      });

      // Initialize
      initTheme();
      if (!loadFromStorage()) {
        receiptNoEl.value = generateReceiptNo();
        initDateTime();
        addItem();
      }
      updatePreview();
    </script>
  </body>
</html>

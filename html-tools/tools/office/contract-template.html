    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }
      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }
      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }
      .nav-back:hover {
        background: var(--color-border-subtle);
      }
      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }
      .nav-back-text {
        display: inline;
      }
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }
      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }
      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }
      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }
      [data-theme="light"] .theme-icon-dark {
        display: block;
      }
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-5));
        padding-bottom: calc(var(--space-6) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .tool-card {
        width: 100%;
        max-width: var(--container-max);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-lg);
        flex: 1;
        display: flex;
        flex-direction: column;
        transition: all var(--transition-normal);
        animation: fade-in-up 0.4s ease-out;
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tool-header {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-5);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .tool-icon {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          var(--color-accent-primary),
          var(--color-accent-tertiary)
        );
        border-radius: var(--radius-md);
        color: #fff;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
      }
      .tool-info h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .tool-info .desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .btn-group {
        display: flex;
        gap: 2px;
        background: var(--color-bg-subtle);
        border-radius: var(--radius-sm);
        padding: 2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 36px;
        padding: 0 var(--space-4);
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
      }
      .btn-primary {
        background: var(--color-accent-primary);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: var(--shadow-glow);
      }
      .panels {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: var(--space-5);
        flex: 1;
        min-height: 500px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-3);
      }
      .panel-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .form-section {
        margin-bottom: var(--space-5);
      }
      .form-section h3 {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-3);
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
      .form-section h3::before {
        content: "";
        width: 3px;
        height: 14px;
        background: var(--color-accent-primary);
        border-radius: 2px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-3);
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }
      .form-group.full {
        grid-column: 1 / -1;
      }
      .form-group label {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        font-family: var(--font-sans);

                  <input type="text" id="partyB" placeholder="乙方公司/个人名称" />

            {

            },
            {

              content:
                "甲方应为乙方提供符合国家规定的劳动安全卫生条件和必要的劳动防护用品，保障乙方的人身安全和健康。"
            },
            {
              title: "第七条 合同变更、解除与终止",
              content:
                "1. 经双方协商一致，可以变更或解除本合同；\n2. 乙方提前30日以书面形式通知甲方，可以解除本合同；试用期内提前3日通知；\n3. 甲方解除本合同应符合法律规定的条件和程序。"
            },
            {
              title: "第八条 保密与竞业限制",

                "乙方应对工作中知悉的甲方商业秘密和技术秘密负有保密义务，未经甲方书面同意，不得向任何第三方披露。"
            }
          ]
        },
        rental: {
          title: "租赁合同",
          intro: "甲乙双方就租赁事宜，经平等协商，达成如下协议：",
          sections: [
            {
              title: "第一条 租赁物",
              content:
                "甲方同意将以下物品/房屋出租给乙方使用：\n{rentalItem}\n使用用途：{rentalUse}"
            },
            {
              title: "第二条 租赁期限",
              content:
                "租赁期限自 {startDate} 起至 {endDate} 止。\n租赁期满，如乙方需继续租用，应提前30日向甲方提出书面申请，双方另行签订合同。"
            },
            {
              title: "第三条 租金与押金",
              content:
                "1. 租金总计人民币 {amount} 元整（大写：{amountCN}）；\n2. 付款方式：{paymentMethod}；\n3. 乙方应于本合同签订时向甲方支付押金人民币 {deposit} 元整；\n4. 租赁期满且乙方无违约行为的，甲方应于交还租赁物后7日内退还押金。"
            },
            {
              title: "第四条 甲方权利义务",
              content:
                "1. 甲方应按约定时间将租赁物交付乙方使用，并保证租赁物符合约定的使用条件；\n2. 甲方应保证租赁物不存在权属纠纷，不影响乙方正常使用；\n3. 甲方负责租赁物的结构性维修。"
            },
            {
              title: "第五条 乙方权利义务",
              content:
                "1. 乙方应按约定用途使用租赁物，不得擅自改变用途；\n2. 未经甲方书面同意，乙方不得将租赁物转租、转借给第三方；\n3. 乙方应妥善保管、合理使用租赁物，如有损坏应照价赔偿；\n4. 乙方负责租赁期间的日常维护和水电等费用。"
            },
            {
              title: "第六条 租赁物返还",
              content:
                "1. 租赁期满或合同解除时，乙方应将租赁物按原状返还甲方；\n2. 乙方对租赁物进行的装修、改造，应事先征得甲方书面同意；\n3. 租赁期满，装修、改造物的归属由双方另行协商。"
            },
            {
              title: "第七条 违约责任",
              content:
                "1. 甲方逾期交付租赁物的，每逾期一日，应向乙方支付日租金的双倍作为违约金；\n2. 乙方逾期支付租金的，每逾期一日，应向甲方支付逾期租金的万分之五作为违约金；\n3. 任何一方擅自解除合同的，应向对方支付一个月租金作为违约金。"
            },
            {
              title: "第八条 合同解除",
              content:
                "1. 经双方协商一致，可以解除本合同；\n2. 一方严重违约，另一方有权解除本合同并要求赔偿损失；\n3. 因不可抗力致使合同目的无法实现的，双方可以解除合同。"
            }
          ]
        }
      };

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function formatDate(dateStr) {
        if (!dateStr) return "____年__月__日";
        var d = new Date(dateStr);
        return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
      }

      function numberToChinese(num) {
        if (!num || isNaN(num)) return "____";
        var digits = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
        var units = ["", "拾", "佰", "仟"];
        var bigUnits = ["", "万", "亿"];

        num = Math.floor(parseFloat(num));
        if (num === 0) return "零元整";

        var result = "";
        var unitIndex = 0;

        while (num > 0) {
          var section = num % 10000;
          var sectionStr = "";
          var zeroFlag = false;

          for (var i = 0; section > 0; i++) {
            var digit = section % 10;
            if (digit === 0) {
              zeroFlag = true;
            } else {
              if (zeroFlag) {
                sectionStr = "零" + sectionStr;
                zeroFlag = false;
              }
              sectionStr = digits[digit] + units[i] + sectionStr;
            }
            section = Math.floor(section / 10);
          }

          if (sectionStr) {
            result = sectionStr + bigUnits[unitIndex] + result;
          }

          num = Math.floor(num / 10000);
          unitIndex++;
        }

        return result + "元整";
      }

      function escapeHtml(text) {
        var div = document.createElement("div");
        div.textContent = text;
        return div.textContent;
      }

      function getFormData() {
        return {
          type: currentType,
          contractNo: contractNoEl.value || "【合同编号】",
          contractDate: formatDate(contractDateEl.value),
          partyA: partyAEl.value || "【甲方名称】",
          partyB: partyBEl.value || "【乙方名称】",
          startDate: formatDate(startDateEl.value),
          endDate: formatDate(endDateEl.value),
          amount: amountEl.value || "____",
          amountCN: numberToChinese(amountEl.value),
          paymentMethod: paymentMethodEl.value,
          extraTerms: extraTermsEl.value,
          serviceScope: serviceScopeEl.value || "【服务内容】",
          serviceLocation: serviceLocationEl.value || "【服务地点】",
          position: positionEl.value || "【岗位名称】",
          department: departmentEl.value || "【部门名称】",
          jobDuties: jobDutiesEl.value || "【工作职责】",
          workLocation: workLocationEl.value || "【工作地点】",
          probation: probationEl.value || "3",
          rentalItem: rentalItemEl.value || "【租赁物描述】",
          deposit: depositEl.value || "____",
          rentalUse: rentalUseEl.value
        };
      }

      function generateContract() {
        var data = getFormData();
        var tpl = templates[currentType];

        while (previewEl.firstChild) {
          previewEl.removeChild(previewEl.firstChild);
        }

        var h2 = document.createElement("h2");
        h2.textContent = tpl.title;
        previewEl.appendChild(h2);

        var contractNum = document.createElement("div");
        contractNum.className = "contract-number";
        contractNum.textContent = "合同编号：" + escapeHtml(data.contractNo);
        previewEl.appendChild(contractNum);

        var partiesDiv = document.createElement("div");
        partiesDiv.className = "parties";
        var pA = document.createElement("p");
        var pAStrong = document.createElement("strong");
        pAStrong.textContent = "甲方（委托方/用人单位/出租方）：";
        pA.appendChild(pAStrong);
        pA.appendChild(document.createTextNode(escapeHtml(data.partyA)));
        var pB = document.createElement("p");
        var pBStrong = document.createElement("strong");
        pBStrong.textContent = "乙方（服务方/劳动者/承租方）：";
        pB.appendChild(pBStrong);
        pB.appendChild(document.createTextNode(escapeHtml(data.partyB)));
        partiesDiv.appendChild(pA);
        partiesDiv.appendChild(pB);
        previewEl.appendChild(partiesDiv);

        var introP = document.createElement("p");
        introP.textContent = tpl.intro;
        previewEl.appendChild(introP);

        tpl.sections.forEach(function (section) {
          var titleP = document.createElement("p");
          titleP.className = "section-title";
          titleP.textContent = section.title;
          previewEl.appendChild(titleP);

          var content = section.content;
          Object.keys(data).forEach(function (key) {
            content = content.replace(new RegExp("\\{" + key + "\\}", "g"), data[key]);
          });

          content.split("\n").forEach(function (line) {
            var p = document.createElement("p");
            p.textContent = line;
            previewEl.appendChild(p);
          });
        });

        if (data.extraTerms) {
          var extraTitle = document.createElement("p");
          extraTitle.className = "section-title";
          extraTitle.textContent = "第九条 附加条款";
          previewEl.appendChild(extraTitle);

          data.extraTerms.split("\n").forEach(function (line) {
            var p = document.createElement("p");
            p.textContent = line;
            previewEl.appendChild(p);
          });
        }

        var finalP = document.createElement("p");
        finalP.textContent =
          "本合同一式两份，甲乙双方各执一份，具有同等法律效力。本合同自双方签字（盖章）之日起生效。";
        previewEl.appendChild(finalP);

        var sigDiv = document.createElement("div");
        sigDiv.className = "signature";

        var sigA = document.createElement("div");
        sigA.className = "sig-block";
        var sigALabel1 = document.createElement("div");
        sigALabel1.className = "sig-label";
        sigALabel1.textContent = "甲方（签字/盖章）：";
        var sigALine1 = document.createElement("div");
        sigALine1.className = "sig-line";
        var sigALabel2 = document.createElement("div");
        sigALabel2.className = "sig-label";
        sigALabel2.textContent = "日期：";
        var sigALine2 = document.createElement("div");
        sigALine2.className = "sig-line";
        sigA.appendChild(sigALabel1);
        sigA.appendChild(sigALine1);
        sigA.appendChild(sigALabel2);
        sigA.appendChild(sigALine2);

        var sigB = document.createElement("div");
        sigB.className = "sig-block";
        var sigBLabel1 = document.createElement("div");
        sigBLabel1.className = "sig-label";
        sigBLabel1.textContent = "乙方（签字/盖章）：";
        var sigBLine1 = document.createElement("div");
        sigBLine1.className = "sig-line";
        var sigBLabel2 = document.createElement("div");
        sigBLabel2.className = "sig-label";
        sigBLabel2.textContent = "日期：";
        var sigBLine2 = document.createElement("div");
        sigBLine2.className = "sig-line";
        sigB.appendChild(sigBLabel1);
        sigB.appendChild(sigBLine1);
        sigB.appendChild(sigBLabel2);
        sigB.appendChild(sigBLine2);

        sigDiv.appendChild(sigA);
        sigDiv.appendChild(sigB);
        previewEl.appendChild(sigDiv);

        showStatus("合同已生成", "success");
      }

      function getPlainText() {
        return previewEl.innerText;
      }

      function saveToStorage() {
        var data = {
          type: currentType,
          contractNo: contractNoEl.value,
          contractDate: contractDateEl.value,
          partyA: partyAEl.value,
          partyB: partyBEl.value,
          startDate: startDateEl.value,
          endDate: endDateEl.value,
          amount: amountEl.value,
          paymentMethod: paymentMethodEl.value,
          extraTerms: extraTermsEl.value,
          serviceScope: serviceScopeEl.value,
          serviceLocation: serviceLocationEl.value,
          position: positionEl.value,
          department: departmentEl.value,
          jobDuties: jobDutiesEl.value,
          workLocation: workLocationEl.value,
          probation: probationEl.value,
          rentalItem: rentalItemEl.value,
          deposit: depositEl.value,
          rentalUse: rentalUseEl.value
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        var saved = localStorage.getItem(LS_KEY);
        if (saved) {
          try {
            var data = JSON.parse(saved);
            currentType = data.type || "service";
            contractNoEl.value = data.contractNo || "";
            contractDateEl.value = data.contractDate || "";
            partyAEl.value = data.partyA || "";
            partyBEl.value = data.partyB || "";
            startDateEl.value = data.startDate || "";
            endDateEl.value = data.endDate || "";
            amountEl.value = data.amount || "";
            paymentMethodEl.value = data.paymentMethod || "一次性付清";
            extraTermsEl.value = data.extraTerms || "";
            serviceScopeEl.value = data.serviceScope || "";
            serviceLocationEl.value = data.serviceLocation || "";
            positionEl.value = data.position || "";
            departmentEl.value = data.department || "";
            jobDutiesEl.value = data.jobDuties || "";
            workLocationEl.value = data.workLocation || "";
            probationEl.value = data.probation || "";
            rentalItemEl.value = data.rentalItem || "";
            depositEl.value = data.deposit || "";
            rentalUseEl.value = data.rentalUse || "居住";

            updateTypeUI();
            return true;
          } catch (e) {
            return false;
          }
        }
        return false;
      }

      function updateTypeUI() {
        document.querySelectorAll(".type-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.type === currentType);
        });
        document.querySelectorAll(".template-fields").forEach(function (el) {
          el.classList.remove("active");
        });
        document.getElementById(currentType + "Fields").classList.add("active");
      }

      function clearForm() {
        if (!confirm("确定要清空所有内容吗？")) return;

        contractNoEl.value = "";
        contractDateEl.value = new Date().toISOString().split("T")[0];
        partyAEl.value = "";
        partyBEl.value = "";
        startDateEl.value = "";
        endDateEl.value = "";
        amountEl.value = "";
        paymentMethodEl.value = "一次性付清";
        extraTermsEl.value = "";
        serviceScopeEl.value = "";
        serviceLocationEl.value = "";
        positionEl.value = "";
        departmentEl.value = "";
        jobDutiesEl.value = "";
        workLocationEl.value = "";
        probationEl.value = "";
        rentalItemEl.value = "";
        depositEl.value = "";
        rentalUseEl.value = "居住";

        currentType = "service";
        updateTypeUI();
        localStorage.removeItem(LS_KEY);
        while (previewEl.firstChild) {
          previewEl.removeChild(previewEl.firstChild);
        }
        showStatus("已清空", "success");
      }

      document.querySelectorAll(".type-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          currentType = btn.dataset.type;
          updateTypeUI();
          saveToStorage();
          generateContract();
        });
      });

      var allInputs = [
        contractNoEl,
        contractDateEl,
        partyAEl,
        partyBEl,
        startDateEl,
        endDateEl,
        amountEl,
        paymentMethodEl,
        extraTermsEl,
        serviceScopeEl,
        serviceLocationEl,
        positionEl,
        departmentEl,
        jobDutiesEl,
        workLocationEl,
        probationEl,
        rentalItemEl,
        depositEl,
        rentalUseEl
      ];

      allInputs.forEach(function (el) {
        el.addEventListener("input", saveToStorage);
        el.addEventListener("change", saveToStorage);
      });

      document.getElementById("btnGenerate").addEventListener("click", generateContract);

      document.getElementById("btnCopy").addEventListener("click", function () {
        var text = getPlainText();
        if (!text) {
          showStatus("请先生成合同", "error");
          return;
        }
        navigator.clipboard
          .writeText(text)
          .then(function () {
            showStatus("已复制到剪贴板", "success");
          })
          .catch(function () {
            showStatus("复制失败", "error");
          });
      });

      document.getElementById("btnPrint").addEventListener("click", function () {
        if (!previewEl.textContent) {
          generateContract();
        }
        window.print();
      });

      document.getElementById("btnClear").addEventListener("click", clearForm);

      window.toggleTheme = function () {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        if (!localStorage.getItem("theme")) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        }
      });

      initTheme();

      if (!contractDateEl.value) {
        contractDateEl.value = new Date().toISOString().split("T")[0];
      }

      loadFromStorage();
      updateTypeUI();
      generateContract();
    </script>
  </body>
</html>

    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0 245 212 / 2%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0 245 212 / 2%) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        flex-wrap: wrap;
      }

      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }

      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }

      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .title-section {
        flex: 1;
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-section h1 .icon {
        font-size: 1.8rem;
      }

      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .main-content {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }

      /* Add Task Form */
      .add-task-form {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .task-input {
        flex: 1;
        min-width: 200px;
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        transition: border-color 0.2s;
      }

      .task-input:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }

      .task-input::placeholder {
        color: var(--text-muted);
      }

      .priority-select {
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        cursor: pointer;
        min-width: 120px;
      }

      .priority-select:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }

      .btn {
        padding: 12px 20px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
      }

      .btn-primary {
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px var(--glow-cyan);
      }

      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .btn-danger {
        background: transparent;
        color: var(--accent-red);
        border: 1px solid var(--accent-red);
      }

      .btn-danger:hover {
        background: var(--accent-red);
        color: white;
      }

      /* Filters */
      .filters {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-group {
        display: flex;
        gap: 4px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 4px;
      }

      .filter-btn {
        padding: 8px 14px;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn:hover {
        color: var(--color-text-primary);
        background: var(--bg-hover);
      }

      .filter-btn.active {
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      .filter-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-right: 8px;
      }

      /* Task Stats */
      .task-stats {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
        padding: 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        flex-wrap: wrap;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
      }

      .stat-value {
        font-weight: 600;
        color: var(--color-accent-cyan);
      }

      .stat-label {
        color: var(--color-text-secondary);
      }

      /* Task List */
      .task-list {
        list-style: none;
      }

      .task-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        margin-bottom: 8px;
        transition: all 0.2s;
      }

      .task-item:hover {
        border-color: var(--border-strong);
        background: var(--bg-hover);
      }

      .task-item.completed {
        opacity: 0.6;
      }

      .task-item.completed .task-title {
        text-decoration: line-through;
        color: var(--text-muted);
      }

      .task-checkbox {
        width: 22px;
        height: 22px;
        border: 2px solid var(--border-strong);
        border-radius: var(--radius-sm);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        background: transparent;
      }

      .task-checkbox:hover {
        border-color: var(--color-accent-cyan);
      }

      .task-checkbox.checked {
        background: var(--accent-green);
        border-color: var(--accent-green);
      }

      .task-checkbox.checked::after {
        content: "✓";
        color: white;
        font-size: 0.8rem;
        font-weight: bold;
      }

      .priority-indicator {
        width: 4px;
        height: 32px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .priority-indicator.high {
        background: var(--priority-high);
      }

      .priority-indicator.medium {
        background: var(--priority-medium);
      }

      .priority-indicator.low {
        background: var(--priority-low);
      }

      .task-content {
        flex: 1;
        min-width: 0;
      }

      .task-title {
        font-family: var(--font-sans);
        font-size: 0.95rem;
        color: var(--color-text-primary);
        overflow-wrap: break-word;
      }

      .task-meta {
        display: flex;
        gap: 12px;
        margin-top: 4px;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .priority-badge {
        padding: 2px 8px;
        border-radius: var(--radius-sm);
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
      }

      .priority-badge.high {
        background: rgb(244 63 94 / 20%);
        color: var(--priority-high);
      }

      .priority-badge.medium {
        background: rgb(251 191 36 / 20%);
        color: var(--priority-medium);
      }

      .priority-badge.low {
        background: rgb(16 185 129 / 20%);
        color: var(--priority-low);
      }

      .delete-btn {
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        border-radius: var(--radius-sm);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .delete-btn:hover {
        background: rgb(244 63 94 / 15%);
        color: var(--accent-red);
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--text-muted);
      }

      .empty-state .icon {
        font-size: 3rem;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      .empty-state p {
        font-family: var(--font-mono);
        font-size: 0.9rem;
      }

      /* Actions */
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid var(--border-subtle);
        flex-wrap: wrap;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: white;
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .container {
          padding: 16px;
        }

        .add-task-form {
          flex-direction: column;
        }

        .priority-select {
          width: 100%;
        }

        .filters {
          flex-direction: column;
          align-items: stretch;
        }

        .filter-group {
          justify-content: center;
        }

        .task-stats {
          justify-content: space-between;
        }

        .task-meta {
          flex-wrap: wrap;
        }

        .actions {
          flex-direction: column;
        }

        .actions .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <div class="container">
      <header class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">任务跟踪器</span>
        </nav>
        <div class="title-section">
          <h1>
            <span class="icon">✅</span>
            任务跟踪器
          </h1>
          <p>管理待办事项，支持优先级和筛选</p>
        </div>
      </header>

      <main class="main-content">
        <!-- Add Task Form -->
        <form class="add-task-form" id="addTaskForm">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="添加新任务..."
            autocomplete="off"
          />
          <select id="prioritySelect" class="priority-select">
            <option value="medium">中优先级</option>
            <option value="high">高优先级</option>
            <option value="low">低优先级</option>
          </select>
          <button type="submit" class="btn btn-primary">➕ 添加</button>
        </form>

        <!-- Filters -->
        <div class="filters">
          <div>
            <span class="filter-label">状态:</span>
            <div class="filter-group" id="statusFilter">
              <button class="filter-btn active" data-filter="all">全部</button>
              <button class="filter-btn" data-filter="active">进行中</button>
              <button class="filter-btn" data-filter="completed">已完成</button>
            </div>
          </div>
          <div>
            <span class="filter-label">优先级:</span>
            <div class="filter-group" id="priorityFilter">
              <button class="filter-btn active" data-filter="all">全部</button>
              <button class="filter-btn" data-filter="high">高</button>
              <button class="filter-btn" data-filter="medium">中</button>
              <button class="filter-btn" data-filter="low">低</button>
            </div>
          </div>
        </div>

        <!-- Task Stats -->
        <div class="task-stats">
          <div class="stat-item">
            <span class="stat-value" id="totalCount">0</span>
            <span class="stat-label">总任务</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="activeCount">0</span>
            <span class="stat-label">进行中</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="completedCount">0</span>
            <span class="stat-label">已完成</span>
          </div>
        </div>

        <!-- Task List -->
        <ul class="task-list" id="taskList"></ul>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-danger" id="clearCompletedBtn">🗑️ 清除已完成</button>
          <button class="btn btn-secondary" id="clearAllBtn">🔄 清空全部</button>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">操作成功</div>

    <script>
      (function () {
        "use strict";

        var LS_KEY = "task_tracker_v1";
        var tasks = [];
        var currentStatusFilter = "all";
        var currentPriorityFilter = "all";

        var priorityLabels = {
          high: "高",
          medium: "中",
          low: "低"
        };

        // DOM elements
        var taskList = document.getElementById("taskList");
        var taskInput = document.getElementById("taskInput");
        var prioritySelect = document.getElementById("prioritySelect");
        var addTaskForm = document.getElementById("addTaskForm");
        var statusFilter = document.getElementById("statusFilter");
        var priorityFilterEl = document.getElementById("priorityFilter");
        var toastEl = document.getElementById("toast");

        // Theme toggle
        window.toggleTheme = function () {
          var html = document.documentElement;
          var isDark = html.getAttribute("data-theme") !== "light";
          html.setAttribute("data-theme", isDark ? "light" : "dark");
          localStorage.setItem("theme", isDark ? "light" : "dark");
        };

        // Load theme
        (function () {
          var saved = localStorage.getItem("theme");
          if (saved === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        })();

        // Load tasks from localStorage
        function loadTasks() {
          try {
            var saved = localStorage.getItem(LS_KEY);
            if (saved) {
              tasks = JSON.parse(saved);
            }
          } catch (e) {
            tasks = [];
          }
          renderTasks();
        }

        // Save tasks to localStorage
        function saveTasks() {
          localStorage.setItem(LS_KEY, JSON.stringify(tasks));
        }

        // Generate unique ID
        function generateId() {
          return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Format date
        function formatDate(timestamp) {
          var date = new Date(timestamp);
          var now = new Date();
          var diff = now - date;

          if (diff < 60000) return "刚刚";
          if (diff < 3600000) return Math.floor(diff / 60000) + " 分钟前";
          if (diff < 86400000) return Math.floor(diff / 3600000) + " 小时前";
          if (diff < 604800000) return Math.floor(diff / 86400000) + " 天前";

          var y = date.getFullYear();
          var m = String(date.getMonth() + 1).padStart(2, "0");
          var d = String(date.getDate()).padStart(2, "0");
          return y + "/" + m + "/" + d;
        }

        // Show toast
        function showToast(msg) {
          toastEl.textContent = msg;
          toastEl.classList.add("show");
          setTimeout(function () {
            toastEl.classList.remove("show");
          }, 2000);
        }

        // Add new task
        function addTask(e) {
          e.preventDefault();
          var title = taskInput.value.trim();
          var priority = prioritySelect.value;

          if (!title) {
            showToast("请输入任务内容");
            return;
          }

          var task = {
            id: generateId(),
            title: title,
            priority: priority,
            completed: false,
            createdAt: Date.now()
          };

          tasks.unshift(task);
          saveTasks();
          renderTasks();
          taskInput.value = "";
          showToast("任务已添加");
        }

        // Toggle task completion
        function toggleTask(id) {
          for (var i = 0; i < tasks.length; i++) {
            if (tasks[i].id === id) {
              tasks[i].completed = !tasks[i].completed;
              break;
            }
          }
          saveTasks();
          renderTasks();
        }

        // Delete task
        function deleteTask(id) {
          tasks = tasks.filter(function (t) {
            return t.id !== id;
          });
          saveTasks();
          renderTasks();
          showToast("任务已删除");
        }

        // Clear completed tasks
        function clearCompleted() {
          var completedCount = tasks.filter(function (t) {
            return t.completed;
          }).length;
          if (completedCount === 0) {
            showToast("没有已完成的任务");
            return;
          }
          tasks = tasks.filter(function (t) {
            return !t.completed;
          });
          saveTasks();
          renderTasks();
          showToast("已清除 " + completedCount + " 个已完成任务");
        }

        // Clear all tasks
        function clearAll() {
          if (tasks.length === 0) {
            showToast("任务列表为空");
            return;
          }
          if (confirm("确定要清空所有任务吗？")) {
            tasks = [];
            saveTasks();
            renderTasks();
            showToast("已清空所有任务");
          }
        }

        // Filter tasks
        function getFilteredTasks() {
          return tasks.filter(function (task) {
            var statusMatch =
              currentStatusFilter === "all" ||
              (currentStatusFilter === "active" && !task.completed) ||
              (currentStatusFilter === "completed" && task.completed);

            var priorityMatch =
              currentPriorityFilter === "all" || task.priority === currentPriorityFilter;

            return statusMatch && priorityMatch;
          });
        }

        // Create task element
        function createTaskElement(task) {
          var li = document.createElement("li");
          li.className = "task-item" + (task.completed ? " completed" : "");

          // Checkbox
          var checkbox = document.createElement("div");
          checkbox.className = "task-checkbox" + (task.completed ? " checked" : "");
          checkbox.addEventListener("click", function () {
            toggleTask(task.id);
          });

          // Priority indicator
          var indicator = document.createElement("div");
          indicator.className = "priority-indicator " + task.priority;

          // Content container
          var content = document.createElement("div");
          content.className = "task-content";

          // Title
          var title = document.createElement("div");
          title.className = "task-title";
          title.textContent = task.title;

          // Meta
          var meta = document.createElement("div");
          meta.className = "task-meta";

          var badge = document.createElement("span");
          badge.className = "priority-badge " + task.priority;
          badge.textContent = priorityLabels[task.priority];

          var dateSpan = document.createElement("span");
          dateSpan.textContent = formatDate(task.createdAt);

          meta.appendChild(badge);
          meta.appendChild(dateSpan);

          content.appendChild(title);
          content.appendChild(meta);

          // Delete button
          var deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-btn";
          deleteBtn.title = "删除";
          deleteBtn.textContent = "✕";
          deleteBtn.addEventListener("click", function () {
            deleteTask(task.id);
          });

          li.appendChild(checkbox);
          li.appendChild(indicator);
          li.appendChild(content);
          li.appendChild(deleteBtn);

          return li;
        }

        // Render tasks
        function renderTasks() {
          var filteredTasks = getFilteredTasks();

          // Update stats
          var totalCount = tasks.length;
          var completedCount = tasks.filter(function (t) {
            return t.completed;
          }).length;
          var activeCount = totalCount - completedCount;

          document.getElementById("totalCount").textContent = totalCount;
          document.getElementById("activeCount").textContent = activeCount;
          document.getElementById("completedCount").textContent = completedCount;

          // Clear list
          taskList.textContent = "";

          // Render list
          if (filteredTasks.length === 0) {
            var emptyState = document.createElement("li");
            emptyState.className = "empty-state";

            var icon = document.createElement("div");
            icon.className = "icon";
            icon.textContent = "📋";

            var message = document.createElement("p");
            message.textContent =
              tasks.length === 0 ? "还没有任务，添加一个吧！" : "没有符合筛选条件的任务";

            emptyState.appendChild(icon);
            emptyState.appendChild(message);
            taskList.appendChild(emptyState);
            return;
          }

          for (var i = 0; i < filteredTasks.length; i++) {
            taskList.appendChild(createTaskElement(filteredTasks[i]));
          }
        }

        // Setup filters
        function setupFilters() {
          statusFilter.addEventListener("click", function (e) {
            if (e.target.classList.contains("filter-btn")) {
              var btns = statusFilter.querySelectorAll(".filter-btn");
              for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove("active");
              }
              e.target.classList.add("active");
              currentStatusFilter = e.target.dataset.filter;
              renderTasks();
            }
          });

          priorityFilterEl.addEventListener("click", function (e) {
            if (e.target.classList.contains("filter-btn")) {
              var btns = priorityFilterEl.querySelectorAll(".filter-btn");
              for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove("active");
              }
              e.target.classList.add("active");
              currentPriorityFilter = e.target.dataset.filter;
              renderTasks();
            }
          });
        }

        // Event listeners
        addTaskForm.addEventListener("submit", addTask);
        document.getElementById("clearCompletedBtn").addEventListener("click", clearCompleted);
        document.getElementById("clearAllBtn").addEventListener("click", clearAll);

        // Keyboard shortcut
        document.addEventListener("keydown", function (e) {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            if (document.activeElement === taskInput && taskInput.value.trim()) {
              addTask(e);
            }
          }
        });

        // Initialize
        loadTasks();
        setupFilters();
      })();
    </script>
  </body>
</html>

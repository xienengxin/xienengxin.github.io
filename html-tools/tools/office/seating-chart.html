      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */

        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        flex-wrap: wrap;
      }

      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }

      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }

      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .title-section {
        flex: 1;
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-section h1 .icon {
        font-size: 1.8rem;
      }

      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .main-content {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }

      .tool-section {
        margin-bottom: 24px;
      }

      .section-title {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }

      .input-group {
        margin-bottom: 16px;
      }

      .input-label {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        transition: border-color 0.2s;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        flex: 1;
        min-width: 120px;
        padding: 12px 20px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px var(--glow-cyan);
      }

      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .btn-sm {
        min-width: auto;
        padding: 8px 12px;
        font-size: 0.8rem;
        flex: none;
      }

      /* Seating Grid */
      .seating-canvas {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 24px;
        min-height: 400px;
        overflow: auto;
      }

      .tables-container {
        display: flex;
        flex-wrap: wrap;
        gap: 32px;
        justify-content: center;
      }

      .table-group {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .table-label {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
        margin-bottom: 12px;
        padding: 4px 12px;
        background: rgba(0, 245, 212, 0.1);
        border-radius: var(--radius-sm);
      }

      .table-shape {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }

      /* Round table */
      .table-round {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: var(--border-strong);
        position: relative;
      }

      .table-round .seat {
        position: absolute;
        width: 50px;
        height: 50px;
        transform: translate(-50%, -50%);
      }

      /* Rectangle table */
      .table-rect {
        display: grid;
        gap: 8px;
        padding: 16px;
      }

      .table-rect-body {
        background: var(--border-strong);
        border-radius: var(--radius-sm);
        padding: 16px;
        min-width: 120px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .table-seats-row {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      /* Seat styles */
      .seat {
        width: 60px;
        height: 60px;
        background: var(--color-bg-card);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        text-align: center;
        padding: 4px;
      }

      .seat:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.05);
      }

      .seat.occupied {
        background: rgba(0, 245, 212, 0.1);
        border-color: var(--color-accent-cyan);
      }

      .seat-number {
        font-size: 0.65rem;
        color: var(--text-muted);
      }

      .seat-name {
        font-size: 0.75rem;
        color: var(--color-text-primary);
        word-break: break-all;
        line-height: 1.2;
      }

      .btn-remove-table {
        margin-top: 8px;
        background: transparent;
        border: 1px solid var(--accent-red);
        color: var(--accent-red);
        cursor: pointer;
        font-size: 0.75rem;
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        transition: all 0.2s;
        font-family: var(--font-mono);
      }

      .btn-remove-table:hover {
        background: rgba(244, 63, 94, 0.1);
      }

      /* Stats */
      .stats-row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .stat-item {
        font-family: var(--font-mono);
        font-size: 0.9rem;
      }

      .stat-item span {
        color: var(--color-accent-cyan);
        font-weight: 600;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 400px;
        width: 90%;
      }

      .modal-title {
        font-family: var(--font-mono);
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 16px;
      }

      .modal .btn-row {
        margin-top: 16px;
      }

      /* Print Styles */
      @media print {
        body {
          background: #fff !important;
          color: #000 !important;
        }

        .bg-grid,
        .theme-toggle,
        .breadcrumb,
        .btn-row,
        .btn,
        .btn-remove-table,
        .no-print,
        .modal-overlay {
          display: none !important;
        }

        .container {
          max-width: 100%;
          padding: 0;
        }

        .main-content {
          border: none;
          box-shadow: none;
          padding: 0;
          background: #fff;
        }

        .tool-section {
          page-break-inside: avoid;
        }

        .section-title {
          color: #333;
          border-bottom-color: #ddd;
        }

        .seating-canvas {
          background: #fff;
          border: 1px solid #ddd;
        }

        .table-label {
          background: #f0f0f0;
          color: #333;
        }

        .table-round,
        .table-rect-body {
          background: #e0e0e0;
        }

        .seat {
          background: #fff;
          border-color: #ccc;
        }

        .seat.occupied {
          background: #e8f5e9;
          border-color: #4caf50;
        }

        .seat-number,
        .seat-name {
          color: #333;
        }

        .chart-header-print {
          display: block !important;
          text-align: center;
          margin-bottom: 24px;
          padding-bottom: 16px;
          border-bottom: 2px solid #333;
        }

        .print-title {
          font-size: 1.5rem;
          font-weight: 700;
          color: #000;
        }

        .print-event {
          font-size: 1rem;
          color: #666;
          margin-top: 8px;
        }
      }

      .chart-header-print {
        display: none;
      }

      @media (max-width: 600px) {
        .container {
          padding: 16px;
        }

        .btn-row {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <div class="container">
      <header class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">座位图生成器</span>
        </nav>
        <div class="title-section">
          <h1>
            <span class="icon">💺</span>
            座位图生成器
          </h1>
          <p>创建座位安排图，支持多种桌型、分配座位、可视化布局</p>
        </div>
      </header>

      <main class="main-content">
        <!-- Print Header -->
        <div class="chart-header-print">
          <div class="print-title">座位安排图</div>
          <div class="print-event" id="printEventName"></div>
        </div>

        <!-- Event Info -->
        <div class="tool-section no-print">
          <div class="section-title">活动信息</div>
          <div class="form-grid">
            <div class="input-group">
              <label class="input-label">活动名称</label>
              <input type="text" id="eventName" placeholder="会议/活动名称" />
            </div>
          </div>
        </div>

        <!-- Add Table -->
        <div class="tool-section no-print">
          <div class="section-title">添加桌子</div>
          <div class="form-grid">
            <div class="input-group">
              <label class="input-label">桌子名称</label>
              <input type="text" id="tableName" placeholder="如: A桌, 主桌" />
            </div>
            <div class="input-group">
              <label class="input-label">桌型</label>
              <select id="tableType">
                <option value="round">圆桌</option>
                <option value="rect">长桌</option>
              </select>
            </div>
            <div class="input-group">
              <label class="input-label">座位数</label>
              <input type="number" id="seatCount" value="8" min="2" max="20" />
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary btn-sm" onclick="addTable()">+ 添加桌子</button>
          </div>
        </div>

        <!-- Stats -->
        <div class="tool-section">
          <div class="stats-row">
            <div class="stat-item">
              桌子数:
              <span id="tableCount">0</span>
            </div>
            <div class="stat-item">
              总座位:
              <span id="totalSeats">0</span>
            </div>
            <div class="stat-item">
              已分配:
              <span id="assignedSeats">0</span>
            </div>
          </div>
        </div>

        <!-- Seating Canvas -->
        <div class="tool-section">
          <div class="section-title">座位布局</div>
          <div class="seating-canvas">
            <div class="tables-container" id="tablesContainer">
              <!-- Tables will be rendered here -->
              <div style="text-align: center; color: var(--text-muted); padding: 60px 0">
                点击"添加桌子"开始创建座位图
              </div>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="tool-section no-print">
          <div class="btn-row">
            <button class="btn btn-primary" onclick="printChart()">🖨️ 打印座位图</button>
            <button class="btn btn-secondary" onclick="clearAll()">🔄 清空重置</button>
          </div>
        </div>
      </main>
    </div>

    <!-- Seat Assignment Modal -->
    <div class="modal-overlay" id="seatModal">
      <div class="modal">
        <div class="modal-title">分配座位</div>
        <div class="input-group">
          <label class="input-label">姓名</label>
          <input type="text" id="seatPersonName" placeholder="输入姓名" />
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="assignSeat()">确定</button>
          <button class="btn btn-secondary btn-sm" onclick="clearSeat()">清除</button>
          <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">操作成功</div>

    <script>
      var LS_KEY = "seating_chart_data_v1";
      var tables = [];
      var tableIdCounter = 0;
      var currentSeat = null;

      // Initialize
      function init() {
        loadTheme();
        loadFromStorage();
        renderTables();
        updateStats();

        // Add input listeners for auto-save
        document
          .getElementById("eventName")
          .addEventListener("input", debounce(saveToStorage, 500));
      }

      // Add table
      function addTable() {
        var name = document.getElementById("tableName").value.trim();
        var type = document.getElementById("tableType").value;
        var seatCount = parseInt(document.getElementById("seatCount").value) || 8;

        if (!name) {
          name = "桌 " + (tables.length + 1);
        }

        if (seatCount < 2) seatCount = 2;
        if (seatCount > 20) seatCount = 20;

        var seats = [];
        for (var i = 0; i < seatCount; i++) {
          seats.push({
            number: i + 1,
            name: ""
          });
        }

        tables.push({
          id: ++tableIdCounter,
          name: name,
          type: type,
          seats: seats
        });

        // Reset inputs
        document.getElementById("tableName").value = "";
        document.getElementById("seatCount").value = "8";

        renderTables();
        updateStats();
        saveToStorage();
        showToast("已添加 " + name);
      }

      // Remove table
      function removeTable(id) {
        if (!confirm("确定要删除这张桌子吗？")) return;

        tables = tables.filter(function (t) {
          return t.id !== id;
        });
        renderTables();
        updateStats();
        saveToStorage();
        showToast("已删除");
      }

      // Render tables
      function renderTables() {
        var container = document.getElementById("tablesContainer");
        container.textContent = "";

        if (tables.length === 0) {
          var placeholder = document.createElement("div");
          placeholder.style.textAlign = "center";
          placeholder.style.color = "var(--text-muted)";
          placeholder.style.padding = "60px 0";
          placeholder.textContent = '点击"添加桌子"开始创建座位图';
          container.appendChild(placeholder);
          return;
        }

        for (var i = 0; i < tables.length; i++) {
          var tableEl = createTableElement(tables[i]);
          container.appendChild(tableEl);
        }
      }

      // Create table element
      function createTableElement(table) {
        var group = document.createElement("div");
        group.className = "table-group";

        var label = document.createElement("div");
        label.className = "table-label";
        label.textContent = table.name;
        group.appendChild(label);

        var shape = document.createElement("div");
        shape.className = "table-shape";

        if (table.type === "round") {
          shape.appendChild(createRoundTable(table));
        } else {
          shape.appendChild(createRectTable(table));
        }

        group.appendChild(shape);

        // Remove button
        var removeBtn = document.createElement("button");
        removeBtn.className = "btn-remove-table no-print";
        removeBtn.textContent = "删除桌子";
        removeBtn.addEventListener("click", function () {
          removeTable(table.id);
        });
        group.appendChild(removeBtn);

        return group;
      }

      // Create round table
      function createRoundTable(table) {
        var tableEl = document.createElement("div");
        tableEl.className = "table-round";

        var seatCount = table.seats.length;
        var radius = 100; // px from center
        var angleStep = (2 * Math.PI) / seatCount;

        for (var i = 0; i < seatCount; i++) {
          var angle = angleStep * i - Math.PI / 2; // Start from top
          var x = 100 + radius * Math.cos(angle);
          var y = 100 + radius * Math.sin(angle);

          var seat = createSeatElement(table, i);
          seat.style.left = x + "px";
          seat.style.top = y + "px";
          tableEl.appendChild(seat);
        }

        return tableEl;
      }

      // Create rectangle table
      function createRectTable(table) {
        var wrapper = document.createElement("div");
        wrapper.className = "table-rect";

        var seatCount = table.seats.length;
        var seatsPerSide = Math.ceil(seatCount / 2);

        // Top row
        var topRow = document.createElement("div");
        topRow.className = "table-seats-row";
        for (var i = 0; i < seatsPerSide && i < seatCount; i++) {
          topRow.appendChild(createSeatElement(table, i));
        }
        wrapper.appendChild(topRow);

        // Table body
        var body = document.createElement("div");
        body.className = "table-rect-body";
        wrapper.appendChild(body);

        // Bottom row
        var bottomRow = document.createElement("div");
        bottomRow.className = "table-seats-row";
        for (var i = seatsPerSide; i < seatCount; i++) {
          bottomRow.appendChild(createSeatElement(table, i));
        }
        wrapper.appendChild(bottomRow);

        return wrapper;
      }

      // Create seat element
      function createSeatElement(table, seatIndex) {
        var seatData = table.seats[seatIndex];
        var seat = document.createElement("div");
        seat.className = "seat" + (seatData.name ? " occupied" : "");

        var number = document.createElement("div");
        number.className = "seat-number";
        number.textContent = seatData.number;
        seat.appendChild(number);

        var name = document.createElement("div");
        name.className = "seat-name";
        name.textContent = seatData.name || "空";
        seat.appendChild(name);

        seat.addEventListener("click", function () {
          openSeatModal(table.id, seatIndex);
        });

        return seat;
      }

      // Open seat modal
      function openSeatModal(tableId, seatIndex) {
        currentSeat = { tableId: tableId, seatIndex: seatIndex };

        // Find current name
        var table = tables.find(function (t) {
          return t.id === tableId;
        });
        var currentName = table.seats[seatIndex].name;

        document.getElementById("seatPersonName").value = currentName;
        document.getElementById("seatModal").classList.add("show");
        document.getElementById("seatPersonName").focus();
      }

      // Close modal
      function closeModal() {
        document.getElementById("seatModal").classList.remove("show");
        currentSeat = null;
      }

      // Assign seat
      function assignSeat() {
        if (!currentSeat) return;

        var name = document.getElementById("seatPersonName").value.trim();
        var table = tables.find(function (t) {
          return t.id === currentSeat.tableId;
        });

        if (table) {
          table.seats[currentSeat.seatIndex].name = name;
          renderTables();
          updateStats();
          saveToStorage();
        }

        closeModal();
      }

      // Clear seat
      function clearSeat() {
        document.getElementById("seatPersonName").value = "";
        assignSeat();
      }

      // Update stats
      function updateStats() {
        var totalSeats = 0;
        var assignedSeats = 0;

        for (var i = 0; i < tables.length; i++) {
          var seats = tables[i].seats;
          totalSeats += seats.length;
          for (var j = 0; j < seats.length; j++) {
            if (seats[j].name) assignedSeats++;
          }
        }

        document.getElementById("tableCount").textContent = tables.length;
        document.getElementById("totalSeats").textContent = totalSeats;
        document.getElementById("assignedSeats").textContent = assignedSeats;
      }

      // Debounce function
      function debounce(func, wait) {
        var timeout;
        return function () {
          var context = this;
          var args = arguments;
          var later = function () {
            clearTimeout(timeout);
            func.apply(context, args);
          };
          clearTimeout(timeout);
          timeout = setTimeout(later, wait);
        };
      }

      // Print chart
      function printChart() {
        var eventName = document.getElementById("eventName").value || "座位安排";
        document.getElementById("printEventName").textContent = eventName;
        window.print();
      }

      // Clear all
      function clearAll() {
        if (!confirm("确定要清空所有内容吗？")) return;

        document.getElementById("eventName").value = "";
        tables = [];
        tableIdCounter = 0;

        renderTables();
        updateStats();

        localStorage.removeItem(LS_KEY);

        showToast("已清空");
      }

      // Save to localStorage
      function saveToStorage() {
        var data = {
          eventName: document.getElementById("eventName").value,
          tables: tables,
          tableIdCounter: tableIdCounter
        };

        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      // Load from localStorage
      function loadFromStorage() {
        var saved = localStorage.getItem(LS_KEY);
        if (!saved) return;

        try {
          var data = JSON.parse(saved);

          document.getElementById("eventName").value = data.eventName || "";
          tables = data.tables || [];
          tableIdCounter = data.tableIdCounter || 0;
        } catch (e) {
          console.error("Failed to load saved data:", e);
        }
      }

      // Theme toggle
      function toggleTheme() {
        var body = document.body;
        var isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      // Load theme
      function loadTheme() {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      }

      // Show toast
      function showToast(msg) {
        var toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      // Handle Enter key in modal
      document.getElementById("seatPersonName").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          assignSeat();
        }
      });

      // Initialize on load
      init();
    </script>
  </body>
</html>

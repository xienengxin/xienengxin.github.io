      <h1>工时计算器</h1>
      <p class="subtitle">计算工作时长、加班时间、时薪收入</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('calc')" aria-label="快速计算">
          快速计算
        </button>
        <button class="tab" onclick="switchTab('records')" aria-label="打卡记录">打卡记录</button>
        <button class="tab" onclick="switchTab('salary')" aria-label="时薪计算">时薪计算</button>
      </div>

      <div id="calcTab" class="tab-content active">
        <div class="card">
          <div class="card-title">⏰ 工作时间</div>
          <div class="quick-calc">
            <button
              class="quick-btn"
              onclick="setQuickTime('09:00', '18:00')"
              aria-label="标准 9-18"
            >
              标准 9-18
            </button>
            <button class="quick-btn" onclick="setQuickTime('09:00', '21:00')" aria-label="996">
              996
            </button>
            <button
              class="quick-btn"
              onclick="setQuickTime('10:00', '19:00')"
              aria-label="弹性 10-19"
            >
              弹性 10-19
            </button>
            <button class="quick-btn" onclick="setQuickTime('09:00', '17:30')" aria-label="早下班">
              早下班
            </button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-----">上班时间</label>
              <input
                type="time"
                id="startTime"
                value="09:00"
                onchange="calculateHours()"
                aria-label="输入框"
              />
            </div>
            <div class="form-group">
              <label for="input-----">下班时间</label>
              <input
                type="time"
                id="endTime"
                value="18:00"
                onchange="calculateHours()"
                aria-label="输入框"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input----------">午休时长 (小时)</label>
              <input
                type="number"
                id="lunchBreak"
                value="1"
                min="0"
                max="3"
                step="0.5"
                onchange="calculateHours()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input----------">标准工时 (小时)</label>
              <input
                type="number"
                id="standardHours"
                value="8"
                min="1"
                max="12"
                onchange="calculateHours()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
        </div>

        <div class="card result-card">
          <div class="card-title">📊 计算结果</div>
          <div class="result-grid">
            <div class="result-item highlight">
              <div class="result-label">实际工作时长</div>
              <div class="result-value" id="totalHours">8.0 小时</div>
            </div>
            <div class="result-item">
              <div class="result-label">加班时长</div>
              <div class="result-value" id="overtimeHours" style="color: var(--accent-orange)">
                0.0 小时
              </div>
            </div>
            <div class="result-item">
              <div class="result-label">工作状态</div>
              <div class="result-value" id="workStatus" style="color: var(--accent-green)">
                正常
              </div>
            </div>
          </div>
        </div>

        <button
          class="quick-btn"
          style="width: 100%; padding: 1rem; font-size: 1rem"
          onclick="saveRecord()"
        >
          💾 保存今日打卡记录
        </button>
      </div>

      <div id="recordsTab" class="tab-content">
        <div class="card">
          <div class="card-title">📅 本周打卡记录</div>
          <div class="records-list" id="recordsList">
            <div class="empty-state">暂无打卡记录</div>
          </div>

          <div class="weekly-summary" id="weeklySummary" style="display: none">
            <div class="weekly-row">
              <span class="weekly-label">本周总工时</span>
              <span class="weekly-value" id="weeklyTotal">0 小时</span>
            </div>
            <div class="weekly-row">
              <span class="weekly-label">本周加班</span>
              <span class="weekly-value" id="weeklyOvertime" style="color: var(--accent-orange)">
                0 小时
              </span>
            </div>
            <div class="weekly-row">
              <span class="weekly-label">日均工时</span>
              <span class="weekly-value" id="dailyAverage">0 小时</span>
            </div>
          </div>
        </div>

        <button class="quick-btn" style="width: 100%; padding: 1rem" onclick="clearRecords()">
          🗑️ 清空所有记录
        </button>
      </div>

      <div id="salaryTab" class="tab-content">
        <div class="card">
          <div class="card-title">💰 薪资信息</div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-------">月薪 (元)</label>
              <input
                type="number"
                id="monthlySalary"
                value="15000"
                min="0"
                oninput="calculateSalary()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input------">每月工作日</label>
              <input
                type="number"
                id="workDays"
                value="22"
                min="1"
                max="31"
                oninput="calculateSalary()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-----">每日工时</label>
              <input
                type="number"
                id="dailyHours"
                value="8"
                min="1"
                max="16"
                oninput="calculateSalary()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="form-group">
              <label for="input-----">加班倍率</label>
              <input
                type="number"
                id="overtimeRate"
                value="1.5"
                min="1"
                max="3"
                step="0.5"
                oninput="calculateSalary()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
        </div>

        <div class="card result-card">
          <div class="card-title">📊 薪资明细</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">日薪</div>
              <div class="result-value" id="dailySalary">¥0</div>
            </div>
            <div class="result-item">
              <div class="result-label">时薪</div>
              <div class="result-value" id="hourlySalary">¥0</div>
            </div>
            <div class="result-item">
              <div class="result-label">加班时薪</div>
              <div class="result-value" id="overtimeSalary" style="color: var(--accent-orange)">
                ¥0
              </div>
            </div>
            <div class="result-item">
              <div class="result-label">分钟薪资</div>
              <div class="result-value" id="minuteSalary">¥0</div>
            </div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let records = JSON.parse(localStorage.getItem("work_records") || "[]");

      function switchTab(tab) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));

        document
          .querySelector(`.tab:nth-child(${tab === "calc" ? 1 : tab === "records" ? 2 : 3})`)
          .classList.add("active");
        document.getElementById(tab + "Tab").classList.add("active");

        if (tab === "records") renderRecords();
        if (tab === "salary") calculateSalary();
      }

      function setQuickTime(start, end) {
        document.getElementById("startTime").value = start;
        document.getElementById("endTime").value = end;
        calculateHours();
      }

      function timeToMinutes(time) {
        const [hours, minutes] = time.split(":").map(Number);
        return hours * 60 + minutes;
      }

      function calculateHours() {
        const startTime = document.getElementById("startTime").value;
        const endTime = document.getElementById("endTime").value;
        const lunchBreak = parseFloat(document.getElementById("lunchBreak").value) || 0;
        const standardHours = parseFloat(document.getElementById("standardHours").value) || 8;

        let startMinutes = timeToMinutes(startTime);
        let endMinutes = timeToMinutes(endTime);

        // Handle overnight work
        if (endMinutes < startMinutes) {
          endMinutes += 24 * 60;
        }

        const totalMinutes = endMinutes - startMinutes - lunchBreak * 60;
        const totalHours = totalMinutes / 60;
        const overtime = Math.max(0, totalHours - standardHours);

        document.getElementById("totalHours").textContent = totalHours.toFixed(1) + " 小时";
        document.getElementById("overtimeHours").textContent = overtime.toFixed(1) + " 小时";

        const statusEl = document.getElementById("workStatus");
        if (overtime > 0) {
          statusEl.textContent = "加班中";
          statusEl.style.color = "var(--accent-orange)";
        } else if (totalHours < standardHours) {
          statusEl.textContent = "工时不足";
          statusEl.style.color = "var(--color-accent-cyan)";
        } else {
          statusEl.textContent = "正常";
          statusEl.style.color = "var(--accent-green)";
        }

        return { totalHours, overtime };
      }

      function saveRecord() {
        const startTime = document.getElementById("startTime").value;
        const endTime = document.getElementById("endTime").value;
        const { totalHours, overtime } = calculateHours();

        const today = new Date().toISOString().split("T")[0];

        // Check if record for today already exists
        const existingIndex = records.findIndex((r) => r.date === today);
        if (existingIndex >= 0) {
          if (!confirm("今日已有记录，是否覆盖？")) return;
          records[existingIndex] = { date: today, startTime, endTime, totalHours, overtime };
        } else {
          records.push({ date: today, startTime, endTime, totalHours, overtime });
        }

        records.sort((a, b) => b.date.localeCompare(a.date));
        localStorage.setItem("work_records", JSON.stringify(records));
        alert("打卡记录已保存！");
      }

      function deleteRecord(index) {
        records.splice(index, 1);
        localStorage.setItem("work_records", JSON.stringify(records));
        renderRecords();
      }

      function clearRecords() {
        if (confirm("确定要清空所有打卡记录吗？")) {
          records = [];
          localStorage.removeItem("work_records");
          renderRecords();
        }
      }

      function renderRecords() {
        const list = document.getElementById("recordsList");
        const summary = document.getElementById("weeklySummary");

        if (records.length === 0) {
          list.innerHTML = '<div class="empty-state">暂无打卡记录</div>';
          summary.style.display = "none";
          return;
        }

        list.innerHTML = records
          .slice(0, 14)
          .map((r, i) => {
            const date = new Date(r.date);
            const weekday = ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
            return `
          <div class="record-item">
            <span class="record-date">${r.date.slice(5)}<br>周${weekday}</span>
            <span class="record-times">${r.startTime} - ${r.endTime}</span>
            <span class="record-hours ${r.overtime > 0 ? "overtime" : ""}">${r.totalHours.toFixed(1)}h</span>
            <button class="delete-btn" onclick="deleteRecord(${i})" aria-label="×">×</button>
          </div>
        `;
          })
          .join("");

        // Calculate weekly summary (last 7 days)
        const now = new Date();
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        const weekRecords = records.filter((r) => new Date(r.date) >= weekAgo);

        if (weekRecords.length > 0) {
          const totalHours = weekRecords.reduce((sum, r) => sum + r.totalHours, 0);
          const totalOvertime = weekRecords.reduce((sum, r) => sum + r.overtime, 0);

          document.getElementById("weeklyTotal").textContent = totalHours.toFixed(1) + " 小时";
          document.getElementById("weeklyOvertime").textContent =
            totalOvertime.toFixed(1) + " 小时";
          document.getElementById("dailyAverage").textContent =
            (totalHours / weekRecords.length).toFixed(1) + " 小时";
          summary.style.display = "block";
        } else {
          summary.style.display = "none";
        }
      }

      function calculateSalary() {
        const monthly = parseFloat(document.getElementById("monthlySalary").value) || 0;
        const workDays = parseFloat(document.getElementById("workDays").value) || 22;
        const dailyHours = parseFloat(document.getElementById("dailyHours").value) || 8;
        const overtimeRate = parseFloat(document.getElementById("overtimeRate").value) || 1.5;

        const daily = monthly / workDays;
        const hourly = daily / dailyHours;
        const overtimeHourly = hourly * overtimeRate;
        const minute = hourly / 60;

        document.getElementById("dailySalary").textContent = "¥" + daily.toFixed(2);
        document.getElementById("hourlySalary").textContent = "¥" + hourly.toFixed(2);
        document.getElementById("overtimeSalary").textContent = "¥" + overtimeHourly.toFixed(2);
        document.getElementById("minuteSalary").textContent = "¥" + minute.toFixed(2);
      }

      // Initialize
      calculateHours();
      calculateSalary();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>

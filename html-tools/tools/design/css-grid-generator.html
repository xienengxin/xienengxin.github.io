  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS Grid 生成器</h1>
      <p class="desc">可视化创建 CSS Grid 网格布局</p>

      <div class="card">
        <div class="presets">
          <button class="preset" onclick="applyPreset('equal3')" aria-label="3等分">3等分</button>
          <button class="preset" onclick="applyPreset('equal4')" aria-label="4等分">4等分</button>
          <button class="preset" onclick="applyPreset('sidebar')" aria-label="侧边栏">
            侧边栏
          </button>
          <button class="preset" onclick="applyPreset('holy')" aria-label="圣杯布局">
            圣杯布局
          </button>
          <button class="preset" onclick="applyPreset('masonry')" aria-label="瀑布流">
            瀑布流
          </button>
        </div>

        <div class="controls-row">
          <div class="control-item">
            <label for="input----">列数:</label>
            <input
              type="number"
              id="columns"
              value="3"
              min="1"
              max="12"
              onchange="updateGrid()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="control-item">
            <label for="input----">行数:</label>
            <input
              type="number"
              id="rows"
              value="3"
              min="1"
              max="12"
              onchange="updateGrid()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="control-item">
            <label for="input-----">列间距:</label>
            <input
              type="number"
              id="colGap"
              value="16"
              min="0"
              max="50"
              onchange="updateGrid()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            px
          </div>
          <div class="control-item">
            <label for="input-----">行间距:</label>
            <input
              type="number"
              id="rowGap"
              value="16"
              min="0"
              max="50"
              onchange="updateGrid()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            px
          </div>
        </div>

        <div class="controls-row">
          <div class="control-item">
            <label>列模板:</label>
            <select id="colTemplate" onchange="updateGrid()" style="width: 150px">
              <option value="equal">等分 (1fr)</option>
              <option value="auto">自动 (auto)</option>
              <option value="minmax">响应式 (minmax)</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="control-item">
            <label>行模板:</label>
            <select id="rowTemplate" onchange="updateGrid()" style="width: 150px">
              <option value="equal">等分 (1fr)</option>
              <option value="auto">自动 (auto)</option>
              <option value="minmax">响应式 (minmax)</option>
            </select>
          </div>
        </div>

        <div class="preview-container">
          <div class="grid-container" id="gridContainer"></div>
        </div>

        <div class="output">
          <textarea id="cssOutput" readonly></textarea>
          <div class="btn-row">
            <button class="btn primary" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
            <button class="btn" onclick="resetGrid()" aria-label="重置">重置</button>

        <a href="../../index.html">WebUtils</a>
      </footer>

    <script>
      const containerEl = document.getElementById("gridContainer");
      const outputEl = document.getElementById("cssOutput");
      const statusEl = document.getElementById("status");
      const colors = [
        "#667eea",
        "#764ba2",
        "#f093fb",
        "#f5576c",
        "#4facfe",
        "#43e97b",
        "#fa709a",
        "#fee140",
        "#a8edea",
        "#ff9a9e",
        "#ffecd2",
        "#fcb69f"
      ];

      function getTemplateValue(type, count) {
        switch (type) {
          case "equal":
            return `repeat(${count}, 1fr)`;
          case "auto":
            return `repeat(${count}, auto)`;
          case "minmax":
            return `repeat(auto-fit, minmax(150px, 1fr))`;
          case "custom":
            return `repeat(${count}, 1fr)`;
          default:
            return `repeat(${count}, 1fr)`;
        }
      }

      function updateGrid() {
        const cols = parseInt(document.getElementById("columns").value) || 3;
        const rows = parseInt(document.getElementById("rows").value) || 3;
        const colGap = document.getElementById("colGap").value;
        const rowGap = document.getElementById("rowGap").value;
        const colType = document.getElementById("colTemplate").value;
        const rowType = document.getElementById("rowTemplate").value;

        const colTemplate = getTemplateValue(colType, cols);
        const rowTemplate = getTemplateValue(rowType, rows);

        containerEl.style.display = "grid";
        containerEl.style.gridTemplateColumns = colTemplate;
        containerEl.style.gridTemplateRows = rowTemplate;
        containerEl.style.columnGap = colGap + "px";
        containerEl.style.rowGap = rowGap + "px";

        const itemCount = cols * rows;
        containerEl.innerHTML = "";
        for (let i = 0; i < itemCount; i++) {
          const item = document.createElement("div");
          item.className = "grid-item";
          item.style.background = colors[i % colors.length];
          item.textContent = i + 1;
          item.style.minHeight = "80px";
          containerEl.appendChild(item);
        }

        const css = `.container {
  display: grid;
  grid-template-columns: ${colTemplate};
  grid-template-rows: ${rowTemplate};
  column-gap: ${colGap}px;
  row-gap: ${rowGap}px;
}`;
        outputEl.value = css;
      }

      function applyPreset(name) {
        switch (name) {
          case "equal3":
            document.getElementById("columns").value = 3;
            document.getElementById("rows").value = 2;
            document.getElementById("colTemplate").value = "equal";
            break;
          case "equal4":
            document.getElementById("columns").value = 4;
            document.getElementById("rows").value = 2;
            document.getElementById("colTemplate").value = "equal";
            break;
          case "sidebar":
            document.getElementById("columns").value = 2;
            document.getElementById("rows").value = 1;
            document.getElementById("colTemplate").value = "custom";
            break;
          case "holy":
            document.getElementById("columns").value = 3;
            document.getElementById("rows").value = 3;
            document.getElementById("colTemplate").value = "custom";
            break;
          case "masonry":
            document.getElementById("columns").value = 4;
            document.getElementById("rows").value = 3;
            document.getElementById("colTemplate").value = "minmax";
            break;
        }
        updateGrid();
      }

      function resetGrid() {
        document.getElementById("columns").value = 3;
        document.getElementById("rows").value = 3;
        document.getElementById("colGap").value = 16;
        document.getElementById("rowGap").value = 16;
        document.getElementById("colTemplate").value = "equal";
        document.getElementById("rowTemplate").value = "equal";
        updateGrid();
      }

      function copyCSS() {
        navigator.clipboard.writeText(outputEl.value).then(() => {
          statusEl.textContent = "已复制到剪贴板";
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      updateGrid();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

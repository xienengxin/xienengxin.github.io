      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */

        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);

        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;

        /* 间距尺度 */

        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;

        /* 圆角 */
        --radius-full: 9999px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);

        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);

        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;

        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;

      }

      [data-theme="light"] {
        --bg-deep: #fafafa;

        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

        box-sizing: border-box;

        font-family: system-ui, sans-serif;

      .theme-toggle {

      }
      .preview-area {
        height: 300px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        perspective: 1000px;
      }
      .preview-box {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;

      .controls {
        display: grid;

        display: flex;

      }

        width: 100%;

      .btn {

      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;

        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS Transform 生成器</h1>
      <p class="desc">可视化生成 CSS transform 变换效果</p>

      <div class="card">
        <div class="preview-area">
          <div class="preview-box" id="previewBox">Transform</div>
        </div>

        <div class="controls">
          <div class="control-group">
            <label>
              旋转 (rotate):
              <span class="value" id="rotateVal">0deg</span>
            </label>
            <input
              type="range"
              id="rotate"
              min="-180"
              max="180"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              X轴旋转 (rotateX):
              <span class="value" id="rotateXVal">0deg</span>
            </label>
            <input
              type="range"
              id="rotateX"
              min="-180"
              max="180"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              Y轴旋转 (rotateY):
              <span class="value" id="rotateYVal">0deg</span>
            </label>
            <input
              type="range"
              id="rotateY"
              min="-180"
              max="180"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              缩放 (scale):
              <span class="value" id="scaleVal">1</span>
            </label>
            <input
              type="range"
              id="scale"
              min="0.1"
              max="2"
              step="0.1"
              value="1"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              X轴倾斜 (skewX):
              <span class="value" id="skewXVal">0deg</span>
            </label>
            <input
              type="range"
              id="skewX"
              min="-45"
              max="45"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              Y轴倾斜 (skewY):
              <span class="value" id="skewYVal">0deg</span>
            </label>
            <input
              type="range"
              id="skewY"
              min="-45"
              max="45"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              X轴平移 (translateX):
              <span class="value" id="translateXVal">0px</span>
            </label>
            <input
              type="range"
              id="translateX"
              min="-100"
              max="100"
              value="0"
              oninput="updateTransform()"
            />
          </div>
          <div class="control-group">
            <label>
              Y轴平移 (translateY):
              <span class="value" id="translateYVal">0px</span>
            </label>
            <input
              type="range"
              id="translateY"
              min="-100"
              max="100"
              value="0"
              oninput="updateTransform()"
            />
          </div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <div class="btn-row">
            <button class="btn" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
            <button class="btn" onclick="resetTransform()" aria-label="重置">重置</button>
          </div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function updateTransform() {
        const rotate = document.getElementById("rotate").value;
        const rotateX = document.getElementById("rotateX").value;
        const rotateY = document.getElementById("rotateY").value;
        const scale = document.getElementById("scale").value;
        const skewX = document.getElementById("skewX").value;
        const skewY = document.getElementById("skewY").value;
        const translateX = document.getElementById("translateX").value;
        const translateY = document.getElementById("translateY").value;

        document.getElementById("rotateVal").textContent = rotate + "deg";
        document.getElementById("rotateXVal").textContent = rotateX + "deg";
        document.getElementById("rotateYVal").textContent = rotateY + "deg";
        document.getElementById("scaleVal").textContent = scale;
        document.getElementById("skewXVal").textContent = skewX + "deg";
        document.getElementById("skewYVal").textContent = skewY + "deg";
        document.getElementById("translateXVal").textContent = translateX + "px";
        document.getElementById("translateYVal").textContent = translateY + "px";

        const transforms = [];
        if (translateX !== "0" || translateY !== "0")
          transforms.push(`translate(${translateX}px, ${translateY}px)`);
        if (rotate !== "0") transforms.push(`rotate(${rotate}deg)`);
        if (rotateX !== "0") transforms.push(`rotateX(${rotateX}deg)`);
        if (rotateY !== "0") transforms.push(`rotateY(${rotateY}deg)`);
        if (scale !== "1") transforms.push(`scale(${scale})`);
        if (skewX !== "0") transforms.push(`skewX(${skewX}deg)`);
        if (skewY !== "0") transforms.push(`skewY(${skewY}deg)`);

        const transformValue = transforms.length > 0 ? transforms.join(" ") : "none";
        document.getElementById("previewBox").style.transform = transformValue;
        document.getElementById("output").value = `transform: ${transformValue};`;
      }

      function resetTransform() {
        document.getElementById("rotate").value = 0;
        document.getElementById("rotateX").value = 0;
        document.getElementById("rotateY").value = 0;
        document.getElementById("scale").value = 1;
        document.getElementById("skewX").value = 0;
        document.getElementById("skewY").value = 0;
        document.getElementById("translateX").value = 0;
        document.getElementById("translateY").value = 0;
        updateTransform();
      }

      function copyCSS() {
        navigator.clipboard.writeText(document.getElementById("output").value);
      }

      updateTransform();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>

    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {

        --color-bg-surface: var(--bg-surface, #12121a);

        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);

        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */

        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;

        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);

        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);

        --pico-primary: var(--accent-cyan, #00f5d4);

        --pico-primary-inverse: #0a0a0f;

        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {

      }

      :root {

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS 渐变生成器</h1>
      <p class="desc">可视化创建漂亮的 CSS 渐变背景</p>

      <div class="card">
        <div class="presets" id="presets"></div>
        <div class="preview" id="preview"></div>

        <div class="controls">
          <div class="control-row">
            <label>类型</label>
            <select id="gradientType">
              <option value="linear">线性渐变</option>
              <option value="radial">径向渐变</option>
              <option value="conic">锥形渐变</option>
            </select>
            <label for="input---">角度</label>
            <input
              type="number"
              id="angle"
              value="90"
              min="0"
              max="360"
              style="width: 80px"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            °
          </div>

          <div class="color-stops" id="colorStops"></div>

          <div class="btn-row">
            <button class="btn" onclick="addColorStop()" aria-label="+ 添加颜色">+ 添加颜色</button>
            <button class="btn" onclick="randomGradient()" aria-label="随机生成">随机生成</button>
          </div>
        </div>

        <div class="output">
          <label>CSS 代码</label>
          <textarea id="cssOutput" readonly></textarea>
          <div class="btn-row">
            <button class="btn primary" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      let colorStops = [
        { color: "#667eea", position: 0 },
        { color: "#764ba2", position: 100 }
      ];

      const presets = [
        ["#667eea", "#764ba2"],
        ["#f093fb", "#f5576c"],
        ["#4facfe", "#00f2fe"],
        ["#43e97b", "#38f9d7"],
        ["#fa709a", "#fee140"],
        ["#a8edea", "#fed6e3"],
        ["#ff9a9e", "#fecfef"],
        ["#ffecd2", "#fcb69f"]
      ];

      const presetEl = document.getElementById("presets");
      const previewEl = document.getElementById("preview");
      const stopsEl = document.getElementById("colorStops");
      const typeEl = document.getElementById("gradientType");
      const angleEl = document.getElementById("angle");
      const outputEl = document.getElementById("cssOutput");
      const statusEl = document.getElementById("status");

      function renderPresets() {
        presetEl.innerHTML = "";
        presets.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "preset";
          div.style.background = `linear-gradient(90deg, ${p[0]}, ${p[1]})`;
          div.onclick = () => {
            colorStops = p.map((c, j) => ({ color: c, position: j === 0 ? 0 : 100 }));
            render();
          };
          presetEl.appendChild(div);
        });
      }

      function renderColorStops() {
        stopsEl.innerHTML = "";
        colorStops.forEach((stop, i) => {
          const div = document.createElement("div");
          div.className = "color-stop";
          div.innerHTML = `
          <input type="color" value="${stop.color}" onchange="updateStop(${i}, 'color', this.value)" aria-label="颜色选择器">
          <input type="number" value="${stop.position}" min="0" max="100" style="width:70px" onchange="updateStop(${i}, 'position', this.value)" aria-label="数字输入框" placeholder="请输入数字输入框"> %
          ${colorStops.length > 2 ? `<button class="btn danger" onclick="removeStop(${i})" aria-label="×">×</button>` : ""}
        `;
          stopsEl.appendChild(div);
        });
      }

      function updateStop(index, key, value) {
        colorStops[index][key] = key === "position" ? parseInt(value) : value;
        updatePreview();
      }

      function addColorStop() {
        const lastPos = colorStops[colorStops.length - 1].position;
        colorStops.push({
          color:
            "#" +
            Math.floor(Math.random() * 16777215)
              .toString(16)
              .padStart(6, "0"),
          position: Math.min(lastPos + 20, 100)
        });
        render();
      }

      function removeStop(index) {
        if (colorStops.length > 2) {
          colorStops.splice(index, 1);
          render();
        }
      }

      function randomGradient() {
        const randomColor = () =>
          "#" +
          Math.floor(Math.random() * 16777215)
            .toString(16)
            .padStart(6, "0");
        colorStops = [
          { color: randomColor(), position: 0 },
          { color: randomColor(), position: 100 }
        ];
        angleEl.value = Math.floor(Math.random() * 360);
        render();
      }

      function generateCSS() {
        const type = typeEl.value;
        const angle = angleEl.value;
        const stops = colorStops.map((s) => `${s.color} ${s.position}%`).join(", ");

        if (type === "linear") {
          return `linear-gradient(${angle}deg, ${stops})`;
        } else if (type === "radial") {
          return `radial-gradient(circle, ${stops})`;
        } else {
          return `conic-gradient(from ${angle}deg, ${stops})`;
        }
      }

      function updatePreview() {
        const css = generateCSS();
        previewEl.style.background = css;
        outputEl.value = `background: ${css};`;
      }

      function render() {
        renderColorStops();
        updatePreview();
      }

      function copyCSS() {
        navigator.clipboard.writeText(outputEl.value).then(() => {
          statusEl.textContent = "已复制到剪贴板";
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      typeEl.addEventListener("change", updatePreview);
      angleEl.addEventListener("input", updatePreview);

      renderPresets();
      render();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

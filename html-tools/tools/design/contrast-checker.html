        --color-error: var(--accent-red, #f43f5e);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;

        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);

      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;

        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(168, 85, 247, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(168, 85, 247, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        flex-wrap: wrap;
      }

      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-purple);
      }

      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }

      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }

      .title-section {
        flex: 1;
      }

      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .title-section h1 .icon {
        font-size: 1.8rem;
      }

      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .main-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        flex: 1;
      }

      @media (max-width: 900px) {
        .main-content {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px;
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .panel-title {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .preview-area {
        flex: 1;
        min-height: 300px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .preview-box {
        width: 200px;
        height: 200px;
        background: linear-gradient(135deg, var(--color-accent-purple), var(--color-accent-cyan));
        border-radius: var(--radius-md);
        transition: all 0.3s ease;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .control-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .control-value {
        color: var(--color-accent-purple);
        font-weight: 500;
      }

      input[type="range"] {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        appearance: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--color-accent-purple);
        cursor: pointer;
        border: 2px solid var(--color-bg-deep);
        box-shadow: 0 2px 6px rgba(168, 85, 247, 0.3);
      }

      input[type="color"] {
        width: 100%;
        height: 40px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--bg-input);
        cursor: pointer;
        padding: 4px;
      }

      input[type="text"],
      select {
        width: 100%;
        padding: 10px 14px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: var(--color-accent-purple);
      }

      .code-output {
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-accent-cyan);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }

      .btn {
        flex: 1;
        padding: 12px 20px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--color-accent-purple), var(--color-accent-cyan));
        color: var(--color-bg-deep);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px var(--glow-purple);
      }

      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        border-color: var(--color-accent-purple);
        color: var(--color-accent-purple);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: var(--color-bg-deep);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .container {
          padding: 16px;
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .btn-row {
          flex-direction: column;
        }
      }
    </style>

  <body>
    <div class="bg-grid"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
      🌓

    <div class="container">

        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>

          <span class="breadcrumb-current">对比度检查器</span>
        </nav>
        <div class="title-section">
          <h1>
            <span class="icon">🔍</span>
            对比度检查器
          </h1>
          <p>检查文本与背景颜色的 WCAG 对比度</p>
        </div>
      </header>

      <main class="main-content">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">预览</span>
          </div>
          <div class="preview-area">
            <div class="preview-box" id="preview"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">控制</span>
          </div>
          <div class="controls">
            <div class="control-group">
              <label class="control-label">
                <span>主色调</span>
              </label>
              <input
                type="color"
                id="color1"
                value="#a855f7"
                onchange="updatePreview()"
                aria-label="颜色选择器"
              />
            </div>
            <div class="control-group">
              <label class="control-label">
                <span>辅助色</span>
              </label>
              <input
                type="color"
                id="color2"
                value="#00f5d4"
                onchange="updatePreview()"
                aria-label="颜色选择器"
              />
            </div>
            <div class="control-group">
              <label class="control-label">
                <span>大小</span>
                <span class="control-value" id="sizeValue">200px</span>
              </label>
              <input
                type="range"
                id="size"
                min="50"
                max="300"
                value="200"
                oninput="updatePreview()"
              />
            </div>
            <div class="control-group">
              <label class="control-label">
                <span>圆角</span>
                <span class="control-value" id="radiusValue">8px</span>
              </label>
              <input
                type="range"
                id="radius"
                min="0"
                max="150"
                value="8"
                oninput="updatePreview()"
              />
            </div>
          </div>

          <div class="panel-header" style="margin-top: 20px">
            <span class="panel-title">CSS 代码</span>
          </div>
          <div class="code-output" id="codeOutput"></div>

          <div class="btn-row">
            <button class="btn btn-primary" onclick="copyCode()" aria-label="📋 复制代码">
              📋 复制代码
            </button>
            <button class="btn btn-secondary" onclick="resetAll()" aria-label="🔄 重置">
              🔄 重置
            </button>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
      // 主题切换
      function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      // 加载主题
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      // 更新预览
      function updatePreview() {
        const color1 = document.getElementById("color1").value;
        const color2 = document.getElementById("color2").value;
        const size = document.getElementById("size").value;
        const radius = document.getElementById("radius").value;

        document.getElementById("sizeValue").textContent = size + "px";
        document.getElementById("radiusValue").textContent = radius + "px";

        const preview = document.getElementById("preview");
        preview.style.width = size + "px";
        preview.style.height = size + "px";
        preview.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
        preview.style.borderRadius = radius + "px";

        updateCode();
      }

      // 更新代码
      function updateCode() {
        const color1 = document.getElementById("color1").value;
        const color2 = document.getElementById("color2").value;
        const size = document.getElementById("size").value;
        const radius = document.getElementById("radius").value;

        const css = `.element {
  width: ${size}px;
  height: ${size}px;
  background: linear-gradient(135deg, ${color1}, ${color2});
  border-radius: ${radius}px;
}`;

        document.getElementById("codeOutput").textContent = css;
      }

      // 复制代码
      function copyCode() {
        const code = document.getElementById("codeOutput").textContent;
        navigator.clipboard.writeText(code).then(() => {
          showToast("已复制到剪贴板");
        });
      }

      // 显示提示
      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // 重置
      function resetAll() {
        document.getElementById("color1").value = "#a855f7";
        document.getElementById("color2").value = "#00f5d4";
        document.getElementById("size").value = 200;
        document.getElementById("radius").value = 8;
        updatePreview();
      }

      // 初始化
      updatePreview();
    </script>
  </body>
</html>

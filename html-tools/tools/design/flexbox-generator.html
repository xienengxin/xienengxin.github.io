      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */

        --color-success: var(--accent-green, #10b981);

        --color-error: var(--accent-red, #f43f5e);

        --color-info: var(--accent-blue, #4cc9f0);

        /* 玻璃拟态 */

        --glass-blur: 24px;

        /* 辉光 */

        --bg-tertiary: var(--bg-card, #1a1a24);

        --pico-color: var(--text-primary, #e8e8ed);

        --pico-primary-focus: rgba(0, 245, 212, 0.25);

        --pico-secondary: var(--text-secondary, #8888a0);

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */

  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS Flexbox 生成器</h1>
      <p class="desc">可视化创建 CSS Flexbox 弹性布局</p>

      <div class="card">
        <div class="items-control">
          <label for="input-------">子元素数量:</label>
          <input
            type="number"
            id="itemCount"
            value="4"
            min="1"
            max="12"
            onchange="updatePreview()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>

        <div class="preview-container">
          <div class="flex-container" id="flexContainer"></div>
        </div>

        <div class="controls-grid">
          <div class="control-group">
            <h4>flex-direction</h4>
            <select id="flexDirection" onchange="updatePreview()">
              <option value="row">row (默认)</option>
              <option value="row-reverse">row-reverse</option>
              <option value="column">column</option>
              <option value="column-reverse">column-reverse</option>
            </select>
          </div>
          <div class="control-group">
            <h4>flex-wrap</h4>
            <select id="flexWrap" onchange="updatePreview()">
              <option value="nowrap">nowrap (默认)</option>
              <option value="wrap">wrap</option>
              <option value="wrap-reverse">wrap-reverse</option>
            </select>
          </div>
          <div class="control-group">
            <h4>justify-content</h4>
            <select id="justifyContent" onchange="updatePreview()">
              <option value="flex-start">flex-start (默认)</option>
              <option value="flex-end">flex-end</option>
              <option value="center">center</option>
              <option value="space-between">space-between</option>
              <option value="space-around">space-around</option>
              <option value="space-evenly">space-evenly</option>
            </select>
          </div>
          <div class="control-group">
            <h4>align-items</h4>
            <select id="alignItems" onchange="updatePreview()">
              <option value="stretch">stretch (默认)</option>
              <option value="flex-start">flex-start</option>
              <option value="flex-end">flex-end</option>
              <option value="center">center</option>
              <option value="baseline">baseline</option>
            </select>
          </div>
          <div class="control-group">
            <h4>align-content</h4>
            <select id="alignContent" onchange="updatePreview()">
              <option value="normal">normal (默认)</option>
              <option value="flex-start">flex-start</option>
              <option value="flex-end">flex-end</option>
              <option value="center">center</option>
              <option value="space-between">space-between</option>
              <option value="space-around">space-around</option>
              <option value="stretch">stretch</option>
            </select>
          </div>
          <div class="control-group">
            <h4>gap</h4>
            <select id="gap" onchange="updatePreview()">
              <option value="0">0</option>
              <option value="8px" selected>8px</option>
              <option value="16px">16px</option>
              <option value="24px">24px</option>
              <option value="32px">32px</option>
            </select>
          </div>
        </div>

        <div class="output">
          <textarea id="cssOutput" readonly></textarea>
          <div class="btn-row">
            <button class="btn primary" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
            <button class="btn" onclick="resetFlex()" aria-label="重置">重置</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const containerEl = document.getElementById("flexContainer");
      const outputEl = document.getElementById("cssOutput");
      const statusEl = document.getElementById("status");

      const colors = [
        "#667eea",
        "#764ba2",
        "#f093fb",
        "#f5576c",
        "#4facfe",
        "#43e97b",
        "#fa709a",
        "#fee140",
        "#a8edea",
        "#ff9a9e",
        "#ffecd2",
        "#fcb69f"
      ];

      function updatePreview() {
        const count = parseInt(document.getElementById("itemCount").value) || 4;
        const direction = document.getElementById("flexDirection").value;
        const wrap = document.getElementById("flexWrap").value;
        const justify = document.getElementById("justifyContent").value;
        const align = document.getElementById("alignItems").value;
        const alignContent = document.getElementById("alignContent").value;
        const gap = document.getElementById("gap").value;

        // 更新容器样式
        containerEl.style.display = "flex";
        containerEl.style.flexDirection = direction;
        containerEl.style.flexWrap = wrap;
        containerEl.style.justifyContent = justify;
        containerEl.style.alignItems = align;
        containerEl.style.alignContent = alignContent;
        containerEl.style.gap = gap;

        // 更新子元素
        containerEl.innerHTML = "";
        for (let i = 0; i < count; i++) {
          const item = document.createElement("div");
          item.className = "flex-item";
          item.style.background = colors[i % colors.length];
          item.textContent = i + 1;
          // 不同尺寸
          if (i % 3 === 1) item.style.padding = "30px";
          if (i % 3 === 2) item.style.padding = "40px";
          containerEl.appendChild(item);
        }

        // 生成 CSS
        const css = `.container {
  display: flex;
  flex-direction: ${direction};
  flex-wrap: ${wrap};
  justify-content: ${justify};
  align-items: ${align};
  align-content: ${alignContent};
  gap: ${gap};
}`;
        outputEl.value = css;
      }

      function resetFlex() {
        document.getElementById("itemCount").value = 4;
        document.getElementById("flexDirection").value = "row";
        document.getElementById("flexWrap").value = "nowrap";
        document.getElementById("justifyContent").value = "flex-start";
        document.getElementById("alignItems").value = "stretch";
        document.getElementById("alignContent").value = "normal";
        document.getElementById("gap").value = "8px";
        updatePreview();
      }

      function copyCSS() {
        navigator.clipboard.writeText(outputEl.value).then(() => {
          statusEl.textContent = "已复制到剪贴板";
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      updatePreview();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

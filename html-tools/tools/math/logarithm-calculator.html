  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>对数计算器</h1>
      <p class="desc">计算各种底数的对数</p>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="setMode('ln', this)" aria-label="自然对数 ln">
            自然对数 ln
          </button>
          <button class="tab" onclick="setMode('log10', this)" aria-label="常用对数 lg">
            常用对数 lg
          </button>
          <button class="tab" onclick="setMode('log2', this)" aria-label="二进制对数">
            二进制对数
          </button>
          <button class="tab" onclick="setMode('custom', this)" aria-label="自定义底">
            自定义底
          </button>
        </div>

        <div class="formula" id="formula">
          ln(x) = log
          <sub>e</sub>
          (x)
        </div>

        <div class="input-group">
          <label for="input----x">真数 x</label>
          <input
            type="number"
            id="x"
            value="10"
            step="any"
            oninput="calculate()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>

        <div class="input-group" id="baseGroup" style="display: none">
          <label for="input----b">底数 b</label>
          <input
            type="number"
            id="base"
            value="2"
            step="any"
            oninput="calculate()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>

        <div class="result">
          <div class="label" id="resultLabel">ln(10) =</div>
          <div class="value" id="resultValue">2.302585</div>
        </div>

        <div class="conversions">
          <h4>其他对数值</h4>
          <div class="conversion-item">
            <span class="name">ln (自然对数)</span>
            <span class="val" id="lnVal">-</span>
          </div>
          <div class="conversion-item">
            <span class="name">lg (常用对数)</span>
            <span class="val" id="lgVal">-</span>
          </div>
          <div class="conversion-item">
            <span class="name">log₂ (二进制)</span>
            <span class="val" id="log2Val">-</span>
          </div>
        </div>

        <div class="reference">
          <h4>对数公式</h4>
          <p>
            <code>
              log
              <sub>b</sub>
              (x) = ln(x) / ln(b)
            </code>
            — 换底公式
          </p>
          <p>
            <code>
              log
              <sub>b</sub>
              (xy) = log
              <sub>b</sub>
              (x) + log
              <sub>b</sub>
              (y)
            </code>
            — 乘法法则
          </p>
          <p>
            <code>
              log
              <sub>b</sub>
              (x/y) = log
              <sub>b</sub>
              (x) - log
              <sub>b</sub>
              (y)
            </code>
            — 除法法则
          </p>
          <p>
            <code>
              log
              <sub>b</sub>
              (x
              <sup>n</sup>
              ) = n·log
              <sub>b</sub>
              (x)
            </code>
            — 幂法则
          </p>
        </div>

    <script>
      let mode = "ln";

      function setMode(m, btn) {
        mode = m;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");

        const baseGroup = document.getElementById("baseGroup");
        const formula = document.getElementById("formula");

        if (m === "ln") {
          baseGroup.style.display = "none";
          formula.innerHTML = "ln(x) = log<sub>e</sub>(x)";
        } else if (m === "log10") {
          baseGroup.style.display = "none";
          formula.innerHTML = "lg(x) = log<sub>10</sub>(x)";
        } else if (m === "log2") {
          baseGroup.style.display = "none";
          formula.innerHTML = "log<sub>2</sub>(x)";
        } else {
          baseGroup.style.display = "block";
          formula.innerHTML = "log<sub>b</sub>(x) = ln(x) / ln(b)";
        }

        calculate();
      }

      function calculate() {
        const x = parseFloat(document.getElementById("x").value);
        const b = parseFloat(document.getElementById("base").value);

        const resultLabel = document.getElementById("resultLabel");
        const resultValue = document.getElementById("resultValue");

        if (isNaN(x) || x <= 0) {
          resultLabel.textContent = "错误";
          resultValue.textContent = "x 必须大于 0";
          return;
        }

        let result;
        let label;

        switch (mode) {
          case "ln":
            result = Math.log(x);
            label = `ln(${x}) =`;
            break;
          case "log10":
            result = Math.log10(x);
            label = `lg(${x}) =`;
            break;
          case "log2":
            result = Math.log2(x);
            label = `log₂(${x}) =`;
            break;
          case "custom":
            if (isNaN(b) || b <= 0 || b === 1) {
              resultLabel.textContent = "错误";
              resultValue.textContent = "底数必须大于 0 且不等于 1";
              return;
            }
            result = Math.log(x) / Math.log(b);
            label = `log${b}(${x}) =`;
            break;
        }

        resultLabel.textContent = label;
        resultValue.textContent = result.toFixed(10).replace(/\.?0+$/, "");

        // Update conversions
        document.getElementById("lnVal").textContent = Math.log(x).toFixed(6);
        document.getElementById("lgVal").textContent = Math.log10(x).toFixed(6);
        document.getElementById("log2Val").textContent = Math.log2(x).toFixed(6);
      }

      calculate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

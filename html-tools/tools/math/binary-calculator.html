  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>二进制计算器</h1>
      <p class="desc">位运算和逻辑运算</p>

      <div class="card">
        <div class="input-group">
          <label>数值 A</label>
          <div class="input-row">
            <input
              type="text"
              id="inputA"
              value="42"
              oninput="calculate()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
            <select id="baseA" onchange="calculate()">
              <option value="10">十进制</option>
              <option value="2">二进制</option>
              <option value="16">十六进制</option>
            </select>
          </div>
        </div>

        <div class="operators">
          <button class="op-btn active" onclick="setOp('AND', this)" aria-label="AND">AND</button>
          <button class="op-btn" onclick="setOp('OR', this)" aria-label="OR">OR</button>
          <button class="op-btn" onclick="setOp('XOR', this)" aria-label="XOR">XOR</button>
          <button class="op-btn" onclick="setOp('NOT', this)" aria-label="NOT">NOT</button>
          <button class="op-btn" onclick="setOp('LSHIFT', this)" aria-label="左移 &lt;&lt;">
            左移 &lt;&lt;
          </button>
          <button class="op-btn" onclick="setOp('RSHIFT', this)" aria-label="右移 &gt;&gt;">
            右移 &gt;&gt;
          </button>
          <button class="op-btn" onclick="setOp('ADD', this)" aria-label="加">加</button>
          <button class="op-btn" onclick="setOp('SUB', this)" aria-label="减">减</button>
        </div>

        <div class="input-group" id="inputBGroup">
          <label>数值 B</label>
          <div class="input-row">
            <input
              type="text"
              id="inputB"
              value="15"
              oninput="calculate()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
            <select id="baseB" onchange="calculate()">
              <option value="10">十进制</option>
              <option value="2">二进制</option>
              <option value="16">十六进制</option>
            </select>
          </div>
        </div>

        <div class="result-section">
          <h4>数值 A 二进制表示</h4>
          <div class="bit-display" id="bitsA"></div>

          <h4 id="bitsBlabel">数值 B 二进制表示</h4>
          <div class="bit-display" id="bitsB"></div>

          <h4>计算结果</h4>
          <div class="result-item">
            <span class="label">二进制</span>
            <span class="value" id="resultBin">-</span>
          </div>
          <div class="result-item">
            <span class="label">十进制</span>
            <span class="value" id="resultDec">-</span>
          </div>
          <div class="result-item">
            <span class="label">十六进制</span>
            <span class="value" id="resultHex">-</span>
          </div>

          <h4>结果二进制表示</h4>
          <div class="bit-display" id="bitsResult"></div>

    <script>
      let currentOp = "AND";

      function setOp(op, btn) {
        currentOp = op;
        document.querySelectorAll(".op-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        const isSingleOp = op === "NOT";
        document.getElementById("inputBGroup").style.display = isSingleOp ? "none" : "block";
        document.getElementById("bitsBlabel").style.display = isSingleOp ? "none" : "block";
        document.getElementById("bitsB").style.display = isSingleOp ? "none" : "flex";

        calculate();
      }

      function parseValue(input, base) {
        const val = input.trim();
        if (!val) return NaN;
        return parseInt(val, base);
      }

      function renderBits(num, containerId) {
        const container = document.getElementById(containerId);
        if (isNaN(num)) {
          container.innerHTML = '<span style="color:var(--text-muted)">-</span>';
          return;
        }

        const isNeg = num < 0;
        const absNum = Math.abs(num);
        let binary = absNum.toString(2).padStart(8, "0");
        if (binary.length > 32) binary = binary.slice(-32);
        while (binary.length < 8 || binary.length % 4 !== 0) {
          binary = "0" + binary;
        }

        let html = "";
        for (let i = 0; i < binary.length; i++) {
          if (i > 0 && i % 4 === 0) {
            html += '<div class="bit-separator"></div>';
          }
          html += `<div class="bit ${binary[i] === "1" ? "one" : "zero"}">${binary[i]}</div>`;
        }
        container.innerHTML =
          (isNeg ? '<span style="margin-right:8px;color:var(--accent-cyan)">-</span>' : "") + html;
      }

      function calculate() {
        const baseA = parseInt(document.getElementById("baseA").value);
        const baseB = parseInt(document.getElementById("baseB").value);
        const a = parseValue(document.getElementById("inputA").value, baseA);
        const b = parseValue(document.getElementById("inputB").value, baseB);

        renderBits(a, "bitsA");
        renderBits(b, "bitsB");

        if (isNaN(a) || (currentOp !== "NOT" && isNaN(b))) {
          document.getElementById("resultBin").textContent = "-";
          document.getElementById("resultDec").textContent = "-";
          document.getElementById("resultHex").textContent = "-";
          document.getElementById("bitsResult").innerHTML =
            '<span style="color:var(--text-muted)">-</span>';
          return;
        }

        let result;
        switch (currentOp) {
          case "AND":
            result = a & b;
            break;
          case "OR":
            result = a | b;
            break;
          case "XOR":
            result = a ^ b;
            break;
          case "NOT":
            result = ~a;
            break;
          case "LSHIFT":
            result = a << b;
            break;
          case "RSHIFT":
            result = a >> b;
            break;
          case "ADD":
            result = a + b;
            break;
          case "SUB":
            result = a - b;
            break;
        }

        const absResult = Math.abs(result);
        document.getElementById("resultBin").textContent =
          (result < 0 ? "-" : "") + absResult.toString(2);
        document.getElementById("resultDec").textContent = result.toString(10);
        document.getElementById("resultHex").textContent =
          (result < 0 ? "-" : "") + absResult.toString(16).toUpperCase();
        renderBits(result, "bitsResult");
      }

      calculate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>

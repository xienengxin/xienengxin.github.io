  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>三角函数计算器</h1>
      <p class="desc">计算三角函数值，支持角度和弧度</p>

      <div class="card">
        <div class="input-section">
          <input type="number" id="angle" placeholder="输入角度" value="45" step="any" />
          <select id="unit">
            <option value="deg">度 (°)</option>
            <option value="rad">弧度 (rad)</option>
          </select>
          <button class="btn" onclick="calculate()">计算</button>
        </div>

        <div class="results">
          <div class="result-item">
            <div class="label">sin</div>
            <div class="value" id="sinVal">-</div>
          </div>
          <div class="result-item">
            <div class="label">cos</div>
            <div class="value" id="cosVal">-</div>
          </div>
          <div class="result-item">
            <div class="label">tan</div>
            <div class="value" id="tanVal">-</div>
          </div>
          <div class="result-item">
            <div class="label">csc</div>
            <div class="value" id="cscVal">-</div>
          </div>
          <div class="result-item">
            <div class="label">sec</div>
            <div class="value" id="secVal">-</div>
          </div>
          <div class="result-item">
            <div class="label">cot</div>
            <div class="value" id="cotVal">-</div>
          </div>
        </div>

        <div class="special-angles">
          <h4>特殊角度参考表</h4>
          <table class="angle-table">
            <tr>
              <th>角度</th>
              <th>0°</th>
              <th>30°</th>
              <th>45°</th>
              <th>60°</th>
              <th>90°</th>
            </tr>
            <tr>
              <td>sin</td>
              <td>0</td>
              <td>1/2</td>
              <td>√2/2</td>
              <td>√3/2</td>
              <td>1</td>
            </tr>
            <tr>
              <td>cos</td>
              <td>1</td>
              <td>√3/2</td>
              <td>√2/2</td>
              <td>1/2</td>
              <td>0</td>
            </tr>
            <tr>
              <td>tan</td>
              <td>0</td>
              <td>√3/3</td>
              <td>1</td>
              <td>√3</td>
              <td>∞</td>
            </tr>
          </table>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function calculate() {
        const angle = parseFloat(document.getElementById("angle").value);
        const unit = document.getElementById("unit").value;

        if (isNaN(angle)) {
          alert("请输入有效的数字");
          return;
        }

        const rad = unit === "deg" ? (angle * Math.PI) / 180 : angle;

        const sin = Math.sin(rad);
        const cos = Math.cos(rad);
        const tan = Math.tan(rad);
        const csc = 1 / sin;
        const sec = 1 / cos;
        const cot = 1 / tan;

        document.getElementById("sinVal").textContent = formatNum(sin);
        document.getElementById("cosVal").textContent = formatNum(cos);
        document.getElementById("tanVal").textContent =
          Math.abs(cos) < 1e-10 ? "∞" : formatNum(tan);
        document.getElementById("cscVal").textContent =
          Math.abs(sin) < 1e-10 ? "∞" : formatNum(csc);
        document.getElementById("secVal").textContent =
          Math.abs(cos) < 1e-10 ? "∞" : formatNum(sec);
        document.getElementById("cotVal").textContent =
          Math.abs(sin) < 1e-10 ? "∞" : formatNum(cot);
      }

      function formatNum(n) {
        if (Math.abs(n) < 1e-10) return "0";
        if (Math.abs(n - 1) < 1e-10) return "1";
        if (Math.abs(n + 1) < 1e-10) return "-1";
        return n.toFixed(6).replace(/\.?0+$/, "");
      }

      calculate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>

    <style>
      /* ============================================
         Design System - CSS Variables
         ============================================ */

      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Light Theme */

      /* ============================================
         Base Styles
         ============================================ */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      /* Subtle background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      [data-theme="light"] body::before {
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 184, 148, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
      }

      /* ============================================
         Navigation Bar
         ============================================ */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition-normal);
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      /* Back Button */
      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-back-text {
        display: inline;
      }

      /* Nav Title */
      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Nav Actions */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      /* Theme Toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      /* ============================================
         Main Content
         ============================================ */
      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      /* ============================================
         Card Styles
         ============================================ */
      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      /* ============================================
         Form Elements
         ============================================ */
      textarea {
        width: 100%;
        padding: var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
        min-height: 200px;
        resize: vertical;
        line-height: 1.6;
      }

      textarea:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      textarea::placeholder {
        color: var(--text-muted);
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
      }

      select {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        transition: all var(--transition-fast);
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      /* ============================================
         Options Grid
         ============================================ */
      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .option-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }

      /* ============================================
         Checkbox Styles
         ============================================ */
      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        cursor: pointer;
        user-select: none;
      }

      .checkbox-item input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid var(--color-border-strong);
        border-radius: var(--radius-sm);
        background: var(--color-bg-input);
        cursor: pointer;
        transition: all var(--transition-fast);
        position: relative;
      }

      .checkbox-item input[type="checkbox"]:checked {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
      }

      .checkbox-item input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 6px;
        height: 10px;
        border: solid #000;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .checkbox-item span {
        font-size: 0.9375rem;
        color: var(--color-text-primary);
      }

      /* ============================================
         Stats Section
         ============================================ */
      .stats-bar {
        display: flex;
        gap: var(--space-4);
        flex-wrap: wrap;
        margin-bottom: var(--space-4);
      }

      .stat-item {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }

      .stat-value {
        color: var(--color-accent-primary);
        font-family: var(--font-mono);
        font-weight: 500;
      }

      /* ============================================
         Result Section
         ============================================ */
      .result-output {
        background: var(--color-bg-input);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        min-height: 200px;
        max-height: 400px;
        overflow: auto;
        font-family: var(--font-mono);
        font-size: 0.9375rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--color-text-primary);
      }

      .result-output:empty::before {
        content: "排序结果将显示在这里...";
        color: var(--text-muted);
      }

      /* ============================================
         Buttons
         ============================================ */
      .button-group {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-5);
        flex-wrap: wrap;
      }

      button {
        padding: var(--space-3) var(--space-4);
        font-size: 0.9375rem;
        font-weight: 500;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        border-color: var(--color-accent-primary);
        background: var(--color-bg-surface);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      button.primary {
        background: var(--color-accent-primary);
        border-color: var(--color-accent-primary);
        color: #000;
        font-weight: 600;
      }

      button.primary:hover {
        background: #00c299;
        border-color: #00c299;
        box-shadow: var(--shadow-glow);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* ============================================
         Toast Notification
         ============================================ */
      .toast {
        position: fixed;
        bottom: calc(var(--space-6) + var(--safe-area-bottom));
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--color-bg-surface);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-5);
        font-size: 0.875rem;
        color: var(--color-text-primary);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        visibility: hidden;
        transition: all var(--transition-normal);
        z-index: 2000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .toast.success {
        border-color: var(--color-success);
        color: var(--color-success);
      }

      /* ============================================
         Mobile Responsive
         ============================================ */
      @media (max-width: 480px) {
        :root {
          --nav-height: 52px;
        }

        .nav-content {
          padding: 0 var(--space-4);
        }

        .nav-back-text {
          display: none;
        }

        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-4));
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .options-grid {
          grid-template-columns: 1fr;
        }

        .checkbox-group {
          flex-direction: column;
          gap: var(--space-3);
        }

        .stats-bar {
          flex-direction: column;
          gap: var(--space-2);
        }

        .button-group {
          gap: var(--space-2);
        }

        button {
          padding: var(--space-2) var(--space-3);
          font-size: 0.875rem;
          flex: 1;
        }
      }

      /* Tablet */
      @media (min-width: 768px) {
        .nav-back-text {
          display: inline;
        }
      }

      /* Desktop */
      @media (min-width: 1024px) {
        .main-content {
          padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-8));
        }
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      :focus-visible {
        outline: 2px solid var(--color-accent-primary);
        outline-offset: 2px;
      }

      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible),
      textarea:focus:not(:focus-visible),
      select:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>

        <h1 class="nav-title">行排序工具</h1>

        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <!-- Input Card -->
        <div class="card">
          <h2 class="card-title">📝 输入文本</h2>
          <textarea
            id="input"
            placeholder="在此输入或粘贴多行文本，每行将作为一个排序单元...&#10;例如：&#10;香蕉&#10;苹果&#10;橙子&#10;葡萄"
            oninput="sortLines()"
          ></textarea>

          <div class="button-group">
            <button onclick="pasteFromClipboard()">📋 粘贴</button>
            <button onclick="loadSample()">📝 示例</button>
            <button onclick="clearInput()">🗑️ 清空</button>
          </div>
        </div>

        <!-- Options Card -->
        <div class="card">
          <h2 class="card-title">⚙️ 排序选项</h2>

          <div class="options-grid">
            <div class="option-group">
              <label for="sortMethod">排序方式</label>
              <select id="sortMethod" onchange="sortLines()">
                <option value="alphabetical">字母顺序 (A-Z)</option>
                <option value="alphabetical-desc">字母逆序 (Z-A)</option>
                <option value="numeric">数字顺序 (小到大)</option>
                <option value="numeric-desc">数字逆序 (大到小)</option>
                <option value="length">按长度 (短到长)</option>
                <option value="length-desc">按长度 (长到短)</option>
                <option value="reverse">反转行顺序</option>
                <option value="shuffle">随机打乱</option>
              </select>
            </div>
          </div>

          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="caseSensitive" onchange="sortLines()" />
              <span>区分大小写</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="removeDuplicates" onchange="sortLines()" />
              <span>去除重复行</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="trimLines" checked onchange="sortLines()" />
              <span>去除行首尾空格</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="removeEmpty" onchange="sortLines()" />
              <span>去除空行</span>
            </label>
          </div>
        </div>

        <!-- Output Card -->
        <div class="card">
          <h2 class="card-title">📤 排序结果</h2>

          <div class="stats-bar">
            <span class="stat-item">
              输入行数:
              <span class="stat-value" id="inputLines">0</span>
            </span>
            <span class="stat-item">
              输出行数:
              <span class="stat-value" id="outputLines">0</span>
            </span>
            <span class="stat-item" id="duplicatesStat" style="display: none">
              去除重复:
              <span class="stat-value" id="duplicatesRemoved">0</span>
            </span>
          </div>

          <div class="result-output" id="output"></div>

          <div class="button-group">
            <button onclick="copyOutput()" class="primary">📋 复制结果</button>
            <button onclick="reshuffleLines()">🔀 重新打乱</button>
            <button onclick="applyToInput()">↩️ 应用为输入</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      // ============================================
      // Elements
      // ============================================
      const inputEl = document.getElementById("input");
      const outputEl = document.getElementById("output");
      const sortMethodEl = document.getElementById("sortMethod");
      const caseSensitiveEl = document.getElementById("caseSensitive");
      const removeDuplicatesEl = document.getElementById("removeDuplicates");
      const trimLinesEl = document.getElementById("trimLines");
      const removeEmptyEl = document.getElementById("removeEmpty");
      const inputLinesEl = document.getElementById("inputLines");
      const outputLinesEl = document.getElementById("outputLines");
      const duplicatesStatEl = document.getElementById("duplicatesStat");
      const duplicatesRemovedEl = document.getElementById("duplicatesRemoved");
      const toastEl = document.getElementById("toast");

      // ============================================
      // Sort Logic
      // ============================================
      function sortLines() {
        const text = inputEl.value;
        if (!text.trim()) {
          outputEl.textContent = "";
          inputLinesEl.textContent = "0";
          outputLinesEl.textContent = "0";
          duplicatesStatEl.style.display = "none";
          return;
        }

        let lines = text.split("\n");
        inputLinesEl.textContent = lines.length;

        // Trim lines if enabled
        if (trimLinesEl.checked) {
          lines = lines.map((line) => line.trim());
        }

        // Remove empty lines if enabled
        if (removeEmptyEl.checked) {
          lines = lines.filter((line) => line.length > 0);
        }

        const beforeDedup = lines.length;

        // Remove duplicates if enabled
        if (removeDuplicatesEl.checked) {
          const seen = new Set();
          lines = lines.filter((line) => {
            const key = caseSensitiveEl.checked ? line : line.toLowerCase();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
          duplicatesStatEl.style.display = "inline";
          duplicatesRemovedEl.textContent = beforeDedup - lines.length;
        } else {
          duplicatesStatEl.style.display = "none";
        }

        // Sort based on method
        const method = sortMethodEl.value;
        const caseSensitive = caseSensitiveEl.checked;

        switch (method) {
          case "alphabetical":
            lines.sort((a, b) => {
              const aVal = caseSensitive ? a : a.toLowerCase();
              const bVal = caseSensitive ? b : b.toLowerCase();
              return aVal.localeCompare(bVal, "zh-CN");
            });
            break;

          case "alphabetical-desc":
            lines.sort((a, b) => {
              const aVal = caseSensitive ? a : a.toLowerCase();
              const bVal = caseSensitive ? b : b.toLowerCase();
              return bVal.localeCompare(aVal, "zh-CN");
            });
            break;

          case "numeric":
            lines.sort((a, b) => {
              const aNum = parseFloat(a) || 0;
              const bNum = parseFloat(b) || 0;
              return aNum - bNum;
            });
            break;

          case "numeric-desc":
            lines.sort((a, b) => {
              const aNum = parseFloat(a) || 0;
              const bNum = parseFloat(b) || 0;
              return bNum - aNum;
            });
            break;

          case "length":
            lines.sort((a, b) => a.length - b.length);
            break;

          case "length-desc":
            lines.sort((a, b) => b.length - a.length);
            break;

          case "reverse":
            lines.reverse();
            break;

          case "shuffle":
            shuffleArray(lines);
            break;
        }

        outputEl.textContent = lines.join("\n");
        outputLinesEl.textContent = lines.length;

        // Save state
        saveState();
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // ============================================
      // Actions
      // ============================================
      async function pasteFromClipboard() {
        try {
          const text = await navigator.clipboard.readText();
          inputEl.value = text;
          sortLines();
          showToast("已粘贴", "success");
        } catch (e) {
          showToast("无法访问剪贴板");
        }
      }

      function loadSample() {
        inputEl.value = `香蕉
苹果
橙子
葡萄
苹果
芒果
西瓜
草莓
葡萄
蓝莓
cherry
Apple
banana`;
        sortLines();
        showToast("已加载示例", "success");
      }

      function clearInput() {
        inputEl.value = "";
        outputEl.textContent = "";
        inputLinesEl.textContent = "0";
        outputLinesEl.textContent = "0";
        duplicatesStatEl.style.display = "none";
        localStorage.removeItem("line-sorter-state");
        showToast("已清空", "success");
      }

      async function copyOutput() {
        const text = outputEl.textContent;
        if (!text) {
          showToast("没有可复制的内容");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          showToast("已复制到剪贴板", "success");
        } catch (e) {
          showToast("复制失败");
        }
      }

      function reshuffleLines() {
        if (sortMethodEl.value !== "shuffle") {
          sortMethodEl.value = "shuffle";
        }
        sortLines();
        showToast("已重新打乱", "success");
      }

      function applyToInput() {
        const text = outputEl.textContent;
        if (!text) {
          showToast("没有可应用的内容");
          return;
        }
        inputEl.value = text;
        sortLines();
        showToast("已应用为输入", "success");
      }

      // ============================================
      // Toast
      // ============================================
      function showToast(message, type = "") {
        toastEl.textContent = message;
        toastEl.className = "toast show " + type;
        setTimeout(() => {
          toastEl.className = "toast";
        }, 2000);
      }

      // ============================================
      // State Management
      // ============================================
      function saveState() {
        const state = {
          input: inputEl.value,
          sortMethod: sortMethodEl.value,
          caseSensitive: caseSensitiveEl.checked,
          removeDuplicates: removeDuplicatesEl.checked,
          trimLines: trimLinesEl.checked,
          removeEmpty: removeEmptyEl.checked
        };
        localStorage.setItem("line-sorter-state", JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem("line-sorter-state");
        if (saved) {
          try {
            const state = JSON.parse(saved);
            inputEl.value = state.input || "";
            sortMethodEl.value = state.sortMethod || "alphabetical";
            caseSensitiveEl.checked = state.caseSensitive || false;
            removeDuplicatesEl.checked = state.removeDuplicates || false;
            trimLinesEl.checked = state.trimLines !== false;
            removeEmptyEl.checked = state.removeEmpty || false;
            sortLines();
          } catch (e) {
            console.error("Failed to load state:", e);
          }
        }
      }

      // ============================================
      // Theme Management
      // ============================================
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme") || "dark";
        const newTheme = currentTheme === "light" ? "dark" : "light";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");

        document.documentElement.setAttribute("data-theme", theme);
      }

      // ============================================
      // Initialize
      // ============================================
      initTheme();
      loadState();
    </script>
  </body>
</html>

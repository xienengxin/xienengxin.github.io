    <div class="container">
      <div class="header">
        <h1>🔢 行号添加工具</h1>
        <p>为文本添加或删除行号</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="card">
        <div class="options">
          <div class="form-group">
            <label>操作模式</label>
            <select id="mode" onchange="process()">
              <option value="add">添加行号</option>
              <option value="remove">删除行号</option>
            </select>
          </div>
          <div class="form-group">
            <label>起始行号</label>
            <input type="number" id="start" value="1" min="0" onchange="process()" />
          </div>
          <div class="form-group">
            <label>分隔符</label>
            <select id="separator" onchange="process()">
              <option value=": ">: (冒号)</option>
              <option value=". ">. (点号)</option>
              <option value=") ">) (括号)</option>
              <option value="| ">| (竖线)</option>
              <option value="\t">Tab</option>
              <option value="  ">双空格</option>
            </select>
          </div>
          <div class="form-group">
            <label>行号宽度</label>
            <select id="padding" onchange="process()">
              <option value="0">自动</option>
              <option value="2">2位</option>
              <option value="3">3位</option>
              <option value="4">4位</option>
              <option value="5">5位</option>
            </select>
          </div>
        </div>

        <div class="text-panels">
          <div class="panel">
            <label>输入文本</label>
            <textarea id="input" oninput="process()" placeholder="在此输入文本...">
第一行内容
第二行内容
第三行内容
第四行内容
第五行内容</textarea
            >
          </div>
          <div class="panel">
            <label>输出结果</label>
            <textarea id="output" readonly placeholder="处理结果..."></textarea>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="process()">🔄 处理</button>
          <button class="btn btn-secondary" onclick="copyOutput()">📋 复制结果</button>
          <button class="btn btn-secondary" onclick="swapTexts()">↔️ 交换</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制</div>

    <script>
      window.toggleTheme = function () {
        const t =
          document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      function process() {
        const input = document.getElementById("input").value;
        const mode = document.getElementById("mode").value;
        const start = parseInt(document.getElementById("start").value) || 1;
        const separator = document.getElementById("separator").value.replace("\\t", "\t");
        const padding = parseInt(document.getElementById("padding").value);

        const lines = input.split("\n");
        let result;

        if (mode === "add") {
          const maxWidth = padding || String(start + lines.length - 1).length;
          result = lines
            .map((line, i) => {
              const num = String(start + i).padStart(maxWidth, "0");
              return num + separator + line;
            })
            .join("\n");
        } else {
          result = lines
            .map((line) => {
              return line.replace(/^\s*\d+[\s.:)\-|]+/, "");
            })
            .join("\n");
        }

        document.getElementById("output").value = result;
      }

      window.copyOutput = function () {
        const output = document.getElementById("output").value;
        if (output) {
          navigator.clipboard.writeText(output);
          const toast = document.getElementById("toast");
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 2000);
        }
      };

      window.swapTexts = function () {
        const input = document.getElementById("input");
        const output = document.getElementById("output");
        const temp = input.value;
        input.value = output.value;
        output.value = temp;
      };

      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
      };

      process();
    </script>
  </body>
</html>

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */

        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */

        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */

        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */

        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Lorem生成器
    </nav>
    <div class="container">
      <h1>📜 Lorem生成器</h1>
      <div class="options">
        <div class="option">
          <label>类型</label>
          <select id="type">
            <option value="paragraphs">段落</option>
            <option value="sentences">句子</option>
            <option value="words">单词</option>
          </select>
        </div>
        <div class="option">
          <label for="input---">数量</label>
          <input
            type="number"
            id="count"
            value="3"
            min="1"
            max="100"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="option">
          <label>&nbsp;</label>
          <button class="btn" onclick="generate()" aria-label="生成">生成</button>
        </div>
      </div>
      <div class="output" id="output">点击生成按钮生成Lorem文本...</div>
      <button class="btn copy-btn" onclick="copy()" aria-label="复制文本">复制文本</button>
    </div>
    <script>
      const words = [
        "lorem",
        "ipsum",
        "dolor",
        "sit",
        "amet",
        "consectetur",
        "adipiscing",
        "elit",
        "sed",
        "do",
        "eiusmod",
        "tempor",
        "incididunt",
        "ut",
        "labore",
        "et",
        "dolore",
        "magna",
        "aliqua",
        "enim",
        "ad",
        "minim",
        "veniam",
        "quis",
        "nostrud",
        "exercitation",
        "ullamco",
        "laboris",
        "nisi",
        "aliquip",
        "ex",
        "ea",
        "commodo",
        "consequat",
        "duis",
        "aute",
        "irure",
        "in",
        "reprehenderit",
        "voluptate",
        "velit",
        "esse",
        "cillum",
        "fugiat",
        "nulla",
        "pariatur",
        "excepteur",
        "sint",
        "occaecat",
        "cupidatat",
        "non",
        "proident",
        "sunt",
        "culpa",
        "qui",
        "officia",
        "deserunt",
        "mollit",
        "anim",
        "id",
        "est",
        "laborum"
      ];
      function randomWord() {
        return words[Math.floor(Math.random() * words.length)];
      }
      function generateSentence() {
        const len = 8 + Math.floor(Math.random() * 10);
        let s = randomWord();
        s = s.charAt(0).toUpperCase() + s.slice(1);
        for (let i = 1; i < len; i++) s += " " + randomWord();
        return s + ".";
      }
      function generateParagraph() {
        const len = 4 + Math.floor(Math.random() * 4);
        return Array(len).fill().map(generateSentence).join(" ");
      }
      function generate() {
        const type = document.getElementById("type").value;
        const count = parseInt(document.getElementById("count").value) || 1;
        let result = "";
        if (type === "words") result = Array(count).fill().map(randomWord).join(" ");
        else if (type === "sentences") result = Array(count).fill().map(generateSentence).join(" ");
        else result = Array(count).fill().map(generateParagraph).join("\n\n");
        document.getElementById("output").textContent = result;
      }
      function copy() {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
      }
      generate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>

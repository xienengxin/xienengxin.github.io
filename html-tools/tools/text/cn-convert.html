      // 生成繁简对照表
      const t2sMap = {};
      for (const [s, t] of Object.entries(s2tMap)) {
        t2sMap[t] = s;
      }

      // 主题切换
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateThemeIcon(newTheme);
      };

      function updateThemeIcon(theme) {
        const sunIcon = document.querySelector(".sun-icon");
        const moonIcon = document.querySelector(".moon-icon");
        if (theme === "dark") {
          sunIcon.style.display = "none";
          moonIcon.style.display = "block";
        } else {
          sunIcon.style.display = "block";
          moonIcon.style.display = "none";
        }
      }

      // 初始化主题
      function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        updateThemeIcon(savedTheme);
      }

      // 转换为繁体
      window.convertToTraditional = function () {
        const input = document.getElementById("input").value;
        let result = "";
        for (const char of input) {
          result += s2tMap[char] || char;
        }
        document.getElementById("output").value = result;
      };

      // 转换为简体
      window.convertToSimplified = function () {
        const input = document.getElementById("input").value;
        let result = "";
        for (const char of input) {
          result += t2sMap[char] || char;
        }
        document.getElementById("output").value = result;
      };

      // 交换输入输出
      window.swapText = function () {
        const input = document.getElementById("input");
        const output = document.getElementById("output");
        const temp = input.value;
        input.value = output.value;
        output.value = temp;
        updateCharCount();
      };

      // 清空
      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
        updateCharCount();
      };

      // 复制结果
      window.copyResult = function () {
        const output = document.getElementById("output");
        output.select();
        document.execCommand("copy");
        alert("已复制到剪贴板！");
      };

      // 下载结果
      window.downloadResult = function () {
        const output = document.getElementById("output").value;
        if (!output) {
          alert("没有可下载的内容！");
          return;
        }
        const blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "converted-text.txt";
        a.click();
        URL.revokeObjectURL(url);
      };

      // 更新字符计数
      function updateCharCount() {
        const input = document.getElementById("input").value;
        document.getElementById("charCount").textContent = input.length;
      }

      // 初始化
      document.addEventListener("DOMContentLoaded", function () {
        initTheme();
        document.getElementById("input").addEventListener("input", updateCharCount);
      });
    </script>

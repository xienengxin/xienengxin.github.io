  <body>
    <nav class="breadcrumb">

    <div class="container">
      <h1>📊 文本统计工具</h1>
      <div class="card">
        <textarea id="input" placeholder="在此输入或粘贴文本...">
这是一段示例文本。This is sample text. 用于测试文本统计功能。

包含多个段落、中英文字符、数字123和标点符号！</textarea
        >
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="chars">0</div>
            <div class="stat-label">总字符</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="words">0</div>
            <div class="stat-label">单词/词语</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="sentences">0</div>
            <div class="stat-label">句子</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="paragraphs">0</div>
            <div class="stat-label">段落</div>
          </div>
        </div>
        <div class="details">
          <div class="detail-section">
            <div class="detail-title">字符详情</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-key">不含空格</span>
                <span class="detail-val" id="charsNoSpace">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">中文字符</span>
                <span class="detail-val" id="chinese">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">英文字母</span>
                <span class="detail-val" id="letters">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">数字</span>
                <span class="detail-val" id="numbers">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">空格</span>
                <span class="detail-val" id="spaces">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">标点符号</span>
                <span class="detail-val" id="punctuation">0</span>
              </div>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-title">阅读估算</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-key">阅读时间</span>
                <span class="detail-val" id="readTime">0 分钟</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">朗读时间</span>
                <span class="detail-val" id="speakTime">0 分钟</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">平均词长</span>
                <span class="detail-val" id="avgWordLen">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">行数</span>
                <span class="detail-val" id="lines">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function analyze() {
        const text = document.getElementById("input").value;
        const chars = text.length;
        const charsNoSpace = text.replace(/\s/g, "").length;
        const chinese = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const letters = (text.match(/[a-zA-Z]/g) || []).length;
        const numbers = (text.match(/[0-9]/g) || []).length;
        const spaces = (text.match(/ /g) || []).length;
        const punctuation = (text.match(/[.,!?;:'"()[\]{}，。！？；：""''（）【】、]/g) || [])
          .length;
        const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
        const words = chinese + englishWords;
        const sentences = (text.match(/[.!?。！？]+/g) || []).length || (text.trim() ? 1 : 0);
        const paragraphs =
          text.split(/\n\s*\n/).filter((p) => p.trim()).length || (text.trim() ? 1 : 0);
        const lines = text.split("\n").length;
        const readTime = Math.ceil(words / 200);
        const speakTime = Math.ceil(words / 150);
        const avgWordLen = words > 0 ? (charsNoSpace / words).toFixed(1) : 0;
        document.getElementById("chars").textContent = chars;
        document.getElementById("words").textContent = words;
        document.getElementById("sentences").textContent = sentences;
        document.getElementById("paragraphs").textContent = paragraphs;
        document.getElementById("charsNoSpace").textContent = charsNoSpace;
        document.getElementById("chinese").textContent = chinese;
        document.getElementById("letters").textContent = letters;
        document.getElementById("numbers").textContent = numbers;
        document.getElementById("spaces").textContent = spaces;
        document.getElementById("punctuation").textContent = punctuation;
        document.getElementById("readTime").textContent = readTime + " 分钟";
        document.getElementById("speakTime").textContent = speakTime + " 分钟";
        document.getElementById("avgWordLen").textContent = avgWordLen;
        document.getElementById("lines").textContent = lines;
      }
      document.getElementById("input").addEventListener("input", analyze);
      analyze();
    </script>

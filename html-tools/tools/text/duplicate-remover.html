      <h1>去除重复行</h1>
      <p class="subtitle">快速去除文本中的重复行，保留唯一内容</p>

      <div class="options-bar">
        <div class="option-group">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="ignoreCase" />
            <span>忽略大小写</span>
          </label>
        </div>
        <div class="option-group">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="trimWhitespace" checked />
            <span>去除首尾空格</span>
          </label>
        </div>
        <div class="option-group">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="removeEmpty" checked />
            <span>移除空行</span>
          </label>
        </div>
        <div class="option-group">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="sortOutput" />
            <span>排序结果</span>
          </label>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📥 输入文本</span>
            <div class="panel-actions">
              <button class="btn" onclick="loadSample()">示例</button>
              <button class="btn" onclick="clearInput()">清空</button>
            </div>
          </div>
          <textarea id="inputText" placeholder="在此粘贴包含重复行的文本..."></textarea>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📤 去重结果</span>
            <div class="panel-actions">
              <button class="btn btn-primary" onclick="copyOutput()">复制</button>
            </div>
          </div>
          <textarea id="outputText" readonly placeholder="去重后的结果将显示在这里..."></textarea>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">原始行数:</span>
          <span class="stat-value" id="originalCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">去重后:</span>
          <span class="stat-value kept" id="uniqueCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">移除行数:</span>
          <span class="stat-value removed" id="removedCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">重复率:</span>
          <span class="stat-value" id="duplicateRate">0%</span>
        </div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        const inputText = document.getElementById("inputText");
        const outputText = document.getElementById("outputText");
        const ignoreCase = document.getElementById("ignoreCase");
        const trimWhitespace = document.getElementById("trimWhitespace");
        const removeEmpty = document.getElementById("removeEmpty");
        const sortOutput = document.getElementById("sortOutput");

        function removeDuplicates() {
          const text = inputText.value;
          if (!text.trim()) {
            outputText.value = "";
            updateStats(0, 0);
            return;
          }

          let lines = text.split("\n");
          const originalCount = lines.length;

          // 处理选项
          if (trimWhitespace.checked) {
            lines = lines.map((line) => line.trim());
          }

          if (removeEmpty.checked) {
            lines = lines.filter((line) => line.length > 0);
          }

          // 去重
          const seen = new Set();
          const uniqueLines = [];

          for (const line of lines) {
            const key = ignoreCase.checked ? line.toLowerCase() : line;
            if (!seen.has(key)) {
              seen.add(key);
              uniqueLines.push(line);
            }
          }

          // 排序
          let result = uniqueLines;
          if (sortOutput.checked) {
            result = [...uniqueLines].sort((a, b) => {
              const compareA = ignoreCase.checked ? a.toLowerCase() : a;
              const compareB = ignoreCase.checked ? b.toLowerCase() : b;
              return compareA.localeCompare(compareB, "zh-CN");
            });
          }

          outputText.value = result.join("\n");
          updateStats(originalCount, result.length);
        }

        function updateStats(original, unique) {
          const removed = original - unique;
          const rate = original > 0 ? ((removed / original) * 100).toFixed(1) : 0;

          document.getElementById("originalCount").textContent = original;
          document.getElementById("uniqueCount").textContent = unique;
          document.getElementById("removedCount").textContent = removed;
          document.getElementById("duplicateRate").textContent = rate + "%";
        }

        function loadSample() {
          inputText.value = `苹果
香蕉
苹果
橙子
香蕉
葡萄
苹果
西瓜
香蕉
橙子
芒果
苹果`;
          removeDuplicates();
        }

        function clearInput() {
          inputText.value = "";
          outputText.value = "";
          updateStats(0, 0);
        }

        function copyOutput() {
          if (!outputText.value) return;

          navigator.clipboard.writeText(outputText.value).then(() => {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = "已复制!";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 1500);
          });
        }

        // 绑定事件
        inputText.addEventListener("input", removeDuplicates);
        [ignoreCase, trimWhitespace, removeEmpty, sortOutput].forEach((el) => {
          el.addEventListener("change", removeDuplicates);
        });

        // 暴露全局函数
        window.loadSample = loadSample;
        window.clearInput = clearInput;
        window.copyOutput = copyOutput;
      })();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

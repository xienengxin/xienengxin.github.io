  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      阅读时间估算
    </nav>
    <div class="container">
      <header>
        <h1>📖 阅读时间估算</h1>
        <button id="themeToggle" class="outline">🌙</button>
      </header>
      <div class="time-display">
        <span id="readingTime">0</span>
        <span class="unit">分钟阅读</span>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="icon">📝</div>
          <div class="value" id="charCount">0</div>
          <div class="label">总字符</div>
        </div>
        <div class="stat-card">
          <div class="icon">🔤</div>
          <div class="value" id="wordCount">0</div>
          <div class="label">单词/词组</div>
        </div>
        <div class="stat-card">
          <div class="icon">📄</div>
          <div class="value" id="paraCount">0</div>
          <div class="label">段落</div>
        </div>
        <div class="stat-card">
          <div class="icon">📏</div>
          <div class="value" id="lineCount">0</div>
          <div class="label">行数</div>
        </div>
      </div>
      <div class="settings">
        <div class="settings-row">
          <label>
            阅读速度：
            <input type="number" id="readSpeed" value="300" min="50" max="1000" />
            <select id="speedUnit">
              <option value="cpm">字/分钟</option>
              <option value="wpm">词/分钟</option>
            </select>
          </label>
          <label>
            语言类型：
            <select id="langType">
              <option value="zh">中文</option>
              <option value="en">英文</option>
              <option value="mixed">中英混合</option>
            </select>
          </label>
        </div>
      </div>
      <div class="input-panel">
        <textarea id="inputText" placeholder="粘贴或输入文本内容..."></textarea>
      </div>
      <div class="detail-stats">
        <h3>详细统计</h3>
        <div class="detail-grid">
          <div>
            <div class="detail-item">
              <span class="name">中文字符</span>
              <span class="value" id="zhCount">0</span>
            </div>
            <div class="detail-item">
              <span class="name">英文字符</span>
              <span class="value" id="enCount">0</span>
            </div>
            <div class="detail-item">
              <span class="name">数字</span>
              <span class="value" id="numCount">0</span>
            </div>
          </div>
          <div>
            <div class="detail-item">
              <span class="name">标点符号</span>
              <span class="value" id="punctCount">0</span>
            </div>
            <div class="detail-item">
              <span class="name">空格</span>
              <span class="value" id="spaceCount">0</span>
            </div>
            <div class="detail-item">
              <span class="name">英文单词</span>
              <span class="value" id="enWordCount">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const $ = (id) => document.getElementById(id);
      window.analyze = function () {
        const text = $("inputText").value;
        const speed = parseInt($("readSpeed").value) || 300;
        const speedUnit = $("speedUnit").value;
        const langType = $("langType").value;
        // Character counts
        const zhChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const enChars = (text.match(/[a-zA-Z]/g) || []).length;
        const numChars = (text.match(/[0-9]/g) || []).length;
        const punctChars = (text.match(/[，。！？、；：""''（）【】《》\.,!?;:'"()\[\]{}]/g) || [])
          .length;
        const spaces = (text.match(/\s/g) || []).length;
        const enWords = (text.match(/[a-zA-Z]+/g) || []).length;
        // Basic stats
        const totalChars = text.length;
        const lines = text.split("\n").length;
        const paras = text.split(/\n\s*\n/).filter((p) => p.trim()).length || (text.trim() ? 1 : 0);
        // Calculate reading time
        let readingMinutes = 0;
        if (langType === "zh") {
          readingMinutes = zhChars / speed;
        } else if (langType === "en") {
          readingMinutes = speedUnit === "wpm" ? enWords / speed : enChars / speed;
        } else {
          // Mixed: Chinese chars + English words
          const zhTime = zhChars / 300;
          const enTime = enWords / 200;
          readingMinutes = zhTime + enTime;
        }
        // Update UI
        $("readingTime").textContent = Math.max(1, Math.ceil(readingMinutes));
        $("charCount").textContent = totalChars;
        $("wordCount").textContent = zhChars + enWords;
        $("paraCount").textContent = paras;
        $("lineCount").textContent = lines;
        $("zhCount").textContent = zhChars;
        $("enCount").textContent = enChars;
        $("numCount").textContent = numChars;
        $("punctCount").textContent = punctChars;
        $("spaceCount").textContent = spaces;
        $("enWordCount").textContent = enWords;
      };
      $("inputText").oninput = analyze;
      $("readSpeed").oninput = analyze;
      $("speedUnit").onchange = analyze;
      $("langType").onchange = analyze;
      function loadTheme() {
        const t = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
        $("themeToggle").textContent = t === "dark" ? "☀️" : "🌙";
      }
      window.toggleTheme = function () {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
        $("themeToggle").textContent = n === "dark" ? "☀️" : "🌙";
      };
      $("themeToggle").onclick = toggleTheme;
      loadTheme();
    </script>

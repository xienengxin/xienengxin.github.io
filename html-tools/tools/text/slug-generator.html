  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <div class="container">
      <h1>🔗 URL Slug生成器</h1>
      <div class="card">
        <div class="input-group">
          <label>输入文本</label>
          <input
            type="text"
            id="input"
            placeholder="输入标题或文本..."
            value="Hello World! 这是一个测试"
          />
        </div>
        <div class="options">
          <label class="option">
            <input type="checkbox" id="lowercase" checked />
            小写
          </label>
          <label class="option">
            <input type="checkbox" id="removeChinese" />
            移除中文
          </label>
          <label class="option">
            <input type="checkbox" id="maxLength" />
            限制长度
          </label>
        </div>
        <div class="input-group">
          <label>分隔符</label>
          <select id="separator">
            <option value="-">连字符 (-)</option>
            <option value="_">下划线 (_)</option>
            <option value=".">点 (.)</option>
            <option value="">无</option>
          </select>
        </div>
        <div class="result">
          <div class="result-label">生成的Slug</div>
          <div class="result-value" id="output">hello-world-这是一个测试</div>
        </div>
        <button class="copy-btn" onclick="copySlug()">复制Slug</button>
        <div class="examples">
          <div class="examples-title">常见用途</div>
          <div class="example-item">• 网页URL路径</div>
          <div class="example-item">• 文件命名</div>
          <div class="example-item">• 数据库标识符</div>
          <div class="example-item">• SEO友好链接</div>
        </div>
      </div>
    </div>
    <script>
      function generateSlug() {
        let text = document.getElementById("input").value;
        const separator = document.getElementById("separator").value;
        const lowercase = document.getElementById("lowercase").checked;
        const removeChinese = document.getElementById("removeChinese").checked;
        const maxLength = document.getElementById("maxLength").checked;
        if (removeChinese) text = text.replace(/[\u4e00-\u9fa5]/g, "");
        let slug = text
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\w\s\u4e00-\u9fa5-]/g, "")
          .trim()
          .replace(/\s+/g, separator)
          .replace(new RegExp(`${separator}+`, "g"), separator);
        if (lowercase) slug = slug.toLowerCase();
        if (maxLength && slug.length > 50)
          slug = slug.substring(0, 50).replace(new RegExp(`${separator}$`), "");
        document.getElementById("output").textContent = slug || "(空)";
      }
      function copySlug() {
        const slug = document.getElementById("output").textContent;
        navigator.clipboard.writeText(slug);
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "已复制!";
        setTimeout(() => (btn.textContent = "复制Slug"), 1500);
      }
      document.getElementById("input").addEventListener("input", generateSlug);
      document.getElementById("separator").addEventListener("change", generateSlug);
      document.getElementById("lowercase").addEventListener("change", generateSlug);
      document.getElementById("removeChinese").addEventListener("change", generateSlug);
      document.getElementById("maxLength").addEventListener("change", generateSlug);
      generateSlug();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>

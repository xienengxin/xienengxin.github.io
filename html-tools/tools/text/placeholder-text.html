          <div class="type-card" data-type="random">
            <div class="icon">🎲</div>
            <div class="name">随机字符</div>
            <div class="desc">字母数字混合</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">生成选项</h2>
        <div class="options-grid">
          <div class="option-group">
            <label>生成单位</label>
            <select id="unit">
              <option value="paragraphs">段落</option>
              <option value="sentences">句子</option>
              <option value="words">单词/词语</option>
              <option value="characters">字符</option>
            </select>
          </div>
          <div class="option-group">
            <label for="input---">数量</label>
            <input
              type="number"
              id="amount"
              value="3"
              min="1"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="option-group">
            <label>格式</label>
            <select id="format">
              <option value="plain">纯文本</option>
              <option value="html-p">HTML 段落 (&lt;p&gt;)</option>
              <option value="html-li">HTML 列表 (&lt;li&gt;)</option>
              <option value="html-div">HTML Div</option>
            </select>
          </div>
        </div>

        <div class="presets">
          <button class="preset-btn" onclick="applyPreset(1, 'paragraphs')" aria-label="1 段落">
            1 段落
          </button>
          <button class="preset-btn" onclick="applyPreset(3, 'paragraphs')" aria-label="3 段落">
            3 段落
          </button>
          <button class="preset-btn" onclick="applyPreset(5, 'sentences')" aria-label="5 句子">
            5 句子
          </button>
          <button class="preset-btn" onclick="applyPreset(50, 'words')" aria-label="50 词">
            50 词
          </button>
          <button class="preset-btn" onclick="applyPreset(100, 'characters')" aria-label="100 字符">
            100 字符
          </button>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="generate()">
            <span>⚡</span>
            生成文本
          </button>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">生成结果</h2>
        <textarea
          class="output-area"
          id="output"
          readonly
          placeholder="点击生成文本按钮生成占位文本..."
        ></textarea>

        <div class="stats">
          <div class="stat-item">
            <span>字符数:</span>
            <span class="stat-value" id="charCount">0</span>
          </div>
          <div class="stat-item">
            <span>词数:</span>
            <span class="stat-value" id="wordCount">0</span>
          </div>
          <div class="stat-item">
            <span>段落数:</span>
            <span class="stat-value" id="paraCount">0</span>
          </div>
        </div>

        <div class="btn-row" style="margin-top: 15px">
          <button class="btn btn-secondary" onclick="copyOutput()">
            <span>📋</span>
            复制
          </button>
          <button class="btn btn-secondary" onclick="downloadOutput()">
            <span>💾</span>
            下载
          </button>
          <button class="btn btn-secondary" onclick="clearOutput()">
            <span>🗑️</span>
            清空
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // Data sources
      const data = {
        lorem: {
          words: [

            "bibendum"
          ],
          startPhrase: "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
        },
        chinese: {
          words: [
            "我们",

          ],
          punctuation: ["，", "。", "；", "！", "？"]
        },
        poetry: [
          "床前明月光，疑是地上霜。举头望明月，低头思故乡。",
          "白日依山尽，黄河入海流。欲穷千里目，更上一层楼。",
          "春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。",
          "红豆生南国，春来发几枝。愿君多采撷，此物最相思。",
          "千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。",
          "锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。",
          "离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。",
          "两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。",
          "大漠孤烟直，长河落日圆。萧关逢候骑，都护在燕然。",
          "空山不见人，但闻人语响。返景入深林，复照青苔上。",
          "明月几时有，把酒问青天。不知天上宫阙，今夕是何年。",
          "大江东去，浪淘尽，千古风流人物。",
          "落霞与孤鹜齐飞，秋水共长天一色。",
          "海内存知己，天涯若比邻。",
          "会当凌绝顶，一览众山小。"
        ],
        pangrams: {
          en: [
            "The quick brown fox jumps over the lazy dog.",
            "Pack my box with five dozen liquor jugs.",
            "How vexingly quick daft zebras jump!",
            "The five boxing wizards jump quickly.",
            "Sphinx of black quartz, judge my vow."
          ],
          zh: ["我能吞下玻璃而不伤身体。", "天地玄黄，宇宙洪荒。", "视野无限广，窗外有蓝天。"]
        }
      };

      let currentType = "lorem";

      // Theme toggle
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };

      // Initialize theme
      (function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      // Type selection
      document.querySelectorAll(".type-card").forEach((card) => {
        card.addEventListener("click", () => {
          document.querySelectorAll(".type-card").forEach((c) => c.classList.remove("active"));
          card.classList.add("active");
          currentType = card.dataset.type;
        });
      });

      // Preset
      window.applyPreset = function (amount, unit) {
        document.getElementById("amount").value = amount;
        document.getElementById("unit").value = unit;
        generate();
      };

      // Generate text
      window.generate = function () {
        const unit = document.getElementById("unit").value;
        const amount = parseInt(document.getElementById("amount").value) || 1;
        const format = document.getElementById("format").value;

        let result = "";

        switch (currentType) {
          case "lorem":
            result = generateLorem(unit, amount);
            break;
          case "chinese":
            result = generateChinese(unit, amount);
            break;
          case "poetry":
            result = generatePoetry(amount);
            break;
          case "pangram":
            result = generatePangram(amount);
            break;
          case "random":
            result = generateRandom(unit, amount);
            break;
        }

        // Apply format
        result = applyFormat(result, format, unit);

        document.getElementById("output").value = result;
        updateStats(result);
      };

      function generateLorem(unit, amount) {
        const words = data.lorem.words;
        let result = [];

        switch (unit) {
          case "paragraphs":
            for (let i = 0; i < amount; i++) {
              let para = i === 0 ? data.lorem.startPhrase + " " : "";
              const sentenceCount = 4 + Math.floor(Math.random() * 4);
              for (let j = 0; j < sentenceCount; j++) {
                para += generateLoremSentence(words);
              }
              result.push(para.trim());
            }
            return result.join("\n\n");
          case "sentences":
            for (let i = 0; i < amount; i++) {
              result.push(generateLoremSentence(words));
            }
            return result.join(" ");
          case "words":
            for (let i = 0; i < amount; i++) {
              result.push(words[Math.floor(Math.random() * words.length)]);
            }
            return result.join(" ");
          case "characters":
            let text = "";
            while (text.length < amount) {
              text += words[Math.floor(Math.random() * words.length)] + " ";
            }
            return text.substring(0, amount);
        }
      }

      function generateLoremSentence(words) {
        const length = 8 + Math.floor(Math.random() * 10);
        let sentence = [];
        for (let i = 0; i < length; i++) {
          sentence.push(words[Math.floor(Math.random() * words.length)]);
        }
        sentence[0] = sentence[0].charAt(0).toUpperCase() + sentence[0].slice(1);
        return sentence.join(" ") + ". ";
      }

      function generateChinese(unit, amount) {
        const words = data.chinese.words;
        const punct = data.chinese.punctuation;
        let result = [];

        switch (unit) {
          case "paragraphs":
            for (let i = 0; i < amount; i++) {
              let para = "";
              const sentenceCount = 3 + Math.floor(Math.random() * 4);
              for (let j = 0; j < sentenceCount; j++) {
                para += generateChineseSentence(words, punct);
              }
              result.push(para);
            }
            return result.join("\n\n");
          case "sentences":
            for (let i = 0; i < amount; i++) {
              result.push(generateChineseSentence(words, punct));
            }
            return result.join("");
          case "words":
            for (let i = 0; i < amount; i++) {
              result.push(words[Math.floor(Math.random() * words.length)]);
            }
            return result.join("");
          case "characters":
            let text = "";
            while (text.length < amount) {
              text += words[Math.floor(Math.random() * words.length)];
            }
            return text.substring(0, amount);
        }
      }

      function generateChineseSentence(words, punct) {
        const length = 4 + Math.floor(Math.random() * 6);
        let sentence = "";
        for (let i = 0; i < length; i++) {
          sentence += words[Math.floor(Math.random() * words.length)];
          if (i < length - 1 && Math.random() > 0.7) {
            sentence += "，";
          }
        }
        return sentence + punct[Math.floor(Math.random() * 2)];
      }

      function generatePoetry(amount) {
        let result = [];
        const poems = [...data.poetry];
        for (let i = 0; i < Math.min(amount, poems.length); i++) {
          const idx = Math.floor(Math.random() * poems.length);
          result.push(poems.splice(idx, 1)[0]);
        }
        return result.join("\n\n");
      }

      function generatePangram(amount) {
        let result = [];
        const allPangrams = [...data.pangrams.en, ...data.pangrams.zh];
        for (let i = 0; i < amount; i++) {
          result.push(allPangrams[Math.floor(Math.random() * allPangrams.length)]);
        }
        return result.join("\n");
      }

      window.generateRandom = function (unit, amount) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

        switch (unit) {
          case "characters":
            let result = "";
            for (let i = 0; i < amount; i++) {
              result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
          case "words":
            let words = [];
            for (let i = 0; i < amount; i++) {
              let word = "";
              const len = 3 + Math.floor(Math.random() * 8);
              for (let j = 0; j < len; j++) {
                word += chars.charAt(Math.floor(Math.random() * 52));
              }
              words.push(word);
            }
            return words.join(" ");
          case "sentences":
            let sentences = [];
            for (let i = 0; i < amount; i++) {
              let words2 = [];
              const wordCount = 5 + Math.floor(Math.random() * 10);
              for (let j = 0; j < wordCount; j++) {
                let word = "";
                const len = 3 + Math.floor(Math.random() * 6);
                for (let k = 0; k < len; k++) {
                  word += chars.charAt(Math.floor(Math.random() * 52));
                }
                words2.push(word.toLowerCase());
              }
              words2[0] = words2[0].charAt(0).toUpperCase() + words2[0].slice(1);
              sentences.push(words2.join(" ") + ".");
            }
            return sentences.join(" ");
          case "paragraphs":
            let paras = [];
            for (let i = 0; i < amount; i++) {
              let sentences2 = [];
              const sentCount = 3 + Math.floor(Math.random() * 4);
              for (let j = 0; j < sentCount; j++) {
                let words3 = [];
                const wordCount2 = 5 + Math.floor(Math.random() * 10);
                for (let k = 0; k < wordCount2; k++) {
                  let word = "";
                  const len = 3 + Math.floor(Math.random() * 6);
                  for (let l = 0; l < len; l++) {
                    word += chars.charAt(Math.floor(Math.random() * 52));
                  }
                  words3.push(word.toLowerCase());
                }
                words3[0] = words3[0].charAt(0).toUpperCase() + words3[0].slice(1);
                sentences2.push(words3.join(" ") + ".");
              }
              paras.push(sentences2.join(" "));
            }
            return paras.join("\n\n");
        }
      };

      function applyFormat(text, format, unit) {
        if (format === "plain") return text;

        const parts = unit === "paragraphs" ? text.split("\n\n") : [text];

        switch (format) {
          case "html-p":
            return parts.map((p) => `<p>${p}</p>`).join("\n");
          case "html-li":
            return "<ul>\n" + parts.map((p) => `  <li>${p}</li>`).join("\n") + "\n</ul>";
          case "html-div":
            return parts.map((p) => `<div>${p}</div>`).join("\n");
          default:
            return text;
        }
      }

      function updateStats(text) {
        document.getElementById("charCount").textContent = text.length;
        document.getElementById("wordCount").textContent = text.trim()
          ? text.trim().split(/\s+/).length
          : 0;
        document.getElementById("paraCount").textContent = text.trim()
          ? text.split(/\n\n+/).filter((p) => p.trim()).length
          : 0;
      }

      window.copyOutput = function () {
        const output = document.getElementById("output");
        if (!output.value) {
          showToast("没有可复制的内容");
          return;
        }
        navigator.clipboard.writeText(output.value).then(() => {
          showToast("已复制到剪贴板");
        });
      };

      window.downloadOutput = function () {
        const output = document.getElementById("output").value;
        if (!output) {
          showToast("没有可下载的内容");
          return;
        }
        const blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "placeholder-text.txt";
        a.click();
        URL.revokeObjectURL(url);
        showToast("文件已下载");
      };

      window.clearOutput = function () {
        document.getElementById("output").value = "";
        updateStats("");
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Generate initial content
      generate();
    </script>

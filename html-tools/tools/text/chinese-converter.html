      // 输入框事件监听
      document.getElementById("input-text").addEventListener("input", function () {
        document.getElementById("input-count").textContent = this.value.length;
      });

      document.getElementById("output-text").addEventListener("input", function () {
        document.getElementById("output-count").textContent = this.value.length;
      });

      // 简体转繁体
      window.convertToTraditional = function () {
        const input = document.getElementById("input-text").value;
        let result = "";
        for (const char of input) {
          result += s2tDict[char] || char;
        }
        document.getElementById("output-text").value = result;
        document.getElementById("output-count").textContent = result.length;
      };

      // 繁体转简体
      window.convertToSimplified = function () {
        const input = document.getElementById("input-text").value;
        let result = "";
        for (const char of input) {
          result += t2sDict[char] || char;
        }
        document.getElementById("output-text").value = result;
        document.getElementById("output-count").textContent = result.length;
      };

      // 交换文本
      window.swapText = function () {
        const inputEl = document.getElementById("input-text");
        const outputEl = document.getElementById("output-text");
        const temp = inputEl.value;
        inputEl.value = outputEl.value;
        outputEl.value = temp;
        document.getElementById("input-count").textContent = inputEl.value.length;
        document.getElementById("output-count").textContent = outputEl.value.length;
      };

      // 清空输入
      window.clearInput = function () {
        document.getElementById("input-text").value = "";
        document.getElementById("input-count").textContent = "0";
      };

      // 复制输出
      window.copyOutput = function () {
        const output = document.getElementById("output-text");
        output.select();
        document.execCommand("copy");

        // 提示复制成功
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = "已复制";
        setTimeout(() => {
          btn.textContent = originalText;
        }, 1500);
      };

      // 主题切换
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "🌙" : "☀️";
        localStorage.setItem("theme", newTheme);
      };

      // 初始化主题
      (function initTheme() {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.getElementById("theme-icon").textContent = savedTheme === "light" ? "🌙" : "☀️";
      })();
    </script>

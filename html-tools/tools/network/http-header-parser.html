    <style>
      /* CSS 变量兼容垫片 (修复 d03c9548 改名遗留) */
      :root {
        /* color-* 家族 → 新设计系统 */
        --color-bg-deep: var(--bg-deep, #0a0a0f);
        --color-bg-surface: var(--bg-surface, #12121a);
        --color-bg-subtle: var(--bg-card, #1a1a24);
        --color-bg-card: var(--bg-card, #1a1a24);
        --color-bg-input: var(--bg-input, #0e0e14);
        --color-text-primary: var(--text-primary, #e8e8ed);
        --color-text-secondary: var(--text-secondary, #8888a0);
        --color-text-muted: var(--text-muted, #55556a);
        --color-border-default: var(--border-subtle, #2a2a3a);
        --color-border-subtle: var(--border-subtle, #2a2a3a);
        --color-border-strong: var(--border-strong, #3a3a4a);
        --color-accent-primary: var(--accent-cyan, #00f5d4);
        --color-accent-secondary: var(--accent-magenta, #f72585);
        --color-accent-tertiary: var(--accent-blue, #4cc9f0);
        --color-accent-cyan: var(--accent-cyan, #00f5d4);
        --color-accent-purple: var(--accent-purple, #8b5cf6);
        --color-accent-pink: var(--accent-magenta, #f72585);
        --color-accent-orange: #ff9f1c;
        --color-success: var(--accent-green, #10b981);
        --color-warning: var(--accent-yellow, #fbbf24);
        --color-error: var(--accent-red, #f43f5e);
        --color-danger: var(--accent-red, #f43f5e);
        --color-info: var(--accent-blue, #4cc9f0);
        --color-safe: var(--accent-green, #10b981);

        /* 玻璃拟态 */
        --glass-bg: rgba(26, 26, 36, 0.72);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-blur: 24px;
        --glass-saturate: 180%;
        --glass-radius: 16px;
        --glass-border-width: 1px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

        /* 间距尺度 */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-card: 16px;

        /* 阴影 */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(0, 245, 212, 0.15);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);

        /* 辉光 */
        --glow-cyan: 0 0 20px rgba(0, 245, 212, 0.4);
        --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
        --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
        --glow-red: 0 0 20px rgba(244, 63, 94, 0.4);
        --glow-magenta: 0 0 20px rgba(247, 37, 133, 0.4);
        --accent-glow: 0 0 20px rgba(0, 245, 212, 0.4);

        /* 过渡 */
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
        --transition: 200ms ease;

        /* 圆角 */
        --radius-full: 9999px;
        --radius-xl: 24px;
        --border-radius: 8px;

        /* 布局 */
        --nav-height: 56px;
        --container-max: 1400px;
        --container-bg: var(--bg-card, #1a1a24);
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);

        /* 单名旧约定 */
        --bg-color: var(--bg-deep, #0a0a0f);
        --bg-secondary: var(--bg-surface, #12121a);
        --bg-tertiary: var(--bg-card, #1a1a24);
        --bg-elevated: var(--bg-card-hover, #22222e);
        --bg-hover: var(--bg-card-hover, #22222e);
        --bg-card-hover: #22222e;
        --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        --primary-gradient: linear-gradient(135deg, #00f5d4 0%, #4cc9f0 100%);
        --text-color: var(--text-primary, #e8e8ed);
        --primary-color: var(--accent-cyan, #00f5d4);
        --primary-focus: rgba(0, 245, 212, 0.25);
        --secondary-color: var(--accent-magenta, #f72585);
        --tertiary-color: var(--text-muted, #55556a);
        --accent-color: var(--accent-cyan, #00f5d4);
        --accent-hover: #2dffe2;
        --accent-light: rgba(0, 245, 212, 0.15);
        --accent-pink: var(--accent-magenta, #f72585);
        --accent-orange: #ff9f1c;
        --accent-gold: #ffd166;
        --accent-brown: #a0522d;
        --success-color: var(--accent-green, #10b981);
        --good-color: var(--accent-green, #10b981);
        --warning-color: var(--accent-yellow, #fbbf24);
        --error-color: var(--accent-red, #f43f5e);
        --danger-color: var(--accent-red, #f43f5e);
        --info-color: var(--accent-blue, #4cc9f0);
        --muted-color: var(--text-muted, #55556a);
        --muted-border-color: var(--border-subtle, #2a2a3a);
        --hover-color: var(--accent-cyan, #00f5d4);
        --border-default: var(--border-subtle, #2a2a3a);
        --border-focus: var(--accent-cyan, #00f5d4);
        --border-accent: var(--accent-cyan, #00f5d4);
        --card-background-color: var(--bg-card, #1a1a24);
        --code-background-color: var(--bg-input, #0e0e14);

        /* Pico CSS 框架默认 */
        --pico-background-color: var(--bg-deep, #0a0a0f);
        --pico-color: var(--text-primary, #e8e8ed);
        --pico-muted-color: var(--text-muted, #55556a);
        --pico-muted-border-color: var(--border-subtle, #2a2a3a);
        --pico-muted-background: var(--bg-surface, #12121a);
        --pico-card-background-color: var(--bg-card, #1a1a24);
        --pico-code-background-color: var(--bg-input, #0e0e14);
        --pico-primary: var(--accent-cyan, #00f5d4);
        --pico-primary-background: var(--accent-cyan, #00f5d4);
        --pico-primary-inverse: #0a0a0f;
        --pico-primary-focus: rgba(0, 245, 212, 0.25);
        --pico-primary-rgb: 0, 245, 212;
        --pico-secondary: var(--text-secondary, #8888a0);
        --pico-secondary-background: var(--bg-card, #1a1a24);
        --pico-border-radius: 8px;
        --pico-contrast: var(--text-primary, #e8e8ed);
        --pico-contrast-background: var(--bg-card-hover, #22222e);
        --pico-del-color: var(--accent-red, #f43f5e);
        --pico-ins-color: var(--accent-green, #10b981);
        --pico-form-element-border-color: var(--border-strong, #3a3a4a);
        --pico-form-element-background-color: var(--bg-input, #0e0e14);
      }

      /* 浅色主题覆盖：glass/shadow/glow 等主题敏感变量 */
      [data-theme="light"] {
        /* 玻璃拟态 — 浅色版（半透明白） */
        --glass-bg: rgba(255, 255, 255, 0.78);
        --glass-border: rgba(0, 0, 0, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);

        /* 阴影 — 浅色版（更淡） */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 20px rgba(0, 184, 148, 0.12);
        --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);

        /* 辉光 — 浅色版（透明度降低） */
        --glow-cyan: 0 0 16px rgba(0, 184, 148, 0.18);
        --glow-purple: 0 0 16px rgba(139, 92, 246, 0.18);
        --glow-green: 0 0 16px rgba(16, 185, 129, 0.18);
        --glow-red: 0 0 16px rgba(244, 63, 94, 0.18);
        --glow-magenta: 0 0 16px rgba(247, 37, 133, 0.18);
        --accent-glow: 0 0 16px rgba(0, 184, 148, 0.18);

        /* 渐变 — 浅色版 */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #fff 100%);

        /* hover/elevated 替换为浅色调 */
        --bg-card-hover: #f1f5f9;
        --bg-elevated: #fff;
        --bg-hover: #f1f5f9;
        --accent-light: rgba(0, 184, 148, 0.12);
        --accent-hover: #00d4aa;

        /* Pico 浅色覆盖（默认 Pico 行为） */
        --pico-primary-inverse: #fff;
        --pico-contrast-background: #f1f5f9;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .back-link {
        display: inline-flex;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        transition: all 0.2s;
      }
      .back-link:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--color-accent-cyan), var(--accent-green));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }
      .main-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 20px;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .btn {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 10px 16px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .btn:focus-visible {
        outline: 2px solid var(--color-accent-cyan);
        outline-offset: 2px;
      }
      .btn.primary {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }
      .btn.primary:hover {
        background: #00dfc4;
        border-color: #00dfc4;
      }
      textarea {
        width: 100%;
        min-height: 180px;
        padding: 14px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        resize: vertical;
        line-height: 1.6;
      }
      textarea:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }
      textarea::placeholder {
        color: var(--text-muted);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        margin-top: 10px;
        min-height: 20px;
      }
      .status.success {
        color: var(--accent-green);
      }
      .status.error {
        color: var(--accent-red);
      }
      .section-title {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-title .badge {
        font-size: 0.7rem;
        padding: 3px 8px;
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
        border-radius: var(--radius-sm);
        font-weight: 500;
      }
      .badge-security {
        background: var(--accent-green) !important;
      }
      .badge-warning {
        background: var(--accent-yellow) !important;
        color: var(--color-text-primary) !important;
      }

      /* Security Status Panel */
      .security-panel {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-bottom: 20px;
      }
      .security-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .security-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }
      .security-item .icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        flex-shrink: 0;
      }
      .security-item.present .icon {
        background: var(--accent-green);
        color: #fff;
      }
      .security-item.missing .icon {
        background: var(--text-muted);
        color: var(--color-bg-deep);
      }
      .security-item .name {
        color: var(--color-text-secondary);
      }
      .security-item.present .name {
        color: var(--color-text-primary);
      }

      /* Headers Table */
      .table-wrap {
        max-height: 500px;
        overflow-y: auto;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
      }
      th {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        background: var(--color-bg-surface);
        position: sticky;
        top: 0;
        z-index: 1;
      }
      td {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        vertical-align: top;
      }
      tr:hover {
        background: var(--bg-hover);
      }
      tr:last-child td {
        border-bottom: none;
      }
      .header-name {
        color: var(--color-accent-cyan);
        font-weight: 500;
        white-space: nowrap;
      }
      .header-name.security {
        color: var(--accent-green);
      }
      .header-name.auth {
        color: var(--color-accent-purple);
      }
      .header-name.cache {
        color: var(--accent-blue);
      }
      .header-value {
        word-break: break-all;
        max-width: 400px;
      }
      .header-desc {
        color: var(--color-text-secondary);
        font-size: 0.8rem;
      }
      .copy-btn {
        padding: 4px 8px;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .tooltip {
        position: relative;
        cursor: help;
      }
      .tooltip::after {
        content: attr(data-tip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        background: var(--color-bg-deep);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
        z-index: 10;
        color: var(--color-text-primary);
        max-width: 300px;
        white-space: normal;
      }
      .tooltip:hover::after {
        opacity: 1;
        visibility: visible;
      }
      .no-results {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .type-badge {
        display: inline-block;
        padding: 2px 6px;
        font-size: 0.7rem;
        border-radius: var(--radius-sm);
        margin-left: 8px;
        font-weight: 500;
      }
      .type-request {
        background: var(--accent-blue);
        color: #fff;
      }
      .type-response {
        background: var(--color-accent-purple);
        color: #fff;
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {

    <script>
      const LS_KEY = "http_header_parser_v1";

      // Header descriptions database
      const headerDescriptions = {
        // General Headers
        "cache-control": {

          category: "cache",

        },
        connection: {

        pragma: {

        },

        via: { desc: "代理信息", category: "general", tip: "中间代理服务器信息" },
        warning: { desc: "警告信息", category: "general", tip: "关于消息状态的额外警告信息" },

        // Request Headers
        accept: {
          desc: "可接受类型",
          category: "request",
          tip: "客户端可接受的响应内容类型 (MIME)"
        },
        "accept-charset": {
          desc: "可接受字符集",
          category: "request",
          tip: "客户端可接受的字符编码"
        },
        "accept-encoding": {
          desc: "可接受编码",
          category: "request",
          tip: "客户端可接受的内容编码，如 gzip, deflate"
        },
        "accept-language": {
          desc: "可接受语言",
          category: "request",
          tip: "客户端偏好的语言，如 zh-CN, en-US"
        },
        authorization: {
          desc: "认证凭证",
          category: "auth",
          tip: "客户端认证信息，如 Bearer token 或 Basic 认证"
        },
        cookie: { desc: "Cookie", category: "auth", tip: "客户端发送的 Cookie 数据" },
        expect: { desc: "期望行为", category: "request", tip: "客户端期望服务器的特定行为" },
        from: { desc: "用户邮箱", category: "request", tip: "发出请求的用户的电子邮件地址" },
        host: { desc: "目标主机", category: "request", tip: "请求的目标主机名和端口号" },
        "if-match": { desc: "条件匹配", category: "cache", tip: "条件请求：仅当 ETag 匹配时执行" },
        "if-modified-since": {
          desc: "条件修改时间",
          category: "cache",
          tip: "条件请求：仅当资源在指定时间后修改"
        },
        "if-none-match": {
          desc: "条件不匹配",
          category: "cache",
          tip: "条件请求：仅当 ETag 不匹配时执行"
        },
        "if-range": { desc: "条件范围", category: "cache", tip: "条件范围请求" },
        "if-unmodified-since": {
          desc: "条件未修改",
          category: "cache",
          tip: "条件请求：仅当资源未修改时执行"
        },
        "max-forwards": {
          desc: "最大转发数",
          category: "request",
          tip: "限制代理或网关转发的最大次数"
        },
        "proxy-authorization": {
          desc: "代理认证",
          category: "auth",
          tip: "向代理服务器提供的认证凭证"
        },
        range: { desc: "范围请求", category: "request", tip: "请求资源的部分内容，用于断点续传" },
        referer: { desc: "来源页面", category: "request", tip: "发起请求的页面 URL" },
        te: { desc: "传输编码接受", category: "request", tip: "客户端可接受的传输编码" },
        "user-agent": {
          desc: "客户端标识",
          category: "request",
          tip: "客户端软件信息（浏览器、操作系统等）"
        },

        // Response Headers
        "accept-ranges": { desc: "支持范围", category: "response", tip: "服务器是否支持范围请求" },
        age: { desc: "缓存时间", category: "cache", tip: "响应在代理缓存中存在的时间（秒）" },
        etag: { desc: "实体标签", category: "cache", tip: "资源版本标识符，用于缓存验证" },
        location: { desc: "重定向位置", category: "response", tip: "重定向的目标 URL" },
        "proxy-authenticate": {
          desc: "代理认证要求",
          category: "auth",
          tip: "代理服务器要求的认证方式"
        },
        "retry-after": { desc: "重试时间", category: "response", tip: "客户端应在多久后重试请求" },
        server: { desc: "服务器信息", category: "response", tip: "服务器软件信息" },
        "set-cookie": { desc: "设置 Cookie", category: "auth", tip: "服务器设置的 Cookie" },
        vary: { desc: "缓存变体", category: "cache", tip: "决定缓存响应是否可用的请求头" },
        "www-authenticate": { desc: "认证要求", category: "auth", tip: "服务器要求的认证方式" },

        // Entity Headers
        allow: { desc: "允许方法", category: "entity", tip: "资源允许的 HTTP 方法" },
        "content-encoding": {
          desc: "内容编码",
          category: "entity",
          tip: "响应体的编码方式，如 gzip"
        },
        "content-language": { desc: "内容语言", category: "entity", tip: "响应内容的语言" },
        "content-length": { desc: "内容长度", category: "entity", tip: "响应体的字节大小" },
        "content-location": { desc: "内容位置", category: "entity", tip: "响应内容的备用位置" },
        "content-md5": { desc: "内容校验", category: "entity", tip: "响应体的 MD5 校验值" },
        "content-range": { desc: "内容范围", category: "entity", tip: "部分响应的范围信息" },
        "content-type": {
          desc: "MIME 类型",
          category: "entity",
          tip: "响应体的媒体类型，如 application/json"
        },
        expires: { desc: "过期时间", category: "cache", tip: "响应的过期日期/时间" },
        "last-modified": { desc: "最后修改", category: "cache", tip: "资源的最后修改时间" },

        // Security Headers
        "strict-transport-security": {
          desc: "HSTS",
          category: "security",
          tip: "强制使用 HTTPS 连接，防止降级攻击"
        },
        "content-security-policy": {
          desc: "CSP",
          category: "security",
          tip: "内容安全策略，防止 XSS 和数据注入攻击"
        },
        "content-security-policy-report-only": {
          desc: "CSP 报告",
          category: "security",
          tip: "仅报告违规，不阻止"
        },
        "x-frame-options": {
          desc: "框架选项",
          category: "security",
          tip: "控制页面是否可被 iframe 嵌入，防止点击劫持"
        },
        "x-content-type-options": {
          desc: "类型嗅探",
          category: "security",
          tip: "禁止浏览器 MIME 类型嗅探"
        },
        "x-xss-protection": {
          desc: "XSS 保护",
          category: "security",
          tip: "启用浏览器的 XSS 过滤器（已弃用）"
        },
        "x-permitted-cross-domain-policies": {
          desc: "跨域策略",
          category: "security",
          tip: "控制 Flash/PDF 跨域策略"
        },
        "referrer-policy": {
          desc: "Referer 策略",
          category: "security",
          tip: "控制 Referer 头的发送策略"
        },
        "permissions-policy": {
          desc: "权限策略",
          category: "security",
          tip: "控制浏览器功能和 API 的使用权限"
        },
        "feature-policy": {
          desc: "功能策略",
          category: "security",
          tip: "旧版权限策略（已被 Permissions-Policy 取代）"
        },
        "cross-origin-embedder-policy": {
          desc: "COEP",
          category: "security",
          tip: "跨源嵌入策略，控制资源加载"
        },
        "cross-origin-opener-policy": {
          desc: "COOP",
          category: "security",
          tip: "跨源开启者策略，控制窗口访问"
        },
        "cross-origin-resource-policy": {
          desc: "CORP",
          category: "security",
          tip: "跨源资源策略，控制资源共享"
        },

        // CORS Headers
        "access-control-allow-origin": {
          desc: "CORS 来源",
          category: "cors",
          tip: "允许访问资源的来源"
        },
        "access-control-allow-credentials": {
          desc: "CORS 凭证",
          category: "cors",
          tip: "是否允许发送凭证"
        },
        "access-control-allow-headers": {
          desc: "CORS 头",
          category: "cors",
          tip: "预检请求中允许的请求头"
        },
        "access-control-allow-methods": {
          desc: "CORS 方法",
          category: "cors",
          tip: "预检请求中允许的 HTTP 方法"
        },
        "access-control-expose-headers": {
          desc: "CORS 暴露头",
          category: "cors",
          tip: "可以暴露给客户端的响应头"
        },
        "access-control-max-age": {
          desc: "CORS 缓存",
          category: "cors",
          tip: "预检请求结果的缓存时间"
        },
        "access-control-request-headers": {
          desc: "CORS 请求头",
          category: "cors",
          tip: "预检请求中将使用的请求头"
        },
        "access-control-request-method": {
          desc: "CORS 请求方法",
          category: "cors",
          tip: "预检请求中将使用的方法"
        },
        origin: { desc: "请求来源", category: "cors", tip: "发起请求的来源" }
      };

      // Security headers to check
      const securityHeaders = [
        { name: "strict-transport-security", label: "HSTS" },
        { name: "content-security-policy", label: "CSP" },
        { name: "x-frame-options", label: "X-Frame-Options" },
        { name: "x-content-type-options", label: "X-Content-Type-Options" },
        { name: "referrer-policy", label: "Referrer-Policy" },
        { name: "permissions-policy", label: "Permissions-Policy" }
      ];

      // Sample headers
      const sampleRequest =
        "GET /api/users HTTP/1.1\n" +
        "Host: api.example.com\n" +
        "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36\n" +
        "Accept: application/json\n" +
        "Accept-Language: zh-CN,zh;q=0.9,en;q=0.8\n" +
        "Accept-Encoding: gzip, deflate, br\n" +
        "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\n" +
        "Cookie: session_id=abc123; user_pref=dark\n" +
        "Connection: keep-alive\n" +
        "Cache-Control: no-cache";

      const sampleResponse =
        "HTTP/1.1 200 OK\n" +
        "Date: Thu, 26 Dec 2024 10:00:00 GMT\n" +
        "Content-Type: application/json; charset=utf-8\n" +
        "Content-Length: 1234\n" +
        "Connection: keep-alive\n" +
        "Server: nginx/1.24.0\n" +
        "Cache-Control: max-age=3600, public\n" +
        'ETag: "abc123def456"\n' +
        "Last-Modified: Wed, 25 Dec 2024 08:00:00 GMT\n" +
        "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload\n" +
        "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'\n" +
        "X-Frame-Options: DENY\n" +
        "X-Content-Type-Options: nosniff\n" +
        "X-XSS-Protection: 1; mode=block\n" +
        "Referrer-Policy: strict-origin-when-cross-origin\n" +
        "Access-Control-Allow-Origin: https://example.com\n" +
        "Set-Cookie: session=xyz789; Path=/; HttpOnly; Secure; SameSite=Strict";

      let sampleIndex = 0;

      function parseHeaders(rawText) {
        const lines = rawText.trim().split(/\r?\n/);
        const headers = [];
        let headerType = "unknown";

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          // Check for request/response line
          if (i === 0) {
            if (/^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS|TRACE|CONNECT)\s+/i.test(line)) {
              headerType = "request";
              continue;
            } else if (/^HTTP\/[\d.]+\s+\d+/i.test(line)) {
              headerType = "response";
              continue;
            }
          }

          // Parse header line
          const colonIndex = line.indexOf(":");
          if (colonIndex > 0) {
            const name = line.substring(0, colonIndex).trim();
            const value = line.substring(colonIndex + 1).trim();
            headers.push({ name: name, value: value });
          }
        }

        return { headers: headers, headerType: headerType };
      }

      function getCategoryClass(name) {
        const info = headerDescriptions[name.toLowerCase()];
        if (!info) return "";
        if (info.category === "security") return "security";
        if (info.category === "auth") return "auth";
        if (info.category === "cache") return "cache";
        return "";
      }

      function getHeaderInfo(name) {
        const info = headerDescriptions[name.toLowerCase()];
        return info || { desc: "-", tip: "" };
      }

      function renderHeaders(headers) {
        const tbody = document.getElementById("tbody");
        tbody.textContent = "";

        if (headers.length === 0) {
          document.getElementById("noResults").style.display = "block";
          return;
        }

        document.getElementById("noResults").style.display = "none";

        headers.forEach(function (header) {
          const info = getHeaderInfo(header.name);
          const categoryClass = getCategoryClass(header.name);
          const tr = document.createElement("tr");

          // Name cell
          const tdName = document.createElement("td");
          tdName.className = "header-name " + categoryClass;
          tdName.textContent = header.name;
          tr.appendChild(tdName);

          // Value cell
          const tdValue = document.createElement("td");
          tdValue.className = "header-value";
          tdValue.textContent = header.value;
          tr.appendChild(tdValue);

          // Description cell
          const tdDesc = document.createElement("td");
          tdDesc.className = "header-desc";
          if (info.tip) {
            const tooltip = document.createElement("span");
            tooltip.className = "tooltip";
            tooltip.setAttribute("data-tip", info.tip);
            tooltip.textContent = info.desc;
            tdDesc.appendChild(tooltip);
          } else {
            tdDesc.textContent = info.desc;
          }
          tr.appendChild(tdDesc);

          // Copy button cell
          const tdCopy = document.createElement("td");
          const copyBtn = document.createElement("button");
          copyBtn.className = "copy-btn";
          copyBtn.textContent = "复制";
          copyBtn.onclick = function () {
            copyToClipboard(header.value);
          };
          tdCopy.appendChild(copyBtn);
          tr.appendChild(tdCopy);

          tbody.appendChild(tr);
        });
      }

      function renderSecurityStatus(headers) {
        const grid = document.getElementById("securityGrid");
        grid.textContent = "";
        const headerMap = {};

        headers.forEach(function (h) {
          headerMap[h.name.toLowerCase()] = h.value;
        });

        securityHeaders.forEach(function (sh) {
          const present = sh.name in headerMap;
          const item = document.createElement("div");
          item.className = "security-item " + (present ? "present" : "missing");

          const icon = document.createElement("span");
          icon.className = "icon";
          icon.textContent = present ? "✓" : "✗";
          item.appendChild(icon);

          const name = document.createElement("span");
          name.className = "name";
          name.textContent = sh.label;
          item.appendChild(name);

          grid.appendChild(item);
        });
      }

      function parse() {
        const input = document.getElementById("input").value.trim();
        if (!input) {
          showStatus("请输入 HTTP 头", "error");
          return;
        }

        const result = parseHeaders(input);

        if (result.headers.length === 0) {
          showStatus("未找到有效的 HTTP 头", "error");
          document.getElementById("resultSection").style.display = "none";
          document.getElementById("securitySection").style.display = "none";
          return;
        }

        renderHeaders(result.headers);
        renderSecurityStatus(result.headers);

        // Update header type badge
        const typeEl = document.getElementById("headerType");
        if (result.headerType === "request") {
          typeEl.textContent = "REQUEST";
          typeEl.className = "type-badge type-request";
        } else if (result.headerType === "response") {
          typeEl.textContent = "RESPONSE";
          typeEl.className = "type-badge type-response";
        } else {
          typeEl.textContent = "";
          typeEl.className = "type-badge";
        }

        document.getElementById("resultSection").style.display = "block";
        document.getElementById("securitySection").style.display = "block";

        showStatus("解析成功，共 " + result.headers.length + " 个头", "success");
        saveToStorage();
        saveToUrl();
      }

      function showStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status " + (type || "");
      }

      window.copyToClipboard = async function (text) {
        try {
          await navigator.clipboard.writeText(text);
          showStatus("已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      // URL state
      window.loadFromUrl = function () {
        const hash = location.hash.slice(1);
        if (!hash) return false;
        try {
          document.getElementById("input").value = decodeURIComponent(atob(hash));
          return true;
        } catch (e) {
          return false;
        }
      };

      function saveToUrl() {
        try {
          const input = document.getElementById("input").value;
          if (input.length > 2000) return;
          const encoded = btoa(encodeURIComponent(input));
          history.replaceState(null, "", "#" + encoded);
        } catch (e) {
          // ignore encoding errors
        }
      }

      // localStorage
      function loadFromStorage() {
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          document.getElementById("input").value = saved;
        }
      }

      function saveToStorage() {
        localStorage.setItem(LS_KEY, document.getElementById("input").value);
      }

      // Event listeners
      document.getElementById("btnPaste").onclick = async function () {
        try {
          const text = await navigator.clipboard.readText();
          document.getElementById("input").value = text;
          saveToStorage();
          showStatus("已粘贴", "success");
          parse();
        } catch (e) {
          showStatus("无法访问剪贴板", "error");
        }
      };

      document.getElementById("btnParse").onclick = parse;

      document.getElementById("btnSample").onclick = function () {
        var samples = [sampleResponse, sampleRequest];
        document.getElementById("input").value = samples[sampleIndex % 2];
        sampleIndex++;
        saveToStorage();
        parse();
      };

      document.getElementById("btnShare").onclick = async function () {
        saveToUrl();
        try {
          await navigator.clipboard.writeText(location.href);
          showStatus("分享链接已复制", "success");
        } catch (e) {
          showStatus("复制失败", "error");
        }
      };

      document.getElementById("btnClear").onclick = function () {
        document.getElementById("input").value = "";
        document.getElementById("resultSection").style.display = "none";
        document.getElementById("securitySection").style.display = "none";
        localStorage.removeItem(LS_KEY);
        history.replaceState(null, "", location.pathname);
        showStatus("已清空", "success");
      };

      document.getElementById("input").addEventListener("input", function () {
        saveToStorage();
      });

      // Auto-parse on input change (debounced)
      var parseTimeout;
      document.getElementById("input").addEventListener("input", function () {
        clearTimeout(parseTimeout);
        parseTimeout = setTimeout(function () {
          var input = document.getElementById("input").value.trim();
          if (input && input.indexOf(":") !== -1) {
            parse();
          }
        }, 500);
      });

      // Theme toggle
      window.toggleTheme = function () {
        var html = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        var next = html.getAttribute("data-theme") === "light" ? "dark" : "light";

        if (next === "light") {
          html.setAttribute("data-theme", "light");
        } else {
          html.removeAttribute("data-theme");
        }

        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      // Initialize theme
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          var btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = "☀️";
        }
      })();

      // Initialize
      if (loadFromUrl()) {
        parse();
      } else {
        loadFromStorage();
        if (document.getElementById("input").value.trim()) {
          parse();
        }
      }
    </script>
  </body>
</html>

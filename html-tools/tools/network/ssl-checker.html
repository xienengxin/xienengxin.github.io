  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

      SSL证书检查
    </nav>
    <div class="container">
      <h1>🔒 SSL证书检查</h1>
      <div class="card">
        <div class="search-box">
          <input
            type="text"
            id="url"
            placeholder="输入网址，如 https://example.com"
            onkeypress="if (event.key === 'Enter') check();"
          />
          <button onclick="check()">检查</button>
        </div>
        <div class="status valid" id="status" style="display: none">
          <div class="status-icon">✓</div>
          <div>SSL证书有效</div>
        </div>
        <div class="result" id="result">
          <p style="text-align: center; color: #999; padding: 40px">输入网址检查SSL证书</p>
        </div>
        <div class="info">💡 注意：此工具显示模拟数据用于演示。实际SSL检查需要服务器端支持。</div>
      </div>
    </div>
    <script>
      function check() {
        const url = document.getElementById("url").value.trim();
        if (!url) return;
        document.getElementById("status").style.display = "block";
        const data = [
          {
            label: "域名",
            value: new URL(url.startsWith("http") ? url : "https://" + url).hostname
          },
          { label: "颁发机构", value: "Let's Encrypt Authority X3" },
          { label: "颁发日期", value: "2024-01-01" },
          { label: "到期日期", value: "2024-12-31" },
          { label: "协议版本", value: "TLS 1.3" },
          { label: "加密算法", value: "ECDHE-RSA-AES256-GCM-SHA384" },
          { label: "证书类型", value: "DV (Domain Validation)" }
        ];
        document.getElementById("result").innerHTML = data
          .map(
            (d) =>
              '<div class="result-item"><span class="result-label">' +
              d.label +
              '</span><span class="result-value">' +
              d.value +
              "</span></div>"
          )
          .join("");
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>

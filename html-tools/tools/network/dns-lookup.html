  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>

    <div class="container">
      <h1>🔍 DNS查询工具</h1>
      <div class="card">
        <div class="search-box">
          <input
            type="text"
            id="domainInput"
            placeholder="输入域名，如 example.com"
            value="google.com"
          />
          <button class="btn" onclick="lookupDNS()">查询</button>
        </div>
        <div class="record-types">
          <button class="type-btn active" data-type="A">A</button>
          <button class="type-btn active" data-type="AAAA">AAAA</button>
          <button class="type-btn active" data-type="CNAME">CNAME</button>
          <button class="type-btn active" data-type="MX">MX</button>
          <button class="type-btn active" data-type="NS">NS</button>
          <button class="type-btn" data-type="TXT">TXT</button>
          <button class="type-btn" data-type="SOA">SOA</button>
        </div>
        <div class="results" id="results"></div>
        <div class="info-box">
          <h4>📚 DNS记录类型说明</h4>
          <p>
            <strong>A</strong>
            : IPv4地址记录 |
            <strong>AAAA</strong>
            : IPv6地址记录 |
            <strong>CNAME</strong>
            : 别名记录 |
            <strong>MX</strong>
            : 邮件服务器 |
            <strong>NS</strong>
            : 域名服务器 |
            <strong>TXT</strong>
            : 文本记录 |
            <strong>SOA</strong>
            : 起始授权记录
          </p>
        </div>
      </div>
    </div>
    <script>
      // Toggle record type selection
      document.querySelectorAll(".type-btn").forEach((btn) => {
        btn.onclick = () => btn.classList.toggle("active");
      });

      async function lookupDNS() {
        const domain = document.getElementById("domainInput").value.trim();
        if (!domain) {
          alert("请输入域名");
          return;
        }

        // Remove protocol if present
        const cleanDomain = domain.replace(/^https?:\/\//, "").replace(/\/.*$/, "");

        const types = Array.from(document.querySelectorAll(".type-btn.active")).map(
          (btn) => btn.dataset.type
        );

        if (types.length === 0) {
          alert("请至少选择一种记录类型");
          return;
        }

        document.getElementById("results").innerHTML = '<div class="loading">🔄 正在查询...</div>';

        const results = {};

        // Use Cloudflare DNS over HTTPS API
        for (const type of types) {
          try {
            const response = await fetch(
              `https://cloudflare-dns.com/dns-query?name=${cleanDomain}&type=${type}`,
              {
                headers: {
                  Accept: "application/dns-json"
                }
              }
            );
            const data = await response.json();

            if (data.Answer && data.Answer.length > 0) {
              results[type] = data.Answer;
            }
          } catch (e) {
            console.error(`Error fetching ${type}:`, e);
          }
        }

        displayResults(results, cleanDomain);
      }

      function displayResults(results, domain) {
        if (Object.keys(results).length === 0) {
          document.getElementById("results").innerHTML = `
                    <div class="error">
                        未找到 ${domain} 的DNS记录，或查询失败。请检查域名是否正确。
                    </div>
                `;
          return;
        }

        const typeNames = {
          1: "A",
          28: "AAAA",
          5: "CNAME",
          15: "MX",
          2: "NS",
          16: "TXT",
          6: "SOA"
        };

        const typeEmojis = {
          A: "🔢",
          AAAA: "🌐",
          CNAME: "🔗",
          MX: "📧",
          NS: "🖥️",
          TXT: "📝",
          SOA: "📋"
        };

        let html = `<div style="margin-bottom: 16px; color: #666;">查询域名: <strong>${domain}</strong></div>`;

        for (const [type, records] of Object.entries(results)) {
          html += `
                    <div class="result-section">
                        <h3>${typeEmojis[type] || "📄"} ${type} 记录 (${records.length}条)</h3>
                `;

          records.forEach((record) => {
            const recordType = typeNames[record.type] || type;
            html += `
                        <div class="record">
                            <span class="record-type">${recordType}</span>
                            <span class="record-value">${formatRecordData(record.data, type)}</span>
                            <div class="record-ttl">TTL: ${record.TTL}秒 (${formatTTL(record.TTL)})</div>
                        </div>
                    `;
          });

          html += "</div>";
        }

        document.getElementById("results").innerHTML = html;
      }

      function formatRecordData(data, type) {
        // Clean up the data
        if (typeof data === "string") {
          // Remove surrounding quotes from TXT records
          if (data.startsWith('"') && data.endsWith('"')) {
            data = data.slice(1, -1);
          }
        }
        return data;
      }

      function formatTTL(seconds) {
        if (seconds < 60) return `${seconds}秒`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}分钟`;
        if (seconds < 86400) return `${Math.floor(seconds / 3600)}小时`;
        return `${Math.floor(seconds / 86400)}天`;
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>

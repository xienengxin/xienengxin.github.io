    <script>
      function addInfo(containerId, label, value, isGood) {
        const container = document.getElementById(containerId);
        const item = document.createElement("div");
        item.className = "info-item";
        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = label;
        const valueSpan = document.createElement("span");
        valueSpan.className = "value" + (isGood ? " good" : "");
        valueSpan.textContent = value;
        item.appendChild(labelSpan);
        item.appendChild(valueSpan);
        container.appendChild(item);
      }

      window.clearAll = function () {
        [
          "screenInfo",
          "browserInfo",
          "systemInfo",
          "networkInfo",
          "batteryInfo",
          "hardwareInfo"
        ].forEach(function (id) {
          document.getElementById(id).innerHTML = "";
        });
      };

      function collectInfo() {
        clearAll();

        // Screen info
        addInfo("screenInfo", "屏幕分辨率", screen.width + " × " + screen.height);
        addInfo("screenInfo", "可用区域", screen.availWidth + " × " + screen.availHeight);
        addInfo("screenInfo", "视口大小", window.innerWidth + " × " + window.innerHeight);
        addInfo("screenInfo", "设备像素比", window.devicePixelRatio);
        addInfo("screenInfo", "色彩深度", screen.colorDepth + " bit");
        addInfo("screenInfo", "像素深度", screen.pixelDepth + " bit");
        addInfo("screenInfo", "屏幕方向", screen.orientation ? screen.orientation.type : "未知");

        // Browser info
        addInfo("browserInfo", "User Agent", navigator.userAgent);
        addInfo("browserInfo", "语言", navigator.language);
        addInfo(
          "browserInfo",
          "语言列表",
          navigator.languages ? navigator.languages.join(", ") : navigator.language
        );
        addInfo(
          "browserInfo",
          "Cookie 启用",
          navigator.cookieEnabled ? "是" : "否",
          navigator.cookieEnabled
        );
        addInfo("browserInfo", "Do Not Track", navigator.doNotTrack || "未设置");
        addInfo("browserInfo", "PDF 查看器", navigator.pdfViewerEnabled ? "支持" : "不支持");
        addInfo(
          "browserInfo",
          "Java 启用",
          navigator.javaEnabled ? (navigator.javaEnabled() ? "是" : "否") : "未知"
        );

        // System info
        addInfo("systemInfo", "平台", navigator.platform);
        addInfo("systemInfo", "CPU 核心数", navigator.hardwareConcurrency || "未知");
        addInfo(
          "systemInfo",
          "设备内存",
          navigator.deviceMemory ? navigator.deviceMemory + " GB" : "未知"
        );
        addInfo("systemInfo", "最大触摸点", navigator.maxTouchPoints);
        addInfo("systemInfo", "触摸支持", "ontouchstart" in window ? "支持" : "不支持");

        // Network info
        if (navigator.connection) {
          const conn = navigator.connection;
          addInfo("networkInfo", "连接类型", conn.effectiveType || "未知");
          addInfo("networkInfo", "下行带宽", conn.downlink ? conn.downlink + " Mbps" : "未知");
          addInfo("networkInfo", "往返时延", conn.rtt ? conn.rtt + " ms" : "未知");
          addInfo("networkInfo", "省流模式", conn.saveData ? "启用" : "未启用");
        } else {
          addInfo("networkInfo", "在线状态", navigator.onLine ? "在线" : "离线", navigator.onLine);
        }
        addInfo("networkInfo", "在线状态", navigator.onLine ? "在线" : "离线", navigator.onLine);

        // Battery info
        if (navigator.getBattery) {
          navigator.getBattery().then(function (battery) {
            document.getElementById("batteryCard").style.display = "block";
            const level = Math.round(battery.level * 100);
            addInfo("batteryInfo", "电量", level + "%", level > 20);
            addInfo(
              "batteryInfo",
              "充电状态",
              battery.charging ? "充电中" : "未充电",
              battery.charging
            );
            if (battery.chargingTime !== Infinity) {
              addInfo("batteryInfo", "充满时间", Math.round(battery.chargingTime / 60) + " 分钟");
            }
            if (battery.dischargingTime !== Infinity) {
              addInfo(
                "batteryInfo",
                "剩余时间",
                Math.round(battery.dischargingTime / 60) + " 分钟"
              );
            }
            document.getElementById("batteryFill").style.width = level + "%";
          });
        }

        // Hardware capabilities
        addInfo(
          "hardwareInfo",
          "WebGL",
          (function () {
            try {
              const c = document.createElement("canvas");
              return c.getContext("webgl2")
                ? "WebGL 2.0"
                : c.getContext("webgl")
                  ? "WebGL 1.0"
                  : "不支持";
            } catch (e) {
              return "不支持";
            }
          })()
        );
        addInfo("hardwareInfo", "WebGPU", "gpu" in navigator ? "支持" : "不支持");
        addInfo("hardwareInfo", "Service Worker", "serviceWorker" in navigator ? "支持" : "不支持");
        addInfo("hardwareInfo", "Web Workers", typeof Worker !== "undefined" ? "支持" : "不支持");
        addInfo("hardwareInfo", "IndexedDB", "indexedDB" in window ? "支持" : "不支持");
        addInfo("hardwareInfo", "WebSocket", "WebSocket" in window ? "支持" : "不支持");
        addInfo("hardwareInfo", "Geolocation", "geolocation" in navigator ? "支持" : "不支持");
        addInfo("hardwareInfo", "Notification", "Notification" in window ? "支持" : "不支持");
        addInfo("hardwareInfo", "Web Share", navigator.share ? "支持" : "不支持");
        addInfo("hardwareInfo", "Clipboard API", navigator.clipboard ? "支持" : "不支持");
      }

      function getAllInfo() {
        const sections = [
          "screenInfo",
          "browserInfo",
          "systemInfo",
          "networkInfo",
          "batteryInfo",
          "hardwareInfo"
        ];
        const sectionNames = [
          "屏幕信息",
          "浏览器信息",
          "系统信息",
          "网络信息",
          "电池信息",
          "硬件能力"
        ];
        let text = "设备信息报告\n" + "=".repeat(40) + "\n\n";

        sections.forEach(function (id, i) {
          const container = document.getElementById(id);
          const items = container.querySelectorAll(".info-item");
          if (items.length === 0) return;

          text += sectionNames[i] + "\n" + "-".repeat(20) + "\n";
          items.forEach(function (item) {
            const label = item.querySelector(".label").textContent;
            const value = item.querySelector(".value").textContent;
            text += label + ": " + value + "\n";
          });
          text += "\n";
        });

        return text;
      }

      document.getElementById("btnRefresh").addEventListener("click", collectInfo);
      document.getElementById("btnCopy").addEventListener("click", async function () {
        try {
          await navigator.clipboard.writeText(getAllInfo());
        } catch (e) {}
      });

      collectInfo();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "dark" ? "" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next || "light");
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = "🌙";
        }
      })();
    </script>
  </body>
</html>
